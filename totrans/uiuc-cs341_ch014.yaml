- en: Security
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 安全
- en: Computer security is the protection of hardware and software from unauthorized
    access or modification. Even if you don’t work directly in the computer security
    field, the concepts are important to learn because all systems will have attackers
    given enough time. Even though this is introduced as a different chapter, it is
    important to note that most of these concepts and code examples have already been
    introduced at different points in the course. We won’t go in depth about all of
    the common ways of attack and defense nor will we go into how to perform all of
    these attacks in an arbitrary system. Our goal is to introduce you to the field
    of making programs do what you want to do.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 计算机安全是保护硬件和软件免受未经授权的访问或修改。即使你并没有直接在计算机安全领域工作，这些概念也是重要的学习内容，因为所有系统在足够的时间下都会遇到攻击者。尽管这部分内容被介绍为不同的章节，但重要的是要注意，这些概念和代码示例已经在课程的不同部分介绍过了。我们不会深入探讨所有常见的攻击和防御方式，也不会详细介绍如何在任意系统中执行这些攻击。我们的目标是让你了解使程序按照你的意愿运行的领域。
- en: Security Terminology and Ethics
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 安全术语和道德规范
- en: There is some terminology that needs to be explained to get someone who has
    little to no experience in computer security up to speed
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 有一些术语需要解释，以便让那些在计算机安全领域几乎没有经验的人能够跟上进度
- en: An **Attacker** is typically the user who is trying to break into the system.
    Breaking into the system means performing an action that the developer of the
    system didn’t intend. It could also mean accessing a system you shouldn’t have
    access to.
  id: totrans-4
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**攻击者**通常是试图闯入系统的用户。闯入系统意味着执行开发者未曾意图的行为。这也可能意味着访问你不应该访问的系统。'
- en: A **Defender** is typically the user who is preventing the attacker from breaking
    into the system. This may be the developer of the system.
  id: totrans-5
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**防御者**通常是防止攻击者闯入系统的用户。这可能是系统的开发者。'
- en: There are different types of attackers. There are **white hat** hackers who
    attempt to hack a defender with their consent. This is commonly a form of pre-emptive
    testing – in case a not-so-friendly attack comes along. The **black hat** hackers
    are hackers who hack without permission and the intent to use the information
    obtained for any purpose. Gray hat hacking differs because the hacker’s intent
    is to inform the defender of the vulnerability – though this can be hard to judge
    at times.
  id: totrans-6
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 存在着不同类型的攻击者。有**白帽**黑客，他们会在同意的情况下尝试攻击防御者。这通常是一种预防性测试的形式——以防出现不太友好的攻击。**黑帽**黑客是未经许可进行黑客攻击的人，他们意图将获取的信息用于任何目的。灰帽黑客不同，因为黑客的意图是通知防御者存在的漏洞——尽管有时这很难判断。
- en: '**Danger Will Robinson** Before we let you go much further, it is important
    that we talk about ethics. Before you skip over this section, know that your career
    quite literally can be terminated over an unethical decision that you might make.
    The computer fraud and security act is a broad, and arguably terrible law, that
    casts any non-authorized use of a ‘protected computer’ of a computer as a felony.
    Since most computers are involved in some interstate/international commerce (the
    internet) most computers fall under this category. It is important to think about
    your actions and have some ladder of accountability before executing any attack
    or defense. To be more concrete, make sure supervisors in your organization have
    given you their blessing before trying to execute an attack.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '**危险，罗宾逊**在我们让你继续前进之前，重要的是我们要谈谈道德规范。在你跳过这一部分之前，要知道你的职业生涯可能会因为一个不道德的决定而直接被终止。计算机欺诈和安全法案是一项广泛且可能非常糟糕的法律，将任何未经授权使用“受保护计算机”的行为视为重罪。由于大多数计算机都涉及一些州际/国际商业（互联网），因此大多数计算机都属于这一类别。在执行任何攻击或防御之前，重要的是要考虑你的行为，并在执行之前有一些责任阶梯。更具体地说，在尝试执行攻击之前，确保你的组织中的主管已经给予了他们的许可。'
- en: 'First if at all possible, get written permission from one of your superiors.
    We do realize that this is a cop-out and this puts the blame up a level, but at
    the risk of sounding cynical organizations will often put blame on an individual
    employee to avoid damages TODO: Citation Needed. If not possible, try to go through
    the engineering steps'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '首先如果可能的话，从你的上级之一那里获得书面许可。我们确实意识到这是一种逃避责任的做法，并且将责任推到了更高的层次，但冒着听起来愤世嫉俗的风险，组织往往会将责任推给个别员工以避免损害
    TODO: 需要引用。如果不可能，尝试通过工程步骤进行'
- en: Figure out what the problem is that you are trying to solve. You can’t solve
    a problem that you don’t fully understand.
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定你试图解决的问题是什么。你不能解决一个你不完全理解的问题。
- en: Determine whetheryou need to “hack” the system. A hack is defined generally
    as trying to use a system unintendedly. First, you should determine if your use
    is intended or unintended or somewhere in the middle – get a decision for them.
    If you can’t get that, make a reasonable judgement as to what the intended use.
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确定你是否需要“破解”系统。一般来说，破解是指试图以非预期的方式使用系统。首先，你应该确定你的使用是预期的、非预期的，还是介于两者之间——为他们做出决定。如果你无法做出决定，就做出合理的判断，确定预期的使用方式。
- en: Figure out a reasonable estimate of what the cost is to “hacking” the system.
    Get that reasonable estimate checked out with a few engineers so they can highlight
    things that you may have missed. Try to get someone to sign off on the plan.
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 合理估计“破解”系统的成本。让几个工程师检查这个合理的估计，以便他们可以指出你可能忽略的事情。试图让某人批准这个计划。
- en: Execute the plan with caution. If at any point something seems wrong, weigh
    the risks and execute the plan.
  id: totrans-12
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 谨慎执行计划。如果在任何时刻感觉有问题，权衡风险并执行计划。
- en: If there isn’t a certain ethical guideline for the current application, then
    create some. This is often called a . This may seem like busy work and more on
    the “business side” than computer scientists are used to, but your career is at
    stake here. It is up to you as a computing professional to assess the risk and
    to decide whether to execute. Courts generally like sitting on precedent, but
    you can easily say that you aren’t a legal scholar. In lieu, you must be able
    to say that you reacted as a “reasonable” engineer would react.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 如果当前应用程序没有特定的道德准则，那么就创建一些。这通常被称为。这可能看起来像是繁琐的工作，更多地与“商业方面”有关，而不是计算机科学家所习惯的，但你的职业生涯就在这里。作为计算专业人士，评估风险并决定是否执行取决于你。法院通常喜欢遵循先例，但你可以说你不是法律学者。作为替代，你必须能够说你会像“合理的”工程师那样反应。
- en: 'TODO: Link to some case studies of real engineers having to decide'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: TODO：链接到一些真实工程师必须做出决定的案例研究
- en: CIA Triad
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: CIA三元组
- en: There are three commonly accepted goals to help understand if a system is secure.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 有三个普遍接受的目标有助于理解系统是否安全。
- en: Information Confidentiality means that only authorized parties are allowed to
    see a piece of information
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 信息机密性意味着只有授权方才能查看信息。
- en: Information Integrity means that only authorized parties are allowed the modify
    a piece of information, regardless of whether they are allowed to see it. It ensures
    that information remains in complete during transit.
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 信息完整性意味着只有授权方才能修改信息，无论他们是否被允许查看它。它确保信息在传输过程中保持完整。
- en: Information Availability means information, or a service, is available when
    it is needed.
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 信息可用性意味着信息或服务在需要时可用。
- en: The triad above forms the Confidentiality, Integrity, and Availability (CIA)
    triad, often authenticity is added as well.
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 上述三元组构成了机密性、完整性和可用性（CIA）三元组，通常还会增加真实性。
- en: If any of these are broken, the security of a system (either a service or piece
    of information) has been compromised.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 如果其中任何一个被破坏，系统的安全性（无论是服务还是信息）就已被破坏。
- en: Security in C Programs
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: C程序中的安全性
- en: Stack Smashing
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 栈溢出
- en: Consider the following code snippet
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑以下代码片段
- en: '[PRE0]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: There is no checking on the bounds of strcpy! This means that we could potentially
    pass in a large string and get the program to do something unintended, usually
    via replacing the return address of the function with the address of malicious
    code. Most strings will cause the program to exit with a segmentation fault
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: strcpy函数没有边界检查！这意味着我们可能传递一个大的字符串，导致程序执行非预期的操作，通常是通过将函数的返回地址替换为恶意代码的地址。大多数字符串会导致程序因段错误而退出
- en: '[PRE1]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: If we manipulate the bytes in certain ways and the program was compiled with
    the correct flags, we can actually get access to a shell! Consider if that file
    is owned by root, we put in some valid bytecode (binary instructions) as the string.
    What will happen is we’ll try to execute that is compiled to the bytecode of the
    operating system and pass it as part of our string. With some luck, we will get
    access to a root shell.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们以某种方式操纵字节，并且程序是用正确的标志编译的，我们实际上可以获取对shell的访问权限！考虑如果该文件属于root用户，我们输入一些有效的字节码（二进制指令）作为字符串。会发生的事情是我们会尝试执行编译成操作系统字节码的内容，并将其作为我们字符串的一部分传递。如果有幸，我们将获得对root
    shell的访问权限。
- en: '[PRE2]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: The question arises, which parts of the triad does this break? Try to answer
    that question yourself. So how would we go about fixing this? We could ingrain
    into most programmers at the C level to use or on OpenBSD systems. Turning on
    stack canaries as explained later will fix this issue as well.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 问题是，这个三联组中的哪些部分被破坏了？试着回答这个问题。那么我们该如何解决这个问题呢？我们可以在C级别将使用或on OpenBSD系统内化到大多数程序员中。如后文所述，开启栈看门狗可以解决这个问题。
- en: Buffer Overflow
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 缓冲区溢出
- en: Most of you are already familiar with Buffer Overflows! A lot of time they are
    fairly tame, leading to simple program crashes or funny mistakes. Here is a complete
    example
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人已经熟悉缓冲区溢出了！很多时候它们相当温和，导致简单的程序崩溃或有趣的错误。这里有一个完整的例子
- en: '[PRE3]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: What happens here should be clear if you recall the c memory model. Out and
    in are both next to each other in memory. If you read in a string from standard
    input that overflows in, then you end up printing aoo. It gets a little more serious
    if the snippet starts out as
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你能回忆起C内存模型，这里发生的事情应该是清晰的。出和入在内存中都是相邻的。如果你从标准输入读取一个字符串到溢出的入，那么你最终会打印出aoo。如果片段一开始就是
- en: '[PRE4]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Out of order instructions & Spectre
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 无序指令 & Spectre
- en: 'Out of order execution is an amazing development that has been recently adopted
    by many hardware vendors (think 1990s) TODO: citation needed. Processors now instead
    of executing a sequence of instructions (let’s say assigning a variable and then
    another variable) execute instructions before the current one is done (Guide [2011](ch018.xhtml#ref-guide2011intel)
    P. 45). This is because modern processors spend a lot of time waiting for memory
    accesses and other I/O driven applications. This means that a processor, while
    it is waiting for an operation to complete, will execute the next few operations.
    If any of the operations would possibly alter the final result, there is a barrier,
    or if the re-ordering violates the data dependencies of the instructions, the
    processor keep the instructions in the stated order (Guide [2011](ch018.xhtml#ref-guide2011intel)
    P. 296).'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 无序执行是一个惊人的发展，最近被许多硬件供应商采用（想想20世纪90年代）TODO：需要引用。处理器现在不再执行一系列指令（比如说分配一个变量然后另一个变量），而是在当前指令完成之前执行指令（指南[2011](ch018.xhtml#ref-guide2011intel)第45页）。这是因为现代处理器花费大量时间等待内存访问和其他I/O驱动应用程序。这意味着处理器在等待操作完成时，将执行接下来的几个操作。如果有任何操作可能会改变最终结果，那么就有障碍，或者如果重新排序违反了指令的数据依赖性，处理器将保持指令的既定顺序（指南[2011](ch018.xhtml#ref-guide2011intel)第296页）。
- en: Naturally, this allowed CPUs to become more energy-efficient while executing
    more instructions in real-time and increased security risks from complex architectures.
    What system programmers are worried about is that operation with mutex locks among
    threads are out of order – meaning that a pure software implementation of a mutex
    will fail without copious memory barriers. Therefore, the programmer has to acknowledge
    that updates may be missed among a series of threads, given that there is no barrier,
    on modern processors.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 自然地，这使得CPU在实时执行更多指令的同时变得更加节能，同时也增加了复杂架构带来的安全风险。系统程序员担心的是，线程之间的互斥锁操作是无序的——这意味着没有大量内存屏障的纯软件实现互斥锁将失败。因此，程序员必须承认，在没有屏障的情况下，一系列线程中可能会错过更新。
- en: One of the most prominent bugs concerning this is Spectre (Kocher et al. [2018](ch018.xhtml#ref-kocher2018spectre)).
    Spectre is a bug where instructions that otherwise wouldn’t be executed are speculatively
    executed due to out-of-order instruction execution. The following snippet is a
    high-level proof of concept.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 与此相关的最突出的错误之一是Spectre（Kocher等人[2018](ch018.xhtml#ref-kocher2018spectre)）。Spectre是一种由于无序指令执行而推测性地执行了本不应执行的指令的bug。以下是一个高级概念证明的片段。
- en: '[PRE5]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Let’s analyze this code. The first loop allocates 9 elements through a valid
    malloc. The last element is , meaning a dereference should result in a SEGFAULT.
    For the first 9 iterations, the branch is taken and is assigned to a valid value.
    The interesting part happens in the last iteration. The resulting behavior of
    the program is to skip the last iteration. Therefore, never gets assigned to the
    last value.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们分析一下这段代码。第一个循环通过有效的malloc分配了9个元素。最后一个元素是，意味着解引用应该导致SEGFAULT。在前9次迭代中，分支被采取，并被分配给一个有效的值。有趣的部分发生在最后一次迭代。程序的结果是跳过最后一次迭代。因此，永远不会被分配到最后一个值。
- en: But under the right compilation conditions and compiler flags, the instructions
    will be speculatively executed. The processor thinks that the branch will be taken,
    since it has been taken in the last 9 iterations. As such, the processor will
    fetch those instructions. Due to out-of-order instruction execution, while the
    value of *i* is being fetched from memory, we have to force it not to be in a
    register. Then, the processor will try to dereference that address. This should
    result in a SEGFAULT. Since the address was never logically reached by the program,
    the result is discarded.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 但在适当的编译条件和编译器标志下，指令将被推测执行。处理器认为分支将被采取，因为它在最后的9次迭代中已经被采取。因此，处理器将获取这些指令。由于指令乱序执行，当从内存中获取*i*的值时，我们必须强制它不在寄存器中。然后，处理器将尝试解引用该地址。这应该导致SEGFAULT。由于该地址从未被程序逻辑上访问到，结果是丢弃的。
- en: Now here is the trick. Even though the value of the calculation would have resulted
    in a SEGFAULT, the bug doesn’t clear the cache that refers to the physical memory
    where 0xCAFE is located. This is an inexact explanation, but essentially how it
    works. Since it is still in the cache, if you again trick the processor to read
    form the cache using then you will read a memory value that you wouldn’t be able
    to read normally. This could include important information such as passwords,
    payment information, etc.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是技巧所在。尽管计算的值会导致SEGFAULT，但该错误不会清除指向0xCAFE所在物理内存的缓存。这是一个不精确的解释，但基本上就是这样工作的。由于它仍然在缓存中，如果你再次欺骗处理器使用它从缓存中读取，你将读取到通常无法读取的内存值。这可能包括重要信息，如密码、支付信息等。
- en: Operating Systems Security
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 操作系统安全
- en: Permissions. In POSIX systems, we have permissions everywhere. There are directories
    that you can and can’t access, files that you can and can’t access. Each user
    account is given access to each file and directory through the read-write-execute
    (RWX) bits. The user gets matched with either the owner, the group, or ‘everyone
    else’, and their access to the file is limited using these bits. Note that permissions
    work slightly differently on directories compared to files.
  id: totrans-45
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 权限。在POSIX系统中，我们到处都有权限。有你可以访问和不能访问的目录，有你可以访问和不能访问的文件。每个用户账户通过读写执行（RWX）位访问每个文件和目录。用户与所有者、组或“其他人”匹配，并使用这些位限制对文件的访问。请注意，与文件相比，目录的权限工作方式略有不同。
- en: Capabilities. In addition to permissions on files, each user has a certain set
    of permissions that they can do. For a full list, you can check capabilities(7).
    In short, allowing a capability allows a user to perform a set of actions. Some
    examples include controlling networking devices, creating special files, and peering
    into IPC or interprocess communication.
  id: totrans-46
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 权限。除了对文件的操作权限外，每个用户都有一定可以执行的操作权限。要查看完整列表，您可以检查`capabilities(7)`。简而言之，允许权限意味着允许用户执行一系列操作。一些例子包括控制网络设备、创建特殊文件以及窥视IPC或进程间通信。
- en: Address Space Layout Randomization (ASLR). ASLR causes the address spaces of
    important sections of a process, including the base address of the executable
    and the positions of the stack, heap and libraries, to start at randomized values,
    on every run. This is so that an attacker with a running executable has to randomly
    guess where sensitive information could be hidden. For example, an attacker may
    use this to easily perform a attack.
  id: totrans-47
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 地址空间布局随机化（ASLR）。ASLR会导致进程重要部分的地址空间，包括可执行文件的基址以及栈、堆和库的位置，在每次运行时都从随机值开始。这样，一个拥有正在运行的可执行文件的攻击者必须随机猜测敏感信息可能被隐藏的位置。例如，攻击者可能利用这一点轻松地执行攻击。
- en: Stack Protectors. Let’s say you’ve programmed a buffer overflow as above. In
    most cases, what happens? Unless specifically turned off, the compiler will put
    in stack protectors or stack canaries. This is a value that resides in the stack
    and must remain constant for the duration of the function call. If that protector
    is overwritten at the end of the function call, the run time will abort and report
    to the user that stack smashing was detected.
  id: totrans-48
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 栈保护器。假设你已经像上面那样编写了一个缓冲区溢出程序。在大多数情况下会发生什么？除非特别关闭，编译器会放入栈保护器或栈看门狗。这是一个位于栈中的值，在函数调用期间必须保持不变。如果在函数调用结束时覆盖了该保护器，运行时将终止并向用户报告检测到栈破坏。
- en: Write xor Execute, also known as (DEP). This is a protection that was covered
    in the IPC section that distinguishes code from data. A page can either be written
    to or executed but not both. This is to prevent buffer overflows where attackers
    write arbitrary code, often stored on the stack or heap, and execute with the
    user’s permissions.
  id: totrans-49
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 写入或执行，也称为（DEP）。这是在 IPC 部分中介绍的保护措施，用于区分代码和数据。一个页面要么可以写入，要么可以执行，但不能同时进行。这是为了防止缓冲区溢出，攻击者通常会写入任意代码，通常存储在堆栈或堆中，并使用用户的权限执行。
- en: Firewall. The Linux kernel provides the netfilter module as a way of deciding
    whetheran incoming connection should be allowed and various other restrictions
    on connections. This can help with a DDOS attack (explained later).
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 防火墙。Linux 内核提供了 netfilter 模块，作为决定是否允许传入连接以及连接的各种限制的方式。这有助于防御 DDoS 攻击（稍后解释）。
- en: AppArmor. AppArmor is a suite of operating system tools at the userspace level
    to restrict applications to certain operations.
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: AppArmor. AppArmor 是一套用户空间级别的操作系统工具，用于限制应用程序执行特定操作。
- en: OpenBSD is an arguably better system for security. It has many security oriented
    features. Some of these features have been touched upon earlier. An exhaustive
    list of features is at [https://www.openbsd.org/innovations.html](https://www.openbsd.org/innovations.html)
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: OpenBSD 是一个在安全性方面可能更好的系统。它具有许多面向安全性的功能。其中一些功能在前面已经提到过。一个详尽的功能列表可以在 [https://www.openbsd.org/innovations.html](https://www.openbsd.org/innovations.html)
    找到。
- en: pledge. Pledge is a powerful command that restricts system calls. This means
    if you have a simple program like which only reads to and from files, one can
    reasonably restrict all network access, pipe access, and write access to files.
    This is known as the process of “hardening” an executable or system, giving the
    smallest amount of permissions to the least number of executables needed to run
    a system. Pledge is also useful in case one tries to perform an injection attack.
  id: totrans-53
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: pledge. pledge 是一个强大的命令，用于限制系统调用。这意味着如果你有一个简单的程序，例如只从文件中读取和写入的程序，你可以合理地限制所有网络访问、管道访问和文件写入访问。这被称为“加固”可执行文件或系统的过程，即给予运行系统所需的最少可执行文件以最小的权限。pledge
    还在尝试执行注入攻击时非常有用。
- en: unveil. Unveil is a system call that restricts the access of a current program
    to a few directories. Those permissions apply to all forked programs as well.
    This means if you have a suspicious executable that you want to run whose description
    is “creates a new file and outputs random words” one could use this call to restrict
    access to a safe subdirectory and watch it receive the SIGKILL signal if it tries
    to access system files in the root directory, for example. This could be useful
    for your program as well. If you want to ensure that no user data is lost during
    an update (which is what happened with a Steam system update), then the system
    could only reveal the program’s installation directory. If an attacker manages
    to find an exploit in the executable, it can only compromise the installation
    directory.
  id: totrans-54
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: unveil. unveil 是一个系统调用，用于限制当前程序对几个目录的访问。这些权限也适用于所有派生的程序。这意味着如果你有一个你想运行的可疑可执行文件，其描述为“创建一个新文件并输出随机单词”，你可以使用这个调用来限制对安全子目录的访问，并监视它是否在尝试访问根目录中的系统文件时接收
    SIGKILL 信号，例如。这可能对你的程序也有用。如果你想确保在更新过程中不会丢失任何用户数据（例如 Steam 系统更新中发生的情况），那么系统只能揭示程序的安装目录。如果攻击者设法在可执行文件中找到漏洞，它只能危害安装目录。
- en: sudo. Sudo is an openBSD project that runs everywhere! Before to run commands
    as root, one would have to drop to a root shell. Some times that would also mean
    giving users scary system capabilities. Sudo gives you access to perform commands
    as root for one-offs without giving a long list of capabilities to all of your
    users.
  id: totrans-55
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: sudo. sudo 是一个在所有地方都运行的 openBSD 项目！在以 root 用户身份运行命令之前，你不得不切换到 root shell。有时这也意味着赋予用户令人恐惧的系统权限。sudo
    允许你在不向所有用户授予长列表的权限的情况下，执行作为 root 的命令。
- en: Virtualization Security
  id: totrans-56
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 虚拟化安全
- en: Virtualization is the act of creating a virtual version of an environment for
    a program to run on. Though that definition might be bent a little with the advent
    of new-age bare metal Virtual Machines, the abstraction is still there. One can
    imagine a single Operating System per motherboard. Virtualization in the software
    sense is providing “virtual” motherboard features like USB ports or monitors that
    another program (the bridge) communicates with the actual hardware to perform
    a task. A simple example is running a virtual machine on your host desktop! One
    can spin up an entirely different operating system whose instructions are fed
    through another program and executed on the host system. There are many forms
    of virtualization that we use today. We will discuss two popular forms below.
    One form is virtual machines. These programs emulate *all* forms of motherboard
    peripherals to create a full machine. Another form is containers. Virtual machines
    are good but are often bulky and programs only need a certain level of protection.
    Containers are virtual machines that don’t emulate all motherboard peripherals
    and instead share with the host operating system, adding in additional layers
    of security.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 虚拟化是指为程序运行创建一个虚拟环境的行为。尽管随着新世代裸金属虚拟机的出现，这个定义可能有所变化，但抽象层仍然存在。可以想象每个主板都对应一个操作系统。在软件层面，虚拟化提供“虚拟”主板功能，如USB端口或显示器，这些功能通过另一个程序（即桥梁）与实际硬件通信以执行任务。一个简单的例子是在您的宿主桌面上运行虚拟机！可以启动一个完全不同的操作系统，其指令通过另一个程序传入并在宿主系统上执行。我们今天使用了许多种虚拟化形式。以下我们将讨论两种流行的形式。一种形式是虚拟机。这些程序模拟*所有*主板外设以创建一个完整的机器。另一种形式是容器。虚拟机很好，但通常体积庞大，程序只需要一定级别的保护。容器是不模拟所有主板外设的虚拟机，而是与宿主操作系统共享，增加了额外的安全层。
- en: Now, you can’t have proper virtualization without security. One of the reasons
    to have virtualization is to ensure that the virtualized environment doesn’t maliciously
    leak back into the host environment. We say maliciously because there are intended
    ways of communication that we want to keep in check. Here are some simple examples
    of security provided through virtualization
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，没有安全措施就无法进行适当的虚拟化。拥有虚拟化的一个原因是为了确保虚拟化环境不会恶意泄露回宿主环境。我们说恶意，因为我们希望保持检查的通信方式是有意为之。以下是虚拟化提供的一些简单安全示例。
- en: chroot is a contrived way of creating a virtualization environment. chroot is
    short for change root. This changes where a program believes that (/) is mounted
    on the system. For example with chroot, one can make a hello world program believe
    is actually the root directory. This is useful because no other files are exposed.
    This is contrived because Linux still needs additional tools (think the c standard
    library) to come from different directories such as which means those could still
    be vulnerable.
  id: totrans-59
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: chroot是一种创建虚拟化环境的方法。chroot是change root的缩写。这改变了程序认为(/)在系统上挂载的位置。例如，使用chroot，可以使一个hello
    world程序相信它实际上是根目录。这很有用，因为不会暴露其他文件。这是人为的，因为Linux仍然需要额外的工具（如c标准库）来自不同的目录，这意味着这些目录仍然可能存在漏洞。
- en: namespaces are Linux’s better way to create a virtualization environment. We
    won’t go into this too much, just know that they exist.
  id: totrans-60
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 命名空间是Linux创建虚拟化环境的一种更好的方式。我们不会过多地介绍这一点，只需知道它们存在即可。
- en: Hardware virtualization technology. Hardware vendors have become increasingly
    aware that physical protections are needed when emulating instructions. As such,
    there can be switches enabled by the user that allows the operating system to
    flip into a virtualization mode where instructions are run as normal but are monitored
    for malicious activity. This helps the performance and increases the security
    of virtualized environments.
  id: totrans-61
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 硬件虚拟化技术。硬件供应商越来越意识到在模拟指令时需要物理保护。因此，用户可以启用某些开关，使操作系统切换到虚拟化模式，其中指令以正常方式运行，但会监控恶意活动。这有助于提高性能并增加虚拟化环境的安全性。
- en: Cyber Security
  id: totrans-62
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 网络安全
- en: Cyber Security is arguably the most popular area of security. More and more
    of our systems are hacked over the web, it is important to understand how we can
    protect against these attacks
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 网络安全可以说是最受欢迎的安全领域。我们的系统越来越多地通过网络遭受黑客攻击，了解如何抵御这些攻击变得尤为重要。
- en: Security at the TCP Level
  id: totrans-64
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: TCP层的安全
- en: Encryption. **TCP is unencrypted!** This means any data that is sent over a
    TCP connection is in plain text. If one needs to send encrypted data, one needs
    to use a higher level protocol such as HTTPs or develop their own.
  id: totrans-65
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 加密。**TCP 是未加密的！**这意味着通过 TCP 连接发送的任何数据都是明文。如果需要发送加密数据，就需要使用更高层次的协议，如 HTTPs 或开发自己的协议。
- en: Identity Verification. In TCP, there is no way to verify the identity of who
    the program is connecting to. There are no checks or federated databases in place.
    One just has to trust the DNS server gave a reasonable response which is almost
    always the incorrect answer. Apart from systems that have an approved white list
    or a “secret” connection protocol, there is little at the TCP level that one can
    do to stop.
  id: totrans-66
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 身份验证。在 TCP 中，无法验证程序连接到的身份。没有检查或联邦数据库。只能相信 DNS 服务器给出了合理的响应，这几乎总是错误的答案。除了有批准的白名单或“秘密”连接协议的系统外，在
    TCP 层面上几乎无法做些什么来阻止。
- en: Syn-Ack Sequence Number. This is a security improvement. TCP features what we
    call sequence numbers. That means that during the SYN-SYN/ACK-ACK dance, a connection
    starts at a random integer. This is important because if an attacker is trying
    to spoof packets (pretend those packets are coming from your program) that means
    that the attacker must either correctly guess – which is hard – or be in the route
    that your packet takes to the destination – much more likely. ISPs help out with
    the destination problem because it may send a connection through varying routers
    which makes it hard for an attacker to sit anywhere and be sure that they will
    receive your packets – this is why security experts usually advise against using
    coffee shop wifi for sensitive tasks.
  id: totrans-67
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Syn-Ack 序列号。这是一个安全改进。TCP 有我们所说的序列号。这意味着在 SYN-SYN/ACK-ACK 舞蹈中，连接从一个随机整数开始。这很重要，因为如果攻击者试图伪造数据包（假装这些数据包来自你的程序），这意味着攻击者必须正确猜测——这很困难——或者位于你的数据包到达目的地的路由上——可能性更大。ISP
    通过发送连接通过不同的路由器来帮助解决这个问题，这使得攻击者很难坐在任何地方并确信他们会收到你的数据包——这就是为什么安全专家通常建议不要在咖啡店 Wi-Fi
    上进行敏感任务。
- en: Syn-Flood. Before the first synchronization packet is acknowledged, there is
    no connection. That means a malicious attacker can write a bad TCP implementation
    that sends out a flood of SYN packets to a hapless server. The SYN flood is easily
    mitigated by using IPTABLES or another netfilter module to drop all incoming connections
    from an IP address after a certain volume of traffic is reached for a certain
    period.
  id: totrans-68
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Syn-Flood。在第一个同步数据包被确认之前，没有连接。这意味着恶意攻击者可以编写一个糟糕的 TCP 实现，向一个不幸的服务器发送大量的 SYN 数据包。通过使用
    IPTABLES 或另一个 netfilter 模块，在达到一定量的流量后，可以在一定时间内丢弃来自某个 IP 地址的所有传入连接，从而轻松缓解 SYN 洪水攻击。
- en: Denial of Service, Distributed Denial of Service is the hardest form of attack
    to stop. Companies today are still trying to find good ways to ease these attacks.
    This involves sending all sorts of network traffic forward to servers in the hopes
    that the traffic will clog them up and slow down the servers. In big systems,
    this can lead to cascading failures. If a system is engineered poorly, one server’s
    failure causes all the other servers to pick up more work which increases the
    probability that they will fail and so on and so forth.
  id: totrans-69
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 拒绝服务，分布式拒绝服务是最难阻止的攻击形式。今天，公司仍在寻找好的方法来减轻这些攻击。这涉及到将各种网络流量发送到服务器，希望流量会堵塞它们并减慢服务器的速度。在大系统中，这可能导致级联故障。如果系统设计不当，一个服务器的故障会导致其他服务器承担更多的工作，从而增加了它们失败的概率，如此类推。
- en: Security at the DNS Level
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: DNS 层面的安全
- en: As of 2019, the United States Department of Homeland Security released a directive
    to switch all services from DNS to DNSSec [https://cyber.dhs.gov/assets/report/ed-19-01.pdf](https://cyber.dhs.gov/assets/report/ed-19-01.pdf).
    This directive is an inherent flaw of the DNS system. First, DNS doesn’t offer
    any sort of verification on domain name requests. That is, it is easy to spoof
    DNS nameservers such that they point your browser to potentially malicious servers.
    Remember that DNS requests are sent as unsecured UDP packets, which are prone
    to tampering. This means that if an attacker snags a plain-text request for a
    DNS server, that attacker can now send the result back to the requester. More
    commonly instead of just attacking one person, they will connect to a public wifi
    station and poison the cache of the router – meaning that all who are connected
    will get a bad IP address when requesting a domain name. This can get into serious
    spoofing attacks if one tries to pretend they are a major bank.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 截至2019年，美国国土安全部发布了一项指令，要求将所有服务从DNS切换到DNSSec [https://cyber.dhs.gov/assets/report/ed-19-01.pdf](https://cyber.dhs.gov/assets/report/ed-19-01.pdf)。这项指令是DNS系统的一个固有缺陷。首先，DNS不提供任何形式的域名请求验证。也就是说，很容易欺骗DNS名称服务器，使它们将你的浏览器指向可能恶意的服务器。记住，DNS请求是以未加密的UDP数据包发送的，这些数据包容易受到篡改。这意味着如果攻击者截获了对DNS服务器的纯文本请求，那么该攻击者现在可以向请求者发送结果。更常见的是，他们不会仅仅攻击一个人，而是连接到公共Wi-Fi热点并毒化路由器的缓存——这意味着当请求域名时，所有连接的人都会得到一个错误的IP地址。如果有人试图假装自己是主要银行，这可能会变成严重的欺骗攻击。
- en: Topics
  id: totrans-72
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 主题
- en: Security Terminology
  id: totrans-73
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 安全术语
- en: Security in local C programs
  id: totrans-74
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 本地C程序中的安全
- en: Security in CyberSpace
  id: totrans-75
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 网络空间安全
- en: Review
  id: totrans-76
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 复习
- en: What is a chmod statement to break only the confidentiality of your data?
  id: totrans-77
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 什么chmod语句可以仅破坏你数据的机密性？
- en: What is a chmod statement to break only the confidentiality and availability
    of your data?
  id: totrans-78
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 什么chmod语句可以仅破坏你数据的机密性？
- en: An attacker gains root access on a Linux system that you use to store private
    information. Does this affect confidentiality, integrity, or availability of your
    information, or all three?
  id: totrans-79
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一个攻击者获得了你用来存储私人信息的Linux系统的root权限。这会影响你信息的机密性、完整性或可用性，还是全部三个？
- en: Hackers brute force your git username and password. Who is affected?
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 黑客暴力破解你的git用户名和密码。谁会受到影响的？
- en: Why is privilege separation useful in RPC applications?
  id: totrans-81
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为什么在RPC应用中使用权限分离是有用的？
- en: Is it easier to forge a UDP or TCP packet and why?
  id: totrans-82
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 是伪造UDP或TCP数据包更容易，以及为什么？
- en: Why are TCP sequence numbers initialized to a random number?
  id: totrans-83
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为什么TCP序列号初始化为随机数？
- en: What is the impact if the RAM used to hold a shared library (e.g. the C standard
    library) was writable by any process?
  id: totrans-84
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果用于存储共享库（例如C标准库）的RAM可以被任何进程写入，这会有什么影响？
- en: Is creating and implementing client-server protocols that are secure and invulnerable
    to malicious attackers easy?
  id: totrans-85
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 创建和实施安全且对恶意攻击者免疫的客户端-服务器协议容易吗？
