- en: Heaps
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://courses.physics.illinois.edu/cs225/sp2019/notes/heaps/](https://courses.physics.illinois.edu/cs225/sp2019/notes/heaps/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Back to Notes](/cs225/sp2019/notes/)by Eddie Huang![](../Images/bddfc525419136d58b7debf1f842a87c.png)'
  prefs: []
  type: TYPE_NORMAL
- en: A heap
  prefs: []
  type: TYPE_NORMAL
- en: Motivation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/d38cc8b0a0e082c65f9d3b84cd701b9a.png)'
  prefs: []
  type: TYPE_IMG
- en: A sequence of stores and removal of elements
  prefs: []
  type: TYPE_NORMAL
- en: Let’s say a set of at most `n` elements, each with an associated priority `p`[`i`],
    is given to you one element at a time. At any point in time, you may be asked
    to remove the most important (highest priority) element that you currently hold
    so far. How would you do it?
  prefs: []
  type: TYPE_NORMAL
- en: A naive solution may be to maintain an array of size `n` and simply append new
    elements to the end of the array. Whenever there is a query, you simply scan through
    the array to find the most important element. The query would take linear (`O(n)`)
    time and if there were `k` queries in total, then the combined query time would
    be `O(kn)`. The total time would therefore be `O(n+kn)`.
  prefs: []
  type: TYPE_NORMAL
- en: We can do better with heaps
  prefs: []
  type: TYPE_NORMAL
- en: Features of Heaps
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A heap allows you to store elements and query the most important elements quickly,
    which is usually logarithmic time.
  prefs: []
  type: TYPE_NORMAL
- en: 'Heaps are represented as trees where each node is an element with an associated
    `priority` or `weight`. There is only one property that the tree must satisfy:'
  prefs: []
  type: TYPE_NORMAL
- en: '*The parent has higher priority than any of its children*'
  prefs: []
  type: TYPE_NORMAL
- en: Therefore, the root should always have the highest priority.
  prefs: []
  type: TYPE_NORMAL
- en: In the example above where we are storing elements and querying the most important
    elements at random times, the total runtime would be `O(n log(n) + k log(n))`,
    where storing elements and removing the most important elements both take `O(log
    n)` time. This runtime is faster if the number of queries `k` is larger than `O(log
    n)`
  prefs: []
  type: TYPE_NORMAL
- en: Binary Heaps
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A heap is an abstract data structure and there are many data structure versions
    of heaps such as Fibonacci heaps or Binomial heaps that have their own advantages
    and disadvantages. Binary heaps are one of the most common, simplest heap data
    structures, and they are also the ones that we cover in this course. Binary heaps
    are complete binary trees that satisfy the heap property. Since they are complete
    trees, their heights are always logarithmic to their number of nodes.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/62e8091c43008f7e4ba2afc56a717df6.png)'
  prefs: []
  type: TYPE_IMG
- en: A binary min-heap
  prefs: []
  type: TYPE_NORMAL
- en: Priority is often expressed as a number in which the order of priority can either
    be the minimum or the maximum between two numbers. Thus, we use the terms `min-heap`
    or `max-heap` to name numerical binary heaps.
  prefs: []
  type: TYPE_NORMAL
- en: Insertion
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '![](../Images/62e8091c43008f7e4ba2afc56a717df6.png)'
  prefs: []
  type: TYPE_IMG
- en: A binary min-heap
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/457f7b0ab509a05cf4416b01aa338878.png)'
  prefs: []
  type: TYPE_IMG
- en: Inserting a new element
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d41890401fff5b245bb90395854afa28.png)'
  prefs: []
  type: TYPE_IMG
- en: '`Heapify up`: Repeatedly swap with parent until heap property is satisfied'
  prefs: []
  type: TYPE_NORMAL
- en: When inserting a node in a binary heap, we add it to the next leaf position
    such that the heap remains a complete tree. Until the new node has lower priority
    than its parent, we repeatedly swap this node with its parent, which will then
    restore the tree’s heap property. This repeated swapping is called `heapify up`.
  prefs: []
  type: TYPE_NORMAL
- en: The number of swaps is at most the height of the tree, so insertion takes logarithmic
    time.
  prefs: []
  type: TYPE_NORMAL
- en: Removal
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '![](../Images/62e8091c43008f7e4ba2afc56a717df6.png)'
  prefs: []
  type: TYPE_IMG
- en: A binary min-heap
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ac5b375d56e7c61ce1115ae9eedcb6fc.png)'
  prefs: []
  type: TYPE_IMG
- en: Removing the most important element and replacing it with the rightmost leaf
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/44a77c117b3dd893e1e4a95f20ffbe7b.png)'
  prefs: []
  type: TYPE_IMG
- en: '`Heapify down`: Repeatedly swap with higher priority child until heap property
    is satisfied'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3ad748f1aa20b333d5a85d01408c185f.png)'
  prefs: []
  type: TYPE_IMG
- en: '`Heapify down`: Repeatedly swap with higher priority child until heap property
    is satisfied'
  prefs: []
  type: TYPE_NORMAL
- en: To remove the highest priority element, we simply remove the root and move the
    rightmost leaf in its place. Until this former leaf node has higher priority than
    both its children, we repeatedly swap this node with the child of higher priority,
    which will then restore the tree’s heap property. This repeated swapping is called
    `heapify down`.
  prefs: []
  type: TYPE_NORMAL
- en: The number of swaps is at most the height of the tree and so removal takes logarithmic
    time.
  prefs: []
  type: TYPE_NORMAL
- en: Implementing complete trees with arrays
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '![](../Images/6c11f2a80f0c005d4ea7987c09c1ac81.png)'
  prefs: []
  type: TYPE_IMG
- en: Representing a complete tree with a 1-indexed array
  prefs: []
  type: TYPE_NORMAL
- en: A complete tree can be implemented with an 1-indexed array where the `[a = 2`^(`i`)`+j,
    j < 2`^(`i`)`]`‘th index of the array, represents the `j`‘th node of the `i`‘th
    level of the tree.
  prefs: []
  type: TYPE_NORMAL
- en: The parent is at the `⌊a/2⌋`‘th index.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The left and right child are at the `2a`‘th index and `2a+1`‘th index respectively.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Since heaps are complete trees, you can implement them with arrays as well.
  prefs: []
  type: TYPE_NORMAL
- en: You can also model complete trees with a 0-indexed array, but it's arguably
    not as elegant
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Turning an unordered complete tree into a binary heap
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '![](../Images/0dedb9da3131e9e15e55e5b225eb1247.png)'
  prefs: []
  type: TYPE_IMG
- en: Turning an unordered complete tree into a heap
  prefs: []
  type: TYPE_NORMAL
- en: The most efficient way of turning an unordered complete tree into a binary heap
    is to `heapify down` all the nodes, starting with the lowest level of the tree
    and working your way up.
  prefs: []
  type: TYPE_NORMAL
- en: This takes *linear* time
  prefs: []
  type: TYPE_NORMAL
- en: Applications
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Priorty Queues
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Heaps can be used to implement priority queues, which are abstract data types
    that always dequeue the element with the highest priority.
  prefs: []
  type: TYPE_NORMAL
- en: Abstract data types are more abstract than data structures in that simply describe
    the behavior of what they do and give no indication of the conceptual model
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Heap Sort
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Heaps can be used to sort elements as well. Simply add all elements to the heap
    and then dequeue them. The result will be the elements coming out in order.
  prefs: []
  type: TYPE_NORMAL
- en: Let `n` be the number of elements. With a binary heap the runtime of each insertion
    is logarithmic and each removal is also logarithmic, so the overall runtime is
    `O(n log(n) + n log(n)) = O(n log(n))`.
  prefs: []
  type: TYPE_NORMAL
