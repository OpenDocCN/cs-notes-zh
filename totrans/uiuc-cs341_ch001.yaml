- en: Introduction
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 简介
- en: At the University of Illinois at Urbana-Champaign, We fundamentally believe
    that we have a right to make the university better for all future students. It
    is a message etched into our Alma Mater and makes up the DNA of our course staff.
    As such, we created the coursebook. The coursebook is a free and open systems
    programming textbook that anyone can read, contribute to, and modify for now and
    forever. We don’t think information should be behind a walled garden, and we truly
    believe that complex concepts can be explained simply and fully, for anyone to
    understand. The goal of this book is to teach you the basics and give you some
    intuition into the complexities of systems programming.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 在伊利诺伊大学厄巴纳-香槟分校，我们坚信我们有权利让大学对所有未来的学生都变得更好。这是刻在我们母校上的信息，构成了我们课程工作人员的DNA。因此，我们创建了课程书。课程书是一本免费和开放的系统编程教科书，任何人都可以阅读、贡献和修改，现在和永远。我们不认为信息应该被隐藏在围墙花园之后，我们真正相信复杂的概念可以被简单而全面地解释，任何人都可以理解。这本书的目标是教你基础知识，并让你对系统编程的复杂性有一些直观的认识。
- en: Like any good book, it isn’t complete. We still have plenty of examples, ideas,
    typos, and chapters to work on. If you find any issues, please file an [issue](https://github.com/illinois-cs241/coursebook/issues)
    or email a list of typos to [CS 341 course staff](http://cs341.cs.illinois.edu/staff),
    and we’ll be happy to work on it. We are constantly trying to make the book better
    for students a year and ten years from now.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 就像任何一本好书一样，它并不完整。我们还有很多例子、想法、错别字和章节需要完善。如果你发现任何问题，请提交一个[问题](https://github.com/illinois-cs241/coursebook/issues)或者将错别字列表发送给[CS
    341课程工作人员](http://cs341.cs.illinois.edu/staff)，我们将很乐意对其进行修改。我们一直在努力使这本书对学生来说一年后和十年后都更好。
- en: This work is based on the original coursebook located at [at this url](https://github.com/angrave/SystemProgramming/wiki).
    All these peoples’ hard work is included in the section below.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这项工作基于位于[这个网址](https://github.com/angrave/SystemProgramming/wiki)的原始课程书。下面所有这些人的辛勤工作都包含在内。
- en: Oh and the duck? Keep reading until synchronization :).
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 哦，还有那只鸭子吗？继续阅读直到同步 :).
- en: Thanks again and happy reading!
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 再次感谢，祝您阅读愉快！
- en: – Bhuvy
  id: totrans-6
  prefs: []
