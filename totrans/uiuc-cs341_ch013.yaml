  zh: 你应该使用 而不是 ，因为它具有更好的语义定义。在不同的操作系统上做不同的事情是 **不好的**。 更具有可移植性，并且对线程来说定义得更好。你可以使用系统调用来设置信号或读取特定信号的当前处理程序和处置。
- en: '[PRE8]'
