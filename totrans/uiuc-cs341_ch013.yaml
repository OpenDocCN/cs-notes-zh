- en: Sigwait
  id: totrans-107
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Sigwait
- en: Sigwait can be used to read one pending signal at a time. is used to synchronously
    wait for signals, rather than handle them in a callback. A typical use of sigwait
    in a multi-threaded program is shown below. Notice that the thread signal mask
    is set first (and will be inherited by new threads). The mask prevents signals
    from being *delivered* so they will remain in a pending state until sigwait is
    called. Also notice the same set variable is used by sigwait - except rather than
    setting the set of blocked signals it is used as the set of signals that sigwait
    can catch and return.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: Sigwait 可以一次读取一个挂起信号。用于同步等待信号，而不是在回调中处理信号。在多线程程序中 sigwait 的典型用法如下。请注意，首先设置了线程信号掩码（并且将被新线程继承）。掩码阻止信号被
    *传递*，因此它们将保持挂起状态，直到 sigwait 被调用。请注意，sigwait 使用相同的集合变量 - 除了而不是设置被阻塞信号的集合外，它用作 sigwait
    可以捕获并返回的信号集合。
- en: One advantage of writing a custom signal handling thread (such as the example
    below) rather than a callback function is that you can now use many more C library
    and system functions safely.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 与回调函数相比，编写自定义信号处理线程（如下面的示例所示）的一个优点是，您现在可以安全地使用更多C库和系统函数。
