  type: TYPE_NORMAL
  zh: 阻塞信号
- en: To block signals use ! With sigprocmask you can set the new mask, add new signals
    to be blocked to the process mask, and unblock currently blocked signals. You
    can also determine the existing mask (and use it for later) by passing in a non-null
    value for oldset.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 要阻塞信号，请使用 ! 使用 sigprocmask，您可以设置新的掩码，将新的被阻塞信号添加到进程掩码中，并取消当前被阻塞的信号。您还可以通过传递非空值给
    oldset 来确定现有的掩码（并用于以后）。
