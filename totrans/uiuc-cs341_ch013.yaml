- en: Signals
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Signals are a convenient way to deliver low-priority information and for users
    to interact with their programs when other ways don’t work (for example standard
    input being frozen). They allow a program to clean up or perform an action in
    the case of an event. Sometimes, a program can choose to ignore events which is
    supported. Crafting a program that uses signals well is tricky due to how signals
    are handled. As such, signals are usually for termination and clean up. Rarely
    are they supposed to be used in programming logic.
  prefs: []
  type: TYPE_NORMAL
- en: For those of you with an architecture background, the interrupts used here aren’t
    the interrupts generated by the hardware. Those interrupts are almost always handled
    by the kernel because they require higher levels of privileges. Instead, we are
    talking about software interrupts that are generated by the kernel – though they
    can be in response to a hardware event like SIGSEGV.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter will go over how to read information from a process that has either
    exited or been signaled. Then, it will deep dive into what are signals, how does
    the kernel deal with a signal, and the various ways processes can handle signals
    both with and without threads.
  prefs: []
  type: TYPE_NORMAL
- en: The Deep Dive of Signals
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A signal allows one process to asynchronously send an event or message to another
    process. If that process wants to accept the signal, it can, and then, for most
    signals, decide what to do with that signal.
  prefs: []
  type: TYPE_NORMAL
- en: First, a bit of terminology. A signal disposition is a per-process attribute
    that determines how a signal is handled after it is **delivered**. Think of it
    as a table of signal-action pairs. The full discussion is in the [Man Page](http://man7.org/linux/man-pages/man7/signal.7.html).
    The actions are
  prefs: []
  type: TYPE_NORMAL
- en: ', terminates the process'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: ', ignore'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: ', generate a core dump'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: ', stops a process'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: ', continues a process'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Execute a custom function.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: A signal mask determines whether a particular signal is delivered or not. The
    overall process for how a kernel sends a signal are below.
  prefs: []
  type: TYPE_NORMAL
- en: If no signals have arrived, the process can install its own signal handlers.
    This tells the kernel that when the process gets signal X that it should jump
    to function Y.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: A signal that is created is in a "generated" state.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The time between when a signal is generated and the kernel can apply the mask
    rules is called the pending state.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Then the kernel then checks the process’ signal mask. If the mask says all the
    threads in a process are blocking the signal, then the signal is currently blocked
    and nothing happens until a thread unblocks it.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If a single thread can accept the signal, then the kernel executes the action
    in the disposition table. If the action is a default action, then no threads need
    to be paused.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Otherwise, the kernel delivers the signal by stopping *whatever* a particular
    thread is doing currently, and jumps that thread to the signal handler. The signal
    is now in the delivered phase. More signals can be generated now, but they can’t
    be delivered until the signal handler is complete which is when the delivered
    phase is over.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Finally, we consider a signal caught if the process remains intact after the
    signal was delivered.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: As a flowchart
  prefs: []
  type: TYPE_NORMAL
- en: '![Signal lifecycle diagram](../media/file44.png)'
  prefs: []
  type: TYPE_IMG
- en: Signal lifecycle diagram
  prefs: []
  type: TYPE_NORMAL
- en: Here are some common signals that you will see thrown around.
  prefs: []
  type: TYPE_NORMAL
- en: '|c|c|c| Name & Portable Number & Default Action & Usual Use'
  prefs: []
  type: TYPE_NORMAL
- en: SIGINT & 2 & Terminate (Can be caught) & Stop a process nicely
  prefs: []
  type: TYPE_NORMAL
- en: SIGQUIT & 3 & Terminate (Can be caught) & Stop a process harshly
  prefs: []
  type: TYPE_NORMAL
- en: SIGTERM & 15 & Terminate Process & Stop a process even more harshly
  prefs: []
  type: TYPE_NORMAL
- en: SIGSTOP & N/A & Stop Process (Cannot be caught) & Suspends a process
  prefs: []
  type: TYPE_NORMAL
- en: SIGCONT & N/A & Continues a process & Starts after a stop
  prefs: []
  type: TYPE_NORMAL
- en: SIGKILL & 9 & Terminate Process (Cannot be caught) & You want the process gone
  prefs: []
  type: TYPE_NORMAL
- en: One of our favorite anecdotes is to never use for a host of reasons. The following
    is an excerpt from [Link to archive](http://porkmail.org/era/unix/award.html)
  prefs: []
  type: TYPE_NORMAL
- en: No no no. Don’t use kill -9.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'It doesn’t give the process a chance to cleanly:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 1) shut down socket connections
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 2) clean up temp files
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3) inform its children that it is going away
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 4) reset its terminal characteristics
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: and so on and so on and so on.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Generally, send 15, and wait a second or two, and if that doesn’t work, send
    2, and if that doesn’t work, send 1\. If that doesn’t, REMOVE THE BINARY because
    the program is badly behaved!
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Don’t use kill -9\. Don’t bring out the combine harvester just to tidy up the
    flower pot.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: We still keep in there for extreme scenarios where the process needs to be gone.
  prefs: []
  type: TYPE_NORMAL
- en: Sending Signals
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Signals can be generated in multiple ways.
  prefs: []
  type: TYPE_NORMAL
- en: The user can send a signal. For example, you are at the terminal, and you press
    . One can also use the built-in to send any signal.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The system can send an event. For example, if a process accesses a page that
    it isn’t supposed to, the hardware generates an interrupt which gets intercepted
    by the kernel. The kernel finds the process that caused this and sends a software
    interrupt signal . There are other kernel events like a child being created or
    a process needs to be resumed.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Finally, another process can send a message. This could be used in low-stakes
    communication of events between processes. If you are relying on signals to be
    the driver in your program, you should rethink your application design. There
    are many drawbacks to using POSIX/Real-Time signals for asynchronous communication.
    The best way to handle interprocess communication is to use, well, interprocess
    communication methods specifically designed for your task at hand.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You or another process can temporarily pause a running process by sending it
    a signal. If it succeeds, it will freeze a process. The process will not be allocated
    any more CPU time. To allow a process to resume execution, send it the SIGCONT
    signal. For example, the following is a program that slowly prints a dot every
    second, up to 59 dots.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: We will first start the process in the background (notice the & at the end).
    Then, send it a signal from the shell process by using the kill command.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: In C, a program can send a signal to the child using POSIX call,
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: As we saw above there is also a command available in the shell. Another command
    works the exact same way but instead of looking up by PID, it tries to match the
    name of the process. is an important utility that can help you find the pid of
    a process.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: To send a signal to the running process, use or with .
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: For non-root processes, signals can only be sent to processes of the same user.
    You can’t SIGKILL any process! for more details.
  prefs: []
  type: TYPE_NORMAL
- en: Handling Signals
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There are strict limitations on the executable code inside a signal handler.
    Most library and system calls are , meaning they may not be used inside a signal
    handler because they are not re-entrant. Re-entrant safety means that your function
    can be frozen at any point and executed again, can you guarantee that your function
    wouldn’t fail? Let’s take the following
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: We execute func("Hello"))
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The string gets copied over to the buffer completely (strcmp(buffer, "Hello")
    == 0)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: A signal is delivered and the function state freezes, we also stop accepting
    any new signals until after the handler (we do this for convenience)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We execute
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Now (strcmp(buffer, "World") == 0) and the buffer is printed out "World".
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We resume the interrupted function and now print out the buffer once again "World"
    instead of what the function call originally intended "Hello"
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Guaranteeing that your functions are signal handler safe can’t be solved by
    removing shared buffers. You must also think about multithreading and synchronization
    – what happens when I double lock a mutex? You also have to make sure that each
    function call is reentrant safe. Suppose your original program was interrupted
    while executing the library code of . The memory structures used by malloc will
    be inconsistent. Calling , which uses as part of the signal handler, is unsafe
    and will result in **undefined behavior**. A safe way to avoid this behavior is
    to set a variable and let the program resume operating. The design pattern also
    helps us in designing programs that can receive signals twice and operate correctly.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: 'The above code might appear to be correct on paper. However, we need to provide
    a hint to the compiler and the CPU core that will execute the loop. We need to
    prevent compiler optimization. The expression doesn’t get changed in the body
    of the loop, so some compilers will optimize it to TODO: citation needed. Secondly,
    we need to ensure that the value of is uncached using a CPU register and instead
    always read from and written to main memory. The type implies that all the bits
    of the variable can be read or modified as an - a single uninterruptible operation.
    It is impossible to read a value that is composed of some new bit values and old
    bit values.'
  prefs: []
  type: TYPE_NORMAL
- en: By specifying with the correct type , we can write portable code where the main
    loop will be exited after the signal handler returns. The type can be as large
    as an on most modern platforms but on embedded systems can be as small as a and
    only able to represent (-127 to 127) values.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: Two examples of this pattern can be found in a terminal based 1Hz 4bit computer
    (Šorn [2015](ch018.xhtml#ref-Sorn_2015)). Two boolean flags are used. One to mark
    the delivery of (CTRL-C), and gracefully shutdown the program, and the other to
    mark signal to detect terminal resize and redraw the entire display.
  prefs: []
  type: TYPE_NORMAL
- en: You can also choose a handle pending signals asynchronously or synchronously.
    To install a signal handler to asynchronously handle signals, use . To synchronously
    catch a pending signal use which blocks until a signal is delivered or which also
    blocks and provides a file descriptor that can be to retrieve pending signals.
  prefs: []
  type: TYPE_NORMAL
- en: Sigaction
