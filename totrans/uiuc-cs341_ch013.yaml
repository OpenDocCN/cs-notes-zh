  prefs: []
  type: TYPE_NORMAL
  zh: 然后，可以将信号传递给任何愿意接受该信号的信号线程。如果有两个或更多线程可以接收该信号，那么哪个线程将被中断是任意的！常见的做法是有一个可以接收所有信号的线程，或者如果有特定的信号需要特殊逻辑，为多个信号拥有多个线程。即使外部程序不能向特定线程发送信号，你仍然可以使用
    . 在下面的示例中，新创建的执行线程将被
- en: '[PRE20]'
  id: totrans-124
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: As a word of warning will kill the entire process. Though individual threads
    can set a signal mask, the signal disposition is *per-proces*s not *per-thread*.
    This means can be called from any thread because you will be setting a signal
    handler for all threads in the process.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 作为警告，将杀死整个进程。尽管个别线程可以设置信号掩码，但信号处理是*按进程*而不是*按线程*的。这意味着可以从任何线程调用，因为你会为进程中的所有线程设置信号处理程序。
