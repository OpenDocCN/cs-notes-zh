- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: However, we typically may also set the mask and the flags field. The mask is
    a temporary signal mask used during the signal handler execution. If the thread
    serving the signal is interrupted in the middle of a system call, the flag will
    automatically restart some system calls that otherwise would have returned early
    with EINTR error. The latter means we can simplify the rest of code somewhat because
    a restart loop may no longer be required.
  prefs: []
