- en: Sigwait
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Sigwait can be used to read one pending signal at a time. is used to synchronously
    wait for signals, rather than handle them in a callback. A typical use of sigwait
    in a multi-threaded program is shown below. Notice that the thread signal mask
    is set first (and will be inherited by new threads). The mask prevents signals
    from being *delivered* so they will remain in a pending state until sigwait is
    called. Also notice the same set variable is used by sigwait - except rather than
    setting the set of blocked signals it is used as the set of signals that sigwait
    can catch and return.
  prefs: []
  type: TYPE_NORMAL
- en: One advantage of writing a custom signal handling thread (such as the example
    below) rather than a callback function is that you can now use many more C library
    and system functions safely.
  prefs: []
  type: TYPE_NORMAL
- en: Based on sigmask code ([n.d.](ch018.xhtml#ref-pthread_sigmask))
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: Signals in Child Processes and Threads
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This is a recap of the processes chapter. After forking, the child process inherits
    a copy of the parent’s signal dispositions and a copy of the parent’s signal mask.
    If you have installed a SIGINT handler before forking, then the child process
    will also call the handler if a SIGINT is delivered to the child. If is blocked
    in the parent, it will be blocked in the child as well. Note that pending signals
    for the child are *not* inherited during forking. After though, only the signal
    mask and pending signals are carried over (“Executing a File,” [n.d.](ch018.xhtml#ref-execute)).
    Signal handlers are reset to their original action, because the original handler
    code may have disappeared along with the old process.
  prefs: []
  type: TYPE_NORMAL
- en: Each thread has its own mask. A new thread inherits a copy of the calling thread’s
    mask. On initialization, the calling thread’s mask is the exact same as the processes
    mask. After a new thread is created though, the processes signal mask turns into
    a gray area. Instead, the kernel likes to treat the process as a collection of
    threads, each of which can institute a signal mask and receive signals. To start
    setting your mask, you can use,
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: Blocking signals is similar in multi-threaded programs to single-threaded programs
    with the following translation.
  prefs: []
  type: TYPE_NORMAL
- en: Use instead of
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Block a signal in all threads to prevent its asynchronous delivery
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The easiest method to ensure a signal is blocked in all threads is to set the
    signal mask in the main thread before new threads are created.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: 'Just as we saw with , includes a ‘how’ parameter that defines how the signal
    set is to be used:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: A signal then can be delivered to any signal thread that is willing to accept
    that signal. If the two or more threads can receive the signal then which thread
    will be interrupted is arbitrary! A common practice is to have one thread that
    can receive all signals or if there is a certain signal that requires special
    logic, have multiple threads for multiple signals. Even though programs from the
    outside can’t send signals to specific threads, you can do that internally with
    . In the example below, the newly created thread executing will be interrupted
    by
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: As a word of warning will kill the entire process. Though individual threads
    can set a signal mask, the signal disposition is *per-proces*s not *per-thread*.
    This means can be called from any thread because you will be setting a signal
    handler for all threads in the process.
  prefs: []
  type: TYPE_NORMAL
