- en: Dijkstra's Algorithm
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Dijkstra算法
- en: 原文：[https://courses.physics.illinois.edu/cs225/sp2019/notes/dijkstra/](https://courses.physics.illinois.edu/cs225/sp2019/notes/dijkstra/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://courses.physics.illinois.edu/cs225/sp2019/notes/dijkstra/](https://courses.physics.illinois.edu/cs225/sp2019/notes/dijkstra/)
- en: '[Back to Notes](/cs225/sp2019/notes/)by Siping Meng'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '[返回笔记](/cs225/sp2019/notes/) by Siping Meng'
- en: Overview
  id: totrans-3
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 概述
- en: We know from mp_traversals that BFS can be used to find the shortest path between
    two points. So why [Dijkstra’s algorithm](https://en.wikipedia.org/wiki/Dijkstra%27s_algorithm)?
    Besides their different time and space complexities, BFS can only be used on an
    undirected graph, such as a maze. However, Dijkstra’s algorithm can be used on
    weighted edges. For example, if you want to find the shortest driving path from
    Siebel Center to the Cloud Gate located in downtown Chicago, you have to think
    about how long you need to drive for each road. The edge weights are the time
    you need to spend on the roads (under the speed limit). In this note, we will
    assume all the roads between Siebel and the Cloud Gate are the same, and there
    are no traffic jams.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我们知道从mp_traversals中，BFS可以用来找到两点之间的最短路径。那么为什么是[Dijkstra算法](https://en.wikipedia.org/wiki/Dijkstra%27s_algorithm)呢？除了它们不同的时间和空间复杂度之外，BFS只能用于无向图，例如迷宫。然而，Dijkstra算法可以用于带权重的边。例如，如果你想找到从Siebel中心到位于芝加哥市中心的Cloud
    Gate的最短驾驶路径，你必须考虑每条道路需要驾驶多长时间。边权重是你需要在道路上花费的时间（在限速下）。在本笔记中，我们将假设Siebel和Cloud Gate之间的所有道路都是相同的，并且没有交通堵塞。
- en: In this problem, each node represents the city we may travel to, and each edge
    represents the time(in minutes) traveling between two cities. The starting node
    is “Siebel,” the destination node is “Cloud Gate.”
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个问题中，每个节点代表我们可能旅行的城市，每条边代表两个城市之间旅行的时间（分钟）。起始节点是“Siebel”，目标节点是“Cloud Gate”。
- en: '![](../Images/200eb8ffaea1017f1e135cce6d60808d.png)'
  id: totrans-6
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/200eb8ffaea1017f1e135cce6d60808d.png)'
- en: Algorithm
  id: totrans-7
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 算法
- en: What we need?
  id: totrans-8
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 我们需要什么？
- en: Before running the Dijkstra’s algorithm, we need to set up an visited set and
    a tentative distance value for each node.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在运行Dijkstra算法之前，我们需要为每个节点设置一个已访问集合和一个试探距离值。
- en: Firstly, we set the **tentative distance value** for starting node(Siebel) to
    0 and all other nodes to infinity. The tentative distance means the up-to-date
    distance between this node to the starting node. Since we are not exploring yet,
    everything other than the starting node is set to infinity.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们将起始节点(Siebel)的**试探距离值**设为0，而所有其他节点设为无穷大。试探距离表示该节点与起始节点之间的最新距离。由于我们尚未开始探索，除了起始节点之外的所有节点都被设置为无穷大。
- en: Secondly, we have an empty **visited** set now because we have not yet visited
    any node. To visualize this set on the graph, we will use the red color.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 其次，我们现在有一个空的**已访问**集合，因为我们尚未访问任何节点。为了在图上可视化这个集合，我们将使用红色。
- en: 'Thirdly, we need a **priority queue** to find the next closest unvisited node.
    Each item inside the queue contains two elements: the node and its tentative distance
    value. If we pop everything from the priority queue now, we will get:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 第三，我们需要一个**优先队列**来找到下一个最近的未访问节点。队列中的每个项目包含两个元素：节点和它的试探距离值。如果我们现在从优先队列中弹出所有内容，我们将得到：
- en: '**[(“Siebel”, 0)]**'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '**[(“Siebel”, 0)]**'
- en: '![](../Images/d10aa6431d7578a8dce44396074015b6.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d10aa6431d7578a8dce44396074015b6.png)'
- en: Run Dijkstra’s algorithm
  id: totrans-15
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 运行Dijkstra算法
- en: 'We will keep traversing the neighbors of the nodes that are at the top of the
    priority queue. For each neighbor, we will:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将保持遍历优先队列顶部的节点的邻居。对于每个邻居，我们将：
- en: Update the neighbor’s tentative distance value if we found a closer path.
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果我们发现了一条更近的路径，则更新邻居的试探距离值。
- en: Put the neighbor into the priority queue.
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将邻居放入优先队列。
- en: Put the current node into the visited set.
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将当前节点放入已访问集合。
- en: This is the legend for how we are going to traverse this graph.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们将如何遍历此图的图例。
- en: '![](../Images/e4d06d74c1a4a7df2770a905d0bd45e1.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e4d06d74c1a4a7df2770a905d0bd45e1.png)'
- en: Siebel
  id: totrans-22
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: Siebel
- en: 'The first stop is Siebel, which has two neighbors, Rantoul and Bloomington.
    We will update their tentative distance values respectively and push the results
    into the priority queue. If we pop everything from the priority queue now, we
    will get:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 第一站是Siebel，它有两个邻居，Rantoul和Bloomington。我们将分别更新它们的试探距离值并将结果推入优先队列。如果我们现在从优先队列中弹出所有内容，我们将得到：
- en: '**[(“Rantoul”, 21), (“Bloomington”, 50)]**'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '**[(“Rantoul”, 21), (“Bloomington”, 50)]**'
- en: Finally, we mark Siebel as visited.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们将标记Siebel为已访问。
- en: '![](../Images/72b28f568aa9c8baf5c44a84fc4ca3f9.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/72b28f568aa9c8baf5c44a84fc4ca3f9.png)'
- en: Rantoul
  id: totrans-27
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: Rantoul
- en: 'Since Rantoul is at the top of the priority queue, the current node will become
    Rantoul. We will update the tentative distance value for Rantoul’s neighbors,
    and if we pop everything from the priority queue now, we will get:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 由于Rantoul位于优先队列的顶部，当前节点将变为Rantoul。我们将更新Rantoul邻居的试探距离值，如果我们现在从优先队列中弹出所有内容，我们将得到：
- en: '**[(“Bloomington”, 50), (“Kankakee”, 78)]**'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '**[（“Bloomington”，50），（“Kankakee”，78）]**'
- en: Finally, we mark Rantoul as visited.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们将Rantoul标记为已访问。
- en: '![](../Images/71530b60a8a98729ef35b9b711f1df7c.png)![](../Images/8c2e24a83fe01cd98a45ff4f8c0381a9.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/71530b60a8a98729ef35b9b711f1df7c.png)![](../Images/8c2e24a83fe01cd98a45ff4f8c0381a9.png)'
- en: Bloomington
  id: totrans-32
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: Bloomington
- en: 'Now Bloomington is at the top of the priority queue, and the current node will
    become Bloomington. We will update the tentative distance value for Bloomington’s
    neighbors, and if we pop everything from the priority queue now, we will get:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，Bloomington位于优先队列的顶部，当前节点将变为Bloomington。我们将更新Bloomington邻居的试探距离值，如果我们现在从优先队列中弹出所有内容，我们将得到：
- en: '**[(“Kankakee”, 78), (“Pontiac”, 90)]**'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '**[（“Kankakee”，78），（“Pontiac”，90）]**'
- en: Finally, we mark Bloomington as visited.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们将Bloomington标记为已访问。
- en: '![](../Images/abbe1ff537ddb98b16b983327f844895.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/abbe1ff537ddb98b16b983327f844895.png)'
- en: Kankakee
  id: totrans-37
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: Kankakee
- en: 'Now Kankakee is at the top of the priority queue, and the current node will
    become Kankakee. We will update the tentative distance value for Kankakee’s neighbors,
    and if we pop everything from the priority queue now, we will get:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，Kankakee位于优先队列的顶部，当前节点将变为Kankakee。我们将更新Kankakee邻居的试探距离值，如果我们现在从优先队列中弹出所有内容，我们将得到：
- en: '**[(“Pontiac”, 90), (“Chicago”, 141)]**'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '**[（“Pontiac”，90），（“Chicago”，141）]**'
- en: Finally, we mark Kankakee as visited.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们将Kankakee标记为已访问。
- en: '![](../Images/ee4f1c2923e2d33bc6c274a11251d5a9.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ee4f1c2923e2d33bc6c274a11251d5a9.png)'
- en: Pontiac
  id: totrans-42
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: Pontiac
- en: 'Now Pontiac is at the top of the priority queue, and the current node will
    become Pontiac. We will update the tentative distance value for Pontiac’s neighbors.
    **In this step, notice that we have overwritten Chicago’s tentative distance value
    because we find a shorter path.** If we pop everything from the priority queue
    now, we will get:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，Pontiac位于优先队列的顶部，当前节点将变为Pontiac。我们将更新Pontiac邻居的试探距离值。**在这个步骤中，请注意，我们覆盖了Chicago的试探距离值，因为我们找到了更短的路径。**如果我们现在从优先队列中弹出所有内容，我们将得到：
- en: '**[(“Chicago”, 135), (“Joliet”, 152)]**'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '**[（“Chicago”，135），（“Joliet”，152）]**'
- en: Finally, we mark Pontiac as visited.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们将Pontiac标记为已访问。
- en: '![](../Images/0a50684bb05e11c569bc36d3171ca1e0.png)![](../Images/2a263ba379835d8f7695a2a7ea6d72fe.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0a50684bb05e11c569bc36d3171ca1e0.png)![](../Images/2a263ba379835d8f7695a2a7ea6d72fe.png)'
- en: Chicago
  id: totrans-47
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: Chicago
- en: 'Now Chicago is at the top of priority queue, the current node will become Chicago.
    We will update the tentative distance value for Chicago’s neighbors and if we
    pop everything from the priority queue now, we will get:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，Chicago位于优先队列的顶部，当前节点将变为Chicago。我们将更新Chicago邻居的试探距离值，如果我们现在从优先队列中弹出所有内容，我们将得到：
- en: '**[(“Cloud Gate”, 136), (“Joliet”, 152)]**'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '**[（“Cloud Gate”，136），（“Joliet”，152）]**'
- en: '![](../Images/9009e770a3f5dae14265076948358782.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9009e770a3f5dae14265076948358782.png)'
- en: Cloud Gate
  id: totrans-51
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: Cloud Gate
- en: The algorithm finishes because this is the destination.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 算法完成，因为这是目的地。
- en: Psedocode
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Psedocode
- en: '[PRE0]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Complexity
  id: totrans-55
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 复杂度
- en: Each edge is viewed at most 2 times
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每条边最多被查看两次
- en: 'Each node is viewed at most twice: once for adding it to the queue, and a second
    for querying. If we use a heap for the priority queue (e.g. binary heap), it takes
    constant time to queue the node and logarithmic time to query the node'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个节点最多被查看两次：一次是将其添加到队列中，另一次是查询。如果我们使用堆作为优先队列（例如二叉堆），则将节点入队需要常数时间，查询节点需要对数时间
- en: 'Total runtime:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 总运行时间：
