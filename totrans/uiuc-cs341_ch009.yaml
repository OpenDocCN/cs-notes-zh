- en: Files
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: On Linux, there are two abstractions with files. The first is the Linux level
    abstraction.
  prefs: []
  type: TYPE_NORMAL
- en: takes a path to a file and creates a file descriptor entry in the process table.
    If the file is inaccessible, it errors out.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: takes a certain number of bytes that the kernel has received and reads them
    into a user-space buffer. If the file is not open in read mode, this will break.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: outputs a certain number of bytes to a file descriptor. If the file is not open
    in write mode, this will break. This may be buffered internally.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: removes a file descriptor from a process’ file descriptors. This always succeeds
    for a valid file descriptor.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: takes a file descriptor and moves it to a certain position. It can fail if the
    seek is out of bounds.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: is the catch-all function for file descriptors. Set file locks, read, write,
    edit permissions, etc.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Linux interface is powerful and expressive, but sometimes we need portability
    for example if we are writing for a Macintosh or windows. This is where C’s abstraction
    comes into play. On different operating systems, C uses the low-level functions
    to create a wrapper around files used everywhere, meaning that C on Linux uses
    the above calls.
  prefs: []
  type: TYPE_NORMAL
- en: opens a file and returns an object. is returned if the program doesn’t have
    permission for the file.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: reads a certain number of bytes from a file. An error is returned if already
    at the end of the file when which the program must call to check if the program
    attempted to read *past* the end of the file.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Get a char or a string from a file
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Read a format string from the file
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Write some objects to a file
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Write a formatted string to a file
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Close a file handle
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Take any buffered changes and flush them to a file
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Returns true if you are at the end of a file
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Returns true if an error occured reading, writing or seeking.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sets the buffering (None,Line or Full) and the memory used for buffering
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: But programs don’t get the expressiveness that Linux gives with system calls.
    A program can convert back and forth between them with and . Also, C files are
    **buffered** meaning that their contents may be written to the backing after the
    call returns. You can change that with C options.
  prefs: []
  type: TYPE_NORMAL
- en: Determining File Length
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For files less than the size of a long, using fseek and ftell is a simple way
    to accomplish this. Move to the end of the file and find out the current position.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE25]'
  prefs: []
  type: TYPE_PRE
- en: This tells us the current position in the file in bytes - i.e. the length of
    the file!
  prefs: []
  type: TYPE_NORMAL
- en: can also be used to set the absolute position.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE26]'
  prefs: []
  type: TYPE_PRE
- en: All future reads and writes in the parent or child processes will honor this
    position. Note writing or reading from the file will change the current position.
    See the man pages for fseek and ftell for more information.
  prefs: []
  type: TYPE_NORMAL
- en: Use stat instead
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This only works on some architectures and compilers That quirk is that longs
    only need to be **4 Bytes big** meaning that the maximum size that can return
    is a little under 2 Gibibytes. Nowadays, our files could be hundreds of gibibytes
    or even terabytes on a distributed file system. What should we do instead? Use
    ! We will cover stat in a later part but here is some code that will tell a program
    the size of the file
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE27]'
  prefs: []
  type: TYPE_PRE
- en: is of type which is big enough for large files.
  prefs: []
  type: TYPE_NORMAL
- en: Gotchas with files
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: What happens when file streams are closed by two different processes? Closing
    a file stream is unique to each process. Other processes can continue to use their
    file handles. Remember, everything is copied over when a child is created, even
    the relative positions of the files. As you might have observed with using , there
    is a quirk of the implementation of files and their caches on Ubuntu that will
    rewind a file descriptor once a file has been closed. As such, make sure to close
    before forking or at least don’t trigger a cache inconsistency which is much harder.
  prefs: []
  type: TYPE_NORMAL
- en: IPC Alternatives
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Okay so now you have a list of tools in your toolbox to tackle communicating
    between processes, so what should you use?
  prefs: []
  type: TYPE_NORMAL
- en: There is no hard answer, though this is the most interesting question. Generally,
    we have retained pipes for legacy reasons. This means that we only use them to
    redirect stdin, stdout, and stderr for the collection of logs and similar programs.
    You may find processes trying to communicate with unnamed or named pipes as well.
    Most of the time you won’t be dealing with this interaction directly though.
  prefs: []
  type: TYPE_NORMAL
- en: Files are used almost all the time as a form of IPC. Hadoop is a great example
    where processes will write to append-only tables and then other processes will
    read from those tables. We generally use files under a few cases. One case is
    if we want to save the intermediate results of an operation to a file for future
    use. Another case is if putting it in memory would cause an out of memory error.
    On Linux, file operations are generally pretty cheap, so most programmers use
    it for larger intermediate storage.
  prefs: []
  type: TYPE_NORMAL
- en: mmap is used for two scenarios. One is a or read through of the file. Meaning,
    a program reads the file front to back or back to front. The key is that the program
    doesn’t jump around too much. Jumping around too much causes thrashing and loses
    all the benefits of using mmap. The other usage of mmap is for direct memory inter-process
    communication. This means that a program can store structures in a piece of mmap’ed
    memory and share them between two processes. Python and Ruby use this mapping
    all the time to utilize copy on write semantics.
  prefs: []
  type: TYPE_NORMAL
