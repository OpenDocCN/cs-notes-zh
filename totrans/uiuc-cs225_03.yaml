- en: Disjoint Sets
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://courses.physics.illinois.edu/cs225/sp2019/notes/disjoint-sets/](https://courses.physics.illinois.edu/cs225/sp2019/notes/disjoint-sets/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Back to Notes](/cs225/sp2019/notes/)by Eddie Huang'
  prefs: []
  type: TYPE_NORMAL
- en: Overview
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Disjoint sets allows you to organize elements in sets and be able to query which
    set an element belongs to in essentially constant time. The data structure to
    represent disjoint sets is a forest of trees, where each set is represented by
    a tree and each tree is identified by its root node. Therefore, we call the root
    node of a tree, the `representative` of its set.
  prefs: []
  type: TYPE_NORMAL
- en: Unionize Sets
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There are two types of unions
  prefs: []
  type: TYPE_NORMAL
- en: '`union by rank (height)`: minimizes the rank (height) of the disjoint sets
    by appending the tree of smaller rank to the root of the other'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`union by size`: appends the tree of smaller size to the root of the other'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
