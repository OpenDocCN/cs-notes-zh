  type: TYPE_TB
  zh: '| ... | 存储（全局i=2） |'
- en: Partial Overlap
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 部分重叠
- en: Bad Thread Access Pattern
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 恶劣的线程访问模式
- en: '| Thread 1 | Thread 2 |'
  id: totrans-15
  prefs: []
  type: TYPE_TB
  zh: '| 线程1 | 线程2 |'
- en: '| --- | --- |'
  id: totrans-16
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Load Addr, Add 1 (i=1 locally) | ... |'
  id: totrans-17
  prefs: []
  type: TYPE_TB
  zh: '| 加载地址，加1（局部i=1） | ... |'
- en: '| Store (i=1 globally) | Load Addr, Add 1 (i=1 locally) |'
  id: totrans-18
  prefs: []
  type: TYPE_TB
  zh: '| 存储（全局i=1） | 加载地址，加1（局部i=1） |'
