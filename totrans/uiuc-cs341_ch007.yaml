- en: 'Extra: Process Synchronization'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You thought that you were using different processes, so you don’t have to synchronize?
    Think again! You may not have race conditions within a process but what if your
    process needs to interact with the system around it? Let’s consider a motivating
    example
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE67]'
  prefs: []
  type: TYPE_PRE
- en: If none of the system calls fail then we should get something that looks like
    this given the file was empty to begin with.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE68]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE69]'
  prefs: []
  type: TYPE_PRE
- en: Interruption
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: But, there is a hidden nuance. Most system calls can be meaning that the operating
    system can stop an ongoing system call because it needs to stop the process. So
    barring and from failing – they typically go to completion – what happens if fails?
    If write fails and no bytes are written, we can get something like or . This is
    data loss which is incorrect but won’t corrupt the file. What happens if write
    gets interrupted after a partial write? We get all sorts of madness. For example,
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE70]'
  prefs: []
  type: TYPE_PRE
- en: Solution
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'A program can create a mutex before fork-ing - however the child and parent
    process will not share virtual memory and each one will have a mutex independent
    of the other. Advanced note: There are advanced options using shared memory that
    allow a child and parent to share a mutex if it’s created with the correct options
    and uses a shared memory segment. See [stackoverflow example](http://stackoverflow.com/questions/19172541/procs-fork-and-mutexes)'
  prefs: []
  type: TYPE_NORMAL
- en: So what should we do? We should use a shared mutex! Consider the following code.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE71]'
  prefs: []
  type: TYPE_PRE
- en: What the code does in main is initialize a process shared mutex using a piece
    of memory. You will find out what this call to does later – assume for the time
    being that it creates memory that is shared between processes. We can initialize
    a in that special piece of memory and use it as normal. To counter failing, we
    have put the call inside a while loop that keeps writing so long as there are
    bytes left to write. Now if all the other system calls function, there should
    be more race conditions.
  prefs: []
  type: TYPE_NORMAL
- en: Most programs try to avoid this problem entirely by writing to separate files,
    but it is good to know that there are mutexes across processes, and they are useful.
    A program can use all of the primitives that were mentioned previouslty! Barriers,
    semaphores, and condition variables can all be initialized on a shared piece of
    memory and used in similar ways to their multithreading counterparts.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t have to worry about arbitrary memory addresses becoming race condition
    candidates. Only areas that specifically mapped are in danger.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You get the nice isolation of processes so if one process fails the system can
    maintain intact.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When you have a lot of threads, creating a process might ease the system load
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There are other ways to synchronize as well, check out goroutines or higher
    orders of synchronization in the appendix.
  prefs: []
  type: TYPE_NORMAL
