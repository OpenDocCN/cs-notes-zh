  type: TYPE_NORMAL
  zh: 紧凑形式是正确的，如果N是2的幂，则使用位掩码。（16,32,64，…）
- en: '[PRE61]'
  id: totrans-300
  prefs: []
  type: TYPE_PRE
  zh: '[PRE61]'
- en: This buffer does not yet prevent overwrites. For that, we’ll turn to our multi-threaded
    attempt that will block a thread until there is space or there is at least one
    item to remove.
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 此缓冲区尚未防止覆盖。为此，我们将转向我们的多线程尝试，这将阻塞线程，直到有空间或至少有一个项目要删除。
- en: Multithreaded Correctness
  id: totrans-302
  prefs:
  - PREF_H3
