- en: Write up a Producer/Consumer queue, How about a producer consumer stack?
  id: totrans-393
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 编写一个生产者/消费者队列，生产者消费者栈如何？
- en: Give me an implementation of a reader-writer lock with condition variables,
    make a struct with whatever you need, it needs to be able to support the following
    functions
  id: totrans-394
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 请给出一个使用条件变量的读者-写者锁的实现，创建一个包含所需内容的结构体，它需要能够支持以下函数
- en: '[PRE76]'
  id: totrans-395
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE76]'
- en: The only specification is that in between and , no writers can write. In between
    the writer locks, only one writer may be writing at a time.
  id: totrans-396
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 唯一的规范是在两个逗号之间和之间，没有写者可以写入。在写者锁定之间，一次只能有一个写者写入。
- en: Write code to implement a producer consumer using ONLY three counting semaphores.
    Assume there can be more than one thread calling enqueue and dequeue. Determine
    the initial value of each semaphore.
  id: totrans-397
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 编写代码以实现一个仅使用三个计数信号量的生产者消费者模型。假设可能有多个线程调用入队和出队操作。确定每个信号量的初始值。
- en: Write code to implement a producer consumer using condition variables and a
    mutex. Assume there can be more than one thread calling enqueue and dequeue.
  id: totrans-398
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 编写代码以使用条件变量和互斥锁实现生产者消费者模型。假设可能有多个线程调用入队和出队操作。
- en: Use CVs to implement add(unsigned int) and subtract(unsigned int) blocking functions
    that never allow the global value to be greater than 100.
  id: totrans-399
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 CVs 实现添加（unsigned int）和减去（unsigned int）阻塞函数，这些函数永远不会允许全局值大于 100。
- en: Use CVs to implement a barrier for 15 threads.
