- en: Synchronization
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Synchronization coordinates various tasks so that they all finishin the the
    correct state. In C, we have series of mechanisms to control what threads are
    allowed to perform at a given state. Most of the time, the threads can progress
    without having to communicate, but every so often two or more threads may want
    to access a critical section. A critical section is a section of code that can
    only be executed by one thread at a time if the program is to function correctly.
    If two threads (or processes) were to execute code inside the critical section
    at the same time, it is possible that the program may no longer have the correct
    behavior.
  prefs: []
  type: TYPE_NORMAL
- en: As we said in the previous chapter, race conditions happen when an operation
    touches a piece of memory at the same time as another thread. If the memory location
    is only accessible by one thread, for example the automatic variable below, then
    there is no possibility of a race condition and no Critical Section associated
    with . However, the variable is a global variable and accessed by two threads.
    It is possible that two threads may attempt to increment the variable at the same
    time.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: A typical output of the above code is because there is a race condition. The
    code allows two threads to read and write at the same time. For example, both
    threads copy the current value of sum into CPU that runs each thread (let’s pick
    123). Both threads increment one to their own copy. Both threads write back the
    value (124). If the threads had accessed the sum at different times then the count
    would have been 125\. A few of the possible different orderings are below.
  prefs: []
  type: TYPE_NORMAL
