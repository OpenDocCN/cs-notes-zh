- en: '[PRE79]'
  id: totrans-406
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE79]'
- en: How many of the following statements are true?
  id: totrans-407
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以下哪些陈述是正确的？
- en: There can be multiple active readers
  id: totrans-408
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可以有多个活跃的读者
- en: There can be multiple active writers
  id: totrans-409
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可以有多个活跃的作者
- en: When there is an active writer the number of active readers must be zero
  id: totrans-410
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当有活跃的作者时，活跃的读者数量必须为零
- en: If there is an active reader the number of active writers must be zero
  id: totrans-411
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果有活跃的读者，活跃的作者数量必须为零
- en: A writer must wait until the current active readers have finished
  id: totrans-412
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 作者必须等待当前活跃的读者完成
