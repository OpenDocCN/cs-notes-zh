- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'This process runs slower because we lock and unlock the mutex a million times,
    which is expensive - at least compared with incrementing a variable. In this simple
    example, we didn’t need threads - we could have added up twice! A faster multi-thread
    example would be to add one million using an automatic (local) variable and only
    then adding it to a shared total after the calculation loop has finished:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Starting with the gotchas. Firstly, C Mutexes do not lock variables. A mutex
    is a simple data structure. It works with code, not data. If a mutex is locked,
    the other threads will continue. It’s only when a thread attempts to lock a mutex
    that is already locked, will the thread have to wait. As soon as the original
    thread unlocks the mutex, the second (waiting) thread will acquire the lock and
    be able to continue. The following code creates a mutex that does effectively
    nothing.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Here are some other gotchas in no particular order
  prefs: []
  type: TYPE_NORMAL
- en: Don’t cross the streams! If using threads, don’t fork in the middle of your
    program. This means any time after your mutexes have been initialized.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The thread that locks a mutex is the only thread that can unlock it.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Each program can have multiple mutex locks. A thread safe design might include
    a lock with each data structure, one lock per heap, or one lock per set of data
    structures If a program has only one lock, then there may be significant contention
    for the lock. If two threads were updating two different counters, it isn’t necessary
    to use the same lock.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Locks are only tools. They don’t spot critical sections!
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: There will always be a small amount of overhead of calling and . However, this
    is the price to pay for correctly functioning programs!
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Not unlocking a mutex due to an early return during an error condition
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Resource leak (not calling )
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Using an uninitialized mutex or using a mutex that has already been destroyed
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Locking a mutex twice on a thread without unlocking first
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Deadlock
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Mutex Implementation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: So we have this cool data structure. How do we implement it? A naive, incorrect
    implementation is shown below. The function simply unlocks the mutex and returns.
    The lock function first checks to see if the lock is already locked. If it is
    currently locked, it will keep checking again until another thread has unlocked
    the mutex. For the time being, we’ll avoid the condition that other threads are
    able to unlock a lock they don’t own and focus on the mutual exclusion aspect.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: Version 1 uses ‘busy-waiting’ unnecessarily wasting CPU resources. However,
    there is a more serious problem. We have a race-condition! If two threads both
    called concurrently, it is possible that both threads would read as zero. Thus
    both threads would believe they have exclusive access to the lock and both threads
    will continue.
  prefs: []
  type: TYPE_NORMAL
- en: We might attempt to reduce the CPU overhead a little by calling inside the loop
    - pthread_yield suggests to the operating system that the thread does not use
    the CPU for a short while, so the CPU may be assigned to threads that are waiting
    to run. This still leaves the race-condition. We need a better implementation.
    We will talk about this later in the critical section part of this chapter. For
    now, we will talk about semaphores.
  prefs: []
  type: TYPE_NORMAL
- en: 'Advanced: Implementing a Mutex with hardware'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We can use C11 Atomics to do that perfectly! A complete solution is detailed
    here. This is a spinlock mutex, [futex](https://locklessinc.com/articles/mutex_cv_futex/)
    implementations can be found online.
  prefs: []
  type: TYPE_NORMAL
- en: First the data structure and initialization code.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: This is the initialization code, nothing fancy here. We set the state of the
    mutex to unlocked and set the owner to locked.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: What does this code do? It initializes a variable that we will keep as the unlocked
    state. [Atomic Compare and Exchange](https://en.wikipedia.org/wiki/Compare-and-swap)
    is an instruction supported by most modern architectures (on x86 it’s ). The pseudocode
    for this operation looks like this
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: Except it is all done *atomically* meaning in one uninterruptible operation.
    What does the *weak* part mean? Atomic instructions are prone to **spurious failures**
    meaning that there are two versions to these atomic functions a *strong* and a
    *weak* part, strong guarantees the success or failure while weak may fail even
    when the operation succeeds. These are the same spurious failures that you’ll
    see in condition variables below. We are using weak because weak is faster, and
    we are in a loop! That means we are okay if it fails a little bit more often because
    we will keep spinning around anyway.
  prefs: []
  type: TYPE_NORMAL
- en: Inside the while loop, we have failed to grab the lock! We reset zero to unlocked
    and sleep for a little while. When we wake up we try to grab the lock again. Once
    we successfully swap, we are in the critical section! We set the mutex’s owner
    to the current thread for the unlock method and return successfully.
  prefs: []
  type: TYPE_NORMAL
- en: How does this guarantee mutual exclusion? When working with atomics we are unsure!
    But in this simple example, we can because the thread that can successfully expect
    the lock to be UNLOCKED (0) and swap it to a LOCKED (1) state is considered the
    winner. How do we implement unlock?
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: To satisfy the API, a thread can’t unlock the mutex unless the thread is the
    one who owns it. Then we unassign the mutex owner, because critical section is
    over after the atomic. We want a strong exchange because we don’t want to block.
    We expect the mutex to be locked, and we swap it to unlock. If the swap was successful,
    we unlocked the mutex. If the swap wasn’t, that means that the mutex was UNLOCKED
    and we tried to switch it from UNLOCKED to UNLOCKED, preserving the behavior of
    unlock.
  prefs: []
  type: TYPE_NORMAL
- en: What is this memory order business? We were talking about memory fences earlier,
    here it is! We won’t go into detail because it is outside the scope of this course
    but in the scope of [this article](https://gcc.gnu.org/wiki/Atomic/GCCMM/AtomicSync).
    We need consistency to make sure no loads or stores are ordered before or after.
    A program need to create dependency chains for more efficient ordering.
  prefs: []
  type: TYPE_NORMAL
- en: Semaphore
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A semaphore is another synchronization primitive. It is initialized to some
    value. Threads can either or which lowers or increases the value. If the value
    reaches zero and a wait is called, the thread will be blocked until a post is
    called.
  prefs: []
  type: TYPE_NORMAL
- en: Using a semaphore is as easy as using a mutex. First, decide if on the initial
    value, for example the number of remaining spaces in an array. Unlike pthread
    mutex there are no shortcuts to creating a semaphore - use .
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: When using a semaphore, wait and post can be called from different threads!
    Unlike a mutex, the increment and decrement can be from different threads.
  prefs: []
  type: TYPE_NORMAL
- en: This becomes especially useful if you want to use a semaphore to implement a
    mutex. A mutex is a semaphore that always before it . Some textbooks will refer
    to a mutex as a binary semaphore. You do have to be careful to never add more
    than one to a semaphore or otherwise your mutex abstraction breaks. That is usually
    why a mutex is used to implement a semaphore and vice versa.
  prefs: []
  type: TYPE_NORMAL
- en: Initialize the semaphore with a count of one.
