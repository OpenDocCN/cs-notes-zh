  type: TYPE_PRE
  zh: '[PRE78]'
- en: Sketch how to use a binary semaphore as a mutex. Remember in addition to mutual
    exclusion, a mutex can only ever be unlocked by the thread who called it.
  id: totrans-405
  prefs:
