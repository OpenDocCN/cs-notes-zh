- en: '[PRE58]'
  prefs: []
  type: TYPE_PRE
- en: Ring Buffer
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A ring buffer is a simple, usually fixed-sized, storage mechanism where contiguous
    memory is treated as if it is circular, and two index counters keep track of the
    current beginning and end of the queue. As array indexing is not circular, the
    index counters must wrap around to zero when moved past the end of the array.
    As data is added (enqueued) to the front of the queue or removed (dequeued) from
    the tail of the queue, the current items in the buffer form a train that appears
    to circle the track
  prefs: []
  type: TYPE_NORMAL
- en: '![Ring Buffer Visualization](../media/file20.png)'
  prefs: []
  type: TYPE_IMG
- en: Ring Buffer Visualization
  prefs: []
  type: TYPE_NORMAL
- en: A simple (single-threaded) implementation is shown below. Note, enqueue and
    dequeue do not guard against underflow or overflow. It’s possible to add an item
    when the queue is full and possible to remove an item when the queue is empty.
    If we added 20 integers (1, 2, 3, …, 20) to the queue and did not dequeue any
    items then values, would overwrite the . We won’t fix this problem right now,
    instead of when we create the multi-threaded version we will ensure enqueue-ing
    and dequeue-ing threads are blocked while the ring buffer is full or empty respectively.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE59]'
  prefs: []
  type: TYPE_PRE
- en: Ring Buffer Gotchas
  prefs:
