  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: Other uses for semaphores are keeping track of empty spaces in arrays. We will
    discuss these in the thread-safe data structures section.
  prefs: []
  type: TYPE_NORMAL
- en: Condition Variables
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Condition variables allow a set of threads to sleep until woken up. The API
    allows either one or all threads to be woken up. If a program only wakes one thread,
    the operating system will decide which thread to wake up. Threads don’t wake threads
    other directly like by id. Instead, a thread ‘signal’s the condition variable,
    which then will wake up one (or all) threads that are sleeping inside the condition
    variable.
  prefs: []
  type: TYPE_NORMAL
- en: Condition variables are also used with a mutex and with a loop, so when woken
    up they have to check a condition in a critical section. If a thread needs to
    be woken up outside of a critical section, there are other ways to do this in
    POSIX. Threads sleeping inside a condition variable are woken up by calling (wake
    up all) or (wake up one). Note despite the function name, this has nothing to
    do with POSIX s!
  prefs: []
  type: TYPE_NORMAL
- en: Occasionally, a waiting thread may appear to wake up for no reason. This is
    called a *spurious wakeup*. If you read the hardware implementation of a mutex
    section, this is similar to the atomic failure of the same name.
  prefs: []
  type: TYPE_NORMAL
- en: Why do spurious wakeups happen? For performance. On multi-CPU systems, it is
    possible that a race condition could cause a wake-up (signal) request to be unnoticed.
    The kernel may not detect this lost wake-up call but can detect when it might
    occur. To avoid the potentially lost signal, the thread is woken up so that the
    program code can test the condition again. If you want to know why, check out
    the appendix.
  prefs: []
  type: TYPE_NORMAL
- en: Thread-Safe Data Structures
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Naturally, we want our data structures to be thread-safe as well! We can use
    mutexes and synchronization primitives to make that happen. First a few definitions.
    Atomicity is when an operation is thread-safe. We have atomic instructions in
    hardware by providing the lock prefix
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: But Atomicity also applies to higher orders of operations. We say a data structure
    operation is atomic if it happens all at once and successfully or not at all.
  prefs: []
  type: TYPE_NORMAL
- en: As such, we can use synchronization primitives to make our data structures thread-safe.
    For the most part, we will be using mutexes because they carry more semantic meaning
    than a binary semaphore. Note, this is an introduction. Writing high-performance
    thread-safe data structures requires its own book! Take for example the following
    thread-unsafe stack.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: Version 1 of the stack is thread-unsafe because if two threads call push or
    pop at the same time then the results or the stack can be inconsistent. For example,
    imagine if two threads call pop at the same time then both threads may read the
    same value, both may read the original count value.
  prefs: []
  type: TYPE_NORMAL
- en: To turn this into a thread-safe data structure we need to identify the *critical
    sections* of our code, meaning we need to ask which section(s) of the code must
    only have one thread at a time. In the above example the , , and functions access
    the same memory and all critical sections for the stack. While (and ) is executing,
    the data structure is an inconsistent state, for example the count may not have
    been written to, so it may still contain the original value. By wrapping these
    methods with a mutex we can ensure that only one thread at a time can update (or
    read) the stack. A candidate ‘solution’ is shown below. Is it correct? If not,
    how will it fail?
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: Version 2 contains at least one error. Take a moment to see if you can the error(s)
    and work out the consequence(s).
  prefs: []
  type: TYPE_NORMAL
- en: If three threads called at the same time, the lock ensures that only one thread
    at time manipulates the stack on push or is_empty – Two threads will need to wait
    until the first thread completes A similar argument applies to concurrent calls
    to . However, Version 2 does not prevent push and pop from running at the same
    time because and use two different mutex locks. The fix is simple in this case
    - use the same mutex lock for both the push and pop functions.
  prefs: []
  type: TYPE_NORMAL
- en: The code has a second error. returns after the comparison and leaves the mutex
    unlocked. However, the error would not be spotted immediately. For example, suppose
    one thread calls and a second thread later calls . This thread would mysteriously
    stop. Using debugger, you can discover that the thread is stuck at the lock()
    method inside the method because the lock was never unlocked by the earlier call.
    Thus an oversight in one thread led to problems much later in time in an arbitrary
    other thread. Let’s try to rectify these problems
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: Version 3 is thread-safe. We have ensured mutual exclusion for all of the critical
    sections. There are a few things to note.
  prefs: []
