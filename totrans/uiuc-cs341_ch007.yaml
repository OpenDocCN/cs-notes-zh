- en: We would like the first pattern of the code being mutually exclusive. Which
    leads us to our first synchronization primitive, a Mutex.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望代码的第一个模式是互斥的。这引出了我们的第一个同步原语，互斥锁。
- en: Mutex
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 互斥锁
- en: To ensure that only one thread at a time can access a global variable, use a
    mutex – short for Mutual Exclusion. If one thread is currently inside a critical
    section we would like another thread to wait until the first thread is complete.
    A mutex isn’t a primitive in the truest sense, though it is one of the smallest
    that has useful threading API. A mutex also isn’t a data structure. It is an abstract
    data type.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保一次只有一个线程可以访问全局变量，请使用互斥锁（mutex）——即互斥的简称。如果当前有一个线程正在临界区内部，我们希望另一个线程等待直到第一个线程完成。在严格意义上，互斥锁不是一个原语，尽管它是具有有用线程API的最小原语之一。互斥锁也不是一个数据结构。它是一个抽象数据类型。
- en: Let’s think about a duck satisfying the mutex api. If someone has the duck then
    they are allowed to access a shared resource! We call it the mutex duck. Everyone
    else has to waddle around and wait. Once someone let’s go of the duck, they have
    to stop interacting with the resource and the next grabber can interact with the
    shared resource. Now you know the origins of the duck.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑一个满足互斥锁 API 的鸭子。如果有人拥有鸭子，他们就可以访问共享资源！我们称之为互斥锁鸭子。其他人必须摇摇摆摆地等待。一旦有人放手鸭子，他们必须停止与资源的交互，下一个抓取者才能与共享资源交互。现在你知道了鸭子的起源。
- en: There are many ways to implement a mutex, and we’ll give a few in this chapter.
    For right now let’s use the black box that the pthread library gives us. Here
    is how we declare a mutex.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 实现互斥锁有许多方法，我们将在本章中给出几个。目前，让我们使用 pthread 库提供的黑盒。以下是声明互斥锁的方法。
- en: '[PRE1]'
  id: totrans-31
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Mutex Lifetime
  id: totrans-32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 互斥锁生命周期
- en: 'For all mutexes, there are two ways of initializing a mutex:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 对于所有互斥锁，有两种初始化互斥锁的方法：
- en: The macro is functionally equivalent to the more general purpose . In other
    words, will create a mutex with default properties. The in the init version includes
    options to trade performance for additional error-checking, advanced sharing,
    and more. While we recommend using the init function inside of a program for a
    mutex located on the heap, you can use either method.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 宏在功能上等同于更通用的。换句话说，将创建具有默认属性的互斥锁。在 init 版本中包括选项以在性能和额外的错误检查、高级共享等方面进行权衡。虽然我们建议在程序中使用
    init 函数来创建位于堆上的互斥锁，但你可以使用任何一种方法。
- en: '[PRE2]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Once we are finished with the mutex we should also call too. Note, a program
    can only destroy an unlocked mutex, destroy on a locked mutex is undefined behavior.
    Things to keep in mind about initializing and destroying mutexes:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们完成对互斥锁的使用，我们也应该调用它。注意，程序只能销毁未锁定的互斥锁，在已锁定的互斥锁上销毁是未定义的行为。关于初始化和销毁互斥锁需要注意的事项：
- en: Initializing an already initialized mutex is undefined behavior
  id: totrans-37
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 初始化已经初始化的互斥锁是未定义的行为
- en: Destroying a locked mutex is undefined behavior
  id: totrans-38
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 销毁已锁定的互斥锁是未定义的行为
- en: Keep to the pattern of one and only one thread initializing a mutex.
  id: totrans-39
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保持一个模式，只有一个线程初始化互斥锁。
- en: Copying the bytes of the mutex to a new memory location and then using the copy
    is *not* supported. To reference a mutex, a program *must* to have a pointer to
    that memory address.
  id: totrans-40
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将互斥锁的字节复制到新的内存位置然后使用它是不支持的。要引用互斥锁，程序*必须*有一个指向该内存地址的指针。
- en: Global/Static mutexes need not be destroyed.
  id: totrans-41
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 全局/静态互斥锁不需要销毁。
- en: Mutex Usages
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 互斥锁用法
- en: How does one use a mutex? Here is a complete example in the spirit of the earlier
    piece of code.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 如何使用互斥锁？这里有一个完整的示例，灵感来源于之前的代码片段。
- en: '[PRE3]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: In the code above, the thread gets the lock to the counting house before entering.
    The critical section is only the so the following version is also correct.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 在上面的代码中，线程在进入之前获取了计数屋的锁。关键部分只是这样，所以下面的版本也是正确的。
- en: '[PRE4]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'This process runs slower because we lock and unlock the mutex a million times,
    which is expensive - at least compared with incrementing a variable. In this simple
    example, we didn’t need threads - we could have added up twice! A faster multi-thread
    example would be to add one million using an automatic (local) variable and only
    then adding it to a shared total after the calculation loop has finished:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这个过程运行得更慢，因为我们锁和解锁互斥锁一百万次，这是昂贵的——至少与增加变量相比。在这个简单的例子中，我们不需要线程——我们本可以加两次！一个更快的多线程示例是使用自动（局部）变量添加一百万，然后在计算循环完成后将结果添加到共享总和中：
- en: '[PRE5]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Starting with the gotchas. Firstly, C Mutexes do not lock variables. A mutex
    is a simple data structure. It works with code, not data. If a mutex is locked,
    the other threads will continue. It’s only when a thread attempts to lock a mutex
    that is already locked, will the thread have to wait. As soon as the original
    thread unlocks the mutex, the second (waiting) thread will acquire the lock and
    be able to continue. The following code creates a mutex that does effectively
    nothing.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 从一些常见问题开始。首先，C 互斥锁不会锁定变量。互斥锁是一个简单的数据结构。它与代码一起工作，而不是数据。如果一个互斥锁被锁定，其他线程将继续。只有在线程尝试锁定一个已经锁定的互斥锁时，线程才需要等待。一旦原始线程解锁互斥锁，第二个（等待的）线程将获得锁并能够继续。以下代码创建了一个实际上什么也不做的互斥锁。
- en: '[PRE6]'
  id: totrans-50
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Here are some other gotchas in no particular order
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些其他需要注意的问题，没有特定的顺序
- en: Don’t cross the streams! If using threads, don’t fork in the middle of your
    program. This means any time after your mutexes have been initialized.
  id: totrans-52
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 不要横穿水流！如果在程序中使用线程，不要在程序中间进行分叉。这意味着在初始化互斥锁之后任何时候。
- en: The thread that locks a mutex is the only thread that can unlock it.
  id: totrans-53
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 锁定互斥锁的线程是唯一可以解锁它的线程。
- en: Each program can have multiple mutex locks. A thread safe design might include
    a lock with each data structure, one lock per heap, or one lock per set of data
    structures If a program has only one lock, then there may be significant contention
    for the lock. If two threads were updating two different counters, it isn’t necessary
    to use the same lock.
  id: totrans-54
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 每个程序可以有多个互斥锁。一个线程安全的可能设计包括每个数据结构一个锁，每个堆一个锁，或者每组数据结构一个锁。如果一个程序只有一个锁，那么可能存在对锁的显著竞争。如果两个线程正在更新两个不同的计数器，使用相同的锁并不是必要的。
- en: Locks are only tools. They don’t spot critical sections!
  id: totrans-55
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 锁只是工具。它们不会发现临界区！
- en: There will always be a small amount of overhead of calling and . However, this
    is the price to pay for correctly functioning programs!
  id: totrans-56
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 调用和 . 总会有一些开销，然而，这是为了正确运行的程序所必须付出的代价！
- en: Not unlocking a mutex due to an early return during an error condition
  id: totrans-57
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 由于错误条件下的早期返回而没有解锁互斥锁
- en: Resource leak (not calling )
  id: totrans-58
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 资源泄露（没有调用 ）
- en: Using an uninitialized mutex or using a mutex that has already been destroyed
  id: totrans-59
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用未初始化的互斥锁或使用已经被销毁的互斥锁
- en: Locking a mutex twice on a thread without unlocking first
  id: totrans-60
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在一个线程上两次锁定互斥锁而没有先解锁
- en: Deadlock
  id: totrans-61
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 死锁
- en: Mutex Implementation
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 互斥锁实现
- en: So we have this cool data structure. How do we implement it? A naive, incorrect
    implementation is shown below. The function simply unlocks the mutex and returns.
    The lock function first checks to see if the lock is already locked. If it is
    currently locked, it will keep checking again until another thread has unlocked
    the mutex. For the time being, we’ll avoid the condition that other threads are
    able to unlock a lock they don’t own and focus on the mutual exclusion aspect.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 所以我们有一个很酷的数据结构。我们如何实现它？下面是一个简单且不正确的实现示例。该函数简单地解锁互斥锁并返回。锁定函数首先检查锁是否已经锁定。如果当前锁定，它将再次检查，直到另一个线程解锁互斥锁。目前，我们将避免其他线程能够解锁它们不拥有的锁的条件，并专注于互斥排他方面。
- en: '[PRE7]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Version 1 uses ‘busy-waiting’ unnecessarily wasting CPU resources. However,
    there is a more serious problem. We have a race-condition! If two threads both
    called concurrently, it is possible that both threads would read as zero. Thus
    both threads would believe they have exclusive access to the lock and both threads
    will continue.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 第1版使用不必要的“忙等待”，浪费了CPU资源。然而，有一个更严重的问题。我们有一个竞争条件！如果两个线程同时调用，两个线程都可能读取为零。因此，两个线程都会认为它们对锁有独占访问权，并且两个线程将继续执行。
- en: We might attempt to reduce the CPU overhead a little by calling inside the loop
    - pthread_yield suggests to the operating system that the thread does not use
    the CPU for a short while, so the CPU may be assigned to threads that are waiting
    to run. This still leaves the race-condition. We need a better implementation.
    We will talk about this later in the critical section part of this chapter. For
    now, we will talk about semaphores.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可能尝试通过在循环中调用来稍微减少CPU开销 - pthread_yield 建议操作系统该线程不会在短时间内使用CPU，因此CPU可能会分配给等待运行的线程。这仍然留下了竞争条件。我们需要一个更好的实现。我们将在本章的临界区部分稍后讨论这个问题。现在，我们将讨论信号量。
- en: 'Advanced: Implementing a Mutex with hardware'
  id: totrans-67
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 高级：使用硬件实现互斥锁
- en: We can use C11 Atomics to do that perfectly! A complete solution is detailed
    here. This is a spinlock mutex, [futex](https://locklessinc.com/articles/mutex_cv_futex/)
    implementations can be found online.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用C11原子操作来完美地做到这一点！一个完整的解决方案在这里详细说明。这是一个自旋锁互斥锁，[futex](https://locklessinc.com/articles/mutex_cv_futex/)的实现可以在网上找到。
- en: First the data structure and initialization code.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 首先是数据结构和初始化代码。
- en: '[PRE8]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: This is the initialization code, nothing fancy here. We set the state of the
    mutex to unlocked and set the owner to locked.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 这是初始化代码，这里没有特别之处。我们将互斥锁的状态设置为未锁定，并将所有者设置为锁定。
- en: '[PRE9]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: What does this code do? It initializes a variable that we will keep as the unlocked
    state. [Atomic Compare and Exchange](https://en.wikipedia.org/wiki/Compare-and-swap)
    is an instruction supported by most modern architectures (on x86 it’s ). The pseudocode
    for this operation looks like this
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码做了什么？它初始化了一个变量，我们将保持它作为未解锁状态。[原子比较和交换](https://en.wikipedia.org/wiki/Compare-and-swap)是大多数现代架构支持的指令（在x86上它是）。这个操作的伪代码看起来像这样
- en: '[PRE10]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Except it is all done *atomically* meaning in one uninterruptible operation.
    What does the *weak* part mean? Atomic instructions are prone to **spurious failures**
    meaning that there are two versions to these atomic functions a *strong* and a
    *weak* part, strong guarantees the success or failure while weak may fail even
    when the operation succeeds. These are the same spurious failures that you’ll
    see in condition variables below. We are using weak because weak is faster, and
    we are in a loop! That means we are okay if it fails a little bit more often because
    we will keep spinning around anyway.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 除了它都是通过原子操作完成的，这意味着在一个不可中断的操作中完成。那么“弱”部分是什么意思呢？原子指令容易发生**虚假失败**，这意味着这些原子函数有两种版本：强和弱部分，强部分保证成功或失败，而弱部分可能在操作成功时也会失败。这些就是你在下面的条件变量中会看到的虚假失败。我们使用弱部分是因为它更快，而且我们处于一个循环中！这意味着如果它稍微失败得更频繁一些，我们也可以接受，因为我们无论如何都会继续旋转。
- en: Inside the while loop, we have failed to grab the lock! We reset zero to unlocked
    and sleep for a little while. When we wake up we try to grab the lock again. Once
    we successfully swap, we are in the critical section! We set the mutex’s owner
    to the current thread for the unlock method and return successfully.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 在while循环内部，我们未能获取锁！我们将零重置为未锁定并稍作休眠。当我们醒来时，我们再次尝试获取锁。一旦我们成功交换，我们就进入了临界区！我们将互斥锁的所有者设置为当前线程以用于解锁方法，并成功返回。
- en: How does this guarantee mutual exclusion? When working with atomics we are unsure!
    But in this simple example, we can because the thread that can successfully expect
    the lock to be UNLOCKED (0) and swap it to a LOCKED (1) state is considered the
    winner. How do we implement unlock?
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 这是如何保证互斥的呢？当与原子操作一起工作时，我们不确定！但在这个简单的例子中，我们可以，因为能够成功期望锁为未锁定（0）并将其交换为锁定（1）状态的线程被认为是获胜者。我们如何实现解锁？
- en: '[PRE11]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: To satisfy the API, a thread can’t unlock the mutex unless the thread is the
    one who owns it. Then we unassign the mutex owner, because critical section is
    over after the atomic. We want a strong exchange because we don’t want to block.
    We expect the mutex to be locked, and we swap it to unlock. If the swap was successful,
    we unlocked the mutex. If the swap wasn’t, that means that the mutex was UNLOCKED
    and we tried to switch it from UNLOCKED to UNLOCKED, preserving the behavior of
    unlock.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 为了满足API，除非线程是拥有它的那个线程，否则线程不能解锁互斥锁。然后我们取消分配互斥锁的所有者，因为原子操作后临界区已经结束。我们希望有一个强交换，因为我们不希望阻塞。我们期望互斥锁被锁定，并将其交换以解锁。如果交换成功，我们已解锁互斥锁。如果交换不成功，这意味着互斥锁是**未锁定**的，我们试图将其从未锁定切换到未锁定，保留了解锁的行为。
- en: What is this memory order business? We were talking about memory fences earlier,
    here it is! We won’t go into detail because it is outside the scope of this course
    but in the scope of [this article](https://gcc.gnu.org/wiki/Atomic/GCCMM/AtomicSync).
    We need consistency to make sure no loads or stores are ordered before or after.
    A program need to create dependency chains for more efficient ordering.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 这是什么内存顺序的问题？我们之前讨论了内存栅栏，这里就是！我们不会深入讨论，因为这超出了本课程的范围，但在[这篇文章](https://gcc.gnu.org/wiki/Atomic/GCCMM/AtomicSync)的范围内。我们需要一致性来确保没有加载或存储在之前或之后被排序。程序需要创建依赖链以实现更有效的排序。
- en: Semaphore
  id: totrans-81
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 信号量
- en: A semaphore is another synchronization primitive. It is initialized to some
    value. Threads can either or which lowers or increases the value. If the value
    reaches zero and a wait is called, the thread will be blocked until a post is
    called.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 信号量是另一种同步原语。它被初始化为某个值。线程可以增加或减少这个值。如果值达到零并且调用了等待操作，线程将被阻塞，直到调用了发布操作。
- en: Using a semaphore is as easy as using a mutex. First, decide if on the initial
    value, for example the number of remaining spaces in an array. Unlike pthread
    mutex there are no shortcuts to creating a semaphore - use .
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 使用信号量与使用互斥锁一样简单。首先，决定初始值，例如数组中剩余空间的数量。与pthread互斥锁不同，创建信号量没有捷径 - 使用点号。
- en: '[PRE12]'
  id: totrans-84
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: When using a semaphore, wait and post can be called from different threads!
    Unlike a mutex, the increment and decrement can be from different threads.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用信号量时，等待和发布操作可以从不同的线程中调用！与互斥锁不同，增加和减少操作可以来自不同的线程。
- en: This becomes especially useful if you want to use a semaphore to implement a
    mutex. A mutex is a semaphore that always before it . Some textbooks will refer
    to a mutex as a binary semaphore. You do have to be careful to never add more
    than one to a semaphore or otherwise your mutex abstraction breaks. That is usually
    why a mutex is used to implement a semaphore and vice versa.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想使用信号量来实现互斥锁，这会变得特别有用。互斥锁是一个信号量，它总是在它之前。一些教科书将互斥锁称为二进制信号量。你必须小心，不要将多于一个的互斥锁添加到信号量中，否则你的互斥锁抽象就会失效。这就是通常使用互斥锁来实现信号量，反之亦然的原因。
- en: Initialize the semaphore with a count of one.
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用计数为1的值初始化信号量。
- en: Replace with
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 替换为
- en: Replace with
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 替换为
- en: '[PRE13]'
  id: totrans-90
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: But be warned, it isn’t the same! A mutex can handle what we call lock inversion
    well. Meaning the following code breaks with a traditional mutex, but produces
    a race condition with threads.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 但要小心，这并不相同！互斥锁可以很好地处理我们所说的锁反转问题。这意味着以下代码在传统互斥锁下会出错，但在线程中会产生竞态条件。
- en: '[PRE14]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: If we replace it with mutex lock, it won’t work now.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们用互斥锁来替换它，现在就不会起作用了。
- en: '[PRE15]'
  id: totrans-94
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: Also, binary semaphores are different than mutexes because one thread can unlock
    a mutex from a different thread.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，二进制信号量与互斥锁不同，因为一个线程可以从另一个线程解锁互斥锁。
- en: Signal Safety
  id: totrans-96
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 信号安全
- en: Also, is one of a handful of functions that can be correctly used inside a signal
    handler is not. We can release a waiting thread that can now make all of the calls
    that we disallowed to call inside the signal handler itself e.g. . Here is some
    code that utilizes this;
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，并不是所有可以在信号处理程序内部正确使用的函数都可以。我们可以释放一个等待的线程，这样它现在就可以执行我们不允许在信号处理程序内部调用的所有调用，例如。以下是一些利用这一点的代码示例；
- en: '[PRE16]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Other uses for semaphores are keeping track of empty spaces in arrays. We will
    discuss these in the thread-safe data structures section.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 信号量还有其他用途，比如跟踪数组中的空位。我们将在线程安全数据结构部分讨论这些内容。
- en: Condition Variables
  id: totrans-100
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 条件变量
- en: Condition variables allow a set of threads to sleep until woken up. The API
    allows either one or all threads to be woken up. If a program only wakes one thread,
    the operating system will decide which thread to wake up. Threads don’t wake threads
    other directly like by id. Instead, a thread ‘signal’s the condition variable,
    which then will wake up one (or all) threads that are sleeping inside the condition
    variable.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 条件变量允许一组线程在唤醒之前睡眠。API允许唤醒一个或所有线程。如果程序只唤醒一个线程，操作系统将决定唤醒哪个线程。线程不会直接通过id唤醒其他线程。相反，一个线程“信号”条件变量，然后它会唤醒一个（或所有）在条件变量内部睡眠的线程。
- en: Condition variables are also used with a mutex and with a loop, so when woken
    up they have to check a condition in a critical section. If a thread needs to
    be woken up outside of a critical section, there are other ways to do this in
    POSIX. Threads sleeping inside a condition variable are woken up by calling (wake
    up all) or (wake up one). Note despite the function name, this has nothing to
    do with POSIX s!
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 条件变量也和互斥锁以及循环一起使用，所以当唤醒时，它们必须在临界区检查一个条件。如果线程需要在临界区外被唤醒，POSIX提供了其他方法来做这件事。在条件变量中睡眠的线程可以通过调用（唤醒所有）或（唤醒一个）来被唤醒。请注意，尽管函数名如此，这与POSIX标准无关！
- en: Occasionally, a waiting thread may appear to wake up for no reason. This is
    called a *spurious wakeup*. If you read the hardware implementation of a mutex
    section, this is similar to the atomic failure of the same name.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，一个等待的线程可能会无缘无故地唤醒。这被称为*虚假唤醒*。如果你阅读了互斥锁的硬件实现部分，这类似于同名的原子失败。
- en: Why do spurious wakeups happen? For performance. On multi-CPU systems, it is
    possible that a race condition could cause a wake-up (signal) request to be unnoticed.
    The kernel may not detect this lost wake-up call but can detect when it might
    occur. To avoid the potentially lost signal, the thread is woken up so that the
    program code can test the condition again. If you want to know why, check out
    the appendix.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么会出现虚假唤醒？为了性能。在多CPU系统中，可能存在竞态条件导致唤醒（信号）请求未被注意到。内核可能无法检测到丢失的唤醒调用，但可以检测到可能发生的情况。为了避免可能丢失的信号，线程被唤醒，以便程序代码可以再次测试条件。如果你想知道原因，请查看附录。
- en: Thread-Safe Data Structures
  id: totrans-105
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 线程安全数据结构
- en: Naturally, we want our data structures to be thread-safe as well! We can use
    mutexes and synchronization primitives to make that happen. First a few definitions.
    Atomicity is when an operation is thread-safe. We have atomic instructions in
    hardware by providing the lock prefix
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 自然地，我们希望我们的数据结构也是线程安全的！我们可以使用互斥锁和同步原语来实现这一点。首先是一些定义。原子性是指操作是线程安全的。我们通过提供锁前缀在硬件中提供原子指令。
- en: '[PRE17]'
  id: totrans-107
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: But Atomicity also applies to higher orders of operations. We say a data structure
    operation is atomic if it happens all at once and successfully or not at all.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 但原子性也适用于更高阶的操作。我们说一个数据结构操作是原子的，如果它一次性发生并且成功或根本不发生。
- en: As such, we can use synchronization primitives to make our data structures thread-safe.
    For the most part, we will be using mutexes because they carry more semantic meaning
    than a binary semaphore. Note, this is an introduction. Writing high-performance
    thread-safe data structures requires its own book! Take for example the following
    thread-unsafe stack.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们可以使用同步原语来使我们的数据结构线程安全。大部分情况下，我们将使用互斥锁，因为它们比二进制信号量具有更多的语义意义。注意，这是一个介绍。编写高性能的线程安全数据结构需要它自己的书籍！例如，以下是一个线程不安全的栈。
- en: '[PRE18]'
  id: totrans-110
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Version 1 of the stack is thread-unsafe because if two threads call push or
    pop at the same time then the results or the stack can be inconsistent. For example,
    imagine if two threads call pop at the same time then both threads may read the
    same value, both may read the original count value.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 栈的版本1是线程不安全的，因为如果有两个线程同时调用push或pop，那么结果或栈可能不一致。例如，想象一下如果有两个线程同时调用pop，那么两个线程可能会读取相同的值，都可能会读取原始的计数值。
- en: To turn this into a thread-safe data structure we need to identify the *critical
    sections* of our code, meaning we need to ask which section(s) of the code must
    only have one thread at a time. In the above example the , , and functions access
    the same memory and all critical sections for the stack. While (and ) is executing,
    the data structure is an inconsistent state, for example the count may not have
    been written to, so it may still contain the original value. By wrapping these
    methods with a mutex we can ensure that only one thread at a time can update (or
    read) the stack. A candidate ‘solution’ is shown below. Is it correct? If not,
    how will it fail?
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 要将此转换为线程安全的数据结构，我们需要确定代码的*关键部分*，这意味着我们需要询问哪些代码部分必须一次只有一个线程。在上面的例子中，，和函数访问相同的内存，以及栈的所有关键部分。当（和）执行时，数据结构处于不一致的状态，例如计数可能尚未写入，因此它可能仍然包含原始值。通过将这些方法包装在互斥锁中，我们可以确保一次只有一个线程可以更新（或读取）栈。下面显示了一个候选的“解决方案”。这是否正确？如果不正确，它将如何失败？
- en: '[PRE19]'
  id: totrans-113
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Version 2 contains at least one error. Take a moment to see if you can the error(s)
    and work out the consequence(s).
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 版本2至少包含一个错误。花点时间看看你是否能找到错误（们）并分析其后果。
- en: If three threads called at the same time, the lock ensures that only one thread
    at time manipulates the stack on push or is_empty – Two threads will need to wait
    until the first thread completes A similar argument applies to concurrent calls
    to . However, Version 2 does not prevent push and pop from running at the same
    time because and use two different mutex locks. The fix is simple in this case
    - use the same mutex lock for both the push and pop functions.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 如果有三个线程同时调用，锁确保在push或is_empty时只有一次只有一个线程操作栈——两个线程将需要等待第一个线程完成。类似的论点也适用于对.的并发调用。然而，版本2并没有防止push和pop同时运行，因为它们使用了两个不同的互斥锁。在这种情况下，修复很简单——为push和pop函数使用相同的互斥锁。
- en: The code has a second error. returns after the comparison and leaves the mutex
    unlocked. However, the error would not be spotted immediately. For example, suppose
    one thread calls and a second thread later calls . This thread would mysteriously
    stop. Using debugger, you can discover that the thread is stuck at the lock()
    method inside the method because the lock was never unlocked by the earlier call.
    Thus an oversight in one thread led to problems much later in time in an arbitrary
    other thread. Let’s try to rectify these problems
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 代码有一个第二个错误。在比较之后返回，并且没有锁定互斥锁。然而，错误不会立即被发现。例如，假设一个线程调用，而第二个线程稍后调用。这个线程会神秘地停止。使用调试器，你可以发现线程在方法内部的lock()方法上卡住了，因为之前的调用从未解锁锁。因此，一个线程的疏忽导致在任意其他线程中时间较晚出现的问题。让我们尝试纠正这些问题。
- en: '[PRE20]'
  id: totrans-117
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: Version 3 is thread-safe. We have ensured mutual exclusion for all of the critical
    sections. There are a few things to note.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 版本3是线程安全的。我们已经确保了所有关键部分的互斥。有一些需要注意的事项。
- en: is thread-safe but its result may already be out-of-date. The stack may no longer
    be empty by the time the thread gets the result! This is usually why in thread-safe
    data structures, functions that return sizes are removed or deprecated.
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是线程安全的，但它的结果可能已经过时。当线程得到结果时，栈可能已经不再为空！这通常是在线程安全的数据结构中，移除或弃用返回大小的函数的原因。
- en: There is no protection against underflow (popping on an empty stack) or overflow
    (pushing onto an already-full stack)
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 没有防止下溢（在空栈上弹出）或溢出（在已满栈上压入）的保护。
- en: The last point can be fixed using counting semaphores. The implementation assumes
    a single stack. A more general-purpose version might include the mutex as part
    of the memory structure and use to initialize the mutex. For example,
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一点可以使用计数信号量来修复。该实现假设一个单独的栈。一个更通用版本可能包括互斥锁作为内存结构的一部分，并用于初始化互斥锁。例如，
- en: '[PRE21]'
  id: totrans-122
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: 'Before we fix the problems with semaphores. How would we fix the problems with
    condition variables? Try it out before you look at the code in the previous section.
    We need to wait in push and pop if our stack is full or empty respectively. Attempted
    solution:'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们修复信号量的问题之前。我们该如何修复条件变量的问题？在查看上一节中的代码之前先试一试。如果我们的栈满了或空了，我们需要在压入和弹出时等待。尝试的解决方案：
- en: '[PRE22]'
  id: totrans-124
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: Does the following solution work? Take a second before looking at the answer
    to spot the errors.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 以下解决方案有效吗？在查看答案之前，先花点时间找出错误。
- en: So did you catch all of them?
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 你都捕捉到它们了吗？
- en: The first one is a simple one. In push, our check should be against the total
    capacity, not zero.
  id: totrans-127
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 第一个很简单。在压入时，我们的检查应该针对总容量，而不是零。
- en: We only have if statement checks. wait() could spuriously wake up
  id: totrans-128
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们只有if语句检查。wait()可能会意外唤醒
- en: We never signal any of the threads! Threads could get stuck waiting indefinitely.
  id: totrans-129
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们从不通知任何线程！线程可能会无限期地等待。
- en: Let’s fix those errors Does this solution work?
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们修复那些错误，这个解决方案有效吗？
- en: '[PRE23]'
  id: totrans-131
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: This solution doesn’t work either! The problem is with the signal. Can you see
    why? What would you do to fix it?
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 这个解决方案也不行！问题是出在信号上。你能看到为什么吗？你会怎么做来修复它？
- en: Now, how would we use counting semaphores to prevent over and underflow? Let’s
    discuss it in the next section.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们该如何使用计数信号量来防止溢出和下溢？我们将在下一节中讨论。
- en: Using Semaphores
  id: totrans-134
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用信号量
- en: Let’s use a counting semaphore to keep track of how many spaces remain and another
    semaphore to track the number of items in the stack. We will call these two semaphores
    and . Remember will wait if the semaphore’s count has been decremented to zero
    (by another thread calling sem_post).
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们使用计数信号量来跟踪剩余空间的数量，并使用另一个信号量来跟踪栈中的项目数量。我们将这两个信号量称为和。记住，如果信号量的计数被递减到零（由另一个线程调用sem_post），则会等待。
- en: '[PRE24]'
  id: totrans-136
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: 'Sketch #2 has implemented the too early. Another thread waiting in push can
    erroneously attempt to write into a full stack. Similarly, a thread waiting in
    the pop() is allowed to continue too early.'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 图#2过早地实现了。另一个在压入时等待的线程可能会错误地尝试写入一个满栈。同样，在pop()中等待的线程也被允许过早地继续。
- en: '[PRE25]'
  id: totrans-138
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: Sketch 3 implements the correct semaphore logic, but can you spot the error?
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 图3实现了正确的信号量逻辑，但你能否找到错误？
- en: '[PRE26]'
  id: totrans-140
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: 'Sketch 3 correctly enforces buffer full and buffer empty conditions using semaphores.
    However, there is no *mutual exclusion*. Two threads can be in the *critical section*
    at the same time, which would corrupt the data structure or least lead to data
    loss. The fix is to wrap a mutex around the critical section:'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 图3正确地使用信号量强制执行缓冲区满和空的条件。然而，没有*互斥*。两个线程可以同时处于*关键部分*，这会破坏数据结构或至少导致数据丢失。修复方法是围绕关键部分包裹一个互斥锁：
- en: '[PRE27]'
  id: totrans-142
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: What happens when we start inverting the lock and wait orders?
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们开始反转锁和等待命令时会发生什么？
- en: '[PRE28]'
  id: totrans-144
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: Rather than giving you the answer, we’ll let you think about this. Is this a
    permissible way to lock and unlock? Is there a series of operations that could
    cause a race condition? How about deadlock? If there is, provide it. If there
    isn’t, provide a short justification proof of why that won’t happen.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不会直接给你答案，而是让你自己思考。这是否是一种允许的加锁和解锁方式？是否存在一系列可能导致竞态条件的操作？关于死锁呢？如果有，请提供。如果没有，请提供一个简短的证明，说明为什么不会发生。
- en: Software Solutions to the Critical Section
  id: totrans-146
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键部分的软件解决方案
- en: 'As already discussed, there are critical parts of our code that can only be
    executed by one thread at a time. We describe this requirement as ‘mutual exclusion’.
    Only one thread (or process) may have access to the shared resource. In multi-threaded
    programs, we can wrap a critical section with mutex lock and unlock calls:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，我们的代码中有一些部分只能由一个线程一次执行。我们将这个要求描述为“互斥”。只有一个线程（或进程）可以访问共享资源。在多线程程序中，我们可以用互斥锁和解锁调用封装临界区：
- en: '[PRE29]'
  id: totrans-148
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: How would we implement these lock and unlock calls? Can we create a pure software
    algorithm that assures mutual exclusion? Here is our attempt from earlier.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将如何实现这些锁和解锁调用？我们能否创建一个纯软件算法来确保互斥？这是我们之前尝试的方法。
- en: '[PRE30]'
  id: totrans-150
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: As we touched on earlier, this implementation *does not satisfy Mutual Exclusion*
    even considering that threads can unlock other threads locks. Let’s take a close
    look at this ‘implementation’ from two threads running around the same time.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们之前提到的，即使考虑到线程可以解锁其他线程的锁，这个实现*也不满足互斥*。让我们仔细看看两个线程同时运行的“实现”。
- en: To simplify the discussion, we consider only two threads. Note these arguments
    work for threads and processes and the classic CS literature discusses these problems
    in terms of two processes that need exclusive access to a critical section or
    shared resource. Raising a flag represents a thread/process’s intention to enter
    the critical section.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 为了简化讨论，我们只考虑两个线程。注意这些论点适用于线程和进程，经典的计算机科学文献用两个需要独占访问临界区或共享资源的进程来讨论这些问题。提升标志代表线程/进程进入临界区的意图。
- en: There are three main desirable properties that we desire in a solution to the
    critical section problem.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望解决方案具有三个主要期望的特性，以解决临界区问题。
- en: Mutual Exclusion. The thread/process gets exclusive access. Others must wait
    until it exits the critical section.
  id: totrans-154
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 互斥。线程/进程获得独占访问权限。其他线程必须等待它退出临界区。
- en: Bounded Wait. A thread/process cannot get superseded by another thread infinite
    amounts of time.
  id: totrans-155
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 有界等待。一个线程/进程不能被另一个线程无限期地取代。
- en: Progress. If no thread/process is inside the critical section, the thread/process
    should be able to proceed without having to wait.
  id: totrans-156
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 进展。如果没有线程/进程在临界区内，线程/进程应该能够继续进行，而无需等待。
- en: With these ideas in mind, let’s examine another candidate solution that uses
    a turn-based flag only if two threads both required access at the same time.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些想法的指导下，让我们检查另一个候选解决方案，该方案仅在两个线程同时需要访问时才使用基于轮询的标志。
- en: Naive Solutions
  id: totrans-158
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 天真的解决方案
- en: Remember that the pseudo-code outlined below is part of a larger program. The
    thread or process will typically need to enter the critical section many times
    during the lifetime of the process. So, imagine each example as wrapped inside
    a loop where for a random amount of time the thread or process is working on something
    else.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 记住下面概述的伪代码是更大程序的一部分。线程或进程在进程生命周期内通常需要多次进入临界区。所以，想象每个例子都被包含在一个循环中，在这个循环中，线程或进程会在随机的时间内做其他工作。
- en: Is there anything wrong with the candidate solution described below?
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 下面描述的候选解决方案有什么问题吗？
- en: '[PRE31]'
  id: totrans-161
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: 'Answer: Candidate solution #1 also suffers from a race condition because both
    threads/processes could read each other’s flag value as lowered and continue.'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: '答案：候选解决方案 #1 也存在竞态条件，因为两个线程/进程都可能读取对方的标志值已降低并继续。'
- en: 'This suggests we should raise the flag *before* checking the other thread’s
    flag, which is candidate solution #2 below.'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: '这表明我们应该在检查其他线程的标志之前提升标志，如下面的候选解决方案 #2。'
- en: '[PRE32]'
  id: totrans-164
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: 'Candidate #2 satisfies mutual exclusion. It is impossible for two threads to
    be inside the critical section at the same time. However, this code suffers from
    deadlock! Suppose two threads wish to enter the critical section at the same time.'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: '候选解决方案 #2 满足互斥。两个线程同时进入临界区是不可能的。然而，这段代码存在死锁！假设两个线程同时希望进入临界区。'
- en: 'Candidate Solution #2 Analysis'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: '候选解决方案 #2 分析'
- en: '| Time | Thread 1 | Thread 2 |'
  id: totrans-167
  prefs: []
  type: TYPE_TB
  zh: '| 时间 | 线程 1 | 线程 2 |'
- en: '| --- | --- | --- |'
  id: totrans-168
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| 1 | Raise Flag |  |'
  id: totrans-169
  prefs: []
  type: TYPE_TB
  zh: '| 1 | 提升标志 |  |'
- en: '| 2 |  | Raise Flag |'
  id: totrans-170
  prefs: []
  type: TYPE_TB
  zh: '| 2 |  | 提升标志 |'
- en: '| 3 | Wait | Wait |'
  id: totrans-171
  prefs: []
  type: TYPE_TB
  zh: '| 3 | 等待 | 等待 |'
- en: Both processes are now waiting for the other one to lower their flags. Neither
    one will enter the critical section as both are now stuck forever! This suggests
    we should use a turn-based variable to try to resolve who should proceed.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 两个进程现在都在等待对方降低它们的标志。由于两者现在都永远卡住了，所以没有一个会进入临界区！这表明我们应该使用基于轮询的变量来尝试解决谁应该继续。
- en: Turn-based solutions
  id: totrans-173
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 轮询解决方案
- en: 'The following candidate solution #3 uses a turn-based variable to politely
    allow one thread and then the other to continue'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: '以下候选解决方案 #3 使用轮询变量礼貌地允许一个线程然后是另一个线程继续'
- en: '[PRE33]'
  id: totrans-175
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: 'Candidate #3 satisfies mutual exclusion. Each thread or process gets exclusive
    access to the Critical Section. However, both threads/processes must take a strict
    turn-based approach to use the critical section. They are forced into an alternating
    critical section access pattern. If thread 1 wishes to read a hash table every
    millisecond, but another thread writes to a hash table every second, then the
    reading thread would have to wait another 999ms before being able to read from
    the hash table again. This ‘solution’ is ineffective because our threads should
    be able to make progress and enter the critical section if no other thread is
    currently in the critical section.'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: '候选人 #3 满足互斥性。每个线程或进程都可以独占访问关键部分。然而，两个线程/进程必须采取严格的轮询方式来使用关键部分。它们被迫进入交替的关键部分访问模式。如果线程
    1 每毫秒都希望读取哈希表，而另一个线程每秒写入哈希表，那么读取线程将不得不再等待 999 毫秒才能再次从哈希表中读取。这个“解决方案”是无效的，因为我们的线程应该能够在没有其他线程当前在关键部分中的情况下进行进展并进入关键部分。'
- en: Turn and Flag solutions
  id: totrans-177
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 轮询和标志解决方案
- en: Is the following a correct solution to CSP?
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是否是 CSP 的正确解决方案？
- en: '[PRE34]'
  id: totrans-179
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: Analyzing these solutions is tricky. Even peer-reviewed papers on this specific
    subject contain incorrect solutions (Hyman [1966](ch018.xhtml#ref-Hyman:1966:CPC:365153.365167))!
    At first glance, it appears to satisfy Mutual Exclusion, Bounded Wait and Progress
    The turn-based flag is only used in the event of a tie, so Progress and Bounded
    Wait is allowed and mutual exclusion appears to be satisfied. Perhaps you can
    find a counter-example?
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 分析这些解决方案很棘手。即使是关于这个特定主题的同行评审论文也包含错误的解决方案（Hyman [1966](ch018.xhtml#ref-Hyman:1966:CPC:365153.365167)！）！乍一看，这似乎满足了互斥性、有限等待和进展。轮询标志仅在出现平局时使用，因此允许进展和有限等待，互斥性似乎得到了满足。也许你能找到一个反例？
- en: 'Candidate #4 fails because a thread does not wait until the other thread lowers
    its flag. After some thought or inspiration, the following scenario can be created
    to demonstrate how Mutual Exclusion is not satisfied.'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: '候选人 #4 失败是因为一个线程没有等待另一个线程降低其标志。经过一些思考或灵感，可以创建以下场景来演示互斥性没有得到满足。'
- en: Imagine the first thread runs this code twice. The turn flag now points to the
    second thread. While the first thread is still inside the Critical Section, the
    second thread arrives. The second thread can immediately continue into the Critical
    Section!
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 想象第一个线程运行此代码两次。此时轮询标志指向第二个线程。当第一个线程仍在关键部分内部时，第二个线程到达。第二个线程可以立即继续进入关键部分！
- en: 'Candidate Solution #4'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: '候选解决方案 #4'
- en: '| Time | Turn | Thread # 1 | Thread # 2 |'
  id: totrans-184
  prefs: []
  type: TYPE_TB
  zh: '| 时间 | 轮询 | 线程 # 1 | 线程 # 2 |'
- en: '| --- | --- | --- | --- |'
  id: totrans-185
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- |'
- en: '| 1 | 2 | Raise my flag |  |'
  id: totrans-186
  prefs: []
  type: TYPE_TB
  zh: '| 1 | 2 | 提升我的标志 |  |'
- en: '| 2 | 2 | If your flag is raised, wait until my turn | Raise my flag |'
  id: totrans-187
  prefs: []
  type: TYPE_TB
  zh: '| 2 | 2 | 如果你的标志被提升，等待我的轮询 | 提升我的标志 |'
- en: '| 3 | 2 | // Do Critical Section Stuff | If your flag is raised, wait until
    my turn (TRUE!) |'
  id: totrans-188
  prefs: []
  type: TYPE_TB
  zh: '| 3 | 2 | // 执行关键部分内容 | 如果你的标志被提升，等待我的轮询（TRUE！）|'
- en: '| 4 | 2 | // Do Critical Section Stuff | Do Critical Section Stuff - OOPS |'
  id: totrans-189
  prefs: []
  type: TYPE_TB
  zh: '| 4 | 2 | // 执行关键部分内容 | 执行关键部分内容 - 哎呀 |'
- en: Working Solutions
  id: totrans-190
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 工作解决方案
- en: The first solution to the problem was Dekker’s Solution. Dekker’s Algorithm
    (1962) was the first provably correct solution. Though, it was in an unpublished
    paper, so it was not discovered until later (Dekker and Dijkstra [1965](ch018.xhtml#ref-dekker_dijkstra_1965))
    (this is an English transcribed version released in 1965). A version of the algorithm
    is below.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 该问题的第一个解决方案是 Dekker 的解决方案。Dekker 算法（1962）是第一个可证明正确的解决方案。尽管如此，它是在一份未发表的论文中，所以直到后来才被发现（Dekker
    和 Dijkstra [1965](ch018.xhtml#ref-dekker_dijkstra_1965)）（这是 1965 年发布的英文转录版本）。算法的一个版本如下。
- en: '[PRE35]'
  id: totrans-192
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: Notice how the process’s flag is always raised during the critical section no
    matter if the loop is iterated zero, once or more times. Further, the flag can
    be interpreted as an immediate intent to enter the critical section. Only if the
    other process has also raised the flag will one process defer, lower their intent
    flag and wait. Let’s check the conditions.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，在关键部分中，无论循环迭代零次、一次还是多次，进程的标志总是被提升。此外，标志可以解释为立即进入关键部分的意图。只有当另一个进程也提升了标志时，一个进程才会推迟，降低其意图标志并等待。让我们检查一下条件。
- en: Mutual Exclusion. Let’s try to sketch a simple proof. The loop invariant is
    that at the start of checking the condition, your flag has to be raised – this
    is by exhaustion. Since the only way that a thread can leave the loop is by having
    the condition be false, the flag must be raised for the entirety of the critical
    section. Since the loop prevents a thread from exiting while the other thread’s
    flag is raised and a thread has its flag raised in the critical section, the other
    thread can’t enter the critical section at the same time.
  id: totrans-194
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 互斥。让我们尝试绘制一个简单的证明。循环不变量是在检查条件开始时，你的标志必须被提升——这是通过穷举实现的。由于线程离开循环的唯一方式是条件为假，因此标志必须在关键部分的全过程中被提升。由于循环阻止线程在另一个线程的标志提升时退出，并且在关键部分有一个线程提升了标志，因此另一个线程不能同时进入关键部分。
- en: Bounded Wait. Assuming that the critical section ends in finite time, a thread
    once it has left the critical section cannot then get the critical section back.
    The reason being is the turn variable is set to the other thread, meaning that
    that thread now has priority. That means a thread cannot be superseded infinitely
    by another thread.
  id: totrans-195
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 有限等待。假设关键部分在有限时间内结束，一旦一个线程离开了关键部分，它就不能再获得关键部分。原因是转换变量被设置为另一个线程，这意味着那个线程现在有优先权。这意味着一个线程不能被另一个线程无限期地取代。
- en: Progress. If the other thread isn’t in the critical section, it will simply
    continue with a simple check. We didn’t make any statement about if threads are
    randomly stopped by the system scheduler. This is an idealized scenario where
    threads will keep executing instructions.
  id: totrans-196
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 进度。如果其他线程不在关键部分，它将简单地继续进行简单的检查。我们没有对系统调度器随机停止线程做出任何声明。这是一个理想化的场景，其中线程将不断执行指令。
- en: Peterson’s Solution
  id: totrans-197
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Peterson的解决方案
- en: Peterson published his novel and surprisingly simple solution in 1981 (Peterson
    [1981](ch018.xhtml#ref-Peterson1981MythsAT)). A version of his algorithm is shown
    below that uses a shared variable .
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: Peterson在1981年（Peterson [1981](ch018.xhtml#ref-Peterson1981MythsAT)）发表了其新颖且简单的解决方案。下面展示了他算法的一个版本，该版本使用了一个共享变量。
- en: '[PRE36]'
  id: totrans-199
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: 'This solution satisfies Mutual Exclusion, Bounded Wait and Progress. If thread
    #2 has set turn to 2 and is currently inside the critical section. Thread #1 arrives,
    *sets the turn back to 1* and now waits until thread 2 lowers the flag.'
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 这个解决方案满足互斥、有限等待和进度。如果线程#2已经将转换设置为2并且目前处于关键部分。线程#1到达，*将转换重新设置为1*，然后等待线程2降低标志。
- en: Mutual Exclusion. Let’s try to sketch a simple proof again. A thread doesn’t
    get into the critical section until the turn variable is yours or the other thread’s
    flag isn’t up. If the other thread’s flag isn’t up, it isn’t trying to enter the
    critical section. That is the first action the thread does and the last action
    the thread undoes. If the turn variable is set to this thread, that means that
    the other thread has given the control to this thread. Since my flag is raised
    and the turn variable is set, the other thread has to wait in the loop until the
    current thread is done.
  id: totrans-201
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 互斥。让我们再次尝试绘制一个简单的证明。一个线程只有在转换变量是你的或者另一个线程的标志没有提升之前才能进入关键部分。如果另一个线程的标志没有提升，它不是试图进入关键部分。这是线程执行的第一步，也是线程撤销的最后一步。如果转换变量被设置为这个线程，这意味着另一个线程已经将控制权交给了这个线程。由于我的标志被提升并且转换变量被设置，另一个线程必须等待在循环中，直到当前线程完成。
- en: Bounded Wait. After one thread lowers, a thread waiting in the while loop will
    leave because the first condition is broken. This means that threads cannot win
    all the time.
  id: totrans-202
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 有限等待。在降低标志后，在while循环中等待的线程将离开，因为第一个条件被破坏。这意味着线程不能总是获胜。
- en: Progress. If no other thread is contesting, other thread’s flags are not up.
    That means that a thread can go past the while loop and do critical section items.
  id: totrans-203
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 进度。如果没有其他线程竞争，其他线程的标志就不会被提升。这意味着一个线程可以越过while循环并执行关键部分的项目。
- en: Unfortunately, we can’t implement a software mutex in the same way today because
    of out of order instructions. Check the appendix for a solution to the problem.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，由于指令乱序，我们今天不能以同样的方式实现软件互斥锁。请查看附录以获取该问题的解决方案。
- en: Implementing Counting Semaphore
  id: totrans-205
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实现计数信号量
- en: Now that we have a solution to the critical section problem, We can reasonably
    implement a mutex. How would we implement other synchronization primitives? Let’s
    start with a semaphore. To implement a semaphore with efficient CPU usage, we
    will say that we have implemented a condition variable. Implementing an O(1) space
    condition variable using only a mutex is not trivial, or at least an O(1) heap
    condition variable is not trivial. We don’t want to call malloc while implementing
    a primitive, or we may deadlock!
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经解决了临界区问题，可以合理地实现互斥锁。我们将如何实现其他同步原语？让我们从信号量开始。为了实现一个具有高效CPU使用的信号量，我们将说我们已经实现了一个条件变量。仅使用互斥锁实现O(1)空间条件变量并不简单，或者至少O(1)堆空间条件变量并不简单。我们不想在实现原语时调用malloc，否则我们可能会死锁！
- en: We can implement a counting semaphore using condition variables.
  id: totrans-207
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们可以使用条件变量来实现计数信号量。
- en: Each semaphore needs a count, a condition variable and a mutex
  id: totrans-208
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个信号量都需要一个计数、一个条件变量和一个互斥锁。
- en: '[PRE37]'
  id: totrans-209
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE37]'
- en: Implement to initialize the mutex and condition variable
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 实现初始化互斥锁和条件变量。
- en: '[PRE38]'
  id: totrans-211
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: Our implementation of needs to increment the count. We will also wake up any
    threads sleeping inside the condition variable. Notice we lock and unlock the
    mutex so only one thread can be inside the critical section at a time.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的实现需要在计数上增加。我们还将唤醒在条件变量内休眠的所有线程。注意，我们锁定和解锁互斥锁，以确保一次只有一个线程在临界区内部。
- en: '[PRE39]'
  id: totrans-213
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: Our implementation of may need to sleep if the semaphore’s count is zero. Just
    like , we wrap the critical section using the lock, so only one thread can be
    executing our code at a time. Notice if the thread does need to wait then the
    mutex will be unlocked, allowing another thread to enter and awaken us from our
    sleep!
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的实现可能需要在信号量的计数为零时休眠。就像那样，我们使用锁来封装临界区，这样一次只有一个线程可以执行我们的代码。注意，如果线程需要等待，互斥锁将被解锁，允许另一个线程进入并唤醒我们。
- en: Also notice that even if a thread is woken up before it returns from , it must
    re-acquire the lock, so it will have to wait until sem_post finishes.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 还要注意，即使线程在从`sem_post`返回之前被唤醒，它也必须重新获取锁，因此它将不得不等待`sem_post`完成。
- en: '[PRE40]'
  id: totrans-216
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: That is a complete implementation of a counting semaphore Notice that we are
    calling every single time. In practice, this means would unnecessary call even
    if there are no waiting threads. A more efficient implementation would only call
    when necessary i.e.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是一个计数信号量的完整实现。请注意，我们每次都会调用它。在实践中，这意味着即使没有等待的线程，也会进行不必要的调用。一个更高效的实现只会在有需要时调用，即。
- en: '[PRE41]'
  id: totrans-218
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: Other semaphore considerations
  id: totrans-219
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 其他信号量考虑事项
- en: A production semaphore implementation may include a queue to ensure fairness
    and priority. Meaning, we wake up the highest-priority and/or longest sleeping
    thread.
  id: totrans-220
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生产的信号量实现可能包括一个队列以确保公平性和优先级。这意味着我们唤醒最高优先级和/或最长休眠的线程。
- en: An advanced use of allows semaphores to be shared across processes. Our implementation
    only works for threads inside the same process. We could fix this by setting the
    condition variable and mutex attributes.
  id: totrans-221
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 高级使用允许信号量在进程间共享。我们的实现仅适用于同一进程内的线程。我们可以通过设置条件变量和互斥锁属性来修复这个问题。
- en: Implementing a condition variable with a mutex is complex, so we’ve left that
    in the appendix.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 实现条件变量与互斥锁的复杂度较高，所以我们将其留在了附录中。
- en: Barriers
  id: totrans-223
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 屏障
- en: Suppose we wanted to perform a multi-threaded calculation that has two stages,
    but we don’t want to advance to the second stage until the first stage is completed.
    We could use a synchronization method called a **barrier**. When a thread reaches
    a barrier, it will wait at the barrier until all the threads reach the barrier,
    and then they’ll all proceed together.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们想要执行一个有两个阶段的并发计算，但我们不想在第一阶段完成之前进入第二阶段。我们可以使用一种称为**屏障**的同步方法。当一个线程到达屏障时，它将在屏障处等待，直到所有线程都到达屏障，然后他们一起继续前进。
- en: Think of it like being out for a hike with some friends. You make a mental note
    of how many friends you have and agree to wait for each other at the top of each
    hill. Say you’re the first one to reach the top of the first hill. You’ll wait
    there at the top for your friends. One by one, they’ll arrive at the top, but
    nobody will continue until the last person in your group arrives. Once they do,
    you’ll all proceed.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，和朋友们一起去远足。你心里记着有多少个朋友，并约定在每座山的山顶等待彼此。比如说，你是第一个到达第一座山顶的人。你会在山顶等待你的朋友们。一个接一个，他们会到达山顶，但没有人会继续前进，直到你们小组的最后一个人到达。一旦他们到达，你们所有人就会继续前进。
- en: Pthreads has a function that implements this. You’ll need to declare a variable
    and initialize it with . takes the number of threads that will be participating
    in the barrier as an argument. Here is a sample program using barriers.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: Pthreads有一个实现此功能的函数。您需要声明一个变量并将其初始化为。它接受将参与屏障的线程数量作为参数。以下是一个使用屏障的示例程序。
- en: '[PRE42]'
  id: totrans-227
  prefs: []
  type: TYPE_PRE
  zh: '[PRE42]'
- en: Now let’s implement our own barrier and use it to keep all the threads in sync
    in a large calculation. Here is our thought process,
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们实现我们自己的屏障，并使用它来在大型计算中使所有线程保持同步。以下是我们的思考过程，
- en: Threads do first calculation (use and change values in data)
  id: totrans-229
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 线程进行第一次计算（使用并更改数据中的值）
- en: Barrier! Wait for all threads to finish first calculation before continuing
  id: totrans-230
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 障碍！在继续之前，等待所有线程完成第一次计算
- en: Threads do second calculation (use and change values in data)
  id: totrans-231
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 线程进行第二次计算（使用并更改数据中的值）
- en: The thread function has four main parts-
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 线程函数有四个主要部分-
- en: '[PRE43]'
  id: totrans-233
  prefs: []
  type: TYPE_PRE
  zh: '[PRE43]'
- en: Our main thread will create the 16 threads, and we will divide each calculation
    into 16 separate pieces. Each thread will be given a unique value (0,1,2,..15),
    so it can work on its own block. Since a (void*) type can hold small integers,
    we will pass the value of by casting it to a void pointer.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的主线程将创建16个线程，我们将每个计算分成16个单独的部分。每个线程将被分配一个唯一的值（0，1，2，..15），这样它就可以在自己的块上工作。由于(void*)类型可以容纳小的整数，我们将通过将其转换为void指针来传递的值。
- en: '[PRE44]'
  id: totrans-235
  prefs: []
  type: TYPE_PRE
  zh: '[PRE44]'
- en: Note, we will never dereference this pointer value as an actual memory location.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，我们永远不会将此指针值作为实际内存位置解引用。
- en: We will cast it straight back to an integer.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将直接将其转换回整数。
- en: '[PRE45]'
  id: totrans-238
  prefs: []
  type: TYPE_PRE
  zh: '[PRE45]'
- en: After calculation 1 completes, we need to wait for the slower threads unless
    we are the last thread! So, keep track of the number of threads that have arrived
    at our barrier ‘checkpoint’.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 第一次计算完成后，我们需要等待较慢的线程，除非我们是最后一个线程！所以，跟踪到达我们障碍“检查点”的线程数量。
- en: '[PRE46]'
  id: totrans-240
  prefs: []
  type: TYPE_PRE
  zh: '[PRE46]'
- en: However, the code has a few flaws. One is two threads might try to decrement
    . The other is the loop is a busy loop. We can do better! Let’s use a condition
    variable and then we will use a broadcast/signal functions to wake up the sleeping
    threads.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，代码有几个缺陷。一个是两个线程可能会尝试递减。另一个是循环是一个忙等待循环。我们可以做得更好！让我们使用一个条件变量，然后我们将使用广播/信号函数来唤醒睡眠的线程。
- en: A reminder, a condition variable is similar to a house! Threads go there to
    sleep (). A thread can choose to wake up one thread () or all of them (). If there
    are no threads currently waiting then these two calls have no effect.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 提醒一下，条件变量类似于一所房子！线程去那里睡觉（）。一个线程可以选择唤醒一个线程（）或所有线程（）。如果没有线程当前在等待，则这两个调用没有效果。
- en: A condition variable version is usually similar to a busy loop incorrect solution
    - as we will show next. First, let’s add a mutex and condition global variables
    and don’t forget to initialize them in .
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 条件变量版本通常类似于忙等待错误的解决方案——正如我们将展示的。首先，让我们添加互斥锁和条件全局变量，并不要忘记在中初始化它们。
- en: '[PRE47]'
  id: totrans-244
  prefs: []
  type: TYPE_PRE
  zh: '[PRE47]'
- en: We will use the mutex to ensure that only one thread modifies at a time. The
    last arriving thread needs to wake up *all* sleeping threads - so we will use
    not
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用互斥锁来确保一次只有一个线程修改。最后一个到达的线程需要唤醒所有睡眠的线程——所以我们将使用not
- en: '[PRE48]'
  id: totrans-246
  prefs: []
  type: TYPE_PRE
  zh: '[PRE48]'
- en: When a thread enters , it releases the mutex and sleeps. After, the thread will
    be woken up. Once we bring a thread back from its sleep, before returning it must
    wait until it can lock the mutex. Notice that even if a sleeping thread wakes
    up early, it will check the while loop condition and re-enter wait if necessary.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 当一个线程进入时，它释放互斥锁并睡眠。之后，线程将被唤醒。一旦我们将一个线程从睡眠中唤醒，在返回之前，它必须等待直到它可以锁定互斥锁。注意，即使一个睡眠的线程提前醒来，它也会检查while循环条件，并在必要时重新进入等待状态。
- en: '**The above barrier is not reusable**. Meaning that if we stick it into any
    old calculation loop there is a good chance that the code will encounter a condition
    where the barrier either deadlocks or thread races ahead one iteration faster.
    Why is that? Because of the ambitious thread.'
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: '**上述屏障不可重用**。这意味着如果我们将其放入任何旧的计算循环中，代码有很大可能会遇到屏障要么死锁，要么线程比迭代快一步的情况。为什么会这样？因为有一个雄心勃勃的线程。'
- en: We will assume that one thread is much faster than all the other threads. With
    the barrier API, this thread should be waiting, but it may not be. To make it
    concrete, let’s look at this code
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将假设有一个线程比所有其他线程都要快。使用屏障API，这个线程应该正在等待，但它可能不是。为了使其具体化，让我们看看这段代码
- en: '[PRE49]'
  id: totrans-250
  prefs: []
  type: TYPE_PRE
  zh: '[PRE49]'
- en: What happens if a thread becomes ambitious. Well
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 如果一个线程变得雄心勃勃会发生什么。嗯
- en: Many other threads wait on the condition variable
  id: totrans-252
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 许多其他线程都在等待条件变量
- en: The last thread broadcasts.
  id: totrans-253
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最后一个线程进行广播。
- en: A single thread leaves the while loop.
  id: totrans-254
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一个单独的线程离开了while循环。
- en: This single thread performs its calculation before any other threads *even wake
    up*
  id: totrans-255
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 这个单独的线程在其计算开始之前，其他任何线程甚至都没有醒来
- en: Reset the number of remaining threads and goes back to sleep.
  id: totrans-256
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重置剩余线程的数量并返回睡眠状态。
- en: 'All the other threads who should’ve woken up never do and our implementation
    deadlocks. How would you go about solving this? Hint: If multiple threads call
    in a loop then one can guarantee that they are on the same iteration.'
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 所有其他本应醒来的线程都没有醒来，我们的实现陷入死锁。你将如何解决这个问题？提示：如果多个线程在循环中调用，则可以保证它们处于相同的迭代。
- en: Reader Writer Problem
  id: totrans-258
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 读者-写者问题
- en: Imagine you had a key-value map data structure that is used by many threads.
    Multiple threads should be able to look up (read) values at the same time provided
    the data structure is not being written to. The writers are not so gregarious.
    To avoid data corruption, only one thread at a time may modify () the data structure
    and no readers may be reading at that time.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 想象你有一个键值映射数据结构，它被许多线程使用。只要数据结构没有被写入，多个线程应该能够同时查找（读取）值。写者并不那么社交。为了避免数据损坏，一次只能有一个线程修改()数据结构，并且在此期间不允许任何读者读取。
- en: This is an example of the *Reader Writer Problem*. Namely, how can we efficiently
    synchronize multiple readers and writers such that multiple readers can read together,
    but a writer gets exclusive access?
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个*读者-写者问题*的例子。也就是说，我们如何有效地同步多个读者和写者，使得多个读者可以同时读取，但写者获得独占访问权限？
- en: 'An incorrect attempt is shown below (“lock” is a shorthand for ):'
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 下面显示了不正确的尝试（“lock”是的缩写）：
- en: 'Attempt #1'
  id: totrans-262
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 尝试#1
- en: '[PRE50]'
  id: totrans-263
  prefs: []
  type: TYPE_PRE
  zh: '[PRE50]'
- en: At least our first attempt does not suffer from data corruption. Readers must
    wait while a writer is writing and vice versa! However, readers must also wait
    for other readers. Let’s try another implementation.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 至少我们的第一次尝试没有数据损坏的问题。读者必须在写者写入时等待，反之亦然！然而，读者也必须等待其他读者。让我们尝试另一种实现。
- en: 'Attempt #2:'
  id: totrans-265
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 尝试#2：
- en: '[PRE51]'
  id: totrans-266
  prefs: []
  type: TYPE_PRE
  zh: '[PRE51]'
- en: 'Our second attempt suffers from a race condition. Imagine if two threads both
    called and or both called write at the same time. Both threads would be able to
    proceed! Secondly, we can have multiple readers and multiple writers, so let’s
    keep track of the total number of readers or writers Which brings us to attempt
    #3.'
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的第二次尝试存在竞态条件。想象一下，如果有两个线程同时调用或或同时调用write，那么两个线程都能够继续执行！其次，我们可以有多个读者和多个写者，所以让我们跟踪读者或写者的总数，这把我们带到了尝试#3。
- en: 'Attempt #3'
  id: totrans-268
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 尝试#3
- en: Remember that performs *Three* actions. Firstly, it atomically unlocks the mutex
    and then sleeps (until it is woken by or ). Thirdly, the awoken thread must re-acquire
    the mutex lock before returning. Thus only one thread can actually be running
    inside the critical section defined by the lock and unlock() methods.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，执行*三个*动作。首先，它原子性地解锁互斥锁然后睡眠（直到被或唤醒）。第三，唤醒的线程在返回之前必须重新获取互斥锁。因此，只有一个线程实际上可以在由锁和解锁()方法定义的关键部分中运行。
- en: 'Implementation #3 below ensures that a reader will enter the if any writers
    are writing.'
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 以下第3种实现确保读者在有任何写者正在写入时进入。
- en: '[PRE52]'
  id: totrans-271
  prefs: []
  type: TYPE_PRE
  zh: '[PRE52]'
- en: 'However, only one reader a time can read because candidate #3 did not unlock
    the mutex. A better version unlocks before reading.'
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，一次只有一个读者可以读取，因为候选方案#3没有解锁互斥锁。一个更好的版本在读取之前解锁。
- en: '[PRE53]'
  id: totrans-273
  prefs: []
  type: TYPE_PRE
  zh: '[PRE53]'
- en: Does this mean that a writer and read could read and write at the same time?
    No! First of all, remember cond_wait requires the thread re-acquire the mutex
    lock before returning. Thus only one thread can be executing code inside the critical
    section (marked with **) at a time!
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 这是否意味着写者和读可以同时读取和写入？不！首先，记住cond_wait需要在返回之前线程重新获取互斥锁。因此，一次只有一个线程可以在标记为**的关键部分中执行代码！
- en: '[PRE54]'
  id: totrans-275
  prefs: []
  type: TYPE_PRE
  zh: '[PRE54]'
- en: Writers must wait for everyone. Mutual exclusion is assured by the lock.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 写者必须等待所有人。互斥由锁保证。
- en: '[PRE55]'
  id: totrans-277
  prefs: []
  type: TYPE_PRE
  zh: '[PRE55]'
- en: 'Candidate #3 above also uses . This will only wake up one thread. If many readers
    are waiting for the writer to complete, only one sleeping reader will be awoken
    from their slumber. The reader and writer should use so that all threads should
    wake up and check their while-loop condition.'
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 上面的候选方案#3也使用。这只会唤醒一个线程。如果有许多读者正在等待写者完成，只有一名沉睡的读者会被唤醒。读者和写者应该使用，以便所有线程都应该醒来并检查它们的while循环条件。
- en: Starving writers
  id: totrans-279
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 饥饿的写者
- en: 'Candidate #3 above suffers from starvation. If readers are constantly arriving
    then a writer will never be able to proceed (the ‘reading’ count never reduces
    to zero). This is known as *starvation* and would be discovered under heavy loads.
    Our fix is to implement a bounded-wait for the writer. If a writer arrives they
    will still need to wait for existing readers however future readers must be placed
    in a “holding pen” and wait for the writer to finish. The “holding pen” can be
    implemented using a variable and a condition variable so that we can wake up the
    threads once the writer has finished.'
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 上面的候选者#3存在饥饿问题。如果读者不断到达，那么写者将永远无法进行（“reading”计数器永远不会减少到零）。这被称为*饥饿*，在重负载下会被发现。我们的解决方案是实现写者的有界等待。如果写者到达，他们仍然需要等待现有的读者，但是未来的读者必须被放置在“拘留所”并等待写者完成。这个“拘留所”可以通过使用变量和条件变量来实现，这样我们就可以在写者完成后唤醒线程。
- en: The plan is that when a writer arrives, and before waiting for current readers
    to finish, register our intent to write by incrementing a counter ‘writer’
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 计划是在写者到达时，在等待当前读者完成之前，通过增加计数器‘writer’来注册我们的写意。
- en: '[PRE56]'
  id: totrans-282
  prefs: []
  type: TYPE_PRE
  zh: '[PRE56]'
- en: And incoming readers will not be allowed to continue while writer is nonzero.
    Notice ‘writer’ indicates a writer has arrived, while ‘reading’ and ‘writing’
    counters indicate there is an *active* reader or writer.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 当写者不为零时，不允许新来的读者继续。注意‘writer’表示有写者到达，而‘reading’和‘writing’计数器表示存在一个*活跃*的读者或写者。
- en: '[PRE57]'
  id: totrans-284
  prefs: []
  type: TYPE_PRE
  zh: '[PRE57]'
- en: 'Attempt #4'
  id: totrans-285
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 尝试#4
- en: Below is our first working solution to the Reader-Writer problem. Note if you
    continue to read about the “Reader Writer problem” then you will discover that
    we solved the “Second Reader Writer problem” by giving writers preferential access
    to the lock. This solution is not optimal. However, it satisfies our original
    problem of N active readers, single active writer, and avoiding starvation of
    the writer if there is a constant stream of readers.
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是我们对读者-写者问题的第一个工作解决方案。注意，如果你继续阅读关于“读者-写者问题”的内容，你会发现我们通过给予写者优先访问锁的方式解决了“第二个读者-写者问题”。这个解决方案不是最优的。然而，它满足了我们的原始问题，即N个活跃的读者，一个活跃的写者，并且在有持续的读者流时避免写者的饥饿。
- en: Can you identify any improvements? For example, how would you improve the code
    so that we only woke up readers or one writer?
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 你能识别出任何改进的地方吗？例如，你会如何改进代码，以便我们只唤醒读者或一个写者？
- en: '[PRE58]'
  id: totrans-288
  prefs: []
  type: TYPE_PRE
  zh: '[PRE58]'
- en: Ring Buffer
  id: totrans-289
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 环形缓冲区
- en: A ring buffer is a simple, usually fixed-sized, storage mechanism where contiguous
    memory is treated as if it is circular, and two index counters keep track of the
    current beginning and end of the queue. As array indexing is not circular, the
    index counters must wrap around to zero when moved past the end of the array.
    As data is added (enqueued) to the front of the queue or removed (dequeued) from
    the tail of the queue, the current items in the buffer form a train that appears
    to circle the track
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 环形缓冲区是一种简单、通常固定大小的存储机制，其中连续的内存被当作环形处理，并且两个索引计数器跟踪队列的当前开始和结束位置。由于数组索引不是环形的，当索引计数器移动到数组末尾之后时，它们必须回绕到零。当数据被添加（入队）到队列的前端或从队列的尾部移除（出队）时，缓冲区中的当前项目形成一列火车，看起来像是在轨道上环形运行。
- en: '![Ring Buffer Visualization](../media/file20.png)'
  id: totrans-291
  prefs: []
  type: TYPE_IMG
  zh: '![环形缓冲区可视化](../media/file20.png)'
- en: Ring Buffer Visualization
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 环形缓冲区可视化
- en: A simple (single-threaded) implementation is shown below. Note, enqueue and
    dequeue do not guard against underflow or overflow. It’s possible to add an item
    when the queue is full and possible to remove an item when the queue is empty.
    If we added 20 integers (1, 2, 3, …, 20) to the queue and did not dequeue any
    items then values, would overwrite the . We won’t fix this problem right now,
    instead of when we create the multi-threaded version we will ensure enqueue-ing
    and dequeue-ing threads are blocked while the ring buffer is full or empty respectively.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是一个简单的（单线程）实现示例。注意，入队和出队方法没有防止下溢或上溢。当队列已满时，仍然可以添加项目，当队列为空时，仍然可以移除项目。如果我们向队列中添加20个整数（1，2，3，…，20）并且没有出队任何项目，那么值将会覆盖。我们现在不会修复这个问题，而是在创建多线程版本时，我们将确保在环形缓冲区满或空时，入队和出队线程被阻塞。
- en: '[PRE59]'
  id: totrans-294
  prefs: []
  type: TYPE_PRE
  zh: '[PRE59]'
- en: Ring Buffer Gotchas
  id: totrans-295
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 环形缓冲区常见问题
- en: It’s tempting to write the enqueue or dequeue method in the following compact
    form.
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 很容易写出以下紧凑形式的入队或出队方法。
- en: '[PRE60]'
  id: totrans-297
  prefs: []
  type: TYPE_PRE
  zh: '[PRE60]'
- en: This method would appear to work but contains a subtle bug. With more than four
    billion enqueue operations, the int value of will overflow and wrap around to
