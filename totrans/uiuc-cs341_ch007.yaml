  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法看起来似乎可以工作，但包含一个微小的错误。在超过四十亿次enqueue操作之后，int值的将溢出并回绕到0！因此，你可能会最终写入例如！
- en: A compact form is correct uses bit masking provided N is a power of two. (16,32,64,…)
  id: totrans-299
