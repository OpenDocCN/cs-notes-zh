- en: '| Load Addr, Add 1 (i=1 locally) | ... |'
  id: totrans-9
  prefs: []
  type: TYPE_TB
  zh: '| 加载地址，加1（局部i=1） | ... |'
- en: '| Store (i=1 globally) | ... |'
  id: totrans-10
  prefs: []
  type: TYPE_TB
  zh: '| 存储（全局i=1） | ... |'
- en: '| ... | Load Addr, Add 1 (i=2 locally) |'
  id: totrans-11
  prefs: []
  type: TYPE_TB
  zh: '| ... | 加载地址，加1（局部i=2） |'
- en: '| ... | Store (i=2 globally) |'
  id: totrans-12
