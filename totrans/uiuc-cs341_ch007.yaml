- en: '[PRE75]'
  id: totrans-389
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE75]'
- en: What is a counting semaphore? Give me an analogy to a cookie jar/pizza box/limited
    food item.
  id: totrans-390
  prefs:
