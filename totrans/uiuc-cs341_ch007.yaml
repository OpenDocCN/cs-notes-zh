- en: We would like the first pattern of the code being mutually exclusive. Which
    leads us to our first synchronization primitive, a Mutex.
  prefs: []
  type: TYPE_NORMAL
- en: Mutex
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To ensure that only one thread at a time can access a global variable, use a
    mutex – short for Mutual Exclusion. If one thread is currently inside a critical
    section we would like another thread to wait until the first thread is complete.
    A mutex isn’t a primitive in the truest sense, though it is one of the smallest
    that has useful threading API. A mutex also isn’t a data structure. It is an abstract
    data type.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s think about a duck satisfying the mutex api. If someone has the duck then
    they are allowed to access a shared resource! We call it the mutex duck. Everyone
    else has to waddle around and wait. Once someone let’s go of the duck, they have
    to stop interacting with the resource and the next grabber can interact with the
    shared resource. Now you know the origins of the duck.
  prefs: []
  type: TYPE_NORMAL
- en: There are many ways to implement a mutex, and we’ll give a few in this chapter.
    For right now let’s use the black box that the pthread library gives us. Here
    is how we declare a mutex.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Mutex Lifetime
  prefs:
