- en: Introduction
  id: totrans-5
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 简介
- en: 'Queues and stacks (quacks) are data structures for storing and querying elements
    in particular linear orders. Queues and stacks share a common interface:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 队列和栈（quacks）是用于存储和查询特定线性顺序中元素的数据结构。队列和栈共享一个公共接口：
- en: '`push` - adds an element. (For queues, this is also known as `enqueue`)'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`push` - 添加一个元素。（对于队列，这也称为 `enqueue`）'
- en: '`pop` - queries/removes an element. (For queues, this is also known as `dequeue`)'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`pop` - 查询/删除一个元素。（对于队列，这也称为 `dequeue`）'
- en: Queues
  id: totrans-9
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 队列
- en: '![](../Images/d4df8c6aa5216383e87cc757a7b2e530.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d4df8c6aa5216383e87cc757a7b2e530.png)'
- en: A queue returns elements in the order in which they were stored.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 队列返回元素按照它们存储的顺序。
- en: Queues return elements in the order in which they were stored. We call this
    kind of data structure *first-in-first-out (FIFO)*.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 队列返回元素按照它们存储的顺序。我们称这种数据结构为*先进先出（FIFO）*。
- en: Stack
  id: totrans-13
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 栈
- en: '![](../Images/f8d8081d62320eed982da47e8cd09a73.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f8d8081d62320eed982da47e8cd09a73.png)'
- en: A stack outputs elements in the *reverse* order in which they were stored
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 栈以与它们存储的顺序相反的顺序输出元素
- en: Stacks return elements in the reverse order in which they are stored; that is,
    the most recent element to be added is returned. We call this kind of data structure
    *last-in-first-out (LIFO)*.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 栈返回元素按照它们存储的相反顺序；也就是说，最后添加的元素被返回。我们称这种数据结构为*后进先出（LIFO）*。
- en: Implementations
  id: totrans-17
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 实现
- en: Queues and stacks are often implemented with either linked lists or arrays.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 队列和栈通常使用链表或数组实现。
- en: Linked Lists
  id: totrans-19
  prefs:
  - PREF_H6
  type: TYPE_NORMAL
  zh: 链表
- en: '![](../Images/b9d7c7e79232dabc503230187b3ca5df.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b9d7c7e79232dabc503230187b3ca5df.png)'
- en: Enqueueing an element in a linked list implementation of a **queue**
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 在链表实现的**队列**中入队一个元素
- en: '![](../Images/b913c78554833d2c9b611343c4f08f54.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b913c78554833d2c9b611343c4f08f54.png)'
- en: Pushing an element in a linked list implementation of a **stack**
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在链表实现的**栈**中推入一个元素
- en: '![](../Images/528e00e763691fc2a0e8b6c9b74e8138.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/528e00e763691fc2a0e8b6c9b74e8138.png)'
- en: Popping/dequeueing an element in a linked list implementation of a **queue**
    *or* **stack**
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在链表实现的**队列**或**栈**中弹出/出队一个元素
- en: Arrays
  id: totrans-26
  prefs:
  - PREF_H6
  type: TYPE_NORMAL
  zh: 数组
- en: When implementing queues and stacks with arrays, it's important to visualize
    them as "circular" arrays. The beginning and end of an array do not matter to
    a stack or a queue. Simply keep track of the indices that locate the front and
    back of the queue/stack. One of the limitations with this implementation is that
    it gives a limit to the amount of elements the data structure can store.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用数组实现队列和栈时，重要的是将它们视为“环形”数组。数组的开始和结束对于栈或队列来说并不重要。只需跟踪定位队列/栈前后索引即可。这种实现的一个局限性是它限制了数据结构可以存储的元素数量。
- en: '![](../Images/a55cdc63add398c60b262ac928b162f0.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a55cdc63add398c60b262ac928b162f0.png)'
