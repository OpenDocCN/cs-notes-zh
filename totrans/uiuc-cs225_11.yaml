  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 队列/栈的数组实现
- en: '![](../Images/e5d319a92675bfad218f70443038de26.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e5d319a92675bfad218f70443038de26.png)'
- en: A circular array visualization of a queue/stack
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 队列/栈的环形数组可视化
- en: '![](../Images/bc0852ff4af747ec432b91b06a196a76.png)'
  id: totrans-32
