  type: TYPE_IMG
  zh: '![图片](../Images/bc0852ff4af747ec432b91b06a196a76.png)'
- en: The queue/stack wraps around the ends of the array
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 队列/栈绕数组的两端循环
