- en: Introduction
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: 'Queues and stacks (quacks) are data structures for storing and querying elements
    in particular linear orders. Queues and stacks share a common interface:'
  prefs: []
  type: TYPE_NORMAL
- en: '`push` - adds an element. (For queues, this is also known as `enqueue`)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`pop` - queries/removes an element. (For queues, this is also known as `dequeue`)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Queues
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: '![](../Images/d4df8c6aa5216383e87cc757a7b2e530.png)'
  prefs: []
  type: TYPE_IMG
- en: A queue returns elements in the order in which they were stored.
  prefs: []
  type: TYPE_NORMAL
- en: Queues return elements in the order in which they were stored. We call this
    kind of data structure *first-in-first-out (FIFO)*.
  prefs: []
  type: TYPE_NORMAL
- en: Stack
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: '![](../Images/f8d8081d62320eed982da47e8cd09a73.png)'
  prefs: []
  type: TYPE_IMG
- en: A stack outputs elements in the *reverse* order in which they were stored
  prefs: []
  type: TYPE_NORMAL
- en: Stacks return elements in the reverse order in which they are stored; that is,
    the most recent element to be added is returned. We call this kind of data structure
    *last-in-first-out (LIFO)*.
  prefs: []
  type: TYPE_NORMAL
- en: Implementations
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: Queues and stacks are often implemented with either linked lists or arrays.
  prefs: []
  type: TYPE_NORMAL
