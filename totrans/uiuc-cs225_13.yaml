- en: Iterators
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 迭代器
- en: 原文：[https://courses.physics.illinois.edu/cs225/sp2019/notes/iterators/](https://courses.physics.illinois.edu/cs225/sp2019/notes/iterators/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://courses.physics.illinois.edu/cs225/sp2019/notes/iterators/](https://courses.physics.illinois.edu/cs225/sp2019/notes/iterators/)
- en: '[Back to Notes](/cs225/sp2019/notes/)by Nathan Walters'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '[返回笔记](/cs225/sp2019/notes/) by Nathan Walters'
- en: '*Already know the basics of iterators? Skip straight to [a code example](#iterators-in-c),
    [range-based for loops](#range-based-for-loops), or [using iterators with non-linear
    data structures](#moving-beyond-linear-structures).*'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '*已经掌握了迭代器的基础知识？可以直接跳转到[代码示例](#iterators-in-c)，[基于范围的for循环](#range-based-for-loops)，或[使用迭代器处理非线性数据结构](#moving-beyond-linear-structures)。*'
- en: '*## Motivation for iterators'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '*## 迭代器的动机'
- en: In C++ (and in general) we often work with collections of elements—in fact,
    such data structures are the focus of this class! We often want to do something
    with all the elements in a particular data structure, such as “add five to every
    integer in a list” or “print every node in a tree”. The kind of code we write
    to do these iterations often varies a lot depending on the type of data structure
    we’re using. We might need a single for loop for an array, two nested for loops
    for the pixels in an image, or some recursive function calls for a tree.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在C++（以及一般而言）中，我们经常处理元素集合——实际上，这类数据结构正是本课程的重点！我们经常想要对特定数据结构中的所有元素执行某些操作，例如“将列表中的每个整数加五”或“打印树中的每个节点”。我们编写的用于执行这些迭代的代码往往取决于我们使用的数据结构类型。我们可能需要一个for循环来处理数组，两个嵌套的for循环来处理图像中的像素，或者一些递归函数调用来处理树。
- en: An *iterator* provides an abstraction over this process of iterating over some
    elements of a data structure, or *container*. As long as you can define an order
    in which to iterate over the elements in a container, you can write an iterator
    for it! What makes C++ iterators so powerful is that they all have the same interface.
    You could use the exact same code to iterate over a list, 2D array, tree, or graph.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '*迭代器*提供了一种对遍历数据结构中某些元素的过程的抽象。只要你能定义一个遍历容器中元素顺序，你就可以为它编写一个迭代器！使C++迭代器如此强大的原因是它们都具有相同的接口。你可以使用完全相同的代码来遍历列表、二维数组、树或图。'
- en: A conceptual model
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 概念模型
- en: '![](../Images/df588b140354e9d583ba7fd79307ecd1.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/df588b140354e9d583ba7fd79307ecd1.png)'
- en: 'Here we have an array of integers with some iterators represented by purple
    boxes. There are two iterators: one points to the first element in our container,
    and one points to the “one-past-the-end” position of the container’s data. At
    this point, we could ask the iterator “What’s your current element?” and it would
    respond “5”.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个整数数组和一些用紫色框表示的迭代器。有两个迭代器：一个指向我们的容器中的第一个元素，另一个指向容器数据的“超出末尾”位置。在这个点上，我们可以询问迭代器“你的当前元素是什么？”它会回答“5”。
- en: Now, let’s advance the iterator to the next element. As long as the iterator
    isn’t at the “one-past-the-end” position, we can keep advancing it.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们将迭代器前进到下一个元素。只要迭代器不在“超出末尾”的位置，我们就可以继续前进它。
- en: '![](../Images/6d17db8e68172f301470a198a3749fe0.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6d17db8e68172f301470a198a3749fe0.png)'
- en: The iterator would now tell us its current element is “2”. Let’s advance it
    a few more positions to the end of the array.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 现在迭代器会告诉我们它的当前元素是“2”。让我们再前进几个位置到数组的末尾。
- en: '![](../Images/8f9b1a1a2e57c2488f62e81aee6efe36.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8f9b1a1a2e57c2488f62e81aee6efe36.png)'
- en: We can still ask the iterator what element it’s at, and it would say “9”. Now
    let’s advance it one more time.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我们仍然可以询问迭代器它指向的元素，它会回答“9”。现在让我们再前进一次。
- en: '![](../Images/696952d8565212b8c4c72714e1373125.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/696952d8565212b8c4c72714e1373125.png)'
- en: The iterator that started at the beginning of the array is now at the “one-past-the-end”
    position. At this point, we can’t advance the iterator any further, and we also
    can’t check what element the iterator is at; this isn’t defined.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 从数组开头开始的迭代器现在位于“超出末尾”的位置。在这个点上，我们不能再前进迭代器，也无法检查迭代器指向的元素；这是未定义的。
- en: 'This probably looks like your conceptual model of how array iteration already
    works, and it’s indeed largely the same. But remember what makes iterators so
    powerful: they can work on any data structure, not just arrays!'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能看起来像是你对数组迭代的概念模型，确实在很大程度上是相同的。但记住，使迭代器如此强大的原因：它们可以在任何数据结构上工作，而不仅仅是数组！
- en: Iterators in C++
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: C++中的迭代器
- en: Now that you have a high-level of what an iterator is and does, let’s consider
    the following code. It creates a [`std::vector`](https://en.cppreference.com/w/cpp/container/vector)
    of 5 integers and prints them out.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您已经对迭代器是什么以及它做什么有了高层次的理解，让我们考虑以下代码。它创建了一个包含5个整数的`std::vector`并打印出来。
- en: '[PRE0]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'This is using the style of for loop that you’re probably familiar with: initialize
    an index variable to zero and increment it once per iteration until you hit the
    end of the list.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是您可能熟悉的for循环风格：初始化一个索引变量为零，并在每次迭代中递增一次，直到到达列表的末尾。
- en: 'Let’s see what that code would look like if we used iterators instead:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看如果我们使用迭代器，这段代码会是什么样子：
- en: '[PRE1]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: This might look confusing at first; let’s break it down.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能一开始看起来有些令人困惑；让我们将其分解。
- en: First, notice that we declare a variable `it` of type `std::vector<int>::iterator`.
    As you should be able to infer from its type, `it` is the iterator itself! We
    initialize it to `numbers.begin()`. A container that supports iteration has a
    member function called `begin()` that returns an iterator pointing to the first
    element in the container.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，请注意，我们声明了一个类型为`std::vector<int>::iterator`的变量`it`。正如您应该能够从其类型推断出来，`it`本身就是迭代器！我们将其初始化为`numbers.begin()`。支持迭代的容器有一个名为`begin()`的成员函数，它返回一个指向容器中第一个元素的迭代器。
- en: 'Next, we compare `it` with `numbers.end()`. The `end()` function returns an
    iterator that refers to the “one-past-the-end” position of the container. Why
    does it do this? Think of a “classic” for loop over some array `arr`:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们比较`it`与`numbers.end()`。`end()`函数返回一个迭代器，它指向容器中“超过末尾”的位置。为什么它会这样做呢？想象一下对某个数组`arr`的“经典”for循环：
- en: '[PRE2]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: If `arr` has 10 elements, we can only access `arr[0]` through `a[9]`, but we’ll
    check `i < 10` in the for loop. 10 is analagous to the “one-past-the-end” iterator.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 如果`arr`有10个元素，我们只能访问`arr[0]`到`arr[9]`，但在for循环中我们会检查`i < 10`。10与“超过末尾”的迭代器类似。
- en: In the last statement of the for loop, we call `++it`. It might look a bit weird
    to be calling `++` on a non-primitive type; we usually only call it on something
    like an integer. But remember that C++, in all its glorious flexibility, allows
    us to override operators for certain types. In this case, iterators override the
    pre-increment operator. Calling this operator moves the iterator to the “next”
    element in the container.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在for循环的最后一条语句中，我们调用`++it`。在非原始类型上调用`++`看起来可能有点奇怪；我们通常只在整数等类型上调用它。但请记住，C++以其所有辉煌的灵活性，允许我们为某些类型重载运算符。在这种情况下，迭代器重载了前增量运算符。调用这个运算符将迭代器移动到容器中的“下一个”元素。
- en: Now, in the body of the for loop, we use `*it` to access the element in the
    container that `it` currently “points” at. Again, this might look weird—you usually
    only use the `*` operator to dereference pointers. As with `++`, iterators overload
    this operator to mean “give me whatever element you’re at right now”. In this
    way, an iterator behaves a little like a pointer, but remember it isn’t actually
    a pointer itself!
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，在for循环的主体中，我们使用`*it`来访问`it`当前“指向”的容器中的元素。再次强调，这可能会看起来有些奇怪——您通常只使用`*`运算符来解引用指针。与`++`类似，迭代器重载了这个运算符，表示“给我你现在所在的元素”。以这种方式，迭代器表现得有点像指针，但请记住，它本身实际上并不是一个指针！
- en: Range-based for loops
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基于范围的for循环
- en: Compared to the style of for loop you’re used to, iterators might appear to
    be a lot of extra code. Let’s compare our loop again, both without and with iterators.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 与您习惯的for循环风格相比，迭代器可能看起来是多余的代码。让我们再次比较我们的循环，既有迭代器，也没有迭代器。
- en: '[PRE3]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: The second one certainly looks much longer and more unweildy than the first.
    Thankfully, the designers of C++ thought of this and gave us *range-based for
    loops*. Let’s use one to rewrite our previous example.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个看起来显然比第一个长得多，也更难以处理。幸运的是，C++的设计者想到了这一点，并给了我们基于范围的for循环。让我们用这个来重写之前的例子。
- en: '[PRE4]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Much nicer, right? In fact, many people might even prefer this to a “classic”
    for loop with an integer index. You can read the 6th line as “for each integer
    `num` in `numbers`”. For this reason, this style of loop is sometimes called a
    “for-each” loop.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 这看起来是不是更优雅了？事实上，许多人甚至可能更喜欢这种“经典”的for循环，它有一个整数索引。您可以将第6行读作“对于`numbers`中的每个整数`num`”。因此，这种循环风格有时被称为“for-each”循环。
- en: 'This is what we call *syntactic sugar* on top of iterators. It takes advantage
    of the fact that iterators and the containers that provide them have standardized
    interfaces. The compiler sees that `numbers` has `begin()` and `end()` methods
    that return iterators, so it can automatically generate the calls to those functions,
    check if the iterator is equal to `end()`, and call `++` after each iteration.
    In fact, the code that the compiler will generate for this loop is almost exactly
    the same as the more explicit iterator code we saw above. The compiler even automatically
    “dereferences” the iterator for us: note that we can use `num` directly in the
    body of the loop.'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我们所说的在迭代器之上的**语法糖**。它利用了迭代器和提供它们的容器具有标准化接口的事实。编译器看到`numbers`有`begin()`和`end()`方法，这些方法返回迭代器，因此它可以自动生成对这些函数的调用，检查迭代器是否等于`end()`，并在每次迭代后调用`++`。实际上，编译器将为这个循环生成的代码几乎与上面我们看到的更明确的迭代器代码完全相同。编译器甚至可以自动为我们“取消引用”迭代器：注意，我们可以在循环体中直接使用`num`。
- en: Moving beyond linear structures
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 超越线性结构
- en: So far, we’ve only looked at iterators in the context of a `std::vector`, which
    is a linear structure with a well-defined ordering. But iterators can be used
    with others kinds of structures as well, like trees, grids, and graphs. It may
    be less clear what iteration order to use for these structures—in some cases,
    there may be more than one! But we can still implement iterators for any structure
    that we can define some type of traversal over.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们只看了在`std::vector`上下文中的迭代器，它是一个具有良好定义的顺序的线性结构。但迭代器也可以与其他类型的结构一起使用，例如树、网格和图。对于这些结构，可能不清楚应该使用哪种迭代顺序——在某些情况下，可能不止一个！但我们可以为任何我们可以定义某种遍历类型的结构实现迭代器。
- en: Let’s consider a relatively simple example of this. We’ve been working with
    PNGs a lot this semester, and a pretty common task is iterating over all of the
    pixels in a `PNG` object. Let’s think about how we could use iterators to make
    this easier.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑一个相对简单的例子。这个学期我们一直在处理PNG文件，一个相当常见的任务是迭代`PNG`对象中的所有像素。让我们考虑一下我们如何使用迭代器使这个过程更容易。
- en: First, we can define some iteration order over the PNG. If our only goal is
    simply to iterate over every pixel, the order in which we visit pixels doesn’t
    really matter. We could scan row-first, column-first, or even visit the pixels
    randomly. To make things simple, let’s scan row-first. That is, we visit the coordinates
    `(0, 0)`, `(1, 0)`, `(2, 0)`, …, `(0, 1)`, `(1, 1)`, …, and so on.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们可以在PNG上定义一些迭代顺序。如果我们的唯一目标只是迭代每个像素，我们访问像素的顺序并不重要。我们可以按行优先、按列优先，甚至随机访问像素。为了简化问题，让我们按行优先扫描。也就是说，我们访问坐标`(0,
    0)`、`(1, 0)`、`(2, 0)`、……、`(0, 1)`、`(1, 1)`、……，依此类推。
- en: '![](../Images/69cf87cc13fb92b335ff3f918c95f666.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/69cf87cc13fb92b335ff3f918c95f666.png)'
- en: Notice something interesting—unlike with an array, we don’t have a very obvious
    way to define what the “one-past-the-end” position is. And that’s OK! That position
    doesn’t have to correspond with an actual element or position in the container.
    Rather, the semantics just have to be that once we advance an iterator past the
    last element in the container, the iterator is then “equal” to the end iterator.
    So, we can define our end iterator to be some abstract position that’s not on
    the image grid itself.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 注意到一些有趣的事情——与数组不同，我们没有非常明显的方式来定义“超出结束”的位置。这是可以接受的！这个位置不必与容器中的实际元素或位置相对应。相反，语义只需要是这样的：一旦我们推进迭代器超过容器中的最后一个元素，迭代器就“等于”结束迭代器。因此，我们可以定义我们的结束迭代器为一些抽象的位置，它不在图像网格本身上。
- en: '![](../Images/7c78b0d4b332b0fa5c1756e91d002a89.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7c78b0d4b332b0fa5c1756e91d002a89.png)'
- en: We’re starting with the iterator pointing at the first position. Let’s advance
    it one position.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从迭代器指向第一个位置开始。让我们将其向前推进一个位置。
- en: '![](../Images/197a4812658274c2e9015550435badc8.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/197a4812658274c2e9015550435badc8.png)'
- en: If we advance a few more time, we’ll end up on the first column of the second
    row of the image.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们再向前推进几步，我们最终会到达图像的第二行的第一列。
- en: '![](../Images/c6c422586d1703a74b0551c1e0617835.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c6c422586d1703a74b0551c1e0617835.png)'
- en: If we keep going, we’ll end up at the last valid coordinate on the image.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们继续前进，我们将到达图像上的最后一个有效坐标。
- en: '![](../Images/e01e52e4a5318ab610d972f84c34d19a.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e01e52e4a5318ab610d972f84c34d19a.png)'
- en: If we try to advance one more time, our iterator will end up at our “one-past-the-end”
    iterator.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们再尝试向前推进一次，我们的迭代器将结束在“超出结束”的迭代器上。
- en: '![](../Images/f6e00f150fb843e944c825cdf38a937b.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f6e00f150fb843e944c825cdf38a937b.png)'
- en: At this point, we can’t advance any more, so we’re done!
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们无法再进一步，所以这就完成了！
- en: 'We can imagine extending the `PNG` class to support iterators. To do so, we’d
    need to add `begin()` and `end()` methods. We’d also need to define a custom iterator
    with the following properties:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以想象扩展 `PNG` 类以支持迭代器。为此，我们需要添加 `begin()` 和 `end()` 方法。我们还需要定义一个具有以下属性的定制迭代器：
- en: '`operator++` would advance to the coordinates of the next pixel or to the special
    “one-past-the-end” state'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`operator++` 将会移动到下一个像素的坐标或者特殊的状态“one-past-the-end”'
- en: '`operator*` would return a reference to the `HSLAPixel` at the current position'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`operator*` 将返回当前位置 `HSLAPixel` 的引用'
