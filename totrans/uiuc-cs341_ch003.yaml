- en: C Memory Model
  id: totrans-242
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: C内存模型
- en: The C memory model is probably unlike most that you’ve seen before. Instead
    of allocating an object with type safety, we either use an automatic variable
    or request a sequence of bytes with or another family member and later we it.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: C内存模型可能与你之前见过的不同。我们不是用类型安全来分配对象，而是使用自动变量或请求一个字节序列，或者使用另一个家族成员，然后稍后我们再使用它。
- en: Structs
  id: totrans-244
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结构体
- en: In low-level terms, a struct is a piece of contiguous memory, nothing more.
    Just like an array, a struct has enough space to keep all of its members. But
    unlike an array, it can store different types. Consider the contact struct declared
    above.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 在底层术语中，结构体是一块连续的内存，没有更多。就像数组一样，结构体有足够的空间来存储其所有成员。但与数组不同，它可以存储不同类型。考虑上面声明的contact结构体。
- en: '[PRE58]'
  id: totrans-246
  prefs: []
  type: TYPE_PRE
  zh: '[PRE58]'
- en: We will often use the following typedef, so we can write use the struct name
