- en: String.h functions are a series of functions that deal with how to manipulate
    and check pieces of memory. Most of them deal with C-strings. A C-string is a
    series of bytes delimited by a NUL character which is equal to the byte 0x00\.
    [More information about all of these functions](https://linux.die.net/man/3/string).
    Any behavior missing from the documentation, such as the result of is considered
    undefined behavior.
  id: totrans-221
  prefs: []
