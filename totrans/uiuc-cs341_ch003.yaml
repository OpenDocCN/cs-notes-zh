  zh: 要将数据打印到C字符串中，使用或更好。返回写入的字符数，不包括终止字节。我们会使用打印的字符串大小小于提供的缓冲区大小 – 考虑到打印整数，它将永远不会超过11个字符加上空字节。如果printf处理可变参数输入，则使用前面所示的前一个函数更安全。
- en: '[PRE47]'
  id: totrans-205
  prefs: []
  type: TYPE_PRE
  zh: '[PRE47]'
- en: stdin oriented functions
  id: totrans-206
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 以stdin为方向的函数
- en: Standard input or stdin oriented functions read from stdin directly. Most of
    these functions have been deprecated due to them being poorly designed. These
    functions treat stdin as a file from which we can read bytes. One of the most
    notorious offenders is . is deprecated in C99 standard and has been removed from
    the latest C standard (C11). The reason that it was deprecated was that there
    is no way to control the length being read, therefore buffers could get overrun
    easily. When this is done maliciously to hijack program control flow, this is
    known as a buffer overflow.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 标准输入或stdin方向的函数直接从stdin读取。大多数这些函数由于设计不佳而被弃用。这些函数将stdin视为一个我们可以从中读取字节的文件。最臭名昭著的违规者是。它在C99标准中已被弃用，并被从最新的C标准（C11）中删除。它被弃用的原因是无法控制读取的长度，因此缓冲区容易被溢出。当这种操作被恶意用于劫持程序控制流时，这被称为缓冲区溢出。
- en: Programs should use or instead. Here is a quick example of reading at most 10
