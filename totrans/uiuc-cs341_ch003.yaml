  prefs: []
  type: TYPE_NORMAL
- en: '[PRE64]'
  prefs: []
  type: TYPE_PRE
- en: What that zero length array does is point to the **end of the struct** this
    means that the compiler will leave room for all of the elements calculated with
    respect to their size on the operating system (ints, chars, etc). The zero length
    array will take up no bytes of space. Since structs are continuous pieces of memory,
    we can allocate **more** space than required and use the extra space as a place
    to store extra bytes. Although this seems like a parlor trick, it is an important
    optimization because to have a variable length string any other way, one would
    need to have two different memory allocation calls. This is highly inefficient
    for doing something as common in programming as is string manipulation.
  prefs: []
  type: TYPE_NORMAL
- en: Strings in C
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In C, we have [Null Terminated](https://en.wikipedia.org/wiki/Null-terminated_string)
    strings rather than [Length Prefixed](https://en.wikipedia.org/wiki/String_(computer_science)#Length-prefixed)
    for historical reasons. For everyday programmers, remember to NUL terminate your
    string! A string in C is defined as a bunch of bytes ended by ‘’ or the NUL Byte.
  prefs: []
  type: TYPE_NORMAL
- en: Places for strings
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Whenever you define a string literal - one in the form – that string is stored
    in the *data* section. Depending on your architecture, it is **read-only**, meaning
    that any attempt to modify the string will cause a SEGFAULT. One can also declare
    strings to be either in the writable data segment or the stack. To do so, specify
    a length for the string or put brackets instead of a pointer and put in the global
    scope or the function scope for the data segment or the stack respectively. If
    one, however, ’s space, one can change that string to be whatever they want. Forgetting
    to NUL terminate a string has a big effect on the strings! Bounds checking is
    important. The heartbleed bug mentioned earlier in the book is partially because
    of this.
  prefs: []
  type: TYPE_NORMAL
- en: Strings in C are represented as characters in memory. The end of the string
    includes a NUL (0) byte. So "ABC" requires four(4) bytes. The only way to find
    out the length of a C string is to keep reading memory until you find the NUL
    byte. C characters are always exactly one byte each.
  prefs: []
  type: TYPE_NORMAL
- en: String literals are constant
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: A string literal is naturally constant. Any write will cause the operating system
    to produce a SEGFAULT.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE65]'
  prefs: []
  type: TYPE_PRE
- en: String literals are character arrays stored in the read-only data segment of
    the program, which is immutable. Two string literals may share the same space
    in memory. An example follows.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE66]'
  prefs: []
  type: TYPE_PRE
- en: The strings pointed to by and may actually reside in the same location in memory.
  prefs: []
  type: TYPE_NORMAL
- en: Char arrays, however, contain the literal value which has been copied from the
    code segment into either the stack or static memory. These following char arrays
    reside in different memory locations.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE67]'
  prefs: []
  type: TYPE_PRE
- en: Here are some common ways to initialize a string include. Where do they reside
    in memory?
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE68]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE69]'
  prefs: []
  type: TYPE_PRE
- en: We can also print out the pointer and the contents of a C-string easily. Here
    is some boilerplate code to illustrate this.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE70]'
  prefs: []
  type: TYPE_PRE
- en: As mentioned before, the char array is mutable, so we can change its contents.
    Be careful to write within the bounds of the array. C does *not* do bounds checking
    at compile-time, but invalid reads/writes can get your program to crash.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE71]'
  prefs: []
  type: TYPE_PRE
- en: Unlike the array, however, we can change to point to another piece of memory,
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE72]'
  prefs: []
  type: TYPE_PRE
- en: Unlike pointers, that hold addresses to variables on the heap, or stack, char
    arrays (string literals) point to read-only memory located in the data section
    of the program. This means that pointers are more flexible than arrays, even though
    the name of an array is a pointer to its starting address.
  prefs: []
  type: TYPE_NORMAL
- en: In a more common case, pointers will point to heap memory in which case the
    memory referred to by the pointer **can** be modified.
  prefs: []
  type: TYPE_NORMAL
- en: Pointers
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Pointers are variables that hold addresses. These addresses have a numeric value,
    but usually, programmers are interested in the value of the contents at that memory
    address. In this section, we will try to take you through a basic introduction
    to pointers.
  prefs: []
  type: TYPE_NORMAL
- en: Pointer Basics
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Declaring a Pointer
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: A pointer refers to a memory address. The type of the pointer is useful – it
    tells the compiler how many bytes need to be read/written and delineates the semantics
    for pointer arithmetic (addition and subtraction).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE73]'
  prefs: []
  type: TYPE_PRE
- en: Due to C’s syntax, an or any pointer is not actually its own type. You have
    to precede each pointer variable with an asterisk. As a common gotcha, the following
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE74]'
  prefs: []
  type: TYPE_PRE
- en: Will only declare as a pointer. will actually be a regular int variable. To
    fix this declaration, ensure the precedes the pointer.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE75]'
  prefs: []
  type: TYPE_PRE
- en: Keep this in mind for structs as well. If one declares without a typedef, then
    the pointer goes after the type.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE76]'
  prefs: []
  type: TYPE_PRE
- en: Reading / Writing with pointers
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Let’s say that was declared. For the sake of discussion, let us assume that
    contains the memory address . To write to the pointer, it must be dereferenced
    and assigned a value.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE77]'
  prefs: []
  type: TYPE_PRE
- en: What C does is take the type of the pointer which is an and write bytes from
    the start of the pointer, meaning that bytes , , , will all be zero. The number
    of bytes written depends on the pointer type. It is the same for all primitive
    types but structs are a little different.
  prefs: []
  type: TYPE_NORMAL
- en: Reading works roughly the same way, except you put the variable in the spot
    that it needs the value.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE78]'
  prefs: []
  type: TYPE_PRE
- en: 'Reading and writing to non-primitive types gets tricky. The compilation unit
    - usually the file or a header - needs to have the size of the data structure
    readily available. This means that opaque data structures can’t be copied. Here
    is an example of assigning a struct pointer:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE79]'
  prefs: []
  type: TYPE_PRE
- en: As for reading structure pointers, don’t do it directly. Instead, programmers
    create abstractions for creating, copying, and destroying structs. If this sounds
    familiar, it is what C++ originally intended to do before the standards committee
    went off the deep end.
  prefs: []
  type: TYPE_NORMAL
- en: Pointer Arithmetic
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In addition to adding to an integer, pointers can be added to. However, the
    pointer type is used to determine how much to increment the pointer. A pointer
    is moved over by the value added times the size of the underlying type. For char
    pointers, this is trivial because characters are always one byte.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE80]'
  prefs: []
  type: TYPE_PRE
- en: If an int is 4 bytes then ptr+1 points to 4 bytes after whatever ptr is pointing
    at.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE81]'
  prefs: []
  type: TYPE_PRE
- en: Notice how only ’EFGH’ is printed. Why is that? Well as mentioned above, when
    performing ’bna+=1’ we are increasing the **integer** pointer by 1, (translates
    to 4 bytes on most systems) which is equivalent to 4 characters (each character
    is only 1 byte) Because pointer arithmetic in C is always automatically scaled
    by the size of the type that is pointed to, POSIX standards forbid arithmetic
    on void pointers. Having said that, compilers will often treat the underlying
    type as . Here is a machine translation. The following two pointer arithmetic
    operations are equal
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE82]'
  prefs: []
  type: TYPE_PRE
- en: '**Every time you do pointer arithmetic, take a deep breath and make sure that
    you are shifting over the number of bytes you think you are shifting over.**'
  prefs: []
  type: TYPE_NORMAL
- en: So what is a void pointer?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A void pointer is a pointer without a type. Void pointers are used when either
    the datatype is unknown or when interfacing C code with other programming languages
    without APIs. You can think of this as a raw pointer, or a memory address. by
    default returns a void pointer that can be safely promoted to any other type.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE83]'
  prefs: []
  type: TYPE_PRE
- en: C automatically promotes to its appropriate type. and are not totally ISO C
    compliant, meaning that they will permit arithmetic on a void pointer. They will
    treat it as a pointer. Do not do this because it is not portable - it is not guaranteed
    to work with all compilers!
  prefs: []
  type: TYPE_NORMAL
- en: Common Bugs
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Nul Bytes
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: What’s wrong with this code?
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE84]'
  prefs: []
  type: TYPE_PRE
- en: In the above code it simply changes the dest pointer to point to source string.
    Also the NUL bytes are not copied. Here is a better version -
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE85]'
  prefs: []
  type: TYPE_PRE
- en: Note that it is also common to see the following kind of implementation, which
    does everything inside the expression test, including copying the NUL byte. However,
    this is bad style, as a result of doing multiple operations in the same line.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE86]'
  prefs: []
  type: TYPE_PRE
- en: Double Frees
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A double free error is when a program accidentally attempt to free the same
    allocation twice.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE87]'
  prefs: []
  type: TYPE_PRE
- en: The fix is first to write correct programs! Secondly, it is a good habit to
    set pointers to NULL, once the memory has been freed. This ensures that the pointer
    cannot be used incorrectly without the program crashing.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE88]'
  prefs: []
  type: TYPE_PRE
- en: Returning pointers to automatic variables
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[PRE89]'
  prefs: []
  type: TYPE_PRE
- en: Automatic variables are bound to stack memory only for the lifetime of the function.
    After the function returns, it is an error to continue to use the memory.
  prefs: []
  type: TYPE_NORMAL
- en: Insufficient memory allocation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[PRE90]'
  prefs: []
  type: TYPE_PRE
- en: In the above example, we needed to allocate enough bytes for the struct. Instead,
    we allocated enough bytes to hold a pointer. Once we start using the user pointer
    we will corrupt memory. The correct code is shown below.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE91]'
  prefs: []
  type: TYPE_PRE
- en: Buffer overflow/ underflow
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'A famous example: Heart Bleed performed a memcpy into a buffer that was of
    insufficient size. A simple example: implement a strcpy and forget to add one
    to strlen, when determining the size of the memory required.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE92]'
  prefs: []
  type: TYPE_PRE
- en: C fails to check if pointers are valid. The above example writes into which
    is outside the array bounds. This can cause memory corruption because that memory
    location is probably being used for something else. In practice, this can be harder
    to spot because the overflow/underflow may occur in a library call. Here is our
    old friend gets.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE93]'
  prefs: []
  type: TYPE_PRE
- en: Strings require strlen(s)+1 bytes
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Every string must have a NUL byte after the last characters. To store the string
    “Hi” it takes 3 bytes: [H] [i] [\0].'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE94]'
  prefs: []
  type: TYPE_PRE
- en: Using uninitialized variables
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[PRE95]'
  prefs: []
  type: TYPE_PRE
- en: Automatic variables hold garbage or bit pattern that happened to be in memory
    or register. It is an error to assume that it will always be initialized to zero.
  prefs: []
  type: TYPE_NORMAL
- en: Assuming Uninitialized memory will be zeroed
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[PRE96]'
  prefs: []
  type: TYPE_PRE
- en: Automatic (temporary variables) and heap allocations may contain random bytes
    or garbage.
  prefs: []
  type: TYPE_NORMAL
- en: Logic and Program flow mistakes
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: These are a set of mistakes that may let the program compile but perform unintended
    functionality.
  prefs: []
  type: TYPE_NORMAL
- en: Equal vs. Equality
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Confusingly in C, the assignment operator also returns the assigned value. Most
    of the time it is ignored. We can use it to initialize multiple things on the
    same line.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE97]'
  prefs: []
  type: TYPE_PRE
- en: More confusingly, if we forget an equals sign in the equality operator we will
    end up assigning that variable. Most of the time this isn’t what we want to do.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE98]'
  prefs: []
  type: TYPE_PRE
- en: The quick way to fix that is to get in the habit of putting constants first.
    This mistake is common enough in while loop conditions. Most modern compilers
    disallows assigning variables a condition without parenthesis.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE99]'
  prefs: []
  type: TYPE_PRE
- en: There are cases where we want to do it. A common example is getline.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE100]'
  prefs: []
  type: TYPE_PRE
- en: This piece of code calls getline, and assigns the return value or the number
    of bytes read to nread. It also in the same line checks if that value is -1 and
    if so terminates the loop. It is always good practice to put parentheses around
    any assignment condition.
  prefs: []
  type: TYPE_NORMAL
- en: Undeclared or incorrectly prototyped functions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Some snippets of code may do the following.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE101]'
  prefs: []
  type: TYPE_PRE
- en: The system function ‘time’ actually takes a parameter a pointer to some memory
    that can receive the time_t structure or NULL. The compiler fails to catch this
    error because the programmer omitted the valid function prototype by including
    .
  prefs: []
  type: TYPE_NORMAL
- en: More confusingly this could compile, work for decades and then crash. The reason
    for that is that time would be found at link time, not compile-time in the C standard
    library which almost surely is already in memory. Since a parameter isn’t being
    passed, we are hoping the arguments on the stack (any garbage) is zeroed out because
    if it isn’t, time will try to write the result of the function to that garbage
    which will cause the program to SEGFAULT.
  prefs: []
  type: TYPE_NORMAL
- en: Extra Semicolons
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This is a pretty simple one, don’t put semicolons when unneeded.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE102]'
  prefs: []
  type: TYPE_PRE
- en: However, the following code is perfectly OK.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE103]'
  prefs: []
  type: TYPE_PRE
- en: It is OK to have this kind of code because the C language uses semicolons (;)
    to separate statements. If there is no statement in between semicolons, then there
    is nothing to do and the compiler moves on to the next statement To save a lot
    of confusion, **always use braces.** It increases the number of lines of code,
    which is a great productivity metric.
  prefs: []
