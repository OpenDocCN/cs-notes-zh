- en: The C Programming Language
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: C 编程语言
- en: 'Note: This chapter is long and goes into a lot of detail. Feel free to gloss
    over parts with which you have experience in.'
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：本章内容较长，涉及许多细节。如果您对某些部分已有经验，可以自由地略过。
- en: C is the de-facto programming language to do serious system serious programming.
    Why? Most kernels have their API accessible through C. The Linux kernel (Love
    [2010](ch018.xhtml#ref-Love)) and the XNU kernel (Inc. [2017](ch018.xhtml#ref-xnukernel))
    of which MacOS is based on are written in C and have C API - Application Programming
    Interface. The Windows Kernel uses C++, but doing system programming on that is
    much harder on windows that UNIX for novice system programmers. C doesn’t have
    abstractions like classes and Resource Acquisition Is Initialization (RAII) to
    clean up memory. C also gives you much more of an opportunity to shoot yourself
    in the foot, but it lets you do things at a much more fine-grained level.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: C 语言是进行严肃系统编程的事实上的编程语言。为什么？大多数内核都通过 C 语言提供 API。Linux 内核（Love [2010](ch018.xhtml#ref-Love)）和基于
    C 的 XNU 内核（Inc. [2017](ch018.xhtml#ref-xnukernel)），MacOS 就是基于这个内核的，都是用 C 语言编写的，并且提供了
    C API - 应用程序编程接口。Windows 内核使用 C++，但在 Windows 上进行系统编程比 UNIX 对新手系统程序员来说要困难得多。C 语言没有类和资源获取初始化（RAII）这样的抽象，这有助于清理内存。C
    语言也给你提供了更多机会“自食其果”，但它让你能够在更精细的层面上做事。
- en: History of C
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: C 语言的历史
- en: C was developed by Dennis Ritchie and Ken Thompson at Bell Labs back in 1973
    (Ritchie [1993](ch018.xhtml#ref-Ritchie:1993:DCL:155360.155580)). Back then, we
    had gems of programming languages like Fortran, ALGOL, and LISP. The goal of C
    was two-fold. Firstly, it was made to target the most popular computers at the
    time, such as the PDP-7\. Secondly, it tried to remove some of the lower-level
    constructs (managing registers, and programming assembly for jumps), and create
    a language that had the power to express programs procedurally (as opposed to
    mathematically like LISP) with readable code. All this while still having the
    ability to interface with the operating system. It sounded like a tough feat.
    At first, it was only used internally at Bell Labs along with the UNIX operating
    system.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: C 语言是由 Dennis Ritchie 和 Ken Thompson 在 1973 年于贝尔实验室开发的（Ritchie [1993](ch018.xhtml#ref-Ritchie:1993:DCL:155360.155580)）。当时，我们已经有像
    Fortran、ALGOL 和 LISP 这样的编程语言瑰宝。C 语言的目的是双重的。首先，它被设计用来针对当时最流行的计算机，例如 PDP-7。其次，它试图去除一些低级构造（如管理寄存器和编写汇编代码进行跳转），并创建一种能够以可读的代码形式程序化地表达程序（与
    LISP 中的数学化表达相对）的语言。同时，它仍然具有与操作系统接口的能力。这听起来像是一项艰巨的任务。最初，它仅在贝尔实验室内部与 UNIX 操作系统一起使用。
- en: The first "real" standardization was with Brian Kernighan and Dennis Ritchie’s
    book (Kernighan and Ritchie [1988](ch018.xhtml#ref-kernighan1988c)). It is still
    widely regarded today as the only portable set of C instructions. The K&R book
    is known as the de-facto standard for learning C. There were different standards
    of C from ANSI to ISO, though ISO largely won out as a language specification.
    We will be mainly focusing on is the POSIX C library which extends ISO. Now to
    get the elephant out of the room, the Linux kernel is fails to be POSIX compliant.
    Mostly, this is so because the Linux developers didn’t want to pay the fee for
    compliance. It is also because they did not want to be fully compliant with a
    multitude of different standards because that meant increased development costs
    to maintain compliance.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 第一次“真正”的标准化是由 Brian Kernighan 和 Dennis Ritchie 的书籍（Kernighan and Ritchie [1988](ch018.xhtml#ref-kernighan1988c)）实现的。这本书至今仍被广泛认为是唯一的可移植
    C 指令集。K&R 书籍被称为学习 C 的实际标准。虽然从 ANSI 到 ISO 存在着不同的 C 标准，但 ISO 作为一种语言规范在很大程度上取得了胜利。我们将主要关注的是
    POSIX C 库，它扩展了 ISO 标准。现在，为了把大象从房间里请出来，Linux 内核未能符合 POSIX 标准。这主要是因为 Linux 开发者不愿意支付合规费用。这也是因为他们不想完全符合众多不同的标准，因为这意味着维护合规性会增加开发成本。
- en: We will aim to use C99, as it is the standard that most computers recognize,
    but sometimes use some of the newer C11 features. We will also talk about some
    off-hand features like because they are so widely used with the GNU C library.
    We’ll begin by providing a fairly comprehensive overview of the language with
    language facilities. Feel free to gloss over if you have already worked with a
    C based language.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将致力于使用 C99 标准，因为它是大多数计算机都认可的，但有时也会使用一些新的 C11 功能。我们还将讨论一些附带功能，因为它们与 GNU C 库广泛使用。我们将首先提供一个相当全面的关于语言及其功能的概述。如果您已经使用过基于
    C 的语言，可以自由地略过。
- en: Features
  id: totrans-7
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 功能
- en: Speed. There is little separating a program and the system.
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 速度。程序和系统之间几乎没有区别。
- en: Simplicity. C and its standard library comprise a simple set of portable functions.
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 简单性。C 语言及其标准库包含一组简单的可移植函数。
- en: Manual Memory Management. C gives a program the ability to manage its memory.
    However, this can be a downside if a program has memory errors.
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 手动内存管理。C 语言赋予程序管理其内存的能力。然而，如果程序有内存错误，这可能会成为一个缺点。
- en: Ubiquity. Through foreign function interfaces (FFI) and language bindings of
    various types, most other languages can call C functions and vice versa. The standard
    library is also everywhere. C has stood the test of time as a popular language,
    and it doesn’t look like it is going anywhere.
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通用性。通过外函数接口（FFI）和各种类型的语言绑定，大多数其他语言都可以调用 C 函数，反之亦然。标准库无处不在。C 语言作为一门流行的语言，经受了时间的考验，看起来它似乎不会走向何方。
- en: Crash course introduction to C
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: C 语言快速入门
- en: The canonical way to start learning C is by starting with the hello world program.
    The original example that Kernighan and Ritchie proposed way back when hasn’t
    changed.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 学习 C 的经典方式是从“hello world”程序开始。Kernighan 和 Ritchie 很久以前提出的原始示例并没有改变。
- en: '[PRE0]'
  id: totrans-14
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: The directive takes the file (which stands for **st**an**d**ard **i**nput and
    **o**utput) located somewhere in your operating system, copies the text, and substitutes
    it where the was.
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 指令取自操作系统中的文件（代表**标准**输入和输出），复制文本，并将其替换到相应的位置。
- en: The is a function declaration. The first word tells the compiler the return
    type of the function. The part before the parenthesis () is the function name.
    In C, no two functions can have the same name in a single compiled program, although
    shared libraries may be able. Then, the parameter list comes after. When we provide
    the parameter list for regular functions that means that the compiler should produce
    an error if the function is called with a non-zero number of arguments. For regular
    functions having a declaration like means that the function can be called like
    , because there is no delimiter. is a special function. There are many ways of
    declaring but the standard ones are , , and .
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 是一个函数声明。第一个词告诉编译器函数的返回类型。括号()之前的部分是函数名。在 C 语言中，单个编译程序中不能有两个具有相同名称的函数，尽管共享库可能可以。然后是参数列表。当我们为常规函数提供参数列表时，意味着编译器如果函数以非零参数数量被调用，则应产生错误。对于具有类似声明的常规函数，意味着函数可以像这样调用，因为没有分隔符。是一个特殊函数。声明的方式有很多，但标准的方式是
    ， ， 和 。
- en: is what a function call. is defined as a part of . The function has been compiled
    and lives somewhere else on our machine - the location of the C standard library.
    Just remember to include the header and call the function with the appropriate
    parameters (a string literal ). If the newline isn’t included, the buffer will
    not be flushed (i.e. the write will not complete immediately).
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 是一个函数调用。定义为的一部分。该函数已被编译，并位于我们的机器上的其他位置 - C 标准库的位置。只需记住包含头文件，并使用适当的参数（字符串字面量）调用函数。如果不包含换行符，缓冲区将不会被刷新（即写入不会立即完成）。
- en: '. has to return an integer. By convention, means success and anything else
    means failure. Here are some exit codes / statuses with special meaning: [http://tldp.org/LDP/abs/html/exitcodes.html](http://tldp.org/LDP/abs/html/exitcodes.html).
    In general, assume 0 means success.'
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 必须返回一个整数。按照惯例，0 表示成功，其他任何值都表示失败。以下是一些具有特殊意义的退出代码/状态：[http://tldp.org/LDP/abs/html/exitcodes.html](http://tldp.org/LDP/abs/html/exitcodes.html)。一般来说，假设
    0 表示成功。
- en: '[PRE1]'
  id: totrans-19
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: is short for the GNU Compiler Collection which has a host of compilers ready
    for use. The compiler infers from the extension that you are trying to compile
    a .c file.
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 是 GNU 编译器集合的缩写，它包含一系列可供使用的编译器。编译器根据扩展名推断你正在尝试编译一个 .c 文件。
- en: tells your shell to execute the program in the current directory called main.
    The program then prints out "hello world".
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 告诉你的 shell 在当前目录下执行名为 main 的程序。然后程序会打印出 "hello world"。
- en: If systems programming was as easy as writing hello world though, our jobs would
    be much easier.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 如果系统编程像编写“hello world”一样简单，我们的工作就会容易得多。
- en: Preprocessor
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 预处理器
- en: What is the preprocessor? Preprocessing is a copy and paste operation that the
    compiler performs **before** actually compiling the program. The following is
    an example of substitution
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 预处理器是什么？预处理是编译器在**实际编译程序之前**执行的一种复制和粘贴操作。以下是一个替换示例
- en: '[PRE2]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: There are side effects to the preprocessor though. One problem is that the preprocessor
    needs to be able to tokenize properly, meaning trying to redefine the internals
    of the C language with a preprocessor may be impossible. Another problem is that
    they can’t be nested infinitely - there is a bounded depth where they need to
    stop. Macros are also simple text substitutions, without semantics. For example,
    look at what can happen if a macro tries to perform an inline modification.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然预处理程序有一些副作用。一个问题是要能够正确地进行标记化，这意味着尝试使用预处理程序重新定义C语言的内部结构可能是不可行的。另一个问题是它们不能无限嵌套
    - 存在一个有限的深度，它们需要停止。宏也是简单的文本替换，没有语义。例如，看看如果宏尝试执行内联修改会发生什么。
- en: '[PRE3]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Macros are simple text substitution so the above example expands to
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 宏是简单的文本替换，所以上面的例子展开为
- en: '[PRE4]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: In this case, it is opaque what gets printed out, but it will be 6\. Can you
    try to figure out why? Also, consider the edge case when operator precedence comes
    into play.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，打印出的内容是透明的，但将会是6。你能试着找出原因吗？还要考虑当运算符优先级起作用时的边缘情况。
- en: '[PRE5]'
  id: totrans-31
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: There are also logical problems with the flexibility of certain parameters.
    One common source of confusion is with static arrays and the operator.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 某些参数的灵活性也存在逻辑问题。一个常见的混淆来源是与静态数组和运算符。
- en: '[PRE6]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: What is wrong with the macro? Well, it works if a static array is passed in
    because a static array returns the number of bytes that array takes up and dividing
    it by the would give the number of entries. But if passed a pointer to a piece
    of memory, taking the sizeof the pointer and dividing it by the size of the first
    entry won’t always give us the size of the array.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 宏有什么问题？嗯，如果传递了一个静态数组，它就会工作，因为静态数组返回数组占用的字节数，除以它就会给出条目数。但如果传递一个内存块的指针，取指针的sizeof并除以第一个条目的大小，并不总是给出数组的大小。
- en: Language Facilities
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 语言设施
- en: Keywords
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 关键字
- en: C has an assortment of keywords. Here are some constructs that you should know
    briefly as of C99.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: C有一系列的关键字。以下是您应该简要了解的C99中的某些构造。
- en: is a keyword that is used in case statements or looping statements. When used
    in a case statement, the program jumps to the end of the block.
  id: totrans-38
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 是在case语句或循环语句中使用的关键字。当在case语句中使用时，程序会跳转到块的末尾。
- en: '[PRE7]'
  id: totrans-39
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE7]'
- en: In the context of a loop, using it breaks out of the inner-most loop. The loop
    can be either a , , or construct
  id: totrans-40
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在循环的上下文中，使用它会跳出最内层的循环。循环可以是for、while或do-while构造。
- en: '[PRE8]'
  id: totrans-41
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE8]'
- en: is a language level construct that tells the compiler that this data should
    remain constant. If one tries to change a const variable, the program will fail
    to compile. works a little differently when put before the type, the compiler
    re-orders the first type and const. Then the compiler uses a [left associativity
    rule](https://en.wikipedia.org/wiki/Operator_associativity). Meaning that whatever
    is left of the pointer is constant. This is known as const-correctness.
  id: totrans-42
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 是一个语言级构造，告诉编译器该数据应该保持不变。如果尝试更改const变量，程序将无法编译。当放在类型之前时，编译器会重新排序第一个类型和const。然后编译器使用[左结合规则](https://en.wikipedia.org/wiki/Operator_associativity)。这意味着指针左侧的内容是常量。这被称为const-correctness。
- en: '[PRE9]'
  id: totrans-43
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE9]'
- en: But, it is important to know that this is a compiler imposed restriction only.
    There are ways of getting around this, and the program will run fine with defined
    behavior. In systems programming, the only type of memory that you can’t write
    to is system write-protected memory.
  id: totrans-44
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 但是，重要的是要知道这是一个编译器强加的限制。有绕过这个限制的方法，并且程序将以定义良好的行为运行。在系统编程中，唯一不能写入的内存类型是系统写保护的内存。
- en: '[PRE10]'
  id: totrans-45
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE10]'
- en: is a control flow statement that exists only in loop constructions. Continue
    will skip the rest of the loop body and set the program counter back to the start
    of the loop before.
  id: totrans-46
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 是仅存在于循环构造中的控制流语句。Continue会跳过循环主体的其余部分，并将程序计数器设置回循环之前的开始位置。
- en: '[PRE11]'
  id: totrans-47
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE11]'
- en: is another loop construct. These loops execute the body and then check the condition
    at the bottom of the loop. If the condition is zero, the next statement is executed
    – the program counter is set to the first instruction after the loop. Otherwise,
    the loop body is executed.
  id: totrans-48
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 是另一个循环构造。这些循环执行主体并在循环底部检查条件。如果条件为零，则执行下一个语句 - 程序计数器设置为循环之后的第一个指令。否则，循环主体将被执行。
- en: '[PRE12]'
  id: totrans-49
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE12]'
- en: is to declare an enumeration. An enumeration is a type that can take on many,
    finite values. If you have an enum and don’t specify any numerics, the C compiler
    will generate a unique number for that enum (within the context of the current
    enum) and use that for comparisons. The syntax to declare an instance of an enum
    is . The added benefit to this is that the compiler can type check these expressions
    to make sure that you are only comparing alike types.
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 是用来声明枚举的关键字。枚举是一种可以取许多有限值的数据类型。如果你有一个枚举并且没有指定任何数字，C 编译器将为该枚举生成一个唯一的数字（在当前枚举的上下文中），并用于比较。声明枚举实例的语法是
    。这个附加的好处是编译器可以对这些表达式进行类型检查，以确保你只比较相同类型的值。
- en: '[PRE13]'
  id: totrans-51
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE13]'
- en: It is completely possible to assign enum values to either be different or the
    same. It is not advisable to rely on the compiler for consistent numbering, if
    you assign numbers. If you are going to use this abstraction, try not to break
    it.
  id: totrans-52
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 完全可以将枚举值分配为不同或相同的。如果你分配数字，不建议依赖于编译器的一致编号。如果你打算使用这个抽象，尽量别打破它。
- en: '[PRE14]'
  id: totrans-53
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE14]'
- en: is a special keyword that tells the compiler that the variable may be defined
    in another object file or a library, so the program compiles on missing variable
    because the program will reference a variable in the system or another file.
  id: totrans-54
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 是一个特殊的关键字，告诉编译器该变量可能定义在另一个对象文件或库中，因此程序在缺少变量时也能编译，因为程序将引用系统或另一个文件中的变量。
- en: '[PRE15]'
  id: totrans-55
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE15]'
- en: is a keyword that allows you to iterate with an initialization condition, a
    loop invariant, and an update condition. This is meant to be equivalent to a while
    loop, but with differing syntax.
  id: totrans-56
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 是一个允许你使用初始化条件、循环不变式和更新条件进行迭代的关键字。这旨在与 while 循环等价，但语法不同。
- en: '[PRE16]'
  id: totrans-57
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE16]'
- en: As of the C89 standard, one cannot declare variables inside the loop initialization
    block. This is because there was a disagreement in the standard for how the scoping
    rules of a variable defined in the loop would work. It has since been resolved
    with more recent standards, so people can use the for loop that they know and
    love today
  id: totrans-58
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 根据 C89 标准，不能在循环初始化块中声明变量。这是因为关于在循环中定义的变量的作用域规则在标准中存在分歧。随着更近期的标准的出现，这个问题已经得到了解决，因此人们现在可以使用他们今天所熟悉和喜爱的
    for 循环。
- en: '[PRE17]'
  id: totrans-59
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE17]'
- en: The order of evaluation for a loop is as follows
  id: totrans-60
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 循环的评估顺序如下
- en: Perform the initialization statement.
  id: totrans-61
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 执行初始化语句。
- en: Check the invariant. If false, terminate the loop and execute the next statement.
    If true, continue to the body of the loop.
  id: totrans-62
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 检查不变式。如果为假，则终止循环并执行下一个语句。如果为真，则继续到循环体。
- en: Perform the body of the loop.
  id: totrans-63
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 执行循环体。
- en: Perform the update statement.
  id: totrans-64
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 执行更新语句。
- en: Jump to checking the invariant step.
  id: totrans-65
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 跳转到检查不变式步骤。
- en: is a keyword that allows you to do conditional jumps. Do not use in your programs.
    The reason being is that it makes your code infinitely more hard to understand
    when strung together with multiple chains, which is called spaghetti code. It
    is acceptable to use in some contexts though, for example, error checking code
    in the Linux kernel. The keyword is usually used in kernel contexts when adding
    another stack frame for cleanup isn’t a good idea. The canonical example of kernel
    cleanup is as below.
  id: totrans-66
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 是一个允许你进行条件跳转的关键字。不要在你的程序中使用它。原因是当与多个链串在一起时，它会使你的代码难以理解，这被称为意大利面代码。尽管如此，在某些情况下是可以接受的，例如
    Linux 内核中的错误检查代码。当添加另一个堆栈帧进行清理不是一个好主意时，通常在内核上下文中使用该关键字。内核清理的典型例子如下。
- en: '[PRE18]'
  id: totrans-67
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE18]'
- en: are control flow keywords. There are a few ways to use these (1) A bare if (2)
    An if with an else (3) an if with an else-if (4) an if with an else if and else.
    Note that an else is matched with the most recent if. A subtle bug related to
    a mismatched if and else statement, is the [dangling else problem](https://en.wikipedia.org/wiki/Dangling_else).
    The statements are always executed from the if to the else. If any of the intermediate
    conditions are true, the if block performs that action and goes to the end of
    that block.
  id: totrans-68
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 是控制流关键字。有几种使用这些关键字的方法（1）裸 if（2）带有 else 的 if（3）带有 else-if 的 if（4）带有 else if 和
    else 的 if。注意，else 与最近的 if 匹配。与不匹配的 if 和 else 语句相关的一个微妙错误是[悬空 else 问题](https://en.wikipedia.org/wiki/Dangling_else)。语句总是从
    if 执行到 else。如果任何中间条件为真，if 块执行该操作并转到该块的末尾。
- en: '[PRE19]'
  id: totrans-69
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE19]'
- en: is a compiler keyword that tells the compiler it’s okay to omit the C function
    call procedure and "paste" the code in the callee. Instead, the compiler is hinted
    at substituting the function body directly into the calling function. This is
    not always recommended explicitly as the compiler is usually smart enough to know
    when to a function for you.
  id: totrans-70
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 是一个编译器关键字，告诉编译器可以省略 C 函数调用过程并将代码“粘贴”到被调用函数中。相反，编译器被提示直接将函数体替换到调用函数中。这并不总是建议明确这样做，因为编译器通常足够智能，知道何时为你生成函数。
- en: '[PRE20]'
  id: totrans-71
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE20]'
- en: is a keyword that tells the compiler that this particular memory region shouldn’t
    overlap with all other memory regions. The use case for this is to tell users
    of the program that it is undefined behavior if the memory regions overlap. Note
    that memcpy has undefined behavior when memory regions overlap. If this might
    be the case in your program, consider using memmove.
  id: totrans-72
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 是一个关键字，告诉编译器这个特定的内存区域不应与其他所有内存区域重叠。这种用例是告诉程序的用户，如果内存区域重叠，则这是未定义的行为。请注意，当内存区域重叠时，memcpy
    有未定义的行为。如果这种情况可能出现在你的程序中，考虑使用 memmove。
- en: '[PRE21]'
  id: totrans-73
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE21]'
- en: is a control flow operator that exits the current function. If the function
    is then it simply exits the functions. Otherwise, another parameter follows as
    the return value.
  id: totrans-74
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 是一个控制流运算符，用于退出当前函数。如果函数是空的，它就简单地退出函数。否则，另一个参数作为返回值跟随。
- en: '[PRE22]'
  id: totrans-75
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE22]'
- en: is a modifier which is rarely used, but it forces a type to be signed instead
    of unsigned. The reason that this is so rarely used is because types are signed
    by default and need to have the modifier to make them unsigned but it may be useful
    in cases where you want the compiler to default to a signed type such as below.
  id: totrans-76
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 是一个很少使用的修饰符，它强制类型被定义为有符号而不是无符号。这个修饰符之所以很少使用，是因为类型默认是有符号的，需要使用修饰符来将其定义为无符号，但在某些情况下可能很有用，例如当你想让编译器默认使用有符号类型，如下所示。
- en: '[PRE23]'
  id: totrans-77
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE23]'
- en: is an operator that is evaluated at compile-time, which evaluates to the number
    of bytes that the expression contains. When the compiler infers the type the following
    code changes as follows.
  id: totrans-78
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 是一个在编译时评估的运算符，其结果为表达式包含的字节数。当编译器推断类型时，以下代码会发生变化。
- en: '[PRE24]'
  id: totrans-79
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE24]'
- en: '[PRE25]'
  id: totrans-80
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE25]'
- en: Which then the compiler is allowed to operate on further. The compiler must
    have a complete definition of the type at compile-time - not link time - or else
    you may get an odd error. Consider the following
  id: totrans-81
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 然后，编译器可以进一步操作。编译器必须在编译时（而不是链接时）有一个类型的完整定义，否则你可能会得到一个奇怪的错误。考虑以下情况
- en: '[PRE26]'
  id: totrans-82
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE26]'
- en: This code will not compile because sizeof is not able to compile without knowing
    the full declaration of the struct. That is typically why programmers either put
    the full declaration in a header file or we abstract the creation and the interaction
    away so that users cannot access the internals of our struct. Additionally, if
    the compiler knows the full length of an array object, it will use that in the
    expression instead of having it decay into a pointer.
  id: totrans-83
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这段代码无法编译，因为 sizeof 无法在没有知道结构完整声明的情况下编译。这就是为什么程序员要么在头文件中放置完整的声明，要么抽象创建和交互，以便用户无法访问我们结构内部的原因。此外，如果编译器知道数组对象的完整长度，它将使用该长度而不是将其退化成指针。
- en: '[PRE27]'
  id: totrans-84
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE27]'
- en: Be careful, using sizeof for the length of a string!
  id: totrans-85
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 小心，使用 sizeof 来获取字符串长度！
- en: is a type specifier with three meanings.
  id: totrans-86
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 是一个具有三种含义的类型说明符。
- en: When used with a global variable or function declaration it means that the scope
    of the variable or the function is only limited to the file.
  id: totrans-87
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当与全局变量或函数声明一起使用时，表示变量或函数的作用域仅限于文件。
- en: When used with a function variable, that declares that the variable has static
    allocation – meaning that the variable is allocated once at program startup not
    every time the program is run, and its lifetime is extended to that of the program.
  id: totrans-88
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当与函数变量一起使用时，表示该变量具有静态分配，意味着变量在程序启动时只分配一次，而不是每次程序运行时都分配，其生命周期延长到程序的生命周期。
- en: '[PRE28]'
  id: totrans-89
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE28]'
- en: is a keyword that allows you to pair multiple types together into a new structure.
    C-structs are contiguous regions of memory that one can access specific elements
    of each memory as if they were separate variables. Note that there might be padding
    between elements, such that each variable is memory-aligned (starts at a memory
    address that is a multiple of its size).
  id: totrans-90
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 是一个关键字，允许你将多个类型配对组合成一个新的结构。C-struct 是连续的内存区域，可以像访问独立的变量一样访问每个内存中的特定元素。请注意，元素之间可能存在填充，使得每个变量都是内存对齐的（从其大小的倍数开始的内存地址开始）。
- en: '[PRE29]'
  id: totrans-91
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE29]'
- en: Switches are essentially glorified jump statements. Meaning that you take either
    a byte or an integer and the control flow of the program jumps to that location.
    Note that, the various cases of a switch statement fall through. It means that
    if execution starts in one case, the flow of control will continue to all subsequent
    cases, until a break statement.
  id: totrans-92
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 开关语句本质上是一种被美化的跳转语句。这意味着你取一个字节或一个整数，程序的流程控制就会跳转到那个位置。注意，switch语句的各个case会连续执行。这意味着如果执行从一个case开始，控制流将继续到所有后续的case，直到遇到break语句。
- en: '[PRE30]'
  id: totrans-93
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE30]'
- en: If we give a value of 2 then
  id: totrans-94
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 如果我们给一个值为2，那么
- en: '[PRE31]'
  id: totrans-95
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE31]'
- en: One of the more famous examples of this is Duff’s device which allows for loop
    unrolling. You don’t need to understand this code for the purposes of this class,
    but it is fun to look at (Duff, [n.d.](ch018.xhtml#ref-duff)).
  id: totrans-96
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这其中更有名的例子是Duff的设备，它允许循环展开。你不需要为了这门课程理解这段代码，但看看它很有趣（Duff，[n.d.](ch018.xhtml#ref-duff))。
- en: '[PRE32]'
  id: totrans-97
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE32]'
- en: This piece of code highlights that switch statements are goto statements, and
    you can put any code on the other end of a switch case. Most of the time it doesn’t
    make sense, some of the time it just makes too much sense.
  id: totrans-98
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这段代码突出了switch语句是goto语句，你可以在switch case的另一端放置任何代码。大多数时候这没有意义，有时这太过有意义。
- en: declares an alias for a type. Often used with structs to reduce the visual clutter
    of having to write ‘struct’ as part of the type.
  id: totrans-99
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 声明了一个类型的别名。通常与结构体一起使用，以减少在类型中写“struct”时的视觉混乱。
- en: '[PRE33]'
  id: totrans-100
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE33]'
- en: In this class, we regularly typedef functions. A typedef for a function can
    be this for example
  id: totrans-101
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在这个课程中，我们经常使用typedef来定义函数。例如，一个函数的typedef可以是这样的
- en: '[PRE34]'
  id: totrans-102
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE34]'
- en: This declares a function type comparator that accepts two params and returns
    an integer.
  id: totrans-103
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这声明了一个函数类型比较器，它接受两个参数并返回一个整数。
- en: is a new type specifier. A union is one piece of memory that many variables
    occupy. It is used to maintain consistency while having the flexibility to switch
    between types without maintaining functions to keep track of the bits. Consider
    an example where we have different pixel values.
  id: totrans-104
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 是一个新的类型说明符。联合体是一块内存，许多变量都占用这块内存。它用于在保持一致性的同时，具有在类型之间切换的灵活性，而无需维护跟踪位的函数。考虑一个例子，我们有不同的像素值。
- en: '[PRE35]'
  id: totrans-105
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE35]'
- en: is a type modifier that forces behavior in the variables they modify. Unsigned
    can only be used with primitive int types (like and ). There is a lot of behavior
    associated with unsigned arithmetic. For the most part, unless your code involves
    bit shifting, it isn’t essential to know the difference in behavior with regards
    to unsigned and signed arithmetic.
  id: totrans-106
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 是一个类型修饰符，它强制修改它们的变量具有特定行为。无符号类型只能与原始的int类型（如和）一起使用。与无符号算术相关联有很多行为。在大多数情况下，除非你的代码涉及位移动，否则了解无符号和有符号算术之间的行为差异不是必需的。
- en: is a double meaning keyword. When used in terms of function or parameter definition,
    it means that the function explicitly returns no value or accepts no parameter,
    respectively. The following declares a function that accepts no parameters and
    returns nothing.
  id: totrans-107
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 是一个双关语关键字。在函数或参数定义的术语中使用时，它表示函数明确返回没有值或接受没有参数。以下声明了一个不接受参数且不返回任何值的函数。
- en: '[PRE36]'
  id: totrans-108
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE36]'
- en: The other use of is when you are defining an . A pointer is just a memory address.
    It is specified as an incomplete type meaning that you cannot dereference it but
    it can be promoted to any time to any other type. Pointer arithmetic with this
    pointer is undefined behavior.
  id: totrans-109
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 另一个使用指针的场景是当你定义一个类型别名时。指针只是一个内存地址。它被指定为一个不完整的类型，这意味着你不能取消引用它，但它可以被提升为任何其他类型。使用此指针进行指针算术是未定义的行为。
- en: '[PRE37]'
  id: totrans-110
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE37]'
- en: is a compiler keyword. This means that the compiler should not optimize its
    value out. Consider the following simple function.
  id: totrans-111
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 是一个编译器关键字。这意味着编译器不应该优化其值。考虑以下简单的函数。
- en: '[PRE38]'
  id: totrans-112
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE38]'
- en: The compiler may, since the internals of the while loop have nothing to do with
    the flag, optimize it to the following even though a function may alter the data.
  id: totrans-113
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 编译器可能会这样做，因为while循环的内部与标志无关，可以优化为以下形式，即使函数可能会改变数据。
- en: '[PRE39]'
  id: totrans-114
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE39]'
- en: If you use the volatile keyword, the compiler is forced to keep the variable
    in and perform that check. This is useful for cases where you are doing multi-process
    or multi-threaded programs so that we can affect the running of one sequence of
    execution with another.
  id: totrans-115
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 如果你使用volatile关键字，编译器被迫将变量保留在内存中并执行该检查。这在多进程或多线程程序中很有用，这样我们就可以用另一个序列的执行来影响一个序列的运行。
- en: represents the traditional loop. There is a condition at the top of the loop,
    which is checked before every execution of the loop body. If the condition evaluates
    to a non-zero value, the loop body will be run.
  id: totrans-116
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 代表传统的循环。循环顶部有一个条件，在每次执行循环体之前都会检查这个条件。如果条件评估为非零值，则循环体会被执行。
- en: C data types
  id: totrans-117
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: C数据类型
- en: There are many data types in C. As you may realize, all of them are either integers
    or floating point numbers and other types are variations of these.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: C中有许多数据类型。正如你可能意识到的，它们要么是整数，要么是浮点数，其他类型是这些类型的变体。
- en: Represents exactly one byte of data. The number of bits in a byte might vary.
    and are always the same size, which is true for the and versions of all data types.
    This must be aligned on a boundary (meaning you cannot use bits in between two
    addresses). The rest of the types will assume 8 bits in a byte.
  id: totrans-119
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 表示正好一个字节数据。字节中的位数可能不同，但总是相同的大小，这对于所有数据类型的所有版本都是正确的。这必须在边界上对齐（这意味着你无法在两个地址之间使用位）。其余类型将假设一个字节中有8位。
- en: must be at least two bytes. This is aligned on a two byte boundary, meaning
    that the address must be divisible by two.
  id: totrans-120
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 至少需要两个字节。这是在两个字节边界上对齐的，这意味着地址必须是2的倍数。
- en: must be at least two bytes. Again aligned to a two byte boundary (“ISO C Standard”
    [2005](ch018.xhtml#ref-ISON1124) P. 34). On most machines this will be 4 bytes.
  id: totrans-121
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 至少需要两个字节。再次对齐到两个字节边界（“ISO C标准” [2005](ch018.xhtml#ref-ISON1124) 第34页）。在大多数机器上这将是对齐到4个字节。
- en: must be at least four bytes, which are aligned to a four byte boundary. On some
    machines this can be 8 bytes.
  id: totrans-122
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 至少需要四个字节，对齐到四个字节边界。在某些机器上这可以是8个字节。
- en: must be at least eight bytes, aligned to an eight byte boundary.
  id: totrans-123
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 至少需要八个字节，对齐到八个字节边界。
- en: represents an IEEE-754 single precision floating point number tightly specified
    by IEEE (“IEEE Standard for Floating-Point Arithmetic” [2008](ch018.xhtml#ref-4610935)).
    This will be four bytes aligned to a four byte boundary on most machines.
  id: totrans-124
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 代表由IEEE（“IEEE标准浮点算术” [2008](ch018.xhtml#ref-4610935)）紧密指定的IEEE-754单精度浮点数。在大多数机器上，这将是对齐到四个字节边界的四个字节。
- en: represents an IEEE-754 double precision floating point number specified by the
    same standard, which is aligned to the nearest eight byte boundary.
  id: totrans-125
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 代表由同一标准指定的IEEE-754双精度浮点数，对齐到最近的八个字节边界。
- en: If you want a fixed width integer type, for more portable code, you may use
    the types defined in stdint.h, which are of the form [u]int*width*_t, where u
    (which is optional) represents the signedness, and width is any of 8, 16, 32,
    and 64.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你需要一个固定宽度的整数类型，为了更可移植的代码，你可以使用在stdint.h中定义的类型，其形式为[u]int*width*_t，其中u（这是可选的）表示有符号性，而width是8、16、32和64中的任何一个。
- en: Operators
  id: totrans-127
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 操作符
- en: Operators are language constructs in C that are defined as part of the grammar
    of the language. These operators are listed in order of precedence.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 操作符是C语言中作为语言语法一部分定义的语言构造。这些操作符按照优先级顺序列出。
- en: is the subscript operator. where is a number type and is a pointer type.
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是下标操作符。其中是数字类型，是指针类型。
- en: is the structure dereference (or arrow) operator. If you have a pointer to a
    struct , you can use this to access one of its elements. .
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是结构解引用（或箭头）操作符。如果你有一个指向结构的指针，你可以使用这个操作符来访问其元素之一。
- en: is the structure reference operator. If you have an object then you can access
    an element .
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是结构引用操作符。如果你有一个对象，你可以访问一个元素。
- en: is the unary plus and minus operator. They either keep or negate the sign, respectively,
    of the integer or float type underneath.
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是一元加法和减法操作符。它们分别保留或否定整数或浮点类型的符号。
- en: is the dereference operator. If you have a pointer , you can use this to access
    the element located at this memory address. If you are reading, the return value
    will be the size of the underlying type. If you are writing, the value will be
    written with an offset.
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是解引用操作符。如果你有一个指针，你可以使用这个操作符来访问位于这个内存地址的元素。如果你正在读取，返回值将是底层类型的大小。如果你正在写入，值将以偏移量写入。
- en: is the address-of operator. This takes an element and returns its address.
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是取地址操作符。它接受一个元素并返回其地址。
- en: is the increment operator. You can use it as a prefix or postfix, meaning that
    the variable that is being incremented can either be before or after the operator.
    and .
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是增量操作符。你可以将其用作前缀或后缀，这意味着正在增加的变量可以在操作符之前或之后。和。
- en: is the decrement operator. This has the same semantics as the increment operator
    except that it decreases the value of the variable by one.
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是减量操作符。这与增量操作符具有相同的语义，除了它将变量的值减少一个。
- en: is the sizeof operator, that is evaluated at the time of compilation. This is
    also mentioned in the keywords section.
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是sizeof运算符，它在编译时评估。这也在关键字部分提到。
- en: where are the arithmetic binary operators. If the operands are both number types,
    then the operations are plus, minus, times, modulo, and division respectively.
    If the left operand is a pointer and the right operand is an integer type, then
    only plus or minus may be used and the rules for pointer arithmetic are invoked.
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 其中是算术二进制运算符。如果操作数都是数字类型，那么操作分别是加、减、乘、取模和除。如果左操作数是指针而右操作数是整数类型，那么只能使用加或减，并调用指针算术的规则。
- en: are the bit shift operators. The operand on the right has to be an integer type
    whose signedness is ignored unless it is signed negative in which case the behavior
    is undefined. The operator on the left decides a lot of semantics. If we are left
    shifting, there will always be zeros introduced on the right. If we are right
    shifting there are a few different cases
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是位移运算符。右边的操作数必须是一个整数类型，其符号会被忽略，除非它是负数，在这种情况下，行为是未定义的。左边的运算符决定了大量的语义。如果我们进行左移，则右侧总会引入零。如果我们进行右移，则有一些不同的情况
- en: If the operand on the left is signed, then the integer is sign-extended. This
    means that if the number has the sign bit set, then any shift right will introduce
    ones on the left. If the number does not have the sign bit set, any shift right
    will introduce zeros on the left.
  id: totrans-140
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果左边的操作数是有符号的，则整数会被符号扩展。这意味着如果数字设置了符号位，则任何右移都会在左侧引入1。如果数字没有设置符号位，任何右移都会在左侧引入零。
- en: If the operand is unsigned, zeros will be introduced on the left either way.
  id: totrans-141
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果操作数是无符号的，无论哪种方式，都会在左侧引入零。
- en: '[PRE40]'
  id: totrans-142
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE40]'
- en: Note that shifting by the word size (e.g. by 64 in a 64-bit architecture) results
    in undefined behavior.
  id: totrans-143
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 注意，以字大小（例如，在64位架构中以64位）进行位移会导致未定义的行为。
- en: are the greater than equal to/less than equal to, relational operators. They
    work as their name implies.
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是大于等于/小于等于关系运算符。它们按照名称所暗示的那样工作。
- en: are the greater than/less than relational operators. They again do as the name
    implies.
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是大于/小于关系运算符。它们再次按照名称所暗示的那样执行。
- en: are the equal/not equal to relational operators. They once again do as the name
    implies.
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是等于/不等于关系运算符。它们再次按照名称所暗示的那样执行。
- en: is the logical AND operator. If the first operand is zero, the second won’t
    be evaluated and the expression will evaluate to 0\. Otherwise, it yields a 1-0
    value of the second operand.
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是逻辑与运算符。如果第一个操作数是零，则第二个操作数不会被评估，表达式将评估为0。否则，它产生第二个操作数的1-0值。
- en: is the logical OR operator. If the first operand is not zero, then second won’t
    be evaluated and the expression will evaluate to 1\. Otherwise, it yields a 1-0
    value of the second operand.
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是逻辑或运算符。如果第一个操作数不是零，则第二个操作数不会被评估，表达式将评估为1。否则，它产生第二个操作数的1-0值。
- en: is the logical NOT operator. If the operand is zero, then this will return 1\.
    Otherwise, it will return 0.
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是逻辑非运算符。如果操作数是零，则返回1。否则，返回0。
- en: is the bitwise AND operator. If a bit is set in both operands, it is set in
    the output. Otherwise, it is not.
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是按位与运算符。如果两个操作数中都设置了位，则输出中也会设置。否则，它不会设置。
- en: is the bitwise OR operator. If a bit is set in either operand, it is set in
    the output. Otherwise, it is not.
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是按位或运算符。如果任一操作数中设置了位，则输出中也会设置。否则，它不会设置。
- en: is the bitwise NOT operator. If a bit is set in the input, it will not be set
    in the output and vice versa.
  id: totrans-152
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是按位非运算符。如果输入中设置了位，则输出中不会设置，反之亦然。
- en: is the ternary / conditional operator. You put a boolean condition before the
    and if it evaluates to non-zero the element before the colon is returned otherwise
    the element after is. and .
  id: totrans-153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是三元/条件运算符。你将布尔条件放在冒号之前，如果它评估为非零，则返回冒号之前的元素，否则返回冒号之后的元素。
- en: is the comma operator. is evaluated and then is evaluated and is returned. In
    a sequence of multiple statements delimited by commas, all statements are evaluated
    from left to right, and the right-most expression is returned.
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是逗号运算符。先评估，然后评估，并返回。在由逗号分隔的多个语句序列中，从左到右评估所有语句，并返回最右边的表达式。
- en: The C and Linux
  id: totrans-155
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: C和Linux
- en: Up until this point, we’ve covered C’s language fundamentals. We’ll now be focusing
    our attention to C and the POSIX variety of functions available to us to interact
    with the operating systems. We will talk about portable functions, for example
    . We will be evaluating the internals and scrutinizing them under the POSIX models
    and more specifically GNU/Linux. There are several things to that philosophy that
    makes the rest of this easier to know, so we’ll put those things here.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经涵盖了 C 的语言基础。现在，我们将关注 C 和可与我们交互的 POSIX 类型的函数。我们将讨论可移植函数，例如。我们将评估它们的内部结构，并在
    POSIX 模型和更具体的 GNU/Linux 下仔细审查。有几个关于这种哲学的东西使得了解其余部分更容易，所以我们将把这些东西放在这里。
- en: Everything is a file
  id: totrans-157
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 万物皆文件
- en: One POSIX mantra is that everything is a file. Although that has become recently
    outdated, and moreover wrong, it is the convention we still use today. What this
    statement means is that everything is a file descriptor, which is an integer.
    For example, here is a file object, a network socket, and a kernel object. These
    are all references to records in the kernel’s file descriptor table.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 一个 POSIX 口诀是“万物皆文件”。尽管这最近已经过时，而且更加错误，但我们今天仍然使用这个约定。这个声明意味着一切都是文件描述符，它是一个整数。例如，这里有一个文件对象，一个网络套接字，和一个内核对象。这些都是对内核文件描述符表中的记录的引用。
- en: '[PRE41]'
  id: totrans-159
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: And operations on those objects are done through system calls. One last thing
    to note before we move on is that the file descriptors are merely *pointers*.
    Imagine that each of the file descriptors in the example actually refers to an
    entry in a table of objects that the operating system picks and chooses from (that
    is, the file descriptor table). Objects can be allocated and deallocated, closed
    and opened, etc. The program interacts with these objects by using the API specified
    through system calls, and library functions.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 对这些对象的操作是通过系统调用完成的。在我们继续之前，最后要注意的一点是，文件描述符仅仅是*指针*。想象一下，示例中的每个文件描述符实际上都指向操作系统从中选择和选择的对象表中的一个条目（即文件描述符表）。对象可以被分配和释放，关闭和打开等。程序通过使用通过系统调用指定的
    API 和库函数与这些对象交互。
- en: System Calls
  id: totrans-161
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 系统调用
- en: Before we dive into common C functions, we need to know what a system call is.
    If you are a student and have completed HW0, feel free to gloss over this section.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入探讨常见的 C 函数之前，我们需要知道什么是系统调用。如果你是一名学生并且已经完成了 HW0，你可以自由地跳过这一节。
- en: A system call is an operation that the kernel carries out. First, the operating
    system prepares a system call. Next, the kernel executes the system call to the
    best of its ability in kernel space and is a privileged operation. In the previous
    example, we got access to a file descriptor object. We can now also write some
    bytes to the file descriptor object that represents a file, and the operating
    system will do its best to get the bytes written to the disk.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 系统调用是内核执行的操作。首先，操作系统准备一个系统调用。接下来，内核尽其所能地在内核空间执行系统调用，这是一个特权操作。在先前的例子中，我们获得了文件描述符对象的访问权限。现在我们也可以向代表文件的文件描述符对象写入一些字节，操作系统将尽力将这些字节写入磁盘。
- en: '[PRE42]'
  id: totrans-164
  prefs: []
  type: TYPE_PRE
  zh: '[PRE42]'
- en: 'When we say the kernel tries its best, this includes the possibility that the
    operation could fail for several reasons. Some of them are: the file is no longer
    valid, the hard drive failed, the system was interrupted etc. The way that a programmer
    communicates with the outside system is with system calls. An important thing
    to note is that system calls are expensive. Their cost in terms of time and CPU
    cycles has recently been decreased, but try to use them as sparingly as possible.'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们说内核尽力而为时，这包括操作可能因多种原因失败的可能性。其中一些原因是：文件不再有效，硬盘故障，系统中断等。程序员与外部系统通信的方式是通过系统调用。需要注意的是，系统调用是昂贵的。它们在时间和CPU周期上的成本最近已经降低，但尽可能少地使用它们。
- en: C System Calls
  id: totrans-166
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: C 系统调用
- en: Many C functions that will be discussed in the next sections are abstractions
    that call the correct underlying system call, based on the current platform. Their
    Windows implementation, for example, may be entirely different from that of other
    operating systems. Nevertheless, we will be studying these in the context of their
    Linux implementation.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中将要讨论的许多 C 函数都是抽象，它们根据当前平台调用正确的底层系统调用。例如，它们的 Windows 实现可能与其他操作系统完全不同。尽管如此，我们将从它们的
    Linux 实现的角度来研究这些函数。
- en: Common C Functions
  id: totrans-168
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 常见 C 函数
- en: To find more information about any functions, please use the man pages. Note
    the man pages are organized into sections. Section 2 are System calls. Section
    3 are C libraries. On the web, Google . In the shell, or
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 要获取有关任何函数的更多信息，请使用手册页。注意，手册页组织成几个部分。第2部分是系统调用。第3部分是C库。在网上，使用Google。在shell中，或
- en: Handling Errors
  id: totrans-170
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 错误处理
- en: Before we get into the nitty gritty of all the functions, know that most functions
    in C handle errors return oriented. This is at odds with programming languages
    like C++ or Java where the errors are handled with exceptions. There are a number
    of arguments against exceptions.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入所有函数的细节之前，要知道在C中，大多数处理错误返回的函数与像C++或Java这样的编程语言中用异常处理错误的方法相矛盾。有多个反对异常的论点。
- en: Exceptions make control flow harder to understand.
  id: totrans-172
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 异常使控制流程更难以理解。
- en: Exception oriented languages need to keep stack traces and maintain jump tables.
  id: totrans-173
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 异常导向的语言需要保留堆栈跟踪和维护跳转表。
- en: Exceptions may be complex objects.
  id: totrans-174
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 异常可能是复杂对象。
- en: There are a few arguments for exceptions as well
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 关于异常也有一些论点
- en: Exceptions can come from several layers deep.
  id: totrans-176
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 异常可能来自多层深处。
- en: Exceptions help reduce global state.
  id: totrans-177
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 异常有助于减少全局状态。
- en: Exceptions differentiate business logic and normal flow.
  id: totrans-178
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 异常区分业务逻辑和正常流程。
- en: Whatever the pros/cons are, we use the former because of backwards compatibility
    with languages like FORTRAN (“FORTRAN IV PROGRAMMER’S REFERENCE MANUAL” [1972](ch018.xhtml#ref-fortran72)
    P. 84). Each thread will get a copy of because it is stored at the top of each
    thread’s stack – more on threads later. One makes a call to a function that could
    return an error and if that function returns an error according to the man pages,
    it is up to the programmer to check errno.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 无论优点/缺点如何，我们使用前者是因为与像FORTRAN这样的语言向后兼容（“FORTRAN IV PROGRAMMER’S REFERENCE MANUAL”
    [1972](ch018.xhtml#ref-fortran72) P. 84）。每个线程都会得到一个副本，因为它存储在每个线程堆栈的顶部——关于线程的更多内容将在后面讨论。当调用一个可能返回错误的函数时，如果该函数根据手册页返回错误，则程序员需要检查errno。
- en: '[PRE43]'
  id: totrans-180
  prefs: []
  type: TYPE_PRE
  zh: '[PRE43]'
- en: There is a shortcut function that prints the english description of errno. Also,
    a function may return the error code in the return value itself.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 有一个快捷函数可以打印errno的英文描述。此外，一个函数可能将其错误代码作为返回值本身返回。
- en: '[PRE44]'
  id: totrans-182
  prefs: []
  type: TYPE_PRE
  zh: '[PRE44]'
- en: Be sure to check the man page for return code characteristics.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 一定要检查手册页以了解返回代码的特征。
- en: Input / Output
  id: totrans-184
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 输入/输出
- en: 'In this section we will cover all the basic input and output functions in the
    standard library with references to system calls. Every process has three streams
    of data when it starts execution: standard input (for program input), standard
    output (for program output), and standard error (for error and debug messages).
    Usually, standard input is sourced from the terminal in which the program is being
    run in, and standard out is the same terminal. However, a programmer can use redirection
    such that their program can send output and/or receive input, to and from a file,
    or other programs.'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将涵盖标准库中的所有基本输入和输出函数，并参考系统调用。每个进程在开始执行时都有三个数据流：标准输入（用于程序输入）、标准输出（用于程序输出）和标准错误（用于错误和调试消息）。通常，标准输入来自运行程序的终端，而标准输出是相同的终端。然而，程序员可以使用重定向，使他们的程序能够将输出和/或输入发送到文件或其他程序。
- en: They are designated by the file descriptors 0 and 1 respectively. 2 is reserved
    for standard error which by library convention is unbuffered (i.e. IO operations
    are performed immediately).
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 它们分别由文件描述符0和1指定。2保留用于标准错误，按照库的惯例是不缓存的（即IO操作立即执行）。
- en: stdout oriented streams
  id: totrans-187
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 以stdout为导向的流
- en: Standard output or stdout oriented streams are streams whose only options are
    to write to stdout. is the function with which most people are familiar in this
    category. The first parameter is a format string that includes placeholders for
    the data to be printed. Common format specifiers are the following
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 标准输出或stdout导向的流是只有写入stdout选项的流。这是大多数人熟悉的此类函数。第一个参数是一个包含要打印的数据占位符的格式字符串。常见的格式说明符如下
- en: treat the argument as a c string pointer, keep printing all characters until
    the NULL-character is reached
  id: totrans-189
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将参数视为C字符串指针，持续打印所有字符，直到遇到NULL字符。
- en: prints the argument as an integer
  id: totrans-190
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将参数打印为整数。
- en: print the argument as a memory address.
  id: totrans-191
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将参数打印为内存地址。
- en: For performance, buffers data until its cache is full or a newline is printed.
    Here is an example of printing things out.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 为了性能，缓冲数据直到其缓存满或打印换行符。以下是一个打印内容的示例。
- en: '[PRE45]'
  id: totrans-193
  prefs: []
  type: TYPE_PRE
  zh: '[PRE45]'
- en: From the previous section, calls the system call . is a C library function,
    while is a system call system.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 从上一节中，调用系统调用。是C库函数，而则是系统调用system。
- en: The buffering semantics of printf is a little complicated. ISO defines three
    types of streams (“ISO C Standard” [2005](ch018.xhtml#ref-ISON1124) P. 278)
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: printf的缓冲语义稍微复杂一些。ISO定义了三种类型的流（“ISO C标准” [2005](ch018.xhtml#ref-ISON1124) 第278页）
- en: Unbuffered, where the contents of the stream reach their destination as soon
    as possible.
  id: totrans-196
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无缓冲，其中流的内容尽可能快地到达目的地。
- en: Line Buffered, where the contents of the stream reach their destination as soon
    as a newline is provided.
  id: totrans-197
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 行缓冲，其中流的内容一旦提供换行符就会到达目的地。
- en: Fully Buffered, where the contents of the stream reach their destination as
    soon as the buffer is full.
  id: totrans-198
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 完全缓冲，其中流的内容一旦缓冲区满就会到达目的地。
- en: Standard Error is defined as “not fully buffered” (“ISO C Standard” [2005](ch018.xhtml#ref-ISON1124)
    P. 279). Standard Output and Input are merely defined to be fully buffered if
    and only if the stream destination is not an interactive device. Usually, standard
    error will be unbuffered, standard input and output will be line buffered if the
    output is a terminal otherwise fully buffered. This relates to printf because
    printf merely uses the abstraction provided by the FILE interface and uses the
    above semantics to determine when to write. One can force a write by calling fflush()
    on the stream.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 标准错误被定义为“非完全缓冲”（“ISO C标准” [2005](ch018.xhtml#ref-ISON1124) 第279页）。标准输出和输入仅当流目的地不是交互式设备时才被定义为完全缓冲。通常，标准错误将不被缓冲，如果输出是终端，则标准输入和输出将是行缓冲，否则是完全缓冲。这与printf有关，因为printf仅使用FILE接口提供的抽象，并使用上述语义来确定何时写入。可以通过在流上调用fflush()来强制写入。
- en: To print strings and single characters, use and
  id: totrans-200
