  zh: String.h函数是一系列处理如何操作和检查内存片段的函数。大多数函数都处理C字符串。C字符串是一系列以NUL字符（等于字节0x00）分隔的字节。有关所有这些函数的更多信息（https://linux.die.net/man/3/string）。文档中未提及的行为，如的结果，被认为是未定义的行为。
