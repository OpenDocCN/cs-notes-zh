- en: C Memory Model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The C memory model is probably unlike most that you’ve seen before. Instead
    of allocating an object with type safety, we either use an automatic variable
    or request a sequence of bytes with or another family member and later we it.
  prefs: []
  type: TYPE_NORMAL
- en: Structs
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In low-level terms, a struct is a piece of contiguous memory, nothing more.
    Just like an array, a struct has enough space to keep all of its members. But
    unlike an array, it can store different types. Consider the contact struct declared
    above.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE58]'
  prefs: []
  type: TYPE_PRE
- en: We will often use the following typedef, so we can write use the struct name
    as the full type.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE59]'
  prefs: []
  type: TYPE_PRE
- en: If you compile the code without any optimizations and reordering, you can expect
    the addresses of each of the variables to look like this.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE60]'
  prefs: []
  type: TYPE_PRE
- en: All your compiler does is say "reserve this much space". Whenever a read or
    write occurs in the code, the compiler will calculate the offsets of the variable.
    The offsets are where the variable starts at. The phone variables starts at the
    th bytes and continues for sizeof(int) bytes with this compiler. **Offsets don’t
    determine where the variable ends though**. Consider the following hack seen in
    a lot of kernel code.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE61]'
  prefs: []
  type: TYPE_PRE
- en: Currently, our memory looks like the following image. There is nothing in those
    boxes
