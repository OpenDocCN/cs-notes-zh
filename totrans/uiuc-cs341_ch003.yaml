- en: So what happens when we assign length? The first four boxes are filled with
    the value of the variable at length. The rest of the space is left untouched.
    We will assume that our machine is big endian. This means that the least significant
    byte is last.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE62]'
  prefs: []
  type: TYPE_PRE
- en: '![Struct pointing to 11 boxes, 4 filled with 0006, 7 junk](../media/file1.png)'
