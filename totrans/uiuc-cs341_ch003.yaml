- en: The buffering semantics of printf is a little complicated. ISO defines three
    types of streams (“ISO C Standard” [2005](ch018.xhtml#ref-ISON1124) P. 278)
  prefs: []
  type: TYPE_NORMAL
- en: Unbuffered, where the contents of the stream reach their destination as soon
    as possible.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Line Buffered, where the contents of the stream reach their destination as soon
    as a newline is provided.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Fully Buffered, where the contents of the stream reach their destination as
    soon as the buffer is full.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Standard Error is defined as “not fully buffered” (“ISO C Standard” [2005](ch018.xhtml#ref-ISON1124)
    P. 279). Standard Output and Input are merely defined to be fully buffered if
    and only if the stream destination is not an interactive device. Usually, standard
    error will be unbuffered, standard input and output will be line buffered if the
    output is a terminal otherwise fully buffered. This relates to printf because
    printf merely uses the abstraction provided by the FILE interface and uses the
    above semantics to determine when to write. One can force a write by calling fflush()
    on the stream.
