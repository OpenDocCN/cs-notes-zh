- en: Processes
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 进程
- en: 'To understand what a process is, you need to understand what an operating system
    is. An operating system is a program that provides an interface between hardware
    and user software as well as providing a set of tools that the software can use.
    The operating system manages hardware and gives user programs a uniform way of
    interacting with hardware as long as the operating system can be installed on
    that hardware. Although this idea sounds like it is the end-all, we know that
    there are many different operating systems with their own quirks and standards.
    As a solution to that, there is another layer of abstraction: POSIX or portable
    operating systems interface. This is a standard (or many standards now) that an
    operating system must implement to be POSIX compatible – most systems that we’ll
    be studying are almost POSIX compatible due more to political reasons.'
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 要理解什么是进程，你需要了解什么是操作系统。操作系统是一个程序，它提供了硬件和用户软件之间的接口，同时也提供了一套软件可以使用的一系列工具。操作系统管理硬件，并给用户程序提供了一种统一的方式与硬件交互，只要操作系统可以安装在该硬件上。尽管这个想法听起来像是终极解决方案，但我们知道有许多不同的操作系统，它们都有自己的怪癖和标准。为了解决这个问题，存在另一层抽象：POSIX或可移植操作系统接口。这是一个标准（现在可能有多个标准）——操作系统必须实现以成为POSIX兼容——我们将要研究的几乎所有系统几乎都是POSIX兼容的，这更多是由于政治原因。
- en: 'Before we talk about POSIX systems, we should understand what the idea of a
    kernel is generally. In an operating system (OS), there are two spaces: kernel
    space and user space. Kernel space is a power operating mode that allows the system
    to interact with the hardware and has the potential to destroy your machine. User
    space is where most applications run because they don’t need this level of power
    for every operation. When a user space program needs additional power, it interacts
    with the hardware through a system call that is conducted by the kernel. This
    adds a layer of security so that normal user programs can’t destroy your entire
    operating system. For the purposes of our class, we’ll talk about single machine
    multiple user operating systems. This is where there is a central clock on a standard
    laptop or desktop. Other OSes relax the central clock requirement (distributed)
    or the “standardness” of the hardware (embedded systems). Other invariants make
    sure events happen at particular times too.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们讨论POSIX系统之前，我们应该了解内核的一般概念。在操作系统（OS）中，有两个空间：内核空间和用户空间。内核空间是一种强大的操作模式，允许系统与硬件交互，并有可能破坏你的机器。用户空间是大多数应用程序运行的地方，因为它们不需要这种级别的权力来进行每个操作。当用户空间程序需要额外的权力时，它通过内核执行的系统调用来与硬件交互。这增加了一层安全性，以确保普通用户程序不能破坏你的整个操作系统。为了我们课程的目的，我们将讨论单机多用户操作系统。这就是在标准笔记本电脑或台式机上有一个中央时钟的地方。其他操作系统放宽了中央时钟的要求（分布式）或硬件的“标准化”（嵌入式系统）。其他不变量确保事件在特定时间发生。
- en: The operating system is made up of many different pieces. There may be a program
    running to handle incoming USB connections, another one to stay connected to the
    network, etc. The most important one is the kernel – although it might be a set
    of processes – which is the heart of the operating system. The kernel has many
    important tasks. The first of which is booting.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 操作系统由许多不同的部分组成。可能有程序在运行以处理传入的USB连接，另一个程序保持连接到网络等。最重要的是内核——尽管它可能是一组进程——它是操作系统的核心。内核有许多重要的任务。其中第一个是引导。
- en: The computer hardware executes code from read-only memory, called firmware.
  id: totrans-4
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 计算机硬件从只读存储器中执行代码，称为固件。
- en: The firmware executes a bootloader, which often conforms to the Extensible Firmware
    Interface (), which is an interface between the system firmware and the operating
    system.
  id: totrans-5
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 固件执行引导加载程序，它通常符合可扩展固件接口（），这是系统固件和操作系统之间的接口。
- en: The bootloader’s boot manager loads the operating system kernels, based on the
    boot settings.
  id: totrans-6
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 引导加载程序的引导管理器根据引导设置加载操作系统内核。
- en: Your kernel executes to [bootstrap](https://en.wikipedia.org/wiki/Bootstrapping)
    itself from nothing.
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你的内核从无到有执行[引导](https://en.wikipedia.org/wiki/Bootstrapping)自身。
- en: The kernel executes startup scripts like starting networking and USB handling.
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 内核执行启动脚本，如启动网络和USB处理。
- en: The kernel executes userland scripts like starting a desktop, and you get to
    use your computer!
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 内核执行用户空间脚本，如启动桌面，然后你可以使用你的计算机！
- en: When a program is executing in user space, the kernel provides some important
    services to programs in User space.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 当一个程序在用户空间执行时，内核为用户空间中的程序提供一些重要的服务。
- en: Scheduling processes and threads
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 调度进程和线程
- en: Handling synchronization primitives (futexes, mutexes, semaphores, etc.)
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 处理同步原语（futexes、互斥锁、信号量等）
- en: Providing system calls such as or
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供系统调用，如或
- en: Managing virtual memory and low-level binary devices such as drivers
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 管理虚拟内存和低级二进制设备，如驱动程序
- en: Managing filesystems
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 管理文件系统
- en: Handling communication over networks
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 处理网络上的通信
- en: Handling communication between processes
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 处理进程间的通信
- en: Dynamically linking libraries
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 动态链接库
- en: The list goes on and on.
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列表可以一直继续下去。
- en: The kernel creates the first process (an alternative is system.d). *init.d*
    boots up programs such as graphical user interfaces, terminals, etc – by default,
    this is the only process explicitly created by the system. All other processes
    are instantiated by using the system calls and from that single process.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 内核创建第一个进程（另一种选择是system.d）。*init.d* 启动程序，如图形用户界面、终端等——默认情况下，这是系统创建的唯一一个显式进程。所有其他进程都是通过系统调用和从单个进程实例化而来的。
- en: File Descriptors
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 文件描述符
- en: Although these were mentioned in the last chapter, we are going to give a quick
    reminder about file descriptors. A zine from Julia Evans gives some more details
    (Evans [2018](ch018.xhtml#ref-evans_2018)).
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这些在上一个章节中已经提到，但我们将快速回顾一下文件描述符。Julia Evans的一本小册子提供了更多细节（Evans [2018](ch018.xhtml#ref-evans_2018)）。
- en: 'The kernel keeps track of the file descriptors and what they point to. Later
    we will learn two things: that file descriptors point to more than files and that
    the operating system keeps track of them.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 内核跟踪文件描述符及其指向的内容。稍后我们将学习两个要点：文件描述符指向的不仅仅是文件，操作系统还跟踪它们。
- en: Notice that file descriptors may be reused between processes, but inside of
    a process, they are unique. File descriptors may have a notion of position. These
    are known as seekable streams. A program can read a file on disk completely because
    the OS keeps track of the position in the file, an attribute that belongs to your
    process as well.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，文件描述符可以在进程之间重用，但在进程内部，它们是唯一的。文件描述符可能有一个位置的概念。这些被称为可寻址流。程序可以完全读取磁盘上的文件，因为操作系统跟踪文件中的位置，这个属性也属于你的进程。
- en: Other file descriptors point to network sockets and various other pieces of
    information, that are unseekable streams.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 其他文件描述符指向网络套接字和各种其他信息，这些是不可寻址流。
- en: Processes
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 进程
- en: 'A process is an instance of a computer program that may be running. Processes
    have many resources at their disposal. At the start of each program, a program
    gets one process, but each program can make more processes. A program consists
    of the following:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 进程是计算机程序可能正在运行的实例。进程拥有许多可用的资源。每个程序的开始时，程序会获得一个进程，但每个程序可以创建更多的进程。程序由以下部分组成：
- en: 'A binary format: This tells the operating system about the various sections
    of bits in the binary – which parts are executable, which parts are constants,
    which libraries to include etc.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 二进制格式：这告诉操作系统关于二进制中各个位段的详细信息——哪些部分是可执行的，哪些部分是常量，哪些库需要包含等。
- en: A set of machine instructions
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一组机器指令
- en: A number denoting which instruction to start from
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 表示从哪个指令开始的一个数字
- en: Constants
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 常量
- en: Libraries to link and where to fill in the address of those libraries
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 链接库以及在哪里填写这些库的地址
- en: Processes are powerful, but they are isolated!
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 进程很强大，但它们是隔离的！
- en: That means that by default, no process can communicate with another process.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着默认情况下，没有进程可以与另一个进程通信。
- en: This is important because in complex systems (like the University of Illinois
    Engineering Workstations), it is likely that different processes will have different
    privileges. One certainly doesn’t want the average user to be able to bring down
    the entire system, by either purposely or accidentally modifying a process. As
    most of you have realized by now, if you stuck the following code snippet into
    a program, the variables are unshared between two parallel invocations of the
    program.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 这很重要，因为在复杂的系统（如伊利诺伊大学工程工作站）中，不同的进程可能具有不同的权限。当然不希望普通用户能够通过故意或意外修改进程来使整个系统崩溃。正如你们大多数人现在所意识到的那样，如果你将以下代码片段放入程序中，两个并行调用的程序变量之间是不共享的。
- en: '[PRE0]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: On two different terminals, they would both print out 1 not 2\. Even if we changed
    the code to attempt to affect other process instances, there would be no way to
    change another process’ state unintentionally. However, there are other intentional
    ways to change the program states of other processes.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在两个不同的终端上，它们都会打印出1而不是2。即使我们更改代码以尝试影响其他进程实例，也无法无意中改变另一个进程的状态。然而，还有其他有意改变其他进程程序状态的方法。
- en: Process Contents
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 进程内容
- en: Memory Layout
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 内存布局
- en: When a process starts, it gets its own address space. Each process gets the
    following.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 当一个进程启动时，它会获得自己的地址空间。每个进程都会得到以下内容。
- en: '**A Stack**'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**栈**'
- en: The stack is the place where automatically allocated variables and function
    call return addresses are stored. Every time a new variable is declared, the program
    moves the stack pointer down to reserve space for the variable. This segment of
    the stack is writable but not executable. This behavior is controlled by the no-execute
    (NX) bit, sometimes called the W^X (write XOR execute) bit, which helps prevent
    malicious code, such as from being run on the stack.
  id: totrans-42
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 栈是自动分配的变量和函数调用返回地址存储的地方。每次声明一个新的变量时，程序都会将栈指针向下移动以为该变量预留空间。这个栈段是可写的，但不可执行。这种行为由不可执行（NX）位控制，有时称为W^X（写
    XOR 执行）位，有助于防止恶意代码，例如在栈上运行。
- en: If the stack grows too far – meaning that it either grows beyond a preset boundary
    or intersects the heap – the program will stack overflow error, most likely resulting
    in a SEGFAULT. **The stack is statically allocated by default; there is only a
    certain amount of space to which one can write.**
  id: totrans-43
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 如果栈增长得太远——意味着它要么超过了预设的边界，要么与堆相交——程序将出现栈溢出错误，这很可能会导致SEGFAULT。**默认情况下，栈是静态分配的；可以写入的空间是有限的。**
- en: '**A Heap**'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**堆**'
- en: The heap is a contiguous, expanding region of memory (“Overview of Malloc” [2018](ch018.xhtml#ref-mallocinternals)).
    If a program wants to allocate an object whose lifetime is manually controlled
    or whose size cannot be determined at compile-time, it would want to create a
    heap variable.
  id: totrans-45
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 堆是内存中一个连续的、可扩展的区域（“malloc概述” [2018](ch018.xhtml#ref-mallocinternals)）。如果一个程序想要分配一个其生命周期是手动控制的或其大小在编译时无法确定的对象，它就会想要创建一个堆变量。
- en: The heap starts at the top of the text segment and grows upward, meaning may
    push the heap boundary – called the program break – upward.
  id: totrans-46
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 堆从文本段的顶部开始，向上增长，这意味着它可能会将堆边界（称为程序断点）向上推。
- en: We will explore this in more depth in our chapter on memory allocation. This
    area is also writable but not executable. One can run out of heap memory if the
    system is constrained or if a program run out of addresses, a phenomenon that
    is more common on a 32-bit system.
  id: totrans-47
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 我们将在关于内存分配的章节中更深入地探讨这个问题。这个区域也是可写的，但不可执行。如果系统受限或程序耗尽了地址，就会耗尽堆内存，这种现象在32位系统上更为常见。
- en: '**A Data Segment**'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据段**'
- en: This segment contains two parts, an initialized data segment, and an uninitialized
    segment. Furthermore, the initialized data segment is divided into a readable
    and writable section.
  id: totrans-49
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这个段包含两部分，一个初始化数据段和一个未初始化段。此外，初始化数据段被分为可读和可写部分。
- en: '**Initialized Data Segment** This contains all of a program’s globals and any
    other static variables.'
  id: totrans-50
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**初始化数据段** 这包含了程序的所有全局变量以及任何其他静态变量。'
- en: This section starts at the end of the text segment and starts at a constant
    size because the number of globals is known at compile time. The end of the data
    segment is called the and can be extended via the use of brk / sbrk.
  id: totrans-51
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这个部分从文本段的末尾开始，并且因为全局变量的数量在编译时是已知的，所以它的大小是固定的。数据段的末尾称为“程序断点”，可以通过使用brk / sbrk来扩展。
- en: 'This section is writable (Van der Linden [1994](ch018.xhtml#ref-van1994expert)
    P. 124). Most notably, this section contains variables that were initialized with
    a static initializer, as follows:'
  id: totrans-52
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这个部分是可写的（Van der Linden [1994](ch018.xhtml#ref-van1994expert) P. 124）。最值得注意的是，这个部分包含了以下方式初始化的变量：
- en: '[PRE1]'
  id: totrans-53
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**Uninitialized Data Segment / BSS** BSS stands for an old assembler operator
    known as Block Started by Symbol.'
  id: totrans-54
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**未初始化数据段 / BSS** BSS代表一个旧的汇编操作符，称为由符号开始的块。'
- en: This contains all of your globals and any other static duration variables that
    are implicitly zeroed out.
  id: totrans-55
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这包含了所有全局变量以及任何其他隐式置零的静态持续时间变量。
- en: 'Example:'
  id: totrans-56
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 示例：
- en: '[PRE2]'
  id: totrans-57
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE2]'
- en: This variable will be zeroed; otherwise, we would have a security risk involving
    isolation from other processes. They get put in a different section to speed up
    process start up time. This section starts at the end of the data segment and
    is also static in size because the amount of globals is known at compile time.
    Currently, both the initialized and BSS data segments are combined and referred
    to as the data segment (Van der Linden [1994](ch018.xhtml#ref-van1994expert) P.
    124), despite being somewhat different in purpose.
  id: totrans-58
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这个变量将被置零；否则，我们将面临涉及与其他进程隔离的安全风险。它们被放入不同的部分以加快进程启动时间。这个部分从数据段的末尾开始，并且由于全局变量的数量在编译时已知，因此其大小也是静态的。目前，初始化和未初始化的数据段被合并并称为数据段（Van
    der Linden [1994](ch018.xhtml#ref-van1994expert) P. 124），尽管在目的上有所不同。
- en: '**A Text Segment**'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**文本段**'
- en: This is where all executable instructions are stored, and is readable (function
    pointers) but not writable. The program counter moves through this segment executing
    instructions one after the other. It is important to note that this is the only
    executable section of the program, by default. If a program’s code while it’s
    running, the program most likely will SEGFAULT. There are ways around it, but
    we will not be exploring these in this course. Why doesn’t it always start at
    zero? This is because of a security feature called [address space layout randomization](https://en.wikipedia.org/wiki/Address_space_layout_randomization).
    The reasons for and explanation about this is outside the scope of this class,
    but it is good to know about its existence. Having said that, this address can
    be made constant, if a program is compiled with the DEBUG flag.
  id: totrans-60
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这就是所有可执行指令存储的地方，它是可读的（函数指针）但不可写。程序计数器通过这个段逐个执行指令。需要注意的是，这是程序默认的唯一可执行部分。如果程序在运行时修改其代码，程序很可能会产生SEGFAULT。有绕过这个问题的方法，但在这门课程中我们不会探讨这些方法。为什么它不总是从零开始？这是因为一个名为[地址空间布局随机化](https://en.wikipedia.org/wiki/Address_space_layout_randomization)的安全特性。关于这个特性的原因和解释超出了本课程的范围，但了解它的存在是有好处的。话虽如此，如果程序在编译时带有DEBUG标志，这个地址可以被设置为常量。
- en: '![Process address space](../media/file3.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![进程地址空间](../media/file3.png)'
- en: Process address space
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 进程地址空间
- en: Other Contents
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 其他内容
- en: To keep track of all these processes, your operating system gives each process
    a number called the process ID (PID). Processes are also given the PID of their
    parent process, called parent process ID (). Every process has a parent, that
    parent could be .
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 为了跟踪所有这些进程，操作系统为每个进程分配一个称为进程ID（PID）的数字。进程还被赋予其父进程的PID，称为父进程ID（）。每个进程都有一个父进程，那个父进程可能是。
- en: 'Processes could also contain the following information:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 进程还可以包含以下信息：
- en: '**Running State** - Whether a process is getting ready, running, stopped, terminated,
    etc. (more on this is covered in the chapter on Scheduling).'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**运行状态** - 进程是准备就绪、正在运行、已停止、已终止等（关于这一点将在调度章节中详细说明）。'
- en: '**File Descriptors** - A list of mappings from integers to real devices (files,
    USB flash drives, sockets)'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**文件描述符** - 从整数到真实设备（文件、USB闪存驱动器、套接字）的映射列表'
- en: '**Permissions** - What the file is running on and what the process belongs
    to. The process can then only perform operations based on the permissions given
    to the or , such as accessing files. There are tricks to make a program take a
    different user than who started the program (e.g., takes a program that a starts
    and executes it as ). More specifically, a process has a real user ID (identifies
    the owner of the process), an effective user ID (used for non-privileged users
    trying to access files only accessible by superusers), and a saved user ID (used
    when privileged users perform non-privileged actions).'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**权限** - 文件正在运行什么以及进程属于哪个。进程随后只能根据授予其的权限执行操作，例如访问文件。有一些技巧可以使程序以不同于启动程序的用户身份运行（例如，启动一个由a启动的程序并以a的身份执行）。更具体地说，一个进程有一个真实用户ID（标识进程的所有者），一个有效用户ID（用于尝试访问仅由超级用户可访问的文件的非特权用户），以及一个保存用户ID（用于特权用户执行非特权操作）。'
- en: '**Arguments** - a list of strings that tell your program what parameters to
    run under.'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**参数** - 一系列字符串，告诉你的程序在什么参数下运行。'
- en: '**Environment Variables** - a list of key-value pair strings in the form that
    one can modify. These are often used to specify paths to libraries and binaries,
    program configuration settings, etc.'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**环境变量** - 一系列可以修改的键值对字符串。这些通常用于指定库和二进制文件的路径、程序配置设置等。'
- en: According to the POSIX specification, a process only needs a thread and address
    space, but most kernel developers and users know that only these aren’t enough
    (“Definitions” [2018](ch018.xhtml#ref-process_def)).
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 根据 POSIX 规范，一个进程只需要一个线程和地址空间，但大多数内核开发者和用户都知道，这些还不够（“定义” [2018](ch018.xhtml#ref-process_def)）。
- en: Intro to Fork
  id: totrans-72
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Fork 简介
- en: A word of warning
  id: totrans-73
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 一句警告
- en: Process forking is a powerful and dangerous tool. If you make a mistake resulting
    in a fork bomb, **you can bring down an entire system**. To reduce the chances
    of this, limit your maximum number of processes to a small number e.g. 40 by typing
    into a command line. Note, this limit is only for the user, which means if you
    fork bomb, then you won’t be able to kill all created process since calling requires
    your shell to . Quite unfortunate. One solution is to spawn another shell instance
    as another user (for example root) beforehand and kill processes from there.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 进程复制是一个强大而危险的工具。如果你犯了一个错误导致 fork 恶性循环，**你可能会使整个系统崩溃**。为了减少这种情况的可能性，通过在命令行中输入，将最大进程数限制在一个较小的数字，例如
    40。注意，这个限制仅适用于用户，这意味着如果你触发 fork 恶性循环，你将无法杀死所有创建的进程，因为调用需要你的 shell 来完成。这非常不幸。一个解决方案是在事先以另一个用户（例如
    root）的身份启动另一个 shell 实例，并从那里杀死进程。
- en: Another is to use the built-in command to kill all the user processes (you only
    have one attempt at this).
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个方法是使用内置命令来杀死所有用户进程（你只有一次尝试）。
- en: Finally, you could reboot the system, but you only have one shot at this with
    the exec function.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，你可以重新启动系统，但使用 exec 函数，你只有一次机会。
- en: When testing fork() code, ensure that you have either root and/or physical access
    to the machine involved. If you must work on fork() code remotely, remember that
    **kill -9 -1** will save you in the event of an emergency. Fork can be **extremely**
    dangerous if you aren’t prepared for it. **You have been warned.**
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 在测试 fork() 代码时，确保你有对涉及机器的 root 权限和/或物理访问权限。如果你必须远程工作在 fork() 代码上，请记住，**kill
    -9 -1** 在紧急情况下可以救你。如果你没有准备好，fork 可能会 **极其危险**。**你已经收到警告了**。
- en: Fork Functionality
  id: totrans-78
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Fork 功能
- en: The system call clones the current process to create a new process, called a
    child process. This occurs by duplicating the state of the existing process with
    a few minor differences.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 系统调用通过复制现有进程的状态（略有不同）来创建一个新的进程，称为子进程。
- en: The child process executes the next line after the as the parent process does.
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 子进程在父进程之后执行下一行。
- en: Just as a side remark, in older UNIX systems, the entire address space of the
    parent process was directly copied regardless of whether the resource was modified
    or not. The current behavior is for the kernel to perform a [copy-on-write](https://en.wikipedia.org/wiki/Copy-on-write),
    which saves a lot of resources, while being time efficient (Bovet and Cesati [2005](ch018.xhtml#ref-Bovet:2005:ULK:1077084)
    Copy-on-write section).
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 作为一个附带说明，在较老的 UNIX 系统中，无论资源是否被修改，父进程的整个地址空间都会被直接复制。当前的行为是内核执行 [写时复制](https://en.wikipedia.org/wiki/Copy-on-write)，这可以节省大量资源，同时效率高（Bovet
    和 Cesati [2005](ch018.xhtml#ref-Bovet:2005:ULK:1077084) 写时复制部分）。
- en: 'Here is a simple example:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个简单的例子：
- en: '[PRE3]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Here is a simple example of this address space cloning. The following program
    may print out 42 twice - but the is after the !? Why?
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个简单的地址空间复制的例子。以下程序可能会打印出 42 两次——但是为什么是在 !? 之后？
- en: '[PRE4]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: The line *is* executed only once however notice that the printed contents are
    not flushed to standard out. There’s no newline printed, we didn’t call , or change
    the buffering mode. The output text is therefore still in process memory waiting
    to be sent. When is executed the entire process memory is duplicated including
    the buffer. Thus, the child process starts with a non-empty output buffer which
    may be flushed when the program exits. We say may because the contents may be
    unwritten given a bad program exit as well.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 这一行只执行一次，然而请注意，打印的内容并没有被刷新到标准输出。没有打印换行符，我们没有调用 ，也没有改变缓冲模式。因此，输出文本仍然在进程内存中等待发送。当执行时，整个进程内存都会被复制，包括缓冲区。因此，子进程以一个非空输出缓冲区开始，这可能在程序退出时被刷新。我们说“可能”，因为内容可能在没有良好程序退出的情况下未被写入。
- en: To write code that is different for the parent and child process, check the
    return value of . If returns -1, that implies something went wrong in the process
    of creating a new child. One should check the value stored in *errno* to determine
    what kind of error occurred. Common errors include and Which are essentially "try
    again – resource temporarily unavailable", and "no such file or directory".
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 要编写针对父进程和子进程不同的代码，检查 `fork` 的返回值。如果返回 -1，则意味着在创建新子进程的过程中出现了错误。应该检查 *errno* 中存储的值以确定发生了什么类型的错误。常见的错误包括
    和 ，它们本质上意味着“再试一次——资源暂时不可用”，以及“没有这样的文件或目录”。
- en: Similarly, a return value of 0 indicates that we are operating in the context
    of the child process, whereas a positive integer shows that we are in the context
    of the parent process.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，返回值为 0 表示我们处于子进程的上下文中，而正整数表示我们处于父进程的上下文中。
- en: The positive value returned by is the process id (*pid*) of the child.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: '`fork` 返回的正值是子进程的进程 ID (*pid*)。'
- en: A way to remember what is represented by the return value of fork is, that the
    child process can find its parent - the original process that was duplicated -
    by calling - so does not need any additional return information from . However,
    the parent process may have many child processes, and therefore needs to be explicitly
    informed of its child PIDs.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 记忆 `fork` 返回值所代表的内容的一个方法是，子进程可以通过调用 - 来找到其父进程——被复制的原始进程，因此不需要从 . 中获取任何额外的返回信息。然而，父进程可能有多个子进程，因此需要明确地告知其子进程的
    PID。
- en: According to the POSIX standard, every process only has a single parent process.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 根据 POSIX 标准，每个进程只有一个父进程。
- en: 'The parent process can only know the PID of the new child process from the
    return value of :'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 父进程只能从 `fork` 的返回值中知道新子进程的 PID。
- en: '[PRE5]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: A slightly silly example is shown below. What will it print? Try running this
    program with multiple arguments.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是一个稍微有点愚蠢的例子。它会打印什么？试着用多个参数运行这个程序。
- en: '[PRE6]'
  id: totrans-95
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Another example is below. This is the amazing parallel apparent-O(N) *sleepsort*
    is today’s silly winner. First published on [4chan in 2011](https://dis.4chan.org/read/prog/1295544154).
    A version of this awful but amusing sorting algorithm is shown below. This sorting
    algorithm may fail to produce the correct output.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是另一个例子。这就是今天这个令人惊讶的并行 O(N) 的 *sleepsort* 是一个愚蠢的赢家。它首次在 2011 年发布于 [4chan](https://dis.4chan.org/read/prog/1295544154)。下面展示了这个糟糕但有趣的排序算法的一个版本。这个排序算法可能无法产生正确的输出。
- en: '[PRE7]'
  id: totrans-97
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Imagine that we ran this program like so
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 想象我们这样运行这个程序
- en: '[PRE8]'
  id: totrans-99
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '![Timing of sorting 1, 3, 2, 4](../media/file4.png)'
  id: totrans-100
  prefs: []
  type: TYPE_IMG
  zh: '![排序 1, 3, 2, 4 的时间](../media/file4.png)'
- en: Timing of sorting 1, 3, 2, 4
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 排序 1, 3, 2, 4 的时间
- en: The algorithm isn’t actually O(N) because of how the system scheduler works.
    In essence, this program outsources the actual sorting to the operating system.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 由于系统调度器的工作方式，算法实际上并不是 O(N)。本质上，这个程序将实际的排序外包给了操作系统。
- en: Fork Bomb
  id: totrans-103
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Fork Bomb
- en: A ‘fork bomb’ is what we warned you about earlier. This occurs when there is
    an attempt to create an infinite number of processes. This will often bring a
    system to a near-standstill, as it attempts to allocate CPU time and memory to
    a large number of processes that are ready to run. System administrators don’t
    like them and may set upper limits on the number of processes each user can have,
    or revoke login rights because they create disturbances in the Force for other
    users’ programs. A program can limit the number of child processes created by
    using .
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: “fork bomb” 是我们之前警告过你的。当尝试创建无限数量的进程时，就会发生这种情况。这通常会导致系统几乎停止运行，因为它试图为准备运行的大量进程分配
    CPU 时间和内存。系统管理员不喜欢它们，并可能对每个用户可以拥有的进程数量设置上限，或者因为它们干扰了其他用户的程序而撤销登录权限。一个程序可以使用 来限制创建的子进程数量。
- en: Fork bombs are not necessarily malicious - they occasionally occur due to programming
    errors. Below is a simple example that is malicious.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: fork bomb 不一定是恶意的——它们有时是由于编程错误而发生的。下面是一个简单的恶意示例。
- en: '[PRE9]'
  id: totrans-106
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: It is easy to cause one, if you are careless while calling fork, especially
    in a loop. Can you spot the fork bomb here?
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你调用 `fork` 时不小心，很容易引发一个错误，尤其是在循环中。你能在这里找到 fork bomb 吗？
- en: '[PRE10]'
  id: totrans-108
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: We misspelled , so the call fails. What does this mean? Instead of creating
    10 processes, we created *1024 processes, fork bombing our machine*. **How could
    we prevent this? Add an exit right after exec, so that if exec fails, we won’t
    end up calling fork an unbounded number of times.** There are various other ways.
    What if we removed the binary? What if the binary itself creates a fork bomb?
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 我们拼错了，所以调用失败了。这意味着什么？我们本应创建10个进程，却创建了*1024个进程，导致我们的机器被fork炸弹攻击**。**我们如何防止这种情况发生？在exec之后立即添加退出，这样如果exec失败，我们就不会无限制地调用fork。**还有其他各种方法。如果我们删除了二进制文件呢？如果二进制文件本身创建了fork炸弹呢？
- en: Signals
  id: totrans-110
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 信号
- en: We won’t fully explore signals until the end of the course, but it is relevant
    to broach the subject now because various semantics related to fork and other
    function calls detail what a signal is.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在课程结束前全面探讨信号，但现在讨论这个主题是相关的，因为与fork和其他函数调用相关的各种语义详细说明了信号是什么。
- en: A signal can be thought of as a software interrupt. This means that a process
    that receives a signal stops the execution of the current program and makes the
    program respond to the signal.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 可以将信号视为软件中断。这意味着接收信号的进程将停止当前程序的执行，并使程序响应信号。
- en: 'There are various signals defined by the operating system, two of which you
    may already know: SIGSEGV and SIGINT. The first is caused by an illegal memory
    access, and the second is sent by a user wanting to terminate a program. In each
    case, the program jumps from the current line being executed to the signal handler.
    If no signal handler is supplied by the program, a default handler is executed
    – such as terminating the program, or ignoring the signal.'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 操作系统定义了各种信号，其中两个你可能已经知道：SIGSEGV和SIGINT。第一个是由于非法内存访问引起的，第二个是由想要终止程序的用户发送的。在每种情况下，程序都会从当前执行的行跳转到信号处理程序。如果程序没有提供信号处理程序，则执行默认处理程序——例如终止程序或忽略信号。
- en: 'Here is an example of a simple user-defined signal handler:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个简单用户定义的信号处理程序的例子：
- en: '[PRE11]'
  id: totrans-115
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'A signal has four stages in its life cycle: generated, pending, blocked, and
    received state. These refer to when a process generates a signal, the kernel is
    about to deliver a signal, the signal is blocked, and when the kernel delivers
    a signal, each of which requires some time to complete. Read more in the introduction
    to the Signals chapter.'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 信号在其生命周期中有四个阶段：生成、挂起、阻塞和接收状态。这指的是进程生成信号、内核即将传递信号、信号被阻塞以及内核传递信号时，每个阶段都需要一些时间来完成。更多内容请参阅信号章节的介绍。
- en: The terminology is important because fork and exec require different operations
    based on the state a signal is in.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 术语很重要，因为fork和exec根据信号的状态需要不同的操作。
- en: 'To note, it is generally poor programming practice to use signals in program
    logic, which is to send a signal to perform a certain operation. The reason: signals
    have no time frame of delivery and no assurance that they will be delivered. There
    are better ways to communicate between two processes.'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 要注意的是，在程序逻辑中使用信号通常是一种较差的编程实践，即发送信号以执行特定操作。原因是信号没有交付时间框架，也没有保证它们会被交付。有更好的方法在两个进程之间进行通信。
- en: If you want to read more, feel free to skip ahead to the chapter on POSIX signals
    and read it over. It isn’t long and gives you the long and short about how to
    deal with signals in processes.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想了解更多，可以自由地跳到关于POSIX信号的章节并阅读它。它不长，会给你详细介绍如何在进程中处理信号。
- en: POSIX Fork Details
  id: totrans-120
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: POSIX Fork详细信息
- en: 'POSIX determines the standards of fork (“Fork” [2018](ch018.xhtml#ref-fork_2018)).
    You can read the previous citation, but do note that it can be quite verbose.
    Here is a summary of what is relevant:'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: POSIX确定了fork的标准（“Fork” [2018](ch018.xhtml#ref-fork_2018)）。你可以阅读前面的引用，但请注意，它可能相当冗长。以下是相关内容的摘要：
- en: Fork will return a non-negative integer on success.
  id: totrans-122
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: fork在成功时将返回一个非负整数。
- en: A child will inherit any open file descriptors of the parent. That means if
    a parent reads half of the file and forks, the child will start at that offset.
    A read on the child’s end will shift the parent’s offset by the same amount. Any
    other flags are also carried over.
  id: totrans-123
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 子进程将继承父进程的所有打开文件描述符。这意味着如果父进程读取了文件的一半并进行了fork，子进程将从该偏移量开始。在子进程端进行读取将按相同数量移动父进程的偏移量。任何其他标志也将被继承。
- en: Pending signals are not inherited. This means that if a parent has a pending
    signal and creates a child, the child will not receive that signal unless another
    process signals the child.
  id: totrans-124
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 挂起的信号不会被继承。这意味着如果父进程有一个挂起的信号并创建了一个子进程，除非另一个进程向子进程发送信号，否则子进程不会接收到该信号。
- en: The process will be created with one thread (more on that later. The general
    consensus is to not create processes and threads at the same time).
  id: totrans-125
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 进程将创建一个线程（关于这一点稍后讨论。普遍观点是不要同时创建进程和线程）。
- en: Since we have copy on write (COW), read-only memory addresses are shared between
    processes.
  id: totrans-126
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 由于我们使用了写时复制（COW），只读内存地址在进程间是共享的。
- en: If a program sets up certain regions of memory, they can be shared between processes.
  id: totrans-127
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果程序设置了某些内存区域，它们可以在进程间共享。
- en: Signal handlers are inherited but can be changed.
  id: totrans-128
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 信号处理程序会被继承，但可以被更改。
- en: The process’ current working directory (often abbreviated to CWD) is inherited
    but can be changed.
  id: totrans-129
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 进程的当前工作目录（通常缩写为 CWD）会被继承，但可以被更改。
- en: Environment variables are inherited but can be changed.
  id: totrans-130
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 环境变量会被继承，但可以被更改。
- en: 'Key differences between the parent and the child include:'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 父亲和子进程之间的关键区别包括：
- en: The process id returned by . The parent process id returned by .
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由 . 返回的进程 ID，由 . 返回的父进程 ID。
- en: The parent is notified via a signal, SIGCHLD, when the child process finishes
    but not vice versa.
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当子进程完成时，父进程通过信号 SIGCHLD 被通知，但反之则不然。
- en: The child does not inherit pending signals or timer alarms. For a complete list
    see the [fork man page](http://man7.org/linux/man-pages/man2/fork.2.html)
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 子进程不会继承挂起的信号或定时器警报。完整的列表请参阅 [fork 手册页](http://man7.org/linux/man-pages/man2/fork.2.html)
- en: The child has its own set of environment variables.
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 子进程有其自己的环境变量集。
- en: Fork and FILEs
  id: totrans-136
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Fork 和 FILEs
- en: There are some tricky edge cases when it comes to using and forking. First,
    we have to make a technical distinction. A **File Description** is the struct
    that a file descriptor points to. File descriptors can point to many different
    structs, but for our purposes, they’ll point to a struct that represents a file
    on a filesystem. This file description contains elements like paths, how far the
    descriptor has read into the file, etc. A file descriptor points to a file description.
    This is important because when a process is forked, only the file descriptor is
    cloned, not the description. The following snippet contains only one description.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用和分叉时有一些棘手的边缘情况。首先，我们必须进行技术上的区分。**文件描述符**是指向文件描述符的 struct。文件描述符可以指向许多不同的 struct，但就我们的目的而言，它们将指向一个表示文件系统上文件的
    struct。这个文件描述符包含路径、描述符已读取到文件中的位置等元素。文件描述符指向文件描述符。这很重要，因为当一个进程被分叉时，只有文件描述符被克隆，而不是描述符。以下代码片段只包含一个描述符。
- en: '[PRE12]'
  id: totrans-138
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: One process will read one part of the file, the other process will read another
    part of the file. In the following example, there are two descriptions caused
    by two different file handles.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 一个进程将读取文件的一部分，另一个进程将读取文件的另一部分。在以下示例中，由于两个不同的文件句柄，存在两个描述。
- en: '[PRE13]'
  id: totrans-140
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Let’s consider our motivating example.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑我们的动机示例。
- en: '[PRE14]'
  id: totrans-142
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Take a look at this code, what does it do?
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 看看这段代码，它做了什么？
- en: '[PRE15]'
  id: totrans-144
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: The initial thought may be that it prints the file line by line with some extra
    forking. It is actually undefined behavior because we didn’t prepare the file
    descriptors. To make a long story short, here is what to do to avoid the example.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 初始想法可能认为它会逐行打印文件，并有一些额外的分叉。实际上，这是未定义的行为，因为我们没有准备文件描述符。简而言之，以下是避免这个示例的步骤。
- en: You as the programmer need to make sure that all of your file descriptors are
    prepared before forking.
  id: totrans-146
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 作为程序员，你需要确保在分叉之前准备所有文件描述符。
- en: If it is a file descriptor or an unbuffered , it is already prepared.
  id: totrans-147
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果它是一个文件描述符或无缓冲的，它已经准备好了。
- en: If the is open for reading and has been read fully, it is already prepared.
  id: totrans-148
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果文件已打开用于读取并且已被完全读取，它已经准备好了。
- en: Otherwise, the **must** be ’ed or closed to be prepared.
  id: totrans-149
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 否则，**必须**关闭或关闭以准备。
- en: If the file descriptor is prepared, it must unactive in the parent process if
    the child process is using it or vice versa. A process is using it if it is read
    or written or if that process *for whatever reason* calls . If a process uses
    it when the other process is as well, the whole application’s behavior is undefined.
  id: totrans-150
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果文件描述符已经准备好，那么如果子进程正在使用它，则父进程必须将其设置为非活动状态，反之亦然。一个进程在使用它，如果它被读取或写入，或者如果该进程 *出于任何原因*
    调用了 。如果两个进程同时使用它，整个应用程序的行为是未定义的。
- en: So how would we fix the code? We would have to flush the file before forking
    and refrain from using it until after the call – more on the specifics of this
    next section.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们如何修复代码？我们必须在分叉之前刷新文件，并在调用之后才使用它——关于这一点的具体细节将在下一节中讨论。
- en: '[PRE16]'
  id: totrans-152
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: What if the parent process and the child process need to perform asynchronously
    and need to keep the file handle open? Due to event ordering, we need to make
    sure that parent process knows that the child is finished using . We’ll talk about
    Inter-Process communication in a later chapter, but now we can use the double
    fork method.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 如果父进程和子进程需要异步执行并需要保持文件句柄打开，会发生什么？由于事件顺序，我们需要确保父进程知道子进程已完成使用。我们将在后面的章节中讨论进程间通信，但现在我们可以使用双重fork方法。
- en: '[PRE17]'
  id: totrans-154
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: If you are interested in how this works, check out the appendix for a description
    of the Fork-file problem.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对它是如何工作的感兴趣，请查看附录以获取Fork-file问题的描述。
- en: Waiting and Executing
  id: totrans-156
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 等待和执行
- en: 'If the parent process wants to wait for the child to finish, it must use (or
    ), both of which wait for a child to change process states, which can be one of
    the following:'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 如果父进程想要等待子进程完成，它必须使用（或），这两个都等待子进程改变进程状态，这可以是以下之一：
- en: The child terminated
  id: totrans-158
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 儿童终止
- en: The child was stopped by a signal
  id: totrans-159
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 儿童被信号停止
- en: The child was resumed by a signal
  id: totrans-160
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 儿童被信号恢复
- en: Note that waitpid can be set to be non-blocking, which means they will return
    immediately, letting a program know if the child has exited.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，waitpid可以被设置为非阻塞，这意味着它们将立即返回，让程序知道子进程是否已退出。
- en: '[PRE18]'
  id: totrans-162
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: 'is a simpler version of . accepts a pointer to an integer and waits on any
    child process. After the first one changes state, returns. Here is the behavior
    of :'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 是的简化版本。接受一个指向整数的指针并等待任何子进程。在第一个子进程改变状态后返回。以下是的操作行为：
- en: A program *can* wait on a specific process, or it can pass in special values
    for the to do different things (check the man pages).
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 一个程序可以等待一个特定的进程，或者它可以传递特殊值以执行不同的事情（检查手册页）。
- en: 'The last parameter to waitpid is an option parameter. The options are listed
    below:'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: waitpid的最后一个参数是一个可选参数。选项如下：
- en: WNOHANG - Return whetherthe searched process has exited
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: WNOHANG - 返回搜索的进程是否已退出
- en: WNOWAIT - Wait, but leave the child wait-able by another wait call
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: WNOWAIT - 等待，但允许另一个等待调用使子进程可等待
- en: WEXITED - Wait for exited children
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: WEXITED - 等待已退出的子进程
- en: WSTOPPED - Wait for stopped children
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: WSTOPPED - 等待停止的子进程
- en: WCONTINUED - Wait for continued children
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: WCONTINUED - 等待继续的子进程
- en: Exit statuses or the value stored in the integer pointer for both of the calls
    above are explained below.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 退出状态或存储在上面的两个调用中的整型指针的值将在下面解释。
- en: Exit statuses
  id: totrans-172
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 退出状态
- en: To find the return value of or value included in from a child process, use the
    . Typically, a program will use and . See / man page for more information.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 要找到从子进程返回的值或包含在中的值，请使用。通常，程序将使用和。有关更多信息，请参阅/手册页。
- en: '[PRE19]'
  id: totrans-174
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: 'A process can only have 256 return values, the rest of the bits are informational,
    and the information is extracted with bit shifting. However, the kernel has an
    internal way of keeping track of signaled, exited, or stopped processes. This
    API is abstracted so that that the kernel developers are free to change it at
    will. Remember: these macros only make sense if the precondition is met. For example,
    a process’ exit status won’t be defined if the process isn’t signaled. The macros
    will not do the checking for the program, so it’s up to the programmer to make
    sure the logic is correct. As an example above, the program should use the to
    check if a process was stopped and then the to find the signal that stopped it.
    As such, there is no need to memorize the following. This is a high-level overview
    of how information is stored inside the status variables. From the of an old Berkeley
    Standard Distribution(BSD) kernel (“Source to Sys/Wait.h,” [n.d.](ch018.xhtml#ref-sys/wait.h)):'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 一个进程只能有256个返回值，其余的位是信息位，信息通过位移动提取。然而，内核有一种内部方式来跟踪被信号、已退出或已停止的进程。此API被抽象化，以便内核开发者可以随意更改它。记住：这些宏只有在满足前提条件时才有意义。例如，如果进程没有被信号，进程的退出状态就不会被定义。宏不会对程序进行检查，因此程序员必须确保逻辑正确。例如，程序应该使用来检查进程是否被停止，然后使用来找到停止它的信号。因此，没有必要记住以下内容。这是对状态变量内部信息存储的高级概述。来自旧伯克利标准分布（BSD）内核的（“Source
    to Sys/Wait.h”，[n.d.](ch018.xhtml#ref-sys/wait.h)）：
- en: '[PRE20]'
  id: totrans-176
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: There is a convention about exit codes. If the process exited normally and everything
    was successful, then a zero should be returned. Beyond that, there aren’t too
    many widely accepted conventions. If a program specifies return codes to mean
    certain conditions, it may be able to make more sense of the 256 error codes.
    For example, a program could return if the program went to stage 1 (like writing
    to a file) if it did something else, etc. Usually, UNIX programs are not designed
    to follow this policy, for the sake of simplicity.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 关于退出代码有一个约定。如果进程正常退出且一切顺利，则应返回零。除此之外，并没有太多广泛接受的约定。如果程序指定了返回代码来表示某些条件，它可能能够更好地理解256个错误代码。例如，如果程序在进入阶段1（如写入文件）时执行了其他操作，则可以返回，等等。通常，UNIX程序不是设计来遵循这项政策的，为了简化。
- en: Zombies and Orphans
  id: totrans-178
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 僵尸和孤儿
- en: 'It is good practice to wait on your process’ children. If a parent doesn’t
    wait on your children they become, what are called zombies. Zombies are created
    when a child terminates and then takes up a spot in the kernel process table for
    your process. The process table keeps track of the following information about
    a process: PID, status, and how it was killed. The only way to get rid of a zombie
    is to wait on your children. If a long-running parent never waits for your children,
    it may lose the ability to fork.'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的进程的子进程中等待是一个好习惯。如果父进程不等待其子进程，它们就会变成所谓的僵尸。当子进程终止并在内核进程表中为你的进程占用一个位置时，就会创建僵尸。进程表跟踪有关进程的以下信息：PID、状态以及它是如何被杀死的。消除僵尸的唯一方法是等待你的子进程。如果长时间运行的父进程从不等待其子进程，它可能会失去分叉的能力。
- en: Having said that, a program doesn’t always need to wait for your children! Your
    parent process can continue to execute code without having to wait for the child
    process. If a parent dies without waiting on its children, a process can orphan
    its children. Once a parent process completes, any of its children will be assigned
    to - the first process, whose PID is 1\. Therefore, these children would see return
    a value of 1\. These orphans will eventually finish and for a brief moment become
    a zombie. The init process automatically waits for all of its children, thus removing
    these zombies from the system.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，程序并不总是需要等待你的子进程！你的父进程可以继续执行代码，而无需等待子进程。如果父进程在没有等待其子进程的情况下死亡，一个进程可以使其子进程成为孤儿。一旦父进程完成，其任何子进程都将被分配给第一个进程，其PID为1。因此，这些子进程将看到返回值为1。这些孤儿最终会完成，并在短时间内成为僵尸。init进程会自动等待其所有子进程，从而将这些僵尸从系统中移除。
- en: 'Advanced: Asynchronously Waiting'
  id: totrans-181
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 高级：异步等待
- en: 'Warning: This section uses signals which are partially introduced. The parent
    gets the signal SIGCHLD when a child completes, so the signal handler can wait
    for the process. A slightly simplified version is shown below.'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 警告：本节使用了一些部分介绍的信号。当子进程完成时，父进程会收到SIGCHLD信号，因此信号处理程序可以等待该进程。下面展示了一个稍微简化的版本。
- en: '[PRE21]'
  id: totrans-183
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: However, the above example misses a couple of subtle points.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，上述示例遗漏了一些细微之处。
- en: More than one child may have finished but the parent will only get one SIGCHLD
    signal (signals are not queued)
  id: totrans-185
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可能会有多个子进程完成，但父进程只会收到一个SIGCHLD信号（信号不会被排队）
- en: SIGCHLD signals can be sent for other reasons (e.g. a child process has temporarily
    stopped)
  id: totrans-186
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: SIGCHLD信号可以因其他原因被发送（例如，一个子进程暂时停止了）
- en: It uses the deprecated code, instead of the more portable sigaction.
  id: totrans-187
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它使用已弃用的代码，而不是更通用的sigaction。
- en: A more robust code to reap zombies is shown below.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 下面展示了一个更健壮的回收僵尸进程的代码。
- en: '[PRE22]'
  id: totrans-189
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: exec
  id: totrans-190
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: exec
- en: To make the child process execute another program, use one of the functions
    after forking. The set of functions replaces the process image with that of the
    specified program. This means that any lines of code after the call are replaced
    with those of the executed program. Any other work a program wants the child process
    to do should be done before the call. The naming schemes can be shortened mnemonically.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 要使子进程执行另一个程序，请在fork之后使用其中一个函数。该函数集用指定程序的进程映像替换进程映像。这意味着调用之后的任何代码行都将被执行程序的代码行替换。程序想要子进程做的任何其他工作都应该在调用之前完成。命名方案可以简称为助记符。
- en: e – An array of pointers to environment variables is explicitly passed to the
    new process image.
  id: totrans-192
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: e – 显式地将指向环境变量的指针数组传递给新的进程映像。
- en: l – Command-line arguments are passed individually (a list) to the function.
  id: totrans-193
