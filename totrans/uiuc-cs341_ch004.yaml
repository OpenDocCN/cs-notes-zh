  type: TYPE_NORMAL
  zh: 我们需要 "return 0;"，因为如果缺少它，编译器会报错。
- en: POSIX Exec Details
  id: totrans-207
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: POSIX Exec 详细信息
- en: 'POSIX details all of the semantics that exec needs to cover (“Exec” [2018](ch018.xhtml#ref-exec_2018)).
    Note the following:'
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: POSIX 详细说明了 exec 需要覆盖的所有语义（“Exec” [2018](ch018.xhtml#ref-exec_2018)）。注意以下内容：
- en: File descriptors are preserved after an exec. That means if a program open a
    file and doesn’t to close it, it remains open in the child. This is a problem
    because usually the child doesn’t know about those file descriptors. Nevertheless,
    they take up a slot in the file descriptor table and could possibly prevent other
    processes from accessing the file. The one exception to this is if the file descriptor
    has the Close-On-Exec flag set (O_CLOEXEC) – we will go over setting flags later.
  id: totrans-209
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 exec 之后，文件描述符将被保留。这意味着如果程序打开一个文件而没有关闭它，它将在子进程中保持打开状态。这是一个问题，因为通常子进程不知道这些文件描述符。尽管如此，它们在文件描述符表中占用一个槽位，可能会阻止其他进程访问该文件。这一点的例外是，如果文件描述符设置了
    Close-On-Exec 标志（O_CLOEXEC）——我们将在后面介绍设置标志。
- en: 'Various signal semantics: the executed processes preserve the signal mask and
    the pending signal set but do not preserve the signal handlers since it is a different
    program.'
  id: totrans-210
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 不同的信号语义：执行进程保留信号掩码和挂起的信号集，但不保留信号处理程序，因为它是不同的程序。
- en: Environment variables are preserved unless using an environ version of exec.
  id: totrans-211
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 除非使用环境版本的exec，否则环境变量将被保留。
- en: The operating system may open up 0, 1, 2 – stdin, stdout, stderr, if they are
    closed after exec; most of the time they leave them closed.
  id: totrans-212
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 操作系统可能会打开 0、1、2——stdin、stdout、stderr，如果它们在 exec 之后被关闭；大多数情况下，它们会保持关闭。
- en: The executed process runs as the same PID and has the same parent and process
    group as the previous process.
  id: totrans-213
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 执行的进程以相同的 PID 运行，并且与上一个进程具有相同的父进程和进程组。
- en: The executed process is run on the same user and group with the same working
    directory.
  id: totrans-214
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 执行的进程将在相同的用户和组以及相同的当前工作目录下运行。
- en: Shortcuts
  id: totrans-215
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 简化
- en: pre-packs the above code (Jones [2010](ch018.xhtml#ref-jones2010wg14) P. 371).
    The following is a snippet of how to use system.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: pre-packs 上述代码（Jones [2010](ch018.xhtml#ref-jones2010wg14) P. 371）。以下是如何使用 system
    的代码片段。
- en: '[PRE25]'
  id: totrans-217
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: 'The call will fork, execute the command passed by parameter and the original
    parent process will wait for this to finish. This also means that is a blocking
    call. The parent process can’t continue until the process started by exits. Also,
    actually creates a shell that is then given the string, which is more overhead
    than using directly. The standard shell will use the environment variable to search
    for a filename that matches the command. Using system will usually be sufficient
    for many simple run-this-command problems but can quickly become limiting for
    more complex or subtle problems, and it hides the mechanics of the fork-exec-wait
    pattern, so we encourage you to learn and use and instead. It also tends to be
    a huge security risk. By allowing someone to access a shell version of the environment,
    the program can run into all sorts of problems:'
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 这个调用将fork，执行通过参数传递的命令，原始父进程将等待这个命令完成。这也意味着这是一个阻塞调用。父进程不能继续，直到启动的进程退出。实际上，它创建了一个shell，然后传递字符串，这比直接使用多出很多开销。标准shell将使用环境变量来搜索与命令匹配的文件名。通常，使用system对于许多简单的运行此命令问题就足够了，但对于更复杂或微妙的问题可能会迅速变得有限，并且它隐藏了fork-exec-wait模式的机制，所以我们鼓励你学习和使用和而不是。这也可能是一个巨大的安全风险。通过允许某人访问环境变量的shell版本，程序可能会遇到各种问题：
- en: '[PRE26]'
  id: totrans-219
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: Passing something along the lines of argv[1] = "; sudo su" is a huge security
    risk called [privilege escalation](https://en.wikipedia.org/wiki/Privilege_escalation).
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 将类似于argv[1] = "; sudo su"的内容传递出去是一个巨大的安全风险，被称为[权限提升](https://en.wikipedia.org/wiki/Privilege_escalation)。
- en: The fork-exec-wait Pattern
  id: totrans-221
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: fork-exec-wait模式
- en: A common programming pattern is to call followed by and . The original process
    calls fork, which creates a child process. The child process then uses exec to
    start the execution of a new program. Meanwhile, the parent uses (or ) to wait
    for the child process to finish.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 一种常见的编程模式是调用后跟和。原始进程调用fork，创建一个子进程。然后子进程使用exec启动新程序的执行。同时，父进程使用（或）等待子进程完成。
- en: '![Fork, exec, wait diagram](../media/file5.png)'
  id: totrans-223
  prefs: []
  type: TYPE_IMG
  zh: '![Fork, exec, wait diagram](../media/file5.png)'
- en: Fork, exec, wait diagram
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: Fork, exec, wait diagram
- en: '[PRE27]'
  id: totrans-225
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: Why not execute ls directly? The reason is that now we have a monitor program
    – our parent that can do other things. It can proceed and execute another function,
    or it can also modify the state of the system or read the output of the function
    call.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么不直接执行ls？原因是现在我们有一个监控程序——我们的父进程可以执行其他操作。它可以继续并执行另一个函数，或者它也可以修改系统的状态或读取函数调用的输出。
- en: Environment Variables
  id: totrans-227
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 环境变量
- en: Environment variables are variables that the system keeps for all processes
    to use. Your system has these set up right now! In Bash, some are already defined.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 环境变量是系统为所有进程保留的变量。你的系统现在就设置了这些！在Bash中，一些已经定义了。
- en: '[PRE28]'
  id: totrans-229
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: How would a program later these in C? They can call and function respectively.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: C程序如何后来这些？它们可以分别调用和函数。
- en: '[PRE29]'
  id: totrans-231
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: Environment variables are important because they are inherited between processes
    and can be used to specify a standard set of behaviors (“Environment Variables”
    [2018](ch018.xhtml#ref-env_std_2018)), although you don’t need to memorize the
    options. Another security related concern is that environment variables cannot
    be read by an outside process, whereas argv can be.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 环境变量很重要，因为它们在进程之间继承，并且可以用来指定一组标准行为（“环境变量” [2018](ch018.xhtml#ref-env_std_2018)），尽管你不需要记住这些选项。另一个与安全相关的问题是，环境变量不能被外部进程读取，而argv可以。
