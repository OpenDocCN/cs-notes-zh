- en: Background
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 背景
- en: Systems Architecture
  id: totrans-1
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 系统架构
- en: This section is a short review of System Architecture topics that you’ll need
    for System Programming.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 本节是对系统架构主题的简要回顾，这些主题对于系统编程是必需的。
- en: Assembly
  id: totrans-3
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 汇编
- en: What is assembly? Assembly is the lowest that you’ll get to machine language
    without writing 1’s and 0’s. Each computer has an architecture, and that architecture
    has an associated assembly language. Each assembly command has a 1:1 mapping to
    a set of 1’s and 0’s that tell the computer exactly what to do. For example, the
    following in the widely used x86 Assembly language add one to the memory address
    20 (Wikibooks [2018](ch018.xhtml#ref-wiki:xxx)) – you can also look in (Guide
    [2011](ch018.xhtml#ref-guide2011intel)) Section 2A under the add instruction though
    it is more verbose.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 什么是汇编？汇编是您在不直接编写1和0的情况下所能达到的最低级的机器语言。每台计算机都有一个架构，并且该架构有一个相关的汇编语言。每个汇编指令都与一组1和0一一对应，这些1和0告诉计算机确切要做什么。例如，以下是在广泛使用的x86汇编语言中向内存地址20加一的指令（维基图书[2018](ch018.xhtml#ref-wiki:xxx)）——您也可以在（指南[2011](ch018.xhtml#ref-guide2011intel)）第2A节下查找加法指令，尽管它更为冗长。
- en: '[PRE0]'
  id: totrans-5
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Why do we mention this? Because it is important that although you are going
    to be doing most of this class in C, that this is what the code is translated
    into. Serious implications arise for race conditions and atomic operations.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么我们要提到这一点？因为虽然你将在大多数课程中使用C语言，但代码实际上会被翻译成这种形式。对于竞态条件和原子操作，这会产生严重的后果。
- en: Atomic Operations
  id: totrans-7
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 原子操作
- en: An operation is atomic if no other processor should interrupt it. Take for example
    the above assembly code to add one to a register. In the architecture, it may
    actually have a few different steps on the circuit. The operation may start by
    fetching the value of the memory from the stick of ram, then storing it in the
    cache or a register, and then finally writing back (Schweizer, Besta, and Hoefler
    [2015](ch018.xhtml#ref-schweizer2015evaluating)) – under the description for *fetch-and-add*
    though your micro-architecture may vary. Or depending on performance operations,
    it may keep that value in cache or in a register which is local to that process
    – try dumping the optimized assembly of incrementing a variable. The problem comes
    in if two processors try to do it at the same time. The two processors could at
    the same time copy the value of the memory address, add one, and store the same
    result back, resulting in the value only being incremented once. That is why we
    have a special set of instructions on modern systems called atomic operations.
    If an instruction is atomic, it makes sure that only one processor or thread performs
    any intermediate step at a time. With x86 this is done by the prefix (Guide [2011](ch018.xhtml#ref-guide2011intel),
    1120).
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 如果没有其他处理器应该中断它，则操作是原子的。以上述汇编代码向寄存器加一为例。在架构中，它实际上可能在电路上有几个不同的步骤。操作可能首先从ram的stick中获取内存值，然后将其存储在缓存或寄存器中，最后写回（Schweizer,
    Besta, and Hoefler [2015](ch018.xhtml#ref-schweizer2015evaluating)）——在*fetch-and-add*的描述下，尽管你的微架构可能不同。或者根据性能操作，它可能将那个值保持在缓存或该进程的本地寄存器中——尝试导出增加变量的优化汇编。问题在于如果两个处理器同时尝试这样做。两个处理器可能同时复制内存地址的值，加一，并将相同的结果写回，导致值只增加一次。这就是为什么我们在现代系统中有一组特殊的指令称为原子操作。如果一个指令是原子的，它确保一次只有一个处理器或线程执行任何中间步骤。在x86中，这是通过前缀（指南[2011](ch018.xhtml#ref-guide2011intel)，1120）完成的。
- en: '[PRE1]'
  id: totrans-9
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Why don’t we do this for everything? It makes commands slower! If every time
    a computer does something it has to make sure that the other cores or processors
    aren’t doing anything, it’ll be much slower. Most of the time we differentiate
    these with special consideration. Meaning, we will tell you when we use something
    like this. Most of the time you can assume the instructions are unlocked.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么我们不把这一切都这样做？这会使命令变慢！如果每次计算机做某事时都必须确保其他核心或处理器没有在做任何事情，它将会慢得多。大多数时候我们会用特殊考虑来区分这些。这意味着，当我们使用类似的东西时，我们会告诉你。大多数时候，你可以假设指令是未锁定的。
- en: Caching
  id: totrans-11
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 缓存
- en: Ah yes, Caching. One of computer science’s greatest problems. The caching that
    we are referring to is processor caching. If a particular address is already in
    the cache when reading or writing, the processor will perform the operation on
    the cache, such as adding and update the actual memory, later because updating
    memory is slow (Intel [2015](ch018.xhtml#ref-intel2015improving) Section 3.4).
    If it isn’t, the processor requests a chunk of memory from the memory chip and
    stores it in the cache, kicking out the least recently used page – this depends
    on caching policy, but Intel’s does use this. This is done because the l3 processor
    cache is roughly three times faster to reach than the memory in terms of time
    (Levinthal [2009](ch018.xhtml#ref-levinthal2009performance), 22) though exact
    speeds will vary based on the clock speed and architecture. Naturally, this leads
    to problems because there are two different copies of the same value, in the cited
    paper this refers to an unshared line. This isn’t a class about caching, but you
    should know how this could impact your code. A short but non-complete list could
    be
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 哎，是的，缓存。计算机科学中最大的问题之一。我们所说的缓存是指处理器缓存。如果在读取或写入时特定的地址已经在缓存中，处理器将对该缓存执行操作，例如添加和更新实际内存，稍后因为更新内存是慢的（英特尔[2015](ch018.xhtml#ref-intel2015improving)
    第3.4节）。如果没有，处理器将从内存芯片请求一块内存并将其存储在缓存中，淘汰最不常使用的页面——这取决于缓存策略，但英特尔确实使用了这种方法。这样做是因为l3处理器缓存在时间上比内存快大约三倍（Levinthal
    [2009](ch018.xhtml#ref-levinthal2009performance)，22），但确切的速度会根据时钟速度和架构而变化。自然地，这会导致问题，因为有两个相同值的副本，在所引用的论文中这指的是未共享的行。这不是一个关于缓存的课程，但你应该知道这可能会如何影响你的代码。一个简短但不完整的列表可能是
- en: Race Conditions! If a value is stored in two different processor caches, then
    that value should be accessed by a single thread.
  id: totrans-13
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 竞态条件！如果一个值存储在两个不同的处理器缓存中，那么这个值应该由单个线程访问。
- en: Speed. With a cache, your program may look faster mysteriously. Just assume
    that reads and writes that either happened recently or are next to each other
    in memory are fast.
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 速度。有了缓存，你的程序可能会神秘地看起来更快。只需假设最近发生或内存中相邻的读取和写入操作是快速的。
- en: Side effects. Every read or write affects the cache state. While most of the
    time this doesn’t help or hurt, it is important to know. Check the Intel programmer
    guide on the lock prefix for more information.
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 副作用。每次读取或写入都会影响缓存状态。虽然大多数时候这不会有所帮助或造成伤害，但了解这一点很重要。请查阅英特尔程序员指南中有关锁前缀的更多信息。
- en: Interrupts
  id: totrans-16
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 中断
- en: Interrupts are an important part of system programming. An interrupt is internally
    an electrical signal that is delivered to the processor when something happens
    – this is a hardware interrupt (“Chapter 3\. Hardware Interrupts,” [n.d.](ch018.xhtml#ref-redhat_hardware_int)).
    Then the hardware decides if this is something that it should handle (e.g., handling
    keyboard or mouse input for older keyboard and mouses) or it should pass to the
    operating system. The operating system then decides if this is something that
    it should handle (e.g., paging a memory table from disk) or something the application
    should handle (e.g., a SEGFAULT). If the operating system decides that this is
    something that the process or program should take care of, it sends a **software
    fault** and that software fault is then propagated. The application then decides
    if it is an error (SEGFAULT) or not (SIGPIPE for example) and reports to the user.
    Applications can also send signals to the kernel and to the hardware as well.
    This is an oversimplification because there are certain hardware faults that can’t
    be ignored or masked away, but this class isn’t about teaching you to build an
    operating system.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 中断是系统编程的重要组成部分。中断在内部是一个电信号，当发生某些事情时传递给处理器——这是一个硬件中断（“第3章 硬件中断”，[n.d.](ch018.xhtml#ref-redhat_hardware_int)）。然后硬件决定这是否是它应该处理的事情（例如，处理旧键盘和鼠标的键盘或鼠标输入）或者应该传递给操作系统。操作系统随后决定这是否是它应该处理的事情（例如，从磁盘分页内存表）或者应用程序应该处理的事情（例如，SEGFAULT）。如果操作系统决定这是进程或程序应该处理的事情，它会发送一个**软件故障**，然后这个软件故障就会传播。应用程序随后决定这是否是一个错误（SEGFAULT）或者不是（例如SIGPIPE）并向用户报告。应用程序还可以向内核和硬件发送信号。这是一个过于简化的说法，因为有一些硬件故障不能被忽略或屏蔽，但这个课程不是教你如何构建操作系统。
- en: An important application of this is how system calls are served! There is a
    well-established set of registers that the arguments go in according to the kernel
    as well as a system call “number” again defined by the kernel. Then the operating
    system triggers an interrupt which the kernel catches and serves the system call
    (Garg [2006](ch018.xhtml#ref-garg_2006)).
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这的一个重要应用就是系统调用的服务方式！有一套经过良好建立的寄存器，根据内核的规则，参数会放入其中，以及一个由内核再次定义的系统调用“编号”。然后操作系统触发一个中断，内核捕获并服务系统调用（Garg
    [2006](ch018.xhtml#ref-garg_2006)）。
- en: Operating system developers and instruction set developers alike didn’t like
    the overhead of causing an interrupt on a system call. Now, systems use and which
    has a cleaner way of transferring control safely to the kernel and safely back.
    What safely means is obvious out of the scope for this class, but it persists.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 操作系统开发者和指令集开发者都不喜欢在系统调用时引起中断的开销。现在，系统使用了一种更干净的方式来安全地将控制权转移到内核，并安全地返回。安全意味着什么在这个课程的范围之外，但它持续存在。
- en: 'Optional: Hyperthreading'
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可选：超线程
- en: Hyperthreading is a new technology and is in no way shape or form multithreading.
    Hyperthreading allows one physical core to appear as many virtual cores to the
    operating system (Guide [2011](ch018.xhtml#ref-guide2011intel), P.51). The operating
    system can then schedule processes on these virtual cores and one core will execute
    them. Each core interleaves processes or threads. While the core is waiting for
    one memory access to complete, it may perform a few instructions of another process
    thread. The overall result is more instructions executed in a shorter time. This
    potentially means that you can divide the number of cores you need to power smaller
    devices.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 超线程是一种新技术，它根本不是多线程。超线程允许一个物理核心在操作系统中表现为多个虚拟核心（Guide [2011](ch018.xhtml#ref-guide2011intel)，第51页）。操作系统可以在这这些虚拟核心上调度进程，一个核心将执行它们。每个核心交错执行进程或线程。当核心等待一个内存访问完成时，它可能执行另一个进程线程的几个指令。整体结果是更短的时间内执行了更多的指令。这潜在地意味着你可以减少为小型设备供电所需的核心数量。
- en: There be dragons here, though. With hyperthreading, you must be wary of optimizations.
    A famous hyperthreading bug caused programs to crash if at least two processes
    were scheduled on a physical core, using specific registers, in a tight loop.
    The actual problem is better explained through an architecture lens. But, the
    actual application was found through systems programmers working on OCaml’s mainline
    (Leroy [2017](ch018.xhtml#ref-leroy_2017)).
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 但是这里有一些风险。在使用超线程时，你必须小心优化。一个著名的超线程错误导致程序在至少有两个进程被调度到物理核心、使用特定寄存器并在紧密循环中时崩溃。这个问题实际上通过架构的角度解释得更好。但是，这个实际的应用是通过在OCaml主线工作的系统程序员发现的（Leroy
    [2017](ch018.xhtml#ref-leroy_2017)）。
- en: Debugging and Environments
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 调试和环境
- en: 'I’m going to tell you a secret about this course: it is about working smarter
    *not* harder. The course can be time-consuming but the reason that so many people
    see it as such (and why so many students don’t see it as such) is the relative
    familiarity of people with their tools. Let’s go through some of the common tools
    that you’ll be working on and need to be familiar with.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我要告诉你这个课程的秘密：它是关于更聪明地工作，而不是更努力地工作。这个课程可能会很耗时，但很多人认为它就是这样（以及为什么很多学生不这样认为）的原因是人们对他们的工具相对熟悉。让我们回顾一下你将需要熟悉的一些常见工具。
- en: ssh
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ssh
- en: is short for the Secure Shell (“Ssh(1),” [n.d.](ch018.xhtml#ref-openbsd_ssh)).
    It is a network protocol that allows you to spawn a shell on a remote machine.
    Most of the times in this class you will need to ssh into your VM like this
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: ssh是Secure Shell（“Ssh(1),” [n.d.](ch018.xhtml#ref-openbsd_ssh)）的缩写。它是一种网络协议，允许你在远程机器上启动一个shell。在这个课程的大部分时间里，你将需要像这样ssh到你的虚拟机
- en: '[PRE2]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: If you don’t want to type your password out every time, you can generate an
    ssh key that uniquely identifies your machine. If you already have a key pair,
    you can skip to the copy id stage.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不想每次都输入密码，你可以生成一个唯一标识你的机器的ssh密钥。如果你已经有了密钥对，你可以跳到复制id阶段。
- en: '[PRE3]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: If you still think that that is too much typing, you can always alias hosts.
    You may need to restart your VM or reload sshd for this to take effect. The config
    file is available on Linux and Mac distros. For Windows, you’ll have to use the
    Windows Linux Subsystem or configure any aliases in PuTTY
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你仍然觉得输入太多，你总是可以给主机起别名。你可能需要重新启动你的虚拟机或重新加载sshd才能使这个更改生效。配置文件在Linux和Mac发行版上可用。对于Windows，你必须使用Windows
    Linux子系统或配置PuTTY中的任何别名
- en: '[PRE4]'
  id: totrans-31
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: git
  id: totrans-32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: git
- en: What is ‘git‘? Git is a version control system. What that means is git stores
    the entire history of a directory. We refer to the directory as a repository.
    So what do you need to know is a few things. First, create your repository with
    the repo creator. If you haven’t already signed into enterprise GitHub, make sure
    to do so otherwise your repository won’t be created for you. After that, your
    repository is created on the server. Git is a decentralized version control system,
    meaning that you’ll need to get a repository onto your VM. We can do this with
    a clone. Whatever you do, **do not go through the README.md tutorial**.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 什么是‘git’？Git是一个版本控制系统。这意味着git存储了一个目录的整个历史。我们将该目录称为仓库。所以你需要知道的是一些事情。首先，使用仓库创建器创建你的仓库。如果你还没有登录企业GitHub，请确保这样做，否则你的仓库将不会为你创建。之后，你的仓库在服务器上创建。Git是一个分布式版本控制系统，这意味着你需要将一个仓库放到你的虚拟机（VM）上。我们可以通过克隆来实现这一点。无论你做什么，**都不要通过README.md教程进行**。
- en: '[PRE5]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: This will create a local repository. The workflow is you make a change on your
    local repository, add the changes to a current commit, actually commit, and push
    the changes to the server.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 这将创建一个本地仓库。工作流程是这样的：你在本地仓库上进行更改，将更改添加到当前提交中，实际上提交，并将更改推送到服务器。
- en: '[PRE6]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Now to explain git well, you need to understand that git for our purposes will
    look like a linked list. You will always be at the head of master, and you will
    do the edit-add-commit-push loop. We have a separate branch on Github that we
    push feedback to under a specific branch which you can view on Github website.
    The markdown file will have information on the test cases and results (like standard
    out).
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 现在要很好地解释git，你需要理解，就我们的目的而言，git将看起来像是一个链表。你将始终位于master的头部，并且你会进行编辑-添加-提交-推送的循环。我们在GitHub上有一个单独的分支，我们将反馈推送到特定的分支，你可以在GitHub网站上查看。Markdown文件将包含测试用例和结果（如标准输出）。
- en: Every so often git can break. Here is a list of commands you probably won’t
    need to fix your repo
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 有时git可能会出错。以下是一些你可能不需要修复你的仓库的命令列表
- en: git-cherry-pick
  id: totrans-39
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: git-cherry-pick
- en: git-pack
  id: totrans-40
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: git-pack
- en: git-gc
  id: totrans-41
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: git-gc
- en: git-clean
  id: totrans-42
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: git-clean
- en: git-rebase
  id: totrans-43
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: git-rebase
- en: git-stash/git-apply/git-pop
  id: totrans-44
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: git-stash/git-apply/git-pop
- en: git-branch
  id: totrans-45
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: git-branch
- en: If you are currently on a branch, and you don’t see either
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你目前在一个分支上，你既看不到
- en: '[PRE7]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: or
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 也没有
- en: '[PRE8]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: And something like
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 以及类似的内容
- en: '[PRE9]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Don’t panic, but your repository may be in an unworkable state. If you aren’t
    nearing a deadline, come to office hours or ask your question on Edstem, and we’d
    be happy to help. In an emergency scenario, delete your repository and re-clone
    (you’ll have to add the as above). **This will lose any local uncommitted changes.
    Make sure to copy any files you were working on outside the directory, remove
    and copy them back in**
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 不要慌张，但你的仓库可能处于不可工作的状态。如果你没有接近截止日期，请来办公室时间或在你Edstem上提问，我们会很乐意帮助你。在紧急情况下，删除你的仓库并重新克隆（你将不得不添加如上所述的内容）。**这将丢失任何本地未提交的更改。请确保复制任何你在目录外工作的文件，移除并重新复制它们**
- en: If you want to learn more about git, there are all but an endless number of
    tutorials and resources online that can help you. Here are some links that can
    help you out
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想了解更多关于git的信息，网上有无数个教程和资源可以帮助你。以下是一些可以帮助你的链接
- en: '[https://git-scm.com/docs/gittutorial](https://git-scm.com/docs/gittutorial)'
  id: totrans-54
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '[https://git-scm.com/docs/gittutorial](https://git-scm.com/docs/gittutorial)'
- en: '[https://www.atlassian.com/git/tutorials/what-is-version-control](https://www.atlassian.com/git/tutorials/what-is-version-control)'
  id: totrans-55
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '[https://www.atlassian.com/git/tutorials/what-is-version-control](https://www.atlassian.com/git/tutorials/what-is-version-control)'
- en: '[https://thenewstack.io/tutorial-git-for-absolutely-everyone/](https://thenewstack.io/tutorial-git-for-absolutely-everyone/)'
  id: totrans-56
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '[https://thenewstack.io/tutorial-git-for-absolutely-everyone/](https://thenewstack.io/tutorial-git-for-absolutely-everyone/)'
- en: Editors
  id: totrans-57
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编辑器
- en: Some people take this as an opportunity to learn a new editor, others not so
    much. The first part is those of you who want to learn a new editor. In the editor
    war that spans decades, we have come to the battle of vim vs emacs.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人把这当作学习新编辑器的机会，而有些人则不然。第一部分是那些想要学习新编辑器的人。在跨越数十年的编辑器战争中，我们来到了vim与emacs的战斗。
- en: 'Vim is a text editor and a Unix-like utility. You enter vim by typing , which
    takes you into the editor. There are three most commonly used modes: normal mode,
    insert mode, and command mode. You start off in normal mode. In this mode, you
    can move around with many keys with the most common ones being (corresponding
    to left, down, up, and right, respectively). To run commands in vim, you can first
    type and then a command after it. For instance, to quit vim, simply type (q stands
    for quit). If you have any unsaved edits, you must either save them , save and
    quit , or quit and discard changes . To make edits you can either type to change
    you into insert mode or to change to insert mode **a**fter the cursor. This is
    the basics when it comes to vim. In addition to the countless great resources
    out there on the internet, vim also has its own built-in tutorials set up for
    beginners. To access the interactive tutorial, enter in the command line (not
    inside of vim), and you are all set!'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: Vim是一个文本编辑器和类Unix实用工具。你可以通过输入 , 来进入vim，这会带你进入编辑器。最常用的三种模式是：正常模式、插入模式和命令模式。你从正常模式开始。在这个模式下，你可以使用许多键来移动，最常见的键是（分别对应左、下、上和右）。在vim中运行命令时，你可以在输入后输入一个命令。例如，要退出vim，只需输入
    (q代表退出)。如果你有任何未保存的编辑，你必须保存它们、保存并退出，或者退出并丢弃更改。要编辑，你可以输入以进入插入模式，或者输入以在光标后进入插入模式
    **a**。这是vim的基本操作。除了互联网上无数的优质资源外，vim还为初学者提供了自己的内置教程。要访问交互式教程，请在命令行中输入（不在vim内部），然后你就准备好了！
- en: Emacs is more of a way of life, and I don’t mean that figuratively. A lot of
    people say that emacs is a powerful operating system lacking a decent text editor.
    This means emacs can house a terminal, gdb session, ssh session, code and a whole
    lot more. It would not be fitting any other way to introduce you to the gnu-emacs
    any other way than the gnu-docs [https://www.gnu.org/software/emacs/tour/](https://www.gnu.org/software/emacs/tour/).
    Just note that emacs is *insanely* powerful. You can do almost anything with it.
    There are a fair number of students who like the IDE-aspect of other programming
    languages. Know that you can set up emacs to be an IDE, but you have to learn
    a bit of Lisp [http://martinsosic.com/development/emacs/2017/12/09/emacs-cpp-ide.html](http://martinsosic.com/development/emacs/2017/12/09/emacs-cpp-ide.html).
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: Emacs更像是一种生活方式，我并不是在比喻意义上说。很多人说emacs是一个功能强大的操作系统，缺少一个不错的文本编辑器。这意味着emacs可以容纳终端、gdb会话、ssh会话、代码等等。介绍GNU-emacs没有比通过GNU文档
    [https://www.gnu.org/software/emacs/tour/](https://www.gnu.org/software/emacs/tour/)
    更合适的方式了。只需注意，emacs *极其* 强大。你可以用它做几乎所有的事情。有不少学生喜欢其他编程语言的IDE特性。要知道你可以设置emacs成为一个IDE，但你必须学习一点Lisp
    [http://martinsosic.com/development/emacs/2017/12/09/emacs-cpp-ide.html](http://martinsosic.com/development/emacs/2017/12/09/emacs-cpp-ide.html)。
- en: Then there are those of you who like to use your own editors. That is completely
    fine. For this, we require sshfs which has ports on many different machines.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，有些人喜欢使用自己的编辑器。这完全没问题。为此，我们需要sshfs，它可以在许多不同的机器上运行。
- en: Windows [https://github.com/billziss-gh/sshfs-win](https://github.com/billziss-gh/sshfs-win)
  id: totrans-62
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Windows [https://github.com/billziss-gh/sshfs-win](https://github.com/billziss-gh/sshfs-win)
- en: Mac [https://github.com/osxfuse/osxfuse/wiki/SSHFS](https://github.com/osxfuse/osxfuse/wiki/SSHFS)
  id: totrans-63
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Mac [https://github.com/osxfuse/osxfuse/wiki/SSHFS](https://github.com/osxfuse/osxfuse/wiki/SSHFS)
- en: Linux [https://help.ubuntu.com/community/SSHFS](https://help.ubuntu.com/community/SSHFS)
  id: totrans-64
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Linux [https://help.ubuntu.com/community/SSHFS](https://help.ubuntu.com/community/SSHFS)
- en: At that point, the files on your VM are synced with the files on your machine
    and edits can be made and will be synced.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 在那个时刻，你的虚拟机上的文件与你的机器上的文件同步，你可以进行编辑，并且这些编辑将会同步。
- en: At the time of writing, an author likes to use spacemacs [http://spacemacs.org/](http://spacemacs.org/)
    which marries both vim and emacs and both of their difficulties. I’ll give my
    soapbox for why I like it, but be warned that if you are starting from absolutely
    no vim or emacs experience the learning curve along with this course may be too
    much.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 在撰写本文时，作者喜欢使用spacemacs [http://spacemacs.org/](http://spacemacs.org/)，它结合了vim和emacs的优点，并且克服了它们各自的困难。我将分享我喜欢它的原因，但警告一下，如果你完全没有vim或emacs的经验，学习曲线加上这门课程可能会过于陡峭。
- en: Extensible. Spacemacs has a clean design written in lisp. There are 100s of
    packages ready to be installed by editing your spacemacs config and reloading
    that do everything from syntax checking, automatic static analyzing, etc.
  id: totrans-67
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可扩展。Spacemacs有一个干净的设计，用lisp编写。有100多个包可以通过编辑你的spacemacs配置并重新加载来安装，从语法检查、自动静态分析等一切。
- en: Most of the good parts from vim and emacs. Emacs is good at doing everything
    by being a fast editor. Vim is good at making fast edits and moving around. Spacemacs
    is the best of both worlds allowing vim keybindings to all the emacs goodness
    underneath.
  id: totrans-68
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 大部分来自 vim 和 emacs 的优点。Emacs 作为一个快速的编辑器，擅长做任何事情。Vim 擅长快速编辑和移动。Spacemacs 是两者的最佳结合，允许使用
    vim 键盘绑定访问所有 emacs 的优点。
- en: Lots of preconfiguration done. As opposed with a fresh emacs install, a lot
    of the configurations with language and projects are done for you like neotree,
    helm, various language layers. All that you have to do is navigate neotree to
    the base of your project and emacs will turn into an IDE for that programming
    language.
  id: totrans-69
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 完成了大量的预配置。与全新的 emacs 安装相比，许多语言和项目的配置已经为你完成，如 neotree、helm、各种语言层。你所要做的就是使用 neotree
    导航到你的项目基础目录，emacs 将变成该编程语言的 IDE。
- en: But obviously to each his or her own. Many people will argue that editor gurus
    spend more time editing their editors and actually editing.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 但显然各有所好。许多人会争论编辑大师们花更多的时间在编辑他们的编辑器上，而不是真正地编辑。
- en: Clean Code
  id: totrans-71
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Clean Code
- en: Make your code modular using helper functions. If there is a repeated task (getting
    the pointers to contiguous blocks in the malloc MP, for example), make them helper
    functions. And make sure each function does one thing well so that you don’t have
    to debug twice. Let’s say that we are doing selection sort by finding the minimum
    element each iteration like so,
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 使用辅助函数使你的代码模块化。如果有重复的任务（例如，在 malloc MP 中获取连续块的指针），将它们做成辅助函数。并确保每个函数都做得很好，这样你就不必调试两次。假设我们正在通过每次迭代找到最小元素来进行选择排序，
- en: '[PRE10]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Many can see the bug in the code, but it can help to refactor the above method
    into
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人可以看到代码中的错误，但将上述方法重构可能有所帮助。
- en: '[PRE11]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: And the error is specifically in one function. In the end, this class is about
    writing system programs, not a class about refactoring/debugging your code. In
    fact, most kernel code is so atrocious that you don’t want to read it – the defense
    there is that it needs to be. But for the sake of debugging, it may benefit you
    in the long run to adopt some of these practices.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 错误特别在一个函数中。最终，这个课程是关于编写系统程序，而不是关于重构/调试你的代码的课程。实际上，大多数内核代码非常糟糕，你不想阅读它——那里的辩护是它需要这样。但为了调试，从长远来看，采用一些这些做法可能对你有益。
- en: Asserts
  id: totrans-77
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 断言
- en: Use assertions to make sure your code works up to a certain point – and importantly,
    to make sure you don’t break it later. For example, if your data structure is
    a doubly-linked list, you can do something like to assert that the next node has
    a pointer to the current node. You can also check the pointer is pointing to an
    expected range of memory address, non-null, ->size is reasonable, etc. The macro
    will disable all assertions, so don’t forget to set that once you finish debugging
    (“Assert,” [n.d.](ch018.xhtml#ref-cplusplus_assert)).
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 使用断言来确保你的代码在某个点上正常工作——并且重要的是，确保你以后不会破坏它。例如，如果你的数据结构是双向链表，你可以做些类似的事情来断言下一个节点有一个指向当前节点的指针。你还可以检查指针是否指向一个预期的内存地址范围，非空，->size
    是合理的等。宏将禁用所有断言，所以一旦你完成调试，别忘了设置它（“断言”，[n.d.](ch018.xhtml#ref-cplusplus_assert)）。
- en: Here is a quick example with an assert. Let’s say that we are writing code using
    memcpy. We would want to put an assert before that checks whether my two memory
    regions overlap. If they do overlap, memcpy runs into undefined behavior, so we
    want to discover that problem sooner rather than later.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个使用断言的快速示例。假设我们正在使用 memcpy 编写代码。我们想在它之前放一个断言来检查我的两个内存区域是否重叠。如果它们重叠，memcpy
    将遇到未定义的行为，所以我们想尽早发现这个问题。
- en: '[PRE12]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: This check can be turned off at compile-time, but will save you **tons** of
    trouble debugging!
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 这个检查可以在编译时关闭，但将为你节省大量的调试麻烦！
- en: Valgrind
  id: totrans-82
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Valgrind
- en: 'Valgrind is a suite of tools designed to provide debugging and profiling tools
    to make your programs more correct and detect some runtime issues (“4\. Memcheck:
    A Memory Error Detector,” [n.d.](ch018.xhtml#ref-valgrind)). The most used of
    these tools is Memcheck, which can detect many memory-related errors that are
    common in C and C++ programs and that can lead to crashes and unpredictable behavior
    (for example, unfreed memory buffers). To run Valgrind on your program:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: Valgrind 是一套工具集，旨在提供调试和性能分析工具，使你的程序更加正确，并检测一些运行时问题（“4. Memcheck：内存错误检测器”，[n.d.](ch018.xhtml#ref-valgrind)）。其中最常用的工具是
    Memcheck，它可以检测许多在 C 和 C++ 程序中常见的内存相关错误，这些错误可能导致崩溃和不可预测的行为（例如，未释放的内存缓冲区）。要在你的程序上运行
    Valgrind：
- en: '[PRE13]'
  id: totrans-84
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'Arguments are optional and the default tool that will run is Memcheck. The
    output will be presented in the form: the number of allocations, frees, and errors.
    Suppose we have a simple program like this:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 参数是可选的，默认运行的工具是 Memcheck。输出将以以下形式呈现：分配、释放和错误的数量。假设我们有一个像这样的简单程序：
- en: '[PRE14]'
  id: totrans-86
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: This program compiles and runs with no errors. Let’s see what Valgrind will
    output.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 这个程序编译并运行没有错误。让我们看看 Valgrind 会输出什么。
- en: '[PRE15]'
  id: totrans-88
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: '**Invalid write**: It detected our heap block overrun, writing outside of an
    allocated block.'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: '**无效写入**：它检测到我们的堆块越界，写入分配块之外。'
- en: '**Definitely lost**: Memory leak — you probably forgot to free a memory block.'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: '**肯定丢失**：内存泄漏——你可能忘记释放一个内存块。'
- en: Valgrind is a effective tool to check for errors at runtime. C is special when
    it comes to such behavior, so after compiling your program you can use Valgrind
    to fix errors that your compiler may miss and that usually happens when your program
    is running.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: Valgrind 是一个有效的工具，用于在运行时检查错误。当涉及到这种行为时，C 语言是特殊的，因此编译你的程序后，你可以使用 Valgrind 来修复编译器可能遗漏的错误，这通常发生在程序运行时。
- en: 'For more information, you can refer to the manual (“4\. Memcheck: A Memory
    Error Detector,” [n.d.](ch018.xhtml#ref-valgrind))'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: '更多信息，请参阅手册（“4. Memcheck: A Memory Error Detector,” [n.d.](ch018.xhtml#ref-valgrind)）'
- en: TSAN
  id: totrans-93
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: TSAN
- en: ThreadSanitizer is a tool from Google, built into clang and gcc, to help you
    detect race conditions in your code (“ThreadSanitizerCppManual” [2018](ch018.xhtml#ref-threadsanitizercppmanual_2018)).
    Note, that running with tsan will slow your code down a bit. Consider the following
    code.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: ThreadSanitizer 是 Google 的一项工具，内置在 clang 和 gcc 中，用于帮助你在代码中检测竞态条件（“ThreadSanitizerCppManual”
    [2018](ch018.xhtml#ref-threadsanitizercppmanual_2018)）。注意，使用 tsan 会使你的代码运行速度稍微慢一些。考虑以下代码。
- en: '[PRE16]'
  id: totrans-95
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: We can see that there is a race condition on the variable . Both the main thread
    and created thread will try to change the value at the same time. But, does ThreadSantizer
    catch it?
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到变量上存在竞态条件。主线程和创建的线程都会尝试同时更改该值。但是，ThreadSanitizer 能捕捉到它吗？
- en: '[PRE17]'
  id: totrans-97
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: If we compiled with the debug flag, then it would give us the variable name
    as well.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们使用调试标志进行编译，那么它还会给出变量名。
- en: GDB
  id: totrans-99
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: GDB
- en: 'GDB is short for the GNU Debugger. GDB is a program that helps you track down
    errors by interactively debugging them (“GDB: The Gnu Project Debugger” [2019](ch018.xhtml#ref-gdb)).
    It can start and stop your program, look around, and put in ad hoc constraints
    and checks. Here are a few examples.'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 'GDB 是 GNU 调试器的缩写。GDB 是一个程序，它通过交互式调试帮助你追踪错误（“GDB: The Gnu Project Debugger”
    [2019](ch018.xhtml#ref-gdb)）。它可以启动和停止你的程序，四处查看，并设置临时的约束和检查。以下是一些示例。'
- en: Setting breakpoints programmatically
  id: totrans-101
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 通过编程方式设置断点
- en: A breakpoint is a line of code where you want the execution to stop and give
    control back to the debugger. A useful trick when debugging complex C programs
    with GDB is setting breakpoints in the source code.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 断点是指你希望程序停止执行并将控制权交回调试器的代码行。在用 GDB 调试复杂的 C 程序时，设置源代码中的断点是一个有用的技巧。
- en: '[PRE18]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: '[PRE19]'
  id: totrans-104
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: You can also set breakpoints programmatically. Assume that we have no optimization
    and the line numbers are as follows
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
