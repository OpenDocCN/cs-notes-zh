- en: 'Hi, I recently failed test X, Y, Z which is about half the tests on this current
    assignment. I noticed that they all have something to do with networking and epoll,
    but couldn’t figure out what was linking them together, or I may be completely
    off track. So to test my idea, I tried spawning 1000 clients with various get
    and put requests and verifying the files matched their originals. I couldn’t get
    it to fail while running normally, the debug build, or valgrind or tsan. I have
    no warnings and none of the pre-syntax checks showed me anything. Could you tell
    me if my understanding of the failure is correct and what I could do to modify
    my tests to better reflect X, Y, Z? netid: bvenkat2'
  id: totrans-260
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '嗨，我最近在测试X、Y、Z中失败了，这些测试大约占当前作业的一半。我注意到它们都与网络和epoll有关，但我无法弄清楚它们是如何相互关联的，或者我可能完全偏离了轨道。所以为了测试我的想法，我尝试用各种get和put请求启动了1000个客户端，并验证文件与它们的原始文件匹配。我在正常运行、调试构建、valgrind或tsan时都无法让它失败。我没有收到任何警告，也没有任何预语法检查显示给我任何信息。你能告诉我我对失败的理解是否正确，以及我如何修改我的测试以更好地反映X、Y、Z吗？netid:
    bvenkat2'
- en: You don’t need to be as courteous, though we’d appreciate it, this will get
    a faster response time hand over foot. If you were trying to answer this question,
    you’d have everything you need in the question body.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 你不必表现得那么有礼貌，尽管我们会感激，但这会更快地得到回应。如果你试图回答这个问题，你会在问题正文中找到你需要的一切。
