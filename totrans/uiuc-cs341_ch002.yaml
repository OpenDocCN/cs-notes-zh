- en: Shell
  id: totrans-131
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Shell
- en: What do you actually use to run your program? A shell! A shell is a programming
    language that is running inside your terminal. A terminal is merely a window to
    input commands. Now, on POSIX we usually have one shell called that is linked
    to a POSIX compliant shell called . Most of the time, you use a shell called that
    is somewhat POSIX compliant but has some nifty built-in features. If you want
    to be even more advanced, has some more powerful features like tab complete on
    programs and fuzzy patterns.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 你实际上是用什么来运行你的程序的？是shell！shell是一种运行在终端内的编程语言。终端只是一个输入命令的窗口。在POSIX系统中，我们通常有一个名为的shell，它与一个符合POSIX规范的shell链接。大多数时候，你使用的是一个称为的shell，它某种程度上符合POSIX规范，但有一些实用的内置功能。如果你想更高级，它有一些更强大的功能，比如程序上的tab补全和模糊模式。
- en: Undefined Behavior Sanitizer
  id: totrans-133
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 未定义行为清理器
- en: The undefined behavior sanitizer is a wonderful tool provided by the llvm project.
    It allows you to compile code with a runtime checker to make sure that you don’t
    do undefined behavior for various categories. We will try to include it into our
    projects, but requires support form all the external libraries that we use so
    we may not get around to all of them. [https://clang.llvm.org/docs/UndefinedBehaviorSanitizer.html](https://clang.llvm.org/docs/UndefinedBehaviorSanitizer.html)
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 未定义行为清理器是llvm项目提供的一个奇妙工具。它允许你使用运行时检查器编译代码，以确保你不会对各种类别执行未定义行为。我们将尝试将其纳入我们的项目，但这需要所有外部库的支持，所以我们可能无法全部完成。[未定义行为清理器文档](https://clang.llvm.org/docs/UndefinedBehaviorSanitizer.html)
- en: Undefined behavior - why we can’t solve it in general
  id: totrans-135
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 未定义行为 - 为什么我们通常无法解决它
- en: Also please please read Chris Lattner’s 3 Part blog post on undefined behavior.
    It can shed light on debug builds and the mystery of compiler optimization.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 也请务必阅读Chris Lattner的关于未定义行为的3部分博客文章。它可以帮助你了解调试构建和编译器优化的神秘之处。
- en: '[http://blog.llvm.org/2011/05/what-every-c-programmer-should-know.html](http://blog.llvm.org/2011/05/what-every-c-programmer-should-know.html)'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: '[每个C程序员都应该知道的事情](http://blog.llvm.org/2011/05/what-every-c-programmer-should-know.html)'
- en: Clang Static Build Tools
  id: totrans-138
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Clang静态构建工具
- en: Clang provides a great drop-in replacement tools for compiling programs. If
    you want to see if there is an error that may cause a race condition, casting
    error, etc, all you need to do is the following.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: Clang提供了编译程序的出色替代工具。如果你想检查可能引起竞态条件、类型转换错误等错误，你只需要做以下操作。
- en: '[PRE30]'
  id: totrans-140
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: And in addition to the make output, you will get static build warnings.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 除了make输出之外，你还会得到静态构建警告。
- en: strace and ltrace
  id: totrans-142
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: strace和ltrace
- en: 'strace and ltrace are two programs that trace the system calls and library
    calls, respectively, of a running program or command. These may be missing on
    your system, so to install, run the following:'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: strace和ltrace是两个程序，分别跟踪运行程序或命令的系统调用和库调用。这些可能在你的系统上缺失，所以为了安装，请运行以下命令：
- en: '[PRE31]'
  id: totrans-144
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: Debugging with ltrace can be as simple as figuring out what was the return call
    of the last library call that failed.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ltrace进行调试可能就像找出最后一个失败的库调用的返回调用一样简单。
- en: '[PRE32]'
  id: totrans-146
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: '[PRE33]'
  id: totrans-147
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: ltrace output can clue you in to weird things your program is doing live. Unfortunately,
    ltrace can’t be used to inject faults, meaning that ltrace can tell you what is
    happening, but it can’t tamper with what is already happening.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: ltrace输出可以让你了解程序在运行时所做的奇怪事情。不幸的是，ltrace不能用来注入故障，这意味着ltrace可以告诉你正在发生什么，但它不能干扰已经发生的事情。
- en: strace on the other hand could modify your program. Debugging with strace is
    amazing. The basic usage is running strace with a program, and it’ll get you a
    complete list of system call parameters.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，`strace`可以修改你的程序。使用`strace`进行调试非常神奇。基本用法是运行带有程序的`strace`，它会给你一个完整的系统调用参数列表。
- en: '[PRE34]'
  id: totrans-150
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: If the output is too verbose, you can use trace= with a command delimited list
    of syscalls to filter all but those calls.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 如果输出太冗长，你可以使用`trace=`与以命令分隔的syscalls列表来过滤除了那些调用之外的所有调用。
- en: '[PRE35]'
  id: totrans-152
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: You can also trace files or targets.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以跟踪文件或目标。
- en: '[PRE36]'
  id: totrans-154
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: Newer versions of strace can actually inject faults into your program. This
    is useful when you want to occasionally make reads and writes fail for example
    in a networking application, which your program should handle. The problem is
    as of early 2019, that version is missing from Ubuntu repositories. Meaning that
    you’ll have to install it from the source.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 更新版本的`strace`实际上可以注入故障到你的程序中。当你想偶尔让读取和写入失败时，例如在网络应用程序中，你的程序应该处理这种情况，这很有用。问题是截至2019年初，这个版本在Ubuntu仓库中缺失。这意味着你将不得不从源代码安装它。
- en: printfs
  id: totrans-156
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '`printfs`'
- en: When all else fails, print! Each of your functions should have an idea of what
    it is going to do. You want to test that each of your functions is doing what
    it set out to do and see exactly where your code breaks. In the case with race
    conditions, tsan may be able to help, but having each thread print out data at
    certain times could help you identify the race condition.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 当所有其他方法都失败时，打印！每个函数都应该有一个关于它将要做什么的想法。你想要测试每个函数是否真的做了它打算做的事情，并确切地看到你的代码在哪里出错。在竞争条件的情况下，tsan可能有所帮助，但每个线程在特定时间打印数据可以帮助你识别竞争条件。
- en: To make printfs useful, try to have a macro that fills in the context by which
    the printf was called – a log statement if you will. A simple useful but untested
    log statement could be as follows. Try to make a test and figure out something
    that is going wrong, then log the state of your variables.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使`printf`函数更有用，尝试创建一个宏，通过它填充调用`printf`时的上下文——即日志语句。一个简单但未经验证的日志语句可能如下所示。尝试进行测试，找出出错的原因，然后记录变量的状态。
- en: '[PRE37]'
  id: totrans-159
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: And then use as appropriately. Check out the compiling and linking section in
    the appendix if you have any questions on how a C program gets translated to machine
    code.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 然后根据需要使用。如果你对如何将C程序转换为机器代码有任何疑问，请查看附录中的编译和链接部分。
