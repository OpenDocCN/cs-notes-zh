  - PREF_H2
  type: TYPE_NORMAL
  zh: 问题
- en: What happens when a pthread gets created?
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当pthread被创建时会发生什么？
