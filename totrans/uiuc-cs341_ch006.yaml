- en: Threads
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 线程
- en: A thread is short for ‘thread-of-execution’. It represents the sequence of instructions
    that the CPU has and will execute. To remember how to return from function calls,
    and to store the values of automatic variables and parameters a thread uses a
    stack. Almost weirdly, a thread is a process, meaning that creating a thread is
    similar to , except there is **no copying** meaning no copy on write. What this
    allows is for a process to share the same address space, variables, heap, file
    descriptors and etc. The actual system call to create a thread is similar to .
    It’s . We won’t go into the specifics, but you can read the [man pages](http://man7.org/linux/man-pages/man2/clone.2.html)
    keeping in mind that it is outside the direct scope of this course. LWP or Lightweight
    Processes or threads are preferred to forking for a lot of scenarios because there
    is a lot less overhead creating them. But in some cases, notably python uses this,
    multiprocessing is the way to make your code faster.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 线程是“执行线程”的简称。它代表了CPU将要执行的指令序列。为了记住如何从函数调用中返回，以及存储自动变量和参数的值，线程使用一个栈。几乎有点奇怪的是，线程是一个进程，这意味着创建线程类似于进程，但是没有复制，也就是说没有写时复制。这允许进程共享相同的地址空间、变量、堆、文件描述符等。创建线程的实际系统调用类似于。它是。我们不会深入细节，但你可以阅读[man手册](http://man7.org/linux/man-pages/man2/clone.2.html)，记住这超出了本课程的直接范围。LWP（轻量级进程）或线程在许多场景下比fork更受欢迎，因为创建它们的开销要小得多。但在某些情况下，特别是Python使用这种情况，多进程是使你的代码更快的方法。
- en: Processes vs threads
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 进程与线程的比较
- en: 'Creating separate processes is useful when:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 创建单独的进程有用的情况：
- en: When more security is desired. For example, Chrome browser uses different processes
    for different tabs.
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当需要更多安全性时。例如，Chrome浏览器为不同的标签页使用不同的进程。
- en: When running an existing and complete program then a new process is required,
    for example starting ‘gcc‘.
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当运行现有且完整的程序时需要创建新进程，例如启动‘gcc’。
- en: When you are running into synchronization primitives and each process is operating
    on something in the system.
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你在遇到同步原语，并且每个进程都在操作系统中的某个东西时。
- en: When you have too many threads – the kernel tries to schedule all the threads
    near each other which could cause more harm than good.
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你有太多线程时——内核试图将所有线程调度到彼此附近，这可能会造成比好处更多的伤害。
- en: When you don’t want to worry about race conditions
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你不想担心竞态条件时
- en: When the amount of communication is minimal enough that simple IPC needs to
    be used.
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当通信量足够小，以至于只需要简单的IPC（进程间通信）时。
- en: 'On the other hand, creating threads is more useful when:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，创建线程更有用，当：
- en: You want to leverage the power of a multi-core system to do one task
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你想利用多核系统的力量来完成一项任务
- en: When you can’t deal with the overhead of processes
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你无法处理进程的开销时
- en: When you want communication between the processes simplified
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你想要简化进程间的通信时
- en: When you want to threads to be part of the same process
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你希望线程成为同一进程的一部分时
- en: Thread Internals
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 线程内部结构
- en: Your main function and other functions has automatic variables. We will store
    them in memory using a stack and keep track of how large the stack is by using
    a simple pointer (the “stack pointer”). If the thread calls another function,
    we move our stack pointer down, so that we have more space for parameters and
    automatic variables. Once it returns from a function, we can move the stack pointer
    back up to its previous value. We keep a copy of the old stack pointer value -
    on the stack! This is why returning from a function is quick. It’s easy to ‘free’
    the memory used by automatic variables because the program needs to change the
    stack pointer.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 你的主函数和其他函数有自动变量。我们将使用栈在内存中存储它们，并通过使用简单的指针（“栈指针”）来跟踪栈的大小。如果线程调用另一个函数，我们将移动我们的栈指针，以便有更多空间用于参数和自动变量。一旦从函数返回，我们可以将栈指针移回到其先前值。我们保留旧栈指针值的副本——在栈上！这就是为什么从函数返回是快速的原因。因为程序需要改变栈指针，所以自动变量占用的内存很容易“释放”。
- en: In a multi-threaded program, there are multiple stacks but only one address
    space. The pthread library allocates some stack space and uses the function call
    to start the thread at that stack address.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在多线程程序中，有多个栈，但只有一个地址空间。pthread库分配一些栈空间，并使用函数调用在栈地址处启动线程。
- en: '![Thread stack visualization](../media/file16.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![线程栈可视化](../media/file16.png)'
- en: Thread stack visualization
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 线程栈可视化
- en: A program can have more than one thread running inside a process. The programget
    the first thread for free! It runs the code you write inside ‘main’. If a program
    need more threads, it can call to create a new thread using the pthread library.
    You’ll need to pass a pointer to a function so that the thread knows where to
    start.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 一个程序可以在一个进程中运行多个线程。程序会免费获得第一个线程！它运行你写在‘main’中的代码。如果程序需要更多线程，它可以调用以使用pthread库创建新线程。您需要传递一个指向函数的指针，以便线程知道从哪里开始。
- en: The threads all live inside the same virtual memory because they are part of
    the same process. Thus they can all see the heap, the global variables, and the
    program code.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 由于线程都是同一进程的一部分，它们都生活在相同的虚拟内存中。因此，它们都可以看到堆、全局变量和程序代码。
- en: '![Threads pointing to the same place in the heap](../media/file17.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![堆中指向同一位置的线程](../media/file17.png)'
- en: Threads pointing to the same place in the heap
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 堆中指向同一位置的线程
- en: Thus, a program can have two (or more) CPUs working on your program at the same
    time and inside the same process. It’s up to the operating system to assign the
    threads to CPUs. If a program has more active threads than CPUs, the kernel will
    assign the thread to a CPU for a short duration or until it runs out of things
    to do and then will automatically switch the CPU to work on another thread. For
    example, one CPU might be processing the game AI while another thread is computing
    the graphics output.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，一个程序可以在同一进程中同时由两个（或更多）CPU工作，并且它们可以同时工作。操作系统负责将线程分配给CPU。如果一个程序的活动线程比CPU多，内核将分配一个线程给CPU进行短暂的处理，或者直到它没有更多事情可做，然后自动将CPU切换到处理另一个线程。例如，一个CPU可能正在处理游戏AI，而另一个线程正在计算图形输出。
- en: Simple Usage
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简单用法
- en: 'To use pthreads, include and compile and link with or compiler option. This
    option tells the compiler that your program requires threading support. To create
    a thread, use the function . This function takes four arguments:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用pthread，需要包含并编译和链接或编译器选项。此选项告诉编译器，您的程序需要线程支持。要创建线程，请使用函数。此函数接受四个参数：
- en: '[PRE0]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: The first is a pointer to a variable that will hold the id of the newly created
    thread.
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第一个是指向将持有新创建的线程ID的变量的指针。
- en: The second is a pointer to attributes that we can use to tweak and tune some
    of the advanced features of pthreads.
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第二个是指向我们可以用来调整和调整pthread一些高级功能的属性的指针。
- en: The third is a pointer to a function that we want to run
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第三是我们要运行的函数的指针
- en: Fourth is a pointer that will be given to our function
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第四是传递给我们的函数的指针
- en: The argument is difficult to read! It means a pointer that takes a pointer and
    returns a pointer. It looks like a function declaration except that the name of
    the function is wrapped with
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 参数难以阅读！这意味着一个接受指针并返回指针的指针。它看起来像函数声明，除了函数名被括号包围。
- en: '[PRE1]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: In the above example, the result will be because the busy function returned
    . We need to pass the address-of result because will be writing into the contents
    of our pointer.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在上述示例中，结果将是，因为繁忙的函数返回了。我们需要传递结果地址，因为我们将写入指针的内容。
- en: In the man pages, it warns that programmers should use as an opaque type and
    not look at the internals. We do ignore that often, though.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在手册页中，它警告程序员应该使用作为不透明类型，并且不要查看内部结构。尽管如此，我们经常忽略这一点。
- en: Pthread Functions
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Pthread函数
- en: 'Here are some common pthread functions:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些常见的pthread函数：
- en: creates a new thread. Every thread gets a new stack. If a program calls twice,
    Your process will contain three stacks - one for each thread. The first thread
    is created when the process start, the other two after the create. Actually, there
    can be more stacks than this, but let’s keep it simple. The important idea is
    that each thread requires a stack because the stack contains automatic variables
    and the old CPU PC register, so that it can go back to executing the calling function
    after the function is finished.
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建一个新线程。每个线程都会得到一个新的栈。如果程序两次调用，则您的进程将包含三个栈 - 每个线程一个。第一个线程是在进程启动时创建的，其他两个是在创建后。实际上，可能还有更多的栈，但让我们保持简单。重要的思想是每个线程都需要一个栈，因为栈包含自动变量和旧的CPU
    PC寄存器，这样它就可以在函数完成后返回调用函数。
- en: stops a thread. Note the thread may still continue. For example, it can be terminated
    when the thread makes an operating system call (e.g. ). In practice, is rarely
    used because a thread won’t clean up open resources like files. An alternative
    implementation is to use a boolean (int) variable whose value is used to inform
    other threads that they should finish and clean up.
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 停止一个线程。注意，线程可能仍然继续。例如，当线程执行操作系统调用（例如）时，它可能被终止。在实际应用中，很少使用，因为线程不会清理像文件这样的打开资源。另一种实现方法是使用一个布尔（int）变量，其值用于通知其他线程它们应该完成并清理。
- en: stops the calling thread meaning the thread never returns after calling . The
    pthread library will automatically finish the process if no other threads are
    running. is equivalent to returning from the thread’s function; both finish the
    thread and also set the return value (void *pointer) for the thread. Calling in
    the thread is a common way for simple programs to ensure that all threads finish.
    For example, in the following program, the threads will probably not have time
    to get started. On the other hand exits the entire process and sets the process’
    exit value. This is equivalent to in the main method. All threads inside the process
    are stopped. Note the version creates thread zombies; however, this is not a long-running
    process, so we don’t care.
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 停止调用线程，意味着线程在调用后永远不会返回。如果没有其他线程正在运行，pthread 库将自动完成进程。这等价于从线程函数返回；两者都结束线程并设置线程的返回值（void
    指针）。在线程中调用是简单程序确保所有线程完成的一种常见方式。例如，在以下程序中，线程可能没有时间开始。另一方面，退出整个进程并设置进程的退出值。这等价于在主方法中。进程内的所有线程都将停止。注意，版本会创建线程僵尸；然而，这不是一个长时间运行的进程，所以我们并不关心。
- en: '[PRE2]'
  id: totrans-41
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE2]'
- en: waits for a thread to finish and records its return value. Finished threads
    will continue to consume resources. Eventually, if enough threads are created,
    will fail. In practice, this is only an issue for long-running processes but is
    not an issue for simple, short-lived processes as all thread resources are automatically
    freed when the process exits. This is equivalent to turning your children into
    zombies, so keep this in mind for long-running processes. In the exit example,
    we could also wait on all the threads.
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 等待线程完成并记录其返回值。已完成的线程将继续消耗资源。最终，如果创建了足够的线程，将会失败。在实际应用中，这仅是长时间运行进程的问题，但对于简单、短暂的生命周期进程来说并不是问题，因为所有线程资源在进程退出时都会自动释放。这相当于让你的孩子变成僵尸，所以对于长时间运行的进程要记住这一点。在退出示例中，我们也可以等待所有线程。
- en: '[PRE3]'
  id: totrans-43
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'There are many ways to exit threads. Here is a non-complete list:'
