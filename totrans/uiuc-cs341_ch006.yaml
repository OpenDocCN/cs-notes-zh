- en: Race Conditions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Race conditions are whenever the outcome of a program is determined by its sequence
    of events determined by the processor. This means that the execution of the code
    is non-deterministic. Meaning that the same program can run multiple times and
    depending on how the kernel schedules the threads could produce inaccurate results.
    The following is the canonical race condition.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Breaking down the assembly there are many different accesses of the code. We
    will assume that data is stored in the register. The code to increment is the
    following with no optimization (assume int_ptr contains eax).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Consider this access pattern.
  prefs: []
  type: TYPE_NORMAL
- en: '![Thread access - not a race condition](../media/file18.png)'
  prefs: []
  type: TYPE_IMG
- en: Thread access - not a race condition
  prefs: []
  type: TYPE_NORMAL
- en: This access pattern will cause the variable to be 4\. The problem is when the
    instructions are executed in parallel.
  prefs: []
  type: TYPE_NORMAL
- en: '![Thread access - race condition](../media/file19.png)'
  prefs: []
  type: TYPE_IMG
- en: Thread access - race condition
  prefs: []
  type: TYPE_NORMAL
- en: This access pattern will cause the variable to be 2\. This is undefined behavior
    and a race condition. What we want is one thread to access the part of the code
    at a time.
  prefs: []
  type: TYPE_NORMAL
- en: But when compiled with , assembly output is a single instruction.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Shouldn’t that fix it? It is a single assembly instruction so no interleaving?
    It doesn’t fix the problems that the *hardware itself* may experience a race condition
    because we as programmers didn’t tell the hardware to check for it. The easiest
    way is to add the *lock* prefix (Guide [2011](ch018.xhtml#ref-guide2011intel),
    1120).
  prefs: []
  type: TYPE_NORMAL
- en: But we don’t want to be coding in assembly! We need to come up with a software
    solution to this problem.
  prefs: []
  type: TYPE_NORMAL
- en: A day at the races
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Here is another small race condition. The following code is supposed to start
    ten threads with the integers 0 through 9 inclusive. However, when run prints
    out ! Or seldom does it print out what we expect. Can you see why?
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: The above code suffers from a - the value of i is changing. The new threads
    start later in the example output the last thread starts after the loop has finished.
    To overcome this race-condition, we will give each thread a pointer to its own
    data area. For example, for each thread we may want to store the id, a starting
    value and an output value. We will instead treat i as a pointer and cast it by
    value.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: Race conditions aren’t in our code. They can be in provided code Some functions
    like , , , not thread-safe. Let’s look at a simple function that is also not ‘thread-safe’.
    The result buffer could be stored in global memory. This is good in a single-threaded
    program. We wouldn’t want to return a pointer to an invalid address on the stack,
    but there’s only one result buffer in the entire memory. If two threads were to
    use it at the same time, one would corrupt the other.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: There are ways around this like using synchronization locks, but first let’s
    do this by design. How would you fix the function above? You can change any of
    the parameters and any return types. Here is one valid solution.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: Instead of making the function responsible for the memory, we made the caller
    responsible! A lot of programs, and hopefully your programs, have minimal communication
    needed. Often a malloc call is less work than locking a mutex or sending a message
    to another thread.
  prefs: []
  type: TYPE_NORMAL
- en: Don’t Cross the Streams
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A program can fork inside a process with multiple threads! However, the child
    process only has a single thread, which is a clone of the thread that called .
    We can see this as a simple example, where the background threads never print
    out a second message in the child process.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: In practice, creating threads before forking can lead to unexpected errors because
    (as demonstrated above) the other threads are immediately terminated when forking.
    Another thread might have locked a mutex like by calling malloc and never unlock
    it again. Advanced users may find useful however we suggest a program avoid creating
    threads before forking unless you fully understand the limitations and difficulties
    of this approach.
  prefs: []
  type: TYPE_NORMAL
- en: Embarrassingly Parallel Problems
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The study of parallel algorithms has exploded over the past few years. An embarrassingly
    parallel problem is any problem that needs little effort to turn parallel. A lot
    of them have some synchronization concepts with them but not always. You already
    know a parallelizable algorithm, Merge Sort!
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: With your new understanding of threads, all you need to do is create a thread
    for the left half, and one for the right half. Given that your CPU has multiple
    real cores, you will see a speedup following [Amdahl’s Law](https://en.wikipedia.org/wiki/Amdahl's_law).
    The time complexity analysis gets interesting here as well. The parallel algorithm
    runs in <semantics><mrow><mi>O</mi><mo stretchy="false" form="prefix">(</mo><msup><mo>log</mo><mn>3</mn></msup><mo
    stretchy="false" form="prefix">(</mo><mi>n</mi><mo stretchy="false" form="postfix">)</mo><mo
    stretchy="false" form="postfix">)</mo></mrow><annotation encoding="application/x-tex">O(\log^3(n))</annotation></semantics>
    running time because we have the analysis assumes that we have a lot of cores.
  prefs: []
  type: TYPE_NORMAL
- en: In practice though, we typically do two changes. One, once the array gets small
    enough, we ditch the Parallel Merge Sort algorithm and do conventional sort that
    works fast on small arrays, usually cache coherency rules at this level. The other
    thing that we know is that CPUs don’t have infinite cores. To get around that,
    we typically keep a worker pool. You won’t see the speedup right away because
    of things like cache coherency and scheduling extra threads. Over the bigger pieces
    of code, though, you will start to see speedups.
  prefs: []
  type: TYPE_NORMAL
- en: Another embarrassingly parallel problem is parallel map. Say we want to apply
    a function to an entire array, one element at a time.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: Since none of the elements depend on any other element, how would you go about
    parallelizing this? What do you think would be the best way to split up the work
    between threads.
  prefs: []
  type: TYPE_NORMAL
- en: Check out thread scheduling in the appendix for more ways to schedule.
  prefs: []
  type: TYPE_NORMAL
