- en: Some undefined behavior can terminate your threads, it is undefined behavior
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一些未定义的行为可以终止你的线程，这是未定义的行为
- en: Race Conditions
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 竞争条件
- en: Race conditions are whenever the outcome of a program is determined by its sequence
    of events determined by the processor. This means that the execution of the code
    is non-deterministic. Meaning that the same program can run multiple times and
    depending on how the kernel schedules the threads could produce inaccurate results.
    The following is the canonical race condition.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 竞争条件是指程序的结果由处理器根据其事件序列确定。这意味着代码的执行是非确定性的。这意味着相同的程序可以运行多次，并且根据内核如何调度线程，可能会产生不准确的结果。以下是一个典型的竞争条件。
- en: '[PRE4]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Breaking down the assembly there are many different accesses of the code. We
    will assume that data is stored in the register. The code to increment is the
    following with no optimization (assume int_ptr contains eax).
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 分析汇编代码，有许多不同的代码访问方式。我们将假设数据存储在寄存器中。以下是不进行优化的增量代码（假设 int_ptr 包含 eax）。
- en: '[PRE5]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Consider this access pattern.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑这种访问模式。
- en: '![Thread access - not a race condition](../media/file18.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![线程访问 - 不是竞争条件](../media/file18.png)'
- en: Thread access - not a race condition
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 线程访问 - 不是竞争条件
- en: This access pattern will cause the variable to be 4\. The problem is when the
    instructions are executed in parallel.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 这种访问模式将导致变量变为4。问题是当指令并行执行时。
- en: '![Thread access - race condition](../media/file19.png)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
  zh: '![线程访问 - 竞争条件](../media/file19.png)'
- en: Thread access - race condition
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 线程访问 - 竞争条件
- en: This access pattern will cause the variable to be 2\. This is undefined behavior
    and a race condition. What we want is one thread to access the part of the code
    at a time.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 这种访问模式将导致变量被2\. 这是一种未定义的行为和竞态条件。我们希望一次只有一个线程访问代码的一部分。
- en: But when compiled with , assembly output is a single instruction.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 但当用编译时，汇编输出是一个单条指令。
- en: '[PRE6]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Shouldn’t that fix it? It is a single assembly instruction so no interleaving?
    It doesn’t fix the problems that the *hardware itself* may experience a race condition
    because we as programmers didn’t tell the hardware to check for it. The easiest
    way is to add the *lock* prefix (Guide [2011](ch018.xhtml#ref-guide2011intel),
    1120).
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 难道这不能解决问题吗？这只是一个汇编指令，所以没有交错？它不能解决硬件本身可能遇到的竞态条件问题，因为我们作为程序员没有告诉硬件去检查它。最简单的方法是添加*lock*前缀（指南[2011](ch018.xhtml#ref-guide2011intel)，1120）。
- en: But we don’t want to be coding in assembly! We need to come up with a software
    solution to this problem.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们不想在汇编语言中编码！我们需要为这个问题想出一个软件解决方案。
- en: A day at the races
  id: totrans-70
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 赛马日
- en: Here is another small race condition. The following code is supposed to start
    ten threads with the integers 0 through 9 inclusive. However, when run prints
    out ! Or seldom does it print out what we expect. Can you see why?
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 这里还有一个小的竞态条件。以下代码本应启动十个线程，整数从0到9。然而，当运行时打印出！或者很少打印出我们期望的内容。你能看出为什么吗？
- en: '[PRE7]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The above code suffers from a - the value of i is changing. The new threads
    start later in the example output the last thread starts after the loop has finished.
    To overcome this race-condition, we will give each thread a pointer to its own
    data area. For example, for each thread we may want to store the id, a starting
    value and an output value. We will instead treat i as a pointer and cast it by
    value.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 上述代码受到一个-的影响，i的值正在改变。新线程在示例输出中开始得晚，最后一个线程在循环结束后开始。为了克服这个竞态条件，我们将为每个线程提供一个指向其自己的数据区域的指针。例如，对于每个线程，我们可能想要存储id、起始值和输出值。我们将把i视为一个指针，并通过值进行转换。
- en: '[PRE8]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Race conditions aren’t in our code. They can be in provided code Some functions
    like , , , not thread-safe. Let’s look at a simple function that is also not ‘thread-safe’.
    The result buffer could be stored in global memory. This is good in a single-threaded
    program. We wouldn’t want to return a pointer to an invalid address on the stack,
    but there’s only one result buffer in the entire memory. If two threads were to
    use it at the same time, one would corrupt the other.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 竞态条件不在我们的代码中。它们可能存在于提供的代码中。一些函数如， ， ，不是线程安全的。让我们看看一个也是不“线程安全”的简单函数。结果缓冲区可以存储在全局内存中。在单线程程序中这是好的。我们不想返回一个指向栈上无效地址的指针，但在整个内存中只有一个结果缓冲区。如果两个线程同时使用它，一个会破坏另一个。
- en: '[PRE9]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: There are ways around this like using synchronization locks, but first let’s
    do this by design. How would you fix the function above? You can change any of
    the parameters and any return types. Here is one valid solution.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 有一些方法可以解决这个问题，比如使用同步锁，但首先让我们通过设计来做这件事。你会如何修复上面的函数？你可以更改任何参数和任何返回类型。这里有一个有效的解决方案。
- en: '[PRE10]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Instead of making the function responsible for the memory, we made the caller
    responsible! A lot of programs, and hopefully your programs, have minimal communication
    needed. Often a malloc call is less work than locking a mutex or sending a message
    to another thread.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不是让函数负责内存，而是让调用者负责！许多程序，包括希望你的程序，需要的通信量最小。通常malloc调用比锁定互斥锁或向另一个线程发送消息要少。
- en: Don’t Cross the Streams
  id: totrans-80
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 不要跨界
- en: A program can fork inside a process with multiple threads! However, the child
    process only has a single thread, which is a clone of the thread that called .
    We can see this as a simple example, where the background threads never print
    out a second message in the child process.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 一个程序可以在一个多线程进程中fork！然而，子进程只有一个线程，它是调用进程的线程的克隆。我们可以将这视为一个简单示例，其中后台线程永远不会在子进程中打印第二条消息。
- en: '[PRE11]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: '[PRE12]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: In practice, creating threads before forking can lead to unexpected errors because
    (as demonstrated above) the other threads are immediately terminated when forking.
    Another thread might have locked a mutex like by calling malloc and never unlock
    it again. Advanced users may find useful however we suggest a program avoid creating
    threads before forking unless you fully understand the limitations and difficulties
    of this approach.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，在分叉之前创建线程可能导致意外的错误，因为（如上所示）在分叉时其他线程会立即终止。另一个线程可能通过调用malloc锁定互斥锁，然后永远不会解锁它。然而，高级用户可能会发现这很有用，但我们建议程序在充分理解这种方法局限性和困难的情况下避免在分叉之前创建线程。
- en: Embarrassingly Parallel Problems
  id: totrans-85
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 令人尴尬的并行问题
- en: The study of parallel algorithms has exploded over the past few years. An embarrassingly
    parallel problem is any problem that needs little effort to turn parallel. A lot
    of them have some synchronization concepts with them but not always. You already
    know a parallelizable algorithm, Merge Sort!
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 近年来，并行算法的研究已经激增。任何只需稍加努力就能实现并行的难题都可以称为令人尴尬的并行问题。其中许多问题与某些同步概念相关，但并非总是如此。你已经知道一个可并行化的算法，即归并排序！
- en: '[PRE13]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: With your new understanding of threads, all you need to do is create a thread
    for the left half, and one for the right half. Given that your CPU has multiple
    real cores, you will see a speedup following [Amdahl’s Law](https://en.wikipedia.org/wiki/Amdahl's_law).
    The time complexity analysis gets interesting here as well. The parallel algorithm
    runs in <semantics><mrow><mi>O</mi><mo stretchy="false" form="prefix">(</mo><msup><mo>log</mo><mn>3</mn></msup><mo
    stretchy="false" form="prefix">(</mo><mi>n</mi><mo stretchy="false" form="postfix">)</mo><mo
    stretchy="false" form="postfix">)</mo></mrow><annotation encoding="application/x-tex">O(\log^3(n))</annotation></semantics>
    running time because we have the analysis assumes that we have a lot of cores.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 在你对线程有了新的理解之后，你所需要做的就是为左半部分创建一个线程，为右半部分创建一个线程。鉴于你的CPU有多个真实核心，你将看到根据[Amdahl定律](https://en.wikipedia.org/wiki/Amdahl's_law)的速度提升。在这里，时间复杂度分析也变得很有趣。并行算法以<semantics><mrow><mi>O</mi><mo
    stretchy="false" form="prefix">(</mo><msup><mo>log</mo><mn>3</mn></msup><mo stretchy="false"
    form="prefix">(</mo><mi>n</mi><mo stretchy="false" form="postfix">)</mo><mo stretchy="false"
    form="postfix">)</mo></mrow><annotation encoding="application/x-tex">O(\log^3(n))</annotation></semantics>的运行时间运行，因为我们假设我们有很多核心。
- en: In practice though, we typically do two changes. One, once the array gets small
    enough, we ditch the Parallel Merge Sort algorithm and do conventional sort that
    works fast on small arrays, usually cache coherency rules at this level. The other
    thing that we know is that CPUs don’t have infinite cores. To get around that,
    we typically keep a worker pool. You won’t see the speedup right away because
    of things like cache coherency and scheduling extra threads. Over the bigger pieces
    of code, though, you will start to see speedups.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在实践中，我们通常进行两个更改。一是，一旦数组足够小，我们就放弃并行归并排序算法，并使用在小型数组上运行快速的常规排序，通常在这个级别上遵循缓存一致性规则。另一件事是我们知道CPU没有无限的核心。为了解决这个问题，我们通常保持一个工作池。由于缓存一致性、调度额外线程等问题，你不会立即看到速度提升。然而，在更大的代码片段上，你将开始看到速度提升。
- en: Another embarrassingly parallel problem is parallel map. Say we want to apply
    a function to an entire array, one element at a time.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个令人尴尬的并行问题是并行映射。假设我们想要逐个元素将一个函数应用于整个数组。
- en: '[PRE14]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Since none of the elements depend on any other element, how would you go about
    parallelizing this? What do you think would be the best way to split up the work
    between threads.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 由于没有任何元素依赖于其他元素，你将如何进行并行化？你认为将工作分配给线程的最佳方式是什么？
- en: Check out thread scheduling in the appendix for more ways to schedule.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 在附录中查看线程调度以获取更多调度方法。
- en: Other Problems
  id: totrans-94
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 其他问题
- en: From [Wikipedia](https://en.wikipedia.org/wiki/Embarrassingly_parallel)
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 来自[Wikipedia](https://en.wikipedia.org/wiki/Embarrassingly_parallel)
- en: Serving static files on a web server to multiple users at once.
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在Web服务器上同时为多个用户提供静态文件。
- en: The Mandelbrot set, Perlin noise, and similar images, where each point is calculated
    independently.
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 曼德布罗特集、Perlin噪声和类似图像，其中每个点都是独立计算的。
- en: Rendering of computer graphics. In computer animation, each frame may be rendered
    independently (see parallel rendering).
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算机图形的渲染。在计算机动画中，每一帧可以独立渲染（参见并行渲染）。
- en: Brute-force searches in cryptography.
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 密码学中的暴力搜索。
- en: Notable real-world examples include distributed.net and proof-of-work systems
    used in cryptocurrency.
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 举世瞩目的实际例子包括分布式.net和加密货币中使用的证明工作系统。
- en: BLAST searches in bioinformatics for multiple queries (but not for individual
    large queries)
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生物信息学中的BLAST搜索，用于多个查询（但不用于单个大型查询）
- en: Large scale facial recognition systems that compare thousands of arbitrary acquired
    faces (e.g., a security or surveillance video via closed-circuit television) with
    a similarly large number of previously stored faces (e.g., a rogues gallery or
    similar watch list).
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 比较数千个任意获取的面（例如，通过闭路电视的安全或监控视频）与大量先前存储的面（例如，流氓画廊或类似的观察名单）的大规模人脸识别系统。
- en: Computer simulations comparing many independent scenarios, such as climate models.
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 比较许多独立场景的计算机模拟，例如气候模型。
- en: Evolutionary computation meta-heuristics such as genetic algorithms.
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 遗传算法等进化计算元启发式算法。
- en: Ensemble calculations of numerical weather prediction.
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数值天气预报的集成计算。
- en: Event simulation and reconstruction in particle physics.
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 粒子物理学中的事件模拟和重建。
- en: The marching squares algorithm
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 行军方阵算法
- en: Sieving step of the quadratic sieve and the number field sieve.
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 二次筛法和数域筛法的筛选步骤。
- en: Tree growth step of the random forest machine learning technique.
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随机森林机器学习技术的树增长步骤。
- en: Discrete Fourier Transform where each harmonic is independently calculated.
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个谐波独立计算的离散傅里叶变换。
- en: 'Advanced: Lightweight Processes?'
  id: totrans-111
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 高级：轻量级进程？
- en: In the beginning of the chapter, we mentioned that threads are processes. What
    do we mean by that? You can create a thread like a process. Take a look at the
    example code below.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章的开头，我们提到线程是进程。我们这是什么意思？你可以像创建进程一样创建一个线程。看看下面的示例代码。
- en: '[PRE15]'
  id: totrans-113
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: It seems pretty simple right? Why not use this functionality? First, there is
    a decent bit of boilerplate code. In addition, pthreads are part of the POSIX
    standard and have defined functionality. Pthreads let a program set various attributes
    – some that resemble the option in clone – to customize your thread. But as we
    mentioned earlier, with each later of abstraction for portability reasons we lose
    some functionality. clone can do some neat things like keeping different parts
    of your heap the same while creating copies of other pages. A program has finer
    control of scheduling because it is a process with the same mappings.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 这看起来很简单，不是吗？为什么不用这个功能？首先，有一大堆样板代码。此外，pthread是POSIX标准的一部分，并具有定义的功能。Pthreads允许程序设置各种属性——一些类似于clone的选项——以自定义你的线程。但如我们之前提到的，出于可移植性的原因，随着每个抽象层次的增加，我们都会失去一些功能。clone可以做一些很酷的事情，比如在创建其他页面的副本时保持堆的不同部分相同。程序对调度的控制更精细，因为它是一个具有相同映射的进程。
- en: At no time in this course should you be using clone. But in the future, know
    that it is a perfectly viable alternative to fork. You have to be careful and
    research edge cases.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 在本课程中，任何时候都不应该使用clone。但将来，要知道它是一个完美的fork替代方案。你必须小心并研究边缘情况。
