  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个线程的堆栈在哪里？
- en: How does a program get a return value given a ? What are the ways a thread can
    set that return value? What happens if a program discards the return value?
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 程序在给定的情况下如何获取返回值？线程可以设置该返回值的方式有哪些？如果程序丢弃了返回值，会发生什么？
- en: Why is important (think stack space, registers, return values)?
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为什么这很重要（考虑栈空间、寄存器、返回值）？
- en: What does do if it is not the last thread? What other functions are called when
    after calling pthread_exit?
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果它不是最后一个线程，会怎么办？在调用pthread_exit之后，还会调用哪些其他函数？
- en: Give me three conditions under which a multi-threaded process will exit. Are
    there any more?
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 请给出三个多线程进程退出的条件。还有其他条件吗？
- en: What is an embarrassingly parallel problem?
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 什么是令人尴尬的并行问题？
