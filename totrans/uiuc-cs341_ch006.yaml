  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Computer simulations comparing many independent scenarios, such as climate models.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Evolutionary computation meta-heuristics such as genetic algorithms.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ensemble calculations of numerical weather prediction.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Event simulation and reconstruction in particle physics.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The marching squares algorithm
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sieving step of the quadratic sieve and the number field sieve.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Tree growth step of the random forest machine learning technique.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Discrete Fourier Transform where each harmonic is independently calculated.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Advanced: Lightweight Processes?'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In the beginning of the chapter, we mentioned that threads are processes. What
    do we mean by that? You can create a thread like a process. Take a look at the
    example code below.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: It seems pretty simple right? Why not use this functionality? First, there is
    a decent bit of boilerplate code. In addition, pthreads are part of the POSIX
    standard and have defined functionality. Pthreads let a program set various attributes
    – some that resemble the option in clone – to customize your thread. But as we
    mentioned earlier, with each later of abstraction for portability reasons we lose
    some functionality. clone can do some neat things like keeping different parts
    of your heap the same while creating copies of other pages. A program has finer
    control of scheduling because it is a process with the same mappings.
  prefs: []
  type: TYPE_NORMAL
- en: At no time in this course should you be using clone. But in the future, know
    that it is a perfectly viable alternative to fork. You have to be careful and
    research edge cases.
  prefs: []
  type: TYPE_NORMAL
