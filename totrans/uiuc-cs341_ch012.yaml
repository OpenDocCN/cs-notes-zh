  zh: 另一个例子是文件 ，一个存储你永远不会需要读取的位的好地方。发送到 的字节永远不会存储，只是简单地丢弃。 的一个常见用途是丢弃标准输出。例如，
- en: '[PRE21]'
  id: totrans-216
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: Managing files and filesystems
  id: totrans-217
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 管理文件和文件系统
- en: Given the multitude of operations that are available to you from the filesystem,
    let’s explore some tools and techniques that can be used to manage files and filesystems.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到您可以从文件系统执行的大量操作，让我们探索一些可以用来管理文件和文件系统的工具和技术。
- en: One example is creating a secure directory. Suppose you created your own directory
    in /tmp and then set the permissions so that only you can use the directory (see
    below). Is this secure?
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 一个例子是创建一个安全的目录。假设你在 /tmp 中创建了自己的目录，然后设置了权限，使得只有你可以使用该目录（见下文）。这是安全的吗？
- en: '[PRE22]'
  id: totrans-220
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: There is a window of opportunity between when the directory is created and when
    it’s permissions are changed. This leads to several vulnerabilities that are based
    on a race condition.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 在创建目录和更改其权限之间有一个机会窗口。这导致基于竞争条件的好几个漏洞。
- en: Another user replaces with a hard link to an existing file or directory owned
    by the second user, then they would be able to read and control the contents of
    the directory. Oh no - our secrets are no longer secret!
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个用户用指向第二个用户拥有的现有文件或目录的硬链接替换，然后他们就能够读取和控制目录的内容。哦不——我们的秘密不再是秘密了！
- en: However in this specific example, the directory has the sticky bit set, so only
    the owner may delete the directory, and the simple attack scenario described above
    is impossible. This does not mean that creating the directory and then later making
    the directory private is secure! A better version is to atomically create the
    directory with the correct permissions from its inception.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在这个特定例子中，目录设置了粘滞位，所以只有所有者才能删除目录，上述简单攻击场景是不可能的。这并不意味着创建目录然后后来将其设置为私有就是安全的！更好的版本是从一开始就原子性地创建具有正确权限的目录。
- en: '[PRE23]'
  id: totrans-224
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: Obtaining Random Data
  id: totrans-225
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 获取随机数据
- en: is a file that contains a random number generator where the entropy is determined
    from environmental noise. Random will block/wait until enough entropy is collected
    from the environment.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 是一个包含随机数发生器的文件，其熵由环境噪声确定。 随机会阻塞/等待直到从环境中收集到足够的熵。
- en: is like random, but differs in the fact that it allows for repetition (lower
    entropy threshold), thus won’t block.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 它像随机一样，但不同之处在于它允许重复（较低的熵阈值），因此不会阻塞。
- en: One can think of both of these as streams of characters from which a program
    can read as opposed to files with a start and end. To touch on a misconception,
    most of the time one should be using . The only specific use case of is when one
    needs cryptographically secure data on bootup and the system should block. Otherwise,
    there are the following reasons.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 可以将这两个都视为程序可以从中读取字符流，而不是具有起始和结束位置的文件。为了触及一个误解，大多数时候应该使用 .。唯一的特定用例是当需要在启动时需要加密安全的数据并且系统应该阻止时。否则，有以下原因。
- en: Empirically, they both produce numbers that look random enough.
  id: totrans-229
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 实际上，它们都产生了看起来足够随机的数字。
- en: may block at an inconvenient time. If one is programming a service for high
    scalability and relies on , an attacker can reliably exhaust the entropy pool
    and cause the service to block.
  id: totrans-230
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可能在不方便的时候阻塞。如果一个服务正在编程一个高可扩展性的服务并依赖于，攻击者可以可靠地耗尽熵池并导致服务阻塞。
- en: Manual page authors pose a hypothetical attack where an attacker exhausts the
    entropy pool and guesses the seeding bits, but that attack has yet to be implemented.
  id: totrans-231
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 手册页作者提出了一个假设攻击，其中攻击者耗尽熵池并猜测种子位，但这种攻击尚未实现。
- en: Some operating system don’t have a true like MacOS.
  id: totrans-232
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一些操作系统没有真正的类似MacOS的`cp`命令。
- en: Security experts will talk about Computational Security vs Information Theoretic
    security, more on this article [Urandom Myths](https://www.2uo.de/myths-about-urandom).
    Most encryption is computationally secure, which means is as well.
  id: totrans-233
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 安全专家会讨论计算安全与信息论安全，更多内容请参阅这篇文章[关于Urandom的神话](https://www.2uo.de/myths-about-urandom)。大多数加密都是计算安全的，这意味着也是如此。
- en: Copying Files
  id: totrans-234
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 复制文件
- en: Use the versatile command. For example, the following command copies 1 MiB of
