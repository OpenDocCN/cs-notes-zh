- en: Virtual filesystems and other filesystems
  id: totrans-206
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 虚拟文件系统和其他文件系统
- en: POSIX systems, such as Linux and Mac OS X (which is based on BSD) include several
    virtual filesystems that are mounted (available) as part of the file-system. Files
    inside these virtual filesystems may be generated dynamically or stored in ram.
    Linux provides 3 main virtual filesystems.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: POSIX 系统，如 Linux 和 Mac OS X（基于 BSD），包括几个作为文件系统一部分挂载（可用）的虚拟文件系统。这些虚拟文件系统中的文件可能是动态生成的或存储在内存中。Linux
    提供了 3 个主要的虚拟文件系统。
