  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 上面示例中的输入和输出文件都是虚拟的——它们不存在于磁盘上。这意味着传输速度不受硬件性能的影响。
- en: is also commonly used to make a copy of a disk or an entire filesystem to create
