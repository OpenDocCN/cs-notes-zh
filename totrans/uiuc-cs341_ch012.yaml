  id: totrans-143
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: For example, a program can use to learn about file metadata if it already has
    a file descriptor associated with that file.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果程序已经与该文件关联了一个文件描述符，则可以使用 来了解文件元数据。
- en: '[PRE12]'
  id: totrans-145
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: is almost the same as but handles symbolic links differently. From the man page.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 几乎与相同，但处理符号链接的方式不同。从 man 页面。
- en: lstat() is identical to stat(), except that if pathname is a symbolic link,
    then it returns information about the link itself, not the file that it refers
    to.
  id: totrans-147
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: lstat() 函数与 stat() 函数相同，区别在于如果路径名是一个符号链接，则它返回关于链接本身的信息，而不是它所指向的文件。
- en: 'The stat functions make use of . From the man page:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: stat 函数使用 。从 man 页面：
- en: '[PRE13]'
  id: totrans-149
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: The field can be used to distinguish between regular files and directories.
    To accomplish this, use the macros, and .
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 该字段可以用来区分常规文件和目录。为此，使用宏和 。
- en: '[PRE14]'
  id: totrans-151
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Permissions and bits
  id: totrans-152
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 权限和位
- en: 'Permissions are a key part of the way UNIX systems provide security in a filesystem.
    You may have noticed that the field in contains more than the file type. It also
    contains the mode, a description detailing what a user can and can’t do with a
    given file. There are usually three sets of permissions for any file. Permissions
    for the *user*, the *group* and *other* (every user falling outside the first
    two categories). For each of the three categories, we need to keep track of whetherthe
    user is allowed to read the file, write to the file, and execute the file. Since
    there are three categories and three permissions, permissions are usually represented
    as a 3-digit octal number. For each digit, the least significant byte corresponds
    to read privileges, the middle one to write privileges and the final byte to execute
    privileges. They are always presented as *User*, *Group*, *Other* (*UGO*). Below
    are some common examples. Here are the bit conventions:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 权限是 UNIX 系统在文件系统中提供安全性的关键部分。你可能已经注意到，该字段包含的不仅仅是文件类型。它还包括模式，这是一个详细说明用户可以使用给定文件做什么和不能做什么的描述。任何文件通常都有三组权限。对于用户、组和其他（不属于前两类用户的所有用户）。对于这三类中的每一类，我们需要跟踪用户是否被允许读取文件、向文件写入和执行文件。由于有三类和三种权限，权限通常表示为一个三位八进制数。对于每一位，最低有效位对应于读取权限，中间位对应于写入权限，最后一位对应于执行权限。它们总是以
    *用户*、*组*、*其他*（UGO）的形式呈现。以下是一些常见示例。以下是位约定：
- en: means that the set of people can read
  id: totrans-154
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 表示一组人可以读取
- en: means that the set of people can write
  id: totrans-155
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 表示一组人可以写入
- en: means that the set of people can execute
  id: totrans-156
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 表示一组人可以执行
- en: Permissions Table
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 权限表
- en: '| Octal Code | User | Group | Others |'
  id: totrans-158
  prefs: []
  type: TYPE_TB
  zh: '| 八进制代码 | 用户 | 组 | 其他 |'
- en: '| --- | --- | --- | --- |'
  id: totrans-159
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- |'
- en: '| 755 |  |  |  |'
  id: totrans-160
  prefs: []
  type: TYPE_TB
  zh: '| 755 |  |  |  |'
- en: '| 644 |  |  |  |'
  id: totrans-161
  prefs: []
  type: TYPE_TB
  zh: '| 644 |  |  |  |'
- en: It is worth noting that the bits have a slightly different meaning for directories.
    Write access to a directory that will allow a program to create or delete new
    files or directories inside. You can think about this as having write access to
    the directory entry (dirent) mappings. Read-access to a directory will allow a
    program to list a directory’s contents. This is read access to the directory entry
    (dirent) mapping. Execute will allow a program to enter the directory using cd.
    Without the execute bit, it any attempt create or remove files or directories
    will fail since you cannot access them. You can, however, list the contents of
    the directory.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 值得注意的是，对于目录，位具有略微不同的含义。对目录的写入访问将允许程序在目录内部创建或删除新文件或目录。你可以将其视为对目录条目（dirent）映射的写入访问。对目录的读取访问将允许程序列出目录的内容。这是对目录条目（dirent）映射的读取访问。执行将允许程序使用
    cd 进入目录。如果没有执行位，则任何创建或删除文件或目录的尝试都将失败，因为你无法访问它们。然而，你可以列出目录的内容。
- en: There are several command line utilities for interacting with a file’s mode.
    changes the type of the file. takes a number and a file and changes the permission
    bits. However, before we can discuss chmod in detail, we must also understand
    the user ID () and group id () as well.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 有几个命令行实用程序可以与文件的模式交互。更改文件类型。接受一个数字和一个文件，并更改权限位。然而，在我们详细讨论chmod之前，我们还必须了解用户ID
    () 和组ID ()。
- en: User ID / Group ID
  id: totrans-164
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 用户ID / 组ID
- en: Every user in a UNIX system has a user ID. This is a unique number that can
    identify a user. Similarly, users can be added to collections called groups, and
    every group also has a unique identifying number. Groups have a variety of uses
    on UNIX systems. They can be assigned capabilities - a way of describing the level
    of control a user has over a system. For example, a group you may have run into
    is the group, a set of trusted users who are allowed to use the command to temporarily
    gain higher privileges. We’ll talk more about how works in this chapter. Every
    file, upon creation, an owner, the creator of the file. This owner’s user ID ()
    can be found inside the file of a with a call to . Similarly, the group ID ()
    is set as well.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: UNIX系统中的每个用户都有一个用户ID。这是一个可以识别用户的唯一数字。同样，用户可以被添加到称为组的集合中，每个组也有一个唯一的识别号。组在UNIX系统中有很多用途。它们可以分配能力
    - 一种描述用户对系统控制级别的方式。例如，你可能遇到的一个组是组，一组被信任的用户，他们被允许使用命令来临时获得更高的权限。我们将在本章中更多地讨论如何工作。每个文件在创建时都有一个所有者，即文件的创建者。这个所有者的用户ID
    () 可以通过在文件系统中使用系统调用 . 来找到。同样，组ID () 也会被设置。
- en: Every process can determine its and with and . When a process tries to open
    a file with a specific mode, it’s and are compared with the and of the file. If
    the s match, then the process’s request to open the file will be compared with
    the bits on the user field of the file’s permissions. If the s match, then the
    process’s request will be compared with the group field of the permissions. If
    none of the IDs match, then the other field will apply.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 每个进程都可以使用和确定其和 . 当一个进程尝试以特定模式打开文件时，它的和与文件的和进行比较。如果匹配，则进程打开文件的请求将与文件权限的用户字段上的位进行比较。如果匹配，则进程的请求将与权限的组字段进行比较。如果没有任何ID匹配，则将应用其他字段。
- en: Reading / Changing file permissions
  id: totrans-167
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 读取/更改文件权限
- en: Before we discuss how to change permission bits, we should be able to read them.
    In C, the family of library calls can be used. To read permission bits from the
    command line, use . Note, the permissions will output in the format ‘trwxrwxrwx’.
    The first character indicates the type of file type. Possible values for the first
    character include but aren’t limited to.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们讨论如何更改权限位之前，我们应该能够读取它们。在C中，可以使用库调用系列。要从命令行读取权限位，请使用 . 注意，权限将以格式‘trwxrwxrwx’输出。第一个字符表示文件类型。第一个字符的可能值包括但不限于。
- en: (-) regular file
  id: totrans-169
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: (-) 普通文件
- en: (d) directory
  id: totrans-170
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: (d) 目录
- en: (c) character device file
  id: totrans-171
