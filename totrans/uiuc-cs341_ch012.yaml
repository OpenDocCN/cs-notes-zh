  zh: 相应的C调用是
- en: '[PRE7]'
  id: totrans-114
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE7]'
- en: For simplicity, the above examples made hard links inside the same directory.
    Hard links can be created anywhere inside the same filesystem.
  id: totrans-115
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 为了简单起见，上面的例子在同一个目录内创建了硬链接。硬链接可以在同一个文件系统的任何地方创建。
- en: The second kind of link is called a soft link, symbolic link, or symlink. A
    symbolic link is different because it is a file with a special bit set and stores
    a path to another file. Quite simply, without the special bit, it is nothing more
    than a text file with a file path inside. Note when people generally talk about
    a link without specifying hard or soft, they are referring to a hard link.
  id: totrans-116
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 第二种链接称为软链接、符号链接或symlink。符号链接不同，因为它是一个设置了特殊位的文件，并存储指向另一个文件的路径。简单来说，如果没有这个特殊位，它不过是一个包含文件路径的文本文件。注意，当人们通常谈论一个链接而没有指定硬链接或软链接时，他们指的是硬链接。
- en: To create a symbolic link in the shell, use . To read the contents of the link
    as a file, use . These are both demonstrated below.
  id: totrans-117
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在shell中创建符号链接，使用 。要读取链接的内容作为文件，使用 。这两个都在下面演示。
- en: '[PRE8]'
  id: totrans-118
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Note that and have different inode numbers, unlike the hard link, .
  id: totrans-119
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 注意，和有不同的inode号，与硬链接不同。
- en: There is a C library call to create symlinks which is similar to link.
  id: totrans-120
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 有一个创建符号链接的C库函数，它与`link`函数类似。
- en: '[PRE9]'
  id: totrans-121
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Some advantages of symbolic links are
  id: totrans-122
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 符号链接的一些优点是
- en: Can refer to files that don’t exist yet
  id: totrans-123
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可以引用尚未存在的文件
- en: Unlike hard links, can refer to directories as well as regular files
  id: totrans-124
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与硬链接不同，可以引用目录以及常规文件
- en: Can refer to files (and directories) that exist outside of the current file
    system
  id: totrans-125
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可以引用当前文件系统之外的文件（和目录）
- en: However, symlinks have a key disadvantage, they as slower than regular files
    and directories. When the link’s contents are read, they must be interpreted as
    a new path to the target file, resulting in an additional call to open and read
    since the real file must be opened and read. Another disadvantage is that POSIX
    forbids hard linking directories where as soft links are allowed. The command
    will only allow root to do this and only if you provide the option. However, even
    root may not be able to perform this because most filesystems prevent it!
  id: totrans-126
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 然而，符号链接有一个关键缺点，它们比常规文件和目录要慢。当读取链接的内容时，它们必须被解释为指向目标文件的新路径，这导致需要额外的 open 和 read
    调用，因为必须打开和读取实际文件。另一个缺点是 POSIX 禁止硬链接目录，而允许符号链接。该命令将只允许 root 执行此操作，并且只有当您提供选项时。然而，即使是
    root 也可能无法执行此操作，因为大多数文件系统都阻止这样做！
- en: The integrity of the file system assumes the directory structure is an acyclic
    tree that is reachable from the root directory. It becomes expensive to enforce
    or verify this constraint if directory linking is allowed. Breaking these assumptions
    can leave file integrity tools unable to repair the file system. Recursive searches
    potentially never terminate and directories can have more than one parent but
    “..” can only refer to a single parent. All in all, a bad idea. Soft links are
    merely ignored, which is why we can use them to reference directories.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 文件系统的完整性假设目录结构是一个从根目录可达的循环树。如果允许目录链接，强制执行或验证此约束将变得昂贵。打破这些假设可能会使文件完整性工具无法修复文件系统。递归搜索可能永远不会终止，目录可以有多个父目录，但
    “..” 只能引用一个父目录。总的来说，这是一个坏主意。符号链接只是被忽略，这就是为什么我们可以使用它们来引用目录。
- en: When you remove a file using or , you are removing an inode reference from a
    directory. However, the inode may still be referenced from other directories.
    To determine if the contents of the file are still required, each inode keeps
    a reference count that is updated whenever a new link is created or destroyed.
    This count only tracks hard links, symlinks are allowed to refer to a non-existent
    file and thus, do not matter.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 当您使用 rm 或 rmdir 删除文件时，您正在从一个目录中删除一个inode引用。然而，inode可能仍然被其他目录引用。为了确定文件内容是否仍然需要，每个inode都保留一个引用计数，该计数在创建或删除新链接时更新。这个计数只跟踪硬链接，符号链接可以引用一个不存在的文件，因此，并不重要。
- en: An example use of hard links is to efficiently create multiple archives of a
    file system at different points in time. Once the archive area has a copy of a
    particular file, then future archives can re-use these archive files rather than
    creating a duplicate file. This is called an incremental backup. Apple’s “Time
    Machine” software does this.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 硬链接的一个例子是高效地在不同的时间点创建文件系统的多个存档。一旦存档区域有特定文件的副本，未来的存档就可以重新使用这些存档文件，而不是创建一个重复的文件。这被称为增量备份。苹果的“时间机器”软件就是这样做的。
- en: Pathing
  id: totrans-130
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 路径
- en: Now that we have definitions, and have talked about directories, we come across
    the concept of a path. A path is a sequence of directories that provide one with
    a "path" in the graph that is a filesystem. However, there are some nuances. It
    is possible to have a path called `a/b/../c/./`. Since and are special entries
    in directories, this is a valid path that actually refers to `a/c`. Most filesystem
    functions will allow uncompressed paths to be passed in. The C library provides
    a function to compress the path or get the absolute path. To simplify by hand,
    remember that means ‘parent folder’ and that means ‘current folder’. Below is
    an example that illustrates the simplification of the `a/b/../c/.` by using in
    a shell to navigate a filesystem.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们有了定义，并且已经讨论了目录，我们遇到了路径的概念。路径是一系列目录，为用户提供了一个文件系统中的“路径”。然而，也有一些细微差别。可能存在一个名为
    `a/b/../c/./` 的路径。由于 . 和 .. 是目录中的特殊条目，这是一个有效的路径，实际上指的是 `a/c`。大多数文件系统功能都允许传递未压缩的路径。C库提供了一个压缩路径或获取绝对路径的函数。为了简化，请记住，.
    表示“父文件夹”，而 .. 表示“当前文件夹”。下面是一个示例，说明如何使用 shell 在文件系统中导航来简化 `a/b/../c/.`。
- en: (in a)
  id: totrans-132
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: (在/a)
- en: (in a/b)
  id: totrans-133
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: (在/a/b)
- en: (in a, because .. represents ‘parent folder’)
  id: totrans-134
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: (在/a中，因为 .. 代表“父文件夹”)
- en: (in a/c)
  id: totrans-135
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: (在/a/c)
- en: (in a/c, because . represents ‘current folder’)
  id: totrans-136
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: (在/a/c中，因为 . 代表“当前文件夹”)
- en: Thus, this path can be simplified to .
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，这个路径可以简化为 .
- en: Metadata
  id: totrans-138
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 元数据
- en: How can we distinguish between a regular file and a directory? For that matter,
    there are many other attributes that files also might contain. We distinguish
    a file type – different from the file extension i.e. png, svg, pdf – using fields
    inside the inode. How does the system know what type the file is?
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 我们如何区分常规文件和目录？就这个而言，文件还可能包含许多其他属性。我们通过区分文件类型——与文件扩展名不同，例如 png、svg、pdf——使用inode内的字段来区分。系统是如何知道文件类型的？
- en: This information is stored within an inode. To access it, use the stat calls.
    For example, to find out when my ‘notes.txt’ file was last accessed.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 此信息存储在inode中。要访问它，请使用 stat 调用。例如，要找出我的“notes.txt”文件最后访问的时间。
- en: '[PRE10]'
  id: totrans-141
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: There are actually three versions of ;
  id: totrans-142
  prefs: []
