- en: Filesystems
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 文件系统
- en: Filesystems are important because they allow you to persist data after a computer
    is shut down, crashes, or has memory corruption. Back in the day, filesystems
    were expensive to use. Writing to the filesystem (FS) involved writing to magnetic
    tape and reading from that tape (“International,” [n.d.](ch018.xhtml#ref-iec)).
    It was slow, heavy, and prone to errors.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 文件系统很重要，因为它们允许你在计算机关闭、崩溃或内存损坏后持久化数据。在过去，文件系统使用成本很高。向文件系统（FS）写入涉及将数据写入磁带并从磁带中读取（“国际的”，[n.d.](ch018.xhtml#ref-iec)）。这很慢，很重，并且容易出错。
- en: Nowadays most of our files are stored on disk – though not all of them! The
    disk is still slower than memory by an order of magnitude at the least.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 如今，我们的大部分文件都存储在磁盘上——尽管并非所有文件都是这样！至少在速度上，磁盘仍然比内存慢一个数量级。
- en: Some terminology before we begin this chapter. A **filesystem**, as we’ll define
    more concretely later, is anything that satisfies the API of a filesystem. A filesystem
    is backed by a storage medium, such as a hard disk drive, solid state drive, RAM,
    etc. A disk is either a **hard disk drive (HDD)** which includes a spinning metallic
    platter and a head which can zap the platter to encode a 1 or a 0, or a that can
    flip certain NAND gates on a chip or standalone drive to store a 1 or a 0\. As
    of 2019, SSDs are an order of magnitude faster than the standard HDD. These are
    typical backings for a filesystem. A filesystem is implemented on top of this
    backing, meaning that we can either implement something like EXT, MinixFS, NTFS,
    FAT32, etc. on a commercially available hard disk. This filesystem tells the operating
    system how to organize the 1s and 0s to store file information as well as directory
    information, but more on that later. To avoid being pedantic, we’ll say that a
    filesystem like EXT or NTFS implements the filesystem API directly (open, close,
    etc). Often, operating systems will add a layer of abstraction and require that
    the operating system satisfy its API instead (think imaginary functions linux_open,
    linux_close etc). The two benefits are that one filesystem can be implemented
    for multiple operating system APIs and adding a new OS filesystem call doesn’t
    require all of the underlying file systems to change their API. For example, in
    the next iteration of linux if there was a new system call to create a backup
    of a file, the OS can implement that with the internal API rather than requiring
    all filesystem drivers to change their code.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开始本章之前，先介绍一些术语。**文件系统**，我们将在后面更具体地定义，是指满足文件系统API的任何东西。文件系统由存储介质支持，例如硬盘驱动器、固态驱动器、RAM等。硬盘可以是**硬盘驱动器（HDD）**，它包括一个旋转的金属盘和一个可以电击盘面来编码1或0的磁头，或者是一个可以翻转芯片或独立驱动器上的某些NAND门的设备来存储1或0。截至2019年，SSD的速度比标准HDD快一个数量级。这些都是文件系统的典型支持介质。文件系统是在这个支持介质之上实现的，这意味着我们可以在商业可用的硬盘上实现EXT、MinixFS、NTFS、FAT32等。这个文件系统告诉操作系统如何组织1和0来存储文件信息以及目录信息，但关于这一点我们稍后再谈。为了避免过于拘泥于细节，我们可以说EXT或NTFS这样的文件系统直接实现了文件系统API（打开、关闭等）。通常，操作系统会添加一层抽象，并要求操作系统满足其API（例如，想象中的函数linux_open、linux_close等）。这两个好处是，一个文件系统可以为多个操作系统API实现，添加新的操作系统文件系统调用不需要所有底层文件系统更改它们的API。例如，在linux的下一个版本中，如果有一个新的系统调用用于创建文件的备份，操作系统可以使用内部API来实现，而不是要求所有文件系统驱动程序更改它们的代码。
- en: '**The last piece of background is an important one.** In this chapter, we will
    refer to sizes of files in the ISO-compliant KiB or Kibibyte. The *iB family is
    short for power of two storage. That means the following:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '**最后一点背景信息非常重要。**在本章中，我们将使用ISO兼容的KiB或Kibibyte来表示文件的大小。*iB系列是二进制存储的简称。这意味着以下内容：'
- en: Kibibyte Values
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: Kibibyte值
- en: '| Prefix | Byte Value |'
  id: totrans-6
  prefs: []
  type: TYPE_TB
  zh: '| 前缀 | 字节数值 |'
- en: '| --- | --- |'
  id: totrans-7
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| KiB | 1024B |'
  id: totrans-8
  prefs: []
  type: TYPE_TB
  zh: '| KiB | 1024B |'
- en: '| MiB | 1024 * 1024 B |'
  id: totrans-9
  prefs: []
  type: TYPE_TB
  zh: '| MiB | 1024 * 1024 B |'
- en: '| GiB | 1024 3̂ B |'
  id: totrans-10
  prefs: []
  type: TYPE_TB
  zh: '| GiB | 1024 3̂ B |'
- en: 'The standard notational prefixes mean the following:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 标准记数前缀的含义如下：
- en: Kilobyte Values
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 千字节值
- en: '| Prefix | Byte Value |'
  id: totrans-13
  prefs: []
  type: TYPE_TB
  zh: '| 前缀 | 字节数值 |'
- en: '| --- | --- |'
  id: totrans-14
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| KB | 1000B |'
  id: totrans-15
  prefs: []
  type: TYPE_TB
  zh: '| KB | 1000B |'
- en: '| MB | 1000 * 1000 B |'
  id: totrans-16
  prefs: []
  type: TYPE_TB
  zh: '| MB | 1000 * 1000 B |'
- en: '| GB | 1000 3̂ B |'
  id: totrans-17
  prefs: []
  type: TYPE_TB
  zh: '| GB | 1000 3̂ B |'
- en: We will do this in the book and in the Networking chapter for the sake of consistency
    and to not confuse anyone. **Confusingly in the real world, there is a different
    convention.** That convention is that when a file is displayed in the operating
    system, **KB is the same as KiB**. When we are talking about computer networks,
    CDs, other storage **KB is not the same as KiB** and is the ISO / Metric Definition
    above. This is a historical quirk was brought by a clash between network developers
    and memory/hard storage developers. Hard storage and memory developers found that
    if a bit could take one of two states, it would be natural to call a Kilo- prefix
    1024 because it was about 1000\. Network developers had to deal with bits, real-time
    signal processing, and various other factors, so they went with the already accepted
    convention that Kilo- means 1000 of something (“International,” [n.d.](ch018.xhtml#ref-iec)).
    What you need to know is if you see KB in the wild, that it may be 1024 based
    on the context. If any time in this class you see KB or any of the family refer
    to a filesystems question, you can safely infer that they are referring to 1024
    as the base unit. Though when you are pushing production code, make sure to ask
    about the difference!
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在书中和网络章节中这样做，以保持一致性，避免混淆任何人。**在现实世界中，存在不同的惯例。**这个惯例是，当一个文件在操作系统中显示时，**KB
    与 KiB 是相同的**。当我们谈论计算机网络、CD、其他存储时，**KB 与 KiB 不相同，并且是 ISO/公制定义的**。这是历史上的一个小怪癖，是由网络开发者和内存/硬盘存储开发者之间的冲突带来的。硬盘和内存开发者发现，如果一个比特可以处于两种状态之一，那么将千位前缀称为
    1024 是自然的，因为它大约是 1000。网络开发者必须处理比特、实时信号处理以及各种其他因素，所以他们遵循了已经接受的惯例，即 Kilo- 表示某物的
    1000 倍（“International,” [n.d.](ch018.xhtml#ref-iec)）。你需要知道的是，如果你在野外看到 KB，它可能基于上下文是
    1024。如果在任何时候你在这个班级中看到 KB 或任何家族成员提到文件系统问题，你可以安全地推断它们指的是 1024 作为基本单位。尽管如此，当你推动生产代码时，请确保询问这些差异！
- en: What is a filesystem?
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是文件系统？
- en: 'You may have encountered the old UNIX adage, "everything is a file". In most
    UNIX systems, file operations provide an interface to abstract many different
    operations. Network sockets, hardware devices, and data on the disk are all represented
    by file-like objects. A file-like object must follow the following conventions:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能遇到过古老的 UNIX 格言，“万物皆文件”。在大多数 UNIX 系统中，文件操作提供了一个接口来抽象许多不同的操作。网络套接字、硬件设备和磁盘上的数据都由类似文件的对象表示。一个类似文件的对象必须遵循以下约定：
- en: It must present itself to the filesystem.
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它必须向文件系统呈现自己。
- en: It must support common filesystem operations, such as , , . At a minimum, it
    needs to be opened and closed.
  id: totrans-22
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它必须支持常见的文件系统操作，例如创建、删除、重命名。至少，它需要能够打开和关闭。
- en: A filesystem is an implementation of the file interface. In this chapter, we
    will be exploring the various callbacks a filesystem provides, some typical functionality
    and associated implementation details. In this class, we will mostly talk about
    filesystems that serve to allow users to access data on disk, which are integral
    to modern computers.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 文件系统是文件接口的实现。在本章中，我们将探讨文件系统提供的各种回调，一些典型功能及其相关实现细节。在本课程中，我们将主要讨论那些允许用户访问磁盘数据的文件系统，这对于现代计算机至关重要。
- en: 'Here are some common features of a filesystem:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一些文件系统的常见特性：
- en: They deal with both storing local files and handle special devices that allow
    for safe communication between the kernel and user space.
  id: totrans-25
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它们处理存储本地文件和处理允许内核和用户空间之间安全通信的特殊设备。
- en: They deal with failures, scalability, indexing, encryption, compression, and
    performance.
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它们处理故障、可扩展性、索引、加密、压缩和性能。
- en: They handle the abstraction between a file that contains data and how exactly
    that data is stored on disk, partitioned, and protected.
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它们处理文件包含数据以及数据如何在磁盘上存储、分区和保护之间的抽象。
- en: Before we dive into the details of a filesystem, let’s take a look at some examples.
    To clarify, a mount point is simply a mapping of a directory to a filesystem represented
    in the kernel.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入探讨文件系统的细节之前，让我们看看一些例子。为了澄清，挂载点仅仅是将目录映射到内核中表示的文件系统。
- en: Usually mounted at / on Linux systems, this is the filesystem that usually provides
    disk access as you’re used to.
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通常在 Linux 系统上挂载到 /，这是通常提供磁盘访问的文件系统，正如你所习惯的那样。
- en: Usually mounted at /proc, provides information and control over processes.
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通常挂载到 /proc，提供对进程的信息和控制。
- en: Usually mounted at /sys, a more modern version of /proc that also allows control
    over various other hardware such as network sockets.
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通常安装在 /sys，这是 /proc 的一个更现代版本，它还允许控制各种其他硬件，例如网络套接字。
- en: Mounted at /tmp in some systems, an in-memory filesystem to hold temporary files.
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在某些系统中安装在 /tmp，这是一个内存文件系统，用于存储临时文件。
- en: This syncs files across the protocol.
  id: totrans-33
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 这通过协议同步文件。
- en: It tells you what filesystem directory-based system calls resolve to. For example,
    is resolved by the filesystem in our case, but is resolved by the system even
    though it contains as a subsystem.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 它告诉您基于目录的文件系统系统调用解析为什么。例如，在我们的情况下由文件系统解析，尽管它包含作为子系统的，但它由系统解析。
- en: As you may have noticed, some filesystems provide an interface to things that
    aren’t "files". Filesystems such as are usually referred to as *virtual* filesystems,
    since they don’t provide data access in the same sense as a traditional filesystem
    would. Technically, all filesystems in the kernel are represented by virtual filesystems,
    but we will differentiate *virtual* filesystems as filesystems that actually don’t
    store anything on a hard disk.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所注意到的，一些文件系统提供了对“非文件”事物的接口。例如，通常被称为*虚拟*文件系统，因为它们不提供与传统文件系统相同的数据访问。技术上，内核中的所有文件系统都表示为虚拟文件系统，但我们将区分*虚拟*文件系统为实际上不存储任何东西在硬盘上的文件系统。
- en: The File API
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 文件API
- en: 'A filesystem must provide callback functions to a variety of actions. Some
    of them are listed below:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 文件系统必须为各种操作提供回调函数。其中一些列在下面：
- en: Opens a file for IO
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 打开文件进行IO操作
- en: Read contents of a file
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 读取文件内容
- en: Write to a file
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 向文件写入
- en: Close a file and free associated resources
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关闭文件并释放相关资源
- en: Modify permissions of a file
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 修改文件的权限
- en: Interact with device parameters of character devices such as terminals
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与字符设备（如终端）的设备参数交互
- en: Not every filesystem supports all the possible callback functions. For example,
    many filesystems omit or . Many filesystems aren’t meaning that they exclusively
    provide sequential access. A program cannot move to an arbitrary point in the
    file. This is analogous to s. In this chapter, we will not be examining each filesystem
    callback. If you would like to learn more about this interface, try looking at
    the documentation for Filesystems at the User Space Level (FUSE).
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 并非每个文件系统都支持所有可能的回调函数。例如，许多文件系统省略或。许多文件系统不提供，这意味着它们只提供顺序访问。程序不能移动到文件中的任意位置。这与类似。在本章中，我们不会检查每个文件系统回调。如果您想了解更多关于此接口的信息，请尝试查看用户空间级别的文件系统（FUSE）的文档。
- en: Storing data on disk
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在磁盘上存储数据
- en: To understand how a filesystem interacts with data on disk, there are three
    key terms we will be using.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 要了解文件系统如何与磁盘上的数据交互，我们将使用三个关键术语。
- en: A disk block is a portion of the disk that is reserved for storing the contents
    of a file or a directory.
  id: totrans-47
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 磁盘块是磁盘的一部分，用于存储文件或目录的内容。
- en: An inode *is* a file or directory. This means that an inode contains metadata
    about the file as well as pointers to disk blocks so that the file can actually
    be written to or read from.
  id: totrans-48
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一个inode *是*一个文件或目录。这意味着inode包含有关文件的元数据以及指向磁盘块的指针，以便文件实际上可以被写入或读取。
- en: A superblock contains metadata about the inodes and disk blocks. An example
    superblock can store how full each disk block is, which inodes are being used
    etc. Modern filesystems may actually contain multiple superblocks and a sort-of
    super-super block that keeps track of which sectors are governed by which superblocks.
    This tends to help with fragmentation.
  id: totrans-49
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 超块包含有关inode和磁盘块元数据。一个示例超块可以存储每个磁盘块的使用情况，哪些inode正在使用等。现代文件系统可能实际上包含多个超块和一个类似超级块的超级块，它跟踪哪些扇区由哪些超级块管理。这有助于减少碎片。
- en: It may seem overwhelming, but by the end of this chapter, we will be able to
    make sense of every part of the filesystem.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然可能看起来令人不知所措，但到本章结束时，我们将能够理解文件系统的每个部分。
- en: To reason about data on some form of storage – spinning disks, solid state drives,
    magnetic tape – it is common practice to first consider the medium of storage
    as a collection of *blocks*. A block can be thought of as a contiguous region
    on disk. While its size is sometimes determined by some property of the underlying
    hardware, it is more frequently determined based on the size of a page of memory
    for a given system, so that data from the disk can be cached in memory for faster
    access – a important feature of many filesystems.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 要对某种形式的存储上的数据进行推理——旋转磁盘、固态驱动器、磁带——通常的做法是首先考虑存储介质为*块*的集合。块可以被视为磁盘上的连续区域。虽然其大小有时由底层硬件的一些属性决定，但它更频繁地基于给定系统的页面大小来决定，这样可以从内存中缓存磁盘数据以实现更快的访问——这是许多文件系统的一个重要特性。
- en: A filesystem has a special block denoted as a *superblock* that stores metadata
    about the filesystem such as a journal (which logs changes to the filesystem),
    a table of inodes, the location of the first inode on disk, etc. The important
    thing about a superblock is that it is in a known location on disk. If not, your
    computer may fail to boot! Consider a simple ROM programmed into your motherboard.
    If your processor can’t tell the motherboard to start reading and decipher a disk
    block to start the boot sequence, you are out of luck.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 文件系统有一个特殊的块，称为*超级块*，它存储有关文件系统的元数据，例如日志（记录文件系统的更改）、inode表、磁盘上第一个inode的位置等。关于超级块的重要之处在于它在磁盘上的位置是已知的。如果不是这样，你的计算机可能无法启动！考虑一个编程到主板上的简单ROM。如果你的处理器不能告诉主板开始读取和解码磁盘块以启动启动序列，你就麻烦了。
- en: The inode is the most important structure for our filesystem as it represents
    a file. Before we explore it in-depth, let’s list out the key information we need
    to have a usable file.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 索引节点是我们文件系统最重要的结构，因为它代表了一个文件。在我们深入探讨它之前，让我们列出我们需要的关键信息，以便能够使用文件。
- en: Name
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 名称
- en: File size
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文件大小
- en: Time created, last modified, last accessed
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建时间、最后修改时间、最后访问时间
- en: Permissions
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 权限
- en: Filepath
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文件路径
- en: Checksum
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 校验和
- en: File data
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文件数据
- en: File Contents
  id: totrans-61
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 文件内容
- en: 'From [Wikipedia](http://en.wikipedia.org/wiki/Inode):'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 来自 [维基百科](http://en.wikipedia.org/wiki/Inode)：
- en: '*In a Unix-style file system, an index node, informally referred to as an inode,
    is a data structure used to represent a filesystem object, which can be various
    things including a file or a directory. Each inode stores the attributes and disk
    block location(s) of the filesystem object’s data. Filesystem object attributes
    may include manipulation metadata (e.g. change, access, modify time), as well
    as owner and permission data (e.g. group-id, user-id, permissions).*'
  id: totrans-63
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*在Unix风格的文件系统中，索引节点，非正式地称为inode，是一种用于表示文件系统对象的数据结构，它可以表示各种事物，包括文件或目录。每个inode存储了文件系统对象数据的属性和磁盘块位置。文件系统对象的属性可能包括操作元数据（例如更改、访问、修改时间），以及所有者和权限数据（例如组ID、用户ID、权限）。*'
- en: The superblock may store an array of inodes, each of which stores direct, and
    potentially several kinds of indirect pointers to disk blocks. Since inodes are
    stored in the superblock, most filesystems have a limit on how many inodes can
    exist. Since each inode corresponds to a file, this is also a limit on how many
    files that filesystem can have. Trying to overcome this problem by storing inodes
    in some other location greatly increases the complexity of the filesystem. Trying
    to reallocate space for the inode table is also infeasible since every byte following
    the end of the inode array would have to be shifted, a highly expensive operation.
    This isn’t to say there aren’t any solutions at all, although typically there
    is no need to increase the number of inodes since the number of inodes is usually
    sufficiently high.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 超块可能存储一个inode数组，每个inode存储直接和可能的几种间接指针到磁盘块。由于inode存储在超块中，大多数文件系统对可以存在的inode数量有一个限制。由于每个inode对应一个文件，这也是该文件系统能够拥有的文件数量的限制。试图通过在其他位置存储inode来克服这个问题会极大地增加文件系统的复杂性。试图重新分配inode表的空间也是不可行的，因为inode数组之后的每个字节都必须移动，这是一个非常昂贵的操作。这并不是说完全没有解决方案，尽管通常没有必要增加inode的数量，因为inode的数量通常已经足够高。
- en: 'Big idea: Forget names of files. The ‘inode’ is the file.'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 大概念：忘记文件名。‘inode’就是文件。
- en: It is common to think of the file name as the ‘actual’ file. It’s not! Instead,
    consider the inode as the file. The inode holds the meta-information (last accessed,
    ownership, size) and points to the disk blocks used to hold the file contents.
    However, the inode does not usually store a filename. Filenames are usually only
    stored in directories (see below).
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 人们通常认为文件名是“实际”的文件。不是这样！相反，考虑inode作为文件。inode包含元信息（最后访问时间、所有权、大小）并指向用于存储文件内容的磁盘块。然而，inode通常不存储文件名。文件名通常只存储在目录中（见下文）。
- en: For example, to read the first few bytes of the file, follow the first direct
    block pointer to the first direct block and read the first few bytes. Writing
    follows the same process. If a program wants to read the entire file, keep reading
    direct blocks until you’ve read several bytes equal to the size of the file. If
    the total size of the file is less than that of the number of direct blocks multiplied
    by the size of a block, then unused block pointers will be undefined. Similarly,
    if the size of a file is not a multiple of the size of a block, data past the
    end of the last byte in the last block will be garbage.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，要读取文件的前几个字节，遵循第一个直接块指针到第一个直接块，并读取前几个字节。写入过程遵循相同的步骤。如果一个程序想要读取整个文件，则持续读取直接块，直到读取的字节数等于文件的大小。如果文件的总大小小于直接块数量乘以块大小，则未使用的块指针将是未定义的。同样，如果文件的大小不是块大小的倍数，则最后一个块最后一个字节之后的数据将是垃圾。
- en: What if a file is bigger than the maximum space addressable by its direct blocks?
    To that, we present a motto programmers take too seriously.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 如果一个文件比其直接块能寻址的最大空间还要大怎么办？针对这个问题，我们提出了程序员过于认真对待的一个格言。
- en: “All problems in computer science can be solved by another level of indirection.”
    - David Wheeler
  id: totrans-69
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “所有计算机科学问题都可以通过另一层间接引用来解决。” - 大卫·惠勒
- en: Except for the problem of too many layers of indirection.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 除了过多间接引用层的问题。
- en: To solve this problem, we introduce . A single indirect block is a block that
    stores pointers to more data blocks. Similarly, a double indirect block stores
    pointers to single indirect blocks, and the concept can be generalized to arbitrary
    levels of indirection. This is a important concept, as inodes are stored in the
    superblock, or some other structure in a well known location with a constant amount
    of space, indirection allows exponential increases in the amount of space an inode
    can keep track of.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，我们引入了。一个单级间接块是一个存储指向更多数据块的指针的块。同样，双级间接块存储指向单级间接块的指针，这个概念可以推广到任意层次的间接引用。这是一个重要的概念，因为inode存储在超级块中，或者在一些已知位置的其他结构中，具有固定数量的空间，间接引用允许inode跟踪的空间量呈指数增长。
- en: As a worked example, suppose we divide the disk into 4KiB blocks and we want
    to address up to <semantics><msup><mn>2</mn><mn>32</mn></msup><annotation encoding="application/x-tex">2^{32}</annotation></semantics>
    blocks. The maximum disk size is <semantics><mrow><mn>4</mn><mi>K</mi><mi>i</mi><mi>B</mi><mo>*</mo><msup><mn>2</mn><mn>32</mn></msup><mo>=</mo><mn>16</mn><mi>T</mi><mi>i</mi><mi>B</mi></mrow><annotation
    encoding="application/x-tex">4KiB *2^{32} = 16TiB</annotation></semantics> remember
    <semantics><mrow><msup><mn>2</mn><mn>10</mn></msup><mo>=</mo><mn>1024</mn></mrow><annotation
    encoding="application/x-tex">2^{10} = 1024</annotation></semantics>. A disk block
    can store <semantics><mfrac><mrow><mn>4</mn><mi>K</mi><mi>i</mi><mi>B</mi></mrow><mrow><mn>4</mn><mi>B</mi></mrow></mfrac><annotation
    encoding="application/x-tex">\frac{4KiB}{4B}</annotation></semantics> possible
    pointers or 1024 pointers. Four byte wide pointers are needed because we want
    to address 32 bits worth of blocks. Each pointer refers to a 4KiB disk block,
    so you can refer up to <semantics><mrow><mn>1024</mn><mo>*</mo><mn>4</mn><mi>K</mi><mi>i</mi><mi>B</mi><mo>=</mo><mn>4</mn><mi>M</mi><mi>i</mi><mi>B</mi></mrow><annotation
    encoding="application/x-tex">1024*4KiB = 4MiB</annotation></semantics> of data.
    For the same disk configuration, a double indirect block stores 1024 pointers
    to 1024 indirection tables. Thus a double-indirect block can refer up to <semantics><mrow><mn>1024</mn><mo>*</mo><mn>4</mn><mi>M</mi><mi>i</mi><mi>B</mi><mo>=</mo><mn>4</mn><mi>G</mi><mi>i</mi><mi>B</mi></mrow><annotation
    encoding="application/x-tex">1024 * 4MiB = 4GiB</annotation></semantics> of data.
    Similarly, a triple indirect block can refer up to 4TiB of data. This is three
    times as slow for reading between blocks, due to increased levels of indirection.
    The actual intra-block reading times don’t change.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一个工作示例，假设我们将磁盘划分为4KiB大小的块，并且我们想要访问多达<semantics><msup><mn>2</mn><mn>32</mn></msup><annotation
    encoding="application/x-tex">2^{32}</annotation></semantics>个块。最大磁盘大小是<semantics><mrow><mn>4</mn><mi>K</mi><mi>i</mi><mi>B</mi><mo>*</mo><msup><mn>2</mn><mn>32</mn></msup><mo>=</mo><mn>16</mn><mi>T</mi><mi>i</mi><mi>B</mi></mrow><annotation
    encoding="application/x-tex">4KiB *2^{32} = 16TiB</annotation></semantics>，记住<semantics><mrow><msup><mn>2</mn><mn>10</mn></msup><mo>=</mo><mn>1024</mn></mrow><annotation
    encoding="application/x-tex">2^{10} = 1024</annotation></semantics>。一个磁盘块可以存储<semantics><mfrac><mrow><mn>4</mn><mi>K</mi><mi>i</mi><mi>B</mi></mrow><mrow><mn>4</mn><mi>B</mi></mrow></mfrac><annotation
    encoding="application/x-tex">\frac{4KiB}{4B}</annotation></semantics>个可能的指针或1024个指针。由于我们想要访问32位块，因此需要四个字节的指针。每个指针指向一个4KiB的磁盘块，因此你可以引用多达<semantics><mrow><mn>1024</mn><mo>*</mo><mn>4</mn><mi>K</mi><mi>i</mi><mi>B</mi><mo>=</mo><mn>4</mn><mi>M</mi><mi>i</mi><mi>B</mi></mrow><annotation
    encoding="application/x-tex">1024*4KiB = 4MiB</annotation></semantics>的数据。对于相同的磁盘配置，一个双间接块存储1024个指向1024个间接表的指针。因此，一个双间接块可以引用多达<semantics><mrow><mn>1024</mn><mo>*</mo><mn>4</mn><mi>M</mi><mi>i</mi><mi>B</mi><mo>=</mo><mn>4</mn><mi>G</mi><mi>i</mi><mi>B</mi></mrow><annotation
    encoding="application/x-tex">1024 * 4MiB = 4GiB</annotation></semantics>的数据。同样，一个三间接块可以引用多达4TiB的数据。由于间接级别增加，读取块之间的速度会慢三倍。实际的块内读取时间不会改变。
- en: Directory Implementation
  id: totrans-73
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 目录实现
- en: A directory is a mapping of names to inode numbers. It is typically a normal
    file, but with some special bits set in its inode and a specific structure for
    its contents. POSIX provides a small set of functions to read the filename and
    inode number for each entry, which we will talk about in depth later in this chapter.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 目录是名称到inode编号的映射。它通常是普通文件，但在其inode中设置了一些特殊位，并且其内容具有特定的结构。POSIX提供了一组小函数来读取每个条目的文件名和inode编号，我们将在本章后面深入讨论。
- en: Let’s think about what directories looks like in the actual file system. Theoretically,
    they are files. The disk blocks will contain *directory entries* or *dirents*.
    What that means is that our disk block can look like this
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们思考一下实际文件系统中目录的样子。从理论上讲，它们是文件。磁盘块将包含*目录条目*或*dirents*。这意味着我们的磁盘块可以看起来像这样
- en: '[PRE0]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Each directory entry could either be a fixed size, or a variable length C-string.
    It depends on how the particular filesystem implements it at the lower level.
    To see a mapping of filenames to inode numbers on a POSIX system, from a shell,
    use with the option
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 每个目录条目可以是固定大小的，也可以是可变长度的C字符串。这取决于特定的文件系统在底层如何实现它。要在POSIX系统上查看文件名到inode编号的映射，从shell中使用选项
- en: '[PRE1]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: You can see later that this is a powerful abstraction. One can have a file be
    multiple different names in a directory, or exist in multiple directories.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以稍后看到这是一个强大的抽象。一个文件可以在目录中有多个不同的名称，或者存在于多个目录中。
- en: UNIX Directory Conventions
  id: totrans-80
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: UNIX目录约定
- en: In standard UNIX filesystems, the following entries are specially added on requests
    to read a directory.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 在标准UNIX文件系统中，在请求读取目录时，会特别添加以下条目。
- en: represents the current directory
  id: totrans-82
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 代表当前目录
- en: represents the parent directory
  id: totrans-83
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 代表父目录
- en: Counterintuitively, could be the name of a file or directory on disk (You can
    try this with ), not the grandparent directory. Only the current directory and
    the parent directory have special aliases involving (namely , and ). Confusingly,
    the shell does interpret as a handy shortcut to the grandparent directory (should
    it exist) while expanding shell commands.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 令人反直觉的是，可以是磁盘上文件或目录的名称（你可以用试试），而不是祖父目录。只有当前目录和父目录有涉及（即，和）。令人困惑的是，shell在展开shell命令时将解释为访问祖父目录的便捷快捷方式（如果存在）。
- en: 'Additional facts about name-related conventions:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 关于名称相关约定的额外事实：
- en: is usually expanded to the home directory by the shell
  id: totrans-86
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通常由shell展开为家目录
- en: Files that start with ’.’ (a period) on disk are conventionally considered ’hidden’
    and will be omitted by programs like without additional flags (). This is not
    a feature of the filesystem, and programs may choose to ignore this.
  id: totrans-87
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在磁盘上以‘.’（点）开头的文件传统上被认为是‘隐藏’的，并且在没有额外标志的情况下（例如，程序会省略它们）。这不是文件系统的功能，程序可以选择忽略这一点。
- en: Some files may also start with a NUL byte. These are usually *abstract UNIX
    sockets* and are used to prevent cluttering up the filesystem since they will
    be effectively hidden by any unexpecting program. They will, however, be listed
    by tools that detail information about sockets, so this is not a feature providing
    security.
  id: totrans-88
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一些文件也可能以空字节NUL开头。这些通常是*抽象UNIX套接字*，用于防止文件系统杂乱无章，因为它们将被任何未预料到的程序有效地隐藏。然而，它们将被详细提供套接字信息的工具列出，因此这不是提供安全性的功能。
- en: If you want to annoy your neighbor, create a file with the terminal bell character.
    Every single time the file is listed (by calling ‘ls’, for example), an audible
    bell will be heard.
  id: totrans-89
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果你想要惹恼你的邻居，创建一个包含终端响铃字符的文件。每次文件被列出（例如通过调用‘ls’）时，都会听到一个可听到的响铃。
- en: Directory API
  id: totrans-90
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 目录API
- en: While interacting with a file in C is typically done by using to open the file
    and then or to interact with the file before calling to release resources, directories
    have special calls such as, , and . There is no function since typically that
    implies creating a file or link. The program would use something like or .
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 在C语言中与文件交互通常是通过使用打开文件，然后或与文件交互，在调用之前释放资源来完成的，目录有特殊的调用，如，和。没有函数，因为这通常意味着创建文件或链接。程序会使用类似或的东西。
- en: To explore these functions, let’s write a program to search the contents of
    a directory for a particular file. The code below has a bug, try to spot it!
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 要探索这些功能，让我们编写一个程序来搜索目录中的特定文件。下面的代码有错误，试着找出它！
- en: '[PRE2]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Did you find the bug? It leaks resources! If a matching filename is found then
    ‘closedir’ is never called as part of the early return. Any file descriptors opened
    and any memory allocated by opendir are never released. This means eventually
    the process will run out of resources and an or call will fail.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 你找到错误了吗？它泄漏资源！如果找到一个匹配的文件名，那么在早期返回时永远不会调用‘closedir’。任何打开的文件描述符和由‘opendir’分配的任何内存永远不会释放。这意味着最终进程将耗尽资源，或者调用将失败。
- en: The fix is to ensure we free up resources in every possible code path.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 修复方法是确保我们在所有可能的代码路径中释放资源。
- en: In the above code, this means calling before . Forgetting to release resources
    is a common C programming bug because there is no support in the C language to
    ensure resources are always released with all code paths.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 在上面的代码中，这意味着在之前调用。忘记释放资源是C编程中常见的错误，因为C语言没有支持确保所有代码路径都释放资源的功能。
- en: Given an open directory, after a call to , either (XOR), the parent or the child
    can use , or . If both the parent and the child use the above, the behavior is
    undefined.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 给定一个打开的目录，在调用后，要么（XOR），父目录或子目录可以使用，或者。如果父目录和子目录都使用上述方法，则行为是未定义的。
- en: There are two main gotchas and one consideration. The function returns “.” (current
    directory) and “..” (parent directory). The other is programs need to explicity
    exclude subdirectories from a search, otherwise the search may take a long time.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 有两个主要的问题和一个注意事项。函数返回“.”（当前目录）和“..”（父目录）。另一个是程序需要显式排除子目录的搜索，否则搜索可能需要很长时间。
- en: For many applications, it’s reasonable to check the current directory first
    before recursively searching sub-directories. This can be achieved by storing
    the results in a linked list, or resetting the directory struct to restart from
    the beginning.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 对于许多应用来说，在递归搜索子目录之前先检查当前目录是合理的。这可以通过存储结果在链表中或重置目录结构从开始处重新启动来实现。
- en: The following code attempts to list all files in a directory recursively. As
    an exercise, try to identify the bugs it introduces.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 以下代码尝试递归地列出目录中的所有文件。作为一个练习，尝试识别它引入的错误。
- en: '[PRE3]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Did you find all 5 bugs?
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 你找到了所有的5个错误吗？
- en: '[PRE4]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: One final note of caution. is not thread-safe! You shouldn’t use the re-entrant
    version of the function. Synchronizing the filesystem within a process is important,
    so use locks around .
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一点注意事项。这不是线程安全的！你不应该使用函数的重入版本。在进程内同步文件系统很重要，所以使用锁来包围 。
- en: See the [man page of readdir](https://linux.die.net/man/3/readdir) for more
    details.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 有关更多详细信息，请参阅[readdir的man页](https://linux.die.net/man/3/readdir)。
- en: Linking
  id: totrans-106
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 链接
- en: Links are what force us to model a filesystem as a graph rather than a tree.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 链接迫使我们将文件系统建模为图而不是树。
- en: 'While modeling the filesystem as a tree would imply that every inode has a
    unique parent directory, links allow inodes to present themselves as files in
    multiple places, potentially with different names, thus leading to an inode having
    multiple parent directories. There are two kinds of links:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 当将文件系统建模为树时，会暗示每个inode都有一个唯一的父目录，但链接允许inode在多个地方呈现为文件，可能具有不同的名称，从而导致inode有多个父目录。有两种类型的链接：
- en: 'A hard link is simply an entry in a directory assigning some name to an inode
    number that already has a different name and mapping in either the same directory
    or a different one. If we already have a file on a file system we can create another
    link to the same inode using the command:'
  id: totrans-109
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 硬链接简单来说就是目录中的一个条目，将某个inode号分配给已经具有不同名称和映射的inode。如果我们已经在文件系统上有一个文件，我们可以使用以下命令创建指向相同inode的另一个链接：
- en: '[PRE5]'
  id: totrans-110
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE5]'
- en: However, blip.txt *is* the same file. If we edit blip, I’m editing the same
    file as ‘file1.txt!’. We can prove this by showing that both file names refer
    to the same inode.
  id: totrans-111
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 然而，blip.txt *确实是*同一个文件。如果我们编辑blip，我正在编辑与‘file1.txt’相同的文件。我们可以通过证明这两个文件名都指向相同的inode来证明这一点。
- en: '[PRE6]'
  id: totrans-112
  prefs:
  - PREF_IND
  type: TYPE_PRE
