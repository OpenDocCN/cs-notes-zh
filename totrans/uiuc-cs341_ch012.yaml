  - PREF_UL
  type: TYPE_NORMAL
  zh: 返回有效用户ID（如果以root身份操作，则为零，例如由于程序上设置了setuid标志）
- en: These functions can allow one to write a program that can only be run by a privileged
    user by checking or go a step further and ensure that the only user who can run
    the code is root by using .
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 这些函数可以允许编写一个只能由特权用户运行的程序，通过检查或更进一步，确保唯一可以运行代码的用户是root，使用。
- en: The ‘sticky’ bit
  id: totrans-200
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 粘性位
- en: Sticky bits as we use them today serve a different purpose from initial introduction.
    Sticky bits were a bit that could be set on an executable file that would allow
    a program’s text segment to remain in swap even after the end of the program’s
    execution. This made subsequent executions of the same program faster. Today,
    this behavior is no longer supported and the sticky bit only holds meaning when
    set on a directory,
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 我们今天使用的粘性位与最初的引入目的不同。粘性位是可以设置在可执行文件上的位，允许程序文本段在程序执行结束后仍然保留在交换空间中。这使得相同程序的后续执行更快。今天，这种行为不再被支持，粘性位仅在设置为目录时才有意义，
- en: When a directory’s sticky bit is set only the file’s owner, the directory’s
    owner, and the root user can rename or delete the file. This is useful when multiple
    users have write access to a common directory. A common use of the sticky bit
    is for the shared and writable directory where many users’ files may be stored,
    but users should not be able to access files belonging to other users.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 当目录的粘性位被设置时，只有文件的所有者、目录的所有者和root用户可以重命名或删除文件。这在多个用户对公共目录有写访问权限时很有用。粘性位的一个常见用途是共享和可写目录，其中可能存储了许多用户的文件，但用户不应能够访问其他用户的所有文件。
- en: To set the sticky bit, use .
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 要设置粘性位，使用。
