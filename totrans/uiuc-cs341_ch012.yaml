- en: Understanding the ‘umask’
  id: totrans-184
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 理解‘umask’
- en: The umask *subtracts* (reduces) permission bits from and is used when new files
    and new directories are created by open, mkdir etc. By default, the umask is set
    to (octal), which means that group and other privileges will be exclusively readable.
    Each process has a current umask value. When forking, the child inherits the parent’s
    umask value.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: umask *减去*（减少）权限位，并在使用open、mkdir等创建新文件和新目录时使用。默认情况下，umask设置为（八进制），这意味着组和其他权限将仅限于可读。每个进程都有一个当前的umask值。当进行fork时，子进程会继承父进程的umask值。
- en: For example, by setting the umask to in the shell, ensures that future file
    and directory creation will only be accessible to the current user,
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，通过在shell中设置umask，确保未来创建的文件和目录只能被当前用户访问，
