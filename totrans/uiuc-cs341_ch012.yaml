  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 也常用于复制磁盘或整个文件系统以创建可以烧录到其他磁盘或分发给其他用户的镜像。
- en: Updating Modification Time
  id: totrans-239
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 更新修改时间
- en: 'The executable creates a file if it is non-existant and also updates the file’s
    last modified time to be the current time. For example, we can make a new private
    file with the current time:'
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 可执行文件如果不存在则创建文件，并更新文件的最后修改时间为当前时间。例如，我们可以使用当前时间创建一个新的私有文件：
- en: '[PRE25]'
  id: totrans-241
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: An example use of touch is to force make to recompile a file that is unchanged
    after modifying the compiler options inside the makefile. Remember that make is
    ‘lazy’ - it will compare the modified time of the source file with the corresponding
    output file to see if the file needs to be recompiled.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: '`touch`的一个示例用法是强制`make`重新编译在`makefile`内部修改编译选项后未更改的文件。记住，`make`是“懒惰”的——它会比较源文件的修改时间与相应的输出文件，以查看文件是否需要重新编译。'
- en: '[PRE26]'
  id: totrans-243
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: Managing Filesystems
  id: totrans-244
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 管理文件系统
- en: To manage filesystems on your machine, use . Using mount without any options
    generates a list (one filesystem per line) of mounted filesystems including networked,
    virtual and local (spinning disk / SSD-based) filesystems. Here is a typical output
    of mount
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 要管理机器上的文件系统，使用`mount`。使用不带任何选项的`mount`会生成一个挂载的文件系统列表（每行一个文件系统），包括网络、虚拟和本地（旋转磁盘/基于SSD）文件系统。以下是`mount`的典型输出。
- en: '[PRE27]'
  id: totrans-246
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: Notice that each line includes the filesystem type source of the filesystem
    and mount point. To reduce this output, we can pipe it into and only see lines
    that match a regular expression.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，每一行都包括文件系统的类型、源和挂载点。为了减少输出，我们可以将其管道输入到`grep`，只查看匹配正则表达式的行。
- en: '[PRE28]'
  id: totrans-248
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: Filesystem Mounting
  id: totrans-249
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 文件系统挂载
- en: Suppose you had downloaded a bootable Linux disk image from the [arch linux
    download page](https://www.archlinux.org/download/)
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 假设您已从[arch linux下载页面](https://www.archlinux.org/download/)下载了一个可启动的Linux磁盘镜像。
- en: '[PRE29]'
  id: totrans-251
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: 'Before putting the filesystem on a CD, we can mount the file as a filesystem
    and explore its contents. Note: mount requires root access, so let’s run it using
    sudo'
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 在将文件系统放在CD上之前，我们可以将文件挂载为文件系统并探索其内容。注意：`mount`需要root权限，所以让我们使用`sudo`来运行它。
- en: '[PRE30]'
  id: totrans-253
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: Before the mount command, the arch directory is new and obviously empty. After
    mounting, the contents of will be drawn from the files and directories stored
    in the filesystem stored inside the file. The option is required because we want
    to mount a regular file, not a block device such as a physical disk.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 在`mount`命令之前，`arch`目录是新的，显然是空的。挂载后，内容将从存储在文件系统内部的文件和目录中抽取。这个选项是必需的，因为我们想要挂载一个常规文件，而不是像物理磁盘这样的块设备。
- en: The loop option wraps the original file as a block device. In this example,
    we will find out below that the file system is provided under . We can check the
    filesystem type and mount options by running the mount command without any parameters.
    We will pipe the output into so that we only see the relevant output line(s) that
    contain ‘arch’.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 循环选项将原始文件包装为块设备。在本例中，我们将在下面发现文件系统是在提供的。我们可以通过运行不带任何参数的mount命令来检查文件系统类型和挂载选项。我们将输出通过管道传输到，以便我们只看到包含‘arch’的相关输出行。
- en: '[PRE31]'
  id: totrans-256
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: The iso9660 filesystem is a read-only filesystem originally designed for optical
    storage media (i.e. CDRoms). Attempting to change the contents of the filesystem
    will fail
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: iso9660文件系统是一个最初为光盘存储媒体（即CDRoms）设计的只读文件系统。尝试更改文件系统的内容将失败
- en: '[PRE32]'
  id: totrans-258
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: Memory Mapped IO
  id: totrans-259
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 内存映射I/O
- en: While we traditionally think of reading and writing from a file as an operation
    that happens by using the and calls, there is an alternative, mapping a file into
    memory using . can also be used for IPC, and you can see more about as a system
    call that enables shared memory in the IPC chapter. In this chapter, we’ll briefly
    explore as a filesystem operation.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们传统上认为从文件中读取和写入是一个通过使用和调用来发生的操作，但有一个替代方案，即使用映射文件到内存。这也可以用于IPC，你可以在IPC章节中了解更多关于作为启用共享内存的系统调用的信息。在本章中，我们将简要探讨作为文件系统操作的使用。
- en: takes a file and maps its contents into memory. This allows a user to treat
    the entire file as a buffer in memory for easier semantics while programming,
    and to avoid having to read a file as discrete chunks explicitly.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 将文件的内容映射到内存中。这使用户可以将整个文件作为内存中的缓冲区来处理，以便在编程时更容易理解语义，并避免显式地按离散块读取文件。
- en: Not all filesystems support using for IO. Those that do have varying behavior.
    Some will simply implement as a wrapper around and . Others will add additional
    optimizations by taking advantage of the kernel’s page cache. Of course, such
    optimization can be used in the implementation of and as well, so often using
    has identical performance.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 并非所有文件系统都支持使用它进行I/O操作。那些支持使用的文件系统行为各异。有些只是将和作为包装器来实现。而有些则会通过利用内核的页面缓存来添加额外的优化。当然，这种优化也可以用于和的实现，因此通常使用它们的性能是相同的。
- en: is used to perform some operations such as loading libraries and processes into
    memory. If many programs only need read-access to the same file, then the same
    physical memory can be shared between multiple processes. This is used for common
    libraries like the C standard library.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 用于执行一些操作，如将库和进程加载到内存中。如果许多程序只需要对同一文件进行读取访问，则可以在多个进程之间共享相同的物理内存。这用于常见的库，如C标准库。
- en: The process to map a file into memory is as follows.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 将文件映射到内存的过程如下。
- en: requires a file descriptor, so we need to the file first
  id: totrans-265
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 需要一个文件描述符，因此我们需要先打开文件
- en: We seek to our desired size and write one byte to ensure that the file is sufficient
    length
  id: totrans-266
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们寻找所需的大小，并写入一个字节以确保文件长度足够。
- en: When finished call munmap to unmap the file from memory.
  id: totrans-267
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 完成后，调用munmap从内存中取消映射文件。
- en: Here is a quick example.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个快速示例。
- en: '[PRE33]'
  id: totrans-269
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: The careful reader may notice that our integers were written in least-significant-byte
    format because that is the endianness of the CPU that we ran this example on.
    We also allocated a file that is one byte too many! The options specify the virtual
    memory protection. The option (not used here) can be set to allow CPU execution
    of instructions in memory.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 仔细的读者可能会注意到，我们使用的是最低有效字节格式来编写整数，因为这是我们运行此示例的CPU的字节序。我们还分配了一个比一个字节多的文件！选项指定了虚拟内存保护。选项（在此未使用）可以设置为允许CPU执行内存中的指令。
- en: Reliable Single Disk Filesystems
  id: totrans-271
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 可靠的单硬盘文件系统
- en: Most filesystems cache significant amounts of disk data in physical memory.
    Linux, in this respect, is extreme. All unused memory is used as a giant disk
    cache. The disk cache can have a significant impact on overall system performance
    because disk I/O is slow. This is especially true for random access requests on
    spinning disks where the disk read-write latency is dominated by the seek time
    required to move the read-write disk head to the correct position.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数文件系统都会在物理内存中缓存大量的磁盘数据。在这方面，Linux是极端的。所有未使用的内存都用作巨大的磁盘缓存。磁盘缓存可以对整体系统性能产生重大影响，因为磁盘I/O速度慢。这对于旋转磁盘上的随机访问请求尤其如此，其中磁盘读写延迟主要由将读写磁盘头移动到正确位置所需的寻址时间决定。
- en: For efficiency, the kernel caches recently used disk blocks. For writing, we
    have to choose a trade-off between performance and reliability. Disk writes can
    also be cached (“Write-back cache”) where modified disk blocks are stored in memory
    until evicted. Alternatively, a ‘write-through cache’ policy can be employed where
    disk writes are sent immediately to the disk. The latter is safer as filesystem
    modifications are quickly stored to persistent media but slower than a write-back
    cache. If writes are cached then they can be delayed and efficiently scheduled
    based on the physical position of each disk block. Note, this is a simplified
    description because solid state drives (SSDs) can be used as a secondary write-back
    cache.
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 为了效率，内核缓存最近使用的磁盘块。对于写入，我们必须在性能和可靠性之间做出权衡。磁盘写入也可以被缓存（“写回缓存”），修改后的磁盘块存储在内存中，直到被移除。或者，可以采用“写入通过缓存”策略，其中磁盘写入立即发送到磁盘。后者更安全，因为文件系统修改迅速存储到持久介质中，但比写回缓存慢。如果写入被缓存，则可以根据每个磁盘块的物理位置延迟和高效地调度。注意，这是一个简化的描述，因为固态驱动器（SSD）可以用作二级写回缓存。
- en: Both solid state disks (SSD) and spinning disks have improved performance when
    reading or writing sequential data. Thus, operating systems can often use a read-ahead
    strategy to amortize the read-request costs and request several contiguous disk
    blocks per request. By issuing an I/O request for the next disk block before the
    user application requires the next disk block, the apparent disk I/O latency can
    be reduced.
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 固态硬盘（SSD）和旋转硬盘在读取或写入顺序数据时都提高了性能。因此，操作系统通常可以使用预读策略来分摊读取请求的成本，并请求每个请求的几个连续磁盘块。通过在用户应用程序需要下一个磁盘块之前发出对下一个磁盘块的I/O请求，可以减少明显的磁盘I/O延迟。
- en: If your data is important and needs to be force written to disk, call to request
    that a filesystem’s changes be written (flushed) to disk. However, operating systems
    may ignore this request. Even if the data is evicted from the kernel buffers,
    the disk firmware may use an internal on-disk cache or may not yet have finished
    changing the physical media. Note, you can also request that all changes associated
    with a particular file descriptor are flushed to disk using . There is a fiery
    debate about this call being useless, initiated by PostgresQL’s team [https://lwn.net/Articles/752063/](https://lwn.net/Articles/752063/)
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的数据很重要，需要强制写入磁盘，可以调用请求将文件系统的更改写入（刷新）到磁盘。然而，操作系统可能会忽略这个请求。即使数据被从内核缓冲区中移除，磁盘固件可能会使用内部磁盘缓存，或者可能尚未完成对物理介质的更改。注意，你也可以请求使用
    . 将与特定文件描述符相关联的所有更改刷新到磁盘。关于这个调用是否无用的争论很激烈，由PostgreSQL团队发起 [https://lwn.net/Articles/752063/](https://lwn.net/Articles/752063/)
- en: If your operating system fails in the middle of an operation, most modern file
    systems do something called **journaling** to work around this. What the file
    system does is before it completes a potentially expensive operation, is that
    it writes what it is going to do down in a journal. In the case of a crash or
    failure, one can step through the journal and see which files are corrupt and
    fix them. This is a way to salvage hard disks in cases there is critical data
    and there is no apparent backup.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的操作系统在操作过程中失败，大多数现代文件系统会采取一种称为**日志记录**的措施来解决这个问题。文件系统所做的是，在它完成一个可能昂贵的操作之前，将它的操作记录下来。在发生崩溃或故障的情况下，可以逐步检查日志，查看哪些文件已损坏并修复它们。这是一种在存在关键数据且没有明显备份的情况下挽救硬盘的方法。
- en: Even though it is unlikely for your computer, programming for data centers means
    that disks fail every few seconds. Disk failures are measured using “Mean-Time-To-Failure
    (MTTF)”. For large arrays, the mean failure time can be surprisingly short. If
    the MTTF(single disk) = 30,000 hours, then the MTTF(1000 disks)= 30000/1000=30
    hours or about a day and a half! That’s also assuming that the failures between
    the disks are independent, which they often aren’t.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 即使你的计算机不太可能发生这种情况，为数据中心编程意味着磁盘每几秒钟就会失败。磁盘故障使用“平均故障时间（MTTF）”来衡量。对于大型阵列，平均故障时间可能出人意料地短。如果MTTF（单个磁盘）=
    30,000小时，那么MTTF（1000个磁盘）= 30,000/1000=30小时，大约是一天半！这也假设磁盘之间的故障是独立的，而它们通常不是。
- en: RAID - Redundant Array of Inexpensive Disks
  id: totrans-278
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: RAID - 红undant Array of Inexpensive Disks
- en: One way to protect against this is to store the data twice! This is the main
    principle of a “RAID-1” disk array. By duplicating the writes to a disk with writes
    to another backup disk, there are exactly two copies of the data. If one disk
    fails, the other disk serves as the only copy until it can be re-cloned. Reading
    data is faster since data can be requested from either disk, but writes are potentially
    twice as slow because now two write commands need to be issued for every disk
    block write. Compared to using a single disk, the cost of storage per byte has
    doubled.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 防止这种情况的一种方法是将数据存储两次！这是“RAID-1”磁盘阵列的主要原则。通过将写入磁盘的数据与写入另一个备份磁盘的数据进行复制，数据恰好有两个副本。如果一个磁盘发生故障，另一个磁盘将作为唯一的副本，直到可以重新克隆。读取数据更快，因为可以从任一磁盘请求数据，但写入可能慢两倍，因为现在每个磁盘块写入都需要发出两个写入命令。与使用单个磁盘相比，每字节的存储成本翻倍。
- en: Another common RAID scheme is RAID-0, meaning that a file could be split up
    among two disks, but if any disk fails then the files are irrecoverable. This
    has the benefit of halving write times because one part of the file could be writing
    to hard disk one and another part to hard disk two.
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个常见的RAID方案是RAID-0，这意味着文件可以在两个磁盘之间分割，但如果任何磁盘发生故障，文件将无法恢复。这的好处是写入时间减半，因为文件的一部分可以写入硬盘一，另一部分写入硬盘二。
- en: It is also common to combine these systems. If you have a lot of hard disks,
    consider RAID-10\. This is where you have two systems of RAID-1, but the systems
    are hooked up in RAID-0 to each other. This means you would get roughly the same
    speed from the slowdowns but now any one disk can fail and you can recover that
    disk. If two disks from opposing raid partitions fail, there is a chance that
    you can recover though we don’t could on it most of the time.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 也常见将这些系统结合起来。如果你有很多硬盘，可以考虑RAID-10。这是有两个RAID-1系统，但系统通过RAID-0相互连接。这意味着你会从减速中获得大致相同的速度，但现在任何一块磁盘都可以失败，你可以恢复那块磁盘。如果来自对立RAID分区的两块磁盘发生故障，有恢复的机会，尽管我们大多数时候并不指望它。
- en: Higher Levels of RAID
  id: totrans-282
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 更高的RAID级别
- en: RAID-3 uses parity codes instead of mirroring the data. For each N-bits written,
    we will write one extra bit, the ‘Parity bit’ that ensures the total number of
    1s written is even. The parity bit is written to an additional disk. If any disk
    including the parity disk is lost, then its contents can still be computed using
    the contents of the other disks.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: RAID-3使用奇偶校验码而不是镜像数据。对于每个写入的N位，我们将写入一个额外的位，即“奇偶校验位”，确保写入的1的总数是偶数。奇偶校验位写入到额外的磁盘。如果包括奇偶校验磁盘在内的任何磁盘丢失，则可以使用其他磁盘的内容计算其内容。
- en: One disadvantage of RAID-3 is that whenever a disk block is written, the parity
    block will always be written too. This means that there is effectively a bottleneck
    in a separate disk. In practice, this is more likely to cause a failure because
    one disk is being used 100% of the time and once that disk fails then the other
    disks are more prone to failure.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: RAID-3的一个缺点是，每当写入磁盘块时，奇偶校验块也总是会被写入。这意味着实际上有一个瓶颈在单独的磁盘上。在实践中，这更有可能导致故障，因为一个磁盘被100%使用，一旦该磁盘发生故障，其他磁盘就更容易发生故障。
- en: A single disk failure is recoverable because there is sufficient data to rebuild
    the array from the remaining disks. Data-loss will occur when two disks are unusable
    because there is no longer sufficient data to rebuild the array. We can calculate
    the probability of a two disk failure based on the repair time which factors both
    the time to insert a new disk and the time required to rebuild the entire contents
    of the array.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 单个磁盘故障是可恢复的，因为剩余的磁盘中有足够的数据可以重建阵列。当两个磁盘无法使用时，将发生数据丢失，因为不再有足够的数据来重建阵列。我们可以根据修复时间来计算两个磁盘故障的概率，修复时间考虑了插入新磁盘的时间和重建整个阵列内容所需的时间。
- en: '[PRE34]'
  id: totrans-286
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: Using typical numbers (MTTR=1day, MTTF=1000days, N-1 = 9, p=0.009)
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 使用典型数字（MTTR=1天，MTTF=1000天，N-1=9，p=0.009）
- en: There is a 1% chance that another drive will fail during the rebuild process
    (at that point you had better hope you still have an accessible backup of your
    original data. In practice, the probability of a second failure during the repair
    process is likely higher because rebuilding the array is I/O-intensive (and on
    top of normal I/O request activity). This higher I/O load will also stress the
    disk array.
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 在重建过程中，有1%的概率另一个驱动器会失败（此时你最好希望你的原始数据仍然有一个可访问的备份。在实践中，修复过程中第二次故障的概率可能更高，因为重建阵列是I/O密集型的（并且还在正常的I/O请求活动之上）。这种更高的I/O负载也会对磁盘阵列造成压力。
- en: RAID-5 is similar to RAID-3 except that the check block (parity information)
    is assigned to different disks for different blocks. The check-block is ‘rotated’
    through the disk array. RAID-5 provides better read and write performance than
    RAID-3 because there is no longer the bottleneck of the single parity disk. The
    one drawback is that you need more disks to have this setup, and there are more
    complicated algorithms that need to be used.
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: RAID-5与RAID-3类似，但校验块（奇偶校验信息）分配给不同磁盘的不同块。校验块在磁盘阵列中“旋转”。RAID-5比RAID-3提供了更好的读写性能，因为没有单校验磁盘的瓶颈。唯一的缺点是，你需要更多的磁盘来设置这个环境，并且需要使用更复杂的算法。
- en: Failure is common. Google reports 2-10% of disks fail per year. Multiplying
    that by 60,000+ disks in a single warehouse. Services must survive single disk,
    rack of servers, or whole data center failures.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 失败是常见的。谷歌报告称，每年有2-10%的磁盘会损坏。在一个仓库中，有60,000多个磁盘，这个数字乘以去，服务必须能够承受单个磁盘、服务器机架或整个数据中心故障。
- en: Solutions
  id: totrans-291
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 解决方案
- en: 'Simple redundancy (2 or 3 copies of each file) e.g., Google GFS (2001). More
    efficient redundancy (analogous to RAID 3++) e.g., [Google Colossus filesystem](http://goo.gl/LwFIy)
    (~2010): customizable replication including Reed-Solomon codes with 1.5x redundancy'
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 简单冗余（每个文件的2或3个副本），例如，谷歌GFS（2001）。更高效的冗余（类似于RAID 3++），例如，[谷歌Colossus文件系统](http://goo.gl/LwFIy)（约2010年）：可定制的复制，包括具有1.5倍冗余的里德-所罗门码
- en: Simple Filesystem Model
  id: totrans-293
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简单的文件系统模型
- en: Software developers need to implement filesystems all the time. If that is surprising
    to you, we encourage you to take a look at Hadoop, GlusterFS, Qumulo, etc. Filesystems
    are hot areas of research as of 2018 because people have realized that the software
    models that we have devised don’t take full advantage of our current hardware.
    Additionally, the hardware that we use for storing information is getting better
    all the time. As such, you may end up designing a filesystem yourself someday.
    In this section, we will go over one of a fake filesystems and “walk through”
    some examples of how things work.
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 软件开发者需要不断实现文件系统。如果你对此感到惊讶，我们鼓励你看看Hadoop、GlusterFS、Qumulo等。截至2018年，文件系统是研究的热点领域，因为人们已经意识到我们设计的软件模型没有充分利用我们当前的硬件。此外，我们用于存储信息的硬件也在不断改进。因此，你可能会有一天自己设计文件系统。在本节中，我们将介绍一个假想的文件系统，并“走过”一些工作原理的例子。
- en: So, what does our hypothetical filesystem look like? We will base it off of
    the , a simple filesystem that happens to be the first filesystem that Linux ran
    on. It is laid out sequentially on disk, and the first section is the superblock.
    The superblock stores important metadata about the entire filesystem. Since we
    want to be able to read this block before we know anything else about the data
    on disk, this needs to be in a well-known location so the start of the disk is
    a good choice. After the superblock, we’ll keep a map of which inodes are being
    used. The nth bit is set if the nth inode – <semantics><mn>0</mn><annotation encoding="application/x-tex">0</annotation></semantics>
    being the inode root – is being used. Similarly, we store a map recording which
    data blocks are used. Finally, we have an array of inodes followed by the rest
    of the disk - implicitly partitioned into data blocks. One data block may be identical
    to the next from the perspective of the hardware components of the disk. Thinking
    about the disk as an array of data blocks is simply something we do so that we
    have a way to describe where files live on disk.
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们的假设文件系统看起来是什么样子呢？我们将基于它，这是一个简单的文件系统，碰巧是Linux运行的第一个文件系统。它在磁盘上顺序排列，第一部分是超级块。超级块存储有关整个文件系统的关键元数据。由于我们希望在了解磁盘上的其他数据之前能够读取此块，因此它需要位于一个已知的位置，因此磁盘的开始是一个不错的选择。在超级块之后，我们将保留一个记录哪些inode正在使用的映射。如果第n个inode（inode根为<semantics><mn>0</mn><annotation
    encoding="application/x-tex">0</annotation></semantics>）正在使用，则第n位被设置。同样，我们存储一个记录哪些数据块正在使用的映射。最后，我们有一个inode数组，然后是磁盘的其余部分
    - 隐式地划分为数据块。从磁盘的硬件组件的角度来看，一个数据块可能和下一个数据块相同。将磁盘视为数据块的数组只是我们为了有一个描述文件在磁盘上位置的方法而做的事情。
- en: Below, we have an example of how an inode that describes a file may look. Note
    that for the sake of simplicity, we have drawn arrows mapping data block numbers
    in the inode to their locations on disk. These aren’t pointers so much as indices
    into an array.
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是一个描述文件的inode可能看起来怎样的例子。请注意，为了简化，我们画了箭头，将inode中的数据块编号映射到磁盘上的位置。这些不是指针，更多的是数组中的索引。
- en: '![Sample file filling up](../media/file43.png)'
  id: totrans-297
  prefs: []
  type: TYPE_IMG
  zh: '![样本文件填充](../media/file43.png)'
- en: Sample file filling up
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 样本文件填充
- en: We will assume that a data block is 4 KiB.
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将假设数据块的大小为4 KiB。
- en: Note that a file will fill up each of its data blocks completely before requesting
    an additional data block. We will refer to this property as the file being *compact*.
    The file presented above is interesting since it uses all of its direct blocks,
    one of the entries for its indirect block and partially uses another indirect
    block.
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，文件在请求额外的数据块之前，会完全填满其数据块。我们将把这个特性称为文件是*紧凑的*。上面展示的文件很有趣，因为它使用了所有的直接块，间接块中的一个条目，以及部分使用了另一个间接块。
- en: The following subsections will all refer to the file presented above.
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 以下小节将全部参考上面展示的文件。
- en: File Size vs Space on Disk
  id: totrans-302
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 文件大小与磁盘空间
- en: Our file’s size must be stored in the inode. The filesystem isn’t aware of the
    actual contents of what is in a file - that data is considered the user’s and
    should only be manipulated by the user. However, we can compute upper and lower
    bounds on the filesize by only looking at how many blocks the file uses.
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 我们文件的大小必须存储在inode中。文件系统不知道文件实际内容的细节——这些数据被认为是用户的，并且只能由用户操作。然而，我们可以通过查看文件使用的块的数量来计算文件大小的上下限。
- en: There are two full direct blocks, which together store <semantics><mrow><mn>2</mn><mo>*</mo><mi>s</mi><mi>i</mi><mi>z</mi><mi>e</mi><mi>o</mi><mi>f</mi><mo
    stretchy="false" form="prefix">(</mo><mi>d</mi><mi>a</mi><mi>t</mi><mi>a</mi><mi>_</mi><mi>b</mi><mi>l</mi><mi>o</mi><mi>c</mi><mi>k</mi><mo
    stretchy="false" form="postfix">)</mo><mo>=</mo><mn>2</mn><mo>*</mo><mn>4</mn><mi>K</mi><mi>i</mi><mi>B</mi><mo>=</mo><mn>8</mn><mi>K</mi><mi>i</mi><mi>B</mi></mrow><annotation
    encoding="application/x-tex">2*sizeof(data\_block)=2*4KiB=8KiB</annotation></semantics>.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 有两个完整的直接块，它们共同存储 <semantics><mrow><mn>2</mn><mo>*</mo><mi>s</mi><mi>i</mi><mi>z</mi><mi>e</mi><mi>o</mi><mi>f</mi><mo
    stretchy="false" form="prefix">(</mo><mi>d</mi><mi>a</mi><mi>t</mi><mi>a</mi><mi>_</mi><mi>b</mi><mi>l</mi><mi>o</mi><mi>c</mi><mi>k</mi><mo
    stretchy="false" form="postfix">)</mo><mo>=</mo><mn>2</mn><mo>*</mo><mn>4</mn><mi>K</mi><mi>i</mi><mi>B</mi><mo>=</mo><mn>8</mn><mi>K</mi><mi>i</mi><mi>B</mi></mrow><annotation
    encoding="application/x-tex">2*sizeof(data\_block)=2*4KiB=8KiB</annotation></semantics>.
- en: There are two used blocks referenced by the indirect block, which can store
    up to <semantics><mrow><mn>8</mn><mi>K</mi><mi>i</mi><mi>B</mi></mrow><annotation
    encoding="application/x-tex">8KiB</annotation></semantics> as calculated above.
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 间接块引用了两个已使用的块，根据上述计算，可以存储高达 <semantics><mrow><mn>8</mn><mi>K</mi><mi>i</mi><mi>B</mi></mrow><annotation
    encoding="application/x-tex">8KiB</annotation></semantics>。
- en: We can now add these values to get an upper bound on the file size of <semantics><mrow><mn>16</mn><mi>K</mi><mi>i</mi><mi>B</mi></mrow><annotation
    encoding="application/x-tex">16KiB</annotation></semantics>.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在可以将这些值相加，以得到文件大小的上限，即 <semantics><mrow><mn>16</mn><mi>K</mi><mi>i</mi><mi>B</mi></mrow><annotation
    encoding="application/x-tex">16KiB</annotation></semantics>.
- en: What about a lower bound? We know that we must use the two direct blocks, one
    block referenced by the indirect block and at least 1 byte of a second block referenced
    by the indirect block. With this information, we can work out the lower bound
    to be <semantics><mrow><mn>2</mn><mo>*</mo><mn>4</mn><mi>K</mi><mi>i</mi><mi>B</mi><mo>+</mo><mn>4</mn><mi>K</mi><mi>i</mi><mi>B</mi><mo>+</mo><mn>1</mn><mo>=</mo><mn>12</mn><mi>K</mi><mi>i</mi><mi>B</mi><mo>+</mo><mn>1</mn><mi>B</mi></mrow><annotation
    encoding="application/x-tex">2*4KiB+4KiB+1=12KiB+1B</annotation></semantics>.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 那么下限是多少呢？我们知道我们必须使用两个直接块，一个由间接块引用的块，以及至少1字节由间接块引用的第二个块。有了这些信息，我们可以计算出下限为 <semantics><mrow><mn>2</mn><mo>*</mo><mn>4</mn><mi>K</mi><mi>i</mi><mi>B</mi><mo>+</mo><mn>4</mn><mi>K</mi><mi>i</mi><mi>B</mi><mo>+</mo><mn>1</mn><mo>=</mo><mn>12</mn><mi>K</mi><mi>i</mi><mi>B</mi><mo>+</mo><mn>1</mn><mi>B</mi></mrow><annotation
    encoding="application/x-tex">2*4KiB+4KiB+1=12KiB+1B</annotation></semantics>.
- en: Note that our calculations so far have been to determine how much data the user
    is storing on disk. What about the *overhead* of storing this data incurred while
    using this filesystem? You’ll notice that we use an indirect block to store the
    disk block numbers of blocks used beyond the two direct blocks. While doing our
    above calculations, we omitted this block. This would instead be counted as the
    overhead of the file, and thus the total overhead of storing this file on disk
    is <semantics><mrow><mi>s</mi><mi>i</mi><mi>z</mi><mi>e</mi><mi>o</mi><mi>f</mi><mo
    stretchy="false" form="prefix">(</mo><mi>i</mi><mi>n</mi><mi>d</mi><mi>i</mi><mi>r</mi><mi>e</mi><mi>c</mi><mi>t</mi><mi>_</mi><mi>b</mi><mi>l</mi><mi>o</mi><mi>c</mi><mi>k</mi><mo
    stretchy="false" form="postfix">)</mo><mo>=</mo><mn>4</mn><mi>K</mi><mi>i</mi><mi>B</mi><mo
    stretchy="false" form="postfix">)</mo></mrow><annotation encoding="application/x-tex">sizeof(indirect\_block)=4KiB)</annotation></semantics>.
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，到目前为止，我们的计算是为了确定用户在磁盘上存储了多少数据。那么，使用该文件系统存储这些数据所产生 *开销* 呢？你会注意到我们使用间接块来存储超出两个直接块使用的磁盘块号。在我们上面的计算中，我们忽略了这块。这将作为文件的开销来计算，因此，在磁盘上存储此文件的总开销是
    <semantics><mrow><mi>s</mi><mi>i</mi><mi>z</mi><mi>e</mi><mi>o</mi><mi>f</mi><mo
    stretchy="false" form="prefix">(</mo><mi>i</mi><mi>n</mi><mi>d</mi><mi>i</mi><mi>r</mi><mi>e</mi><mi>c</mi><mi>t</mi><mi>_</mi><mi>b</mi><mi>l</mi><mi>o</mi><mi>c</mi><mi>k</mi><mo
    stretchy="false" form="postfix">)</mo><mo>=</mo><mn>4</mn><mi>K</mi><mi>i</mi><mi>B</mi><mo
    stretchy="false" form="postfix">)</mo></mrow><annotation encoding="application/x-tex">sizeof(indirect\_block)=4KiB)</annotation></semantics>。
- en: Thinking about overhead, a related calculation could be to determine the max/min
    disk usage per file in this filesystem.
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到开销，一个相关的计算可以是确定该文件系统中每个文件的最大/最小磁盘占用。
- en: Trivially a file of size <semantics><mn>0</mn><annotation encoding="application/x-tex">0</annotation></semantics>
    has no associated data blocks and takes up no space on disk (ignoring the space
    required for the inode since these are located in a fixed size array somewhere
    on disk). How about the disk usage of the smallest non-empty file? That is, consider
    a file of size <semantics><mrow><mn>1</mn><mi>B</mi></mrow><annotation encoding="application/x-tex">1B</annotation></semantics>.
    Note that when a user writes the first byte, a data block will be allocated. Since
    each data block is <semantics><mrow><mn>4</mn><mi>K</mi><mi>i</mi><mi>B</mi></mrow><annotation
    encoding="application/x-tex">4KiB</annotation></semantics>, we find that <semantics><mrow><mn>4</mn><mi>K</mi><mi>i</mi><mi>B</mi></mrow><annotation
    encoding="application/x-tex">4KiB</annotation></semantics> is the minimum disk
    usage for a non-empty file. Here, we observe that the file size will only be <semantics><mrow><mn>1</mn><mi>B</mi></mrow><annotation
    encoding="application/x-tex">1B</annotation></semantics>, despite that <semantics><mrow><mn>4</mn><mi>K</mi><mi>i</mi><mi>B</mi></mrow><annotation
    encoding="application/x-tex">4KiB</annotation></semantics> of the disk is used
    – there is a distinction between file size and disk usage because of overhead!
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，大小为 <semantics><mn>0</mn><annotation encoding="application/x-tex">0</annotation></semantics>
    的文件没有关联的数据块，并且在磁盘上不占用任何空间（忽略inode所需的空间，因为这些位于磁盘上的某个固定大小的数组中）。那么，最小非空文件占用的磁盘空间是多少呢？也就是说，考虑一个大小为
    <semantics><mrow><mn>1</mn><mi>B</mi></mrow><annotation encoding="application/x-tex">1B</annotation></semantics>
    的文件。请注意，当用户写入第一个字节时，会分配一个数据块。由于每个数据块的大小是 <semantics><mrow><mn>4</mn><mi>K</mi><mi>i</mi><mi>B</mi></mrow><annotation
    encoding="application/x-tex">4KiB</annotation></semantics>，我们发现 <semantics><mrow><mn>4</mn><mi>K</mi><mi>i</mi><mi>B</mi></mrow><annotation
    encoding="application/x-tex">4KiB</annotation></semantics> 是非空文件的最小磁盘占用。在这里，我们观察到文件大小将是
    <semantics><mrow><mn>1</mn><mi>B</mi></mrow><annotation encoding="application/x-tex">1B</annotation></semantics>，尽管使用了
    <semantics><mrow><mn>4</mn><mi>K</mi><mi>i</mi><mi>B</mi></mrow><annotation encoding="application/x-tex">4KiB</annotation></semantics>
    的磁盘空间——文件大小和磁盘占用之间的区别是由于开销！
- en: Finding maximum is slightly more involved. As we saw earlier in this chapter,
    a filesystem with this structure can have <semantics><mn>1024</mn><annotation
    encoding="application/x-tex">1024</annotation></semantics> data block numbers
    in one indirect block. This implies that the maximum filesize can be <semantics><mrow><mn>2</mn><mo>*</mo><mn>4</mn><mi>K</mi><mi>i</mi><mi>B</mi><mo>+</mo><mn>1024</mn><mo>*</mo><mn>4</mn><mi>K</mi><mi>i</mi><mi>B</mi><mo>=</mo><mn>4</mn><mi>M</mi><mi>i</mi><mi>B</mi><mo>+</mo><mn>8</mn><mi>K</mi><mi>i</mi><mi>B</mi></mrow><annotation
    encoding="application/x-tex">2*4KiB + 1024*4KiB = 4MiB + 8KiB</annotation></semantics>
    (after accounting for the direct blocks as well). However, on disk we also store
    the indirect block itself. This means that an additional <semantics><mrow><mn>4</mn><mi>K</mi><mi>i</mi><mi>B</mi></mrow><annotation
    encoding="application/x-tex">4KiB</annotation></semantics> of overhead will be
    used to account for the indirect block, so the total disk usage will be <semantics><mrow><mn>4</mn><mi>M</mi><mi>i</mi><mi>B</mi><mo>+</mo><mn>12</mn><mi>K</mi><mi>i</mi><mi>B</mi></mrow><annotation
    encoding="application/x-tex">4MiB + 12KiB</annotation></semantics>.
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 寻找最大值稍微复杂一些。正如我们在本章前面看到的，具有这种结构的文件系统可以在一个间接块中有<semantics><mn>1024</mn><annotation
    encoding="application/x-tex">1024</annotation></semantics>个数据块号。这意味着最大文件大小可以是<semantics><mrow><mn>2</mn><mo>*</mo><mn>4</mn><mi>K</mi><mi>i</mi><mi>B</mi><mo>+</mo><mn>1024</mn><mo>*</mo><mn>4</mn><mi>K</mi><mi>i</mi><mi>B</mi><mo>=</mo><mn>4</mn><mi>M</mi><mi>i</mi><mi>B</mi><mo>+</mo><mn>8</mn><mi>K</mi><mi>i</mi><mi>B</mi></mrow><annotation
    encoding="application/x-tex">2*4KiB + 1024*4KiB = 4MiB + 8KiB</annotation></semantics>（在考虑直接块之后）。然而，在磁盘上我们也会存储间接块本身。这意味着还需要额外的<semantics><mrow><mn>4</mn><mi>K</mi><mi>i</mi><mi>B</mi></mrow><annotation
    encoding="application/x-tex">4KiB</annotation></semantics>开销来处理间接块，所以总磁盘使用量将是<semantics><mrow><mn>4</mn><mi>M</mi><mi>i</mi><mi>B</mi><mo>+</mo><mn>12</mn><mi>K</mi><mi>i</mi><mi>B</mi></mrow><annotation
    encoding="application/x-tex">4MiB + 12KiB</annotation></semantics>。
- en: Note that when only using direct blocks, completely filling up a direct block
    implies that our filesize and our disk usage are the same thing! While it would
    seem like we always want this ideal scenario, it puts a restrictive limit on the
    maximum filesize. Attempting to remedy this by increasing the number of direct
    blocks seems promising, but note that this requires increasing the size of an
    inode and reducing the amount of space available to store user data – a tradeoff
    you will have to evaluate for yourself. Alternatively always trying to split your
    data up into chunks that never use indirect blocks is may exhaust the limited
    pool of available inodes.
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，当只使用直接块时，完全填满一个直接块意味着我们的文件大小和磁盘使用量是同一件事！虽然这似乎是我们总是想要的理想情况，但它对最大文件大小施加了限制性限制。通过增加直接块的数量来尝试解决这个问题似乎很有希望，但请注意，这需要增加inode的大小并减少存储用户数据的空间量——这是一个你必须自己评估的权衡。或者，始终尝试将数据分成永远不会使用间接块的块，可能会耗尽有限的inode池。
- en: Performing Reads
  id: totrans-313
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 执行读取操作
- en: 'Performing reads tend to be pretty easy in our filesystem because our files
    are compact. Let’s say that we want to read the entirety of this particular file.
    What we’d start by doing is go to the inode’s direct struct and find the first
    direct data block number. In our case, it is #7\. Then we find the 7th data block
    from the *start* of all data blocks. Then we read all of those bytes. We do the
    same thing for all of the direct nodes. What do we do after? We go to the indirect
    block and read the indirect block. We know that every 4 bytes of the indirect
    block is either a sentinel node (-1) or the number of *another* data block. In
    our particular example, the first four bytes evaluate to the integer 5, meaning
    that our data continues on the 5th data block from the beginning. We do the same
    for data block #4 and we stop after because we exceed the size of the inode'
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的文件系统中执行读取操作通常相当简单，因为我们的文件很紧凑。假设我们想要读取这个特定文件的全部内容。我们首先会去inode的直接结构中找到第一个直接数据块号。在我们的例子中，它是#7。然后我们从所有数据块的*开始*位置找到第7个数据块。然后我们读取所有这些字节。对于所有的直接节点，我们都会做同样的事情。接下来我们做什么？我们转到间接块并读取间接块。我们知道间接块中的每4个字节要么是一个哨兵节点（-1），要么是另一个数据块的编号。在我们的特定例子中，前四个字节计算出的整数是5，这意味着我们的数据从开始的第5个数据块继续。我们对数据块#4也做同样的处理，然后停止，因为我们已经超过了inode的大小。
- en: 'Now, let’s think about the edge cases. How would a program start the read starting
    at an arbitrary offset of <semantics><mi>n</mi><annotation encoding="application/x-tex">n</annotation></semantics>
    bytes given that block sizes are <semantics><mrow><mn>4</mn><mi>K</mi><mi>i</mi><mi>B</mi><mi>s</mi></mrow><annotation
    encoding="application/x-tex">4 KiBs</annotation></semantics>. How many indirect
    blocks should there be if the filesystem is correct? (Hint: *think about using
    the size of the inode*)'
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们考虑边缘情况。给定块大小为<semantics><mrow><mn>4</mn><mi>K</mi><mi>i</mi><mi>B</mi><mi>s</mi></mrow><annotation
    encoding="application/x-tex">4 KiBs</annotation></semantics>，程序如何从任意偏移量<semantics><mi>n</mi><annotation
    encoding="application/x-tex">n</annotation></semantics>字节开始读取？如果文件系统是正确的，应该有多少个间接块？（提示：*考虑使用inode的大小*）
- en: Performing Writes
  id: totrans-316
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 执行写入操作
- en: Writing to files
  id: totrans-317
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 写入文件
- en: Performing writes fall into two categories, writes to files and writes to directories.
    First we’ll focus on files and assume that we are writing a byte to the <semantics><mn>6</mn><annotation
    encoding="application/x-tex">6</annotation></semantics>th KiB of our file. To
    perform a write on a file at a particular offset, first the filesystem must go
    to the data block would start at that offset. For this particular example we would
    have to go to the 2nd or indexed number 1 inode to perform our write. We would
    once again fetch this number from the inode, go to the root of the data blocks,
    go to the <semantics><mn>5</mn><annotation encoding="application/x-tex">5</annotation></semantics>th
    data block and perform our write at the <semantics><mn>2</mn><annotation encoding="application/x-tex">2</annotation></semantics>KiB
    offset from this block because we skipped the first four kibibytes of the file
    in block 7\. We perform our write and go on our merry way.
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 执行写入操作分为两类，写入文件和写入目录。首先，我们将关注文件，并假设我们要向文件的<semantics><mn>6</mn><annotation encoding="application/x-tex">6</annotation></semantics>th
    KiB写入一个字节。要在特定偏移量处对文件执行写入操作，首先文件系统必须到达从该偏移量开始的数据块。在这个特定的例子中，我们必须到达第2个或索引编号为1的inode来执行我们的写入。我们再次从这个inode中获取这个数字，到达数据块的根，到达<semantics><mn>5</mn><annotation
    encoding="application/x-tex">5</annotation></semantics>th数据块，并从这个块的<semantics><mn>2</mn><annotation
    encoding="application/x-tex">2</annotation></semantics>KiB偏移量处执行写入操作，因为我们跳过了块7中的前四个kibibytes的文件。我们执行写入操作，然后继续我们的快乐之旅。
- en: Some questions to consider.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 一些需要考虑的问题。
- en: How would a program perform a write go across data block boundaries?
  id: totrans-320
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 程序如何跨数据块边界执行写入操作？
- en: How would a program perform a write after adding the offset would extend the
    length of the file?
  id: totrans-321
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在添加偏移量后，如果会扩展文件长度，程序将如何执行写入操作？
- en: How would a program perform a write where the offset is greater than the length
    of the original file?
  id: totrans-322
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果偏移量大于原始文件长度，程序将如何执行写入操作？
- en: Writing to directories
  id: totrans-323
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 写入目录
- en: Performing a write to a directory implies that an inode needs to be added to
    a directory. If we pretend that the example above is a directory. We know that
    we will be adding at most one directory entry at a time. Meaning that we have
    to have enough space for one directory entry in our data blocks. Luckily the last
    data block that we have has enough free space. This means we need to find the
    number of the last data block as we did above, go to where the data ends, and
    write one directory entry. Don’t forget to update the size of the directory so
    that the next creation doesn’t overwrite your file!
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 向目录写入意味着需要在目录中添加一个inode。如果我们假设上面的例子是一个目录。我们知道我们每次最多只能添加一个目录条目。这意味着我们必须在我们的数据块中有足够的空间来容纳一个目录条目。幸运的是，我们拥有的最后一个数据块有足够的空闲空间。这意味着我们需要找到最后一个数据块的编号，就像上面做的那样，到达数据结束的地方，并写入一个目录条目。别忘了更新目录的大小，这样下一次创建就不会覆盖你的文件！
- en: 'Some more questions:'
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 一些更多的问题：
- en: How would would a program perform a write when the last data block is already
    full?
  id: totrans-326
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当最后一个数据块已经满时，程序将如何执行写入操作？
- en: How about when all the direct blocks have been filled up and the inode doesn’t
    have an indirect block?
  id: totrans-327
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当所有直接块都已填满且inode没有间接块时怎么办？
- en: What about when the first indirect entry (#4) is full?
  id: totrans-328
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当第一个间接条目（#4）已满时怎么办？
- en: Adding Deletes
  id: totrans-329
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 添加删除
- en: If the inode is a file, then remove the directory entry in the parent directory
    by marking it as invalid (maybe making it point to inode -1) and skip it in your
    reads. A filesystem decreases the hard link count of the inode and if the count
    reaches zero, free the inode in the inode map and free all associated data blocks
    so they are reclaimed by the filesystem. In many operating systems, several fields
    in the inode get overwritten.
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 如果inode是一个文件，那么通过将其标记为无效（可能使其指向inode -1）来在父目录中删除目录条目，并在读取时跳过它。文件系统会减少inode的硬链接计数，如果计数达到零，则在inode映射中释放inode，并释放所有相关数据块，以便它们被文件系统回收。在许多操作系统中，inode中的几个字段会被覆盖。
- en: If the inode is a directory, the filesystem checks if it is empty. If not, then
    the kernel will most likely mark an error.
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 如果inode是一个目录，文件系统会检查它是否为空。如果不为空，那么内核很可能会标记一个错误。
- en: Be sure to check out the appendix for modern and cutting edge filesystems.
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 一定要查看附录，了解现代和前沿的文件系统。
