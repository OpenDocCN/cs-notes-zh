- en: The ‘setuid’ bit
  id: totrans-192
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: “setuid”位
- en: You may have noticed an additional bit that files with execute permission may
    have set. This bit is the bit. It indicated that when run, the program will set
    the uid of the user to that of the owner of the file. Similar, there is a bit
    which sets the gid of the executor to the gid of the owner. The canonical example
    of a program with set is .
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能已经注意到，具有执行权限的文件可能设置了额外的位。这个位是粘性位。它表示当运行程序时，程序将用户的uid设置为文件所有者的uid。类似地，还有一个位将执行者的gid设置为所有者的gid。具有set的程序的经典示例是。
- en: 'is usually a program that is owned by the root user - a user that has all capabilities.
    By using , an otherwise unprivileged user can gain access to most parts of the
    system. This is useful for running programs that may require elevated privileges,
    such as using to change ownership of a file, or to use to mount or unmount filesystems
    (an action we will discuss later in this chapter). Here are some examples:'
  id: totrans-194
