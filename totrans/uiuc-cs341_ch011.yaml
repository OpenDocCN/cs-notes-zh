- en: 'Layer 4: TCP Server'
  id: totrans-108
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第4层：TCP服务器
- en: The four system calls required to create a minimal TCP server are , , , and
    . Each has a specific purpose and should be called in roughly the above order
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 创建最小TCP服务器所需的四个系统调用是、、、和。每个都有特定的目的，并且应该按照上述顺序大致调用
- en: To create an endpoint for networking communication. A new socket by itself is
    stores bytes. Though we’ve specified either a packet or stream-based connections,
    it is unbound to a particular network interface or port. Instead, socket returns
    a network descriptor that can be used with later calls to bind, listen and accept.
  id: totrans-110
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 要创建网络通信的端点。一个新的套接字本身存储字节。尽管我们指定了基于数据包或流连接，但它未绑定到特定的网络接口或端口。相反，套接字返回一个网络描述符，可以用于后续的bind、listen和accept调用。
- en: As one gotcha, these sockets must be declared passive. Passive server sockets
    wait for another host to connect. Instead, they wait for incoming connections.
    Additionally, server sockets remain open when the peer disconnects. Instead, the
    client communicates with a separate active socket on the server that is specific
    to that connection.
  id: totrans-111
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 作为一个问题，这些套接字必须声明为被动。被动服务器套接字等待另一个主机连接。相反，它们等待传入连接。此外，当对等方断开连接时，服务器套接字保持打开。相反，客户端通过服务器上的一个特定于该连接的单独活动套接字进行通信。
- en: Since a TCP connection is defined by the sender address and port along with
    a receiver address and port, a particular server port there can be one passive
    server socket but multiple active sockets. One for each currently open connection.
    The server’s operating system maintains a lookup table that associates a unique
    tuple with active sockets so that incoming packets can be correctly routed to
    the correct socket.
  id: totrans-112
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 由于TCP连接由发送者的地址和端口以及接收者的地址和端口定义，因此特定的服务器端口可以有一个被动服务器套接字，但可以有多个活动套接字。每个当前打开的连接都有一个。服务器的操作系统维护一个查找表，将唯一的元组与活动套接字关联起来，以便将传入的数据包正确路由到正确的套接字。
- en: The call associates an abstract socket with an actual network interface and
    port. It is possible to call bind on a TCP client. The port information used by
    bind can be set manually (many older IPv4-only C code examples do this), or be
    created using .
  id: totrans-113
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 该调用将一个抽象套接字与一个实际的网络接口和端口关联起来。可以在TCP客户端上调用bind。bind使用的端口号可以手动设置（许多较老的仅支持IPv4的C代码示例就是这样做的），或者使用
    来创建。
- en: By default, a port is released after some time when the server socket is closed.
    Instead, the port enters a “TIMED-WAIT” state. This can lead to significant confusion
    during development because the timeout can make valid networking code appear to
    fail.
  id: totrans-114
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 默认情况下，当服务器套接字关闭后，端口会在一段时间后释放。相反，端口进入“TIMED-WAIT”状态。这可能导致在开发过程中出现重大混淆，因为超时可能会使有效的网络代码看起来像失败了。
- en: To be able to immediately reuse a port, specify before binding to the port.
  id: totrans-115
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 要能够立即重用端口，请在绑定端口之前指定。
- en: '[PRE16]'
  id: totrans-116
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Here’s [an extended stackoverflow introductory discussion of](http://stackoverflow.com/questions/14388706/socket-options-so-reuseaddr-and-so-reuseport-how-do-they-differ-do-they-mean-t)
    .
  id: totrans-117
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这里有一个关于[socket选项so-reuseaddr和so-reuseport的扩展stackoverflow入门讨论](http://stackoverflow.com/questions/14388706/socket-options-so-reuseaddr-and-so-reuseport-how-do-they-differ-do-they-mean-t)。
- en: The call specifies the queue size for the number of incoming, unhandled connections.
    There are the connections unassigned to a file descriptor by . Typical values
    for a high-performance server are 128 or more.
  id: totrans-118
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 该调用指定了未处理传入连接的队列大小。这是由 没有分配给文件描述符的连接。对于高性能服务器，典型值是128或更多。
- en: Once the server socket has been initialized the server calls to wait for new
    connections. Unlike and , this call will block, unless the nonblocking option
    has been set. If there are no new connections, this call will block and only return
    when a new client connects. The returned TCP socket is associated with a particular
    tuple and will be used for all future incoming and outgoing TCP packets that match
    this tuple.
  id: totrans-119
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一旦服务器套接字初始化完成，服务器就会调用等待新的连接。与 和 不同，这个调用将会阻塞，除非设置了非阻塞选项。如果没有新的连接，这个调用将会阻塞，并且只有在新的客户端连接时才会返回。返回的TCP套接字与一个特定的元组相关联，并将用于所有未来匹配此元组的传入和传出TCP数据包。
- en: Note the call returns a new file descriptor. This file descriptor is specific
    to a particular client. It is a common programming mistake to use the original
    server socket descriptor for the server I/O and then wonder why networking code
    has failed.
  id: totrans-120
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 注意，该调用返回一个新的文件描述符。这个文件描述符特定于某个客户端。使用原始服务器套接字描述符进行服务器I/O是一种常见的编程错误，然后你会 wonder
    为什么网络代码失败了。
- en: The system call can optionally provide information about the remote client,
    by passing in a sockaddr struct. Different protocols have different variants of
    the , which are different sizes. The simplest struct to use is the which is sufficiently
    large to represent all possible types of sockaddr. Notice that C does not have
    any model of inheritance. Therefore we need to explicitly cast our struct to the
    ‘base type’ struct sockaddr.
  id: totrans-121
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 系统调用可以通过传递sockaddr结构体来提供有关远程客户端的信息。不同的协议有不同的，它们的大小不同。最简单的结构体是，它足够大，可以表示所有可能的类型。请注意，C语言没有继承模型。因此，我们需要显式地将我们的结构体转换为基类型结构体sockaddr。
- en: '[PRE17]'
  id: totrans-122
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE17]'
- en: We’ve already seen that can build a linked list of addrinfo entries and each
    one of these can include socket configuration data. What if we wanted to turn
    socket data into IP and port addresses? Enter that can be used to convert local
    or remote socket information into a domain name or numeric IP. Similarly, the
    port number can be represented as a service name. For example, port 80 is commonly
    used as the incoming connection port for incoming HTTP requests. In the example
    below, we request numeric versions for the client IP address and client port number.
  id: totrans-123
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 我们已经看到可以构建一个addrinfo条目链表，并且这些条目中的每一个都可以包含套接字配置数据。如果我们想将套接字数据转换为IP和端口号呢？可以使用该工具将本地或远程套接字信息转换为域名或数字IP。同样，端口号也可以表示为服务名。例如，端口号80通常用作接收HTTP请求的入站连接端口。在下面的示例中，我们请求客户端IP地址和客户端端口号的数字版本。
- en: '[PRE18]'
  id: totrans-124
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE18]'
- en: One can use the macros to denote the maximum length of a hostname, and to denote
    the maximum length of a port. gets the hostname as a numeric IP address and similarly
    for although the port is usually numeric, to begin with. The [Open BSD man pages
    have more information](https://man.openbsd.org/getnameinfo.3#NI_NUMERICHOST)
  id: totrans-125
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 可以使用宏来表示主机名的最大长度，以及端口号的最大长度。将主机名作为数字IP地址获取，同样对于端口号，虽然通常以数字开头，但也可以使用字符串表示。有关更多信息，请参阅[Open
    BSD man pages](https://man.openbsd.org/getnameinfo.3#NI_NUMERICHOST)
- en: and
  id: totrans-126
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: and
- en: Use the call when you no longer need to read any more data from the socket,
    write more data, or have finished doing both. When you call on socket on the read
    and/or write ends, that information is also sent to the other end of the connection.
    If you shut down the socket for further writing at the server end, then a moment
    later, a blocked call could return 0 to indicate that no more bytes are expected.
    Similarly, a write to a TCP connection that has been shut down for reading will
    generate a SIGPIPE
  id: totrans-127
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 当你不再需要从套接字读取更多数据、写入更多数据或完成这两项操作时，使用该调用。当你对套接字的读取和/或写入端调用时，该信息也会发送到连接的另一端。如果你在服务器端关闭套接字以进行进一步写入，那么稍后，一个阻塞调用可能会返回0，表示不再期望更多字节。同样，向已关闭读取的TCP连接写入将生成SIGPIPE信号
- en: Use when your process no longer needs the socket file descriptor.
  id: totrans-128
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 当你的进程不再需要套接字文件描述符时使用。
- en: If you -ed after creating a socket file descriptor, all processes need to close
    the socket before the socket resources can be reused. If you shut down a socket
    for further read, all processes are affected because you’ve changed the socket,
    not the file descriptor. Well written code will a socket before calling it.
  id: totrans-129
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 如果在创建套接字文件描述符后执行了操作，则所有进程都需要在套接字资源可以重用之前关闭套接字。如果你关闭套接字以进行进一步读取，所有进程都会受到影响，因为你已经改变了套接字，而不是文件描述符。良好的代码会在调用之前关闭套接字。
- en: There are a few gotchas to creating a server.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 创建服务器有几个需要注意的问题。
- en: Using the socket descriptor of the passive server socket (described above)
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用被动服务器套接字的套接字描述符（如上所述）
- en: Not specifying SOCK_STREAM requirement for getaddrinfo
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在getaddrinfo中未指定SOCK_STREAM要求
- en: Not being able to reuse an existing port.
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无法重用现有端口。
- en: Not initializing the unused struct entries
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 未初始化未使用的结构体条目
- en: The call will fail if the port is currently in use. Ports are per machine –
    not per process or user. In other words, you cannot use port 1234 while another
    process is using that port. Worse, ports are by default ‘tied up’ after a process
    has finished.
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果端口当前正在使用中，该调用将失败。端口是针对机器的，而不是针对进程或用户。换句话说，你不能在另一个进程使用该端口时使用端口1234。更糟糕的是，端口默认情况下在进程完成后会被“绑定”。
- en: Example Server
  id: totrans-136
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例服务器
- en: 'A working simple server example is shown below. Note: this example is incomplete.
    For example, the socket file descriptor remains open and memory created by remains
    allocated. First, we get the address info for our current machine.'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是一个工作简单服务器示例。注意：此示例是不完整的。例如，套接字文件描述符保持打开状态，由创建的内存保持分配。首先，我们获取当前机器的地址信息。
- en: '[PRE19]'
  id: totrans-138
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Then we set up the socket, bind it, and listen.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们设置套接字，绑定它，并监听。
- en: '[PRE20]'
  id: totrans-140
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: We are finally ready to listen for connections, so we’ll tell the user and accept
    our first client.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 我们终于准备好监听连接了，所以我们将告诉用户并接受我们的第一个客户端。
- en: '[PRE21]'
  id: totrans-142
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: After that, we can treat the new file descriptor as a stream of bytes much like
    a pipe.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，我们可以将新的文件描述符视为类似于管道的字节流。
- en: '[PRE22]'
  id: totrans-144
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: '[language=C]'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: '[language=C]'
- en: Sorry To Interrupt
  id: totrans-146
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 抱歉打断
- en: One concept that we need to make clear is that you need to handle interrupts
    in your networking code. That means that the sockets or accepted file descriptors
    that you read to or write to may have their calls interrupted – most of the time
    you will get an interrupt or two. In reality, any of your system calls could get
    interrupted. The reason we bring this up now is that you are usually waiting for
    the network. Which is an order of magnitude slower than processes. Meaning a higher
    probability of getting interrupted.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要明确的一个概念是，你需要在你的网络代码中处理中断。这意味着你读取或写入的套接字或已接受的文件描述符可能会在调用过程中被中断——大多数情况下你可能会遇到一个或两个中断。实际上，你系统中的任何调用都可能被中断。我们现在提出这个问题的原因是你通常在等待网络。这比进程慢一个数量级。这意味着中断的可能性更高。
- en: How would you handle interrupts? Let’s try a quick example.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 你会如何处理中断？让我们尝试一个快速示例。
- en: '[PRE23]'
  id: totrans-149
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: We can assure you that the following code *experience errors*. Can you see why?
    On the surface, it does restart a call after a read or write. But what else happens
    when the error is EINTR? Are the contents of the buffer correct? What other problems
    can you spot?
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以向你保证，以下代码*会出错*。你能看出为什么吗？表面上，它会在读取或写入后重新启动调用。但当错误是EINTR时，会发生什么？缓冲区的内容是否正确？你能发现其他问题吗？
- en: 'Layer 4: UDP'
  id: totrans-151
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第4层：UDP
- en: UDP is a connectionless protocol that is built on top of IPv4 and IPv6\. It’s
    simple to use. Decide the destination address and port and send your data packet!
    However, the network makes no guarantee about whether the packets will arrive.
    Packets may be dropped if the network is congested. Packets may be duplicated
    or arrive out of order.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: UDP是一种无连接协议，它建立在IPv4和IPv6之上。它使用简单。决定目标地址和端口，然后发送你的数据包！然而，网络不保证数据包是否会到达。如果网络拥塞，数据包可能会丢失。数据包可能会重复或顺序错乱。
- en: A typical use case for UDP is when receiving up to date data is more important
    than receiving all of the data. For example, a game may send continuous updates
    of player positions. A streaming video signal may send picture updates using UDP
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: UDP的一个典型用例是当接收最新数据比接收所有数据更重要时。例如，一个游戏可能会发送玩家位置的连续更新。流媒体视频信号可能会使用UDP发送图片更新。
- en: UDP Attributes
  id: totrans-154
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: UDP属性
- en: Unreliable Datagram Protocol Packets sent through UDP may be dropped on their
    way to the destination. This can especially be confusing because if you only test
    on your loop-back device – this is localhost or 127.0.0.1 for most users – then
    packets will seldom be lost because no network packets are sent.
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过UDP发送的不可靠数据报协议数据包在前往目的地的过程中可能会丢失。这尤其令人困惑，因为如果你只在回环设备上测试——对于大多数用户来说，这是localhost或127.0.0.1——那么数据包很少会丢失，因为没有发送网络数据包。
- en: Simple The UDP protocol is supposed to have much less fluff than TCP. Meaning
    that for TCP there are a lot of configurable parameters and a lot of edge cases
    in the implementation. UDP is fire and forget.
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 简单 UDP协议应该比TCP有更少的冗余。这意味着对于TCP，有很多可配置的参数和很多实现中的边缘情况。UDP是即发即忘。
- en: Stateless/Transaction The UDP protocol is stateless. This makes the protocol
    more simple and lets the protocol represent simple transactions like requesting
    or responding to queries. There is also less overhead to sending a UDP message
    because there is no three-way handshake.
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无状态/事务 UDP协议是无状态的。这使得协议更简单，并允许协议表示简单的交易，如请求或响应查询。发送UDP消息的开销也更小，因为没有三次握手。
- en: Manual Flow/Congestion Control You have to manually manage the flow and congestion
    control which is a double-edged sword. On one hand, you have full control over
    everything. On the other hand, TCP has *decades* of optimization, meaning your
    protocol for its use cases needs to be more efficient that to be more beneficial
    to use it.
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 手动流量/拥塞控制你必须手动管理流量和拥塞控制，这是一把双刃剑。一方面，你完全控制着一切。另一方面，TCP有*数十年的优化*，这意味着你的协议对于其用例需要更高效，以便更利于使用。
- en: Multicast This is one thing that you can only do with UDP. This means that you
    can send a message to every peer connected to a particular router that is part
    of a particular group.
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 多播 这是你只能使用 UDP 做的事情之一。这意味着你可以向连接到特定路由器的每个对等体发送消息，该路由器是特定组的一部分。
- en: The full gory description is available at the original RFC (“User Datagram Protocol”
    [1980](ch018.xhtml#ref-rfc768)).
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 完整的详细描述可在原始 RFC（“用户数据报协议” [1980](ch018.xhtml#ref-rfc768)）中找到。
- en: While it may seem that you never want to use UDP for situations that you don’t
    want to lose data, a lot of protocols base their communication based on UDP that
    requires complete data. Take a look at the Trivial File Transfer Protocol that
    reliably transmits a file over the wire using UDP only. Of course, there is more
    configuration involved, but choosing between UDP over TCP involves more than the
    above factors.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然你可能不想在不想丢失数据的情况下使用 UDP，但许多协议基于 UDP 进行通信，这需要完整的数据。看看简单的文件传输协议（Trivial File
    Transfer Protocol），它使用 UDP 仅通过有线可靠地传输文件。当然，涉及更多的配置，但选择 UDP 而不是 TCP 涉及的因素远不止上述这些。
- en: UDP Client
  id: totrans-162
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: UDP 客户端
- en: UDP Clients are pretty versatile below is a simple client that sends a packet
    to a server specified through the command line. Note that this client sends a
    packet and doesn’t wait for an acknowledgment. It fires and forgets. The example
    below also uses because some legacy functionality still works pretty well for
    setting up a client.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: UDP 客户端非常灵活，下面是一个简单的客户端，它通过命令行指定的服务器发送一个数据包。请注意，这个客户端发送数据包后不会等待确认。它发射后即忘。下面的例子也使用了它，因为一些遗留功能在设置客户端时仍然表现得相当不错。
- en: '[PRE24]'
  id: totrans-164
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: The previous code grabs an entry that matches by hostname. Even though this
    isn’t portable, it gets the job done. First is to connect to it and make it reusable
    – the same as a TCP socket. Note that we pass instead of .
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 之前的代码通过主机名获取一个匹配项。尽管这不是可移植的，但它完成了工作。首先是要连接到它并使其可重用——就像 TCP 套接字一样。请注意，我们传递的是而不是
    。
- en: '[PRE25]'
  id: totrans-166
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: Then, we can copy over our struct into the struct. Full definitions are provided
    in the man pages so it is safe to copy them over.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们可以将我们的结构体复制到另一个结构体中。完整的定义可以在手册页中找到，所以安全地复制它们是可行的。
- en: '[PRE26]'
  id: totrans-168
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: Then a final useful part of UDP is that we can time out receiving a packet as
    opposed to TCP because UDP isn’t connection-oriented. The snippet to do that is
    below.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 然后UDP的一个最终有用的部分是，我们可以超时接收数据包，而不是TCP，因为UDP是无连接的。执行此操作的代码片段如下。
- en: '[PRE27]'
  id: totrans-170
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: Now, the socket is connected and ready to use. We can use to send a packet.
    We should also check the return value. Note that we won’t get an error if the
    packet isn’t delivered because that is a part of the UDP protocol. We will, however,
    get error codes for invalid structs, bad addresses, etc.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，套接字已连接并准备好使用。我们可以用它来发送数据包。我们还应该检查返回值。请注意，如果数据包没有送达，我们不会收到错误，因为这属于 UDP 协议的一部分。然而，对于无效的结构体、错误的地址等，我们会收到错误代码。
- en: '[PRE28]'
  id: totrans-172
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: The above code simply sends “Hello” through a UDP. There is no idea of if the
    packet arrives, is processed, etc.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 上述代码通过 UDP 简单地发送“Hello”。没有关于数据包是否到达、是否被处理等的想法。
- en: UDP Server
  id: totrans-174
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: UDP 服务器
- en: There are a variety of function calls available to send UDP sockets. We will
    use the newer to help set up a socket structure. Remember that UDP is a simple
    packet-based (‘datagram’) protocol. There is no connection to set up between the
    two hosts. First, initialize the hints addrinfo struct to request an IPv6, passive
    datagram socket.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 有许多函数调用可用于发送 UDP 套接字。我们将使用较新的来帮助设置套接字结构。记住，UDP 是一个简单的基于数据包（‘数据报’）的协议。两个主机之间不需要建立连接。首先，初始化
    hints addrinfo 结构以请求一个 IPv6，被动数据报套接字。
- en: '[PRE29]'
  id: totrans-176
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: Next, use getaddrinfo to specify the port number. We don’t need to specify a
    host as we are creating a server socket, not sending a packet to a remote host.
    Be careful not to send “localhost” or any other synonym for the loop-back address.
    We may end up trying to passively listen to ourselves and resulting in bind errors.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，使用 getaddrinfo 指定端口号。我们不需要指定主机，因为我们正在创建一个服务器套接字，而不是向远程主机发送数据包。小心不要发送“localhost”或其他回环地址的同义词。我们可能会尝试被动监听自己，从而导致绑定错误。
- en: '[PRE30]'
  id: totrans-178
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: The port number is less than 1024, so the program will need privileges. We could
    have also specified a service name instead of a numeric port value.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 端口号小于 1024，因此程序需要特权。我们也可以指定一个服务名称而不是数字端口号。
- en: So far, the calls have been similar to a TCP server. For a stream-based service,
    we would call and accept. For our UDP-server, the program can start waiting for
    the arrival of a packet.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，调用与 TCP 服务器类似。对于基于流的 服务，我们会调用并接受。对于我们的 UDP 服务器，程序可以开始等待数据包的到来。
- en: '[PRE31]'
  id: totrans-181
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: The addr struct will hold the sender (source) information about the arriving
    packet. Note the type is sufficiently large enough to hold all possible types
    of socket addresses – IPv4, IPv6 or any other Internet Protocol. The full UDP
    server code is below.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: addr结构将保存关于到达数据包的发送者（源）信息。注意类型足够大，可以容纳所有可能的套接字地址类型 - IPv4、IPv6或任何其他互联网协议。完整的UDP服务器代码如下。
- en: '[PRE32]'
  id: totrans-183
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: Note that if you perform a partial read from a packet, the rest of that data
    is discarded. One call to recvfrom is one packet. To make sure that you have enough
    space, use 64 KiB as storage space.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，如果您从数据包中执行部分读取，则其余数据将被丢弃。一次recvfrom调用对应一个数据包。为了确保有足够的空间，请使用64 KiB作为存储空间。
- en: 'Layer 7: HTTP'
  id: totrans-185
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第7层：HTTP
- en: Layer 7 of the OSI layer deals with application-level interfaces. Meaning that
    you can ignore everything below this layer and treat the Internet as a way of
    communicating with another computer than can be secure and the session may reconnect.
    Common layer 7 protocols are the following
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: OSI模型的第7层处理应用层接口。这意味着您可以忽略此层以下的所有内容，将互联网视为一种与另一台计算机通信的方式，这种通信可以是安全的，并且会话可能会重新连接。常见的第7层协议如下
- en: HTTP(S) - Hypertext Transfer Protocol. Sends arbitrary data and executes remote
    actions on a web server. The S standards for secure where the TCP connection uses
    the TLS protocol to ensure that the communication can’t be read easily by an onlooker.
  id: totrans-187
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: HTTP(S) - 超文本传输协议。在Web服务器上发送任意数据并执行远程操作。S标准表示安全，其中TCP连接使用TLS协议以确保通信不会被旁观者轻易读取。
- en: FTP - File Transfer Protocol. Transfers a file from one computer to another
  id: totrans-188
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: FTP - 文件传输协议。将文件从一个计算机传输到另一个计算机
- en: TFTP - Trivial File Transfer Protocol. Same as above but using UDP.
  id: totrans-189
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: TFTP - 简单文件传输协议。与上面相同，但使用UDP。
- en: DNS - Domain Name Service. Translates hostnames to IP addresses
  id: totrans-190
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: DNS - 域名服务。将主机名转换为IP地址
- en: SMTP - Simple Mail Transfer Protocol. Allows one to send plain text emails to
    an email server
  id: totrans-191
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: SMTP - 简单邮件传输协议。允许向邮件服务器发送纯文本电子邮件
- en: SSH - Secure SHell. Allows one computer to connect to another computer and execute
    commands remotely.
  id: totrans-192
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: SSH - 安全壳。允许一台计算机远程连接到另一台计算机并执行命令。
- en: Bitcoin - Decentralized cryptocurrency
  id: totrans-193
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Bitcoin - 去中心化加密货币
- en: BitTorrent - Peer to peer file sharing protocol
  id: totrans-194
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: BitTorrent - 对等文件共享协议
- en: NTP - Network Time Protocol. This protocol helps keep your computer’s clock
    synced with the outside world
  id: totrans-195
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: NTP - 网络时间协议。此协议帮助将您的计算机时钟与外界同步
- en: What’s my name?
  id: totrans-196
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 我的名字是什么？
- en: Remember when we were talking before about converting a website to an IP address?
    A system called “DNS” (Domain Name Service) is used. If the IP address is missing
    form a machine’s cache then it sends a UDP packet to a local DNS server. This
    server may query other upstream DNS servers.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 记得我们之前讨论过将网站转换为IP地址吗？使用了一个名为“DNS”（域名服务）的系统。如果IP地址未存在于机器的缓存中，则发送一个UDP数据包到本地DNS服务器。此服务器可能会查询其他上游DNS服务器。
- en: DNS by itself is fast but insecure. DNS requests are unencrypted and susceptible
    to ‘man-in-the-middle’ attacks. For example, a coffee shop internet connection
    could easily subvert your DNS requests and send back different IP addresses for
    a particular domain. The way this is usually subverted is that after the IP address
    is obtained then a connection is usually made over HTTPS. HTTPS uses what is called
    the TLS (formerly known as SSL) to secure transmissions and verify that the hostname
    is recognized by a Certificate Authority. Certificate Authorities often get hacked
    so be careful of equating a green lock to secure. Even with this added layer of
    security, the united states government has recently issued a request for everyone
    to upgrade their DNS to DNSSec which includes additional security-focused technologies
    to verify with high probability that an IP address is truly associated with a
    hostname.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: DNS本身速度快但不够安全。DNS请求未加密，容易受到“中间人”攻击。例如，咖啡店的互联网连接可以轻易篡改您的DNS请求，并返回特定域名的不同IP地址。这种篡改通常发生在获取IP地址后，通常会通过HTTPS建立连接。HTTPS使用称为TLS（以前称为SSL）的协议来确保传输安全并验证主机名是否由证书颁发机构认可。证书颁发机构经常被黑客攻击，因此请小心不要将绿色锁等同于安全。即使有这层额外的安全措施，美国政府最近要求每个人升级他们的DNS到DNSSec，它包括额外的安全技术，以高概率验证IP地址确实与主机名相关。
- en: Digression aside, DNS works like this in a nutshell
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 顺便提一下，DNS的工作原理如下
- en: Send a UDP packet to your DNS server
  id: totrans-200
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 向您的DNS服务器发送一个UDP数据包
- en: If that DNS server has the packet cached return the result
  id: totrans-201
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果该DNS服务器已缓存该数据包，则返回结果
- en: If not, ask higher-level DNS servers for the answer. Cache and send the result
  id: totrans-202
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果没有，向更高层的DNS服务器请求答案。缓存并发送结果
- en: If either packet is not answered from within a guessed timeout, resend the request.
  id: totrans-203
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果任一数据包在猜测的超时时间内没有响应，则重发请求。
- en: If you want the full bits and pieces, feel free to look at the Wikipedia page.
    In essence, there is a hierarchy of DNS servers. First, there is the dot hierarchy.
    This hierarchy first resolves top-level domains etc. Next, it resolves the next
    level i.e. . Then the local resolvers can resolve any number of URLs. For example,
    the Illinois DNS server handles both and . There is a limit on how many subdomains
    you can have, but this is often used to route requests to different servers to
    avoid having to buy many high performant servers to route requests.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想查看完整的细节，请随意查看维基百科页面。本质上，存在一个DNS服务器的层次结构。首先，有点层次结构。这个层次结构首先解析顶级域名等。接下来，它解析下一级，即。然后本地解析器可以解析任意数量的URL。例如，伊利诺伊DNS服务器处理和。你可以拥有的子域名数量有限，但这通常用于将请求路由到不同的服务器，以避免需要购买许多高性能服务器来路由请求。
- en: Non-Blocking IO
  id: totrans-205
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 非阻塞IO
- en: When you call if the data is unavailable, it will wait until the data is ready
    before the function returns. When you’re reading data from a disk, that delay
    is short, but when you’re reading from a slow network connection, requests take
    a long time. And the data may never arrive, leading to an unexpected close.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 当你调用时，如果数据不可用，它将等待数据准备好后再返回函数。当你从磁盘读取数据时，这种延迟很短，但当你从慢速网络连接读取时，请求需要很长时间。而且数据可能永远不会到达，导致意外的关闭。
- en: POSIX lets you set a flag on a file descriptor such that any call to on that
    file descriptor will return immediately, whether it has finished or not. With
    your file descriptor in this mode, your call to will start the read operation,
    and while it’s working you can do other useful work. This is called “non-blocking”
    mode since the call to doesn’t block.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: POSIX允许你设置文件描述符上的一个标志，这样任何对该文件描述符的调用都会立即返回，无论它是否已经完成。在这种模式下，你的调用将启动读取操作，在它工作的时候，你可以做其他有用的工作。这被称为“非阻塞”模式，因为调用不会阻塞。
- en: To set a file descriptor to be non-blocking.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 要设置文件描述符为非阻塞。
- en: '[PRE33]'
  id: totrans-209
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: 'For a socket, you can create it in non-blocking mode by adding to the second
    argument to :'
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 对于套接字，你可以通过将添加到第二个参数来以非阻塞模式创建它：
- en: '[PRE34]'
  id: totrans-211
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: When a file is in non-blocking mode and you call , it will return immediately
    with whatever bytes are available. Say 100 bytes have arrived from the server
    at the other end of your socket and you call . ‘read‘ will return immediately
    with a value of 100, meaning it read 100 of the 150 bytes you asked for. Say you
    tried to read the remaining data with a call to , but the last 50 bytes still
    hadn’t arrived yet. would return -1 and set the global error variable **errno**
    to either or . That’s the system’s way of telling you the data isn’t ready yet.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 当一个文件处于非阻塞模式并且你调用时，它将立即返回可用的任何字节。比如说，从你的套接字另一端的服务器传来了100个字节，你调用。‘read’将立即返回一个值为100的值，这意味着它读取了你请求的150个字节中的100个。如果你尝试通过调用读取剩余的数据，但最后50个字节还没有到达。将返回-1，并将全局错误变量**errno**设置为或。这是系统告诉你数据尚未准备好的方式。
- en: also works in non-blocking mode. Say you want to send 40,000 bytes to a remote
    server using a socket. The system can only send so many bytes at a time. In non-blocking
    mode, would return the number of bytes it was able to send immediately, or about
    23,000\. If you called right away again, it would return -1 and set errno to or
    . That’s the system’s way of telling you that it’s still busy sending the last
    chunk of data and isn’t ready to send more yet.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 也在非阻塞模式下工作。比如说，你想通过套接字向远程服务器发送40,000个字节。系统一次只能发送这么多字节。在非阻塞模式下，将立即返回它能够立即发送的字节数，大约是23,000。如果你立即再次调用，它将返回-1，并将errno设置为或。这是系统告诉你它仍在发送最后一块数据，并且尚未准备好发送更多数据的方式。
- en: There are a few ways to check that your IO has arrived. Let’s see how to do
    it using *select* and *epoll*. The first interface we have is select. It isn’t
    preferred by many in the POSIX community if they have an alternative to it, and
    in most cases there is an alternative to it.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 有几种方法可以检查你的IO是否到达。让我们看看如何使用*select*和*epoll*来实现。我们拥有的第一个接口是select。如果POSIX社区有替代方案，很多人不会选择它，而且在大多数情况下，都有一个替代方案。
- en: '[PRE35]'
  id: totrans-215
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: Given three sets of file descriptors, will wait for any of those file descriptors
    to become ‘ready’.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 给定三组文件描述符，将等待这些文件描述符中的任何一个变为“就绪”。
- en: '- a file descriptor in is ready when there is data that can be read or EOF
    has been reached.'
  id: totrans-217
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '- 当有可读数据或到达EOF时，文件描述符处于就绪状态。'
- en: '- a file descriptor in is ready when a call to write() will succeed.'
  id: totrans-218
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '- 当调用write()将成功时，文件描述符处于就绪状态。'
- en: '- system-specific, not well-defined. Just pass NULL for this.'
  id: totrans-219
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '- 系统特定的，定义不明确。只需传递NULL即可。'
- en: returns the total number of ready file descriptors. If none of them become ready
    during the time defined by *timeout*, it will return 0\. After returns, the caller
    will need to loop through the file descriptors in readfds and/or writefds to see
    which ones are ready. As readfds and writefds act as both input and output parameters,
    when indicates that there are ready file descriptors, it would have overwritten
    them to reflect only the ready file descriptors. Unless the caller intends to
    call only once, it would be a good idea to save a copy of readfds and writefds
    before calling it. Here is a comprehensive snippet.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 返回就绪文件描述符的总数。如果在由*timeout*定义的时间内没有任何文件描述符变为就绪，它将返回0。在返回后，调用者需要遍历readfds和/或writefds中的文件描述符，以查看哪些已就绪。由于readfds和writefds既作为输入参数也作为输出参数，当指示有就绪文件描述符时，它将覆盖它们以反映只有就绪文件描述符。除非调用者打算只调用一次，否则在调用之前保存readfds和writefds的副本是一个好主意。以下是一个综合示例。
- en: '[PRE36]'
  id: totrans-221
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: '[For more information on select()](http://pubs.opengroup.org/onlinepubs/9699919799/functions/select.html)
    The problem with select and why a lot of users don’t use this or poll is that
    select must linearly go through each of the objects. If at any point in going
    through the objects, the previous objects change state, select must restart. This
    is highly inefficient if we have a large number of file descriptors in each of
    our sets. There is an alternative, that isn’t much better.'
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: '[有关select()的更多信息](http://pubs.opengroup.org/onlinepubs/9699919799/functions/select.html)
    select的问题以及为什么许多用户不使用它或poll的原因是，select必须线性地遍历每个对象。如果在遍历对象的过程中，任何对象的状态发生变化，select必须重新启动。如果我们每个集合中都有大量的文件描述符，这将非常低效。有一个替代方案，但并不比这个好多少。'
- en: epoll
  id: totrans-223
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: epoll
- en: is not part of POSIX, but it is supported by Linux. It is a more efficient way
    to wait for many file descriptors. It will tell you exactly which descriptors
    are ready. It even gives you a way to store a small amount of data with each descriptor,
    like an array index or a pointer, making it easier to access your data associated
    with that descriptor.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 不是POSIX的一部分，但Linux支持它。这是一种更高效地等待多个文件描述符的方法。它将确切地告诉你哪些描述符已准备好。它甚至为你提供了一种方法，可以在每个描述符中存储少量数据，如数组索引或指针，这使得访问与该描述符关联的数据更加容易。
- en: First, you must create a special file descriptor with [epoll_create()](http://linux.die.net/man/2/epoll_create).
    You won’t read or write to this file descriptor. You’ll pass it to the other epoll_xxx
    functions and call close() on it at the end.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，你必须使用[epoll_create()](http://linux.die.net/man/2/epoll_create)创建一个特殊的文件描述符。你不会读取或写入这个文件描述符。你将把它传递给其他epoll_xxx函数，并在结束时调用close()。
- en: '[PRE37]'
  id: totrans-226
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: For each file descriptor that you want to monitor with epoll, you’ll need to
    add it to the epoll data structures using [epoll_ctl()](http://linux.die.net/man/2/epoll_ctl)
    with the option. You can add any number of file descriptors to it.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 对于你想要使用epoll监控的每个文件描述符，你需要使用[epoll_ctl()](http://linux.die.net/man/2/epoll_ctl)和该选项将其添加到epoll数据结构中。你可以向其中添加任意数量的文件描述符。
- en: '[PRE38]'
  id: totrans-228
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: To wait for some of the file descriptors to become ready, use [epoll_wait()](http://linux.die.net/man/2/epoll_wait).
    The epoll_event struct that it fills out will contain the data you provided in
    event.data when you added this file descriptor. This makes it easy for you to
    look up your data associated with this file descriptor.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 要等待一些文件描述符变为就绪状态，请使用[epoll_wait()](http://linux.die.net/man/2/epoll_wait)。它填充的epoll_event结构将包含你在添加此文件描述符时提供的event.data中的数据。这使得你可以轻松查找与该文件描述符关联的数据。
- en: '[PRE39]'
  id: totrans-230
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: Say you were waiting to write data to a file descriptor, but now you want to
    wait to read data from it. Just use with the option to change the type of operation
    you’re monitoring.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你正在等待向文件描述符写入数据，但现在你想等待从它读取数据。只需使用该选项更改你正在监控的操作类型。
- en: '[PRE40]'
  id: totrans-232
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: To unsubscribe one file descriptor from epoll while leaving others active, use
    with the option.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 要从epoll中取消一个文件描述符的订阅，同时保持其他文件描述符处于活动状态，请使用该选项。
- en: '[PRE41]'
  id: totrans-234
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: To shut down an epoll instance, close its file descriptor.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 要关闭一个epoll实例，关闭其文件描述符。
- en: '[PRE42]'
  id: totrans-236
  prefs: []
  type: TYPE_PRE
  zh: '[PRE42]'
- en: Also to non-blocking and , any calls to on a non-blocking socket will also be
    non-blocking. To wait for the connection to complete, use or epoll to wait for
    the socket to be writable. There are reasons to use epoll over select but due
    to interface, there are fundamental problems with doing so.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 还可以将非阻塞和，任何对非阻塞套接字的调用也将是非阻塞的。要等待连接完成，请使用或epoll等待套接字可写。使用epoll而不是select有原因，但由于接口，这样做存在根本问题。
- en: '[Blogpost about select being broken](https://idea.popcount.org/2017-01-06-select-is-fundamentally-broken/)'
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: '[关于select存在问题的博客文章](https://idea.popcount.org/2017-01-06-select-is-fundamentally-broken/)'
- en: Epoll Example
  id: totrans-239
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Epoll 示例
- en: Let’s break down the epoll code in the man page. We’ll assume that we have a
    prepared TCP server socket . The first thing we have to do is create the epoll
    device.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们分解一下手册页中的epoll代码。我们假设我们有一个准备好的TCP服务器套接字。我们首先要做的是创建epoll设备。
- en: '[PRE43]'
  id: totrans-241
  prefs: []
  type: TYPE_PRE
  zh: '[PRE43]'
- en: The next step is to add the listen socket in level triggered mode.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是在触发模式下添加监听套接字。
- en: '[PRE44]'
  id: totrans-243
  prefs: []
  type: TYPE_PRE
  zh: '[PRE44]'
- en: Then in a loop, we wait and see if epoll has any events.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 然后在循环中，我们等待并查看epoll是否有任何事件。
- en: '[PRE45]'
  id: totrans-245
  prefs: []
  type: TYPE_PRE
  zh: '[PRE45]'
- en: If we get an event on a client socket, that means that the client has data ready
    to be read, and we perform that operation. Otherwise, we need to update our epoll
    structure with a new client.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们在客户端套接字上接收到事件，这意味着客户端有数据准备好读取，我们执行这个操作。否则，我们需要更新我们的epoll结构以添加一个新的客户端。
- en: '[PRE46]'
  id: totrans-247
  prefs: []
  type: TYPE_PRE
  zh: '[PRE46]'
- en: The function above is missing some error checking for brevity as well. Note
    that this code is performant because we added the server socket in level-triggered
    mode and we add each of the client file descriptors in edge-triggered. Edge triggered
    mode leaves more calculations on the part of the application – the application
    must keep reading or writing until the file descriptor is out of bytes – but it
    prevents starvation. A more efficient implementation would also add the listening
    socket in edge-triggered to clear out the backlog of connections as well.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: '上述函数为了简洁省略了一些错误检查。请注意，这段代码性能良好，因为我们以触发模式添加了服务器套接字，并且以边缘触发模式添加了每个客户端文件描述符。边缘触发模式将更多的计算留给了应用程序的部分——应用程序必须继续读取或写入，直到文件描述符的字节用完——但它防止了饥饿。一个更高效的实现还会将监听套接字添加为边缘触发，以清除连接队列。 '
- en: Please read through most of before starting to program. There are a lot of gotchas.
    Some of the more common ones will be detailed below.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 在开始编程之前，请阅读大部分内容。有很多陷阱。以下是一些更常见的陷阱将详细说明。
- en: Assorted Epoll Gotchas
  id: totrans-250
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 各种Epoll陷阱
- en: There are several problems with using epoll. Here we will detail a few.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 使用epoll有几个问题。这里我们将详细说明几个。
- en: There are two modes. Level triggered and edge-triggered. Level triggered means
    that while the file descriptor has events on it, it will be returned by epoll
    when calling the ctl function. In edge-triggered, the caller will only get the
    file descriptor once it goes from zero events to an event. This means if you forget
    to read, write, accept etc on the file descriptor until you get a EWOULDBLOCK,
    that file descriptor will be dropped.
  id: totrans-252
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 有两种模式。触发模式和边缘触发模式。触发模式意味着当文件描述符上有事件时，它将在调用ctl函数时被epoll返回。在边缘触发模式下，调用者只有在从零事件变为事件时才会得到文件描述符。这意味着如果你忘记在文件描述符上读取、写入、接受等操作，直到你得到EWOULDBLOCK，该文件描述符将被丢弃。
- en: If at any point you duplicate a file descriptor and add it to epoll, you will
    get an event from that file descriptor and the duplicated one.
  id: totrans-253
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果在任何时候你复制一个文件描述符并将其添加到epoll中，你将从这个文件描述符和复制的文件描述符中接收到事件。
- en: You can add an epoll object to epoll. Edge triggered and level-triggered modes
    are the same because ctl will reset the state to zero events
  id: totrans-254
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你可以将epoll对象添加到epoll中。边缘触发和触发模式是相同的，因为ctl会将状态重置为零事件
- en: Depending on the conditions, you may get a file descriptor that was closed from
    Epoll. This isn’t a bug. The reason that this happens is epoll works on the kernel
    object level, not the file descriptor level. If the kernel object lives longer
    and the right flags are set, a process could get a closed file descriptor. This
    also means that if you close the file descriptor, there is no way to remove the
    kernel object.
  id: totrans-255
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 根据条件，你可能会得到一个从Epoll关闭的文件描述符。这不是一个错误。这种情况发生的原因是epoll在内核对象级别工作，而不是在文件描述符级别。如果内核对象存活时间更长并且设置了正确的标志，进程可能会得到一个关闭的文件描述符。这也意味着如果你关闭文件描述符，就没有办法移除内核对象。
- en: Epoll has the flag which will remove a file descriptor after it has been returned
    in
  id: totrans-256
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Epoll有一个标志，在返回文件描述符后将其移除
- en: Epoll using level-triggered mode could starve certain file descriptors because
    it is unknown how much data the application will read from each descriptor.
  id: totrans-257
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用带级联模式的 Epoll 可能会饿死某些文件描述符，因为不知道应用程序将从每个描述符中读取多少数据。
- en: Read more at or check out a better version called in the appendix.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 更多信息请参阅或查看附录中提到的更好版本。
- en: Remote Procedure Calls
  id: totrans-259
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 远程过程调用
- en: RPC or Remote Procedure Call is the idea that we can execute a procedure on
    a different machine. In practice, the procedure may execute on the same machine.
    However, it may be in a different context. For example, the operation under a
    different user with different permissions and different lifecycles.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: RPC 或远程过程调用是我们可以在不同机器上执行过程的想法。在实践中，过程可能在同一台机器上执行。然而，它可能处于不同的上下文中。例如，在具有不同权限和不同生命周期的不同用户下执行操作。
- en: An example of this is you may send a remote procedure call to a docker daemon
    to change the state of the container. Not every application needs to have access
    to the entire system machine, but they should have access to containers that they’ve
    created.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，你可能可以向 docker 守护进程发送远程过程调用以更改容器的状态。并非每个应用程序都需要访问整个系统机器，但它们应该能够访问它们创建的容器。
- en: Privilege Separation
  id: totrans-262
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 权限分离
- en: The remote code will execute under a different user and with different privileges
    from the caller. In practice, the remote call may execute with more or fewer privileges
    than the caller. This in principle can be used to improve the security of a system
    by ensuring components operate with the least privilege. Unfortunately, security
    concerns need to be carefully assessed to ensure that RPC mechanisms cannot be
    subverted to perform unwanted actions. For example, an RPC implementation may
    implicitly trust any connected client to perform any action, rather than a subset
    of actions on a subset of the data.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 远程代码将在与调用者不同的用户和权限下执行。在实践中，远程调用可能具有比调用者更多或更少的权限。原则上，这可以通过确保组件以最低权限运行来提高系统的安全性。不幸的是，需要仔细评估安全顾虑，以确保
    RPC 机制不会被滥用以执行不希望的操作。例如，RPC 实现可能隐式信任任何连接的客户端执行任何操作，而不是数据子集上的操作子集。
- en: Stub Code and Marshaling
  id: totrans-264
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 存根代码和序列化
- en: The stub code is the necessary code to hide the complexity of performing a remote
    procedure call. One of the roles of the stub code is to *marshal* the necessary
    data into a format that can be sent as a byte stream to a remote server.
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 存根代码是隐藏执行远程过程调用复杂性的必要代码。存根代码的一个角色是将必要的数据*序列化*为可以发送到远程服务器的字节流格式。
- en: '[PRE47]'
  id: totrans-266
  prefs: []
  type: TYPE_PRE
  zh: '[PRE47]'
- en: Using a string format may be a little inefficient. A good example of this marshaling
    is Golang’s gRPC or Google RPC. There is a version in C as well if you want to
    check that out.
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 使用字符串格式可能有点低效。一个很好的例子是 Golang 的 gRPC 或 Google RPC。如果你想要检查 C 版本，也可以找到。
- en: The server stub code will receive the request, unmarshal the request into a
    valid in-memory data call the underlying implementation and send the result back
    to the caller. Often the underlying library will do this for you.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 服务器存根代码将接收请求，将请求反序列化为有效的内存数据调用底层实现，并将结果发送回调用者。通常，底层库会为你完成这项工作。
- en: To implement RPC you need to decide and document which conventions you will
    use to serialize the data into a byte sequence. Even a simple integer has several
    common choices.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 要实现 RPC，你需要决定并记录你将使用哪些约定将数据序列化为字节序列。即使是简单的整数也有几种常见的选择。
- en: Signed or unsigned?
  id: totrans-270
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 签名还是未签名？
- en: ASCII, Unicode Text Format 8, some other encoding?
  id: totrans-271
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: ASCII、Unicode 文本格式 8，或其他编码？
- en: Fixed number of bytes or variable depending on the magnitude.
  id: totrans-272
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 字节数是固定的还是根据大小可变的。
- en: Little or Big endian binary format if using binary?
  id: totrans-273
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果使用二进制，是小端还是大端格式？
- en: To marshal a struct, decide which fields need to be serialized. It may be unnecessary
    to send all data items. For example, some items may be irrelevant to the specific
    RPC or can be re-computed by the server from the other data items present.
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 要序列化结构体，决定哪些字段需要序列化。可能没有必要发送所有数据项。例如，某些项可能与特定的 RPC 无关，或者可以从其他数据项中重新计算。
- en: To marshal a linked list, it is unnecessary to send the link pointers, stream
    the values. As part of unmarshaling, the server can recreate a linked list structure
    from the byte sequence.
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 要序列化链表，没有必要发送链接指针，而是流式传输值。作为反序列化的一部分，服务器可以从字节序列中重新创建链表结构。
- en: By starting at the head node/vertex, a simple tree can be recursively visited
    to create a serialized version of the data. A cyclic graph will usually require
    additional memory to ensure that each edge and vertex is processed exactly once.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 从头节点/顶点开始，可以通过递归访问一个简单的树来创建数据的序列化版本。一个循环图通常需要额外的内存来确保每个边和顶点恰好被处理一次。
- en: Interface Description Language
  id: totrans-277
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 接口描述语言
- en: Writing stub code by hand is painful, tedious, error-prone, difficult to maintain
    and difficult to reverse engineer the wire protocol from the implemented code.
    A better approach is to specify the data objects, messages, and services to automatically
    generate the client and server code. A modern example of an Interface Description
    Language is Google’s Protocol Buffer .proto files.
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 手动编写存根代码既痛苦又乏味，容易出错，难以维护，并且难以从实现代码中逆向工程线协议。更好的方法是指定数据对象、消息和服务，以自动生成客户端和服务器代码。现代接口描述语言的例子是Google的.proto文件。
- en: Even then, Remote Procedure Calls are significantly slower (10x to 100x) and
    more complex than local calls. An RPC must marshal data into a wire-compatible
    format. This may require multiple passes through the data structure, temporary
    memory allocation, and transformation of the data representation.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 即使如此，远程过程调用（RPC）与本地调用相比，速度显著较慢（10倍到100倍），并且更复杂。RPC必须将数据序列化为线兼容的格式。这可能需要多次通过数据结构，临时内存分配以及数据表示的转换。
- en: Robust RPC stub code must intelligently handle network failures and versioning.
    For example, a server may have to process requests from clients that are still
    running an early version of the stub code.
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 强健的RPC存根代码必须智能地处理网络故障和版本问题。例如，服务器可能需要处理仍在运行早期版本存根代码的客户端请求。
- en: A secure RPC will need to implement additional security checks including authentication
    and authorization, validate data and encrypt communication between the client
    and host. A lot of the time, the RPC system can do this efficiently for you. Consider
    if you have both an RPC client and server on the same machine. Starting up a thrift
    or Google RPC server could validate and route the request to a local socket which
    wouldn’t be sent over the network.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 一个安全的RPC需要实现额外的安全检查，包括身份验证和授权，验证数据并加密客户端和主机之间的通信。很多时候，RPC系统可以为你高效地完成这些工作。考虑一下，如果你在同一台机器上既有RPC客户端又有服务器。启动一个thrift或Google
    RPC服务器可以验证并将请求路由到本地套接字，该套接字不会通过网络发送。
- en: Transferring Structured Data
  id: totrans-282
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 转移结构化数据
- en: Let’s examine three methods of transferring data using 3 different formats -
    JSON, XML, and Google Protocol Buffers. JSON and XML are text-based protocols.
    Examples of JSON and XML messages are below.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考察三种使用三种不同格式（JSON、XML和Google Protocol Buffers）传输数据的方法。JSON和XML是基于文本的协议。以下是一些JSON和XML消息的示例。
- en: '[PRE48]'
  id: totrans-284
  prefs: []
  type: TYPE_PRE
  zh: '[PRE48]'
- en: '[PRE49]'
  id: totrans-285
  prefs: []
  type: TYPE_PRE
  zh: '[PRE49]'
- en: Google Protocol Buffers is an open-source efficient binary protocol that places
    a strong emphasis on high throughput with low CPU overhead and minimal memory
    copying. This means client and server stub code in multiple languages can be generated
    from the .proto specification file to marshal data to and from a binary stream.
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: Google Protocol Buffers是一个开源的高效二进制协议，它强调高吞吐量，同时具有低CPU开销和最小内存复制。这意味着可以从.proto规范文件生成多种语言的客户端和服务器存根代码，以将数据序列化到和从二进制流中。
- en: '[Google Protocol Buffers](https://developers.google.com/protocol-buffers/docs/overview)
    reduces the versioning problem by ignoring unknown fields that are present in
    a message. See the introduction to Protocol Buffers for more information.'
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: '[Google Protocol Buffers](https://developers.google.com/protocol-buffers/docs/overview)通过忽略消息中存在的未知字段来减少版本问题。有关Protocol
    Buffers的更多信息，请参阅其介绍。'
- en: The general chain is to abstract away the actual business logic and the various
    marshaling code. If your application ever becomes CPU bound parsing XML, JSON
    or YAML, switch to protocol buffers!
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 通常的链路是抽象出实际的业务逻辑和各种序列化代码。如果你的应用程序在解析XML、JSON或YAML时成为CPU密集型，切换到协议缓冲区！
