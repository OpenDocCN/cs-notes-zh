- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: One can specify IPv4 or IPv6 with . Just replace the ai_family attribute in
    the above code with the following.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: 'If you are wondering how the computer maps hostnames to addresses, we will
    talk about that in Layer 7\. Spoiler: It is a service called DNS. Before we move
    onto the next section, it is important to note that a single website can have
    multiple IP addresses. This may be to be efficient with machines. If Google or
    Facebook has a single server routing *all* of their incoming requests to other
    computers, they’d have to spend massive amounts of money on that computer or data
    center. Instead, they can give different regions different IP addresses and have
    a computer pick. It isn’t bad to access a website through the non-preferred IP
    address. The page may load slower.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Layer 4: TCP and Client'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![Extra: TCP Header Specification](../media/file42.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Extra: TCP Header Specification'
  prefs: []
  type: TYPE_NORMAL
- en: Most services on the Internet today use TCP because it efficiently hides the
    complexity of the lower, packet-level nature of the Internet. TCP or Transport
    Control Protocol is a connection-based protocol that is built on top of IPv4 and
    IPv6 and therefore can be described as “TCP/IP” or “TCP over IP”. TCP creates
    a *pipe* between two machines and abstracts away the low-level packet-nature of
    the Internet. Thus, under most conditions, bytes sent over a TCP connection delivered
    and uncorrupted. High performance and error-prone code won’t even assume that!
  prefs: []
  type: TYPE_NORMAL
- en: TCP has many features that set it apart from the other transport protocol UDP.
  prefs: []
  type: TYPE_NORMAL
- en: Ports With IP, you are only allowed to send packets to a machine. If you want
    one machine to handle multiple flows of data, you have to do it manually with
    IP. TCP gives the programmer a set of virtual sockets. Clients specify the socket
    that you want the packet sent to and the TCP protocol makes sure that applications
    that are waiting for packets on that port receive that. A process can listen for
    incoming packets on a particular port. However, only processes with super-user
    (root) access can listen on ports less than 1024\. Any process can listen on ports
    1024 or higher. A frequently used port is number 80\. It is used for unencrypted
    HTTP requests or web pages. For example, if a web browser connects to then it
    will be connecting to port 80.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Retransmission Packets can get dropped due to network errors or congestion.
    As such, they need to be retransmitted. At the same time, the retransmission shouldn’t
    cause packets more packets to be dropped. This needs to balance the tradeoff between
    flooding the network and speed.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Out of order packets. Packets may get routed more favorably due to various reasons
    in IP. If a later packet arrives before another packet, the protocol should detect
    and reorder them.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Duplicate packets. Packets can arrive twice. Packets can arrive twice. As such,
    a protocol needs to be able to differentiate between two packets given a sequence
    number subject to overflow.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Error correction. There is a TCP checksum that handles bit errors. This is rarely
    used though.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Flow Control. Flow control is performed on the receiver side. This may be done
    so that a slow receiver doesn’t get overwhelmed with packets. Servers that handle
    10000 or 10 million concurrent connections may need to tell receivers to slow
    down but remain connected due to load. There is also the problem of making sure
    the local network’s traffic is stable.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Congestion control. Congestion control is performed on the sender’s side. Congestion
    control is to avoid a sender from flooding the network with too many packets.
    This is important to make sure that each TCP connection is treated fairly. Meaning
    that two connections leaving a computer to google and youtube receive the same
    bandwidth and ping as each other. One can easily define a protocol that takes
    all the bandwidth and leaves other protocols in the dust, but this tends to be
    malicious because many times limiting a computer to a single TCP connection will
    yield the same result.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Connection-Oriented/life cycle oriented. You can imagine a TCP connection as
    a series of bytes sent through a pipe. There is a “lifecycle” to a TCP connection
    though. TCP handles setting up the connection through SYN SYN-ACK ACK. This means
    the client will send a SYNchronization packet that tells TCP what starting sequence
    to start on. Then the receiver will send a SYN-ACK message acknowledging the synchronization
    number. Then the client will ACKnowledge that with one last packet. The connection
    is now open for both reading and writing on both ends TCP will send data and the
    receiver of the data will acknowledge that it received a packet. Then every so
    often if a packet is not sent, TCP will trade zero-length packets to make sure
    the connection is still alive. At any point, the client and server can send a
    FIN packet meaning that the server will not transmit. This packet can be altered
    with bits that only close the read or write end of a particular connection. When
    all ends are closed then the connection is over.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: TCP doesn’t provide many things, though.
  prefs: []
  type: TYPE_NORMAL
- en: Security. Connecting to an IP address claiming to be a certain website does
    not verify the claim (like in TLS). You could be sending packets to a malicious
    computer.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Encryption. Anybody can listen in on plain TCP. The packets in transport are
    in plain text. Important things like your passwords could easily be skimmed by
    onlookers.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Session Reconnection. If a TCP connection dies then a whole new one must be
    created, and the transmission has to be started over again. This is handled by
    a higher protocol.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Delimiting Requests. TCP is naturally connection-oriented. Applications that
    are communicating over TCP need to find a unique way of telling each other that
    this request or response is over. HTTP delimits the header through two carriage
    returns and uses either a length field or one keeps listening until the connection
    closes
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Note on network orders
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Integers can be represented in the least significant byte first or most significant
    byte first. Either approach is reasonable as long as the machine itself is internally
    consistent. For network communications, we need to standardize on the agreed format.
  prefs: []
  type: TYPE_NORMAL
- en: returns the 16-bit unsigned integer ‘short’ value xyz in network byte order.
    returns the 32-bit unsigned integer ‘long’ value xyz in network byte order. Any
    longer integers need to have the computers specify the order.
  prefs: []
  type: TYPE_NORMAL
- en: These functions are read as ‘host to network’. The inverse functions (, ) convert
    network ordered byte values to host-ordered ordering. So, is host-ordering little-endian
    or big-endian? The answer is - it depends on your machine! It depends on the actual
    architecture of the host running the code. If the architecture happens to be the
    same as network ordering then the functions return identical integers. For x86
    machines, the host and network order are different.
  prefs: []
  type: TYPE_NORMAL
- en: Unless agreed otherwise, whenever you read or write the low-level C network
    structures, i.e. port and address information, remember to use the above functions
    to ensure correct conversion to/from a machine format. Otherwise, the displayed
    or specified value may be incorrect.
  prefs: []
  type: TYPE_NORMAL
- en: This doesn’t apply to protocols that negotiate the endianness before-hand. If
    two computers are CPU bound by converting the messages between network orders
    – this happens with RPCs in high-performance systems – it may be worth it to negotiate
    if they are on similar endianness to send in little-endian order.
  prefs: []
  type: TYPE_NORMAL
- en: Why is network order defined to be big-endian? The simple answer is that RFC1700
    says so (Reynolds and Postel [1994](ch018.xhtml#ref-RFC1700)). If you want more
    information, we’ll cite the famous article located that argued for a particular
    version (Cohen [1980](ch018.xhtml#ref-cohen_1980)). The most important part is
    that it is standard. What happens when we don’t have one standard? We have 4 different
    USB plug types (Regular, Micro, Mini, and USB-C) that don’t interact well with
    each other. Include relevant XKCD here [Standards](https://xkcd.com/927/).
  prefs: []
  type: TYPE_NORMAL
