- en: What is IPv4? IPv6? What are the differences between them?
  id: totrans-302
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 什么是IPv4？什么是IPv6？它们之间有什么区别？
- en: What is the TCP? The UDP? Give me the advantages and disadvantages of both of
    them. What is a scenario of using one over the other?
  id: totrans-303
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 什么是TCP？什么是UDP？请给出两者的优缺点。在什么情况下使用其中一个而不是另一个？
- en: Which protocol is connectionless and which one is connection based?
  id: totrans-304
