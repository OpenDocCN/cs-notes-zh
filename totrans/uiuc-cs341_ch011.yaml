  zh: 最后一段代码是发送请求的驱动代码。如果您想方便地使用以下代码将文件描述符作为文件对象打开，请随意使用。但请注意，不要忘记将缓冲区设置为零，否则您可能会双重缓冲输入，这会导致性能问题。
- en: '[PRE13]'
  id: totrans-95
