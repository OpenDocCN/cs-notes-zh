- en: Networking
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 网络
- en: Networking has become arguably the most important use of computers in the past
    10-20 years. Most of us nowadays can’t stand a place without WiFi or any connectivity,
    so it is crucial as programmers that you have an understanding of networking and
    how to program to communicate across networks. Although it may sound complicated,
    POSIX has defined nice standards that make connecting to the outside world easy.
    POSIX also lets you peer underneath the hood and optimize all the little parts
    of each connection to write highly performant programs.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去10-20年中，网络已经成为计算机最重要的用途之一。如今，我们大多数人无法忍受没有WiFi或任何连接的地方，因此作为程序员，了解网络和如何在网络上进行编程通信至关重要。尽管这可能听起来很复杂，但POSIX已经定义了很好的标准，使得连接到外部世界变得容易。POSIX还允许你深入了解底层，并优化每个连接的各个小部分，以编写高性能的程序。
- en: As an addendum that you’ll read more about in the next chapter, we will be strict
    in our notation for sizes. That means that when we refer to the SI prefixes of
    Kilo-, Mega-, etc, then we are always referring to a power of 10\. A kilobyte
    is one thousand bytes, a megabyte is a thousand kilobytes and so on. If we need
    to refer to bytes, we will use the more accurate term Kibibyte. Mibibyte and Gibibyte
    are the analogs of Megabyte and Gigabyte respectively. We make this distinction
    to make sure that we aren’t off by 24\. The reasons for this misnomer will be
    explained in the filesystems chapter.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 作为下一章中你将了解更多内容的补充，我们将对尺寸的表示法进行严格规定。这意味着当我们提到千（Kilo-）、兆（Mega-）等国际单位制（SI）前缀时，我们始终指的是10的幂。一个千字节等于一千字节，一个兆字节等于一千千字节，依此类推。如果我们需要提到字节，我们将使用更准确的术语Kibibyte。Mibibyte和Gibibyte分别是Megabyte和Gigabyte的类似物。我们做出这种区分是为了确保我们不会差24。这种误称的原因将在文件系统章节中解释。
- en: The OSI Model
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: OSI模型
- en: The Open Source Interconnection 7 layer model (OSI Model) is a sequence of segments
    that define standards for both infrastructure and protocols for forms of radio
    communication, in our case the Internet. The 7 layer model is as follows
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 开源互连7层模型（OSI模型）是一系列定义了基础设施和协议标准的段，用于无线电通信的形式，在我们的案例中是互联网。7层模型如下
- en: 'Layer 1: The Physical Layer. These are the actual waves that carry the bauds
    across the wire. As an aside, bits don’t cross the wire because in most mediums
    you can alter two characteristics of a wave – the amplitude and the frequency
    – and get more bits per clock cycle.'
  id: totrans-5
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 第1层：物理层。这些是实际携带波特率穿越导线的波形。顺便说一句，比特不会穿越导线，因为在大多数介质中，你可以改变一个波形的两个特性——振幅和频率——并在每个时钟周期中传输更多的比特。
- en: 'Layer 2: The Link Layer. This is how each of the agents reacts to certain events
    (error detection, noisy channels, etc). This is where Ethernet and WiFi live.'
  id: totrans-6
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 第2层：链路层。这是每个代理对某些事件（错误检测、嘈杂的信道等）的反应方式。这是以太网和WiFi所在的地方。
- en: 'Layer 3: The Network Layer. This is the heart of the Internet. The bottom two
    protocols deal with communication between two different computers that are directly
    connected. This layer deals with routing packets from one endpoint to another.'
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 第3层：网络层。这是互联网的核心。底下的两个协议处理直接连接的两个不同计算机之间的通信。这一层负责将数据包从一端路由到另一端。
- en: 'Layer 4: The Transport Layer. This layer specifies how the slices of data are
    received. The bottom three layers make no guarantee about the order that packets
    are received and what happens when a packet is dropped. Using different protocols,
    this layer can.'
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 第4层：传输层。这一层指定了数据切片的接收方式。底下的三层不保证数据包接收的顺序，也不保证数据包丢失时会发生什么。通过使用不同的协议，这一层可以做到。
- en: 'Layer 5: The Session Layer. This layer makes sure that if a connection in the
    previous layers is dropped, a new connection in the lower layers can be established,
    and it looks like nothing happened to the end-user.'
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 第5层：会话层。这一层确保如果上一层的连接丢失，下一层可以建立新的连接，并且对最终用户来说，看起来就像什么都没发生一样。
- en: 'Layer 6: The Presentation Layer. This layer deals with encryption, compression,
    and data translation. For example, portability between different operating systems
    like translating newlines to windows newlines.'
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 第6层：表示层。这一层处理加密、压缩和数据转换。例如，在不同操作系统之间的可移植性，如将换行符转换为Windows换行符。
- en: 'Layer 7: The Application Layer. HTTP and FTP are both defined at this level.
    This is typically where we define protocols across the Internet. As programmers,
    we only go lower when we think we can create algorithms that are more suited to
    our needs than all of the below.'
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 第7层：应用层。HTTP和FTP都定义在这一层。这通常是我们在整个互联网上定义协议的地方。作为程序员，我们只有在认为可以创建比下面所有层次都更适合我们需求的算法时，才会向下层移动。
- en: This book won’t cover networking in depth. We will focus on some aspects of
    layers 3, 4, and 7 because they are essential to know if you are going to be doing
    something with the Internet, which at some point in your career you will be. As
    for another definition, a protocol is a set of specifications put forward by the
    Internet Engineering Task Force that govern how implementers of a protocol have
    their program or circuit behave under specific circumstances.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 这本书不会深入探讨网络技术。我们将重点关注第3层、第4层和第7层的一些方面，因为这些对于你打算与互联网打交道的人来说是至关重要的，在职业生涯的某个阶段你肯定会这样做。至于另一个定义，协议是一套由互联网工程任务组提出的规范，它规定了协议实现者如何在特定情况下使他们的程序或电路行为。
- en: 'Layer 3: The Internet Protocol'
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第3层：互联网协议
- en: The following is a short introduction to internet protocol (IP), the primary
    way to send datagrams of information from one machine to another. “IP4”, or more
    precisely, IPv4 is version 4 of the Internet Protocol that describes how to send
    packets of information across a network from one machine to another. Even as of
    2018, IPv4 still dominates Internet traffic, but google reports that 24 countries
    now supply 15% of their traffic through IPv6 (“State of Ipv6 Deployment 2018”
    [2018](ch018.xhtml#ref-internet_society_2018)). A significant limitation of IPv4
    is that source and destination addresses are limited to 32 bits. IPv4 was designed
    at a time when the idea of 4 billion devices connected to the same network was
    unthinkable or at least not worth making the packet size larger. IPv4 addresses
    are written typically in a sequence of four octets delimited by periods "255.255.255.0"
    for example.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是对互联网协议（IP）的简要介绍，这是将信息数据报从一台机器发送到另一台机器的主要方式。“IP4”，或者更确切地说，IPv4是互联网协议的第4版本，它描述了如何在网络中从一个机器发送信息数据包到另一个机器。即使到了2018年，IPv4仍然主导着互联网流量，但谷歌报告称，现在有24个国家通过IPv6提供了他们15%的流量（“2018年IPv6部署状态”
    [2018](ch018.xhtml#ref-internet_society_2018)）。IPv4的一个显著限制是源地址和目的地址限制在32位。IPv4是在一个认为有40亿台设备连接到同一网络的想法是不可想象或至少不值得增加数据包大小的时代设计的。IPv4地址通常以四个八位字节序列的形式书写，由点分隔，例如“255.255.255.0”。
- en: 'Each IPv4 datagram includes a small header - typically 20 octets, that includes
    a source and destination address. Conceptually the source and destination addresses
    can be split into two: a network number the upper bits and lower bits represent
    a particular host number on that network.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 每个IPv4数据报都包含一个小的头部——通常是20个八位字节，它包括源地址和目的地址。从概念上讲，源地址和目的地址可以分为两部分：网络号，高位的位和低位位代表该网络上的特定主机号。
- en: A newer packet protocol IPv6 solves many of the limitations of IPv4 like making
    routing tables simpler and 128-bit addresses. However, little web traffic is IPv6
    based on comparison as of 2018 (“State of Ipv6 Deployment 2018” [2018](ch018.xhtml#ref-internet_society_2018))
    We write IPv6 addresses in a sequence of eight, four hexadecimal delimiters like
    "1F45:0000:0000:0000:0000:0000:0000:0000". Since that can get unruly, we can omit
    the zeros "1F45::". A machine can have an IPv6 address and an IPv4 address.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 一个较新的数据包协议IPv6解决了IPv4的许多限制，如使路由表更简单和128位地址。然而，根据2018年的比较，很少有网络流量是基于IPv6的（“2018年IPv6部署状态”
    [2018](ch018.xhtml#ref-internet_society_2018)）。我们以八个四进制分隔符的序列书写IPv6地址，例如“1F45:0000:0000:0000:0000:0000:0000:0000”。由于这可能会变得难以管理，我们可以省略零“1F45::”。一台机器可以有一个IPv6地址和一个IPv4地址。
- en: There are special IP Addresses. One such in IPv4 is , IPv6 as or also known
    as localhost. Packets sent to 127.0.0.1 will never leave the machine; the address
    is specified to be the same machine. There are a lot of others that are denoted
    by certain octets being zeros or 255, the maximum value. You won’t need to know
    all the terminology, keep in mind that the actual number of IP addresses that
    a machine can have globally over the Internet is smaller than the number of “raw”
    addresses. This book covers how IP deals with routing, fragmenting, and reassembling
    upper-level protocols. A more in-depth aside follows.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 存在一些特殊的IP地址。IPv4中的一个例子是，IPv6作为或也称为localhost。发送到127.0.0.1的数据包永远不会离开该机器；该地址指定为同一台机器。还有很多其他地址，由某些八位字节为零或255（最大值）表示。您不需要知道所有术语，请记住，一台机器在全球互联网上可以拥有的实际IP地址数量小于“原始”地址的数量。本书涵盖了IP如何处理路由、分片和重新组装上层协议。以下是一个更深入的说明。
- en: What’s the deal with IPv6?
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: IPv6是怎么回事？
- en: '![IPv6 Datagram divisibility](../media/file41.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![IPv6数据包可分性](../media/file41.png)'
- en: IPv6 Datagram divisibility
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: IPv6数据包可分性
- en: One of the big features of IPv6 is the address space. The world ran out of IP
    addresses a while ago and has been using hacks to get around that. With IPv6 there
    are enough internal and external addresses so even if we discover alien civilizations,
    we probably won’t run out. The other benefit is that these addresses are leased
    not bought, meaning that if something drastic happens in let’s say the Internet
    of things and there needs to be a change in the block addressing scheme, it can
    be done.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: IPv6的一个大特性是地址空间。世界在很久以前就耗尽了IP地址，并一直在使用黑客手段来解决这个问题。有了IPv6，就有足够的内部和外部地址，即使我们发现外星文明，我们可能也不会耗尽。另一个好处是，这些地址是租用的而不是购买的，这意味着如果互联网物联网发生重大事件，需要更改块地址方案，这是可以做到的。
- en: Another big feature is security through IPsec. IPv4 was designed with little
    to no security in mind. As such, now there is a key exchange similar to TLS in
    higher layers that allows you to encrypt communication.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个重要特性是通过IPsec实现的安全性。IPv4在设计时几乎没有考虑安全性。因此，现在在高层有类似于TLS的关键交换，允许您加密通信。
- en: Another feature is simplified processing. To make the Internet fast, IPv4 and
    IPv6 headers are verified in hardware. That means that all header options are
    processed in circuits as they come in. The problem is that as the IPv4 spec grew
    to include a copious amount of headers, the hardware had to become more and more
    advanced to support those headers. IPv6 reorders the headers so that packets can
    be dropped and routed with fewer hardware cycles. In the case of the Internet,
    every cycle matters when trying to route the world’s traffic.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个特性是简化处理。为了使互联网更快，IPv4和IPv6头部在硬件中进行了验证。这意味着所有头部选项都按顺序在电路中处理。问题是，随着IPv4规范的增长，包括大量头部，硬件不得不变得越来越先进以支持这些头部。IPv6重新排序头部，以便在更少的硬件周期内丢弃和路由数据包。在互联网的情况下，每个周期在尝试路由全球流量时都很重要。
- en: What’s My Address?
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 我的地址是什么？
- en: To obtain a linked list of IP addresses of the current machine use which will
    return a linked list of IPv4 and IPv6 IP addresses among other interfaces as well.
    We can examine each entry and use to print the host’s IP address. The struct includes
    the family but does not include the sizeof the struct. Therefore we need to manually
    determine the struct sized based on the family.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 要获取当前机器的IP地址链表，请使用，它将返回包括其他接口在内的IPv4和IPv6 IP地址链表。我们可以检查每个条目并使用来打印主机的IP地址。该结构包括家族，但不包括结构的sizeof。因此，我们需要根据家族手动确定结构的大小。
