  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 可以使用.指定IPv4或IPv6。只需在上面的代码中将ai_family属性替换为以下内容。
- en: '[PRE6]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'If you are wondering how the computer maps hostnames to addresses, we will
    talk about that in Layer 7\. Spoiler: It is a service called DNS. Before we move
    onto the next section, it is important to note that a single website can have
    multiple IP addresses. This may be to be efficient with machines. If Google or
    Facebook has a single server routing *all* of their incoming requests to other
    computers, they’d have to spend massive amounts of money on that computer or data
    center. Instead, they can give different regions different IP addresses and have
    a computer pick. It isn’t bad to access a website through the non-preferred IP
    address. The page may load slower.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你在想计算机是如何将主机名映射到地址的，我们将在第7层讨论这个问题。剧透一下：这是一个名为DNS的服务。在我们进入下一节之前，重要的是要注意一个网站可以有多个IP地址。这可能是为了提高机器的效率。如果谷歌或Facebook只有一个服务器将它们的所有入站请求路由到其他计算机，他们可能不得不在那个计算机或数据中心上花费巨额资金。相反，他们可以为不同的地区分配不同的IP地址，并让计算机选择。通过非首选IP地址访问网站并不糟糕。页面可能会加载得更慢。
- en: 'Layer 4: TCP and Client'
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第4层：TCP和客户端
- en: '![Extra: TCP Header Specification](../media/file42.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![额外：TCP头部规范](../media/file42.png)'
- en: 'Extra: TCP Header Specification'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 额外：TCP头部规范
- en: Most services on the Internet today use TCP because it efficiently hides the
    complexity of the lower, packet-level nature of the Internet. TCP or Transport
    Control Protocol is a connection-based protocol that is built on top of IPv4 and
    IPv6 and therefore can be described as “TCP/IP” or “TCP over IP”. TCP creates
    a *pipe* between two machines and abstracts away the low-level packet-nature of
    the Internet. Thus, under most conditions, bytes sent over a TCP connection delivered
    and uncorrupted. High performance and error-prone code won’t even assume that!
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 今天的互联网上大多数服务都使用TCP，因为它有效地隐藏了互联网底层、数据包级别的复杂性。TCP或传输控制协议是一个基于连接的协议，它建立在IPv4和IPv6之上，因此可以描述为“TCP/IP”或“IP上的TCP”。TCP在两台机器之间创建了一个*管道*，并抽象化了互联网的低级数据包特性。因此，在大多数情况下，通过TCP连接发送的字节被成功交付且未损坏。高性能和易出错的代码甚至不会假设这一点！
- en: TCP has many features that set it apart from the other transport protocol UDP.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: TCP有许多特性使其与其他传输协议UDP区分开来。
- en: Ports With IP, you are only allowed to send packets to a machine. If you want
    one machine to handle multiple flows of data, you have to do it manually with
    IP. TCP gives the programmer a set of virtual sockets. Clients specify the socket
    that you want the packet sent to and the TCP protocol makes sure that applications
    that are waiting for packets on that port receive that. A process can listen for
    incoming packets on a particular port. However, only processes with super-user
    (root) access can listen on ports less than 1024\. Any process can listen on ports
    1024 or higher. A frequently used port is number 80\. It is used for unencrypted
    HTTP requests or web pages. For example, if a web browser connects to then it
    will be connecting to port 80.
  id: totrans-46
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 端口与IP地址一起，你只能向一台机器发送数据包。如果你想一台机器处理多个数据流，你必须手动使用IP地址来做。TCP给程序员提供了一套虚拟套接字。客户端指定要发送数据包的套接字，TCP协议确保等待在该端口上接收数据包的应用程序收到数据。一个进程可以在特定端口上监听传入的数据包。然而，只有具有超级用户（root）访问权限的进程才能监听小于1024的端口。任何进程都可以监听1024或更高的端口。一个常用的端口是80号。它用于未加密的HTTP请求或网页。例如，如果网页浏览器连接到，它将连接到80端口。
- en: Retransmission Packets can get dropped due to network errors or congestion.
    As such, they need to be retransmitted. At the same time, the retransmission shouldn’t
    cause packets more packets to be dropped. This needs to balance the tradeoff between
    flooding the network and speed.
  id: totrans-47
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重传数据包可能会因为网络错误或拥塞而丢失。因此，它们需要被重新传输。同时，重传不应该导致更多数据包丢失。这需要在网络拥塞和速度之间进行权衡。
- en: Out of order packets. Packets may get routed more favorably due to various reasons
    in IP. If a later packet arrives before another packet, the protocol should detect
    and reorder them.
  id: totrans-48
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 乱序数据包。由于IP中的各种原因，数据包可能会被更优地路由。如果一个数据包在另一个数据包之前到达，协议应该检测并重新排序它们。
- en: Duplicate packets. Packets can arrive twice. Packets can arrive twice. As such,
    a protocol needs to be able to differentiate between two packets given a sequence
    number subject to overflow.
  id: totrans-49
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重复数据包。数据包可能会到达两次。因此，协议需要能够区分在溢出条件下具有序列号的两个数据包。
- en: Error correction. There is a TCP checksum that handles bit errors. This is rarely
    used though.
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 错误纠正。TCP有一个校验和来处理位错误。但这很少被使用。
- en: Flow Control. Flow control is performed on the receiver side. This may be done
    so that a slow receiver doesn’t get overwhelmed with packets. Servers that handle
    10000 or 10 million concurrent connections may need to tell receivers to slow
    down but remain connected due to load. There is also the problem of making sure
    the local network’s traffic is stable.
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 流量控制。流量控制是在接收方执行的。这可能是为了防止一个慢速接收方被数据包淹没。处理10000或1000万个并发连接的服务器可能需要告诉接收方减速，但保持连接，因为负载。还有确保本地网络流量稳定的问题。
- en: Congestion control. Congestion control is performed on the sender’s side. Congestion
    control is to avoid a sender from flooding the network with too many packets.
    This is important to make sure that each TCP connection is treated fairly. Meaning
    that two connections leaving a computer to google and youtube receive the same
    bandwidth and ping as each other. One can easily define a protocol that takes
    all the bandwidth and leaves other protocols in the dust, but this tends to be
    malicious because many times limiting a computer to a single TCP connection will
    yield the same result.
  id: totrans-52
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 阻塞控制。阻塞控制是在发送方执行的。阻塞控制是为了防止发送方将太多数据包发送到网络中。这很重要，以确保每个TCP连接都得到公平对待。这意味着离开计算机连接到谷歌和YouTube的两个连接将获得相同的带宽和ping。可以很容易地定义一个协议，它将占用所有带宽，而将其他协议抛在后面，但这往往是有害的，因为很多时候将计算机限制为单个TCP连接会产生相同的结果。
- en: Connection-Oriented/life cycle oriented. You can imagine a TCP connection as
    a series of bytes sent through a pipe. There is a “lifecycle” to a TCP connection
    though. TCP handles setting up the connection through SYN SYN-ACK ACK. This means
    the client will send a SYNchronization packet that tells TCP what starting sequence
    to start on. Then the receiver will send a SYN-ACK message acknowledging the synchronization
    number. Then the client will ACKnowledge that with one last packet. The connection
    is now open for both reading and writing on both ends TCP will send data and the
    receiver of the data will acknowledge that it received a packet. Then every so
    often if a packet is not sent, TCP will trade zero-length packets to make sure
    the connection is still alive. At any point, the client and server can send a
    FIN packet meaning that the server will not transmit. This packet can be altered
    with bits that only close the read or write end of a particular connection. When
    all ends are closed then the connection is over.
  id: totrans-53
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 面向连接/生命周期导向。你可以想象TCP连接是一系列通过管道发送的字节。尽管TCP连接有一个“生命周期”。TCP通过SYN SYN-ACK ACK来处理建立连接。这意味着客户端将发送一个同步包，告诉TCP从哪个起始序列号开始。然后接收方将发送一个确认同步号的SYN-ACK消息。然后客户端将通过最后一个数据包确认这一点。现在连接两端都可以进行读写。TCP将发送数据，接收数据的一方将确认已收到数据包。如果一段时间内没有发送数据包，TCP将通过交换零长度数据包来确保连接仍然活跃。在任何时候，客户端和服务器都可以发送一个FIN包，这意味着服务器将不会传输。这个包可以通过位来修改，只关闭特定连接的读或写端。当所有端点都关闭时，连接结束。
- en: TCP doesn’t provide many things, though.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: TCP虽然不提供很多功能。
- en: Security. Connecting to an IP address claiming to be a certain website does
    not verify the claim (like in TLS). You could be sending packets to a malicious
    computer.
  id: totrans-55
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 安全性。连接到一个声称是特定网站的IP地址并不验证该声明（如TLS）。你可能会向恶意计算机发送数据包。
- en: Encryption. Anybody can listen in on plain TCP. The packets in transport are
    in plain text. Important things like your passwords could easily be skimmed by
    onlookers.
  id: totrans-56
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 加密。任何人都可以监听明文TCP。传输中的数据包是明文。像密码这样重要的事情很容易被旁观者窃取。
- en: Session Reconnection. If a TCP connection dies then a whole new one must be
    created, and the transmission has to be started over again. This is handled by
    a higher protocol.
  id: totrans-57
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 会话重连。如果TCP连接中断，则必须创建一个新的整个连接，并且传输必须从头开始。这是由一个更高层次的协议处理的。
- en: Delimiting Requests. TCP is naturally connection-oriented. Applications that
    are communicating over TCP need to find a unique way of telling each other that
    this request or response is over. HTTP delimits the header through two carriage
    returns and uses either a length field or one keeps listening until the connection
    closes
  id: totrans-58
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 请求的分隔。TCP是自然面向连接的。在TCP上通信的应用程序需要找到一种独特的方式来告诉对方这个请求或响应已经结束。HTTP通过两个回车符分隔标题，并使用长度字段或一直监听直到连接关闭。
- en: Note on network orders
  id: totrans-59
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 关于网络顺序的说明
- en: Integers can be represented in the least significant byte first or most significant
    byte first. Either approach is reasonable as long as the machine itself is internally
    consistent. For network communications, we need to standardize on the agreed format.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 整数可以以最低有效字节优先或最高有效字节优先的方式表示。只要机器本身在内部是一致的，这两种方法都是合理的。对于网络通信，我们需要在约定的格式上达成一致。
- en: returns the 16-bit unsigned integer ‘short’ value xyz in network byte order.
    returns the 32-bit unsigned integer ‘long’ value xyz in network byte order. Any
    longer integers need to have the computers specify the order.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 返回网络字节顺序的16位无符号整数‘short’值xyz。返回网络字节顺序的32位无符号整数‘long’值xyz。任何更长的整数都需要计算机指定顺序。
- en: These functions are read as ‘host to network’. The inverse functions (, ) convert
    network ordered byte values to host-ordered ordering. So, is host-ordering little-endian
    or big-endian? The answer is - it depends on your machine! It depends on the actual
    architecture of the host running the code. If the architecture happens to be the
    same as network ordering then the functions return identical integers. For x86
    machines, the host and network order are different.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 这些函数被读取为“主机到网络”。逆函数（, ）将网络顺序的字节值转换为主机顺序。那么，主机顺序是小端序还是大端序？答案是——这取决于你的机器！它取决于运行代码的主机的实际架构。如果架构碰巧与网络顺序相同，则函数返回相同的整数。对于x86机器，主机和网络顺序是不同的。
- en: Unless agreed otherwise, whenever you read or write the low-level C network
    structures, i.e. port and address information, remember to use the above functions
    to ensure correct conversion to/from a machine format. Otherwise, the displayed
    or specified value may be incorrect.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 除非另有约定，每次读取或写入低级C网络结构，即端口号和地址信息时，请记住使用上述函数以确保正确转换为/从机器格式。否则，显示或指定的值可能是不正确的。
- en: This doesn’t apply to protocols that negotiate the endianness before-hand. If
    two computers are CPU bound by converting the messages between network orders
    – this happens with RPCs in high-performance systems – it may be worth it to negotiate
    if they are on similar endianness to send in little-endian order.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 这一点不适用于在事先协商字节序的协议。如果两台计算机在转换网络顺序的消息时受到CPU的限制——这在高性能系统中的RPC中很常见——那么如果它们具有相似的端序，协商以发送小端序可能是有价值的。
- en: Why is network order defined to be big-endian? The simple answer is that RFC1700
    says so (Reynolds and Postel [1994](ch018.xhtml#ref-RFC1700)). If you want more
    information, we’ll cite the famous article located that argued for a particular
    version (Cohen [1980](ch018.xhtml#ref-cohen_1980)). The most important part is
    that it is standard. What happens when we don’t have one standard? We have 4 different
    USB plug types (Regular, Micro, Mini, and USB-C) that don’t interact well with
    each other. Include relevant XKCD here [Standards](https://xkcd.com/927/).
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么网络顺序被定义为大端序？简单的答案是RFC1700这样规定（Reynolds和Postel [1994](ch018.xhtml#ref-RFC1700))。如果你想了解更多信息，我们将引用那篇著名的文章，该文章为特定版本进行了辩护（Cohen
    [1980](ch018.xhtml#ref-cohen_1980))。最重要的是，它是标准的。当我们没有标准时会发生什么？我们有4种不同的USB插头类型（常规、Micro、Mini和USB-C），它们之间相互作用不佳。在此处包含相关的XKCD
    [标准](https://xkcd.com/927/)。
- en: TCP Client
  id: totrans-66
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: TCP客户端
- en: There are three basic system calls to connect to a remote machine.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 有三个基本的系统调用用于连接到远程机器。
- en: The call if successful, creates a linked-list of structs and sets the given
    pointer to point to the first one.
  id: totrans-68
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果调用成功，它将创建一个结构体的链表，并将给定的指针设置为指向第一个。
- en: Also, you can use the hints struct to only grab certain entries like certain
    IP protocols, etc. The addrinfo structure that is passed into to define the kind
    of connection you’d like. For example, to specify stream-based protocols over
    IPv6, you can use the following snippet.
  id: totrans-69
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 此外，您还可以使用hints结构来仅获取某些条目，如特定的IP协议等。addrinfo结构被传递进去以定义您想要的连接类型。例如，要指定基于流的IPv6协议，可以使用以下代码片段。
- en: '[PRE7]'
  id: totrans-70
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The other modes for ‘family‘ are and which mean IPv4 and unspecified respectively.
    This could be useful if you are searching for a service that you aren’t entirely
    sure which IP version. Naturally, you get the version in the field back if you
    specified UNSPEC.
  id: totrans-71
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: “家族”的其他模式是和，分别表示IPv4和未指定。如果你正在寻找一个你不确定IP版本的服务，这可能很有用。自然地，如果你指定了UNSPEC，你会在字段中获取版本。
- en: Error handling with is a little different. The return value *is* the error code.
    To convert to a human-readable error use to get the equivalent short English error
    text.
  id: totrans-72
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 使用的错误处理略有不同。返回值*就是*错误代码。为了将其转换为可读的错误，请使用以获取等效的简短英文错误文本。
- en: '[PRE8]'
  id: totrans-73
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE8]'
- en: The socket call creates a network socket and returns a descriptor that can be
    used with and . In this sense, it is the network analog of that opens a file stream
    – except that we haven’t connected the socket to anything yet!
  id: totrans-74
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 套接字调用创建一个网络套接字并返回一个可以用于和的描述符。在这种情况下，它是打开文件流的网络类似物——只不过我们还没有将套接字连接到任何东西！
- en: Sockets are created with a domain for or for , is whether to use UDP, TCP, or
    other some other socket type, the is an optional choice of protocol configuration
    for our examples this we can leave this as 0 for default. This call creates a
    socket object in the kernel with which one can communicate with the outside world/network.
    You can use the result of to fill in the parameters, or provide them manually.
  id: totrans-75
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 套接字的创建使用一个域，对于或，是是否使用UDP、TCP或其他某些其他套接字类型，是针对我们的示例的协议配置的可选选择。在这个例子中，我们可以将其保留为0作为默认值。这个调用在内核中创建一个套接字对象，可以通过它与外部世界/网络进行通信。你可以使用的结果来填写参数，或者手动提供它们。
- en: The socket call returns an integer - a file descriptor - and, for TCP clients,
    you can use it as a regular file descriptor. You can use and to receive or send
    packets.
  id: totrans-76
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 套接字调用返回一个整数——一个文件描述符——对于TCP客户端，你可以将其用作常规文件描述符。你可以使用和来接收或发送数据包。
- en: TCP sockets are similar to and are often used in situations that require IPC.
    We don’t mention it in the previous chapters because it is overkill using a device
    suited for networks to simply communicate between processes on a single thread.
  id: totrans-77
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: TCP套接字类似于，常用于需要IPC的情况。我们之前没有提到它，因为使用适合网络的设备在单个线程上的进程之间进行通信是过度杀鸡。
- en: Finally, the connect call attempts the connection to the remote machine. We
    pass the original socket descriptor and also the socket address information which
    is stored inside the addrinfo structure. There are different kinds of socket address
    structures that can require more memory. So in addition to passing the pointer,
    the size of the structure is also passed. To help identify errors and mistakes
    it is good practice to check the return value of all networking calls, including
  id: totrans-78
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最后，connect调用尝试连接到远程机器。我们传递原始套接字描述符以及存储在addrinfo结构体内的套接字地址信息。存在不同类型的套接字地址结构，可能需要更多的内存。因此，除了传递指针外，还需要传递结构的大小。为了帮助识别错误和错误，检查所有网络调用的返回值是一个好习惯，包括
- en: '[PRE9]'
  id: totrans-79
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE9]'
- en: (Optional) To clean up code call on the first level struct.
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: （可选）为了清理代码，在第一级结构上调用。
- en: There is an old function is deprecated. It’s the old way convert a hostname
    into an IP address. The port address still needs to be manually set using function.
    It’s much easier to write code to support IPv4 AND IPv6 using the newer
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 已有一个旧函数已被弃用。这是将主机名转换为IP地址的旧方法。端口号仍然需要使用函数手动设置。使用较新的方法来支持IPv4和IPv6要简单得多。
- en: This is all that is needed to create a *simple* TCP client. However, network
    communications offer many different levels of abstraction and several attributes
    and options that can be set at each level. For example, we haven’t talked about
    which can manipulate options for the socket. You can also mess around with lower
    protocols as the kernel provides primitives that contribute to this. Note that
    you need to be root to create a raw socket. Also, you need to have a lot of “set
    up” or starter code, be prepared to have your datagrams be dropped due to bad
    form as well. For more information see this [guide](http://www.beej.us/guide/bgnet/output/html/multipage/getaddrinfoman.html).
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是创建一个*简单*的TCP客户端所需的所有内容。然而，网络通信提供了许多不同级别的抽象以及可以在每个级别设置的多个属性和选项。例如，我们还没有讨论过如何操作套接字选项。你还可以与较低的协议进行交互，因为内核提供了有助于这一点的原语。请注意，你需要以root权限创建原始套接字。此外，你需要有大量的“设置”或启动代码，准备好你的数据报可能因为格式错误而被丢弃。有关更多信息，请参阅此[指南](http://www.beej.us/guide/bgnet/output/html/multipage/getaddrinfoman.html)。
- en: Sending some data
  id: totrans-83
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 发送一些数据
- en: Once we have a successful connection we can read or write like any old file
    descriptor. Keep in mind if you are connected to a website, you want to conform
    to the HTTP protocol specification to get any sort of meaningful results back.
    There are libraries to do this. Usually, you don’t connect at the socket level.
    The number of bytes read or written may be smaller than expected. Thus, it is
    important to check the return value of and . A simple HTTP client that sends a
    request to a compliant URL is below. First, we’ll start with the boring stuff
    and the parsing code.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们建立了成功的连接，我们就可以像任何旧的文件描述符一样读取或写入。记住，如果您连接到网站，您希望遵守HTTP协议规范以获得任何有意义的结果。有库可以做到这一点。通常，您不会在套接字级别连接。读取或写入的字节数可能小于预期。因此，检查和的返回值非常重要。下面是一个简单的HTTP客户端，它向符合URL的URL发送请求。首先，我们将从无聊的部分和解析代码开始。
- en: '[PRE10]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: The code that sends the request is below. The first thing that we have to do
    is connect to an address.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 发送请求的代码如下。我们首先必须做的事情是连接到一个地址。
- en: '[PRE11]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: The next piece of code sends the request. Here is what each header means.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 下一段代码发送请求。以下是每个头部的含义。
- en: '"GET %s HTTP/1.0" This is the request verb interpolated with the path. This
    means to perform the GET verb on the path using the HTTP/1.0 method.'
  id: totrans-89
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '"GET %s HTTP/1.0" 这是指请求动词与路径的插值。这意味着使用HTTP/1.0方法在路径上执行GET动词。'
- en: '"Connection: close" Means that as soon as the request is over, please close
    the connection. This line won’t be used for any other connections. This is a little
    redundant given that HTTP 1.0 doesn’t allow you to send multiple requests, but
    it is better to be explicit given there are non-conformant technologies.'
  id: totrans-90
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '"Connection: close" 表示一旦请求完成，请关闭连接。此行不会用于任何其他连接。考虑到HTTP 1.0不允许您发送多个请求，这有点多余，但鉴于存在不兼容的技术，最好是明确指出。'
- en: '"Accept: */*" This means that the client is willing to accept anything.'
  id: totrans-91
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '"Accept: */*" 这意味着客户端愿意接受任何内容。'
- en: A more robust piece of code would also check if the write fails or if the call
    was interrupted.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 更健壮的代码还会检查写入是否失败或调用是否被中断。
- en: '[PRE12]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: The last piece of code is the driver code that sends the request. Feel free
    to use the following code if you want to open the file descriptor as a FILE object
    for convenience functions. Just be careful not to forget to set the buffering
    to zero otherwise you may double buffer the input, which would lead to performance
    problems.
  id: totrans-94
