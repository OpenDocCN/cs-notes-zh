- en: 'To grab the IP Address of a remote website, The function can convert a human-readable
    domain name (e.g. ) into an IPv4 and IPv6 address. It will return a linked-list
    of addrinfo structs:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 要获取远程网站的IP地址，该函数可以将可读的域名（例如）转换为IPv4和IPv6地址。它将返回一个addrinfo结构体的链表：
- en: '[PRE3]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: For example, suppose you wanted to find out the numeric IPv4 address of a web
    server at . We do this in two stages. First, use getaddrinfo to build a linked-list
    of possible connections. Secondly, use to convert the binary address of one of
    those into a readable form.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假设你想找出位于的Web服务器的数值IPv4地址。我们分两个阶段来做这件事。首先，使用getaddrinfo构建可能的连接的链表。其次，使用将其中的一个二进制地址转换为可读形式。
