- en: Deadlock
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Deadlock is defined as when a system cannot make any forward progress. We define
    a system for the rest of the chapter as a set of rules by which a set of processes
    can move from one state to another, where a state is either working or waiting
    for a particular resource. Forward progress is defined as if there is at least
    one process working or we can award a process waiting for a resource that resource.
    In a lot of systems, Deadlock is avoided by ignoring the entire concept (Silberschatz,
    Galvin, and Gagne [2006](ch018.xhtml#ref-silberschatz2006operating), P.237). Have
    you heard about turn it on and off again? For products where the stakes are low
    (User Operating Systems, Phones), it may be more efficient to allow deadlock.
    But in the cases where “failure is not an option” - Apollo 13, you need a system
    that tracks, breaks, or prevents deadlocks. Apollo 13 didn’t fail because of deadlock,
    but it wouldn’t be good to restart the system on liftoff.
  prefs: []
  type: TYPE_NORMAL
- en: Mission-critical operating systems need this guarantee formally because playing
    the odds with people’s lives isn’t a good idea. Okay so how do we do this? We
    model the problem. Even though it is a common statistical phrase that all models
    are wrong, the more accurate the model is to the system the higher the chance
    the method will work.
  prefs: []
  type: TYPE_NORMAL
- en: Resource Allocation Graphs
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![Resource allocation graph](../media/file21.png)'
  prefs: []
  type: TYPE_IMG
- en: Resource allocation graph
  prefs: []
  type: TYPE_NORMAL
- en: One such way is modeling the system with a resource allocation graph (RAG).
    A resource allocation graph tracks which resource is held by which process and
    which process is waiting for a resource of a particular type. It is a simple yet
    powerful tool to illustrate how interacting processes can deadlock. If a process
    is *using* a resource, an arrow is drawn from the resource node to the process
    node. If a process is *requesting* a resource, an arrow is drawn from the process
    node to the resource node. If there is a cycle in the Resource Allocation Graph
    and each resource in the cycle provides only one instance, then the processes
    will deadlock. For example, if process 1 holds resource A, process 2 holds resource
    B and process 1 is waiting for B and process 2 is waiting for A, then processes
    1 and 2 will be deadlocked [8.1](#ragfigure). We’ll make the distinction that
    the system is in deadlock by definition if all workers cannot perform an operation
    other than waiting. We can detect a deadlock by traversing the graph and searching
    for a cycle using a graph traversal algorithm, such as the Depth First Search
    (DFS). This graph is considered as a directed graph and we can treat both the
    processes and resources as nodes.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '![Graph based Deadlock](../media/file22.png)'
  prefs: []
  type: TYPE_IMG
- en: Graph based Deadlock
  prefs: []
  type: TYPE_NORMAL
- en: Coffman Conditions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Surely cycles in RAGs happen all the time in an OS, so why doesn’t it grind
    to a halt? You may not see deadlock because the OS may **preempt** some processes
    breaking the cycle but there is still a chance that your three lonely processes
    could deadlock.
  prefs: []
  type: TYPE_NORMAL
- en: There are four *necessary* and *sufficient* conditions for deadlock – meaning
    if these conditions hold then there is a non-zero probability that the system
    will deadlock at any given iteration. These are known as the Coffman Conditions
    (Coffman, Elphick, and Shoshani [1971](ch018.xhtml#ref-coffman1971system)).
  prefs: []
  type: TYPE_NORMAL
- en: 'Mutual Exclusion: No two processes can obtain a resource at the same time.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Circular Wait: There exists a cycle in the Resource Allocation Graph, or there
    exists a set of processes {P1, P2,…} such that P1 is waiting for resources held
    by P2, which is waiting for P3,…, which is waiting for P1.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Hold and Wait: Once a resource is obtained, a process keeps the resource locked.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'No pre-emption: Nothing can force the process to give up a resource.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Proof:'
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: Deadlock can happen if and only if the four Coffman conditions are satisfied.
  prefs: []
  type: TYPE_NORMAL
- en: <semantics><mo>→</mo><annotation encoding="application/x-tex">\rightarrow</annotation></semantics>
    If the system is deadlocked, the four Coffman conditions are apparent.
  prefs: []
  type: TYPE_NORMAL
- en: For contradiction, assume that there is no circular wait. If not then that means
    the resource allocation graph is acyclic, meaning that there is at least one process
    that is not waiting on any resource to be freed. Since the system can move forward,
    the system is not deadlocked.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For contradiction, assume that there is no mutual exclusion. If not, that means
    that no process is waiting on any other process for a resource. This breaks circular
    wait and the previous argument proves correctness.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For contradiction, assume that processes don’t hold and wait but our system
    still deadlocks. Since we have circular wait from the first condition at least
    one process must be waiting on another process. If that and processes don’t hold
    and wait, that means one process must let go of a resource. Since the system has
    moved forward, it cannot be deadlocked.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For contradiction, assume that we have preemption, but the system cannot be
    un-deadlocked. Have one process, or create one process, that recognizes the circular
    wait that must be apparent from above and break one of the links. By the first
    branch, we must not have deadlocked.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '<semantics><mo>←</mo><annotation encoding="application/x-tex">\leftarrow</annotation></semantics>
    If the four conditions are apparent, the system is deadlocked. We will prove that
    if the system is not deadlocked, the four conditions are not apparent. Though
    this proof is not formal, let us build a system with the three requirements not
    including circular wait. Let assume that there is a set of processes <semantics><mrow><mi>P</mi><mo>=</mo><mo
    stretchy="false" form="prefix">{</mo><msub><mi>p</mi><mn>1</mn></msub><mo>,</mo><msub><mi>p</mi><mn>2</mn></msub><mo>,</mo><mi>.</mi><mi>.</mi><mi>.</mi><mo>,</mo><msub><mi>p</mi><mi>n</mi></msub><mo
    stretchy="false" form="postfix">}</mo></mrow><annotation encoding="application/x-tex">P
    = \{p_1, p_2, ..., p_n\}</annotation></semantics> and there is a set of resources
    <semantics><mrow><mi>R</mi><mo>=</mo><mo stretchy="false" form="prefix">{</mo><msub><mi>r</mi><mn>1</mn></msub><mo>,</mo><msub><mi>r</mi><mn>2</mn></msub><mo>,</mo><mi>.</mi><mi>.</mi><mi>.</mi><mo>,</mo><msub><mi>r</mi><mi>m</mi></msub><mo
    stretchy="false" form="postfix">}</mo></mrow><annotation encoding="application/x-tex">R
    = \{r_1, r_2, ..., r_m\}</annotation></semantics>. For simplicity, a process can
    only request one resource at a time but the proof can be generalized to multiple.
    Let assume that the system is a state at time <semantics><mi>t</mi><annotation
    encoding="application/x-tex">t</annotation></semantics>. Let us assume that the
    state of the system is a tuple <semantics><mrow><mo stretchy="false" form="prefix">(</mo><msub><mi>h</mi><mi>t</mi></msub><mo>,</mo><msub><mi>w</mi><mi>t</mi></msub><mo
    stretchy="false" form="postfix">)</mo></mrow><annotation encoding="application/x-tex">(h_t,
    w_t)</annotation></semantics> where there are two functions <semantics><mrow><msub><mi>h</mi><mi>t</mi></msub><mo>:</mo><mi>R</mi><mo>→</mo><mi>P</mi><mo>∪</mo><mo
    stretchy="false" form="prefix">{</mo><mtext mathvariant="normal">unassigned</mtext><mo
    stretchy="false" form="postfix">}</mo></mrow><annotation encoding="application/x-tex">h_t:
    R \rightarrow P \cup \{\text{unassigned}\}</annotation></semantics> that maps
    resources to the processes that own them (this is a function, meaning that we
    have mutual exclusion) and or unassigned and <semantics><mrow><msub><mi>w</mi><mi>t</mi></msub><mo>:</mo><mi>P</mi><mo>→</mo><mi>R</mi><mo>∪</mo><mo
    stretchy="false" form="prefix">{</mo><mtext mathvariant="normal">satisfied</mtext><mo
    stretchy="false" form="postfix">}</mo></mrow><annotation encoding="application/x-tex">w_t:
    P \rightarrow R \cup \{\text{satisfied}\}</annotation></semantics> that maps the
    requests that each process makes to a resource or if the process is satisfied.
    If the process is satisfied, we consider the work trivial and the process exits,
    releasing all resources – this can also be generalized. Let <semantics><mrow><msub><mi>L</mi><mi>t</mi></msub><mo>⊆</mo><mi>P</mi><mo>×</mo><mi>R</mi></mrow><annotation
    encoding="application/x-tex">L_t \subseteq P \times R</annotation></semantics>
    be a set of lists of requests that a process uses to release a resource at any
    given time. The evolution of the system is at each step at every time.'
  prefs: []
  type: TYPE_NORMAL
- en: Release all resources in <semantics><msub><mi>L</mi><mi>t</mi></msub><annotation
    encoding="application/x-tex">L_t</annotation></semantics>.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Find a process that is requesting a resource
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If that resource is available give it to that process, generating a new <semantics><mrow><mo
    stretchy="false" form="prefix">(</mo><msub><mi>h</mi><mrow><mi>t</mi><mo>+</mo><mn>1</mn></mrow></msub><mo>,</mo><msub><mi>w</mi><mrow><mi>t</mi><mo>+</mo><mn>1</mn></mrow></msub><mo
    stretchy="false" form="postfix">)</mo></mrow><annotation encoding="application/x-tex">(h_{t+1},
    w_{t+1})</annotation></semantics> and exit the current iteration.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Else find another process and try the same resource allocation procedure in
    the previous step.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If all processes have been surveyed and if all are requesting a resource and
    none can be granted a resource, consider it deadlocked. More formally, this system
    is deadlocked means if <semantics><mrow><mo>∃</mo><msub><mi>t</mi><mn>0</mn></msub><mo>,</mo><mo>∀</mo><mi>t</mi><mo>≥</mo><msub><mi>t</mi><mn>0</mn></msub><mo>,</mo><mo>∀</mo><mi>p</mi><mo>∈</mo><mi>P</mi><mo>,</mo><msub><mi>w</mi><mi>t</mi></msub><mo
    stretchy="false" form="prefix">(</mo><mi>p</mi><mo stretchy="false" form="postfix">)</mo><mo>≠</mo><mtext
    mathvariant="normal">satisfied</mtext> <mrow><mtext mathvariant="normal">and</mtext></mrow>
    <mo>∃</mo><mi>q</mi><mo>,</mo><mi>q</mi><mo>≠</mo><mi>p</mi><mo>→</mo><msub><mi>h</mi><mi>t</mi></msub><mo
    stretchy="false" form="prefix">(</mo><msub><mi>w</mi><mi>t</mi></msub><mo stretchy="false"
    form="prefix">(</mo><mi>p</mi><mo stretchy="false" form="postfix">)</mo><mo stretchy="false"
    form="postfix">)</mo><mo>=</mo><mi>q</mi></mrow><annotation encoding="application/x-tex">\exists
    t_0, \forall t \geq t_0, \forall p \in P, w_t(p) \neq \text{satisfied} \text{
    and } \exists q, q \neq p \rightarrow h_t(w_t(p)) = q</annotation></semantics>
    (which is what we need to prove).
  prefs: []
  type: TYPE_NORMAL
- en: Mutual exclusion and no pre-emption are encoded into the system. Circular wait
    implies the second condition, a resource is owned by another process which is
    owned by another process meaning at this state <semantics><mrow><mo>∀</mo><mi>p</mi><mo>∈</mo><mi>P</mi><mo>,</mo><mo>∃</mo><mi>q</mi><mo>≠</mo><mi>p</mi><mo>→</mo><msub><mi>h</mi><mi>t</mi></msub><mo
    stretchy="false" form="prefix">(</mo><msub><mi>w</mi><mi>t</mi></msub><mo stretchy="false"
    form="prefix">(</mo><mi>p</mi><mo stretchy="false" form="postfix">)</mo><mo stretchy="false"
    form="postfix">)</mo><mo>=</mo><mi>q</mi></mrow><annotation encoding="application/x-tex">\forall
    p \in P, \exists q \neq p \rightarrow h_t(w_t(p)) = q</annotation></semantics>.
    Circular wait also implies that at this current state, no process is satisfied,
    meaning at this state <semantics><mrow><mo>∀</mo><mi>p</mi><mo>∈</mo><mi>P</mi><mo>,</mo><msub><mi>w</mi><mi>t</mi></msub><mo
    stretchy="false" form="prefix">(</mo><mi>p</mi><mo stretchy="false" form="postfix">)</mo><mo>≠</mo><mtext
    mathvariant="normal">satisfied</mtext></mrow><annotation encoding="application/x-tex">\forall
    p \in P, w_t(p) \neq \text{satisfied}</annotation></semantics>. Hold and wait
    simply proves the condition that from this point onward, the system will not change,
    which is all the conditions that we needed to show. <semantics><mi>▫</mi><annotation
    encoding="application/x-tex">\square</annotation></semantics>
  prefs: []
  type: TYPE_NORMAL
- en: If a system breaks any of them, it cannot have deadlock! Consider the scenario
    where two students need to write both pen and paper and there is only one of each.
    Breaking mutual exclusion means that the students share the pen and paper. Breaking
    circular wait could be that the students agree to grab the pen then the paper.
    As proof by contradiction, say that deadlock occurs under the rule and the conditions.
    Without loss of generality, that means a student would have to be waiting on a
    pen while holding the paper and the other waiting on a pen and holding the paper.
    We have contradicted ourselves because one student grabbed the paper without grabbing
    the pen, so deadlock fails to occur. Breaking hold and wait could be that the
    students try to get the pen and then the paper and if a student fails to grab
    the paper then they release the pen. This introduces a new problem called *livelock*
    which will be discussed later. Breaking preemption means that if the two students
    are in deadlock the teacher can come in and break up the deadlock by giving one
    of the students a held item or tell both students to put the items down.
  prefs: []
  type: TYPE_NORMAL
- en: livelock relates to deadlock. Consider the breaking hold-and-wait solution as
    above. Though deadlock is avoided, if the philosopher picks up the same device
    again and again in the same pattern, no work will be done. Livelock is generally
    harder to detect because the processes generally look like they are working to
    the outside operating system whereas in deadlock the operating system generally
    knows when two processes are waiting on a system-wide resource. Another problem
    is that there are necessary conditions for livelock (i.e. deadlock fails to occur)
    but not sufficient conditions – meaning there is no set of rules where livelock
    has to occur. You must formally prove in a system by what is known as an invariant.
    One has to enumerate each of the steps of a system and if each of the steps eventually
    – after some finite number of steps – leads to forward progress, the system fails
    to livelock. There are even better systems that prove bounded waits; a system
    can only be livelocked for at most <semantics><mi>n</mi><annotation encoding="application/x-tex">n</annotation></semantics>
    cycles which may be important for something like stock exchanges.
  prefs: []
  type: TYPE_NORMAL
- en: Approaches to Solving Livelock and Deadlock
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Ignoring deadlock is the most obvious approach. Quite humorously, the name for
    this approach is called the ostrich algorithm. Though there is no apparent source,
    the idea for the algorithm comes from the concept of an ostrich sticking its head
    in the sand. When the operating system detects deadlock, it does nothing out of
    the ordinary, and any deadlock usually goes away. An operating system preempts
    processes when stopping them for context switches. The operating system can interrupt
    any system call, potentially breaking a deadlock scenario. The OS also makes some
    files read-only thus making the resource shareable. What the algorithm refers
    to is that if there is an adversary that specifically crafts a program – or equivalently
    a user who poorly writes a program – that the OS deadlocks. For everyday life,
    this tends to be fine. When it is not we can turn to the following method.
  prefs: []
  type: TYPE_NORMAL
- en: Deadlock detection allows the system to enter a deadlocked state. After entering,
    the system uses the information to break deadlock. As an example, consider multiple
    processes accessing files. The operating system can keep track of all of the files/resources
    through file descriptors at some level either abstracted through an API or directly.
    If the operating system detects a directed cycle in the operating system file
    descriptor table it may break one process’ hold through scheduling for example
    and let the system proceed. Why this is a popular choice in this realm is that
    there is no way of knowing which resources a program will select without running
    the program. This is an extension of Rice’s theorem (Rice [1953](ch018.xhtml#ref-rice))
    that says that we cannot know any semantic feature without running the program
    (semantic meaning like what files it tries to open). So theoretically, it is sound.
    The problem then gets introduced that we could reach a livelock scenario if we
    preempt a set of resources again and again. The way around this is mostly probabilistic.
    The operating system chooses a random resource to break . Now even though a user
    can craft a program where breaking hold and wait on each resource will result
    in a livelock, this doesn’t happen as often on machines that run programs in practice
    or the livelock that does happen happens for a couple of cycles. These systems
    are good for products that need to maintain a non-deadlocked state but can tolerate
    a small chance of livelock for a short time.
  prefs: []
  type: TYPE_NORMAL
- en: In addition, we have the *Banker’s Algorithm*. Which the basic premise is the
    bank never runs dry, which prevents livelock. Feel free to check out the appendix
    for more details.
  prefs: []
  type: TYPE_NORMAL
- en: Dining Philosophers
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The Dining Philosophers problem is a classic synchronization problem. Imagine
    we invite <semantics><mi>n</mi><annotation encoding="application/x-tex">n</annotation></semantics>
    (let’s say 6) philosophers to a meal. We will sit them at a table with 6 chopsticks,
    one between each philosopher. A philosopher alternates between wanting to eat
    or think. To eat the philosopher must pick up the two chopsticks either side of
    their position. The original problem required each philosopher to have two forks,
    but one can eat with a single fork so we rule this out. However, these chopsticks
    are shared with his neighbor.
  prefs: []
  type: TYPE_NORMAL
- en: '![Dining Philosophers](../media/file23.png)'
  prefs: []
  type: TYPE_IMG
- en: Dining Philosophers
  prefs: []
  type: TYPE_NORMAL
- en: Is it possible to design an efficient solution such that all philosophers get
    to eat? Or, will some philosophers starve, never obtaining a second chopstick?
    Or will all of them deadlock? For example, imagine each guest picks up the chopstick
    on their left and then waits for the chopstick on their right to be free. Oops
    - our philosophers have deadlocked! Each philosopher is essentially the same,
    meaning that each philosopher has the same instruction set based on the other
    philosopher i.e. you can’t tell every even philosopher to do one thing and every
    odd philosopher to do another thing.
  prefs: []
  type: TYPE_NORMAL
- en: Failed Solutions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: This looks good but. What if everyone picks up their left fork and is waiting
    on their right fork? We have deadlocked the program. It is important to note that
    deadlock doesn’t happen all the time and the probability that this solution deadlock
    goes down as the number of philosophers goes up. What is important to note is
    that eventually that this solution will deadlock, letting threads starve which
    is bad. Here is a simple resource allocation graph that shows how the system could
    be deadlocked
  prefs: []
  type: TYPE_NORMAL
- en: '![Left right dining philosopher cycle](../media/file24.png)'
  prefs: []
  type: TYPE_IMG
- en: Left right dining philosopher cycle
  prefs: []
  type: TYPE_NORMAL
- en: So now you are thinking about breaking one of the Coffman Conditions. Let’s
    break Hold and Wait!
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Now our philosopher picks up the left fork and tries to grab the right. If it’s
    available, they eat. If it’s not available, they put the left fork down and try
    again. No deadlock! But, there is a problem. What if all the philosophers pick
    up their left at the same time, try to grab their right, put their left down,
    pick up their left, try to grab their right and so on. Here is what a time evolution
    of the system would look like.
  prefs: []
  type: TYPE_NORMAL
- en: '![Livelock Failure](../media/file25.png)'
  prefs: []
  type: TYPE_IMG
- en: Livelock Failure
  prefs: []
  type: TYPE_NORMAL
- en: We have now livelocked our solution! Our poor philosophers are still starving,
    so let’s give them some proper solutions.
  prefs: []
  type: TYPE_NORMAL
- en: Viable Solutions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The naive arbitrator solution has one arbitrator a mutex for example. Have each
    of the philosophers ask the arbitrator for permission to eat or trylock an arbitrator
    mutex. This solution allows one philosopher to eat at a time. When they are done,
    another philosopher can ask for permission to eat. This prevents deadlock because
    there is no circular wait! No philosopher has to wait for any other philosopher.
    The advanced arbitrator solution is to implement a class that determines if the
    philosopher’s forks are in the arbitrator’s possession. If they are, they give
    them to the philosopher, let him eat, and take the forks back. This has the bonus
    of being able to have multiple philosophers eat at the same time.
  prefs: []
  type: TYPE_NORMAL
- en: There are a lot of problems with these solutions. One is that they are slow
    and have a single point of failure. Assuming that all the philosophers are good-willed,
    the arbitrator needs to be fair. In practical systems, the arbitrator tends to
    give forks to the same processes because of scheduling or pseudo-randomness. Another
    important thing to note is that this prevents deadlock for the entire system.
    But in our model of dining philosophers, the philosopher has to release the lock
    themselves. Then, you can consider the case of the malicious philosopher (let’s
    say Descartes because of his Evil Demons) could hold on to the arbitrator forever.
    He would make forward progress and the system would make forward progress but
    there is no way of ensuring that each process makes forward progress without assuming
    something about the processes or having true preemption – meaning that a higher
    authority (let’s say Steve Jobs) tells them to stop eating forcibly.
  prefs: []
  type: TYPE_NORMAL
- en: 'Proof:'
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: The arbitrator solution doesn’t deadlock
  prefs: []
  type: TYPE_NORMAL
- en: The proof is about as simple as it gets. Only one philosopher can request resources
    at a time. There is no way to make a cycle in the resource allocation graph with
    only one philosopher acting in pickup the left then the right fork which is what
    we needed to show.
  prefs: []
  type: TYPE_NORMAL
- en: <semantics><mi>▫</mi><annotation encoding="application/x-tex">\square</annotation></semantics>
  prefs: []
  type: TYPE_NORMAL
- en: '![Arbitrator Diagram](../media/file26.png)'
  prefs: []
  type: TYPE_IMG
- en: Arbitrator Diagram
  prefs: []
  type: TYPE_NORMAL
- en: Leaving the Table (Stallings’ Solution)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Why does the first solution deadlock? Well, there are <semantics><mi>n</mi><annotation
    encoding="application/x-tex">n</annotation></semantics> philosophers and <semantics><mi>n</mi><annotation
    encoding="application/x-tex">n</annotation></semantics> chopsticks. What if there
    is only 1 philosopher at the table? Can we deadlock? No. How about 2 philosophers?
    3? You can see where this is going. Stallings’ (Stallings [2011](ch018.xhtml#ref-stalling)
    P. 280) solution removes philosophers from the table until deadlock is not possible
    – think about what the magic number of philosophers at the table. The way to do
    this in the actual system is through semaphores and letting a certain number of
    philosophers through. This has the benefit that multiple philosophers can be eating.
  prefs: []
  type: TYPE_NORMAL
- en: In the case that the philosophers aren’t evil, this solution requires a lot
    of time-consuming context switching. There is also no reliable way to know the
    number of resources beforehand. In the dining philosophers case, this is solved
    because everything is known but trying to specify an operating system where a
    system doesn’t know which file is going to get opened by what process can lead
    to a faulty solution. And again since semaphores are system constructs, they obey
    system timing clocks which means that the same processes tend to get added back
    into the queue again. Now if a philosopher becomes evil, then the problem becomes
    that there is no preemption. A philosopher can eat for as long as they want and
    the system will continue to function but that means the fairness of this solution
    can be low in the worst case. This works best with timeouts or forced context
    switches to ensure bounded wait times.
  prefs: []
  type: TYPE_NORMAL
- en: 'Proof:'
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: Stallings’ Solution Doesn’t Deadlock. Let’s number the philosophers <semantics><mrow><mo
    stretchy="false" form="prefix">{</mo><msub><mi>p</mi><mn>0</mn></msub><mo>,</mo><msub><mi>p</mi><mn>1</mn></msub><mo>,</mo><mi>.</mi><mi>.</mi><mo>,</mo><msub><mi>p</mi><mrow><mi>n</mi><mo>−</mo><mn>1</mn></mrow></msub><mo
    stretchy="false" form="postfix">}</mo></mrow><annotation encoding="application/x-tex">\{p_0,
    p_1, .., p_{n-1}\}</annotation></semantics> and the resources <semantics><mrow><mo
    stretchy="false" form="prefix">{</mo><msub><mi>r</mi><mn>0</mn></msub><mo>,</mo><msub><mi>r</mi><mn>1</mn></msub><mo>,</mo><mi>.</mi><mi>.</mi><mo>,</mo><msub><mi>r</mi><mrow><mi>n</mi><mo>−</mo><mn>1</mn></mrow></msub><mo
    stretchy="false" form="postfix">}</mo></mrow><annotation encoding="application/x-tex">\{r_0,
    r_1, .., r_{n-1}\}</annotation></semantics>. A philosopher <semantics><msub><mi>p</mi><mi>i</mi></msub><annotation
    encoding="application/x-tex">p_i</annotation></semantics> needs resource <semantics><msub><mi>r</mi><mrow><mi>i</mi><mo>−</mo><mn>1</mn><mo>mod</mo><mi>n</mi></mrow></msub><annotation
    encoding="application/x-tex">r_{i-1 \mod n}</annotation></semantics> and <semantics><msub><mi>r</mi><mrow><mi>i</mi><mo>+</mo><mn>1</mn><mo>mod</mo><mi>n</mi></mrow></msub><annotation
    encoding="application/x-tex">r_{i + 1 \mod n}</annotation></semantics>. Without
    loss of generality, let us take <semantics><msub><mi>p</mi><mi>i</mi></msub><annotation
    encoding="application/x-tex">p_i</annotation></semantics> out of the picture.
    Each resource had exactly two philosophers that could use it. Now resources <semantics><msub><mi>r</mi><mrow><mi>i</mi><mo>−</mo><mn>1</mn><mo>mod</mo><mi>n</mi></mrow></msub><annotation
    encoding="application/x-tex">r_{i-1 \mod n}</annotation></semantics> and <semantics><msub><mi>r</mi><mrow><mi>i</mi><mo>+</mo><mn>1</mn><mo>mod</mo><mi>n</mi></mrow></msub><annotation
    encoding="application/x-tex">r_{i + 1 \mod n}</annotation></semantics> only have
    on philosopher waiting on it. Even if hold and wait, no preemption, and mutual
    exclusion or present, the resources can never enter a state where one philosopher
    requests them and they are held by another philosopher because only one philosopher
    can request them. Since there is no way to generate a cycle otherwise, circular
    wait cannot hold. Since circular wait cannot hold, deadlock cannot happen. <semantics><mi>▫</mi><annotation
    encoding="application/x-tex">\square</annotation></semantics>
  prefs: []
  type: TYPE_NORMAL
- en: Here is a visualization of the worst-case. The system is about to deadlock,
    but the approach resolves it.
  prefs: []
  type: TYPE_NORMAL
- en: '![Stalling solution almost deadlock](../media/file27.png)'
  prefs: []
  type: TYPE_IMG
- en: Stalling solution almost deadlock
  prefs: []
  type: TYPE_NORMAL
- en: Partial Ordering (Dijkstra’s Solution)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This is Dijkstra’s solution (Dijkstra, [n.d.](ch018.xhtml#ref-EWD:EWD310) P.
    20). He was the one to propose this problem on an exam. Why does the first solution
    deadlock? Dijkstra thought that the last philosopher who picks up his left fork
    (causing the solution to deadlock) should pick up his right. He accomplishes it
    by number the forks <semantics><mrow><mn>1</mn><mi>.</mi><mi>.</mi><mi>n</mi></mrow><annotation
    encoding="application/x-tex">1..n</annotation></semantics>, and tells each of
    the philosophers to pick up his lower number fork. Let’s run through the deadlock
    condition again. Everyone tries to pick up their lower number fork first. Philosopher
    <semantics><mn>1</mn><annotation encoding="application/x-tex">1</annotation></semantics>
    gets fork <semantics><mn>1</mn><annotation encoding="application/x-tex">1</annotation></semantics>,
    Philosopher <semantics><mn>2</mn><annotation encoding="application/x-tex">2</annotation></semantics>
    gets fork <semantics><mn>2</mn><annotation encoding="application/x-tex">2</annotation></semantics>,
    and so on until we get to Philosopher <semantics><mi>n</mi><annotation encoding="application/x-tex">n</annotation></semantics>.
    They have to choose between fork <semantics><mn>1</mn><annotation encoding="application/x-tex">1</annotation></semantics>
    and <semantics><mi>n</mi><annotation encoding="application/x-tex">n</annotation></semantics>.
    fork <semantics><mn>1</mn><annotation encoding="application/x-tex">1</annotation></semantics>
    is already held up by philosopher <semantics><mn>1</mn><annotation encoding="application/x-tex">1</annotation></semantics>,
    so they can’t pick up that fork, meaning he won’t pick up fork <semantics><mi>n</mi><annotation
    encoding="application/x-tex">n</annotation></semantics>. We have broken ! Meaning
    deadlock isn’t possible.
  prefs: []
  type: TYPE_NORMAL
- en: Some problems are that an entity either needs to know the finite set of resources
    in advance or be able to produce a consistent partial order such that circular
    wait cannot happen. This also implies that there needs to be some entity, either
    the operating system or another process, deciding on the number and all of the
    philosophers need to agree on the number as new resources come in. As we have
    also seen with previous solutions, this relies on context switching. This prioritizes
    philosophers that have already eaten but can be made fairer by introducing random
    sleeps and waits.
  prefs: []
  type: TYPE_NORMAL
- en: 'Proof:'
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: Dijkstra’s Solution Doesn’t Deadlock
  prefs: []
  type: TYPE_NORMAL
- en: The proof is similar to the previous proof. Let’s number the philosophers <semantics><mrow><mo
    stretchy="false" form="prefix">{</mo><msub><mi>p</mi><mn>0</mn></msub><mo>,</mo><msub><mi>p</mi><mn>1</mn></msub><mo>,</mo><mi>.</mi><mi>.</mi><mo>,</mo><msub><mi>p</mi><mrow><mi>n</mi><mo>−</mo><mn>1</mn></mrow></msub><mo
    stretchy="false" form="postfix">}</mo></mrow><annotation encoding="application/x-tex">\{p_0,
    p_1, .., p_{n-1}\}</annotation></semantics> and the resources <semantics><mrow><mo
    stretchy="false" form="prefix">{</mo><msub><mi>r</mi><mn>0</mn></msub><mo>,</mo><msub><mi>r</mi><mn>1</mn></msub><mo>,</mo><mi>.</mi><mi>.</mi><mo>,</mo><msub><mi>r</mi><mrow><mi>n</mi><mo>−</mo><mn>1</mn></mrow></msub><mo
    stretchy="false" form="postfix">}</mo></mrow><annotation encoding="application/x-tex">\{r_0,
    r_1, .., r_{n-1}\}</annotation></semantics>. A philosopher <semantics><msub><mi>p</mi><mi>i</mi></msub><annotation
    encoding="application/x-tex">p_i</annotation></semantics> needs resource <semantics><msub><mi>r</mi><mrow><mi>i</mi><mo>−</mo><mn>1</mn><mo>mod</mo><mi>n</mi></mrow></msub><annotation
    encoding="application/x-tex">r_{i-1 \mod n}</annotation></semantics> and <semantics><msub><mi>r</mi><mrow><mi>i</mi><mo>+</mo><mn>1</mn><mo>mod</mo><mi>n</mi></mrow></msub><annotation
    encoding="application/x-tex">r_{i + 1 \mod n}</annotation></semantics>. Each philosopher
    will grab <semantics><msub><mi>r</mi><mrow><mi>i</mi><mo>−</mo><mn>1</mn><mo>mod</mo><mi>n</mi></mrow></msub><annotation
    encoding="application/x-tex">r_{i-1 \mod n}</annotation></semantics> then <semantics><msub><mi>r</mi><mrow><mi>i</mi><mo>+</mo><mn>1</mn><mo>mod</mo><mi>n</mi></mrow></msub><annotation
    encoding="application/x-tex">r_{i + 1 \mod n}</annotation></semantics> but the
    last philosopher will grab in the reverse order. Even if hold and wait, no preemption,
    and mutual exclusion or present. Since the last philosopher will grab <semantics><msub><mi>r</mi><mrow><mi>n</mi><mo>−</mo><mn>1</mn></mrow></msub><annotation
    encoding="application/x-tex">r_{n-1}</annotation></semantics> then <semantics><msub><mi>r</mi><mn>0</mn></msub><annotation
    encoding="application/x-tex">r_0</annotation></semantics> there are two cases
    either the philosopher has the first lock or the philosopher doesn’t.
  prefs: []
  type: TYPE_NORMAL
- en: If the last philosopher <semantics><msub><mi>p</mi><mrow><mi>n</mi><mo>−</mo><mn>1</mn></mrow></msub><annotation
    encoding="application/x-tex">p_{n-1}</annotation></semantics> holds the first
    lock meaning the previous philosopher <semantics><msub><mi>p</mi><mrow><mi>n</mi><mo>−</mo><mn>2</mn></mrow></msub><annotation
    encoding="application/x-tex">p_{n-2}</annotation></semantics> is waiting on <semantics><msub><mi>r</mi><mrow><mi>n</mi><mo>−</mo><mn>1</mn></mrow></msub><annotation
    encoding="application/x-tex">r_{n-1}</annotation></semantics> meaning <semantics><msub><mi>r</mi><mrow><mi>n</mi><mo>−</mo><mn>2</mn></mrow></msub><annotation
    encoding="application/x-tex">r_{n-2}</annotation></semantics> is available. Since
    no other blockers, the philosopher previous <semantics><msub><mi>p</mi><mrow><mi>n</mi><mo>−</mo><mn>3</mn></mrow></msub><annotation
    encoding="application/x-tex">p_{n-3}</annotation></semantics> will grab her first
    lock. This is now a reduction to the previous proof of stalling because we now
    have <semantics><mi>n</mi><annotation encoding="application/x-tex">n</annotation></semantics>
    resources but only <semantics><mrow><mi>n</mi><mo>−</mo><mn>1</mn></mrow><annotation
    encoding="application/x-tex">n-1</annotation></semantics> philosophers, meaning
    this cannot deadlock.
  prefs: []
  type: TYPE_NORMAL
- en: If the philosopher doesn’t obtain that first lock, then we have a reduction
    to Stalling’s proof above because now have <semantics><mrow><mi>n</mi><mo>−</mo><mn>1</mn></mrow><annotation
    encoding="application/x-tex">n-1</annotation></semantics> philosophers vying for
    <semantics><mi>n</mi><annotation encoding="application/x-tex">n</annotation></semantics>
    resources. Since we can’t reach deadlock in either case, this solution cannot
    deadlock which is what we needed to show.
  prefs: []
  type: TYPE_NORMAL
- en: <semantics><mi>▫</mi><annotation encoding="application/x-tex">\square</annotation></semantics>
  prefs: []
  type: TYPE_NORMAL
- en: '![Stalling solution partial deadlock](../media/file28.png)'
  prefs: []
  type: TYPE_IMG
- en: Stalling solution partial deadlock
  prefs: []
  type: TYPE_NORMAL
- en: There are a few other solutions (clean/dirty forks and the actor model) in the
    appendix.
