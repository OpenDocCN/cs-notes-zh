  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://courses.physics.illinois.edu/cs225/sp2019/notes/kd-tree/](https://courses.physics.illinois.edu/cs225/sp2019/notes/kd-tree/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Back to Notes](/cs225/sp2019/notes/)by Jenny Chen'
  prefs: []
  type: TYPE_NORMAL
- en: Overview
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A k-d Tree is a binary search tree that organizes points in *k* dimensional
    space. Every node in a k-d Tree contains one point. Every parent node splits the
    space into two subspaces based on a certain dimension. It splits the space such
    that every node in its left subtree is in the left subspace, and every node in
    its right subtree is in the right subspace. The dimension that a node is splitting
    on depends on which level of the tree this node is in.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/fd10cd01f71740b6ca95d4af6cc63c80.png)'
  prefs: []
  type: TYPE_IMG
- en: The blue node is splitting on the first dimension (*x* axis). Every node has
    a smaller *x* coordinate belongs to its left subtree, and every node has a greater
    *x* coordinate belongs to its right subtree.
  prefs: []
  type: TYPE_NORMAL
- en: Constructing a k-d Tree
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this course, we focus on constructing a balanced k-d Tree based on an array
    of points.
  prefs: []
  type: TYPE_NORMAL
- en: Alternate splitting dimension
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: As mentioned before, each node splits the space in a certain dimension. Conventionally,
    the nodes on the *i* th level split the space in the *i* th dimension. If *i*
    is greater than *k*, the dimension wraps back around to *i* mod *k*.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8cfc37f3b26f0dd290ff2269ef8dfcbb.png)'
  prefs: []
  type: TYPE_IMG
- en: This is an example of k-d Tree storing points in 2D. Each node on a odd level
    splits the *x* dimension, and each node on a even level splits the *y* dimension.
  prefs: []
  type: TYPE_NORMAL
- en: '![Alternate dim demo image 1](../Images/d996c1448f39cec758c702ff4c7b4e4d.png)![Alternate
    dim demo image 2](../Images/e18d0dfc5d2c6f0f717fe322f47c965d.png)![Alternate dim
    demo image 3](../Images/fffe68641e1b9764b84b79e555d60ad5.png)![Alternate dim demo
    image 4](../Images/fe4008257037d6d82e8b0129c25f1735.png)![Alternate dim demo image
    5](../Images/3b52d6574d176d767db1892a0991f22c.png)[Previous](#carouselExampleControls)
    [Next](#carouselExampleControls)'
  prefs: []
  type: TYPE_IMG
- en: kd-Tree splits the space level by level.
  prefs: []
  type: TYPE_NORMAL
- en: Find the median
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: In order to construct a balanced k-d Tree, each node should split the space
    such that there are an equal number of nodes in the left subspace as the right
    subspace. Therefore we need to pick the median among the nodes for the current
    dimension and make it the subroot.
  prefs: []
  type: TYPE_NORMAL
- en: Recurse on subtrees
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: After finding the subroot, put all nodes that are in the left subspace into
    one array, and the rest into another array. Repeat the process on the subarrays.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/bd952b8f175a1106a0932664491d06f7.png)'
  prefs: []
  type: TYPE_IMG
- en: Suppose we are given this array to construct a kd-Tree.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f8b63a415d031e4dee66cc819045573d.png)'
  prefs: []
  type: TYPE_IMG
- en: (4, 4) is the median in terms of *x* coordinate, make it our subroot.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9d28d705026d5fcec1b51bb74eaec460.png)'
  prefs: []
  type: TYPE_IMG
- en: Partition the array so that every point with *x* coordinate smaller than 4 is
    on the left side of (4, 4), and every point with *x* coordinate larger than 4
    is on the right side of (4, 4).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/51c5ddb67a2715a1a3308c9a2b9faf78.png)'
  prefs: []
  type: TYPE_IMG
- en: Find the median in terms of *y* coordinate on each of the subarrays.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/532fc86d5b5f4c8a2b312dfbfcc50ecf.png)'
  prefs: []
  type: TYPE_IMG
- en: Partition each subarray by its median, and make the median the subroot. Repeat
    this process until the array only consists of one node.
  prefs: []
  type: TYPE_NORMAL
