  type: TYPE_NORMAL
  zh: 必需章节：C 语言简介/Malloc
- en: '[Double Free](https://techblog.appnexus.com/2013-09-17-outage-postmortem-586b19ae4307)'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '[双重释放](https://techblog.appnexus.com/2013-09-17-outage-postmortem-586b19ae4307)'
- en: Appnexus uses an asynchronous garbage collector that reclaims different parts
    of the heap when it believes that objects are unused. The architecture is that
    an element is in the unavailable list and then it is taken out to a to-be-freed
    list. After a certain time if that element was unused, it is freed and added to
    the free list. This is fine until two thread try to delete the same object at
    once, adding to the list twice. After less time, one of the objects was deleted,
    the delete was announced to other computers.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: Appnexus使用异步垃圾回收器，当它认为对象未被使用时，会回收堆的不同部分。其架构是，一个元素在不可用列表中，然后被移到待释放列表中。如果在一定时间内该元素未被使用，它就会被释放并添加到空闲列表中。这很好，直到两个线程同时尝试删除同一个对象，将其添加到列表中两次。在更短的时间内，其中一个对象被删除，删除操作被通知到其他计算机。
- en: 'Lessons Learned: Avoid making hacky software if you need to. Modularize, and
    set memory limits, and monitor different parts of your code and optimize by hand.
    There is no general catch-all garbage collector that fits everyone. Even highly
    tested ones like the JVM need some nudges if you want to get performance out of
    them.'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 经验教训：如果你需要，避免制作黑客软件。模块化，设置内存限制，并监控代码的不同部分，然后手动优化。没有通用的万能垃圾回收器适合所有人。即使是高度测试的JVM，如果你想要从中获得性能，也需要一些推动。
