  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '[解释](http://users.csc.calpoly.edu/~jdalbey/SWE/Papers/att_collapse.html)'
- en: The bug is explained well at the link above. We recommend reading to learn more.
    A series of network delays that caused some telephone switches across the country
    to think that other switches were operable when they weren’t. When the switches
    came back online, they realized they had a huge backlog of calls to route and
    began doing so. Other routing failures and restarts only compounded the problem.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 错误在上面的链接中解释得很好。我们建议阅读以了解更多信息。一系列网络延迟导致全国一些电话交换机认为其他交换机在它们不可用时是可操作的。当交换机重新上线时，它们意识到它们有大量的待路由电话，并开始这样做。其他路由故障和重启只是使问题更加复杂。
- en: 'Lessons Learned: Not using C would’ve actually helped here because of more
    rigorous fuzzing (though C++ in this day and age would be worse with its language
    constructs). The real moral of the story is networks are random and expect any
    jump at any point in your code. That means writing simulations and running them
    with random delays to figure out bugs before they happen.'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 经验教训：实际上在这里不使用C语言可能会有所帮助，因为更严格的模糊测试（尽管在当今时代，C++由于其语言结构可能会更糟）。这个故事真正的教训是网络是随机的，并且预期代码中的任何一点都可能发生跳跃。这意味着编写模拟并在它们发生之前通过随机延迟运行它们来找出错误。
