  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: What happens if $0 or the first parameter passed into a script doesn’t exist?
    You move to root, and you delete your entire computer.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 如果$0或传递给脚本的第一个参数不存在会发生什么？你会变成root用户，并删除你的整个电脑。
- en: 'Lessons Learned: Do parameter checks, always always always on a script and
    if you expect a command to fail, explicitly list it. You can also alias rm to
    mv and then delete the trash later.'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 经验教训：在脚本上始终进行参数检查，如果你预期某个命令会失败，请明确列出它。你还可以将rm别名设置为mv，然后稍后删除垃圾文件。
- en: Appnexus Double Free
  id: totrans-69
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Appnexus 双重释放
