    transmit time? How does the time taken differ between HTTP 1.0 and HTTP 1.1?
  id: totrans-202
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: HTTP 1.0和HTTP 1.1之间有哪些不同之处？如果网络有20毫秒的传输时间，从服务器传输3个文件到客户端需要多少毫秒？HTTP 1.0和HTTP
    1.1之间的时间差异是如何的？
- en: Writing to a network socket may not send all of the bytes and may be interrupted
    due to a signal. Check the return value of to implement that will repeatedly call
    with any remaining data. If returns -1 then immediately return -1 unless the is
    - in which case repeat the last attempt. You will need to use pointer arithmetic.
  id: totrans-203
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 向网络套接字写入可能不会发送所有字节，并且可能会因为信号而中断。检查返回值以实现将反复调用任何剩余数据的函数。如果返回-1，则立即返回-1，除非是-，在这种情况下，重复最后尝试。您将需要使用指针算术。
- en: '[PRE26]'
  id: totrans-204
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE26]'
- en: Implement a multithreaded TCP server that listens on port 2000\. Each thread
    should read 128 bytes from the client file descriptor and echo it back to the
    client, before closing the connection and ending the thread.
  id: totrans-205
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 实现一个监听端口2000的多线程TCP服务器。每个线程应从客户端文件描述符读取128字节，并将其回显给客户端，然后关闭连接并结束线程。
- en: Implement a UDP server that listens on port 2000\. Reserve a buffer of 200 bytes.
    Listen for an arriving packet. Valid packets are 200 bytes or less and start with
    four bytes 0x65 0x66 0x67 0x68\. Ignore invalid packets. For valid packets add
    the value of the fifth byte as an unsigned value to a running total and print
    the total so far. If the running total is greater than 255 then exit.
  id: totrans-206
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 实现一个监听端口2000的UDP服务器。预留一个200字节的缓冲区。监听到达的数据包。有效的数据包长度为200字节或更少，并以四个字节0x65 0x66
    0x67 0x68开始。忽略无效的数据包。对于有效的数据包，将第五个字节的值作为无符号值加到运行总和中，并打印到目前为止的总和。如果运行总和大于255，则退出。
