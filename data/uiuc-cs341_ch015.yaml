- en: 'Use POSIX calls and to implement an autograding program. Capture the standard
    output of a child process into a pipe. The child process should the program with
    no additional arguments (other than the process name). In the parent process read
    from the pipe: Exit the parent process as soon as the captured output contains
    the ! character. Before exiting the parent process send SIGKILL to the child process.
    Exit 0 if the output contained a !. Otherwise if the child process exits causing
    the pipe write end to be closed, then exit with a value of 1\. Be sure to close
    the unused ends of the pipe in the parent and child process'
  id: totrans-129
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用 POSIX 调用来实现自动评分程序。将子进程的标准输出捕获到管道中。子进程应该不带任何额外参数（除了进程名称）来运行程序。在父进程中从管道读取：一旦捕获的输出包含
    ! 字符，则退出父进程。在退出父进程之前，向子进程发送 SIGKILL 信号。如果输出包含 !，则退出 0。否则，如果子进程退出导致管道的写端关闭，则退出值为
    1。确保在父进程和子进程中关闭未使用的管道端。
- en: This advanced challenge uses pipes to get an “AI player” to play itself until
    the game is complete. The program accepts a line of input - the sequence of turns
    made so far, prints the same sequence followed by another turn, and then exits.
    A turn is specified using two characters. For example “A1” and “C3” are two opposite
    corner positions. The string is a game of 3 turns/plys. A valid response is (the
    C1 response blocks the diagonal B2 A3 threat). The output line may also include
    a suffix or Use pipes to control the input and output of each child process created.
    When the output contains a , print the final output line (the entire game sequence
    and the result) and exit.
  id: totrans-130
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 这个高级挑战使用管道来让一个“AI 玩家”自己玩游戏，直到游戏完成。程序接受一行输入 - 到目前为止的回合顺序，打印相同的顺序后跟另一个回合，然后退出。一个回合由两个字符指定。例如，“A1”和“C3”是两个对角位置。字符串是
    3 个回合/走法的游戏。一个有效的响应是（C1 响应阻止了 B2 A3 对角威胁）。输出行还可以包括后缀或使用管道来控制每个创建的子进程的输入和输出。当输出包含
    , 时，打印最终输出行（整个游戏顺序和结果）并退出。
