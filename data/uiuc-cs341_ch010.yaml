- en: Scheduling
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 调度
- en: CPU Scheduling is the problem of efficiently selecting which process to run
    on a system’s CPU cores. In a busy system, there will be more ready-to-run processes
    than there are CPU cores, so the system kernel must evaluate which processes should
    be scheduled to run and which processes should be executed later. The system must
    also decide whetherit should take a particular process and pause its execution
    – along with any associated threads. The balance comes from stopping processes
    often enough where you have a responsive computer but infrequently enough where
    the programs themselves are spending minimal time context switching. It is a hard
    balance to get right.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: CPU调度是高效选择在系统CPU核心上运行哪个进程的问题。在繁忙的系统上，就绪运行的进程数量将超过CPU核心的数量，因此系统内核必须评估哪些进程应该被调度运行，哪些进程应该稍后执行。系统还必须决定是否应该暂停特定进程的执行——以及任何相关的线程。平衡来自于在足够频繁地停止进程以保持计算机响应的同时，又足够不频繁地让程序本身在上下文切换上花费最少的时间。这是一个很难找到正确平衡的问题。
- en: 'The additional complexity of multi-threaded and multiple CPU cores are considered
    a distraction to this initial exposition so are ignored here. Another gotcha for
    non-native speakers is the dual meaning of “Time”: The word “Time” can be used
    in both clock and elapsed duration context. For example “The arrival time of the
    first process was 9:00am.” and, “The running time of the algorithm is 3 seconds”.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 多线程和多个CPU核心的额外复杂性被视为对这种初始阐述的干扰，因此在这里被忽略。对于非母语者来说，另一个需要注意的问题是“时间”的双重含义：单词“时间”可以在时钟和经过的时间上下文中使用。例如，“第一个进程的到达时间是上午9:00。”和“算法的运行时间是3秒”。
- en: One clarification that we will make is that our scheduling will mainly deal
    with short term or CPU scheduling. That means we will assume that the processes
    are in memory and ready to go. The other types of scheduling are long and medium
    term. Long term schedulers act as gatekeepers to the processing world. When a
    process requests another process to be executed, it can either tell the process
    yes, no, or wait. The medium term scheduler deals with the caveats of moving a
    process from the paused state in memory to the paused state on disk when there
    are too many processes or some process are known to use an insignificant amount
    of CPU cycles. Think about a process that only checks something once an hour.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将进行的一个澄清是，我们的调度将主要处理短期或CPU调度。这意味着我们假设进程已经在内存中并且准备就绪。其他类型的调度是长期和中期。长期调度器充当处理世界的门卫。当一个进程请求执行另一个进程时，它可以告诉进程是、否或等待。中期调度器处理在进程太多或某些进程已知使用很少的CPU周期时，将进程从内存中的暂停状态移动到磁盘上的暂停状态的问题。考虑一个每小时只检查一次的进程。
- en: High Level Scheduler Overview
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 高级调度器概述
- en: Schedulers are pieces of software programs. In fact, you can implement schedulers
    yourself! If you are given a list of commands to exec, a program can schedule
    them them with SIGSTOP and SIGCONT. These are called user space schedulers. Hadoop
    and python’s celery may do some sort of user space scheduling or deal with the
    operating system.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 调度器是软件程序的一部分。实际上，你可以自己实现调度器！如果你被给了一个要执行的命令列表，程序可以使用SIGSTOP和SIGCONT来调度它们。这些被称为用户空间调度器。Hadoop和Python的celery可能进行某种用户空间调度或处理操作系统。
- en: At the operating system level, you generally have this type of flowchart, described
    in words first below. Note, please don’t memorize all the states.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在操作系统级别，你通常会有这种流程图，下面首先用文字描述。请注意，请不要记住所有状态。
- en: New is the initial state. A process has been requested to schedule. All process
    requests come from fork or clone. At this point the operating system knows it
    needs to create a new process.
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 新状态是初始状态。进程已被请求进行调度。所有进程请求都来自fork或clone。此时，操作系统知道它需要创建一个新的进程。
- en: A process moves from the new state to the ready. This means any structs in the
    kernel are allocated. From there, it can go into ready suspended or running.
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一个进程从新状态移动到就绪状态。这意味着内核中的任何结构体都被分配了。从那里，它可以进入就绪挂起或运行状态。
- en: Running is the state that we hope most of our processes are in, meaning they
    are doing useful work. A process could either get preempted, blocked, or terminate.
    Preemption brings the process back to the ready state. If a process is blocked,
    that means it could be waiting on a mutex lock, or it could’ve called sleep –
    either way, it willingly gave up control.
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 运行是我们希望大多数进程所处的状态，意味着它们正在进行有用的工作。进程可能会被抢占、阻塞或终止。抢占将进程返回到就绪状态。如果进程被阻塞，这意味着它可能正在等待互斥锁，或者它可能调用了sleep
    – 无论哪种方式，它都自愿放弃了控制权。
- en: On the blocked state the operating system can either turn the process ready
    or it can go into a deeper state called blocked suspended.
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在阻塞状态下，操作系统可以将进程设置为就绪状态，或者它可以进入一个称为阻塞挂起的更深的状态。
- en: There are so-called deep slumber states called blocked suspended and blocked
    ready. You don’t need to worry about these.
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 存在所谓的深度睡眠状态，称为阻塞挂起和阻塞就绪。您不需要担心这些。
- en: We will try to pick a scheme that decides when a process should move to the
    running state, and when it should be moved back to the ready state. We won’t make
    much mention of how to factor in voluntarily blocked states and when to switch
    to deep slumber states.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将尝试选择一个方案，该方案决定何时将进程移动到运行状态，何时将其移回就绪状态。我们不会过多地提及如何考虑自愿阻塞状态以及何时切换到深度睡眠状态。
- en: Measurements
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 测量
- en: Scheduling affects the performance of the system, specifically the *latency*
    and *throughput* of the system. The throughput might be measured by a system value,
    for example, the I/O throughput - the number of bits written per second, or the
    number of small processes that can complete per unit time. The latency might be
    measured by the response time – elapse time before a process can start to send
    a response – or wait time or turnaround time –the elapsed time to complete a task.
    Different schedulers offer different optimization trade-offs that may be appropriate
    for desired use. There is no optimal scheduler for all possible environments and
    goals. For example, Shortest Job First will minimize total wait time across all
    jobs but in interactive (UI) environments it would be preferable to minimize response
    time at the expense of some throughput, while FCFS seems intuitively fair and
    easy to implement but suffers from the Convoy Effect. Arrival time is the time
    at which a process first arrives at the ready queue, and is ready to start executing.
    If a CPU is idle, the arrival time would also be the starting time of execution.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 调度会影响系统的性能，特别是系统的*延迟*和*吞吐量*。吞吐量可能通过系统值来衡量，例如，I/O吞吐量 - 每秒写入的位数，或者单位时间内可以完成的进程数量。延迟可能通过响应时间来衡量
    – 进程可以开始发送响应之前的时间流逝，或者等待时间或周转时间 – 完成任务的流逝时间。不同的调度器提供不同的优化权衡，这些权衡可能适合预期的使用。没有适用于所有可能环境和目标的最佳调度器。例如，最短作业优先将最小化所有作业的总等待时间，但在交互式（UI）环境中，可能会以牺牲一些吞吐量为代价来最小化响应时间，而先来先服务（FCFS）看起来直观公平且易于实现，但受到车队效应的影响。到达时间是指进程首次到达就绪队列的时间，并准备好开始执行。如果CPU空闲，到达时间也将是执行的开始时间。
- en: What is preemption?
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么是抢占？
- en: Without preemption, processes will run until they are unable to utilize the
    CPU any further. For example the following conditions would remove a process from
    the CPU and the CPU would be available to be scheduled for other processes. The
    process terminates due to a signal, is blocked waiting for concurrency primitive,
    or exits normally. Thus once a process is scheduled it will continue even if another
    process with a high priority appears on the ready queue.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 没有抢占的情况下，进程将一直运行，直到它们无法进一步利用CPU。例如，以下条件将使进程从CPU中移除，CPU将可用于为其他进程进行调度。进程由于信号而终止，被阻塞等待并发原语，或正常退出。因此，一旦进程被调度，即使就绪队列中出现具有高优先级的其他进程，它也将继续执行。
- en: With preemption, the existing processes may be removed immediately if a more
    preferred process is added to the ready queue. For example, suppose at t=0 with
    a Shortest Job First scheduler there are two processes (P1 P2) with 10 and 20
    ms execution times. P1 is scheduled. P1 immediately creates a new process P3,
    with execution time of 5 ms, which is added to the ready queue. Without preemption,
    P3 will run 10ms later (after P1 has completed). With preemption, P1 will be immediately
    evicted from the CPU and instead placed back in the ready queue, and P3 will be
    executed instead by the CPU.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在抢占的情况下，如果将更优先的进程添加到就绪队列，现有的进程可以立即被移除。例如，假设在t=0时，使用最短作业优先调度程序有两个进程（P1 P2），它们的执行时间分别为10毫秒和20毫秒。P1被调度。P1立即创建了一个新的进程P3，其执行时间为5毫秒，该进程被添加到就绪队列。如果没有抢占，P3将在10毫秒后（P1完成后）运行。如果有抢占，P1将立即从CPU中移除，并重新放入就绪队列，然后CPU将执行P3。
- en: Any scheduler that doesn’t use some form of preemption can result in starvation
    because earlier processes may never be scheduled to run (assigned a CPU). For
    example with SJF, longer jobs may never be scheduled if the system continues to
    have many short jobs to schedule. It all depends on the [type of scheduler](https://en.wikipedia.org/wiki/Scheduling_(computing)#Types_of_operating_system_schedulers).
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 任何不使用某种形式的抢占的调度程序都可能因饥饿而受到影响，因为较早的进程可能永远不会被调度运行（分配CPU）。例如，在SJF（最短作业优先）中，如果系统继续有大量的短作业要调度，较长的作业可能永远不会被调度。这完全取决于[调度程序的类型](https://en.wikipedia.org/wiki/Scheduling_(computing)#Types_of_operating_system_schedulers)。
- en: Why might a process (or thread) be placed on the ready queue?
  id: totrans-19
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么一个进程（或线程）可能会被放置在就绪队列上？
- en: 'A process is placed on the ready queue when it can use a CPU. Some examples
    include:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 当一个进程可以使用CPU时，它会被放入就绪队列。一些例子包括：
- en: A process was blocked waiting for a from storage or socket to complete and data
    is now available.
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个进程在等待从存储或套接字完成时被阻塞，现在数据已可用。
- en: A new process has been created and is ready to start.
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 已创建了一个新进程，并准备开始运行。
- en: A process thread was blocked on a synchronization primitive (condition variable,
    semaphore, mutex lock) but is now able to continue.
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个进程线程在同步原语（条件变量、信号量、互斥锁）上被阻塞，但现在能够继续。
- en: A process is blocked waiting for a system call to complete but a signal has
    been delivered and the signal handler needs to run.
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个进程在等待系统调用完成时被阻塞，但已发送了一个信号，信号处理程序需要运行。
- en: Measures of Efficiency
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 效率指标
- en: First some definitions
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，一些定义
- en: is the wall-clock start time of the process (CPU starts working on it)
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 是进程的墙钟开始时间（CPU开始工作）
- en: is the end wall-clock of the process (CPU finishes the process)
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 是进程的结束墙钟时间（CPU完成进程）
- en: is the total amount of CPU time required
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 是完成进程所需的CPU时间总和
- en: is the time the process enters the scheduler (CPU may start working on it)
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 是进程进入调度程序的时间（CPU可能开始工作）
- en: Here are measures of efficiency and their mathematical equations
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是效率指标及其数学方程
- en: is the total time from when the process arrives to when it ends.
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 是从进程到达到它结束的总时间。
- en: is the total latency (time) that it takes from when the process arrives to when
    the CPU actually starts working on it.
  id: totrans-33
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 是从进程到达到CPU实际开始工作的总延迟（时间）。
- en: is the *total* wait time or the total time that a process is on the ready queue.
    A common mistake is to believe it is only the initial waiting time in the ready
    queue. If a CPU intensive process with no I/O takes 7 minutes of CPU time to complete
    but required 9 minutes of wall-clock time to complete we can conclude that it
    was placed on the ready-queue for 2 minutes. For those 2 minutes, the process
    was ready to run but had no CPU assigned. It does not matter when the job was
    waiting, the wait time is 2 minutes.
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 是总等待时间或进程在就绪队列上的总时间。一个常见的错误是认为它只是就绪队列中的初始等待时间。如果一个CPU密集型进程没有I/O操作，需要7分钟的CPU时间来完成，但需要9分钟的墙钟时间来完成，我们可以得出结论，它被放置在就绪队列上2分钟。在这2分钟内，进程准备运行但没有分配到CPU。等待的时间不取决于作业何时等待，等待时间是2分钟。
- en: Convoy Effect
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 队列效应
- en: The convoy effect is when a process takes up a lot of the CPU time, leaving
    all other processes with potentially smaller resource needs following like a Convoy
    Behind them.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 队列效应是指一个进程占据了大量的CPU时间，导致所有其他具有潜在较小资源需求的进程像一支车队一样跟在其后。
- en: Suppose the CPU is currently assigned to a CPU intensive task and there is a
    set of I/O intensive processes that are in the ready queue. These processes require
    a tiny amount of CPU time but they are unable to proceed because they are waiting
    for the CPU-intensive task to be removed from the processor. These processes are
    starved until the CPU bound process releases the CPU. But, the CPU will rarely
    be released. For example, in the case of an FCFS scheduler, we must wait until
    the process is blocked due to an I/O request. The I/O intensive process can now
    finally satisfy their CPU needs, which they can do quickly because their CPU needs
    are small and the CPU is assigned back to the CPU-intensive process again. Thus
    the I/O performance of the whole system suffers through an indirect effect of
    starvation of CPU needs of all processes.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 假设 CPU 当前分配给了一个 CPU 密集型任务，并且有一组 I/O 密集型进程在就绪队列中。这些进程需要很少的 CPU 时间，但它们无法继续执行，因为它们正在等待
    CPU 密集型任务从处理器中移除。这些进程会一直饿着，直到 CPU 密集型进程释放 CPU。但是，CPU 很少会释放。例如，在 FCFS 调度程序的情况下，我们必须等待进程由于
    I/O 请求而被阻塞。现在，I/O 密集型进程终于可以满足它们的 CPU 需求，因为它们的 CPU 需求很小，CPU 又被分配回 CPU 密集型进程。因此，整个系统的
    I/O 性能通过所有进程 CPU 需求的间接饥饿效应而受到影响。
- en: This effect is usually discussed in the context of FCFS scheduler; however,
    a Round Robin scheduler can also exhibit the Convoy Effect for long time-quanta.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这种效应通常在 FCFS 调度程序的情况下讨论；然而，轮转调度程序也可以在长时间量下表现出车队效应。
- en: Scheduling Algorithms
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 调度算法
- en: Unless otherwise stated
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 除非另有说明
- en: 'Process 1: Runtime 1000ms'
  id: totrans-41
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 进程 1：运行时间 1000ms
- en: 'Process 2: Runtime 2000ms'
  id: totrans-42
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 进程 2：运行时间 2000ms
- en: 'Process 3: Runtime 3000ms'
  id: totrans-43
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 进程 3：运行时间 3000ms
- en: 'Process 4: Runtime 4000ms'
  id: totrans-44
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 进程 4：运行时间 4000ms
- en: 'Process 5: Runtime 5000ms'
  id: totrans-45
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 进程 5：运行时间 5000ms
- en: Shortest Job First (SJF)
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 最短作业优先（SJF）
- en: '![Shortest job first scheduling](../media/file37.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![最短作业优先调度](../media/file37.png)'
- en: Shortest job first scheduling
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 最短作业优先调度
- en: 'P1 Arrival: 0ms'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: P1 到达：0ms
- en: 'P2 Arrival: 0ms'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: P2 到达：0ms
- en: 'P3 Arrival: 0ms'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: P3 到达：0ms
- en: 'P4 Arrival: 0ms'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: P4 到达：0ms
- en: 'P5 Arrival: 0ms'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: P5 到达：0ms
- en: The processes all arrive at the start and the scheduler schedules the job with
    the shortest total CPU time. The glaring problem is that this scheduler needs
    to know how long this program will run over time before it ran the program.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 进程都在开始时到达，调度程序按照最短总 CPU 时间调度作业。明显的问题是，这个调度程序需要在运行程序之前知道这个程序将运行多长时间。
- en: 'Technical Note: A realistic SJF implementation would not use the total execution
    time of the process but the burst time or the number of CPU cycles needed to finish
    a program. The expected burst time can be estimated by using an exponentially
    decaying weighted rolling average based on the previous burst time (Silberschatz,
    Galvin, and Gagne [2005](ch018.xhtml#ref-silberschatz2005operating) Chapter 6).
    For this exposition, we will simplify this discussion to use the total running
    time of the process as a proxy for the burst time.'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 技术说明：一个现实的 SJF 实现不会使用进程的总执行时间，而是使用完成程序所需的爆发时间或 CPU 周期数。可以通过使用基于先前爆发时间的指数衰减加权滚动平均来估计预期的爆发时间（Silberschatz，Galvin
    和 Gagne [2005](ch018.xhtml#ref-silberschatz2005operating) 第 6 章）。为了本讨论，我们将简化这个讨论，使用进程的总运行时间作为爆发时间的代理。
- en: '**Advantages**'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '**优点**'
- en: Shorter jobs tend to get run first
  id: totrans-57
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 较短的作业往往先运行
- en: On average wait times and response times are down
  id: totrans-58
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 平均等待时间和响应时间都下降了
- en: '**Disadvantages**'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '**缺点**'
- en: Needs algorithm to be omniscient
  id: totrans-60
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 需要算法具有全知全能
- en: Need to estimate the burstiness of a process which is harder than let’s say
    a computer network
  id: totrans-61
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 需要估计进程的突发性，这比比如说计算机网络更难
- en: Preemptive Shortest Job First (PSJF)
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 预抢占最短作业优先（PSJF）
- en: Preemptive shortest job first is like shortest job first but if a new job comes
    in with a shorter runtime than the total runtime of the current job, it is run
    instead. If it is equal like our example our algorithm can choose. The scheduler
    uses the *total* runtime of the process. If the scheduler wants to compare the
    shortest *remaining* time left, that is a variant of PSJF called Shortest Remaining
    Time First (SRTF).
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 预抢占最短作业优先类似于最短作业优先，但如果有一个新的作业进来，其运行时间比当前作业的总运行时间短，则运行该作业。如果它们相等，就像我们的例子一样，我们的算法可以选择。调度程序使用进程的*总*运行时间。如果调度程序想要比较最短*剩余*时间，那么这就是
    PSJF 的一个变体，称为最短剩余时间优先（SRTF）。
- en: '![Preemptive Shortest Job First scheduling](../media/file38.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![预抢占最短作业优先调度](../media/file38.png)'
- en: Preemptive Shortest Job First scheduling
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 预先抢占最短作业优先调度
- en: P2 at 0ms
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: P2 在 0ms
- en: P1 at 1000ms
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: P1 在 1000ms
- en: P5 at 3000ms
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: P5 在 3000ms
- en: P4 at 4000ms
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: P4 在 4000ms
- en: P3 at 5000ms
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: P3 在 5000ms
- en: Here’s what our algorithm does. It runs P2 because it is the only thing to run.
    Then P1 comes in at 1000ms, P2 runs for 2000ms, so our scheduler preemptively
    stops P2, and let’s P1 run all the way through. This is completely up to the algorithm
    because the times are equal. Then, P5 Comes in – since no processes running, the
    scheduler will run process 5\. P4 comes in, and since the runtimes are equal P5,
    the scheduler stops P5 and runs P4\. Finally, P3 comes in, preempts P4, and runs
    to completion. Then P4 runs, then P5 runs.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是我们的算法所做的工作。它运行 P2，因为它是唯一可以运行的任务。然后 P1 在 1000ms 到达，P2 运行 2000ms，因此我们的调度器会抢占
    P2，让 P1 完全运行。这完全取决于算法，因为时间相同。然后，P5 到达——由于没有正在运行的进程，调度器将运行进程 5。P4 到达，由于运行时间相同，调度器停止
    P5 并运行 P4。最后，P3 到达，抢占 P4，并运行完成。然后 P4 运行，然后 P5 运行。
- en: '**Advantages**'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '**优点**'
- en: Ensures shorter jobs get run first
  id: totrans-73
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确保较短的作业先运行
- en: '**Disadvantages**'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '**缺点**'
- en: Need to know the runtime again
  id: totrans-75
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 需要再次知道运行时间
- en: Context switching and jobs can get interrupted
  id: totrans-76
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 上下文切换和作业可能会被中断
- en: First Come First Served (FCFS)
  id: totrans-77
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 先到先服务（First Come First Served, FCFS）
- en: '![First come first serve scheduling](../media/file39.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![先到先服务调度](../media/file39.png)'
- en: First come first serve scheduling
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 先到先服务调度
- en: P2 at 0ms
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: P2 在 0ms
- en: P1 at 1000ms
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: P1 在 1000ms
- en: P5 at 3000ms
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: P5 在 3000ms
- en: P4 at 4000ms
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: P4 在 4000ms
- en: P3 at 5000ms
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: P3 在 5000ms
- en: Processes are scheduled in the order of arrival. One advantage of FCFS is that
    scheduling algorithm is simple The ready queue is a FIFO (first in first out)
    queue. FCFS suffers from the Convoy effect. Here P2 Arrives, then P1 arrives,
    then P5, then P4, then P3\. You can see the convoy effect for P5.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 进程按照到达顺序进行调度。FCFS 的一个优点是调度算法简单。就绪队列是一个先进先出（FIFO）队列。FCFS 存在车队效应。这里 P2 到达，然后 P1
    到达，然后 P5，然后 P4，然后 P3。你可以看到 P5 的车队效应。
- en: '**Advantages**'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: '**优点**'
- en: Simple algorithm and implementation
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 简单的算法和实现
- en: Context switches infrequent when there are long-running processes
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当存在长时间运行的进程时，上下文切换不频繁
- en: No starvation if all processes are guaranteed to terminate
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果所有进程都保证能够终止，则不会发生饥饿
- en: '**Disadvantages**'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: '**缺点**'
- en: Simple algorithm and implementation
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 简单的算法和实现
- en: Context switches infrequent when there are long-running processes
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当存在长时间运行的进程时，上下文切换不频繁
- en: Round Robin (RR)
  id: totrans-93
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 轮询（Round Robin, RR）
- en: Processes are scheduled in order of their arrival in the ready queue. After
    a small time step though, a running process will be forcibly removed from the
    running state and placed back on the ready queue. This ensures long-running processes
    refrain from starving all other processes from running. The maximum amount of
    time that a process can execute before being returned to the ready queue is called
    the time quanta. As the time quanta approaches to infinity, Round Robin will be
    equivalent to FCFS.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 进程按照它们在就绪队列中的到达顺序进行调度。然而，经过一小段时间步长后，一个正在运行的进程将被强制从运行状态移除并放回就绪队列。这确保了长时间运行的进程不会使其他所有进程无法运行。一个进程在返回就绪队列之前可以执行的最大时间量称为时间量子。当时间量子接近无穷大时，轮询将等同于先到先服务（FCFS）。
- en: '![Round Robin Scheduling](../media/file40.png)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
  zh: '![轮询调度](../media/file40.png)'
- en: Round Robin Scheduling
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 轮询调度
- en: 'P1 Arrival: 0ms'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: P1 到达时间：0ms
- en: 'P2 Arrival: 0ms'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: P2 到达时间：0ms
- en: 'P3 Arrival: 0ms'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: P3 到达时间：0ms
- en: 'P4 Arrival: 0ms'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: P4 到达时间：0ms
- en: 'P5 Arrival: 0ms'
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: P5 到达时间：0ms
- en: Quantum = 1000ms
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 时间量子 = 1000ms
- en: Here all processes arrive at the same time. P1 is run for 1 quantum and is finished.
    P2 for one quantum; then, it is stopped for P3\. After all other processes run
    for a quantum we cycle back to P2 until all the processes are finished.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，所有进程同时到达。P1 运行一个时间量子并完成。P2 运行一个时间量子；然后，它被停止以运行 P3。在所有其他进程运行一个时间量子后，我们回到
    P2，直到所有进程都完成。
- en: '**Advantages**'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: '**优点**'
- en: Ensures some notion of fairness
  id: totrans-105
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确保某种公平性概念
- en: '**Disadvantages**'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: '**缺点**'
- en: Large number of processes = Lots of switching
  id: totrans-107
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 进程数量多 = 切换次数多
- en: Priority
  id: totrans-108
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优先级
- en: Processes are scheduled in the order of priority value. For example, a navigation
    process might be more important to execute than a logging process.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 进程按照优先级值进行调度。例如，导航进程可能比日志进程更重要。
- en: '**If you need a math-y way of comparing scheduling algorithms, please check
    out the appendix and the section conceptually scheduling**'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: '**如果您需要一种数学方法来比较调度算法，请参阅附录和概念性调度部分**'
- en: Topics
  id: totrans-111
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 主题
- en: Scheduling Algorithms
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 调度算法
- en: Measures of Efficiency
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 效率度量
- en: Questions
  id: totrans-114
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 问题
- en: What is scheduling?
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 什么是调度？
- en: What is queueing? What are some different queueing methods?
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 什么是排队？有哪些不同的排队方法？
- en: What is Turnaround Time? Response Time? Wait Time?
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 什么是周转时间？响应时间？等待时间？
- en: What is the convoy effect?
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 什么是编队效应？
- en: Which algorithms have the best turnaround/response/wait time on average?
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 哪些算法的平均周转时间/响应时间/等待时间表现最好？
- en: Do preemptive algorithms do better on average response time compared to non
    preemptive? How about turnaround/wait time?
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与非抢占式算法相比，抢占式算法在平均响应时间上表现更好吗？周转时间/等待时间又如何？
