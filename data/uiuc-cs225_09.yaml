- en: Description
  id: totrans-5
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 描述
- en: AVL Trees are self-balancing binary search trees that allow you to store and
    query data in logarithmic time. They maintain a logarithmic height so that functions
    like `find` and `insert` take logarithmic time. Whenever any node has an *imbalance*
    of *2 or greater*, the tree performs rotations to rebalance.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: AVL树是自平衡的二叉搜索树，允许你在对数时间内存储和查询数据。它们保持对数高度，以便`find`和`insert`等函数的对数时间。每当任何节点有*2或更大的*不平衡时，树就会执行旋转以重新平衡。
- en: The *imbalance* of a node in a binary tree is defined as the height difference
    between its two subtrees.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 二叉树中节点的*不平衡*定义为它的两个子树之间的高度差。
- en: If an AVL tree has multiple imbalanced nodes, it will rebalance the nodes from
    the lowest level to the highest.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 如果AVL树有多个不平衡节点，它将从最低级别到最高级别重新平衡节点。
