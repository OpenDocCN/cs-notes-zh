- en: Some Notation
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一些符号
- en: '![](../Images/9553206848c42b0490b55ec340e0c38b.png)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9553206848c42b0490b55ec340e0c38b.png)'
- en: Nodes in a tree can have a `parent` and/or `children`
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 树中的节点可以有`父节点`和/或`子节点`
- en: '![](../Images/7622f43537d941dabc475dd35fb24562.png)'
  id: totrans-6
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7622f43537d941dabc475dd35fb24562.png)'
- en: The top node is called the `root`. Nodes with no children are `leaves`. All
    other nodes are `internal`. The `height` of a tree is one less than the number
    of levels. For example, an empty tree has height `-1` and a tree with just the
    root has height `0`
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 顶部的节点被称为`根`。没有子节点的节点是`叶子`。所有其他节点是`内部节点`。树的高度比层数少一。例如，空树的高度是`-1`，只有一个根的树的高度是`0`
- en: '![](../Images/0bfdfa057c3ea9a2d3e875e638cf14e5.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0bfdfa057c3ea9a2d3e875e638cf14e5.png)'
- en: This is a 4-ary tree. An `n`-ary has a maximum of `n` children among all of
    its nodes. In this course, we mainly study 2-ary (binary) trees, which are trees
    with at most 2 children per node
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个4叉树。一个`n`叉树在其所有节点中最多有`n`个子节点。在本课程中，我们主要研究2叉树（二叉树），即每个节点最多有两个子节点的树
- en: Traversals
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 遍历
- en: 'Since nodes in a tree can have multiple children, there are multiple ways of
    traversing trees. Here we discuss three main traversals:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 由于树中的节点可以有多个子节点，因此有多种遍历树的方法。在这里，我们讨论三种主要的遍历方式：
- en: '`Preorder`: Visit the **current node**, then recursively preorder traverse
    on the **left subtree** and **right subtree**'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`前序遍历`：访问**当前节点**，然后递归地前序遍历**左子树**和**右子树**'
- en: '`Inorder`: Recursively inorder traverse on the **left subtree**, then visit
    the **current node**, and then recursively inorder traverse on the **right subtree**'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`中序遍历`：递归地中序遍历**左子树**，然后访问**当前节点**，然后递归地中序遍历**右子树**'
- en: '`Postorder`: Recursively postorder traverse on the **left subtree** and **right
    subtree**, and then visit the **current node**'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`后序遍历`：递归地后序遍历**左子树**和**右子树**，然后访问**当前节点**'
- en: '![](../Images/e0e1fac909f8cbdf6c1302066dcb4eeb.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e0e1fac909f8cbdf6c1302066dcb4eeb.png)'
- en: '`Preorder`, `Inorder`, and `Postorder` traversals of a tree'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 树的`前序遍历`、`中序遍历`和`后序遍历`
- en: Types of Trees
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 树的类型
- en: '**Perfect**![](../Images/5dcb8b00ff4198644349c317c429a8ad.png)'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '**完美**![图片](../Images/5dcb8b00ff4198644349c317c429a8ad.png)'
- en: Every level is completely filled
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 每一层都是完全填充的
- en: '**Complete**![](../Images/1682b4e574ef9d0526aacc67722b01a7.png)'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '**完全**![图片](../Images/1682b4e574ef9d0526aacc67722b01a7.png)'
- en: Every level except for the last is completely filled, and in the last level
    all the nodes are pushed to the left as much as possible
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 除了最后一层之外，每一层都是完全填充的，在最后一层，所有节点尽可能向左移动
- en: '**Full**![](../Images/3de54dade0c3c8f858380c06ca201c07.png)'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '**完整**![图片](../Images/3de54dade0c3c8f858380c06ca201c07.png)'
- en: Every node either has no children or the maxmimum number of children possible
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 每个节点要么没有子节点，要么有最大数量的子节点
