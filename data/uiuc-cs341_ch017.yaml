- en: Appendix
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 附录
- en: Shell
  id: totrans-1
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Shell
- en: A shell is actually how you are going to be interacting with the system. Before
    user-friendly operating systems, when a computer started up all you had access
    to was a shell. This meant that all of your commands and editing had to be done
    this way. Nowadays, our computers boot up in desktop mode, but one can still access
    a shell using a terminal.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，shell是您与系统交互的方式。在用户友好的操作系统出现之前，当计算机启动时，您所能访问的只有shell。这意味着您所有的命令和编辑都必须以这种方式完成。如今，我们的计算机以桌面模式启动，但您仍然可以通过终端访问shell。
- en: '[PRE0]'
  id: totrans-3
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: It is ready for your next command! You can type in a lot of Unix utilities like
    , and the shell will execute them and give you the result. Some of these are what
    are known as meaning that the code is in the shell program itself. Some of these
    are compiled programs that you run. The shell only looks through a special variable
    called path which contains a list of colon separated paths to search for an executable
    with your name, here is an example path.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 它已准备好接收您的下一个命令！您可以在shell中输入许多Unix工具，如`ls`和`grep`，shell将执行它们并给出结果。其中一些是所谓的内建命令，即代码在shell程序本身中。还有一些是编译后的程序，您运行它们。shell只通过一个名为path的特殊变量进行查找，该变量包含一系列以冒号分隔的路径，用于搜索具有您名称的可执行文件，以下是一个示例路径。
- en: '[PRE1]'
  id: totrans-5
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: So when the shell executes , it looks through all of those directories, finds
    and executes that.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，当shell执行`.`时，它会遍历所有这些目录，找到并执行它。
- en: '[PRE2]'
  id: totrans-7
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: You can always call through the full path. That is always why in past classes
    if you want to run something on the terminal you’ve had to do because typically
    the directory that you are working in is not in the variable. The expands to your
    current directory and your shell executes which is a valid command.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 您始终可以通过完整路径来调用。这就是为什么在过去的课程中，如果您想在终端上运行某些东西，您通常必须这样做，因为您正在工作的目录通常不在变量中。`.`代表您的当前目录，而shell执行的是一条有效命令。
- en: Shell tricks and tips
  id: totrans-9
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Shell技巧和提示
- en: The up arrow will get you your most recent command
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 上箭头会获取您最近的命令
- en: will search commands that you previously ran
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将搜索您之前运行的命令
- en: will interrupt your shell’s process
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将中断您的shell进程
- en: will execute the last command
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将执行最后一条命令
- en: goes back that many commands and runs that
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 回退那么多命令并运行它们
- en: runs the last command that has that prefix
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 运行具有该前缀的最后一条命令
- en: is the last arg of the previous command
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是上一个命令的最后一个参数
- en: is all args of the previous command
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是上一个命令的所有参数
- en: takes the last command and substitutes the pattern pat for the substitution
    sub
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将最后一个命令中的模式`pat`替换为替换`sub`
- en: goes to the previous directory
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 进入上一个目录
- en: pushes the current directory on a stack and cds
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将当前目录推送到栈上并`cds`
- en: cds to the directory at the top of the stack
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`cds`到栈顶的目录'
- en: What’s a terminal?
  id: totrans-22
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么是终端？
- en: A terminal is an application that displays the output from the shell. You can
    have your default terminal, a quake based terminal, terminator, the options are
    endless!
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 终端是一个显示shell输出的应用程序。您可以使用默认的终端、基于quake的终端、terminator等，选项无穷无尽！
- en: Common Utilities
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 常用工具
- en: concatenate multiple files. It is regularly used to print out the contents of
    a file to the terminal but the original use was concatenation.
  id: totrans-25
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 连接多个文件。它通常用于将文件内容打印到终端，但其原始用途是连接。
- en: '[PRE3]'
  id: totrans-26
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE3]'
- en: tells you the difference between the two files. If nothing is printed, then
    zero is returned meaning the files are the same byte for byte. Otherwise, the
    longest common subsequence difference is printed
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 告诉您两个文件之间的差异。如果没有打印任何内容，则返回零，表示文件在每个字节上都是相同的。否则，将打印出最长公共子序列的差异。
- en: '[PRE4]'
  id: totrans-28
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE4]'
- en: tells you which lines in a file or standard input match a POSIX pattern.
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 告诉您文件或标准输入中的哪些行与POSIX模式匹配。
- en: '[PRE5]'
  id: totrans-30
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE5]'
- en: tells you which files are in the current directory.
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 告诉您当前目录中有哪些文件。
- en: this is a shell builtin but it changes to a relative or absolute directory
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 这是一个shell内建命令，但它会改变到相对或绝对目录
- en: '[PRE6]'
  id: totrans-33
  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE6]'
- en: every system programmers favorite command tells you more about all your favorite
    functions!
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 每个系统程序员的 favorite 命令会告诉您更多关于您所有 favorite 函数的信息！
- en: executes programs according to a makefile.
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 根据makefile执行程序。
- en: Syntactic
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 语法
- en: Shells have many useful utilities like saving some output to a file using redirection
    . This overwrites the file from the beginning. If you only meant to append to
    the file, you can use . Unix also allows file descriptor swapping. This means
    that you can take the output going to one file descriptor and make it seem like
    it’s coming out of another. The most common one is which means take the stderr
    and make it seem like it is coming out of standard out. This is important because
    when you use and they only write the standard output of the file. There are some
    examples below.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 壳有很多有用的工具，比如使用重定向将一些输出保存到文件。这会从文件开头覆盖文件。如果你只想追加到文件，你可以使用。Unix还允许文件描述符交换。这意味着你可以将一个文件描述符的输出取走，并使其看起来像是从另一个文件描述符输出的。最常见的一个是，这意味着取走stderr并使其看起来像是从标准输出输出的。这很重要，因为当你使用时，它们只写入文件的标准输出。下面有一些例子。
- en: '[PRE7]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The pipe operator has a fascinating history. The UNIX philosophy is writing
    small programs and chaining them together to do new and interesting things. Back
    in the early days, hard disk space was limited and write times were slow. Brian
    Kernighan wanted to maintain the philosophy while omitting intermediate files
    that take up hard drive space. So, the UNIX pipe was born. A pipe takes the of
    the program on its left and feeds it to the of the program on its write. Consider
    the command . It can be used as a replacement for the redirection operators because
    tee will both write to a file and output to standard out. It also has the added
    benefit that it doesn’t need to be the last command in the list. Meaning, that
    you can write an intermediate result and continue your piping.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 管道运算符有着迷人的历史。UNIX哲学是编写小的程序并将它们连接起来以完成新的和有趣的事情。在早期，硬盘空间有限，写入速度慢。Brian Kernighan想要保持这种哲学，同时省略掉占用硬盘空间的中间文件。因此，UNIX管道应运而生。管道将左侧程序的输出取走并喂给右侧程序的输入。考虑命令
    `ls | grep file`。它可以作为重定向运算符的替代品，因为tee会同时写入文件并输出到标准输出。它还有额外的优点，即它不需要是列表中的最后一个命令。这意味着，你可以写入一个中间结果并继续你的管道操作。
- en: '[PRE8]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: The and operator are operators that execute a command sequentially. only executes
    a command if the previous command succeeds, and always executes the next command.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '`&&` 和 `||` 是按顺序执行命令的运算符。`&&` 只有在之前的命令成功时才会执行命令，并且总是执行下一个命令。'
- en: '[PRE9]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: What are environment variables?
  id: totrans-43
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 环境变量是什么？
- en: Each process gets its own dictionary of environment variables that are copied
    over to the child. Meaning, if the parent changes their environment variables
    it won’t be transferred to the child and vice versa. This is important in the
    fork-exec-wait trilogy if you want to exec a program with different environment
    variables than your parent (or any other process).
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 每个进程都有自己的环境变量字典，这些变量会被复制到子进程中。这意味着，如果父进程更改了它们的变量，这些变量不会传递给子进程，反之亦然。这在fork-exec-wait三部曲中很重要，如果你想要以与父进程（或任何其他进程）不同的环境变量执行程序。
- en: For example, you can write a C program that loops through all of the time zones
    and executes the command to print out the date and time in all locals. Environment
    variables are used for all sorts of programs so modifying them is important.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，你可以编写一个C程序，遍历所有时区并执行打印所有本地日期和时间的命令。环境变量被用于各种程序，因此修改它们很重要。
- en: Struct packing
  id: totrans-46
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 结构打包
- en: Structs may require something called [padding](http://www.catb.org/esr/structure-packing/)
    (tutorial). **We do not expect you to pack structs in this course, know that compilers
    perform it**. This is because in the early days (and even now) loading an address
    in memory happens in 32-bit or 64-bit blocks. This also meant requested addresses
    had to be multiples of block sizes.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 结构可能需要一种叫做[填充](http://www.catb.org/esr/structure-packing/)（教程）的东西。**我们并不期望你在本课程中打包结构，但要知道编译器会执行它**。这是因为早期（甚至现在）在内存中加载地址是在32位或64位块中发生的。这也意味着请求的地址必须是块大小的倍数。
- en: '[PRE10]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: You think the picture looks like this. One box is four bytes.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 你认为图片看起来像这样。一个盒子是四个字节。
- en: '![Six box struct](../media/file45.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![六个盒子的结构](../media/file45.png)'
- en: Six box struct
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 六个盒子的结构
- en: '[fig:clean_struct]'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '[图：clean_struct]'
- en: 'However, with struct packing, it would conceptually look like this:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，使用结构打包，从概念上看起来是这样的：
- en: '[PRE11]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Visually, we’d add two extra boxes to our diagram
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 从视觉上看，我们会在我们的图中添加两个额外的盒子
- en: '![Eight box struct, two boxes of slop](../media/file46.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![八个盒子的结构，两个盒子的冗余](../media/file46.png)'
- en: Eight box struct, two boxes of slop
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 八个盒子的结构，两个盒子的冗余
- en: '[fig:sloppy_struct]'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '[图：sloppy_struct]'
- en: This padding is common on a 64-bit system. Other time, a processor supports
    unaligned access, leaving the compiler able to pack structs. What does this mean?
    We can have a variable start at a non-64-bit boundary. The processor will figure
    out the rest. To enable this, set an attribute.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 这种填充在64位系统上很常见。在其他时候，如果处理器支持非对齐访问，那么编译器就可以打包结构体。这意味着什么？我们可以让变量从一个非64位边界开始。处理器将处理其余部分。为了启用此功能，设置一个属性。
- en: '[PRE12]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Now our figure will look like the clean struct as in figure [[fig:clean_struct]](ch017.xhtml#fig:clean_struct)
    But now, every time the processor needs to access or , two memory accesses are
    required. A possible alternative is to reorder the struct.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们的图将看起来像图[[fig:clean_struct]](ch017.xhtml#fig:clean_struct)中的干净结构体。但现在，每次处理器需要访问或时，都需要两次内存访问。一个可能的替代方案是重新排序结构体。
- en: '[PRE13]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Stack Smashing
  id: totrans-63
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 栈溢出
- en: Each thread uses a stack memory. The stack ‘grows downwards’ - if a function
    calls another function, then the stack is extended to smaller memory addresses.
    Stack memory includes non-static automatic (temporary) variables, parameter values,
    and the return address. If a buffer is too small some data (e.g. input values
    from the user), then there is a real possibility that other stack variables and
    even the return address will be overwritten. The precise layout of the stack’s
    contents and order of the automatic variables is architecture and compiler dependent.
    With a little investigative work, we can learn how to deliberately smash the stack
    for a particular architecture.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 每个线程使用一个栈内存。栈‘向下增长’ - 如果一个函数调用另一个函数，那么栈就会扩展到较小的内存地址。栈内存包括非静态自动（临时）变量、参数值和返回地址。如果缓冲区太小，某些数据（例如用户输入的值），那么其他栈变量甚至返回地址被覆盖的可能性是真实的。栈内容的精确布局和自动变量的顺序取决于架构和编译器。通过一点调查工作，我们可以了解如何故意针对特定架构破坏栈。
- en: The example below demonstrates how the return address is stored on the stack.
    For a particular 32 bit architecture [Live Linux Machine](http://cs-education.github.io/sys/),
    we determine that the return address is stored at an address two pointers (8 bytes)
    above the address of the automatic variable. The code deliberately changes the
    stack value so that when the input function returns, rather than continuing on
    inside the main method, it jumps to the exploit function instead.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的示例演示了返回地址是如何存储在栈上的。对于特定的32位架构[Live Linux Machine](http://cs-education.github.io/sys/)，我们确定返回地址存储在自动变量地址之上的两个指针（8字节）位置。代码故意更改栈值，以便当输入函数返回时，而不是在主方法内部继续执行，它将跳转到漏洞函数。
- en: '[PRE14]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: There are [a lot](https://en.wikipedia.org/wiki/Stack_buffer_overflow) of ways
    that computers tend to get around this.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 计算机绕过这种限制的方法有很多种。
- en: Compiling and Linking
  id: totrans-68
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 编译和链接
- en: This is a high-level overview from the time you compile your program to the
    time you run your program. We often know that compiling your program is easy.
    You run the program through an IDE or a terminal, and it just works.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 这是从你编译程序到运行程序的高层次概述。我们通常知道编译程序是容易的。你通过IDE或终端运行程序，它就正常工作了。
- en: '[PRE15]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: Here are the rough stages of compiling for gcc.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是使用gcc编译的粗略阶段。
- en: 'Preprocessing: The preprocessor expands all preprocesor directives.'
  id: totrans-72
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 预处理：预处理器扩展所有预处理指令。
- en: 'Parsing: The compiler parses the text file for function declarations, variable
    declarations, etc.'
  id: totrans-73
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解析：编译器解析文本文件以查找函数声明、变量声明等。
- en: 'Assembly Generation: The compiler then generates assembly code for all the
    functions after some optimizations if enabled.'
  id: totrans-74
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 生成汇编代码：如果启用了优化，编译器随后为所有函数生成汇编代码。
- en: 'Assembling: The assembler turns the assembly into 0s and 1s and creates an
    object file. This object file maps names to pieces of code.'
  id: totrans-75
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 汇编：汇编器将汇编代码转换为0和1，并创建一个目标文件。这个目标文件将名称映射到代码片段。
- en: 'Static Linking: The linker then takes a series of objects and static libraries
    and resolves references of variables and functions from one object file to another.
    The linker then finds the main method and makes that the entry point for the function.
    The linker also notices when a function is meant to be dynamically linked. The
    compiler also creates a section in the executable that tells the operating system
    that these functions need addresses right before running.'
  id: totrans-76
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 静态链接：链接器随后会处理一系列对象和静态库，并解决从一个对象文件到另一个对象文件的变量和函数引用。链接器接着找到主方法，将其作为函数的入口点。链接器还会注意到某个函数打算进行动态链接。编译器还会在可执行文件中创建一个部分，告诉操作系统这些函数在运行前需要地址。
- en: 'Dynamic Linking: As the program is getting ready to be executed, the operating
    system looks at what libraries that the program needs and links those functions
    to the dynamic library.'
  id: totrans-77
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 动态链接：当程序准备执行时，操作系统会查看程序需要的库，并将这些函数链接到动态库中。
- en: The program is run.
  id: totrans-78
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 程序开始运行。
- en: Further classes will teach you about parsing and assembly – preprocessing is
    an extension of parsing. Most classes won’t teach you about the two different
    types of linking though. Static linking a library is similar to combining object
    files. To create a static library, a compiler combines different object files
    to create one executable. A static library is literally is an archive of object
    files. These libraries are useful when you want your executable to be secure,
    you know all the code that is being included into your executable, and portable,
    all the code is bundled with your executable meaning no additional installs.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 以后的课程将教你关于解析和汇编——预处理是解析的扩展。大多数课程不会教你关于两种不同类型的链接。静态链接库类似于合并对象文件。要创建静态库，编译器将不同的对象文件组合成一个可执行文件。静态库实际上是对象文件的归档。这些库在你希望可执行文件安全、你知道被包含到可执行文件中的所有代码，以及可移植时很有用，这意味着所有代码都捆绑到你的可执行文件中，不需要额外安装。
- en: The other type is a dynamic library. Typically, dynamic libraries are installed
    user-wide or system-wide and are accessible by most programs. Dynamic libraries’
    functions are filled in right before they are run. There are a number of benefits
    to this.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种类型是动态库。通常，动态库是在用户范围或系统范围内安装的，并且大多数程序都可以访问。动态库的函数在运行前填充。这种方式有许多好处。
- en: Lower code footprint for common libraries like the C standard library
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于像C标准库这样的常用库，代码占用空间更小。
- en: Late binding means more generalized code and less reliance on specific behavior.
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 晚期绑定意味着更通用的代码和更少依赖于特定行为。
- en: Differentiation means that the shared library can be updated while keeping the
    executable the same.
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 区分意味着在保持可执行文件不变的情况下，可以更新共享库。
- en: There are a number of drawbacks as well.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 同时也存在一些缺点。
- en: All the code is no longer bundled into your program. This means that users have
    to install something else.
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 所有代码不再捆绑到你的程序中。这意味着用户必须安装其他东西。
- en: There could be security flaws in the other code leading to security exploits
    in your program.
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 其他代码中可能存在安全漏洞，导致你的程序出现安全漏洞。
- en: Standard Linux allows you to "replace" dynamic libraries, leading to possible
    social engineering attacks.
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 标准Linux允许你“替换”动态库，这可能导致可能的社会工程攻击。
- en: This adds additional complexity to your application. Two identical binaries
    with different shared libraries could lead to different results.
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这给应用程序增加了额外的复杂性。两个具有不同共享库的二进制文件可能会导致不同的结果。
- en: Explanation of the Fork-FILE Problem
  id: totrans-89
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 关于Fork-FILE问题的解释
- en: To parse the [POSIX documentation](http://pubs.opengroup.org/onlinepubs/9699919799.2008edition/functions/V2_chap02.html),
    we’ll have to go deep into the terminology. The sentence that sets the expectation
    is the following
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 要解析[POSIX文档](http://pubs.opengroup.org/onlinepubs/9699919799.2008edition/functions/V2_chap02.html)，我们必须深入研究术语。设定期望的句子如下
- en: The result of function calls involving any one handle (the "active handle")
    is defined elsewhere in this volume of POSIX.1-2008, but if two or more handles
    are used, and any one of them is a stream, the application shall ensure that their
    actions are coordinated as described below. If this is not done, the result is
    undefined.
  id: totrans-91
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 函数调用涉及任何单个句柄（“活动句柄”）的结果在本卷POSIX.1-2008的其他地方定义，但如果使用两个或更多句柄，并且其中任何一个是一个流，则应用程序应确保它们的行为协调，如下所述。如果没有这样做，结果是不确定的。
- en: What this means is that if we don’t follow POSIX to the letter when using two
    file descriptors that refer to the same description across processes, we get undefined
    behavior. To be technical, the file descriptor must have a “position” meaning
    that it needs to have a beginning and an end like a file, not like an arbitrary
    stream of bytes. POSIX then goes on to introduce the idea of an active handle,
    where a handle may be a file descriptor or a pointer. File handles don’t have
    a flag called “active”. An active file descriptor is one that is currently being
    used for reading and writing and other operations (such as ). The standard says
    that before a that the *application* or your code must execute a series of steps
    to prepare the state of the file. In simplified terms, the descriptor needs to
    be closed, flushed, or read to its entirety – the gory details are explained later.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着，如果我们使用两个文件描述符时没有完全遵循 POSIX 规范，而这些文件描述符跨进程引用相同的描述符，那么我们得到的是未定义的行为。从技术角度讲，文件描述符必须有一个“位置”的含义，这意味着它需要有一个开始和结束，就像文件一样，而不是像任意字节流一样。POSIX
    然后引入了活动句柄的概念，其中句柄可以是文件描述符或指针。文件句柄没有名为“活动”的标志。一个活动文件描述符是指当前正在用于读取、写入和其他操作（如）的文件描述符。标准指出，在执行之前，*应用程序*或您的代码必须执行一系列步骤来准备文件的状态。用简单的话说，描述符需要关闭、刷新或读取到其全部内容——详细的细节将在后面解释。
- en: For a handle to become the active handle, the application shall ensure that
    the actions below are performed between the last use of the handle (the current
    active handle) and the first use of the second handle (the future active handle).
    The second handle then becomes the active handle. All activity by the application
    affecting the file offset on the first handle shall be suspended until it again
    becomes the active file handle. (If a stream function has as an underlying function
    one that affects the file offset, the stream function shall be considered to affect
    the file offset.)
  id: totrans-93
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 为了使句柄变为活动句柄，应用程序应确保在句柄的最后一次使用（当前活动句柄）和第二次句柄（未来的活动句柄）的第一次使用之间执行以下操作。然后第二个句柄变为活动句柄。在第一个句柄再次成为活动文件句柄之前，应用程序影响第一个句柄上的文件偏移量的所有活动都应暂停。（如果流函数的底层函数会影响文件偏移量，则流函数应被视为影响文件偏移量。）
- en: Summarizing as if two file descriptors are actively being used, the behavior
    is undefined. The other note is that after a fork, the library code must prepare
    the file descriptor as if the other process were to make the file active at any
    time. The last bullet point concerns itself with how a process prepares a file
    descriptor in our case.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，如果两个文件描述符正在被积极使用，其行为是未定义的。另一个注意事项是，在 fork 之后，库代码必须将文件描述符准备成好像其他进程可能在任何时间将其激活一样。最后一个要点关注的是在我们的情况下，进程如何准备文件描述符。
- en: If the stream is open with a mode that allows reading and the underlying open
    file description refers to a device that is capable of seeking, the application
    shall either perform an fflush(), or the stream shall be closed.
  id: totrans-95
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果流以允许读取的模式打开，并且底层打开的文件描述符引用的设备能够进行定位，则应用程序必须执行 fflush()，或者关闭流。
- en: The documentation says that the child needs to perform an fflush or close the
    stream because the file descriptor needs to be prepared in case the parent process
    needs to make it active. glibc is in a no-win situation if it closes a file descriptor
    that the parent may expect to be open, so it’ll opt for the fflush on exit because
    exit in POSIX terminology counts as accessing a file. That means that for our
    parent process, this clause gets triggered.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 文档说明，子进程需要执行一个 fflush 或关闭流，因为文件描述符需要准备，以防父进程需要使其活跃。如果 glibc 关闭了父进程可能期望保持打开的文件描述符，那么它将陷入一个无法赢的局面，因此它会在退出时选择执行
    fflush，因为在 POSIX 术语中，退出被视为访问文件。这意味着对于我们的父进程，这个条款会被触发。
- en: If any previous active handle has been used by a function that explicitly changed
    the file offset, except as required above for the first handle, the application
    shall perform an lseek() or fseek() (as appropriate to the type of handle) to
    an appropriate location.
  id: totrans-97
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果任何先前活动句柄已被一个明确更改文件偏移量的函数使用，除了如上所述为第一个句柄所要求之外，应用程序应执行 lseek() 或 fseek()（根据句柄类型适当选择）到适当的位置。
- en: Since the child calls fflush and the parent didn’t prepare, the operating system
    chooses to where the file gets reset. Different file systems will do different
    things which are supported by the standard. The OS may look at modification times
    and conclude that the file hasn’t changed so no resets are needed or may conclude
    that exit denotes a change and needs to rewind the file back to the beginning.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 由于孩子调用了 fflush 而父进程没有准备，操作系统会选择将文件重置的位置。不同的文件系统会执行不同的操作，这些操作都得到了标准的支持。操作系统可能会查看修改时间并得出结论，文件没有变化，因此不需要重置，或者得出退出表示变化的结论，需要将文件回滚到开始位置。
- en: Banker’s Algorithm
  id: totrans-99
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 银行家算法
- en: 'We can start with a single resource Banker’s Algorithm. Consider a banker,
    who has a finite amount of money. With a finite amount of money, she wants to
    make loans and eventually get her money back. Let’s say that we have a set of
    <semantics><mi>n</mi><annotation encoding="application/x-tex">n</annotation></semantics>
    people where each of them has a set amount or a limit <semantics><msub><mi>a</mi><mi>i</mi></msub><annotation
    encoding="application/x-tex">a_i</annotation></semantics> (<semantics><mi>i</mi><annotation
    encoding="application/x-tex">i</annotation></semantics> being the <semantics><mi>i</mi><annotation
    encoding="application/x-tex">i</annotation></semantics>th process) that they need
    to obtain before they can do any work. The banker keeps track of how much she
    has given to each person <semantics><msub><mi>l</mi><mi>i</mi></msub><annotation
    encoding="application/x-tex">l_i</annotation></semantics>. She maintains an amount
    of money <semantics><mi>p</mi><annotation encoding="application/x-tex">p</annotation></semantics>
    with her, at all times. For people to request money, they do the following: Consider
    the state of the system <semantics><mrow><mo stretchy="false" form="prefix">(</mo><mi>A</mi><mo>=</mo><mo
    stretchy="false" form="prefix">{</mo><msub><mi>a</mi><mn>1</mn></msub><mo>,</mo><msub><mi>a</mi><mn>2</mn></msub><mo>,</mo><mi>.</mi><mi>.</mi><mi>.</mi><mo
    stretchy="false" form="postfix">}</mo><mo>,</mo><msub><mi>L</mi><mi>t</mi></msub><mo>=</mo><mo
    stretchy="false" form="prefix">{</mo><msub><mi>l</mi><mrow><mi>t</mi><mo>,</mo><mn>1</mn></mrow></msub><mo>,</mo><msub><mi>l</mi><mrow><mi>t</mi><mo>,</mo><mn>2</mn></mrow></msub><mo>,</mo><mi>.</mi><mi>.</mi><mi>.</mi><mo
    stretchy="false" form="postfix">}</mo><mo>,</mo><mi>p</mi><mo stretchy="false"
    form="postfix">)</mo></mrow><annotation encoding="application/x-tex">(A=\{a_1,
    a_2, ...\}, L_t=\{l_{t,1}, l_{t,2}, ...\}, p)</annotation></semantics> at time
    <semantics><mi>t</mi><annotation encoding="application/x-tex">t</annotation></semantics>.
    A precondition is that we have <semantics><mrow><mi>p</mi><mo>≥</mo><mi>m</mi><mi>i</mi><mi>n</mi><mo
    stretchy="false" form="prefix">(</mo><mi>A</mi><mo stretchy="false" form="postfix">)</mo></mrow><annotation
    encoding="application/x-tex">p \geq min(A)</annotation></semantics>, or we have
    enough money to suit at least one person. Also, each person will work for a finite
    period and give back our money.'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以从单个资源银行家算法开始。考虑一个银行家，她拥有有限数量的金钱。拥有有限数量的金钱，她想要发放贷款并最终收回她的钱。假设我们有一组 <semantics><mi>n</mi><annotation
    encoding="application/x-tex">n</annotation></semantics> 个人，其中每个人都需要获得一定数量的或限制的
    <semantics><msub><mi>a</mi><mi>i</mi></msub><annotation encoding="application/x-tex">a_i</annotation></semantics>
    (<semantics><mi>i</mi><annotation encoding="application/x-tex">i</annotation></semantics>
    是第 <semantics><mi>i</mi><annotation encoding="application/x-tex">i</annotation></semantics>
    个进程) 才能开始工作。银行家跟踪她给每个人的金额 <semantics><msub><mi>l</mi><mi>i</mi></msub><annotation
    encoding="application/x-tex">l_i</annotation></semantics>。她始终保留一定数量的金钱 <semantics><mi>p</mi><annotation
    encoding="application/x-tex">p</annotation></semantics>。人们为了请求金钱，会执行以下操作：考虑系统在时间
    <semantics><mi>t</mi><annotation encoding="application/x-tex">t</annotation></semantics>
    的状态 <semantics><mrow><mo stretchy="false" form="prefix">(</mo><mi>A</mi><mo>=</mo><mo
    stretchy="false" form="prefix">{</mo><msub><mi>a</mi><mn>1</mn></msub><mo>,</mo><msub><mi>a</mi><mn>2</mn></msub><mo>,</mo><mi>.</mi><mi>.</mi><mi>.</mi><mo
    stretchy="false" form="postfix">}</mo><mo>,</mo><msub><mi>L</mi><mi>t</mi></msub><mo>=</mo><mo
    stretchy="false" form="prefix">{</mo><msub><mi>l</mi><mrow><mi>t</mi><mo>,</mo><mn>1</mn></mrow></msub><mo>,</mo><msub><mi>l</mi><mrow><mi>t</mi><mo>,</mo><mn>2</mn></mrow></msub><mo>,</mo><mi>.</mi><mi>.</mi><mi>.</mi><mo
    stretchy="false" form="postfix">}</mo><mo>,</mo><mi>p</mi><mo stretchy="false"
    form="postfix">)</mo></mrow><annotation encoding="application/x-tex">(A=\{a_1,
    a_2, ...\}, L_t=\{l_{t,1}, l_{t,2}, ...\}, p)</annotation></semantics>。一个先决条件是，我们拥有
    <semantics><mrow><mi>p</mi><mo>≥</mo><mi>m</mi><mi>i</mi><mi>n</mi><mo stretchy="false"
    form="prefix">(</mo><mi>A</mi><mo stretchy="false" form="postfix">)</mo></mrow><annotation
    encoding="application/x-tex">p \geq min(A)</annotation></semantics>，或者我们有足够的钱来满足至少一个人。此外，每个人将工作一段有限的时间并归还我们的钱。
- en: A person <semantics><mi>j</mi><annotation encoding="application/x-tex">j</annotation></semantics>
    requests <semantics><mi>m</mi><annotation encoding="application/x-tex">m</annotation></semantics>
    from me
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个人 <semantics><mi>j</mi><annotation encoding="application/x-tex">j</annotation></semantics>
    向我请求 <semantics><mi>m</mi><annotation encoding="application/x-tex">m</annotation></semantics>。
- en: if <semantics><mrow><mi>m</mi><mo>≥</mo><mi>p</mi></mrow><annotation encoding="application/x-tex">m
    \geq p</annotation></semantics>, they are denied.
  id: totrans-102
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果 <semantics><mrow><mi>m</mi><mo>≥</mo><mi>p</mi></mrow><annotation encoding="application/x-tex">m
    \geq p</annotation></semantics>，他们将被拒绝。
- en: if <semantics><mrow><mi>m</mi><mo>+</mo><msub><mi>l</mi><mi>j</mi></msub><mo>></mo><msub><mi>a</mi><mi>i</mi></msub></mrow><annotation
    encoding="application/x-tex">m + l_j > a_i</annotation></semantics> they are denied
  id: totrans-103
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果 <semantics><mrow><mi>m</mi><mo>+</mo><msub><mi>l</mi><mi>j</mi></msub><mo>></mo><msub><mi>a</mi><mi>i</mi></msub></mrow><annotation
    encoding="application/x-tex">m + l_j > a_i</annotation></semantics> 他们将被拒绝
- en: Pretend we are in a new state <semantics><mrow><mo stretchy="false" form="prefix">(</mo><mi>A</mi><mo>,</mo><msub><mi>L</mi><mrow><mi>t</mi><mo>+</mo><mn>1</mn></mrow></msub><mo>=</mo><mo
    stretchy="false" form="prefix">{</mo><mi>.</mi><mi>.</mi><mo>,</mo><msub><mi>l</mi><mrow><mi>t</mi><mo>+</mo><mn>1</mn><mo>,</mo><mi>j</mi></mrow></msub><mo>=</mo><msub><mi>l</mi><mrow><mi>t</mi><mo>,</mo><mi>j</mi></mrow></msub><mo>+</mo><mi>m</mi><mo>,</mo><mi>.</mi><mi>.</mi><mi>.</mi><mo
    stretchy="false" form="postfix">}</mo><mo>,</mo><mi>p</mi><mo>−</mo><mi>m</mi><mo
    stretchy="false" form="postfix">)</mo></mrow><annotation encoding="application/x-tex">(A,
    L_{t+1}=\{.., l_{t+1, j} = l_{t, j} + m, ...\}, p - m)</annotation></semantics>
    where the process is granted the resource.
  id: totrans-104
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 假设我们处于一个新的状态 <semantics><mrow><mo stretchy="false" form="prefix">(</mo><mi>A</mi><mo>,</mo><msub><mi>L</mi><mrow><mi>t</mi><mo>+</mo><mn>1</mn></mrow></msub><mo>=</mo><mo
    stretchy="false" form="prefix">{</mo><mi>.</mi><mi>.</mi><mo>,</mo><msub><mi>l</mi><mrow><mi>t</mi><mo>+</mo><mn>1</mn><mo>,</mo><mi>j</mi></mrow></msub><mo>=</mo><msub><mi>l</mi><mrow><mi>t</mi><mo>,</mo><mi>j</mi></mrow></msub><mo>+</mo><mi>m</mi><mo>,</mo><mi>.</mi><mi>.</mi><mi>.</mi><mo
    stretchy="false" form="postfix">}</mo><mo>,</mo><mi>p</mi><mo>−</mo><mi>m</mi><mo
    stretchy="false" form="postfix">)</mo></mrow><annotation encoding="application/x-tex">(A,
    L_{t+1}=\{.., l_{t+1, j} = l_{t, j} + m, ...\}, p - m)</annotation></semantics>
    其中进程被赋予了资源。
- en: if now person <semantics><mi>j</mi><annotation encoding="application/x-tex">j</annotation></semantics>
    is either satisfied (<semantics><mrow><msub><mi>l</mi><mrow><mi>t</mi><mo>+</mo><mn>1</mn><mo>,</mo><mi>j</mi></mrow></msub><mo>=</mo><mo>=</mo><msub><mi>a</mi><mi>j</mi></msub></mrow><annotation
    encoding="application/x-tex">l_{t+1,j} == a_j</annotation></semantics>) or <semantics><mrow><mi>m</mi><mi>i</mi><mi>n</mi><mo
    stretchy="false" form="prefix">(</mo><msub><mi>a</mi><mi>i</mi></msub><mo>−</mo><msub><mi>l</mi><mrow><mi>t</mi><mo>+</mo><mn>1</mn><mo>,</mo><mi>i</mi></mrow></msub><mo
    stretchy="false" form="postfix">)</mo><mo>≤</mo><mi>p</mi></mrow><annotation encoding="application/x-tex">min(a_i
    - l_{t+1, i}) \leq p</annotation></semantics>. In other words, we have enough
    money to suit one other person. If either, consider the transaction safe and give
    them the money.
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果现在的人 <semantics><mi>j</mi><annotation encoding="application/x-tex">j</annotation></semantics>
    已经满足（<semantics><mrow><msub><mi>l</mi><mrow><mi>t</mi><mo>+</mo><mn>1</mn><mo>,</mo><mi>j</mi></mrow></msub><mo>=</mo><mo>=</mo><msub><mi>a</mi><mi>j</mi></msub></mrow><annotation
    encoding="application/x-tex">l_{t+1,j} == a_j</annotation></semantics>）或者 <semantics><mrow><mi>m</mi><mi>i</mi><mi>n</mi><mo
    stretchy="false" form="prefix">(</mo><msub><mi>a</mi><mi>i</mi></msub><mo>−</mo><msub><mi>l</mi><mrow><mi>t</mi><mo>+</mo><mn>1</mn><mo>,</mo><mi>i</mi></mrow></msub><mo
    stretchy="false" form="postfix">)</mo><mo>≤</mo><mi>p</mi></mrow><annotation encoding="application/x-tex">min(a_i
    - l_{t+1, i}) \leq p</annotation></semantics>。换句话说，我们还有足够的钱来满足另一个人。如果满足任何一个条件，则认为交易安全并给予他们钱。
- en: Why does this work? Well at the start we are in a safe state – defined by we
    have enough money to suit at least one person. Each of these "loans" results in
    a safe state. If we have exhausted our reserve, one person is working and will
    give us money greater than or equal to our previous "loan", thus putting us in
    a safe state again. Since we can always make one additional move, the system can
    never deadlock. Now, there is no guarantee that the system won’t livelock. If
    the process we hope to request something never does, no work will be done – but
    not due to deadlock. This analogy expands to higher orders of magnitude but requires
    that either a process can do its work entirely or there exists a process whose
    combination of resources can be satisfied, which makes the algorithm a little
    more tricky (an additional for loop) but nothing too bad. There are some notable
    downsides.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么这行得通呢？好吧，一开始我们处于一个安全状态——定义为我们有足够的钱至少满足一个人。这些“贷款”中的每一个都导致一个安全状态。如果我们用尽了储备，一个人在工作并会给我们比我们之前的“贷款”更多的或相等的钱，从而再次让我们处于安全状态。由于我们总是可以做出一个额外的动作，系统永远不会发生死锁。现在，没有保证系统不会发生活锁。如果我们希望请求某事的进程永远不会这样做，那么就不会有任何工作完成——但这不是由于死锁。这个类比可以扩展到更高的数量级，但要求一个进程可以完全完成其工作，或者存在一个进程，其资源的组合可以满足，这使得算法稍微复杂一些（一个额外的循环），但没有什么太大的问题。有一些显著的缺点。
- en: The program first needs to know how much of each resource a process needs. A
    lot of times that is impossible or the process requests the wrong amount because
    the programmer didn’t foresee it.
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 程序首先需要知道每个进程需要多少每种资源。很多时候这是不可能的，或者进程请求了错误数量的资源，因为程序员没有预见这一点。
- en: The system could livelock.
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 系统可能会发生活锁。
- en: We know in most systems that resources vary, pipes and sockets for example.
    This could mean that the runtime of the algorithm could be slow for systems with
    millions of resources.
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们知道在大多数系统中资源是变化的，比如管道和套接字。这意味着算法的运行时间可能会对拥有数百万资源的系统很慢。
- en: Also, this can’t keep track of the resources that come and go. A process may
    delete a resource as a side effect or create a resource. The algorithm assumes
    a static allocation and that each process performs a non-destructive operation.
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 此外，这个算法无法跟踪资源的来去。一个进程可能作为副作用删除资源或创建资源。算法假设静态分配，并且每个进程执行非破坏性操作。
- en: Clean/Dirty Forks (Chandy/Misra Solution)
  id: totrans-111
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 清洁/脏叉子（Chandy/Misra解决方案）
- en: There are many more advanced solutions. One such solution is by Chandy and Misra
    (Chandy and Misra [1984](ch018.xhtml#ref-Chandy:1984:DPP:1780.1804)). This is
    not a true solution to the dining philosophers problem because it has the requirement
    that philosophers can speak to each other. It is a solution that ensures fairness
    for some notion of fairness. In essence, it defines a series of rounds that a
    philosopher must eat in a given round before going to the next one.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 还有更多高级解决方案。其中一种解决方案是由Chandy和Misra提出的（Chandy and Misra [1984](ch018.xhtml#ref-Chandy:1984:DPP:1780.1804)）。这不是真正解决就餐哲学家问题的方案，因为它要求哲学家之间可以相互交谈。这是一个确保某种公平性的解决方案。本质上，它定义了一系列哲学家必须在一个回合中吃完，然后才能进入下一个回合的回合。
- en: We won’t detail the proof here because it is a little more involved, but feel
    free to read more.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在这里不会详细说明证明过程，因为它稍微复杂一些，但您可以随时阅读更多内容。
- en: Actor Model
  id: totrans-114
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 行为模型
- en: The actor model is another form of synchronization that doesn’t have to do anything
    with negotiating locks or waiting. The idea is simple. Each actor can either perform
    work, create more actors, send messages, or respond to messages. Any time an actor
    needs something from another actor, it sends a message. Most importantly, an actor
    is only responsible for one thing. If we were implementing a real-world application,
    we may have an actor that handles the database, one that handles the incoming
    connections, one that services the connections, etc. These actors would pass messages
    to each other like “there is a new connection” from the incoming connection actor
    to the servicing actor. The servicing actor may send a data request message to
    the database actor and a data response message comes back.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 行为模型是另一种形式的同步，它不需要进行锁协商或等待。这个想法很简单。每个行为者可以执行工作、创建更多行为者、发送消息或响应消息。每当一个行为者需要从另一个行为者那里得到某些东西时，它会发送一个消息。最重要的是，一个行为者只负责一件事情。如果我们正在实现一个现实世界应用，我们可能有一个处理数据库的行为者，一个处理传入连接的行为者，一个服务连接的行为者等。这些行为者会相互传递消息，比如“有一个新的连接”从传入连接行为者到服务行为者。服务行为者可能向数据库行为者发送数据请求消息，并返回数据响应消息。
- en: While this seems like the perfect solution there are drawbacks. The first is
    the actual library of communication needs to be synchronized. If you don’t have
    a framework that does this already – like the Message Passing Interface or MPI
    for High-Performance Computing – then the framework will have to be built and
    would most likely be as much work to build efficiently compared to direct synchronization.
    Also, the messages now encounter additional overhead for serializing and deserializing
    or at the least. And a final drawback is that an actor could take an arbitrarily
    long time to respond to a message, spurring the need for shadow actors who service
    the same job.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这似乎是一个完美的解决方案，但也有一些缺点。第一个缺点是实际的通信库需要同步。如果你没有现成的框架来做这件事——比如消息传递接口（Message Passing
    Interface，简称MPI）或高性能计算中的MPI——那么框架将不得不被构建，而且很可能构建一个高效框架的工作量与直接同步相当。此外，现在消息在序列化和反序列化时遇到了额外的开销，至少是额外的开销。最后一个缺点是，一个演员可能需要任意长的时间来响应一条消息，这促使需要影子演员来处理相同的工作。
- en: As mentioned, there are frameworks like [Message passing interface](https://en.wikipedia.org/wiki/Message_Passing_Interface)
    that is somewhat based on the actor model and allows distributed systems in high-performance
    computing to work effectively, but your mileage may vary If you want to read further
    on the model, feel free to glance over the Wikipedia page listed below. [Further
    reading on the actor model](https://en.wikipedia.org/wiki/Actor_model)
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 正如之前提到的，有一些框架，如基于演员模型的[消息传递接口](https://en.wikipedia.org/wiki/Message_Passing_Interface)，它允许高性能计算中的分布式系统有效地工作，但效果可能会有所不同。如果你想进一步了解这个模型，请随意浏览以下列出的维基百科页面。[关于演员模型的进一步阅读](https://en.wikipedia.org/wiki/Actor_model)
- en: Includes and conditionals
  id: totrans-118
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 包含和条件
- en: The other preprocessor include is the directive and conditionals. The include
    directive is explained by example.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个预处理器包含是指令和条件。包含指令通过示例进行解释。
- en: '[PRE16]'
  id: totrans-120
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: This is our file unpreprocessed.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们的未预处理文件。
- en: '[PRE17]'
  id: totrans-122
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: After preprocessing, the compiler sees this
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 预处理之后，编译器看到的是这个。
- en: '[PRE18]'
  id: totrans-124
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: The other tool is preprocessor conditionals. If a macro is defined or truthy,
    that branch is taken.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个工具是预处理器条件。如果一个宏被定义或为真值，那么就选择这个分支。
- en: '[PRE19]'
  id: totrans-126
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Using your compiler would preprocess the source to the following.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 使用你的编译器会对源代码进行预处理，生成以下内容。
- en: '[PRE20]'
  id: totrans-128
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: Using your compiler would preprocess to this.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 使用你的编译器会对源代码进行预处理。
- en: '[PRE21]'
  id: totrans-130
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: Thread Scheduling
  id: totrans-131
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 线程调度
- en: There are a few ways to split up the work. These are common to the OpenMP framework
    (Silberschatz, Galvin, and Gagne [2005](ch018.xhtml#ref-silberschatz2005operating)).
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 有几种方法可以将工作分割开来。这些方法在OpenMP框架中很常见（Silberschatz, Galvin, 和 Gagne [2005](ch018.xhtml#ref-silberschatz2005operating)）。
- en: breaks up the problems into fixed-size chunks (predetermined) and have each
    thread work on each of the chunks. This works well when each of the subproblems
    takes roughly the same time because there is no additional overhead. All you need
    to do is write a loop and give the map function to each sub-array.
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将问题分解成固定大小的块（预先确定的），并且让每个线程处理每个块。当每个子问题花费的时间大致相同的时候，这种方法很有效，因为没有额外的开销。你只需要写一个循环，并将映射函数给每个子数组。
- en: as a new problem becomes available to have a thread serve it. This is useful
    when you don’t know how long the scheduling will take
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当一个新问题出现需要线程来处理时，这是很有用的。当你不知道调度需要多长时间时，这种方法特别有用。
- en: This is a mix of the above with a mix of the benefits and tradeoffs. You start
    with static scheduling and move slowly to dynamic if needed
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这是一种结合了上述方法，并混合了优点和权衡的方法。你从静态调度开始，如果需要的话，慢慢过渡到动态调度。
- en: You have absolutely no idea how long the problems are going to take. Instead
    of deciding it yourself, let the program decide what to do!
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你根本不知道问题需要多长时间。与其自己决定，不如让程序决定该做什么！
- en: No need to memorize any of the scheduling routines though. Openmp is a standard
    that is an alternative to pthreads. For example, here is how to parallelize a
    for loop
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然不需要记住任何调度例程。OpenMP是一个标准，是pthreads的替代品。例如，以下是如何并行化一个for循环的示例。
- en: '[PRE22]'
  id: totrans-138
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: Static scheduling will divide the problem into fixed-size chunks Dynamic scheduling
    will give a job once the loop is over Guided scheduling is Dynamic with chunks
    Runtime is a whole bag of worms.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 静态调度会将问题分解成固定大小的块。动态调度会在循环结束后分配一个任务。引导调度是动态的，带有块。运行时间是整个一锅杂烩。
- en: threads.h
  id: totrans-140
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: threads.h
- en: We have a lot of threading libraries discussed in the extra section. We have
    the standard POSIX threads, OpenMP threads, we also have a new C11 threading library
    that is built into the standard. This library provides restricted functionality.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在额外部分讨论了许多线程库。我们有标准的POSIX线程，OpenMP线程，我们还有一个新的C11线程库，它是标准的一部分。这个库提供了受限功能。
- en: Why use restricted functionality? The key is in the name. Since this is the
    C standard library, it has to be implemented in all operating systems that are
    compliant which are pretty much all of them. This means there is first-class portability
    when using threads.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么使用受限功能？关键在于名称。由于这是C标准库，它必须在所有兼容的操作系统（几乎所有的操作系统）中实现。这意味着在使用线程时具有一等可移植性。
- en: We won’t drone on about the functions. Most of them are renaming of pthread
    functions anyway. If you ask why we don’t teach these, there are a few reasons
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不会对函数进行冗长的讨论。它们大多数只是pthread函数的重命名。如果你问为什么我们不教授这些，有几个原因
- en: They are pretty new. Even though the standard came out in roughly 2011, POSIX
    threads have been around forever. A lot of their quirks have been ironed out.
  id: totrans-144
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它们相当新。尽管标准大约在2011年发布，但POSIX线程已经存在很长时间了。它们的大多数怪癖已经被消除。
- en: You lose expressivity. This is a concept that we’ll talk about in later chapters,
    but when you make something portable, you lose some expressivity with the host
    hardware. That means that the threads.h library is pretty bare bones. It is hard
    to set CPU affinities. Schedule threads together. Efficiently look at the internals
    for performance reasons.
  id: totrans-145
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你会失去表达性。这是一个我们将在后续章节中讨论的概念，但当你使某物可移植时，你会失去一些与主机硬件的表达性。这意味着threads.h库相当基础。很难设置CPU亲和性。一起调度线程。为了性能原因，有效地查看内部结构。
- en: A lot of legacy code is already written with POSIX threads in mind. Other libraries
    like OpenMP, CUDA, MPI will either use POSIX processes or POSIX threads with a
    begrudging port to Windows.
  id: totrans-146
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 许多遗留代码已经考虑了POSIX线程。其他库如OpenMP、CUDA、MPI将要么使用POSIX进程或POSIX线程，对Windows的移植则有些勉强。
- en: Modern Filesystems
  id: totrans-147
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 现代文件系统
- en: While the API for most filesystems have stayed the same on POSIX over the years,
    the actual filesystems themselves provide lots of important aspects.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管大多数文件系统的API在POSIX上多年来保持不变，但实际的文件系统本身提供了许多重要的方面。
- en: Data Integrity. File systems use journaling and sometimes checksums to ensure
    that the data written to is valid. Journalling is a simple invention where the
    file system writes an operation in a journal. If the filesystem crashes before
    the operation is complete, it can resume the operation when booted up again using
    the partial journal.
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据完整性。文件系统使用日志记录和有时使用校验和来确保写入的数据是有效的。日志记录是一种简单的发明，其中文件系统将操作写入日志。如果在操作完成之前文件系统崩溃，它可以在再次启动时使用部分日志恢复操作。
- en: Caching. Linux does a good job of caching file system operations like finding
    inodes. This makes disk operations seem nearly instant. If you want to see a slow
    system, look at Windows with FAT/NTFS. Disk operations need to be cached by the
    application, or it will burn through the CPU.
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 缓存。Linux在缓存文件系统操作方面做得很好，比如查找inode。这使得磁盘操作看起来几乎是瞬间的。如果你想看到一个慢速的系统，看看使用FAT/NTFS的Windows。磁盘操作需要由应用程序缓存，否则它将耗尽CPU。
- en: Speed. On spinning disk machines, data that is toward the end of a metallic
    platter will spin faster (angular velocity is farther from the center). Programs
    used this to reduce time loading large files like movies in a video editing piece
    of software. SSDs don’t have this problem because there is no spinning disk, but
    they will portion off a section of their space to be used as "swap space" for
    fiels.
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 速度。在旋转磁盘机器上，位于金属盘末尾的数据将旋转得更快（角速度离中心更远）。程序利用这一点来减少在视频编辑软件中加载大型文件（如电影）的时间。SSD没有这个问题，因为没有旋转磁盘，但它们会从它们的空间中划分出一部分作为“交换空间”用于文件。
- en: Parallelism. Filesystems with multiple heads (for physical hard disks) or multiple
    controllers (for SSDs) can utilize parallelism by multiplexing the PCIe slot with
    data, always serving some data to the application whenever possible.
  id: totrans-152
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 并行性。具有多个头（用于物理硬盘）或多个控制器（用于SSD）的文件系统可以通过复用PCIe插槽中的数据来利用并行性，始终在可能的情况下为应用程序提供服务。
- en: Encryption. Data can be encrypted with one or more keys. A good example of this
    is Apple’s APFS file systems.
  id: totrans-153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 加密。数据可以使用一个或多个密钥进行加密。苹果的APFS文件系统是一个很好的例子。
- en: Redundancy. Sometimes data can be replicated to blocks to ensure that the data
    is always available.
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 冗余。有时数据可以复制到块中，以确保数据始终可用。
- en: Efficient Backups. Many of us have data that we can’t store on the cloud for
    one reason or another. It is useful that when a filesystems is either being used
    as a backup medium or is the source to the backup that it is able to calculate
    what has changed efficiently, compress files, and sync between the external drive.
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 高效备份。我们中许多人由于各种原因无法将数据存储在云上。当文件系统被用作备份介质或作为备份的来源时，能够高效地计算更改内容、压缩文件以及在外部驱动器之间同步是非常有用的。
- en: Integriy and Bootability. File systems need to be resillient to bit flipping.
    Most readers have their operating system installed on the same paritition as the
    file system that they used to do different operations. The file system needs to
    make sure a stray read or write doesn’t destroy the boot sector – meaning your
    computer can’t start up again.
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 完整性和可启动性。文件系统需要能够抵御位翻转。大多数读者都将操作系统安装在与其用于不同操作的文件系统相同的分区上。文件系统需要确保随机的读取或写入不会破坏引导扇区——这意味着你的计算机无法再次启动。
- en: Fragmentation. Just like a memory allocator, allocating space for a file leads
    to both internal and external fragmentation. The same caching benefit occurs when
    disk blocks for a single file are located next to each other. File systems need
    to perform well under low, high, and possible fragmentation usage.
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 碎片化。就像内存分配器一样，为文件分配空间会导致内部和外部碎片化。当单个文件的磁盘块相邻时，也会出现相同的缓存优势。文件系统需要在低、高以及可能的碎片化使用下表现良好。
- en: Distributed. Sometimes, the filesystem should be single machine fault tolerant.
    Hadoop and other distributed file system allow you to do that.
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分布式。有时，文件系统应该能够容忍单机故障。Hadoop和其他分布式文件系统允许你做到这一点。
- en: Cutting Edge File systems
  id: totrans-159
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 切边文件系统
- en: There are a few filesystem hardware nowadays that are truly cutting edge. The
    one we’d briefly like to touch on is AMD’s StoreMI. We aren’t trying to sell AMD
    chipsets, but the featureset of StoreMI warrants a mention.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 现在有一些文件系统硬件确实是真正的前沿技术。我们简要想提到的就是AMD的StoreMI。我们并不是在试图推销AMD芯片组，但StoreMI的功能集值得提及。
- en: StoreMI is a hardware microcontroller that analyzes how the operating system
    accesses files and moves files/blocks around to speed up the load time. A common
    usage can be imagined as having a fast, but small capacity SSD and a slower, large
    capcity HDD. To make it seem like all the files are on an SSD, the StoreMI matches
    the pattern of file access. If you are starting up Windows, Windows will often
    access many files in the same order. StoreMI takes note of that and when the microcontroller
    notices it is starting the boot, it will move files from the HDD drive to the
    SSD before they are requested by the operating system. By the time the operating
    system needs then, they are already on the SSD. StoreMI also does this with other
    applications as well. The technology still has a lot to be desired for, but it
    is an interesting intersection of data and pattern matching with filesystems.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: StoreMI是一个硬件微控制器，它分析操作系统如何访问文件，并将文件/块移动到一起以加快加载时间。一个常见的用法可以想象为拥有一个快速但容量小的SSD和一个较慢但容量大的HDD。为了让所有文件看起来都存储在SSD上，StoreMI会匹配文件访问模式。如果你正在启动Windows，Windows通常会按相同的顺序访问许多文件。StoreMI会注意到这一点，当微控制器发现它正在启动时，它会在操作系统请求之前将文件从HDD驱动器移动到SSD。到操作系统需要它们的时候，它们已经在SSD上了。StoreMI也会对其他应用程序做同样的事情。这项技术还有很多需要改进的地方，但它是一个有趣的数据和模式匹配与文件系统的交汇点。
- en: Linux Scheduling
  id: totrans-162
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Linux调度
- en: As of February 2016, Linux by default uses the *Completely Fair Scheduler* for
    CPU scheduling and the Budget Fair Scheduling “BFQ” for I/O scheduling. Appropriate
    scheduling can have a significant impact on throughput and latency. Latency is
    important for interactive and soft-real time applications such as audio and video
    streaming. See the discussion and comparative benchmarks [here](https://lkml.org/lkml/2014/5/27/314)
    for more information.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 截至2016年2月，Linux默认使用*完全公平调度器*进行CPU调度，以及预算公平调度“BFQ”进行I/O调度。适当的调度可以显著影响吞吐量和延迟。延迟对于交互式和软实时应用（如音频和视频流）非常重要。有关更多信息，请参阅[此处](https://lkml.org/lkml/2014/5/27/314)的讨论和比较基准。
- en: Here is how the CFS schedules
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是CFS如何安排的
- en: The CPU creates a Red-Black tree with the processes virtual runtime (runtime
    / nice_value) and sleeper fairness flag – if the process is waiting on something,
    give it the CPU when it is done waiting.
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CPU创建一个红黑树，包含进程的虚拟运行时间（运行时间/优先级值）和睡眠公平性标志——如果进程正在等待某物，当它完成等待时给它CPU。
- en: Nice values are the kernel’s way of giving priority to certain processes, the
    lower nice value the higher priority.
  id: totrans-166
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 优先级值是内核为某些进程提供优先级的方式，优先级值越低，优先级越高。
- en: The kernel chooses the lowest one based on this metric and schedules that process
    to run next, taking it off the queue. Since the red-black tree is self-balancing
    this operation is guaranteed <semantics><mrow><mi>O</mi><mo stretchy="false" form="prefix">(</mo><mi>l</mi><mi>o</mi><mi>g</mi><mo
    stretchy="false" form="prefix">(</mo><mi>n</mi><mo stretchy="false" form="postfix">)</mo><mo
    stretchy="false" form="postfix">)</mo></mrow><annotation encoding="application/x-tex">O(log(n))</annotation></semantics>
    (selecting the min process is the same runtime)
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 内核根据这个指标选择最低的值，并将该进程调度为下一个运行，将其从队列中移除。由于红黑树是自平衡的，这个操作保证了 <semantics><mrow><mi>O</mi><mo
    stretchy="false" form="prefix">(</mo><mi>l</mi><mi>o</mi><mi>g</mi><mo stretchy="false"
    form="prefix">(</mo><mi>n</mi><mo stretchy="false" form="postfix">)</mo><mo stretchy="false"
    form="postfix">)</mo></mrow><annotation encoding="application/x-tex">O(log(n))</annotation></semantics>（选择最小进程的运行时间相同）
- en: Although it is called the Fair Scheduler there are a fair bit of problems.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管它被称为公平调度器，但确实存在不少问题。
- en: Groups of processes that are scheduled may have imbalanced loads so the scheduler
    roughly distributes the load. When another CPU gets free it can only look at the
    average load of a group schedule, not the individual cores. So the free CPU may
    not take the work from a CPU that is burning so long as the average is fine.
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 被调度的进程组可能会有不平衡的负载，因此调度器大致分配负载。当另一个CPU空闲时，它只能查看一个组调度平均负载，而不是单个核心。因此，空闲CPU可能不会从平均负载良好的CPU那里获取工作。
- en: If a group of processes is running on non-adjacent cores then there is a bug.
    If the two cores are more than a hop away, the load balancing algorithm won’t
    even consider that core. Meaning if a CPU is free and a CPU that is doing more
    work is more than a hop away, it won’t take the work (may have been patched).
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果一组进程在非相邻的核心上运行，则存在一个错误。如果两个核心相距超过一个跳数，负载均衡算法甚至不会考虑该核心。这意味着如果有一个CPU空闲，而另一个正在做更多工作的CPU距离超过一个跳数，它将不会接受工作（可能已经被修复）。
- en: After a thread goes to sleep on a subset of cores, when it wakes up it can only
    be scheduled on the cores that it was sleeping on. If those cores are now busy,
    the thread will have to wait on them, wasting opportunities to use other idle
    cores.
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在一个线程在核心子集上休眠后，当它醒来时，它只能被调度在它休眠的核心上。如果这些核心现在正忙，线程将不得不等待它们，从而浪费了使用其他空闲核心的机会。
- en: To read more on the problems of the Fair Scheduler, read [here](https://blog.acolyer.org/2016/04/26/the-linux-scheduler-a-decade-of-wasted-cores).
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要了解更多关于公平调度器的问题，请阅读[这里](https://blog.acolyer.org/2016/04/26/the-linux-scheduler-a-decade-of-wasted-cores)。
- en: Implementing Software Mutex
  id: totrans-173
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 实现软件互斥锁
- en: Yes With a bit of searching, it is possible to find it in production for specific
    simple mobile processors today. Peterson’s algorithm is used to implement low-level
    Linux Kernel locks for the Tegra mobile processor (a system-on-chip ARM process
    and GPU core by Nvidia) [Link to Lock Source](https://android.googlesource.com/kernel/tegra.git/+/android-tegra-3.10/arch/arm/mach-tegra/sleep.S#58)
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，通过一些搜索，今天在特定的简单移动处理器上找到它在生产中的使用是可能的。彼得森算法用于实现Nvidia的Tegra移动处理器（Nvidia的系统级芯片ARM进程和GPU核心）的低级Linux内核锁[锁源链接](https://android.googlesource.com/kernel/tegra.git/+/android-tegra-3.10/arch/arm/mach-tegra/sleep.S#58)。
- en: In general now, CPUs and C compilers can re-order CPU instructions or use CPU-core-specific
    local cache values that are stale if another core updates the shared variables.
    Thus a simple pseudo-code to C implementation is too naive for most platforms.
    Warning, here be dragons! Consider this advanced and gnarly topic but (spoiler
    alert) a happy ending. Consider the following code,
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，一般来说，CPU和C编译器可以重新排序CPU指令或使用CPU核心特定的本地缓存值，如果另一个核心更新了共享变量，这些值就会过时。因此，一个简单的伪代码到C的实现对于大多数平台来说过于天真。警告，这里可能有龙！考虑这个高级而复杂的话题，但（剧透警告）有一个快乐的结局。考虑以下代码，
- en: '[PRE23]'
  id: totrans-176
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: An efficient compiler would infer that variable is never changed inside the
    loop, so that test can be optimized to Using goes some way to prevent compiler
    optimizations of this kind.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 一个高效的编译器会推断出变量在循环内部从未改变，因此该测试可以被优化为使用，这有助于防止编译器进行此类优化。
- en: Let’s say that we solved this by telling the compiler not to optimize. Independent
    instructions can be re-ordered by an optimizing compiler or at runtime by an out-of-order
    execution optimization by the CPU.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们通过告诉编译器不要优化来解决这个问题。优化编译器可以重新排序独立指令，或者CPU通过乱序执行优化在运行时重新排序指令。
- en: A related challenge is that CPU cores include a data cache to store recently
    read or modified main memory values. Modified values may not be written back to
    main memory or re-read from memory immediately. Thus data changes, such as the
    state of a flag and turn variable in the above example, may not be shared between
    two CPU codes.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 相关的挑战是CPU核心包含一个数据缓存来存储最近读取或修改的主内存值。修改后的值可能不会立即写回主内存或从内存中重新读取。因此，如上述示例中的标志和转换变量的状态等数据变化可能不会在两个CPU代码之间共享。
- en: But there is a happy ending. Modern hardware addresses these issues using ‘memory
    fences’ also known as a memory barrier. This prevents instructions from getting
    ordered before or after the barrier. There is a performance loss, but it is needed
    for correct programs!
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 但有一个美好的结局。现代硬件使用“内存栅栏”也称为内存屏障来解决这些问题。这防止了指令在屏障之前或之后被排序。这会损失性能，但对于正确的程序来说是必需的！
- en: Also, there are CPU instructions to ensure that main memory and the CPU’s cache
    is in a reasonable and coherent state. Higher-level synchronization primitives,
    such as are will call these CPU instructions as part of their implementation.
    Thus, in practice, surrounding critical sections with a mutex lock and unlock
    calls is sufficient to ignore these lower-level problems.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，还有CPU指令来确保主内存和CPU缓存处于合理且一致的状态。高级同步原语，例如，将把这些CPU指令作为它们实现的一部分。因此，在实践中，在关键部分周围使用互斥锁和解锁调用就足以忽略这些低级问题。
- en: For further reading, we suggest the following web post that discusses implementing
    Peterson’s algorithm on an x86 process and the Linux documentation on memory barriers.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 对于进一步阅读，我们建议以下网络帖子，讨论在x86进程上实现彼得森算法以及Linux文档中的内存屏障。
- en: '[Memory Fences](http://bartoszmilewski.com/2008/11/05/who-ordered-memory-fences-on-an-x86/)'
  id: totrans-183
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '[内存栅栏](http://bartoszmilewski.com/2008/11/05/who-ordered-memory-fences-on-an-x86/)'
- en: '[Memory Barriers](http://lxr.free-electrons.com/source/Documentation/memory-barriers.txt)'
  id: totrans-184
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '[内存屏障](http://lxr.free-electrons.com/source/Documentation/memory-barriers.txt)'
- en: The Curious Case of Spurious Wakeups
  id: totrans-185
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 假唤醒的奇怪案例
- en: Condition variables need a mutex for a few reasons. One is simply that a mutex
    is needed to synchronize the changes of the *condition variable* across threads.
    Imagine a condition variable needing to provide its own internal synchronization
    to ensure its data structures work correctly. Often, we use a mutex to synchronize
    other parts of our code, so why double the cost of using a condition variable.
    Another example relates to high priority systems. Let’s examine a code snippet.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 条件变量需要互斥锁有几个原因。其中一个是，需要一个互斥锁来同步线程间*条件变量*的变化。想象一下，条件变量需要提供自己的内部同步来确保其数据结构正常工作。通常，我们使用互斥锁来同步代码的其他部分，那么为什么还要增加使用条件变量的成本。另一个例子与高优先级系统相关。让我们看看一个代码片段。
- en: '[PRE24]'
  id: totrans-187
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: Signaling without Mutex
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 无互斥锁的信号
- en: '| Thread 1 | Thread 2 |'
  id: totrans-189
  prefs: []
  type: TYPE_TB
  zh: '| 线程1 | 线程2 |'
- en: '| --- | --- |'
  id: totrans-190
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| while(answer < 42) |  |'
  id: totrans-191
  prefs: []
  type: TYPE_TB
  zh: '| while(answer < 42) |  |'
- en: '|  | answer++ |'
  id: totrans-192
  prefs: []
  type: TYPE_TB
  zh: '|  | answer++ |'
- en: '|  | pthread_cond_signal(cv) |'
  id: totrans-193
  prefs: []
  type: TYPE_TB
  zh: '|  | pthread_cond_signal(cv) |'
- en: '| pthread_cond_wait(cv) |  |'
  id: totrans-194
  prefs: []
  type: TYPE_TB
  zh: '| pthread_cond_wait(cv) |  |'
- en: The problem here is that a programmer expects the signal to wake up the waiting
    thread. Since instructions are allowed to be interleaved without a mutex, this
    causes an interleaving that is confusing to application designers. Note that technically
    the API of the condition variable is satisfied. The wait call *happens-after*
    the call to signal, and signal is only required to release at most a single thread
    whose call to wait *happened-before*.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的问题是程序员期望信号唤醒等待的线程。由于指令可以在没有互斥锁的情况下交错，这导致了对应用程序设计者来说令人困惑的交错。请注意，从技术上讲，条件变量的API已经满足。等待调用*在信号调用之后发生*，并且信号只需要释放最多一个在等待调用*之前发生*的线程。
- en: Another problem is the need to satisfy real-time scheduling concerns which we
    only outline here. In a time-critical application, the waiting thread with the
    *highest priority* should be allowed to continue first. To satisfy this requirement
    the mutex must also be locked before calling or . For the curious, [here is a
    longer, historical discussion](https://groups.google.com/forum/?hl=ky#!msg/comp.programming.threads/wEUgPq541v8/ZByyyS8acqMJ).
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个问题是需要满足实时调度关注点，我们在这里只是概述。在一个时间关键的应用程序中，具有**最高优先级**的等待线程应该首先被允许继续。为了满足这一要求，在调用或之前也必须锁定互斥锁。对于好奇的人，[这里有一个更长的、历史性的讨论](https://groups.google.com/forum/?hl=ky#!msg/comp.programming.threads/wEUgPq541v8/ZByyyS8acqMJ)。
- en: Condition Wait Example
  id: totrans-197
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 条件等待示例
- en: 'The call performs three actions:'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 该调用执行三个操作：
- en: Unlock the mutex. The mutex must be locked.
  id: totrans-199
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解锁互斥锁。互斥锁必须被锁定。
- en: Sleeps until is called on the same condition variable.
  id: totrans-200
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 等待直到在同一个条件变量上调用。
- en: Before returning, locks the mutex.
  id: totrans-201
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在返回之前，锁定互斥锁。
- en: Condition variables are *always* used with a mutex lock. Before calling *wait*,
    the mutex lock must be locked and *wait* must be wrapped with a loop.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 条件变量**总是**与互斥锁一起使用。在调用*wait*之前，必须锁定互斥锁，并且*wait*必须被循环包裹。
- en: '[PRE25]'
  id: totrans-203
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: This is a pretty naive example, but it shows that we can tell threads to wake
    up in a standardized manner. In the next section, we will use these to implement
    efficient blocking data structures.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个相当简单的例子，但它表明我们可以以标准化的方式告诉线程唤醒。在下一节中，我们将使用这些来实现高效的阻塞数据结构。
- en: Implementing CVs with Mutexes Alone
  id: totrans-205
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 仅使用互斥锁实现CV
- en: Implementing a condition variable using only a mutex isn’t trivial. Here is
    a sketch of how we could do it.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 仅使用互斥锁实现条件变量并不简单。以下是我们如何做到这一点的大致草图。
- en: '[PRE26]'
  id: totrans-207
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: This is all the boring definitional stuff. The interesting stuff is below.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 这都是一些无聊的定义性内容。有趣的内容在下面。
- en: '[PRE27]'
  id: totrans-209
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: So how does this work? Instead of allocating space which could lead to deadlock.
    We keep the data structures or the linked list nodes on each thread’s stack. The
    linked list in the wait function is created **while the thread has the mutex lock.**
    This is important because we may have a race condition on the insert and removal.
    A more robust implementation would have a mutex per condition variable.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 这是如何工作的呢？我们不是分配可能导致死锁的空间。我们保持数据结构或链表节点在每个线程的栈上。等待函数中的链表是在线程拥有互斥锁锁定的**时候创建的**。这很重要，因为我们可能在插入和删除时遇到竞态条件。一个更健壮的实现将每个条件变量都有一个互斥锁。
- en: What is the note about (dynamic)? In the pthread man pages, wait creates a runtime
    binding to a mutex. This means that after the first call is called, a mutex is
    associated with a condition variable while there is still a thread waiting on
    that condition variable. Each new thread coming in must have the same mutex, and
    it must be locked. Hence, the beginning and end of wait (everything besides the
    while loop) are mutually exclusive. After the last thread leaves, meaning when
    head is NULL, then the binding is lost.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 关于（动态）的注释是什么？在pthread man页面上，wait创建了一个运行时绑定到互斥锁。这意味着在第一次调用之后，一个互斥锁与一个条件变量相关联，同时还有线程在该条件变量上等待。每个新进入的线程必须具有相同的互斥锁，并且它必须被锁定。因此，wait的开始和结束（除了while循环之外的所有内容）是互斥的。当最后一个线程离开时，即当head为NULL时，绑定就会丢失。
- en: The signal and broadcast functions merely tell either one thread or all threads
    respectively that they should be woken up. **It doesn’t modify the linked lists
    because there is no mutex to prevent corruption if two threads call signal or
    broadcast.**
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 信号和广播函数只是分别告诉一个线程或所有线程它们应该被唤醒。**它不会修改链表，因为没有互斥锁来防止两个线程同时调用signal或broadcast时的损坏。**
- en: Now an advanced point. Do you see how a broadcast could cause a spurious wakeup
    in this case? Consider this series of events.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是一个高级点。你看到广播在这种情况下如何可能导致虚假唤醒吗？考虑以下一系列事件。
- en: Some number more than 2 threads start waiting
  id: totrans-214
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 有多于2个线程开始等待
- en: Another thread calls broadcast.
  id: totrans-215
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 另一个线程调用广播。
- en: That thread calling broadcast is stopped before it wake any threads.
  id: totrans-216
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 那个调用广播的线程在唤醒任何线程之前被停止。
- en: Another thread calls wait on the condition variable and adds itself to the queue.
  id: totrans-217
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 另一个线程在条件变量上调用wait并将自己添加到队列中。
- en: Broadcast iterates through and frees all of the threads.
  id: totrans-218
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 广播遍历并释放所有线程。
- en: There is no assurance as to *when* the broadcast was called and when threads
    were added in a high-performance mutex. The ways to prevent this behavior are
    to include Lamport timestamps or require that broadcast be called with the mutex
    in question. That way something that *happens-before* the broadcast call doesn’t
    get signaled after. The same argument is put forward for signal too.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 在高性能互斥锁中，无法保证广播调用和线程添加的确切时间。防止这种行为的方法是包含Lamport时间戳或要求以互斥锁调用广播。这样，在广播调用之前发生的事情就不会被信号化。同样的论点也适用于信号。
- en: Did you also notice something else? **This is why we ask you to signal or broadcast
    before you unlock**. If you broadcast after you unlock, the time that broadcast
    takes could be infinite!
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 你也注意到了其他什么吗？**这就是为什么我们要求你在解锁之前发出信号或广播**。如果你在解锁后广播，广播所需的时间可能是无限的！
- en: Broadcast is called on a waiting queue of threads
  id: totrans-221
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在等待线程队列上调用广播
- en: First thread is freed, broadcast thread is frozen. Since the mutex is unlocked,
    it locks and continues.
  id: totrans-222
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 首个线程被释放，广播线程被冻结。由于互斥锁被解锁，它被锁定并继续。
- en: It continues for such a long time that it calls broadcast again.
  id: totrans-223
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 它持续了如此长的时间，以至于再次调用了广播。
- en: With our implementation of a condition variable, this would be terminated. If
    you had an implementation that appended to the tail of the list and iterated form
    the head to the tail, this could go on infinitely many times.
  id: totrans-224
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用我们的条件变量实现，这将终止。如果你有一个将元素追加到列表尾部并从头部到尾部迭代的实现，这可能会无限次地继续。
- en: In high-performance systems, we want to make sure that each thread that calls
    wait isn’t passed by another thread that calls wait. With the current API that
    we have, we can’t assure that. We’d have to ask users to pass in a mutex or use
    a global mutex. Instead, we tell programmers to always signal or broadcast before
    unlocking.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 在高性能系统中，我们想要确保调用wait的每个线程不会被调用wait的另一个线程超越。根据我们当前的API，我们无法保证这一点。我们可能需要要求用户传递一个互斥锁或使用全局互斥锁。相反，我们告诉程序员在解锁之前总是发出信号或广播。
- en: Higher Order Models of Synchronization
  id: totrans-226
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 高阶同步模型
- en: When using atomics, you need to specify the right model of synchronization to
    ensure a program behaves correctly. You can read more about them [On the gcc wiki](https://gcc.gnu.org/wiki/Atomic/GCCMM/AtomicSync)
    These examples are adapted from those.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用原子时，你需要指定正确的同步模型以确保程序正确运行。你可以在[gcc wiki](https://gcc.gnu.org/wiki/Atomic/GCCMM/AtomicSync)上了解更多关于它们的信息。这些例子是从那些例子改编的。
- en: Sequentially Consistent
  id: totrans-228
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 顺序一致性
- en: Sequentially consistent is the simplest, least error-prone and most expensive
    model. This model says that any change that happens, all changes before it will
    be synchronized between all threads.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 顺序一致性是最简单、最不易出错且最昂贵的模型。这个模型表示，任何发生的变化，其之前所有的变化都将被同步到所有线程之间。
- en: '[PRE28]'
  id: totrans-230
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: Will never quit. This is because either the store happens before the if statement
    in thread 2 and y == 1 or the store happens after and x does not equal 2.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 永远不会退出。这是因为要么在线程2中存储操作发生在if语句之前，且y等于1，要么存储操作发生在之后，且x不等于2。
- en: Relaxed
  id: totrans-232
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Relaxed
- en: Relaxed is a simple memory order providing for more optimizations. This means
    that only a particular operation needs to be atomic. One can have stale reads
    and writes, but after reading the new value, it won’t become old.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: Relaxed是一种简单的内存顺序，提供了更多的优化。这意味着只需要特定的操作是原子的。可以存在过时的读取和写入，但在读取新值之后，它不会变得过时。
- en: '[PRE29]'
  id: totrans-234
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: But that means that previous loads and stores don’t need to affect other threads.
    In the previous example, the code can now fail.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 但这意味着之前的加载和存储不需要影响其他线程。在先前的例子中，代码现在可能会失败。
- en: Acquire/Release
  id: totrans-236
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Acquire/Release
- en: The order of atomic variables don’t need to be consistent – meaning if atomic
    var y is assigned to 10 then atomic var x to be 0 those don’t need to propagate,
    and a threa could get stale reads. Non-atomic variables have to get updated in
    all threads though.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 原子变量的顺序不需要一致——这意味着如果原子变量y被赋值为10，而原子变量x为0，这些值不需要传播，线程可能会得到过时的读取。不过，非原子变量必须在所有线程中更新。
- en: Consume
  id: totrans-238
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 消费
- en: Imagine the same as above except non-atomic variables don’t need to get updated
    in all threads. This model was introduced so that there can be an Acquire/Release/Consume
    model without mixing in Relaxed because Consume is similar to relax.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下与上面相同的情况，除了非原子变量不需要在所有线程中更新。引入这种模型是为了能够在不混合Relaxed的情况下有一个Acquire/Release/Consume模型，因为Consume类似于Relaxed。
- en: Actor Model and Goroutines
  id: totrans-240
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Actor模型和Goroutines
- en: There are a *lot* of other methods of concurrency than described in this book.
    Posix threads are the finest grained thread construct, allowing for tight control
    of the threads and the CPU. Other languages have their abstractions. We’ll talk
    about a language go that is similar to C in terms of simplicity and design, go
    or golang To get the 5 minute introduction, feel free to read [the learn x in
    y guide](https://learnxinyminutes.com/docs/go/) for go. Here is how we create
    a "thread" in go.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 除了本书中描述的并发方法之外，还有很多其他方法。Posix线程是最细粒度的线程结构，允许对线程和CPU进行紧密控制。其他语言也有它们的抽象。我们将讨论一种类似于C的简单性和设计语言的go或golang。要获得5分钟入门，请随意阅读[learn
    x in y指南](https://learnxinyminutes.com/docs/go/)中的go。以下是我们在Go中创建“线程”的方法。
- en: '[PRE30]'
  id: totrans-242
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: This actually creates what is known as a goroutine. A goroutine can be thought
    of as a lightweight thread. Internally, it is a worker pool of threads that executes
    instructions of all the running goroutines. When a goroutine needs to be stopped,
    it is frozen and "context switched" to another thread. Context switch is in quotes
    because this is done at the run time level versus real context switching which
    is done at the operating system level.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 这实际上创建了一个被称为goroutine的东西。goroutine可以被视为一个轻量级的线程。内部，它是一个线程池，执行所有运行goroutine的指令。当一个goroutine需要停止时，它将被冻结，并“上下文切换”到另一个线程。上下文切换加引号，因为这是在运行时级别完成的，而不是在操作系统级别完成的实际上下文切换。
- en: The advantage to gofuncs is pretty self explanatory. There is no boilerplate
    code, or joining, or odd casting .
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: gofuncs的优势相当直观。没有样板代码，没有连接，也没有奇特的类型转换。
- en: We can still use mutexes in go to perform our end result. Consider the counting
    example as before.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 我们仍然可以在Go中使用互斥锁来执行我们的最终结果。考虑之前的计数器示例。
- en: '[PRE31]'
  id: totrans-246
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: But that’s boring and error prone. Instead, let’s use the actor model. Let’s
    designate two actors. One is the main actor that will be performing the main instruction
    set. The other actor will be the counter. The counter is responsible for adding
    numbers to an internal variable. We’ll send messages between the threads when
    we want to add and see the value.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 但这很无聊且容易出错。相反，让我们使用演员模型。让我们指定两个演员。一个是主要演员，将执行主要的指令集。另一个演员将是计数器。计数器负责向一个内部变量添加数字。当我们想要添加并查看值时，我们将在线程之间发送消息。
- en: '[PRE32]'
  id: totrans-248
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: Although there is a bit more boilerplate code, we don’t have mutexes anymore!
    If we wanted to scale this operation and do other things like increment by a number,
    or write to a file, we can have that particular actor take care of it. This differentiation
    of responsibilities is important to make sure your design scales well. There are
    even libraries that handle all of the boilerplate code as well.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然有更多的样板代码，但我们不再需要互斥锁！如果我们想扩展这个操作并做其他事情，比如按数字增加，或写入文件，我们可以让特定的演员来处理。这种责任区分对于确保你的设计能够很好地扩展非常重要。甚至还有库可以处理所有的样板代码。
- en: Scheduling Conceptually
  id: totrans-250
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 概念上调度
- en: '**This section could be useful for those that like to analyze these algorithms
    mathematically**'
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: '**本节可能对喜欢从数学角度分析这些算法的人有所帮助**'
- en: If your co-worker asked you what scheduling algorithm to use, you may not have
    the tools to analyze each algorithm. So, let’s think about scheduling algorithms
    at a high level and break them down by their times. We will be evaluating this
    in the context of a random process timing, meaning that each process takes a random
    but finite amount of time to finish.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的同事问你该使用哪种调度算法，你可能没有分析每个算法的工具。那么，让我们从高层次思考调度算法，并按它们的执行时间来分解它们。我们将在这个随机过程调度的背景下进行评估，这意味着每个进程需要随机但有限的时间来完成。
- en: Just a refresher, here are the terms.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 只是一个提醒，以下是一些术语。
- en: Scheduling Variables
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 调度变量
- en: '| Concept | Meaning |'
  id: totrans-255
  prefs: []
  type: TYPE_TB
  zh: '| 概念 | 含义 |'
- en: '| --- | --- |'
  id: totrans-256
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Start time | The time the scheduler first started work |'
  id: totrans-257
  prefs: []
  type: TYPE_TB
  zh: '| 开始时间 | 调度器首次开始工作的时间 |'
- en: '| End time | When the scheduler finished the process |'
  id: totrans-258
  prefs: []
  type: TYPE_TB
  zh: '| 结束时间 | 调度器完成进程的时间 |'
- en: '| Arrival time | When the job first arrived at the scheduler |'
  id: totrans-259
  prefs: []
  type: TYPE_TB
  zh: '| 到达时间 | 当作业首次到达调度器时 |'
- en: '| Run time | How long does the process take to run if there is no preemption
    |'
  id: totrans-260
  prefs: []
  type: TYPE_TB
  zh: '| 运行时间 | 如果没有抢占，进程需要多长时间才能运行 |'
- en: And here are the measures we are trying to optimize.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 以及我们试图优化的度量。
- en: Scheduling Measures of Efficiency
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 调度效率度量
- en: '| Measure | Formula |'
  id: totrans-263
  prefs: []
  type: TYPE_TB
  zh: '| 度量 | 公式 |'
- en: '| --- | --- |'
  id: totrans-264
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Response Time | Start time minus Arrival time |'
  id: totrans-265
  prefs: []
  type: TYPE_TB
  zh: '| 响应时间 | 开始时间减去到达时间 |'
- en: '| Turnaround time | End time minus Arrival time |'
  id: totrans-266
  prefs: []
  type: TYPE_TB
  zh: '| 周转时间 | 结束时间减去到达时间 |'
- en: '| Wait time | End time minus Arrival time minus Run time |'
  id: totrans-267
  prefs: []
  type: TYPE_TB
  zh: '| 等待时间 | 结束时间减去到达时间减去运行时间 |'
- en: Different use cases will be discussed after. Let the maximum amount of time
    that a process run be equal to <semantics><mi>S</mi><annotation encoding="application/x-tex">S</annotation></semantics>.
    We will also assume that there are a finite number of processes running at any
    given time <semantics><mi>c</mi><annotation encoding="application/x-tex">c</annotation></semantics>.
    Here are some concepts from queueing theory that you’ll need to know that will
    help simplify the theories.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 之后将讨论不同的用例。让一个进程运行的最大时间等于 <semantics><mi>S</mi><annotation encoding="application/x-tex">S</annotation></semantics>。我们还将假设在任何给定时间都有有限数量的进程在运行
    <semantics><mi>c</mi><annotation encoding="application/x-tex">c</annotation></semantics>。以下是您需要了解的一些排队论概念，这将有助于简化理论。
- en: Queueing theory involves a random variable controlling the interarrival time
    – or the time between two different processes arriving. We won’t name this random
    variable, but we will assume that (1) it has a mean of <semantics><mi>λ</mi><annotation
    encoding="application/x-tex">\lambda</annotation></semantics> and (2) it is distributed
    as a Poisson random variable. This means the probability of getting a process
    <semantics><mi>t</mi><annotation encoding="application/x-tex">t</annotation></semantics>
    units after getting another process is <semantics><mrow><msup><mi>λ</mi><mi>t</mi></msup><mo>*</mo><mfrac><mrow><mo>exp</mo><mo
    stretchy="false" form="prefix">(</mo><mo>−</mo><mi>λ</mi><mo stretchy="false"
    form="postfix">)</mo></mrow><mrow><mi>t</mi><mi>!</mi></mrow></mfrac></mrow><annotation
    encoding="application/x-tex">\lambda^t * \frac{\exp(-\lambda)}{t!}</annotation></semantics>
    where <semantics><mrow><mi>t</mi><mi>!</mi></mrow><annotation encoding="application/x-tex">t!</annotation></semantics>
    can be approximated by the gamma function when dealing with real values.
  id: totrans-269
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 排队论涉及一个随机变量控制着到达间隔时间——或者说两个不同进程到达之间的时间。我们不会命名这个随机变量，但我们将假设（1）它有一个平均值为 <semantics><mi>λ</mi><annotation
    encoding="application/x-tex">\lambda</annotation></semantics>，并且（2）它服从泊松分布。这意味着在得到另一个进程后，得到一个进程
    <semantics><mi>t</mi><annotation encoding="application/x-tex">t</annotation></semantics>
    单位时间的概率是 <semantics><mrow><msup><mi>λ</mi><mi>t</mi></msup><mo>*</mo><mfrac><mrow><mo>exp</mo><mo
    stretchy="false" form="prefix">(</mo><mo>−</mo><mi>λ</mi><mo stretchy="false"
    form="postfix">)</mo></mrow><mrow><mi>t</mi><mi>!</mi></mrow></mfrac></mrow><annotation
    encoding="application/x-tex">\lambda^t * \frac{\exp(-\lambda)}{t!}</annotation></semantics>，其中
    <semantics><mrow><mi>t</mi><mi>!</mi></mrow><annotation encoding="application/x-tex">t!</annotation></semantics>
    在处理实数时可以近似为伽马函数。
- en: We will be denoting the service time <semantics><mi>S</mi><annotation encoding="application/x-tex">S</annotation></semantics>,
    and deriving the waiting time <semantics><mi>W</mi><annotation encoding="application/x-tex">W</annotation></semantics>,
    and the response time <semantics><mi>R</mi><annotation encoding="application/x-tex">R</annotation></semantics>;
    more specifically the expected values of all of those variables <semantics><mrow><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><mi>S</mi><mo stretchy="false" form="postfix">]</mo></mrow><annotation
    encoding="application/x-tex">E[S]</annotation></semantics> deriving turnaround
    time is simply <semantics><mrow><mi>S</mi><mo>+</mo><mi>W</mi></mrow><annotation
    encoding="application/x-tex">S + W</annotation></semantics>. For clarity, we will
    introduce another variable <semantics><mi>N</mi><annotation encoding="application/x-tex">N</annotation></semantics>
    that is the number of people currently in the queue. A famous result in queueing
    theory is Little’s Law which states <semantics><mrow><mi>E</mi><mo stretchy="false"
    form="prefix">[</mo><mi>N</mi><mo stretchy="false" form="postfix">]</mo><mo>=</mo><mi>λ</mi><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><mi>W</mi><mo stretchy="false" form="postfix">]</mo></mrow><annotation
    encoding="application/x-tex">E[N] = \lambda E[W]</annotation></semantics> meaning
    that the number of people waiting is the arrival rate times the expected waiting
    time (assuming the queue is in a steady state).
  id: totrans-270
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们将表示服务时间<semantics><mi>S</mi><annotation encoding="application/x-tex">S</annotation></semantics>，并推导出等待时间<semantics><mi>W</mi><annotation
    encoding="application/x-tex">W</annotation></semantics>和响应时间<semantics><mi>R</mi><annotation
    encoding="application/x-tex">R</annotation></semantics>；更具体地说，所有这些变量的期望值<semantics><mrow><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><mi>S</mi><mo stretchy="false" form="postfix">]</mo></mrow><annotation
    encoding="application/x-tex">E[S]</annotation></semantics>推导出周转时间是简单的<semantics><mrow><mi>S</mi><mo>+</mo><mi>W</mi></mrow><annotation
    encoding="application/x-tex">S + W</annotation></semantics>。为了清晰起见，我们将引入另一个变量<semantics><mi>N</mi><annotation
    encoding="application/x-tex">N</annotation></semantics>，它是当前队列中的人数。排队论中的一个著名结果是Little定律，它指出<semantics><mrow><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><mi>N</mi><mo stretchy="false" form="postfix">]</mo><mo>=</mo><mi>λ</mi><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><mi>W</mi><mo stretchy="false" form="postfix">]</mo></mrow><annotation
    encoding="application/x-tex">E[N] = \lambda E[W]</annotation></semantics>，这意味着等待的人数是到达率乘以期望等待时间（假设队列处于稳定状态）。
- en: We won’t make many assumptions about how much time it takes to run each process
    except that it will take a finite amount of time – otherwise this gets almost
    impossible to evaluate. We will denote two variables that <semantics><mfrac><mn>1</mn><mi>μ</mi></mfrac><annotation
    encoding="application/x-tex">\frac{1}{\mu}</annotation></semantics> is the mean
    of the waiting time and that the coefficient of variation <semantics><mi>C</mi><annotation
    encoding="application/x-tex">C</annotation></semantics> is defined as <semantics><mrow><msup><mi>C</mi><mn>2</mn></msup><mo>=</mo><mfrac><mrow><mi>v</mi><mi>a</mi><mi>r</mi><mo
    stretchy="false" form="prefix">(</mo><mi>S</mi><mo stretchy="false" form="postfix">)</mo></mrow><mrow><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><mi>S</mi><msup><mo stretchy="false" form="postfix">]</mo><mn>2</mn></msup></mrow></mfrac></mrow><annotation
    encoding="application/x-tex">C^2 = \frac{var(S)}{E[S]^2}</annotation></semantics>
    to help us control for processes that take a while to finish. An important note
    is that when <semantics><mrow><mi>C</mi><mo>></mo><mn>1</mn></mrow><annotation
    encoding="application/x-tex">C > 1</annotation></semantics> we say that the running
    times of the process are variadic. We will note below that this rockets up the
    wait and response times for FCFS quadratically.
  id: totrans-271
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们不会对每个过程运行所需的时间做出太多假设，除了它将需要有限的时间——否则这几乎无法评估。我们将表示两个变量，其中<semantics><mfrac><mn>1</mn><mi>μ</mi></mfrac><annotation
    encoding="application/x-tex">\frac{1}{\mu}</annotation></semantics>是等待时间的平均值，而变异系数<semantics><mi>C</mi><annotation
    encoding="application/x-tex">C</annotation></semantics>定义为<semantics><mrow><msup><mi>C</mi><mn>2</mn></msup><mo>=</mo><mfrac><mrow><mi>v</mi><mi>a</mi><mi>r</mi><mo
    stretchy="false" form="prefix">(</mo><mi>S</mi><mo stretchy="false" form="postfix">)</mo></mrow><mrow><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><mi>S</mi><msup><mo stretchy="false" form="postfix">]</mo><mn>2</mn></msup></mrow></mfrac></mrow><annotation
    encoding="application/x-tex">C^2 = \frac{var(S)}{E[S]^2}</annotation></semantics>，以帮助我们控制那些需要较长时间完成的过程。一个重要的注意事项是，当<semantics><mrow><mi>C</mi><mo>></mo><mn>1</mn></mrow><annotation
    encoding="application/x-tex">C > 1</annotation></semantics>时，我们说该过程的运行时间是可变的。我们将在下面指出，这会使得FCFS的等待和响应时间呈二次方增长。
- en: <semantics><mrow><mi>ρ</mi><mo>=</mo><mfrac><mi>λ</mi><mi>μ</mi></mfrac><mo><</mo><mn>1</mn></mrow><annotation
    encoding="application/x-tex">\rho = \frac{\lambda}{\mu} < 1</annotation></semantics>
    Otherwise, our queue would become infinitely long
  id: totrans-272
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: <semantics><mrow><mi>ρ</mi><mo>=</mo><mfrac><mi>λ</mi><mi>μ</mi></mfrac><mo><</mo><mn>1</mn></mrow><annotation
    encoding="application/x-tex">\rho = \frac{\lambda}{\mu} < 1</annotation></semantics>
    否则，我们的队列将变得无限长
- en: We will assume that there is one processor. This is known as an M/G/1 queue
    in queueing theory.
  id: totrans-273
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们将假设只有一个处理器。这在排队论中被称为M/G/1队列。
- en: We’ll leave the service time as an expectation <semantics><mi>S</mi><annotation
    encoding="application/x-tex">S</annotation></semantics> otherwise we may run into
    over-simplifications with the algebra. Plus it is easier to compare different
    queueing disciplines with a common factor of service time.
  id: totrans-274
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们将把服务时间作为期望值 <semantics><mi>S</mi><annotation encoding="application/x-tex">S</annotation></semantics>
    否则，我们可能会在代数中出现过度简化的情况。此外，使用服务时间作为共同因素更容易比较不同的排队规则。
- en: First Come First Served
  id: totrans-275
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 先到先得
- en: All results are from Jorma Virtamo’s lectures on the matter (Virtamo, [n.d.](ch018.xhtml#ref-virtamo)).
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 所有结果均来自Jorma Virtamo关于该主题的讲座（Virtamo, [n.d.](ch018.xhtml#ref-virtamo))。
- en: The first is expected waiting time. <semantics><mrow><mi>E</mi><mo stretchy="false"
    form="prefix">[</mo><mi>W</mi><mo stretchy="false" form="postfix">]</mo><mo>=</mo><mfrac><mrow><mo
    stretchy="false" form="prefix">(</mo><mn>1</mn><mo>+</mo><msup><mi>C</mi><mn>2</mn></msup><mo
    stretchy="false" form="postfix">)</mo></mrow><mn>2</mn></mfrac><mfrac><mi>ρ</mi><mrow><mo
    stretchy="false" form="prefix">(</mo><mn>1</mn><mo>−</mo><mi>ρ</mi><mo stretchy="false"
    form="postfix">)</mo></mrow></mfrac><mo>*</mo><mi>E</mi><mo stretchy="false" form="prefix">[</mo><mi>S</mi><mo
    stretchy="false" form="postfix">]</mo></mrow><annotation encoding="application/x-tex">E[W]
    = \frac{(1 + C^2)}{2}\frac{\rho}{(1 - \rho)} * E[S]</annotation></semantics>
  id: totrans-277
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 第一项是预期等待时间。 <semantics><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><mi>W</mi><mo
    stretchy="false" form="postfix">]</mo><mo>=</mo><mfrac><mrow><mo stretchy="false"
    form="prefix">(</mo><mn>1</mn><mo>+</mo><msup><mi>C</mi><mn>2</mn></msup><mo stretchy="false"
    form="postfix">)</mo></mrow><mn>2</mn></mfrac><mfrac><mi>ρ</mi><mrow><mo stretchy="false"
    form="prefix">(</mo><mn>1</mn><mo>−</mo><mi>ρ</mi><mo stretchy="false" form="postfix">)</mo></mrow></mfrac><mo>*</mo><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><mi>S</mi><mo stretchy="false" form="postfix">]</mo></mrow><annotation
    encoding="application/x-tex">E[W] = \frac{(1 + C^2)}{2}\frac{\rho}{(1 - \rho)}
    * E[S]</annotation></semantics>
- en: What does this say? When given as <semantics><mrow><mi>ρ</mi><mo>→</mo><mn>1</mn></mrow><annotation
    encoding="application/x-tex">\rho \rightarrow 1</annotation></semantics> or the
    mean job arrival rate equals the mean job processing rate, then the wait times
    get long. Also, as the variance of the job increases, the wait times go up.
  id: totrans-278
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这是什么意思？当给定 <semantics><mrow><mi>ρ</mi><mo>→</mo><mn>1</mn></mrow><annotation
    encoding="application/x-tex">\rho \rightarrow 1</annotation></semantics> 或者平均作业到达率等于平均作业处理率时，等待时间会变长。此外，随着作业的方差增加，等待时间也会上升。
- en: Next is the expected response time
  id: totrans-279
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接下来是预期响应时间
- en: <semantics><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><mi>R</mi><mo
    stretchy="false" form="postfix">]</mo><mo>=</mo><mi>E</mi><mo stretchy="false"
    form="prefix">[</mo><mi>N</mi><mo stretchy="false" form="postfix">]</mo><mo>*</mo><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><mi>S</mi><mo stretchy="false" form="postfix">]</mo><mo>=</mo><mi>λ</mi><mo>*</mo><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><mi>W</mi><mo stretchy="false" form="postfix">]</mo><mo>*</mo><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><mi>S</mi><mo stretchy="false" form="postfix">]</mo></mrow><annotation
    encoding="application/x-tex">E[R] = E[N] * E[S] = \lambda * E[W] * E[S]</annotation></semantics>
    The response time is simple to calculate, it is the expected number of people
    ahead of the process in the queue times the expected time to service each of those
    processes. From Little’s Law above, we can substitute that for this. Since we
    already know the value of the waiting time, we can reason about the response time
    as well.
  id: totrans-280
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: <semantics><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><mi>R</mi><mo
    stretchy="false" form="postfix">]</mo><mo>=</mo><mi>E</mi><mo stretchy="false"
    form="prefix">[</mo><mi>N</mi><mo stretchy="false" form="postfix">]</mo><mo>*</mo><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><mi>S</mi><mo stretchy="false" form="postfix">]</mo><mo>=</mo><mi>λ</mi><mo>*</mo><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><mi>W</mi><mo stretchy="false" form="postfix">]</mo><mo>*</mo><mi>E</mi><mo
    stretchy="false" form="postfix">[</mo><mi>S</mi><mo stretchy="false" form="postfix">]</mo></mrow><annotation
    encoding="application/x-tex">E[R] = E[N] * E[S] = \lambda * E[W] * E[S]</annotation></semantics>
    响应时间计算简单，它是队列中等待处理的人数乘以每个处理过程的预期服务时间。从上面的Little定律中，我们可以用这个来替换。因为我们已经知道了等待时间，所以也可以对响应时间进行推理。
- en: A discussion of the results is shows something cool discovered by Conway and
    Al (Conway, Maxwell, and Miller [1967](ch018.xhtml#ref-conway1967theory)). Any
    scheduling discipline that isn’t preemptive and doesn’t take into account the
    run time of the process or a priority will have the same wait, response, and turnaround
    time. We will often use this as a baseline.
  id: totrans-281
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对结果的讨论显示了康威和阿尔（Conway, Maxwell, and Miller [1967](ch018.xhtml#ref-conway1967theory)）发现的一些有趣的东西。任何非抢占式调度策略，如果不考虑进程的运行时间或优先级，将会有相同的等待时间、响应时间和周转时间。我们经常会将其作为基准。
- en: Round Robin or Processor Sharing
  id: totrans-282
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 轮询调度或处理器共享
- en: It is hard to analyze Round Robin from a probabilistic sense because it is so
    state based. The next job that the scheduler schedules requires it to remember
    the previous jobs. Queueing theory developers have made an assumption that the
    time quanta is roughly zero – ignoring context switching and the like. This leads
    way into processor sharing. Many different tasks can get worked on at the same
    time but experience a slowdown. All of these proofs will be adapted from Harchol-Balter’s
    book (Harchol-Balter [2013](ch018.xhtml#ref-harchol2013performance)). We highly
    recommend checking out the books if you are interested. The proofs are intuitive
    for people who don’t have a background in queueing theory.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 从概率的角度分析轮询调度（Round Robin）是困难的，因为它非常依赖于状态。调度器安排的下一个工作需要它记住之前的工作。队列理论开发者做出了一个假设，即时间量子（time
    quanta）大约为零——忽略了上下文切换等因素。这引出了处理器共享的概念。许多不同的任务可以同时进行，但会经历速度下降。所有这些证明都将改编自Harchol-Balter的书籍（Harchol-Balter
    [2013](ch018.xhtml#ref-harchol2013performance)）。如果你对此感兴趣，我们强烈建议你查阅这些书籍。对于没有队列理论背景的人来说，这些证明是直观的。
- en: Before we jump to the answer let’s reason about this. With our new-found abstraction,
    we essentially have an FCFS queue where we are going to be working on each job
    a little slower than before. Since we are always working on a job
  id: totrans-284
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在我们跳到答案之前，让我们先对此进行推理。有了我们新发现的抽象，我们实际上有一个先来先服务（FCFS）队列，我们将比以前慢一点地处理每个工作。因为我们总是在处理一个工作
- en: <semantics><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><mi>W</mi><mo
    stretchy="false" form="postfix">]</mo><mo>=</mo><mn>0</mn></mrow><annotation encoding="application/x-tex">E[W]
    = 0</annotation></semantics>
  id: totrans-285
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: <semantics><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><mi>W</mi><mo
    stretchy="false" form="postfix">]</mo><mo>=</mo><mn>0</mn></mrow><annotation encoding="application/x-tex">E[W]
    = 0</annotation></semantics>
- en: Under a non-strict analysis of processor sharing though, the number of time
    that the scheduler waits is best approximated by the number of times the scheduler
    need to wait. You’ll need <semantics><mfrac><mrow><mi>E</mi><mo stretchy="false"
    form="prefix">[</mo><mi>S</mi><mo stretchy="false" form="postfix">]</mo></mrow><mi>Q</mi></mfrac><annotation
    encoding="application/x-tex">\frac{E[S]}{Q}</annotation></semantics> service periods
    where <semantics><mi>Q</mi><annotation encoding="application/x-tex">Q</annotation></semantics>
    is the quanta, and you’ll need about <semantics><mrow><mi>E</mi><mo stretchy="false"
    form="prefix">[</mo><mi>N</mi><mo stretchy="false" form="postfix">]</mo><mo>*</mo><mi>Q</mi></mrow><annotation
    encoding="application/x-tex">E[N] * Q</annotation></semantics> time in between
    those periods. Leading to an average time of <semantics><mrow><mi>E</mi><mo stretchy="false"
    form="prefix">[</mo><mi>W</mi><mo stretchy="false" form="postfix">]</mo><mo>=</mo><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><mi>S</mi><mo stretchy="false" form="postfix">]</mo><mo>*</mo><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><mi>N</mi><mo stretchy="false" form="postfix">]</mo></mrow><annotation
    encoding="application/x-tex">E[W] = E[S] * E[N]</annotation></semantics>
  id: totrans-286
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 然而，在非严格分析处理器共享的情况下，调度器等待的时间最好近似为调度器需要等待的次数。你需要<semantics><mfrac><mrow><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><mi>S</mi><mo stretchy="false" form="postfix">]</mo></mrow><mi>Q</mi></mfrac><annotation
    encoding="application/x-tex">\frac{E[S]}{Q}</annotation></semantics>个服务周期，其中<semantics><mi>Q</mi><annotation
    encoding="application/x-tex">Q</annotation></semantics>是量子，你还需要大约<semantics><mrow><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><mi>N</mi><mo stretchy="false" form="postfix">]</mo><mo>*</mo><mi>Q</mi></mrow><annotation
    encoding="application/x-tex">E[N] * Q</annotation></semantics>的时间在这些周期之间。导致平均时间为<semantics><mrow><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><mi>W</mi><mo stretchy="false" form="postfix">]</mo><mo>=</mo><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><mi>S</mi><mo stretchy="false" form="postfix">]</mo><mo>*</mo><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><mi>N</mi><mo stretchy="false" form="postfix">]</mo></mrow><annotation
    encoding="application/x-tex">E[W] = E[S] * E[N]</annotation></semantics>
- en: The reason this proof is non-rigorous is that we can’t assume that there will
    always be <semantics><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><mi>N</mi><mo
    stretchy="false" form="postfix">]</mo><mo>*</mo><mi>Q</mi></mrow><annotation encoding="application/x-tex">E[N]
    * Q</annotation></semantics> time on average in between cycles because it depends
    on the state of the system. This means we need to factor in various variations
    in processing delay. We also can’t use Little’s Law in this case because there
    is no real steady state of the system. Otherwise, we’d be able to prove some weird
    things.
  id: totrans-287
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这个证明非严格的原因是我们不能假设在循环之间平均总会有<semantics><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><mi>N</mi><mo
    stretchy="false" form="postfix">]</mo><mo>*</mo><mi>Q</mi></mrow><annotation encoding="application/x-tex">E[N]
    * Q</annotation></semantics>时间，因为这取决于系统的状态。这意味着我们需要考虑处理延迟的各种变化。我们也不能在这种情况下使用Little’s
    Law，因为没有真正的系统稳态。否则，我们就能证明一些奇怪的事情。
- en: Interestingly, we don’t have to worry about the convoy effect or any new processes
    coming in. The total wait time remains bounded by the number of people in the
    queue. For those of you familiar with tail inequalities since processes arrive
    according to a Poisson distribution, the probability that we’ll get many processes
    drops off exponentially due to Chernoff bounds (all arrivals are independent of
    other arrivals). Meaning roughly we can assume low variance on the number of processes.
    As long as the service time is reasonable on average, the wait time will be too.
  id: totrans-288
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 有趣的是，我们不必担心车队效应或任何新进程的到来。总等待时间仍然由队列中的人数所限制。对于那些熟悉尾不等式的人来说，由于进程按照泊松分布到达，我们得到许多进程的概率会因Chernoff界限（所有到达都是相互独立的）而指数下降。这意味着我们大致可以假设进程数量的方差较低。只要平均服务时间是合理的，等待时间也会是合理的。
- en: The expected response time is <semantics><mrow><mi>E</mi><mo stretchy="false"
    form="prefix">[</mo><mi>R</mi><mo stretchy="false" form="postfix">]</mo><mo>=</mo><mn>0</mn></mrow><annotation
    encoding="application/x-tex">E[R] = 0</annotation></semantics>
  id: totrans-289
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 预期响应时间是<semantics><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><mi>R</mi><mo
    stretchy="false" form="postfix">]</mo><mo>=</mo><mn>0</mn></mrow><annotation encoding="application/x-tex">E[R]
    = 0</annotation></semantics>
- en: Under strict processor sharing, it is 0 because all jobs are worked on. In practice,
    the response time is. <semantics><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><mi>R</mi><mo
    stretchy="false" form="postfix">]</mo><mo>=</mo><mi>E</mi><mo stretchy="false"
    form="prefix">[</mo><mi>N</mi><mo stretchy="false" form="postfix">]</mo><mo>*</mo><mi>Q</mi></mrow><annotation
    encoding="application/x-tex">E[R] = E[N] * Q</annotation></semantics>
  id: totrans-290
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在严格的处理器共享下，它是0，因为所有作业都在处理中。在实践中，响应时间是<semantics><mrow><mi>E</mi><mo stretchy="false"
    form="prefix">[</mo><mi>R</mi><mo stretchy="false" form="postfix">]</mo><mo>=</mo><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><mi>N</mi><mo stretchy="false" form="postfix">]</mo><mo>*</mo><mi>Q</mi></mrow><annotation
    encoding="application/x-tex">E[R] = E[N] * Q</annotation></semantics>
- en: Where <semantics><mi>Q</mi><annotation encoding="application/x-tex">Q</annotation></semantics>
    is the quanta. Using Little’s Law again, we can find out that <semantics><mrow><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><mi>R</mi><mo stretchy="false" form="postfix">]</mo><mo>=</mo><mi>λ</mi><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><mi>W</mi><mo stretchy="false" form="postfix">]</mo><mo>*</mo><mi>Q</mi></mrow><annotation
    encoding="application/x-tex">E[R] = \lambda E[W] * Q</annotation></semantics>
  id: totrans-291
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 其中<semantics><mi>Q</mi><annotation encoding="application/x-tex">Q</annotation></semantics>是量子。再次使用Little’s
    Law，我们可以找出<semantics><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><mi>R</mi><mo
    stretchy="false" form="postfix">]</mo><mo>=</mo><mi>λ</mi><mi>E</mi><mo stretchy="false"
    form="prefix">[</mo><mi>W</mi><mo stretchy="false" form="postfix">]</mo><mo>*</mo><mi>Q</mi></mrow><annotation
    encoding="application/x-tex">E[R] = \lambda E[W] * Q</annotation></semantics>
- en: A different variable is the amount of service time let the service time for
    processor sharing be defined as <semantics><msub><mi>S</mi><mrow><mi>P</mi><mi>S</mi></mrow></msub><annotation
    encoding="application/x-tex">S_{PS}</annotation></semantics>. The slowdown is
    <semantics><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><msub><mi>S</mi><mrow><mi>P</mi><mi>S</mi></mrow></msub><mo
    stretchy="false" form="postfix">]</mo><mo>=</mo><mfrac><mrow><mi>E</mi><mo stretchy="false"
    form="prefix">[</mo><mi>S</mi><mo stretchy="false" form="postfix">]</mo></mrow><mrow><mn>1</mn><mo>−</mo><mi>ρ</mi></mrow></mfrac></mrow><annotation
    encoding="application/x-tex">E[S_{PS}] = \frac{E[S]}{1 - \rho}</annotation></semantics>
    Which means as the mean arrival rate equals the mean processing time, then the
    jobs will take asymptotically as long to finish. In the non-strict analysis of
    processor sharing, we assume that <semantics><mrow><mi>E</mi><mo stretchy="false"
    form="prefix">[</mo><msub><mi>S</mi><mrow><mi>R</mi><mi>R</mi></mrow></msub><mo
    stretchy="false" form="postfix">]</mo><mo>=</mo><mi>E</mi><mo stretchy="false"
    form="prefix">[</mo><mi>S</mi><mo stretchy="false" form="postfix">]</mo><mo>+</mo><mi>Q</mi><mo>*</mo><mi>ϵ</mi><mo>,</mo><mi>ϵ</mi><mo>></mo><mn>0</mn></mrow><annotation
    encoding="application/x-tex">E[S_{RR}] = E[S] + Q * \epsilon, \epsilon > 0</annotation></semantics>
    <semantics><mi>ϵ</mi><annotation encoding="application/x-tex">\epsilon</annotation></semantics>
    is the amount of time a context switch takes.
  id: totrans-292
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 另一个变量是服务时间，处理器共享的服务时间可以定义为 <semantics><msub><mi>S</mi><mrow><mi>P</mi><mi>S</mi></mrow></msub><annotation
    encoding="application/x-tex">S_{PS}</annotation></semantics>。减速比是 <semantics><mrow><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><msub><mi>S</mi><mrow><mi>P</mi><mi>S</mi></mrow></msub><mo
    stretchy="false" form="postfix">]</mo><mo>=</mo><mfrac><mrow><mi>E</mi><mo stretchy="false"
    form="prefix">[</mo><mi>S</mi><mo stretchy="false" form="postfix">]</mo></mrow><mrow><mn>1</mn><mo>−</mo><mi>ρ</mi></mrow></mfrac></mrow><annotation
    encoding="application/x-tex">E[S_{PS}] = \frac{E[S]}{1 - \rho}</annotation></semantics>
    这意味着当平均到达率等于平均处理时间时，作业完成所需的时间将趋于无穷大。在处理器共享的非严格分析中，我们假设 <semantics><mrow><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><msub><mi>S</mi><mrow><mi>R</mi><mi>R</mi></mrow></msub><mo
    stretchy="false" form="postfix">]</mo><mo>=</mo><mi>E</mi><mo stretchy="false"
    form="prefix">[</mo><mi>S</mi><mo stretchy="false" form="postfix">]</mo><mo>+</mo><mi>Q</mi><mo>*</mo><mi>ϵ</mi><mo>,</mo><mi>ϵ</mi><mo>></mo><mn>0</mn></mrow><annotation
    encoding="application/x-tex">E[S_{RR}] = E[S] + Q * \epsilon, \epsilon > 0</annotation></semantics>
    <semantics><mi>ϵ</mi><annotation encoding="application/x-tex">\epsilon</annotation></semantics>
    是上下文切换所需的时间量。
- en: That naturally leads to the comparison, what is better? The response time is
    roughly the same comparing the non-strict versions, the wait time is roughly the
    same, but notice that nothing about the variation of the jobs is put in. That’s
    because RR doesn’t have to deal with the convoy effect and any variances associated,
    otherwise FCFS is faster in a strict sense. It also takes more time for the jobs
    to finish, but the overall turnaround time is lower under high variance loads.
  id: totrans-293
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 这自然引出了比较，哪个更好？与非严格版本相比，响应时间大致相同，等待时间也大致相同，但请注意，关于作业变化的任何信息都没有被考虑进去。这是因为轮转调度（RR）不需要处理车队效应及其相关差异，否则在严格意义上先来先服务（FCFS）会更快。完成作业所需的时间也更多，但在高方差负载下，整体周转时间会更低。
- en: Non Preemptive Priority
  id: totrans-294
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 非抢占优先级
- en: We will introduce the notation that there are <semantics><mi>k</mi><annotation
    encoding="application/x-tex">k</annotation></semantics> different priorities and
    <semantics><mrow><msub><mi>ρ</mi><mi>i</mi></msub><mo>></mo><mn>0</mn></mrow><annotation
    encoding="application/x-tex">\rho_i > 0</annotation></semantics> is the average
    load contribution for priority <semantics><mi>i</mi><annotation encoding="application/x-tex">i</annotation></semantics>
    We are constrained by <semantics><mrow><munderover><mo>∑</mo><mrow><mi>i</mi><mo>=</mo><mn>0</mn></mrow><mi>k</mi></munderover><msub><mi>ρ</mi><mi>i</mi></msub><mo>=</mo><mi>ρ</mi></mrow><annotation
    encoding="application/x-tex">\sum\limits_{i=0}^k \rho_i = \rho</annotation></semantics>.
    We will also denote <semantics><mrow><mi>ρ</mi><mo stretchy="false" form="prefix">(</mo><mi>x</mi><mo
    stretchy="false" form="postfix">)</mo><mo>=</mo><munderover><mo>∑</mo><mrow><mi>i</mi><mo>=</mo><mn>0</mn></mrow><mi>x</mi></munderover><msub><mi>ρ</mi><mi>i</mi></msub></mrow><annotation
    encoding="application/x-tex">\rho(x) = \sum\limits_{i=0}^x \rho_i</annotation></semantics>
    which is the load contribution for all higher and similar priority processes to
    <semantics><mi>x</mi><annotation encoding="application/x-tex">x</annotation></semantics>.
    The last bit of notation is that we will assume that the probability of getting
    a process of priority <semantics><mi>i</mi><annotation encoding="application/x-tex">i</annotation></semantics>
    is <semantics><msub><mi>p</mi><mi>i</mi></msub><annotation encoding="application/x-tex">p_i</annotation></semantics>
    and naturally <semantics><mrow><munderover><mo>∑</mo><mrow><mi>j</mi><mo>=</mo><mn>0</mn></mrow><mi>k</mi></munderover><msub><mi>p</mi><mi>j</mi></msub><mo>=</mo><mn>1</mn></mrow><annotation
    encoding="application/x-tex">\sum\limits_{j=0}^k p_j = 1</annotation></semantics>
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将介绍存在 <semantics><mi>k</mi><annotation encoding="application/x-tex">k</annotation></semantics>
    个不同优先级的记号，并且 <semantics><mrow><msub><mi>ρ</mi><mi>i</mi></msub><mo>></mo><mn>0</mn></mrow><annotation
    encoding="application/x-tex">\rho_i > 0</annotation></semantics> 表示优先级 <semantics><mi>i</mi><annotation
    encoding="application/x-tex">i</annotation></semantics> 的平均负载贡献。我们受到以下约束 <semantics><mrow><munderover><mo>∑</mo><mrow><mi>i</mi><mo>=</mo><mn>0</mn></mrow><mi>k</mi></munderover><msub><mi>ρ</mi><mi>i</mi></msub><mo>=</mo><mi>ρ</mi></mrow><annotation
    encoding="application/x-tex">\sum\limits_{i=0}^k \rho_i = \rho</annotation></semantics>。我们还将表示
    <semantics><mrow><mi>ρ</mi><mo stretchy="false" form="prefix">(</mo><mi>x</mi><mo
    stretchy="false" form="postfix">)</mo><mo>=</mo><munderover><mo>∑</mo><mrow><mi>i</mi><mo>=</mo><mn>0</mn></mrow><mi>x</mi></munderover><msub><mi>ρ</mi><mi>i</mi></msub></mrow><annotation
    encoding="application/x-tex">\rho(x) = \sum\limits_{i=0}^x \rho_i</annotation></semantics>，这是所有高于和类似优先级过程到
    <semantics><mi>x</mi><annotation encoding="application/x-tex">x</annotation></semantics>
    的负载贡献。最后一个记号是，我们将假设获得优先级 <semantics><mi>i</mi><annotation encoding="application/x-tex">i</annotation></semantics>
    的过程的概率是 <semantics><msub><mi>p</mi><mi>i</mi></msub><annotation encoding="application/x-tex">p_i</annotation></semantics>，并且自然地
    <semantics><mrow><munderover><mo>∑</mo><mrow><mi>j</mi><mo>=</mo><mn>0</mn></mrow><mi>k</mi></munderover><msub><mi>p</mi><mi>j</mi></msub><mo>=</mo><mn>1</mn></mrow><annotation
    encoding="application/x-tex">\sum\limits_{j=0}^k p_j = 1</annotation></semantics>
- en: If <semantics><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><msub><mi>W</mi><mi>i</mi></msub><mo
    stretchy="false" form="postfix">]</mo></mrow><annotation encoding="application/x-tex">E[W_i]</annotation></semantics>
    is the wait time for priority <semantics><mi>i</mi><annotation encoding="application/x-tex">i</annotation></semantics>,
    <semantics><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><msub><mi>W</mi><mi>x</mi></msub><mo
    stretchy="false" form="postfix">]</mo><mo>=</mo><mfrac><mrow><mo stretchy="false"
    form="prefix">(</mo><mn>1</mn><mo>+</mo><mi>C</mi><mo stretchy="false" form="postfix">)</mo></mrow><mn>2</mn></mfrac><mfrac><mi>ρ</mi><mrow><mo
    stretchy="false" form="prefix">(</mo><mn>1</mn><mo>−</mo><mi>ρ</mi><mo stretchy="false"
    form="prefix">(</mo><mi>x</mi><mo stretchy="false" form="postfix">)</mo><mo stretchy="false"
    form="postfix">)</mo><mo>*</mo><mo stretchy="false" form="prefix">(</mo><mn>1</mn><mo>−</mo><mi>ρ</mi><mo
    stretchy="false" form="prefix">(</mo><mi>x</mi><mo>−</mo><mn>1</mn><mo stretchy="false"
    form="postfix">)</mo><mo stretchy="false" form="postfix">)</mo></mrow></mfrac><mo>*</mo><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><msub><mi>S</mi><mi>i</mi></msub><mo stretchy="false"
    form="postfix">]</mo></mrow><annotation encoding="application/x-tex">E[W_x] =
    \frac{(1 + C)}{2}\frac{\rho}{(1 - \rho(x))*( 1 - \rho(x-1))} * E[S_i]</annotation></semantics>
    The full derivation is as always in the book. A more useful inequality is that.
  id: totrans-296
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果 <semantics><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><msub><mi>W</mi><mi>i</mi></msub><mo
    stretchy="false" form="postfix">]</mo></mrow><annotation encoding="application/x-tex">E[W_i]</annotation></semantics>
    是优先级 <semantics><mi>i</mi><annotation encoding="application/x-tex">i</annotation></semantics>
    的等待时间，<semantics><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><msub><mi>W</mi><mi>x</mi></msub><mo
    stretchy="false" form="postfix">]</mo><mo>=</mo><mfrac><mrow><mo stretchy="false"
    form="prefix">(</mo><mn>1</mn><mo>+</mo><mi>C</mi><mo stretchy="false" form="postfix">)</mo></mrow><mn>2</mn></mfrac><mfrac><mi>ρ</mi><mrow><mo
    stretchy="false" form="prefix">(</mo><mn>1</mn><mo>−</mo><mi>ρ</mi><mo stretchy="false"
    form="prefix">(</mo><mi>x</mi><mo stretchy="false" form="postfix">)</mo><mo stretchy="false"
    form="postfix">)</mo><mo>*</mo><mo stretchy="false" form="prefix">(</mo><mn>1</mn><mo>−</mo><mi>ρ</mi><mo
    stretchy="false" form="prefix">(</mo><mi>x</mi><mo>−</mo><mn>1</mn><mo stretchy="false"
    form="postfix">)</mo><mo stretchy="false" form="postfix">)</mo></mrow></mfrac><mo>*</mo><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><msub><mi>S</mi><mi>i</mi></msub><mo stretchy="false"
    form="postfix">]</mo></mrow><annotation encoding="application/x-tex">E[W_x] =
    \frac{(1 + C)}{2}\frac{\rho}{(1 - \rho(x))*( 1 - \rho(x-1))} * E[S_i]</annotation></semantics>
    的完整推导过程如书中所述。一个更有用的不等式是。
- en: <semantics><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><msub><mi>W</mi><mi>x</mi></msub><mo
    stretchy="false" form="postfix">]</mo><mo>≤</mo><mfrac><mrow><mn>1</mn><mo>+</mo><mi>C</mi></mrow><mn>2</mn></mfrac><mo>*</mo><mfrac><mi>ρ</mi><mrow><mo
    stretchy="false" form="prefix">(</mo><mn>1</mn><mo>−</mo><mi>ρ</mi><mo stretchy="false"
    form="prefix">(</mo><mi>x</mi><mo stretchy="false" form="postfix">)</mo><msup><mo
    stretchy="false" form="postfix">)</mo><mn>2</mn></msup></mrow></mfrac><mo>*</mo><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><msub><mi>S</mi><mi>i</mi></msub><mo stretchy="false"
    form="postfix">]</mo></mrow><annotation encoding="application/x-tex">E[W_x] \leq
    \frac{1 + C}{2}* \frac{\rho}{(1 - \rho(x))^2} * E[S_i]</annotation></semantics>
    because the addition of <semantics><msub><mi>ρ</mi><mi>x</mi></msub><annotation
    encoding="application/x-tex">\rho_x</annotation></semantics> can only increase
    the sum, decrease the denominator or increase the overall function. This means
    that if one is priority 0, then a process only need to wait for the other P0 processes
    which there should be <semantics><mrow><mi>ρ</mi><mi>C</mi><mi>/</mi><mo stretchy="false"
    form="prefix">(</mo><mn>1</mn><mo>−</mo><msub><mi>ρ</mi><mn>0</mn></msub><mo stretchy="false"
    form="postfix">)</mo></mrow><annotation encoding="application/x-tex">\rho C/ (1
    - \rho_0)</annotation></semantics> P0 processes arrived before to process in FCFS
    order. Then the next priority has to wait for all the others and so on and so
    forth.
  id: totrans-297
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: <semantics><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><msub><mi>W</mi><mi>x</mi></msub><mo
    stretchy="false" form="postfix">]</mo><mo>≤</mo><mfrac><mrow><mn>1</mn><mo>+</mo><mi>C</mi></mrow><mn>2</mn></mfrac><mo>*</mo><mfrac><mi>ρ</mi><mrow><mo
    stretchy="false" form="prefix">(</mo><mn>1</mn><mo>−</mo><mi>ρ</mi><mo stretchy="false"
    form="postfix">)</mo><msup><mo stretchy="false" form="postfix">)</mo><mn>2</mn></msup></mrow></mfrac><mo>*</mo><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><msub><mi>S</mi><mi>i</mi></msub><mo stretchy="false"
    form="postfix">]</mo></mrow><annotation encoding="application/x-tex">E[W_x] \leq
    \frac{1 + C}{2}* \frac{\rho}{(1 - \rho(x))^2} * E[S_i]</annotation></semantics>
    因为添加<semantics><msub><mi>ρ</mi><mi>x</mi></msub><annotation encoding="application/x-tex">\rho_x</annotation></semantics>只能增加总和，减少分母或增加整体函数。这意味着如果一个进程的优先级是0，那么它只需要等待其他所有P0进程，这些进程应该在FCFS顺序中先到达。然后下一个优先级必须等待所有其他进程，依此类推。
- en: The expected overall wait time is now
  id: totrans-298
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 现在期望的总等待时间是
- en: <semantics><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><mi>W</mi><mo
    stretchy="false" form="postfix">]</mo><mo>=</mo><munderover><mo>∑</mo><mrow><mi>i</mi><mo>=</mo><mn>0</mn></mrow><mi>k</mi></munderover><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><msub><mi>W</mi><mi>i</mi></msub><mo stretchy="false"
    form="postfix">]</mo><mo>*</mo><msub><mi>p</mi><mi>i</mi></msub></mrow><annotation
    encoding="application/x-tex">E[W] = \sum\limits_{i=0}^k E[W_i] * p_i</annotation></semantics>
  id: totrans-299
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: <semantics><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><mi>W</mi><mo
    stretchy="false" form="postfix">]</mo><mo>=</mo><munderover><mo>∑</mo><mrow><mi>i</mi><mo>=</mo><mn>0</mn></mrow><mi>k</mi></munderover><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><msub><mi>W</mi><mi>i</mi></msub><mo stretchy="false"
    form="postfix">]</mo><mo>*</mo><msub><mi>p</mi><mi>i</mi></msub></mrow><annotation
    encoding="application/x-tex">E[W] = \sum\limits_{i=0}^k E[W_i] * p_i</annotation></semantics>
- en: Now that we have notational soup, let’s factor out the important terms.
  id: totrans-300
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 现在我们有了符号混乱，让我们提取出重要的项。
- en: <semantics><mrow><munderover><mo>∑</mo><mrow><mi>i</mi><mo>=</mo><mn>0</mn></mrow><mi>k</mi></munderover><mfrac><msub><mi>p</mi><mi>i</mi></msub><mrow><mo
    stretchy="false" form="prefix">(</mo><mn>1</mn><mo>−</mo><mi>ρ</mi><mo stretchy="false"
    form="prefix">(</mo><mi>i</mi><mo stretchy="false" form="postfix">)</mo><msup><mo
    stretchy="false" form="postfix">)</mo><mn>2</mn></msup></mrow></mfrac></mrow><annotation
    encoding="application/x-tex">\sum\limits_{i=0}^k \frac{p_i}{(1-\rho(i))^2}</annotation></semantics>
  id: totrans-301
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: <semantics><mrow><munderover><mo>∑</mo><mrow><mi>i</mi><mo>=</mo><mn>0</mn></mrow><mi>k</mi></munderover><mfrac><msub><mi>p</mi><mi>i</mi></msub><mrow><mo
    stretchy="false" form="prefix">(</mo><mn>1</mn><mo>−</mo><mi>ρ</mi><mo stretchy="false"
    form="prefix">(</mo><mi>i</mi><mo stretchy="false" form="postfix">)</mo><msup><mo
    stretchy="false" form="postfix">)</mo><mn>2</mn></msup></mrow></mfrac></mrow><annotation
    encoding="application/x-tex">\sum\limits_{i=0}^k \frac{p_i}{(1-\rho(i))^2}</annotation></semantics>
- en: Which we compare with FCFS’ model of
  id: totrans-302
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 我们将其与FCFS模型的
- en: <semantics><mfrac><mn>1</mn><mrow><mn>1</mn><mo>−</mo><mi>ρ</mi></mrow></mfrac><annotation
    encoding="application/x-tex">\frac{1}{1-\rho}</annotation></semantics>
  id: totrans-303
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: <semantics><mfrac><mn>1</mn><mrow><mn>1</mn><mo>−</mo><mi>ρ</mi></mrow></mfrac><annotation
    encoding="application/x-tex">\frac{1}{1-\rho}</annotation></semantics>
- en: In words – you can work this out with experimenting distributions – if the system
    has a lot of low priority processes who don’t contribute a lot to the average
    load, your average wait time becomes much lower.
  id: totrans-304
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 用话来说——你可以通过实验分布来解决这个问题——如果系统中有很多低优先级的进程，它们对平均负载的贡献不大，那么平均等待时间会大大降低。
- en: The average per process response time is
  id: totrans-305
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 每个进程的平均响应时间是
- en: <semantics><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><msub><mi>R</mi><mi>i</mi></msub><mo
    stretchy="false" form="postfix">]</mo><mo>=</mo><munderover><mo>∑</mo><mrow><mi>j</mi><mo>=</mo><mn>0</mn></mrow><mi>i</mi></munderover><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><msub><mi>N</mi><mi>j</mi></msub><mo stretchy="false"
    form="postfix">]</mo><mo>*</mo><mi>E</mi><mo stretchy="false" form="prefix">[</mo><msub><mi>S</mi><mi>j</mi></msub><mo
    stretchy="false" form="postfix">]</mo></mrow><annotation encoding="application/x-tex">E[R_i]
    = \sum\limits_{j = 0}^i E[N_j] * E[S_j]</annotation></semantics>
  id: totrans-306
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: <semantics><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><msub><mi>R</mi><mi>i</mi></msub><mo
    stretchy="false" form="postfix">]</mo><mo>=</mo><munderover><mo>∑</mo><mrow><mi>j</mi><mo>=</mo><mn>0</mn></mrow><mi>i</mi></munderover><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><msub><mi>N</mi><mi>j</mi></msub><mo stretchy="false"
    form="postfix">]</mo><mo>*</mo><mi>E</mi><mo stretchy="false" form="prefix">[</mo><msub><mi>S</mi><mi>j</mi></msub><mo
    stretchy="false" form="postfix">]</mo></mrow><annotation encoding="application/x-tex">E[R_i]
    = \sum\limits_{j = 0}^i E[N_j] * E[S_j]</annotation></semantics>
- en: Which says that the scheduler needs to wait for all jobs with a higher priority
    and the same to go before a process can go. Imagine a series of FCFS queues that
    a process needs to wait your turn. Using Little’s Law for different colored jobs
    and the formula above we can simplify this
  id: totrans-307
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这意味着调度器需要等待所有优先级更高且相同的作业完成，然后一个进程才能开始。想象一下，进程需要等待轮到自己的一个FCFS（先来先服务）队列序列。使用Little定律对不同颜色的作业和上述公式，我们可以简化这一点
- en: <semantics><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><msub><mi>R</mi><mi>i</mi></msub><mo
    stretchy="false" form="postfix">]</mo><mo>=</mo><munderover><mo>∑</mo><mrow><mi>j</mi><mo>=</mo><mn>0</mn></mrow><mi>i</mi></munderover><msub><mi>λ</mi><mi>j</mi></msub><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><msub><mi>W</mi><mi>j</mi></msub><mo stretchy="false"
    form="postfix">]</mo><mo>*</mo><mi>E</mi><mo stretchy="false" form="prefix">[</mo><msub><mi>S</mi><mi>j</mi></msub><mo
    stretchy="false" form="postfix">]</mo></mrow><annotation encoding="application/x-tex">E[R_i]
    = \sum\limits_{j=0}^i \lambda_j E[W_j] * E[S_j]</annotation></semantics>
  id: totrans-308
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: <semantics><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><msub><mi>R</mi><mi>i</mi></msub><mo
    stretchy="false" form="postfix">]</mo><mo>=</mo><munderover><mo>∑</mo><mrow><mi>j</mi><mo>=</mo><mn>0</mn></mrow><mi>i</mi></munderover><msub><mi>λ</mi><mi>j</mi></msub><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><msub><mi>W</mi><mi>j</mi></msub><mo stretchy="false"
    form="postfix">]</mo><mo>*</mo><mi>E</mi><mo stretchy="false" form="prefix">[</mo><msub><mi>S</mi><mi>j</mi></msub><mo
    stretchy="false" form="postfix">]</mo></mrow><annotation encoding="application/x-tex">E[R_i]
    = \sum\limits_{j=0}^i \lambda_j E[W_j] * E[S_j]</annotation></semantics>
- en: And we can find the average response time by looking at the distribution of
    jobs
  id: totrans-309
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 我们可以通过查看作业的分布来找到平均响应时间
- en: <semantics><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><mi>R</mi><mo
    stretchy="false" form="postfix">]</mo><mo>=</mo><munderover><mo>∑</mo><mrow><mi>i</mi><mo>=</mo><mn>0</mn></mrow><mi>k</mi></munderover><msub><mi>p</mi><mi>i</mi></msub><mo
    stretchy="false" form="prefix">[</mo><munderover><mo>∑</mo><mrow><mi>j</mi><mo>=</mo><mn>0</mn></mrow><mi>k</mi></munderover><msub><mi>λ</mi><mi>j</mi></msub><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><msub><mi>W</mi><mi>j</mi></msub><mo stretchy="false"
    form="postfix">]</mo><mo>*</mo><mi>E</mi><mo stretchy="false" form="prefix">[</mo><msub><mi>S</mi><mi>j</mi></msub><mo
    stretchy="false" form="postfix">]</mo><mo stretchy="false" form="postfix">]</mo></mrow><annotation
    encoding="application/x-tex">E[R] = \sum\limits_{i=0}^k p_i [\sum\limits_{j=0}^k
    \lambda_j E[W_j] * E[S_j] ]</annotation></semantics>
  id: totrans-310
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: <semantics><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><mi>R</mi><mo
    stretchy="false" form="postfix">]</mo><mo>=</mo><munderover><mo>∑</mo><mrow><mi>i</mi><mo>=</mo><mn>0</mn></mrow><mi>k</mi></munderover><msub><mi>p</mi><mi>i</mi></msub><mo
    stretchy="false" form="prefix">[</mo><munderover><mo>∑</mo><mrow><mi>j</mi><mo>=</mo><mn>0</mn></mrow><mi>k</mi></munderover><msub><mi>λ</mi><mi>j</mi></msub><mi>E</mi><mo
    stretchy="false" form="postfix">[</mo><msub><mi>W</mi><mi>j</mi></msub><mo stretchy="false"
    form="postfix">]</mo><mo>*</mo><mi>E</mi><mo stretchy="false" form="prefix">[</mo><msub><mi>S</mi><mi>j</mi></msub><mo
    stretchy="false" form="postfix">]</mo><mo stretchy="false" form="postfix">]</mo></mrow><annotation
    encoding="application/x-tex">E[R] = \sum\limits_{i=0}^k p_i [\sum\limits_{j=0}^k
    \lambda_j E[W_j] * E[S_j] ]</annotation></semantics>
- en: Meaning that we are tied to wait times and service times of all other processes.
    If we break down this equation, we see again if we have a lot of high priority
    jobs that don’t contribute a lot to the load then our entire sum goes down. We
    won’t make too many assumptions about the service time for a job because that
    would interfere with our analysis from FCFS where we left it as an expression.
  id: totrans-311
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这意味着我们与所有其他进程的等待时间和服务时间绑定。如果我们分解这个方程，我们会再次看到，如果我们有很多高优先级的工作，而这些工作对负载的贡献不大，那么我们的总和就会下降。我们不会对工作的服务时间做出太多假设，因为这会干扰我们从FCFS分析中留下的分析，其中我们将服务时间作为一个表达式。
- en: As for a comparison with FCFS in the average case, it usually does better assuming
    that we have a smooth probability distribution – i.e. the probability of getting
    any particular priority is zero. In all of our formulas, we still have some probability
    mass to put on lower priority processes, bringing the expectation down. This statement
    doesn’t hold for all smooth distributions but for most real-world smoothed distributions
    (which tend to be smooth) they do.
  id: totrans-312
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于与FCFS在平均情况下的比较，如果我们假设有一个平滑的概率分布——即获得任何特定优先级的概率为零，那么它通常表现得更好。在我们所有的公式中，我们仍然有一些概率质量可以放在低优先级进程中，从而降低期望值。这个陈述并不适用于所有平滑分布，但对于大多数现实世界的平滑分布（它们往往很平滑）来说，它们是这样的。
- en: This isn’t even to mention the idea of utility. Utility means that if we gain
    an amount of happiness by having certain jobs finish, priority and preemptive
    priority maximize that while balancing out other measures of efficiency.
  id: totrans-313
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 更不用说效用这个概念了。效用意味着，如果我们通过完成某些工作获得一定量的快乐，优先级和抢占优先级将最大化这一点，同时平衡其他效率指标。
- en: Shortest Job First
  id: totrans-314
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 短作业优先
- en: This is a wonderful reduction to priority. Instead of having discrete priorities,
    we’ll introduce a process that takes <semantics><msub><mi>S</mi><mi>t</mi></msub><annotation
    encoding="application/x-tex">S_t</annotation></semantics> time to get serviced.
    <semantics><mi>T</mi><annotation encoding="application/x-tex">T</annotation></semantics>
    is the maximum amount of time a process can run for, our processes cannot run
    infinitely long. That means the following definitions hold, overriding the previous
    definitions in priority
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个将优先级降低得很好的例子。我们不会引入离散的优先级，而是会引入一个需要 <semantics><msub><mi>S</mi><mi>t</mi></msub><annotation
    encoding="application/x-tex">S_t</annotation></semantics> 时间来获得服务的过程。 <semantics><mi>T</mi><annotation
    encoding="application/x-tex">T</annotation></semantics> 是一个进程可以运行的最大时间，我们的进程不能无限期地运行。这意味着以下定义成立，覆盖了优先级中的先前定义。
- en: Let <semantics><mrow><mi>ρ</mi><mo stretchy="false" form="prefix">(</mo><mi>x</mi><mo
    stretchy="false" form="postfix">)</mo><mo>=</mo><msubsup><mo>∫</mo><mn>0</mn><mi>x</mi></msubsup><msub><mi>ρ</mi><mi>u</mi></msub><mi>d</mi><mi>u</mi></mrow><annotation
    encoding="application/x-tex">\rho(x) = \int_0^x \rho_u du</annotation></semantics>
    Be the average load contribution up to this point.
  id: totrans-316
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 让 <semantics><mrow><mi>ρ</mi><mo stretchy="false" form="prefix">(</mo><mi>x</mi><mo
    stretchy="false" form="postfix">)</mo><mo>=</mo><msubsup><mo>∫</mo><mn>0</mn><mi>x</mi></msubsup><msub><mi>ρ</mi><mi>u</mi></msub><mi>d</mi><mi>u</mi></mrow><annotation
    encoding="application/x-tex">\rho(x) = \int_0^x \rho_u du</annotation></semantics>
    表示到目前为止的平均负载贡献。
- en: <semantics><mrow><msubsup><mo>∫</mo><mn>0</mn><mi>k</mi></msubsup><msub><mi>p</mi><mi>u</mi></msub><mi>d</mi><mi>u</mi><mo>=</mo><mn>1</mn></mrow><annotation
    encoding="application/x-tex">\int_0^k p_u du = 1</annotation></semantics> Probability
    constraint.
  id: totrans-317
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: <semantics><mrow><msubsup><mo>∫</mo><mn>0</mn><mi>k</mi></msubsup><msub><mi>p</mi><mi>u</mi></msub><mi>d</mi><mi>u</mi><mo>=</mo><mn>1</mn></mrow><annotation
    encoding="application/x-tex">\int_0^k p_u du = 1</annotation></semantics> 概率约束。
- en: Etc, replace all the summations above with integrals
  id: totrans-318
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 等等，将上述所有求和替换为积分
- en: The only notational difference is we don’t have to make any assumptions about
    the service times of the jobs because they are denoted by service times subscript,
    all other analyses are the same.
  id: totrans-319
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 唯一的区别是我们不必对工作的服务时间做出任何假设，因为它们由服务时间下标表示，所有其他分析都是相同的。
- en: This means if you want low wait times on average compared to FCFS, your distribution
    needs to be right-skewed.
  id: totrans-320
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 这意味着，如果你想在平均情况下比FCFS有更低的等待时间，你的分布需要是右偏斜的。
- en: Preemptive Priority
  id: totrans-321
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 抢占优先级
- en: We will describe priority and SJF’s preemptive version in the same section because
    it is essentially the same as we’ve shown above. We’ll use the same notation as
    before. We will also introduce an additional term <semantics><msub><mi>C</mi><mi>i</mi></msub><annotation
    encoding="application/x-tex">C_i</annotation></semantics> which denotes the variation
    among a particular class
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在同一部分描述优先级和SJF的抢占版本，因为它本质上与我们上面展示的是相同的。我们将使用之前相同的符号。我们还将引入一个额外的术语 <semantics><msub><mi>C</mi><mi>i</mi></msub><annotation
    encoding="application/x-tex">C_i</annotation></semantics>，它表示特定类别之间的变化
- en: <semantics><mrow><msub><mi>C</mi><mi>i</mi></msub><mo>=</mo><mfrac><mrow><mi>v</mi><mi>a</mi><mi>r</mi><mo
    stretchy="false" form="prefix">(</mo><msub><mi>S</mi><mi>i</mi></msub><mo stretchy="false"
    form="postfix">)</mo></mrow><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><msub><mi>S</mi><mi>i</mi></msub><mo
    stretchy="false" form="postfix">]</mo></mrow></mfrac></mrow><annotation encoding="application/x-tex">C_i
    = \frac{var(S_i)}{E[S_i]}</annotation></semantics>
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: <semantics><mrow><msub><mi>C</mi><mi>i</mi></msub><mo>=</mo><mfrac><mrow><mi>v</mi><mi>a</mi><mi>r</mi><mo
    stretchy="false" form="prefix">(</mo><msub><mi>S</mi><mi>i</mi></msub><mo stretchy="false"
    form="postfix">)</mo></mrow><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><msub><mi>S</mi><mi>i</mi></msub><mo
    stretchy="false" form="postfix">]</mo></mrow></mfrac></mrow><annotation encoding="application/x-tex">C_i
    = \frac{var(S_i)}{E[S_i]}</annotation></semantics>
- en: Response Time. Just a head’s up, this isn’t going to be pretty. <semantics><mrow><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><msub><mi>R</mi><mi>i</mi></msub><mo stretchy="false"
    form="postfix">]</mo><mo>=</mo><mfrac><mrow><munderover><mo>∑</mo><mrow><mi>j</mi><mo>=</mo><mn>0</mn></mrow><mi>i</mi></munderover><mfrac><mrow><mo
    stretchy="false" form="prefix">(</mo><mn>1</mn><mo>+</mo><msub><mi>C</mi><mi>j</mi></msub><mo
    stretchy="false" form="postfix">)</mo></mrow><mn>2</mn></mfrac></mrow><mrow><mo
    stretchy="false" form="prefix">(</mo><mn>1</mn><mo>−</mo><mi>ρ</mi><mo stretchy="false"
    form="prefix">(</mo><mi>x</mi><mo stretchy="false" form="postfix">)</mo><mo stretchy="false"
    form="postfix">)</mo><mo>*</mo><mo stretchy="false" form="prefix">(</mo><mn>1</mn><mo>−</mo><mi>ρ</mi><mo
    stretchy="false" form="prefix">(</mo><mi>x</mi><mo>−</mo><mn>1</mn><mo stretchy="false"
    form="postfix">)</mo><mo stretchy="false" form="postfix">)</mo></mrow></mfrac><mo>*</mo><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><msub><mi>S</mi><mi>i</mi></msub><mo stretchy="false"
    form="postfix">]</mo></mrow><annotation encoding="application/x-tex">E[R_i] =
    \frac{\sum\limits_{j=0}^i\frac{(1 + C_j)}{2}}{(1 - \rho(x))*( 1 - \rho(x-1))}
    * E[S_i]</annotation></semantics>
  id: totrans-324
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 响应时间。请注意，这不会很美观。 <semantics><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><msub><mi>R</mi><mi>i</mi></msub><mo
    stretchy="false" form="postfix">]</mo><mo>=</mo><mfrac><mrow><munderover><mo>∑</mo><mrow><mi>j</mi><mo>=</mo><mn>0</mn></mrow><mi>i</mi></munderover><mfrac><mrow><mo
    stretchy="false" form="prefix">(</mo><mn>1</mn><mo>+</mo><msub><mi>C</mi><mi>j</mi></msub><mo
    stretchy="false" form="postfix">)</mo></mrow><mn>2</mn></mfrac></mrow><mrow><mo
    stretchy="false" form="prefix">(</mo><mn>1</mn><mo>−</mo><mi>ρ</mi><mo stretchy="false"
    form="postfix">)</mo><mo>*</mo><mo stretchy="false" form="prefix">(</mo><mn>1</mn><mo>−</mo><mi>ρ</mi><mo
    stretchy="false" form="postfix">)</mo></mrow></mfrac><mo>*</mo><mi>E</mi><mo stretchy="false"
    form="prefix">[</mo><msub><mi>S</mi><mi>i</mi></msub><mo stretchy="false" form="postfix">]</mo></mrow><annotation
    encoding="application/x-tex">E[R_i] = \frac{\sum\limits_{j=0}^i\frac{(1 + C_j)}{2}}{(1
    - \rho(x))*( 1 - \rho(x-1))} * E[S_i]</annotation></semantics>
- en: If this looks familiar it should. This is the average wait time in the nonpreemptive
    case with a small change. Instead of using the variance of the entire distribution,
    we are looking at the variance of each job coming in. The whole response times
    are
  id: totrans-325
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 如果这看起来很熟悉，那应该是的。这是非抢占情况下的平均等待时间，只是略有变化。我们不是使用整个分布的方差，而是查看每个进入的作业的方差。整个响应时间是
- en: <semantics><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><mi>R</mi><mo
    stretchy="false" form="postfix">]</mo><mo>=</mo><munderover><mo>∑</mo><mrow><mi>i</mi><mo>=</mo><mn>0</mn></mrow><mi>k</mi></munderover><msub><mi>p</mi><mi>i</mi></msub><mo>*</mo><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><msub><mi>R</mi><mi>i</mi></msub><mo stretchy="false"
    form="postfix">]</mo></mrow><annotation encoding="application/x-tex">E[R] = \sum\limits_{i
    = 0}^k p_i * E[R_i]</annotation></semantics>
  id: totrans-326
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: <semantics><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><mi>R</mi><mo
    stretchy="false" form="postfix">]</mo><mo>=</mo><munderover><mo>∑</mo><mrow><mi>i</mi><mo>=</mo><mn>0</mn></mrow><mi>k</mi></munderover><msub><mi>p</mi><mi>i</mi></msub><mo>*</mo><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><msub><mi>R</mi><mi>i</mi></msub><mo stretchy="false"
    form="postfix">]</mo></mrow><annotation encoding="application/x-tex">E[R] = \sum\limits_{i
    = 0}^k p_i * E[R_i]</annotation></semantics>
- en: If lower priorities jobs come in at a higher service time variance, that means
    our average response times could go down, unless they make up most of the jobs
    that come in. Think of the extreme cases. If 99% of the jobs are high priority
    and the rest make up the other percent, then the other jobs will get frequently
    interrupted, but high priority jobs will make up most of the jobs, so the expectation
    is still low. The other extreme is if one percent of jobs are high priority and
    they come in a low variance. That means the chances the system getting a high
    priority jobs that will take a long time is low, thus making our response times
    lower on average. We only run into trouble if high priority jobs make up a non-negligible
    amount, and they have a high variance in service times. This brings down response
    times as well as wait times.
  id: totrans-327
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 如果低优先级的工作在更高的服务时间方差下到来，这意味着我们的平均响应时间可能会下降，除非它们构成了大部分到来的工作。考虑极端情况。如果99%的工作是高优先级，其余的构成了其他百分比，那么其他工作将经常被中断，但高优先级的工作将构成大部分工作，因此期望值仍然很低。另一种极端情况是，如果1%的工作是高优先级，并且它们以低方差到来。这意味着系统获得需要长时间处理的高优先级工作的可能性很低，从而使我们的平均响应时间降低。我们只有在高优先级工作占相当大比例，并且它们在服务时间上有高方差时才会遇到麻烦。这会降低响应时间以及等待时间。
- en: Waiting Time <semantics><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><msub><mi>W</mi><mi>i</mi></msub><mo
    stretchy="false" form="postfix">]</mo><mo>=</mo><mi>E</mi><mo stretchy="false"
    form="prefix">[</mo><msub><mi>R</mi><mi>i</mi></msub><mo stretchy="false" form="postfix">]</mo><mo>+</mo><mfrac><mrow><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><msub><mi>S</mi><mi>i</mi></msub><mo stretchy="false"
    form="postfix">]</mo></mrow><mrow><mn>1</mn><mo>−</mo><mi>ρ</mi><mo stretchy="false"
    form="prefix">(</mo><mi>i</mi><mo stretchy="false" form="postfix">)</mo></mrow></mfrac></mrow><annotation
    encoding="application/x-tex">E[W_i] = E[R_i] + \frac{E[S_i]}{1 - \rho(i)}</annotation></semantics>
  id: totrans-328
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 等待时间 <semantics><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><msub><mi>W</mi><mi>i</mi></msub><mo
    stretchy="false" form="postfix">]</mo><mo>=</mo><mi>E</mi><mo stretchy="false"
    form="prefix">[</mo><msub><mi>R</mi><mi>i</mi></msub><mo stretchy="false" form="postfix">]</mo><mo>+</mo><mfrac><mrow><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><msub><mi>S</mi><mi>i</mi></msub><mo stretchy="false"
    form="postfix">]</mo></mrow><mrow><mn>1</mn><mo>−</mo><mi>ρ</mi><mo stretchy="false"
    form="prefix">(</mo><mi>i</mi><mo stretchy="false" form="postfix">)</mo></mrow></mfrac></mrow><annotation
    encoding="application/x-tex">E[W_i] = E[R_i] + \frac{E[S_i]}{1 - \rho(i)}</annotation></semantics>
- en: Taking the expectation among all processes we get
  id: totrans-329
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在所有过程中取期望值，我们得到
- en: <semantics><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><mi>W</mi><mo
    stretchy="false" form="postfix">]</mo><mo>=</mo><munderover><mo>∑</mo><mrow><mi>i</mi><mo>=</mo><mn>0</mn></mrow><mi>k</mi></munderover><msub><mi>p</mi><mi>i</mi></msub><mo
    stretchy="false" form="prefix">(</mo><mi>E</mi><mo stretchy="false" form="prefix">[</mo><msub><mi>R</mi><mi>i</mi></msub><mo
    stretchy="false" form="postfix">]</mo><mo>+</mo><mfrac><mrow><mi>E</mi><mo stretchy="false"
    form="prefix">[</mo><msub><mi>S</mi><mi>i</mi></msub><mo stretchy="false" form="postfix">]</mo></mrow><mrow><mn>1</mn><mo>−</mo><mi>ρ</mi><mo
    stretchy="false" form="prefix">(</mo><mi>i</mi><mo stretchy="false" form="postfix">)</mo></mrow></mfrac><mo
    stretchy="false" form="postfix">)</mo></mrow><annotation encoding="application/x-tex">E[W]
    = \sum\limits_{i = 0}^k p_i (E[R_i] + \frac{E[S_i]}{1 - \rho(i)})</annotation></semantics>
  id: totrans-330
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: <semantics><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><mi>W</mi><mo
    stretchy="false" form="postfix">]</mo><mo>=</mo><munderover><mo>∑</mo><mrow><mi>i</mi><mo>=</mo><mn>0</mn></mrow><mi>k</mi></munderover><msub><mi>p</mi><mi>i</mi></msub><mo
    stretchy="false" form="prefix">(</mo><mi>E</mi><mo stretchy="false" form="prefix">[</mo><msub><mi>R</mi><mi>i</mi></msub><mo
    stretchy="false" form="postfix">]</mo><mo>+</mo><mfrac><mrow><mi>E</mi><mo stretchy="false"
    form="prefix">[</mo><msub><mi>S</mi><mi>i</mi></msub><mo stretchy="false" form="postfix">]</mo></mrow><mrow><mn>1</mn><mo>−</mo><mi>ρ</mi><mo
    stretchy="false" form="prefix">(</mo><mi>i</mi><mo stretchy="false" form="postfix">)</mo></mrow></mfrac><mo
    stretchy="false" form="postfix">)</mo></mrow><annotation encoding="application/x-tex">E[W]
    = \sum\limits_{i = 0}^k p_i (E[R_i] + \frac{E[S_i]}{1 - \rho(i)})</annotation></semantics>
- en: We can simplify to
  id: totrans-331
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 我们可以简化为
- en: <semantics><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><mi>W</mi><mo
    stretchy="false" form="postfix">]</mo><mo>=</mo><mi>E</mi><mo stretchy="false"
    form="prefix">[</mo><mi>R</mi><mo stretchy="false" form="postfix">]</mo><mo>+</mo><munderover><mo>∑</mo><mrow><mi>i</mi><mo>=</mo><mn>0</mn></mrow><mi>k</mi></munderover><mfrac><mrow><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><msub><mi>S</mi><mi>i</mi></msub><mo stretchy="false"
    form="postfix">]</mo><msub><mi>p</mi><mi>i</mi></msub></mrow><mrow><mo stretchy="false"
    form="prefix">(</mo><mn>1</mn><mo>−</mo><mi>ρ</mi><mo stretchy="false" form="prefix">(</mo><mi>i</mi><mo
    stretchy="false" form="postfix">)</mo><mo stretchy="false" form="postfix">)</mo></mrow></mfrac></mrow><annotation
    encoding="application/x-tex">E[W] = E[R] + \sum\limits_{i=0}^k \frac{E[S_i]p_i}{(1
    - \rho(i))}</annotation></semantics>
  id: totrans-332
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: <semantics><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><mi>W</mi><mo
    stretchy="false" form="postfix">]</mo><mo>=</mo><mi>E</mi><mo stretchy="false"
    form="prefix">[</mo><mi>R</mi><mo stretchy="false" form="postfix">]</mo><mo>+</mo><munderover><mo>∑</mo><mrow><mi>i</mi><mo>=</mo><mn>0</mn></mrow><mi>k</mi></munderover><mfrac><mrow><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><msub><mi>S</mi><mi>i</mi></msub><mo stretchy="false"
    form="postfix">]</mo><msub><mi>p</mi><mi>i</mi></msub></mrow><mrow><mo stretchy="false"
    form="prefix">(</mo><mn>1</mn><mo>−</mo><mi>ρ</mi><mo stretchy="false" form="postfix">)</mo></mrow></mfrac></mrow><annotation
    encoding="application/x-tex">E[W] = E[R] + \sum\limits_{i=0}^k \frac{E[S_i]p_i}{(1
    - \rho(i))}</annotation></semantics>
- en: We incur the same cost on response time and then we have to suffer an additional
    cost based on what the probabilities are of lower priority jobs coming in and
    taking this job out. That is what we call the average interruption time. This
    follows the same laws as before. Since we have a variadic, pyramid summation if
    we have a lot of jobs with small service times then the wait time goes down for
    both additive pieces. It can be analytically shown that this is better given certain
    probability distributions. For example, try with the uniform versus FCFS or the
    non preemptive version. What happens? As always the proof is left to the reader.
  id: totrans-333
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 我们在响应时间上承担相同的成本，然后我们必须根据低优先级作业进入并占用这个作业的概率来承担额外的成本。这就是我们所说的平均中断时间。这遵循之前的相同规律。由于我们有一个可变长度的金字塔求和，如果我们有很多服务时间短的作业，那么对于加法部分，等待时间都会下降。可以通过分析证明，在一定的概率分布下，这种方法更好。例如，尝试使用均匀分布与先来先服务（FCFS）或非抢占版本。会发生什么？像往常一样，证明留给读者。
- en: Turnaround Time is the same formula <semantics><mrow><mi>E</mi><mo stretchy="false"
    form="prefix">[</mo><mi>T</mi><mo stretchy="false" form="postfix">]</mo><mo>=</mo><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><mi>S</mi><mo stretchy="false" form="postfix">]</mo><mo>+</mo><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><mi>W</mi><mo stretchy="false" form="postfix">]</mo></mrow><annotation
    encoding="application/x-tex">E[T] = E[S] + E[W]</annotation></semantics>. This
    means that given a distribution of jobs that has either low waiting time as described
    above, we will get low turnaround time – we can’t control the distribution of
    service times.
  id: totrans-334
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 周转时间遵循相同的公式 <semantics><mrow><mi>E</mi><mo stretchy="false" form="prefix">[</mo><mi>T</mi><mo
    stretchy="false" form="postfix">]</mo><mo>=</mo><mi>E</mi><mo stretchy="false"
    form="prefix">[</mo><mi>S</mi><mo stretchy="false" form="postfix">]</mo><mo>+</mo><mi>E</mi><mo
    stretchy="false" form="prefix">[</mo><mi>W</mi><mo stretchy="false" form="postfix">]</mo></mrow><annotation
    encoding="application/x-tex">E[T] = E[S] + E[W]</annotation></semantics>。这意味着，给定一个具有低等待时间分布的作业，我们将得到低周转时间——我们无法控制服务时间的分布。
- en: Preemptive Shortest Job First
  id: totrans-335
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 抢占式最短作业优先
- en: Unfortunately, we can’t use the same trick as before because an infinitesimal
    point doesn’t have a controlled variance. Imagine the comparisons though as the
    same as the previous section.
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，我们无法使用之前的方法，因为无穷小点没有受控的方差。尽管如此，想象一下与之前章节相同的比较。
- en: Networking Extra
  id: totrans-337
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 网络额外内容
- en: In-depth IPv4 Specification
  id: totrans-338
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 深入IPv4规范
- en: The Internet Protocol deals with routing, fragmentation, and reassembly of fragments.
    Datagrams are formatted as such
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 互联网协议处理路由、分片和重组分片。数据报格式如下
- en: '![IP Datagram divisibility](../media/file47.png)'
  id: totrans-340
  prefs: []
  type: TYPE_IMG
  zh: '![IP数据报可分性](../media/file47.png)'
- en: IP Datagram divisibility
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: IP数据报可分性
- en: The first octet is the version number, either 4 or 6
  id: totrans-342
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 第一个八位字节是版本号，要么是4，要么是6
- en: The next octet is how long the header is. Although it may seem that the header
    is a constant size, you can include optional parameters to augment the path that
    is taken or other instructions.
  id: totrans-343
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 下一个八位字节表示头部有多长。尽管看起来头部的大小是固定的，但你仍然可以包含可选参数来增强所采取的路径或其他指令。
- en: The next two octets specify the total length of the datagram. This means this
    is the header, the data, the footer, and the padding. This is given in multiple
    of octets, meaning that a value of 20 means 20 octets.
  id: totrans-344
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接下来的两个八位字节指定了数据报的总长度。这意味着这是头部、数据、尾部和填充。这是以八位字节为单位的，意味着值为20表示20个八位字节。
- en: The next two are Identification number. IP handles taking packets that are too
    big to be sent over the physical wire and chunks them up. As such, this number
    identifies what datagram this originally belonged to.
  id: totrans-345
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接下来的两个是标识号。IP处理将太大而无法通过物理线发送的数据包，并将它们分成块。因此，这个数字标识了这个数据报最初属于哪个数据报。
- en: The next octet is various bit flags that can be set.
  id: totrans-346
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接下来的一个八位字节是各种可以设置的位标志。
- en: The next octet and half is fragment number. If this packet was fragmented, this
    is the number this fragment represents
  id: totrans-347
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接下来的一个八位字节和半个字节是分片号。如果这个数据包被分片了，这个数字代表了这个分片。
- en: The next octet is time to live. So this is the number of "hops" (travels over
    a wire) a packet is allowed to go. This is set because different routing protocols
    could cause packets to go in circles, the packets must be dropped at some point.
  id: totrans-348
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接下来的一个八位字节是生存时间。这意味着数据包被允许经过的“跳数”（通过线的旅行）。这是设置的，因为不同的路由协议可能导致数据包在某个点进入循环，数据包必须在此处丢弃。
- en: The next octet is the protocol number. Although protocols between different
    layers of the OCI model are supposed to be black boxes, this is included, so that
    hardware can peer into the underlying protocol efficiently. Take for example IP
    over IP (yes you can do that!). Your ISP wraps IPv4 packets sent from your computer
    to the ISP in another IP layer and sends the packet off to be delivered to the
    website. On the reverse trip, the packet is "unwrapped" and the original IP datagram
    is sent to your computer. This was done because we ran out of IP addresses, and
    this adds additional overhead but it is a necessary fix. Other common protocols
    are TCP, UDP, etc.
  id: totrans-349
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接下来的一个八位字节是协议号。尽管OCI模型不同层之间的协议应该是黑盒，但这里也包括了，这样硬件可以有效地查看底层协议。以IP over IP为例（是的，你可以这样做！）！你的ISP将来自你的计算机发送到ISP的IPv4数据包包裹在另一个IP层中，并发送数据包以交付到网站。在反向行程中，数据包被“解包”，原始IP数据报被发送到你的计算机。这样做是因为我们用完了IP地址，这增加了额外的开销，但这是一个必要的修复。其他常见协议包括TCP、UDP等。
- en: The next two octets is an internet checksum. This is a CRC that is calculated
    to make sure that a wide variety of bit errors are detected.
  id: totrans-350
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 接下来的两个八位字节是互联网校验和。这是一个计算出来的CRC，用于确保检测到各种位错误。
- en: The source address is what people generally refer to as the IP address. There
    is no verification of this, so one host can pretend to be any IP address possible
  id: totrans-351
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 源地址是人们通常所说的IP地址。对此没有验证，所以一个主机可以假装成任何可能的IP地址。
- en: The destination address is where you want the packet to be sent to. Destinations
    are crucial to the routing process.
  id: totrans-352
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 目的地址是你希望数据包发送到的位置。目的地对于路由过程至关重要。
- en: 'Additional options: Hosts of additional options, this is variadic in size.'
  id: totrans-353
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 附加选项：附加选项的主机，这是可变大小的。
- en: 'Footer: A bit of padding to make sure your data is a multiple of 4 octets.'
  id: totrans-354
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 尾部：一些填充以确保数据是4个八位字节的倍数。
- en: 'After: Your data! All data of higher-order protocols are put following the
    header.'
  id: totrans-355
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 之后：您的数据！所有高于层协议的数据都放在头部之后。
- en: Routing
  id: totrans-356
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 路由
- en: The Internet Protocol routing is an amazing intersection of theory and application.
    We can imagine the entire Internet as a set of graphs. Most peers are connected
    to what we call "peering points" – these are the WiFi routers and Ethernet ports
    that one finds at home, at work, and in public. These peering points are then
    connected to a wired network of routers, switches, and servers that all route
    themselves. At a high level there are two types of routing
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 互联网协议路由是理论与应用的惊人交汇点。我们可以想象整个互联网就像一组图。大多数对等点连接到我们所说的“对等点”——这些是在家里、工作和公共场所找到的WiFi路由器和以太网端口。这些对等点然后连接到一个由路由器、交换机和服务器组成的有线网络，所有这些设备都进行路由。在高级别上，有两种类型的路由。
- en: Internal Routing Protocols. Internal protocols are routing designed for within
    an ISP’s network. These protocols are meant to be fast and more trusting because
    all computers, switches, and routers are part of an ISP. communication between
    two routers.
  id: totrans-358
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 内部路由协议。内部协议是为ISP网络内部设计的路由。这些协议旨在快速且更信任，因为所有计算机、交换机和路由器都是ISP的一部分。两个路由器之间的通信。
- en: External Routing Protocols. These typically happen to be ISP to ISP protocol.
    Certain routers are designated as border routers. These routers talk to routers
    from ISPs who have different policies from accepting or receiving packets. If
    an evil ISP is trying to dump all network traffic onto your ISP, these routers
    would deal with that. These protocols also deal with gathering information about
    the outside world to each router. In most routing protocols using link state or
    OSPF, a router must necessarily calculate the shortest path to the destination.
    This means it needs information about the "foreign" routers which is disseminated
    according to these protocols.
  id: totrans-359
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 外部路由协议。这些通常发生在ISP之间。某些路由器被指定为边界路由器。这些路由器与采用不同策略接受或接收数据包的ISP的路由器进行通信。如果一个邪恶的ISP试图将所有网络流量倾倒到你的ISP上，这些路由器将处理这种情况。这些协议还处理收集关于外部世界的每个路由器的信息。在大多数使用链路状态或OSPF的路由协议中，路由器必须必然计算到目的地的最短路径。这意味着它需要关于“外部”路由器的信息，这些信息根据这些协议进行传播。
- en: These two protocols have to interplay with each other nicely to make sure that
    packets are mostly delivered. Also, ISPs need to be nice to each other. Theoretically,
    an ISP can handle a smaller load by forwarding all packets to another ISP. If
    everyone does that then, no packets get delivered at all which won’t make customers
    happy at all. These two protocols need to be fair so the result works
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个协议必须很好地相互作用，以确保数据包大部分都能成功送达。此外，ISP之间也需要相互友好。理论上，一个ISP可以通过将所有数据包转发给另一个ISP来处理较小的负载。如果每个人都这样做，那么将没有任何数据包被送达，这肯定不会让客户感到满意。这两个协议需要公平，以确保结果有效。
- en: If you want to read more about this, look at the Wikipedia page for routing
    here [Routing](https://en.wikipedia.org/wiki/Routing).
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想了解更多关于这方面的内容，请查看维基百科上的路由页面 [路由](https://en.wikipedia.org/wiki/Routing)。
- en: Fragmentation/Reassembly
  id: totrans-362
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 分片/重组
- en: Lower layers like WiFi and Ethernet have maximum transmission sizes. The reason
    being is
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 低于WiFi和以太网等层的最大传输大小。原因在于
- en: One host shouldn’t crowd the medium for too long
  id: totrans-364
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一个主机不应该长时间占用介质。
- en: If an error occurs, we want some sort of "progress bar" on how far the communication
    has gone instead of retransmitting the entire stream.
  id: totrans-365
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果发生错误，我们希望有一种“进度条”来显示通信已经进行到哪一步，而不是重新传输整个流。
- en: There are physical limitations, keeping a laser beam in optics working continuously
    may cause bit errors.
  id: totrans-366
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 存在物理限制，保持激光束在光学中连续工作可能会导致位错误。
- en: If the Internet Protocol receives a packet that is too big for the maximum size,
    it must chunk it up. TCP calculates how many datagrams that it needs to construct
    a packet and ensures that they are all transmitted and reconstructed at the end
    receiver. The reason that we barely use this feature is that if any fragment is
    lost, the entire packet is lost. Meaning that, assuming the probability of receiving
    a packet assuming each fragment is lost with an independent percentage, the probability
    of successfully sending a packet drops off exponentially as packet size increases.
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 如果互联网协议收到一个比最大大小还要大的数据包，它必须将其分片。TCP计算需要构建一个数据包的多少个数据报，并确保它们在最终接收端全部传输和重建。我们几乎不使用这个功能的原因是，如果任何分片丢失，整个数据包都会丢失。这意味着，假设每个分片丢失的概率是独立的百分比，随着数据包大小的增加，成功发送数据包的概率会指数级下降。
- en: As such, TCP slices its packets so that it fits inside on IP datagram. The only
    time that this applies is when sending UDP packets that are too big, but most
    people who are using UDP optimize and set the same packet size as well.
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，TCP将数据包分片，使其适合在IP数据报中。这仅适用于发送太大的UDP数据包的情况，但大多数使用UDP的人都会优化并设置相同的包大小。
- en: IP Multicast
  id: totrans-369
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: IP多播
- en: A little known feature is that using the IP protocol one can send a datagram
    to all devices connected to a router in what is called a multicast. Multicasts
    can also be configured with groups, so one can efficiently slice up all connected
    routers and send a piece of information to all of them efficiently. To access
    this in a higher protocol, you need to use UDP and specify a few more options.
    Note that this will cause undue stress on the network, so a series of multicasts
    could flood the network fast.
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 一个鲜为人知的功能是，使用IP协议，可以向连接到路由器的所有设备发送一个数据报，这被称为多播。多播也可以配置为组，因此可以有效地分割所有连接的路由器，并高效地向它们发送一条信息。要在高层协议中访问此功能，您需要使用UDP并指定一些更多选项。请注意，这将对网络造成不必要的压力，因此一系列的多播可能会快速淹没网络。
- en: kqueue
  id: totrans-371
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: kqueue
- en: When it comes to Event-Driven IO, the name of the game is to be fast. One extra
    system call is considered slow. OpenBSD and FreeBSD have an arguably better model
    of asynchronous IO from the kqueue model. Kqueue is a system call that is exclusive
    the BSDs and MacOs. It allows you to modify file descriptor events and read file
    descriptors all in a single call under a unified interface. So what are the benefits?
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 当谈到事件驱动IO时，游戏的名字就是要快。一个额外的系统调用被认为是慢的。OpenBSD和FreeBSD从kqueue模型中有一个可以说是更好的异步IO模型。Kqueue是BSD和MacOs专有的系统调用。它允许你在统一的接口下在一个调用中修改文件描述符事件和读取文件描述符。那么，它的好处是什么？
- en: No more differentiation between file descriptors and kernel objects. In the
    epoll section, we had to discuss this distinction otherwise you may wonder why
    closed file descriptors are getting returned on epoll. No problem here.
  id: totrans-373
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 没有更多区分文件描述符和内核对象。在epoll部分，我们不得不讨论这个区别，否则你可能想知道为什么关闭的文件描述符会在epoll中返回。这里没有问题。
- en: How often do you call epoll to read file descriptors, get a server socket, and
    need to add another file descriptor? In a high-performance server, this can easily
    happen 1000s of times a second. As such, having one system call to register and
    grab events saves the overhead of having a system call.
  id: totrans-374
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你多久调用一次epoll来读取文件描述符、获取服务器套接字，并需要添加另一个文件描述符？在一个高性能服务器中，这可能会每秒发生1000次。因此，有一个系统调用来注册和获取事件可以节省系统调用的开销。
- en: The unified system call for all types. kqueue is the truest sense of underlying
    descriptor agnostic. One can add files, sockets, pipes to it and get full or near
    full performance. You can add the same to epoll, but Linux’s whole ecosystem with
    async file input-output has been messed up with , meaning that since there is
    no unified interface, you run into weird edge cases.
  id: totrans-375
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 所有类型的统一系统调用。kqueue是真正的底层描述符无关。你可以向其中添加文件、套接字、管道，并获得完整或接近完整的性能。你也可以向epoll添加相同的，但Linux的整个生态系统由于异步文件输入输出而被搞乱，这意味着由于没有统一的接口，你可能会遇到奇怪的边缘情况。
- en: Assorted Man Pages
  id: totrans-376
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 各种手册页
- en: Malloc
  id: totrans-377
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Malloc
- en: '[PRE33]'
  id: totrans-378
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: System Programming Jokes
  id: totrans-379
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 系统编程笑话
- en: 'Warning: Authors are not responsible for any neuro-apoptosis caused by these
    “jokes.” - Groaners are allowed.'
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 警告：作者不对由这些“笑话”引起的任何神经细胞凋亡负责。- 笑话是允许的。
- en: Light bulb jokes
  id: totrans-381
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 节能灯笑话
- en: Q. How many system programmers does it take to change a lightbulb?
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: Q. 改变一个灯泡需要多少个系统程序员？
- en: A. Just one but they keep changing it until it returns zero.
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: A. 只有一个，但他们不断改变它，直到它返回零。
- en: A. None they prefer an empty socket.
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: A. 他们更喜欢一个空的套接字。
- en: A. Well you start with one but actually it waits for a child to do all of the
    work.
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: A. 好吧，你开始时有一个，但实际上它等待一个子进程来完成所有工作。
- en: Groaners
  id: totrans-386
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 笑话
- en: Why did the baby system programmer like their new colorful blankie? It was multithreaded.
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么婴儿系统程序员喜欢他们新彩色的毛毯？因为它多线程。
- en: Why are your programs so fine and soft? I only use 400-thread-count or higher
    programs.
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么你的程序这么好，这么柔和？我只使用400支或更高的程序。
- en: Where do bad student shell processes go when they die? Forking Hell.
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 坏学生shell进程死后去哪里？分叉地狱。
- en: Why are C programmers so messy? They store everything in one big heap.
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么C程序员这么杂乱？他们把所有东西都存储在一个大堆里。
- en: System Programmer (Definition)
  id: totrans-391
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 系统程序员（定义）
- en: A system programmer is…
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: 系统程序员是…
- en: Someone who knows is a bad idea but still dreams of an excuse to use it.
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 明知是坏主意但仍然梦想找到一个借口去使用它的人。
- en: Someone who never lets their code deadlock… but when it does, it causes more
    problems than everyone else combined.
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 从不让他们代码死锁的人…但一旦发生，它造成的问题比所有人加起来还要多。
- en: Someone who believes zombies are real.
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 相信僵尸是真实存在的人。
- en: Someone who doesn’t trust their process to run correctly without testing with
    the same data, kernel, compiler, RAM, filesystem size,file system format, disk
    brand, core count, CPU load, weather, magnetic flux, orientation, pixie dust,
    horoscope sign, wall color, wall gloss and reflectance, motherboard, vibration,
    illumination, backup battery, time of day, temperature, humidity, lunar position,
    sun-moon, co-position…
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 不信任他们的进程在没有使用相同的数据、内核、编译器、RAM、文件系统大小、文件系统格式、磁盘品牌、核心数量、CPU负载、天气、磁通量、方向、精灵粉末、星座、墙壁颜色、墙壁光泽和反射率、主板、振动、照明、备用电池、一天中的时间、温度、湿度、月相、日-月、共位…
- en: A system program …
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 一个系统程序…
- en: Evolves until it can send email.
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: 不断进化直到能够发送电子邮件。
- en: Evolves until it has the potential to create, connect and kill other programs
    and consume all possible CPU, memory, network, … resources on all possible devices
    but chooses not to. Today.
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: 不断进化，直到它具有创建、连接和杀死其他程序以及消耗所有可能的设备上的所有可能的CPU、内存、网络……资源的潜力，但今天它选择不这么做。
