- en: A Brief Intro to Graph Notation
  id: totrans-3
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 图记法的简要介绍
- en: Graphs consist of a set of `nodes` (also known as `vertices`) and `edges` that
    form connections between nodes.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 图由一组`节点`（也称为`顶点`）和形成节点之间连接的`边`组成。
- en: '![](../Images/5e63ac3c17db80d27073260727c9faf8.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/5e63ac3c17db80d27073260727c9faf8.png)'
- en: A graph with two nodes and a directed edge between them
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 由两个节点和它们之间的一条有向边组成的图
- en: Linked Lists
  id: totrans-7
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 链表
- en: Linked lists are ideally used to store information that require some sort of
    order to them. A linked list is a special type of graph where the nodes and edges
    form a chain-like structure. The nodes at the end contain only one edge, while
    the internal nodes contain two edges (one incoming and one outgoing edge). The
    first node is called the `head` and the last node is called the `tail`.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 链表理想地用于存储需要某种顺序的信息。链表是一种特殊的图，其中节点和边形成链状结构。末尾的节点只包含一个边，而内部节点包含两个边（一个入边和一个出边）。第一个节点被称为`头`，最后一个节点被称为`尾`。
- en: '![](../Images/de8c62693321c971d02534a9bf3b2b1c.png)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/de8c62693321c971d02534a9bf3b2b1c.png)'
- en: A singly linked list
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 单链表
- en: '![](../Images/610c657cedac8818dd0d7764b0581275.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/610c657cedac8818dd0d7764b0581275.png)'
- en: A doubly linked list
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 双链表
- en: 'There are two main types of linked lists: singly linked lists and doubly linked
    lists. In a singly linked list, there only exist *forward* edges (i.e. edges only
    connect from one node to the next node in the list). In a doubly linked list,
    there exist both *forward* and *back* edges.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 链表主要有两种类型：单链表和双链表。在单链表中，只存在*前向*边（即边只从一个节点连接到列表中的下一个节点）。在双链表中，存在*前向*和*后向*边。
