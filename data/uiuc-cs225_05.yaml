- en: Hash Table
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 哈希表
- en: 原文：[https://courses.physics.illinois.edu/cs225/sp2019/notes/hashtable/](https://courses.physics.illinois.edu/cs225/sp2019/notes/hashtable/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://courses.physics.illinois.edu/cs225/sp2019/notes/hashtable/](https://courses.physics.illinois.edu/cs225/sp2019/notes/hashtable/)
- en: '[Back to Notes](/cs225/sp2019/notes/)by Siping Meng'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '[返回笔记](/cs225/sp2019/notes/) by Siping Meng'
- en: Introduction
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介
- en: Hashing has many uses. In 225, we talk about how hashing is used to store data.
    To perform hashing, we need two things
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 哈希有许多用途。在225中，我们讨论了哈希如何用于存储数据。要执行哈希，我们需要两样东西
- en: '*Hash function*: Converts a key into a smaller number and uses that number
    as an index in the table.'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*哈希函数*：将键转换为较小的数字，并使用该数字作为表中的索引。'
- en: '*Hash table*: An array that stores values according to the index.'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*哈希表*：一个根据索引存储值的数组。'
- en: '![](../Images/29263c12cbe21d6dfabe8814e8e81044.png)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/29263c12cbe21d6dfabe8814e8e81044.png)'
- en: A hashing of CS225 professors' name with their email address
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: CS225教授的姓名与其电子邮件地址的哈希
- en: Hash Collisions
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 哈希冲突
- en: 'Assume the previous works like the following:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 假设前面的工作如下所示：
- en: if the input start with *w*, *return 1*
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果输入以*w*开头，*返回1*
- en: if the input start with *c*, *return 2*
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果输入以*c*开头，*返回2*
- en: if the input start with *t*, *return 3*
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果输入以*t*开头，*返回3*
- en: 'Now we want to insert a TA to our contact table, say *key* : **Wenjie** and
    *value* : **wzhu26@illinois.edu**. The hash function will return *1*.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们想在我们的联系表中插入一个助教，比如说*键*：**Wenjie**和*值*：**wzhu26@illinois.edu**。哈希函数将返回*1*。
- en: '![](../Images/b7550bee1fea8e4b57702a044e55a10b.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b7550bee1fea8e4b57702a044e55a10b.png)'
- en: The hashes of Wade and Wenjie collide
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 沃德和文杰的哈希值冲突
- en: Two types of hash storing
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 两种哈希存储类型
- en: Separate Chaining
  id: totrans-18
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 分离链接
- en: What we can do is to let the cells of our hash table point to several linked
    lists of values which have the same output from hash function.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以做到的是让我们的哈希表单元格指向几个具有相同哈希函数输出的值链接列表。
- en: '![](../Images/abda0c61390518e22f36fc009334333c.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/abda0c61390518e22f36fc009334333c.png)'
- en: Seperate chaining hashing of CS225 staff's names with their email addresses
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: CS225教职工的姓名与其电子邮件地址的分离链接哈希
- en: Linear Probing
  id: totrans-22
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 线性探测
- en: Something else we can do is just fill the table, without creating any additional
    memory.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以做的是只填充表，而不创建任何额外的内存。
- en: 'When we see a collision, we will try to linearly probe for next space. In our
    case, we should start to check slot *1*, but oh *waf* is there, so let’s probe
    to slot *2*. However, professor *Craig* has already taken that space so we need
    to probe again to slot *3* and found lovely *Thierry* there. Luckily, slot #*4*
    is empty so we can put our TA’s info there.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们看到冲突时，我们将尝试线性探测下一个空间。在我们的情况下，我们应该从槽位*1*开始检查，但哦，*waf*在那里，所以我们探测到槽位*2*。然而，教授*Craig*已经占据了那个空间，因此我们需要再次探测到槽位*3*，并在那里找到了可爱的*Thierry*。幸运的是，槽位#*4*是空的，所以我们可以把我们的助教信息放在那里。
- en: When searching for an element, we examine table slots one by one until the desired
    element is found , or it is clear that the element does not exist in the table.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 当搜索一个元素时，我们将逐个检查表槽，直到找到所需的元素，或者明确元素不在表中。
- en: '![](../Images/69a1a1007381630ca8880ed2b35947d9.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/69a1a1007381630ca8880ed2b35947d9.png)'
- en: Linear probing hashing of CS225 staff's names with their email addresses
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: CS225教职工的姓名与其电子邮件地址的线性探测哈希
