- en: Time Complexity
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 时间复杂度
- en: With path compression and union by rank or size, the run time of the `find`
    and `union` operations are essentially constant time
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 通过路径压缩和按秩或大小进行合并，`find` 和 `union` 操作的运行时间基本上是常数时间
- en: Array Implementation
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数组实现
- en: Disjoint sets can be implemented as arrays in which negative numbers indicate
    that they are representatives and positive numbers are pointers to their parents.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 分离集合可以作为数组实现，其中负数表示它们是代表，正数是它们父节点的指针。
- en: '![](../Images/e1d572e713fe018bf7d98d0ba03eadfe.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e1d572e713fe018bf7d98d0ba03eadfe.png)'
- en: An array implementation of disjoin sets in which the size of the set is stored
    in the representative
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 一种将集合的大小存储在代表中的数组实现，其中集合的大小存储在代表中
