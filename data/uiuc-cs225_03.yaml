- en: Path Compression
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 路径压缩
- en: While finding nodes, it is efficient to move all nodes along the path of the
    query node to the representative node, so that the next we time we query those
    nodes, the runtime will be faster.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在查找节点时，将所有节点移动到查询节点的路径上，以便下次查询这些节点时，运行时间会更快，这是一种有效的方法。
