- en: B-Trees
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: B树
- en: 原文：[https://courses.physics.illinois.edu/cs225/sp2019/notes/btrees/](https://courses.physics.illinois.edu/cs225/sp2019/notes/btrees/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://courses.physics.illinois.edu/cs225/sp2019/notes/btrees/](https://courses.physics.illinois.edu/cs225/sp2019/notes/btrees/)
- en: '[Back to Notes](/cs225/sp2019/notes/)by Adrian Clark'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '[返回笔记](/cs225/sp2019/notes/) by Adrian Clark'
- en: Definition
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 定义
- en: A *B-Tree* is a self balancing [Binary Search Tree(BST)](https://courses.engr.illinois.edu/cs225/sp2019/notes/bst/).
    In this type of tree where each node can potentially have more than 2 children.
    Each node tends to hold 2 containers, in this case lets say 2 arrays, where one
    array holds the keys of the node and the other points to the children of the node.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '*B树*是一种自平衡的[二叉搜索树(BST)](https://courses.engr.illinois.edu/cs225/sp2019/notes/bst/)。在这种类型的树中，每个节点可能拥有超过2个子节点。每个节点通常持有2个容器，在这种情况下，让我们假设是2个数组，其中一个数组持有节点的键，另一个指向节点的子节点。'
- en: '![](../Images/a5bfcc9f79d00a44f6deb71ffb48c1df.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a5bfcc9f79d00a44f6deb71ffb48c1df.png)'
- en: B-tree Properties
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: B树特性
- en: 'Here are some things to keep in mind about the properties of B-tree:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 关于B树特性的以下几点需要注意：
- en: M denotes the max number of child nodes a node can point to
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: M表示节点可以指向的最大子节点数
- en: The max number of keys per node is M-1
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 每个节点的最大键数是M-1
- en: The root node is either a leaf node or an internal node with 2 to M children
    and 1 to M-1 Keys
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 根节点要么是叶子节点，要么是具有2到M个子节点和1到M-1个键的内部节点
- en: The rest of the internal nodes have between M/2 and M children
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 除了根节点外，其余内部节点有M/2到M个子节点
- en: All leaves are at the same depth, which makes the tree Balanced
  id: totrans-12
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 所有叶子都在同一深度，这使得树平衡
- en: Find
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 寻找
- en: 'The process of Finding a certain key is very similar to Searhcing in a BST,
    especially since B-trees are a type of BST. This is also another case where recursive
    traversal is preferred. For the Steps below, note that `i` represents the index
    of the key you are currently on.</br></br> Steps:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 寻找特定关键字的流程与在BST（二叉搜索树）中搜索非常相似，特别是由于B树是BST的一种。这也是递归遍历更受欢迎的另一个案例。以下步骤中，请注意，`i`代表你当前所在关键字的索引。</br></br>步骤：
- en: Go through each index of the current node’s array of keys
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 遍历当前节点键数组的每个索引
- en: If the key is in this node’s array of keys, return the key
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果关键字在这个节点的键数组中，则返回该关键字
- en: 'If the key is not in this node you have two options.</br>One: Find the next
    biggest key and go to the ith child of that node, also known as the left child
    of the current key.</br>Two: Find the next smallest key and go the (ith + 1) child,
    also known as the right child of the current key. I say you have two options,
    as there is a potential for the key you are searching for to be less than the
    first key or greater than the last key of a Node.'
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果关键字不在这个节点中，你有两个选择。</br>一：找到下一个最大的关键字，并前往该节点的第i个子节点，也称为当前关键字的左子节点。</br>二：找到下一个最小的关键字，并前往第(i
    + 1)个子节点，也称为当前关键字的右子节点。我说你有两个选择，因为你要找的关键字可能小于节点的第一个关键字，或者大于最后一个关键字。
- en: If you get to the leaf node where the data value should be and don’t see it
    in the array of keys then this value is not in the tree.
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果你到达了应该包含数据值的最底层叶子节点，但在键数组中没有看到它，那么这个值不在树中。
- en: In this one we can see that we start in the root and follow the path of blue
    arrows and boxes to find the correct value. Even though it’s not shown in this
    picture,remember to go through the array of keys for the nodes you go through
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们可以看到我们从根节点开始，沿着蓝色箭头和方框的路径找到正确的值。即使在这张图片中没有显示，请记住通过你经过的节点键数组进行遍历
- en: '![](../Images/b3d3e7445443f4c68c05e4c00c7c9341.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b3d3e7445443f4c68c05e4c00c7c9341.png)'
- en: Insertion
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 插入
- en: The process of inserting requires you navigate down to a leaf node by searching
    for a valid spot to insert the data. When you reach the bottom you will attempt
    to add the data. I say attempt, because if there is an open space in that node
    for the data it will be quick and simple. But this is not always the case, sometimes
    nodes are full and you will have to Split nodes.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 插入过程需要你通过搜索一个有效的数据插入位置来导航到叶子节点。当你到达底部时，你将尝试添加数据。我说尝试，因为如果该节点有空间插入数据，这将很快且简单。但这种情况并不总是如此，有时节点已满，你必须分裂节点。
- en: Let’s say we want to Insert the key of 1337\. Then we first have to find the
    correct node, and see if there is space for the Insertion of the data.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们想要插入关键字1337。首先，我们必须找到正确的节点，并查看是否有空间插入数据。
- en: '![](../Images/92ef894d3fea3cdbce273cd4707e36b6.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/92ef894d3fea3cdbce273cd4707e36b6.png)'
- en: Luckily for us this is a very simple case and we can just directly insert the
    key into the node. This will not always be the case because we might have to Split
    a node, or shuffle the arrays of the node around to make sure they are in the
    correct order.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，这是一个非常简单的情况，我们可以直接将键插入到节点中。这并不总是这种情况，因为我们可能需要拆分一个节点，或者调整节点的数组，以确保它们处于正确的顺序。
- en: '![](../Images/1cab6fd59ec3a0c14d3bff9476d06122.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1cab6fd59ec3a0c14d3bff9476d06122.png)'
- en: Splitting Nodes
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 节点拆分
- en: 'Splitting nodes usually takes place after the insertion of a key. </br></br>
    Steps:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 节点拆分通常在插入键之后发生。</br></br>步骤：
- en: When you try to insert into node, N1, you notice that the amount of keys is
    now greater than M-1.
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当你尝试向节点N1插入时，你会注意到键的数量现在大于M-1。
- en: Now You must take the middle key and put it in the parent node’s keys
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 现在，你必须将中间键放入父节点的键中
- en: Now all keys that were in the array of N1 that are greater than the thrown up
    key are put into a node that is the (i + 1), where i is the index of the thrown
    up key, child of the parent node. The rest are put into the Node that is the ith
    child of the parent tree. If a Node does not exist for that child but is a valid
    child to place ,Since there is space in the parent, you can create the child Node
    and populate it.
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 现在，所有在N1数组中的键，大于抛出的键，都放入父节点的(i+1)子节点中，其中i是抛出键的索引。其余的放入父树的第i个子节点中。如果一个子节点不存在但可以放置，由于父节点有空间，你可以创建子节点并填充它。
- en: So let’s say we try to add the value 88 to a tree.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们尝试向树中添加值88。
- en: '![](../Images/11f74a984757aa72007c6d704c8a7621.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/11f74a984757aa72007c6d704c8a7621.png)'
- en: Uh-Oh that node is Full, So Now we have to throw the value of 86 up to the parent
    Node since it is the middle value, between the values of 56 and 88\. Since that
    was the middle value thrown up and 88 is greater than 86, we put 88 into the (i+1)
    child node which was initially empty, where i is the index of 86 in the parent
    node.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 哎呀，那个节点已满，所以现在我们必须将值86抛到父节点，因为它位于56和88之间。由于那是抛出的中间值，而88大于86，我们将88放入(i+1)子节点，其中i是86在父节点中的索引。
- en: '![](../Images/8a3e841d8d38903d901674eb932b055d.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8a3e841d8d38903d901674eb932b055d.png)'
- en: This is another case where we were lucky our operations were simple because
    you could run into the problem that the parent node is also full, requiring you
    to do more operations.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们幸运的情况，因为我们的操作很简单，因为你可能会遇到父节点也满了的问题，这需要你进行更多操作。
- en: Removal/Deletion
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 移除/删除
- en: '*Removal/Deletion of a data point is not done in Lab B-Tree*'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: '*在Lab B-Tree中不执行数据点的移除/删除*'
- en: 'Removing is very similar to Inserting: you navigate down to the leaf node by
    searching and when you reach the key you have to delete the data. After you have
    deleted the data though, you have to make sure the tree still holds its BST property
    and the B-tree properties. Did that removal remove an important key in a Node?
    Did that removal make a Node fall below M/2 children? These are just examples
    of potential scenarios that come out of deletion, and this is where the idea of
    combining nodes comes in.'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 移除操作与插入操作非常相似：通过搜索导航到叶节点，当你到达要删除的数据时，你必须删除该数据。然而，在删除数据之后，你必须确保树仍然保持其二叉搜索树（BST）属性和B树属性。这次移除是否移除了节点中的一个重要键？这次移除是否使节点下的子节点数量低于M/2？这些都是删除操作可能出现的潜在场景，这就是合并节点想法的来源。
- en: Let’s say we want to Remove the Data Value of 88\. Then we first have to find
    the Node, if it exists, and remove it.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们想要移除数据值88。首先，我们必须找到该节点（如果存在的话），然后将其移除。
- en: '![](../Images/87f29467b85ecbd7fc4e5443379b23d5.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/87f29467b85ecbd7fc4e5443379b23d5.png)'
- en: Once we’ve deleted that data point, You might notice that there is a gap in
    our array, which we don’t want. In order to combat this, we can move the data
    value 1337 into the spot previously held by 88.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们删除了该数据点，你可能会注意到我们的数组中有一个空隙，这是我们不想看到的。为了解决这个问题，我们可以将数据值1337移动到之前88所在的位置。
- en: '![](../Images/504a54b961d31c3a0a6ac4f6f7dfdd79.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/504a54b961d31c3a0a6ac4f6f7dfdd79.png)'
- en: Luckily this Deletion didn’t make us have to combine any Nodes so it was a simple
    process this time. Deletion can be more complicated and you can visit [here](https://medium.com/@vijinimallawaarachchi/all-you-need-to-know-about-deleting-keys-from-b-trees-9090f3334b5c)
    or take CS411 - Database Systems to learn more about Deletion because there are
    also different Merging scenarios that result from Deletion.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是这次删除没有让我们不得不合并任何节点，所以这次过程很简单。删除可能更复杂，你可以访问[这里](https://medium.com/@vijinimallawaarachchi/all-you-need-to-know-about-deleting-keys-from-b-trees-9090f3334b5c)或学习CS411
    - 数据库系统来了解更多关于删除的信息，因为删除还会产生不同的合并场景。
- en: Merging Nodes
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 合并节点
- en: '*The Merging of Nodes of is not done in Lab B-Tree*'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '*在Lab B-Tree中不执行节点的合并*'
- en: Combining nodes usually takes place after the deletion of a key. For example,
    maybe after you removed the data, a node has less than M/2 children, then you
    must combine certain nodes.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 合并节点通常发生在删除键之后。例如，在你删除数据后，一个节点可能少于 M/2 个子节点，那么你必须合并某些节点。
- en: The Merging of nodes is not as simple as Splitting due to the fact that you
    have to deal with more semantics of the tree. As you could be moving around multiple
    keys, and not just throwing them up to Parent Nodes but also throwing them down
    to various children nodes as well.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 节点的合并不像拆分那样简单，因为你必须处理树更多的语义。因为你可能会移动多个键，而不仅仅是将它们抛到父节点，还可能将它们抛到各种子节点。
- en: If you wish to learn more I encourage you to Google it or check out the link
    in the “Removal/Deletion” section of this page
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想了解更多，我鼓励你谷歌搜索或查看本页“删除/删除”部分中的链接
- en: Runtime
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 运行时间
- en: 'Search:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 搜索：
- en: '`O(logn)` Since this is a BST and our search algorithm will have us checking
    each node for the value and if its not there we go to the correct child node,
    our run time is `O(log(n))`. Or more formally we can say the runtime is equal
    to `O(depth*logM)` where depth is equal to log(n), which, since N » m we can say
    is just O(log(n)) in the end.'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '`O(logn)` 由于这是一个二叉搜索树，我们的搜索算法会让我们检查每个节点以查找值，如果不在那里，我们就去正确的子节点，我们的运行时间是 `O(log(n))`。或者更正式地说，运行时间等于
    `O(depth*logM)`，其中深度等于 log(n)，由于 N » m，我们可以说最终是 O(log(n))。'
- en: 'Combining/Splitting of Keys:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 键的合并/拆分：
- en: '`O(M)` Since each Node can have up to M keys and we have to find the correct
    key to split/combine upon.'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '`O(M)` 由于每个节点最多可以有 M 个键，我们必须找到正确的键来拆分/合并。'
- en: 'Insert/Delete:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 插入/删除：
- en: '`O((M/log M)*logN)` Since we have to first go to the leaf node and find where
    to put the Node and now have to update the tree, by splitting and combining keys,
    in order to maintain the tree.'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '`O((M/log M)*logN)` 由于我们必须首先到达叶节点并找到放置节点的地方，现在我们必须通过拆分和合并键来更新树，以保持树的完整性。'
