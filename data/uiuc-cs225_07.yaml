- en: Binary Search Trees
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 二叉搜索树
- en: 原文：[https://courses.physics.illinois.edu/cs225/sp2019/notes/bst/](https://courses.physics.illinois.edu/cs225/sp2019/notes/bst/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://courses.physics.illinois.edu/cs225/sp2019/notes/bst/](https://courses.physics.illinois.edu/cs225/sp2019/notes/bst/)'
- en: '[Back to Notes](/cs225/sp2019/notes/)by Tamara Nelson-Fromm'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '[返回笔记](/cs225/sp2019/notes/) by Tamara Nelson-Fromm'
- en: Definition
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 定义
- en: 'A *binary search tree* (BST) is a *binary tree* where every node in the left
    subtree is less than the root, and every node in the right subtree is of a value
    greater than the root. The properties of a binary search tree are recursive: if
    we consider any node as a “root,” these properties will remain true.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '*二叉搜索树*（BST）是一种*二叉树*，其中左子树中的每个节点都小于根节点，而右子树中的每个节点的值都大于根节点。二叉搜索树的性质是递归的：如果我们考虑任何节点作为“根”，这些性质仍然成立。'
- en: '![](../Images/8d22bc8ec6908acfdddd35115d2b1496.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8d22bc8ec6908acfdddd35115d2b1496.png)'
- en: Due to the way nodes in a binary search tree are ordered, an *in-order traversal*
    (left node, then root node, then right node) will always produce a sequence of
    values in increasing numerical order.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 由于二叉搜索树中的节点是有序的，因此*中序遍历*（左节点，然后根节点，然后右节点）将始终产生一个递增数值顺序的值序列。
- en: Searching
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 搜索
- en: Binary search trees are called “search trees” because they make searching for
    a certain value more efficient than in an unordered tree. In an ideal binary search
    tree, we do not have to visit every node when searching for a particular value.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 二叉搜索树被称为“搜索树”，因为它们使搜索特定值比无序树更有效。在理想的二叉搜索树中，我们不需要在搜索特定值时访问每个节点。
- en: 'Here is how we search in a binary search tree:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们如何在二叉搜索树中进行搜索的方式：
- en: Begin at the tree’s *root node*
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从树的*根节点*开始
- en: If the value is smaller than the current node, move left
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果值小于当前节点，则向左移动
- en: If the value is larger than the current node, move right
  id: totrans-12
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果值大于当前节点，则向右移动
- en: '![](../Images/dd8fee0274c78ca6e756edeba88d97d1.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/dd8fee0274c78ca6e756edeba88d97d1.png)'
- en: Inserting
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 插入
- en: New nodes in a binary search tree are always added at a *leaf* position. Performing
    a search can easily find the position for a new node.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在二叉搜索树中添加的新节点总是添加到*叶子*位置。执行搜索可以轻松找到新节点位置。
- en: '![](../Images/1618d6d367783874e67a78285246ccaa.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1618d6d367783874e67a78285246ccaa.png)'
- en: Removing
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 移除
- en: 'When removing from a binary search tree, we are concerned with keeping the
    rest of the tree in the correct order. This means removing is different depending
    on whether the node we are removing has children. There are three cases:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 当从二叉搜索树中移除节点时，我们关注的是保持树的其他部分处于正确的顺序。这意味着移除操作取决于我们正在移除的节点是否有子节点。这里有三种情况：
- en: If the node being removed is a leaf, it can simply be deleted.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 如果被移除的节点是叶子节点，它可以简单地被删除。
- en: '![](../Images/4699318794ab005b367395a2197ee7ab.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4699318794ab005b367395a2197ee7ab.png)'
- en: If the node has a single child, (left or right) we must move the child into
    the position of the node when deleting it.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 如果节点有一个子节点（左或右），我们在删除节点时必须将子节点移动到节点的位置。
- en: '![](../Images/ab1609ab35c4bc22ff846e32931af3ea.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ab1609ab35c4bc22ff846e32931af3ea.png)'
- en: 'If the node has two children, we must first find the *In-Order Predecessor*
    (IOP): the largest node in our node’s left subtree. The IOP is always a leaf node,
    and can be found by starting at the left subtree’s root and moving right. We can
    then swap the node being removed with its IOP and delete it, as it is now a leaf.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 如果节点有两个子节点，我们必须首先找到*中序前驱*（IOP）：我们节点左子树中的最大节点。IOP始终是一个叶子节点，可以通过从左子树的根节点开始并向右移动来找到。然后我们可以将正在移除的节点与其IOP交换，并删除它，因为它现在是一个叶子节点。
- en: '![](../Images/c08f93bc59a30177bd8b6a625fcf7ea7.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c08f93bc59a30177bd8b6a625fcf7ea7.png)'
- en: Runtime and BSTs
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 运行时和二叉搜索树
- en: Depending on the values contained in a binary search tree, and the order in
    which they are added, the performance of a BST’s operations can vary. This performance
    depends on the shape of the tree and the number of nodes it contains.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 根据二叉搜索树中包含的值及其添加的顺序，BST操作的性能可能会有所不同。这种性能取决于树的形状和包含的节点数量。
- en: In an ideal case, a binary search tree has a similar number of nodes in its
    right and left subtrees. Since you have to visit less nodes when searching in
    an ideal BST, this case has a run time of `O(lg(n))` for all operations that utilize
    find, including search, insert, and remove.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在理想情况下，二叉搜索树的左右子树中的节点数量相似。由于在理想的BST中进行搜索时需要访问的节点较少，因此所有利用find操作（包括搜索、插入和移除）的操作都具有`O(lg(n))`的时间复杂度。
- en: '![](../Images/d3b343515fdd45a1a21c1840fa723130.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d3b343515fdd45a1a21c1840fa723130.png)'
- en: The worst case of a binary search tree is one that has its values added **in
    numerical order**. This structure then doesn’t resemble a tree - it looks like
    a linked list! As potentially every node has to be visited when searching, the
    worst case BST has a run time of `O(n)` for all operations utilizing find.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 二叉搜索树最坏的情况是它的值以**数值顺序**添加。这种结构看起来不再像树，而更像是一个链表！由于搜索时可能需要访问每个节点，最坏情况下的二叉搜索树在所有利用查找的操作中都有`O(n)`的时间复杂度。
- en: '![](../Images/65ea46a14eae824702dd97af20557f14.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/65ea46a14eae824702dd97af20557f14.png)'
