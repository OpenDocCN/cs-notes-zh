- en: Here is the pseudocode of Prim’s algorithm.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是Prim算法的伪代码。
- en: '[PRE1]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The runtime for this algorithm using a binary heap (the kind that is taught
    in this class) is . However it could be faster if we use a [fibonacci heap](https://brilliant.org/wiki/fibonacci-heap/),
    which can decrease its element’s priority in time. If a fibonacci heap is used,
    this algorithm has runtime of .
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 使用二叉堆（本课程所教授的那种）运行此算法的时间复杂度是。然而，如果我们使用[斐波那契堆](https://brilliant.org/wiki/fibonacci-heap/)，它可以以时间复杂度降低其元素的优先级。如果使用斐波那契堆，此算法的时间复杂度为。
- en: Why do these algorithms work?
  id: totrans-42
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 为什么这些算法有效？
- en: Even though both Kruskal’s and Prim’s algorithm make intuitive sense, both of
    them are making optimal **local** choices at each step. This means they are not
    looking at the overall graph as a whole at any time. If you are curious about
    “why do they work?”, take CS 374 to find out.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管克鲁斯卡尔和Prim算法都直观合理，但它们在每一步都做出了最优的**局部**选择。这意味着它们在任何时候都没有将整个图作为一个整体来考虑。如果你对“为什么它们有效？”感到好奇，请选修CS
    374课程以了解详情。
