  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 紫色高亮的子图是加权 *G* 的最小生成树
- en: Finding the MST of a graph
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 寻找图的最小生成树
- en: There are multiple ways to find the MST of a graph. The most naive and brute
    force way is to try all possible subgraphs of *G*, find the ones that are spanning
    trees, then find the one with minimum weight. This would take exponential time.
    There are algorithms that can do this faster.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 寻找图的最小生成树有多种方法。最直观且原始的方法是尝试 *G* 的所有可能的子图，找到那些是生成树的，然后找到权重最小的那个。这将需要指数时间。有一些算法可以更快地完成这个任务。
- en: Kruskal’s Algorithm
  id: totrans-13
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Kruskal 算法
- en: 'The high level idea of Kruskal’s algorithm is to build the spanning tree by
    inserting edges. There are two restrictions as we insert the edges:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: Kruskal 算法的高级思想是通过插入边来构建生成树。在插入边时有两个限制：
- en: To keep the tree minimum weight, we insert the edges from low weights to high
    weights.
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为了保持树的最小权重，我们按从低权重到高权重的顺序插入边。
- en: To keep the tree acyclic, the edges we add must not introduce a cycle.
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为了保持树的无环性，我们添加的边不能引入环。
- en: To satisfy the first condition, we sort the edges and insert them in ascending
    order of weight. To satisfy the second condition, we have to keep track of nodes
    which are already in the same connected component (smaller trees). Imagine we
    are half way in our algorithm. Since we are selecting edges purely by weight,
    there could be multiple disconnected small trees. For example our graph could
    look like this.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 为了满足第一个条件，我们按权重升序排序边并按此顺序插入。为了满足第二个条件，我们必须跟踪已经属于同一个连通分量（小树）的节点。想象一下我们的算法进行到一半。由于我们纯粹根据权重选择边，可能会有多个不连通的小树。例如，我们的图可能看起来像这样。
- en: '![](../Images/db28128760cd6cca94b26518991518c3.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/db28128760cd6cca94b26518991518c3.png)'
- en: At this stage `a`, `b`, and `c` form a small tree, so do `f` and `e`. Inserting
    edge `bc` would introduce a cycle.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个阶段 `a`、`b` 和 `c` 形成一个小树，同样 `f` 和 `e` 也形成一个小树。插入边 `bc` 会引入一个环。
- en: We can use disjoint sets for keeping track of which nodes are in which components.
    When we insert an edge, we union the two sets that the two nodes belong to. Conceptually
    this is adding an edge between the two small trees and merging them into a bigger
    tree. If the edge we are about to insert connects two nodes that are in the same
    set, then we cannot insert this edge because it would introduce a cycle.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用不相交集合来跟踪哪些节点属于哪个分量。当我们插入一条边时，我们将两个节点所属的两个集合合并。从概念上讲，这是在两个小树之间添加一条边并将它们合并成一个大树。如果我们即将插入的边连接的两个节点属于同一个集合，那么我们不能插入这条边，因为这会引入一个环。
