- en: Definition
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 定义
- en: A **spanning tree** of a graph *G* is a connected acyclic subgraph of *G* that
    contains every node of *G*. A **minimum spanning tree** (MST) of a weighted graph
    *G* is a spanning tree of *G* which has the minimum weight sum on its edges.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 图 *G* 的 **生成树** 是包含 *G* 中所有节点的连通无环子图。加权图 *G* 的 **最小生成树** (MST) 是 *G* 的一个生成树，其边的权重和最小。
- en: '![](../Images/55afea685ffb9f237404e832d8affdea.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/55afea685ffb9f237404e832d8affdea.png)'
- en: Graph *G*
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 图 *G*
- en: '![](../Images/78ae44c96162cc305184b0f7808d06b2.png)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/78ae44c96162cc305184b0f7808d06b2.png)'
- en: The orange highlighted subgraph is a spanning tree of *G*
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 橙色高亮的子图是 *G* 的一个生成树
- en: '![](../Images/377099aae31f041ba445caa25c31c991.png)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/377099aae31f041ba445caa25c31c991.png)'
