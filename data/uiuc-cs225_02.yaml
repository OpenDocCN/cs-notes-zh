- en: A step by step example of Kruskal's Algorithm.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: Kruskal 算法的逐步示例。
- en: Here is the pseudocode for Kruskal’s algorithm.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 这是Kruskal算法的伪代码。
- en: '[PRE0]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: The runtime for this algorithm using either heap or sorted array are both ,
    which is dominated by the sorting of edges.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 使用堆或排序数组执行此算法的运行时间都是，这主要由边的排序决定。
- en: Prim’s Algorithm
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Prim算法
- en: Another algorithm that finds MST efficiently is Prim’s Algorithm. The idea of
    Prim’s algorithm is to expand the tree by adding the smallest weight edge from
    “outgoing edges”. The “outgoing edges” are the edges that connect a node in our
    tree on one end, and a node that’s not in our tree on the other end.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个能够高效找到最小生成树的算法是Prim算法。Prim算法的思想是通过添加“出边”中的最小权重边来扩展树。这些“出边”是连接我们树中的一端节点和不在我们树中的一端节点的边。
- en: '![](../Images/b6c967f71db2d993b2f51638b4e78bad.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b6c967f71db2d993b2f51638b4e78bad.png)'
- en: In this example, our current tree is colored with dark blue. The light blue
    edges are the "outgoing edges".
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们的当前树用深蓝色着色。浅蓝色边是“出边”。
- en: At the start of Prim’s algorithm, we choose an arbitrary node in the graph as
    a “starting tree”. Then for all the “outgoing edges” of our tree, we choose the
    one with the smallest weight and add it to our tree. This step expands our tree
    by one node. We keep adding edges like this until our tree contains all nodes
    in the graph.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在Prim算法的开始，我们在图中选择一个任意节点作为“起始树”。然后，对于我们树的“出边”，我们选择具有最小权重的边并将其添加到我们的树中。这一步通过添加一个节点来扩展我们的树。我们继续以这种方式添加边，直到我们的树包含图中的所有节点。
- en: '![Kruskal''s demo image 1](../Images/1bc4fd4eb505404ead37bbf954143a70.png)![Kruskal''s
    demo image 2](../Images/31999d006baf4c8e9f5bbc78bc3417f8.png)![Kruskal''s demo
    image 3](../Images/62d7d0bd29182f1613c51e190e1b8dd7.png)![Kruskal''s demo image
    4](../Images/e3e50d73db727c0ea46523b8363faa11.png)![Kruskal''s demo image 5](../Images/d1d7f89961b419326a896fe53079f7ce.png)![Kruskal''s
    demo image 6](../Images/a1c0b24111386bd64d170a487dc5511e.png)![Kruskal''s demo
    image 7](../Images/8d6eab9ea02344be298ee71e5872faec.png)[Previous](#carouselExampleControls2)
    [Next](#carouselExampleControls2)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![Kruskal的演示图像1](../Images/1bc4fd4eb505404ead37bbf954143a70.png)![Kruskal的演示图像2](../Images/31999d006baf4c8e9f5bbc78bc3417f8.png)![Kruskal的演示图像3](../Images/62d7d0bd29182f1613c51e190e1b8dd7.png)![Kruskal的演示图像4](../Images/e3e50d73db727c0ea46523b8363faa11.png)![Kruskal的演示图像5](../Images/d1d7f89961b419326a896fe53079f7ce.png)![Kruskal的演示图像6](../Images/a1c0b24111386bd64d170a487dc5511e.png)![Kruskal的演示图像7](../Images/8d6eab9ea02344be298ee71e5872faec.png)[上一页](#carouselExampleControls2)
    [下一页](#carouselExampleControls2)'
- en: One step by step example of Prim's algorithm high level idea. The dark blue
    edges and nodes are the current tree. The light blue edges are "outgoing edges"
    of our tree. The light purple edges are edges within the tree.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: Prim算法的高级思想的一个逐步示例。深蓝色边和节点是当前树。浅蓝色边是我们树的“出边”。浅紫色边是树内的边。
- en: But how do we select the minimum “outgoing edge” in code? We can think from
    a different perspective. Instead of selecting from edges, we can choose from the
    immediate neighbor nodes of the tree. We can assign each node the minimum weight
    it takes to add it to our tree, and then choose the node with minimum such value.
    For those nodes that are not our immediate neighbors, assign them infinity so
    that they wouldn’t be considered. We can use the data structure heap to select
    the node with minimum weight efficiently.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们在代码中如何选择最小的“出边”呢？我们可以从不同的角度思考。我们不是从边中选择，而是可以从树的直接邻居节点中选择。我们可以给每个节点分配一个最小的权重，以将其添加到我们的树中，然后选择具有最小此类值的节点。对于不是我们直接邻居的节点，分配无穷大，这样它们就不会被考虑。我们可以使用堆这种数据结构来有效地选择具有最小权重的节点。
- en: '![](../Images/69d6db590c87c4ae93eab5f9afafd627.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/69d6db590c87c4ae93eab5f9afafd627.png)'
- en: In this example, our current tree is colored with dark purple. The immediate
    neighbors are colored with light orange. Notice that node `g` has weight 6 instead
    of 9 because 6 is a smaller weight edge between `g` and our tree.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们的当前树用深紫色着色。直接邻居用浅橙色着色。注意，节点`g`的权重是6而不是9，因为6是`g`和我们的树之间的较小权重边。
- en: The next question is how do we update the weights on each node as the algorithm
    proceeds? Notice that when we add a new node into our tree, the only nodes that
    change weights are the neighbors of the new node we added. Therefore each time
    we add a node, we update the weights of the neighbors of this node.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个问题是我们如何随着算法的进行更新每个节点上的权重？注意，当我们向我们的树中添加一个新节点时，唯一会改变权重的节点是新添加节点的邻居。因此，每次我们添加一个节点，我们就更新这个节点的邻居的权重。
