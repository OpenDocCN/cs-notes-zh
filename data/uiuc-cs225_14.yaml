- en: Inheritance
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 继承
- en: 原文：[https://courses.physics.illinois.edu/cs225/sp2019/notes/inheritance/](https://courses.physics.illinois.edu/cs225/sp2019/notes/inheritance/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://courses.physics.illinois.edu/cs225/sp2019/notes/inheritance/](https://courses.physics.illinois.edu/cs225/sp2019/notes/inheritance/)
- en: '[Back to Notes](/cs225/sp2019/notes/)by Nathan Walters'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '[返回笔记](/cs225/sp2019/notes/) by Nathan Walters'
- en: '*Already know the basics of inheritance? Skip straight to [inheritance in C++](#inheritance-in-c),
    [polymorphism in C++](#polymorphism-in-c), [slicing](#slicing), [the `virtual`
    keyword](#the-virtual-keyword), or [an advanced description of how virtual methods
    work](#bonus-content-how-do-virtual-methods-work).*'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '*已经了解了继承的基础？可以直接跳转到[继承在C++中的应用](#inheritance-in-c)，[C++中的多态](#polymorphism-in-c)，[切片](#slicing)，[`virtual`关键字](#the-virtual-keyword)，或者[虚拟方法工作的高级描述](#bonus-content-how-do-virtual-methods-work)。*'
- en: '*## Motivation for inheritance'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '*## 继承的动机'
- en: '*Inheritance*, along with *encapsulation*, *abstraction*, and *polymorphism*,
    is one of the pillars of object-oriented programming. Inheritance lets new classes
    borrow, or *inherit*, functionality from existing classes. This lets us avoid
    duplicating functionality that should be shared across a variety of different
    but related classes. You can also specify a new implementation while remaining
    the same interface of an existing class.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '*继承*，与*封装*、*抽象*和*多态*一样，是面向对象编程的支柱之一。继承让新的类可以从现有类中借用或*继承*功能。这让我们避免了在不同但相关的类之间共享功能时的功能重复。你还可以指定新的实现，同时保持现有类的相同接口。'
- en: Terminology
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 术语
- en: When we use inheritance, we say that some new class should inherit the members
    of an existing class. We call the existing class the *base class*, and the new
    class is the *derived class*. You’ll sometimes hear the derived class referred
    to as a *subclass*, and the base class can be called the *parent class* or the
    *super class*.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们使用继承时，我们说一些新的类应该继承现有类的成员。我们将现有类称为*基类*，而新类是*派生类*。你有时会听到派生类被称为*子类*，基类可以称为*父类*或*超类*。
- en: 'Inheritance specifies an *is-a* relationship. Consider fruits: a Honeycrisp
    *is-a* Apple, and an Apple *is-a* Fruit. Such relationships are transitive: a
    Honeycrisp *is-a* Fruit.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 继承指定了一个*is-a*关系。考虑水果：Honeycrisp *is-a* 苹果，苹果 *is-a* 水果。这样的关系是传递性的：Honeycrisp
    *is-a* 水果。
- en: Inheritance in C++
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: C++中的继承
- en: '[PRE0]'
  id: totrans-10
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Here’s what our fruits example from above looks like; let’s walk through it.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 上面我们的水果例子看起来是这样的；让我们来分析一下。
- en: The `Fruit` class
  id: totrans-12
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '`Fruit`类'
- en: 'This class declaration should look a bit different than the ones you’re used
    to seeing, particularly this line:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 这个类声明应该看起来与您习惯看到的不同一些，尤其是这一行：
- en: '[PRE1]'
  id: totrans-14
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'This line means that `getVariety()` is a *pure virtual function*. That is,
    the `Fruit` class doesn’t provide an implementation of the `getVariety()` function;
    a subclass will have to provide an implementation. If a class has even one pure
    virtual function, we call the class *abstract*. That means we can’t instantiate
    an instance of the class itself. Consider the following code:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 这行代码意味着`getVariety()`是一个*纯虚函数*。也就是说，`Fruit`类没有提供`getVariety()`函数的实现；子类必须提供实现。如果一个类有一个纯虚函数，我们称这个类为*抽象类*。这意味着我们不能实例化这个类的实例。考虑以下代码：
- en: '[PRE2]'
  id: totrans-16
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'If we tried to compile this, the compiler would complain that we were trying
    to instantiate an abstract class:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们尝试编译这段代码，编译器会抱怨我们试图实例化一个抽象类：
- en: '[PRE3]'
  id: totrans-18
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: The `Apple` class
  id: totrans-19
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '`Apple`类'
- en: 'Here we see our first example of inheritance! Look at how the `Apple` class
    is declared:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 这里我们看到了继承的第一个例子！看看`Apple`类是如何声明的：
- en: '[PRE4]'
  id: totrans-21
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'This is how we declare a class to be a subclass of another class in C++. `public`
    is an access specifier that specifies access rules for public or protected members
    of the base class. There are three access specifiers that can be used here:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们如何在C++中声明一个类为另一个类的子类。`public`是一个访问修饰符，它指定了基类公共或受保护成员的访问规则。这里可以使用三种访问修饰符：
- en: '`public`: For a subclass derived as a `public` base class, any `public` members
    in the base class will be `public` in the derived class, and any `protected` members
    in the base class will be `protected` in the derived class.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`public`：对于一个作为`public`基类派生的子类，基类中的任何`public`成员在派生类中将是`public`，基类中的任何`protected`成员在派生类中将是`protected`。'
- en: '`protected`: For a subclass derived as a `protected` base class, any `public`
    or `protected` members in the base class will be `protected` in the derived class.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`protected`：对于一个作为`protected`基类派生的子类，基类中的任何`public`或`protected`成员在派生类中将是`protected`。'
- en: '`private`: For a subclass derived as a `private` base class, any `public` or
    `protected` members in the base class will be `private` in the derived class.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`private`: 对于从`private`基类派生的子类，基类中的任何`public`或`protected`成员在派生类中将是`private`的。'
- en: Note that a subclass can never access any private members of any of its parent
    classes.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，子类永远不能访问其父类中的任何私有成员。
- en: 'The `Apple` class implements the `getName()` function from the `Fruit` class.
    But we still can’t instantiate an `Apple` object! The `Apple` class also has a
    pure virtual method: `getVariety()`. This means that `Apple` is also an abstract
    class.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '`Apple`类实现了从`Fruit`类继承的`getName()`函数。但我们仍然不能实例化一个`Apple`对象！`Apple`类还有一个纯虚函数：`getVariety()`。这意味着`Apple`也是一个抽象类。'
- en: The `Honeycrisp` class
  id: totrans-28
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '`Honeycrisp`类'
- en: This is the last class in our example. It’s derived from `public Apple`, and
    it implements `getVariety()`. This means that `Honeycrisp` is **not** an abstract
    class. So we can finally do something useful!
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们的例子中的最后一个类。它从`public Apple`派生，并实现了`getVariety()`。这意味着`Honeycrisp`**不是**一个抽象类。所以我们可以最终做一些有用的事情！
- en: '[PRE5]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'If we were to run the above code, this is the output we’d see:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们运行上面的代码，我们会看到以下输出：
- en: '[PRE6]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Polymorphism in C++
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: C++中的多态性
- en: 'We’ve now seen an example of how to declare derived classes in C++. But we
    haven’t really been able to do anything useful with them yet! To show examples
    of why inheritance is useful, we need to introduce another concept: *polymorphism*.
    Polymorphism is the use of a single interface for objects of different types.
    In our fruits example, the interface determined by `Fruit` applies to both `Apple`
    and `Honeycrisp`: both also have a `getName()` method. And the `Apple` interface
    applies to `Honeycrisp` as well, since it has a `getVariety()` method.'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在看到了一个如何在C++中声明派生类的例子。但我们还没有真正能够对它们做任何有用的事情！为了展示继承的用途，我们需要引入另一个概念：*多态性*。多态性是使用单个接口来处理不同类型的对象。在我们的水果例子中，由`Fruit`确定的接口适用于`Apple`和`Honeycrisp`：两者也都有一个`getName()`方法。`Apple`接口也适用于`Honeycrisp`，因为它有一个`getVariety()`方法。
- en: Let’s add another class to the mix to illustrate how inheritance is useful to
    us.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们添加另一个类来展示继承是如何对我们有用的。
- en: '[PRE7]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'Now, let’s define a function that prints the type of an Apple:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们定义一个函数来打印苹果的类型：
- en: '[PRE8]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: We can now use this function to print the type of any `Apple` we might have!
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在可以使用这个函数来打印我们可能拥有的任何`Apple`的类型！
- en: '[PRE9]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'Running the above code would produce the following output:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 运行上面的代码会产生以下输出：
- en: '[PRE10]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Note how we pass the `Apple` to `printType` by pointer. This is important! Remember
    that `Apple` is an abstract class; if we were to try to pass by value, we’d need
    to create a new instance of an `Apple`, which we can’t do! But it’s perfectly
    OK to have a pointer type of an abstract class, like `Fruit *` or `Apple *`.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 注意我们是如何通过指针将`Apple`传递给`printType`的。这是很重要的！记住`Apple`是一个抽象类；如果我们尝试按值传递，我们需要创建一个新的`Apple`实例，但我们不能这样做！但是，拥有一个抽象类的指针类型，如`Fruit
    *`或`Apple *`，是完全可行的。
- en: 'We could also have written the function to take a reference:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我们也可以将函数写成接受引用的形式：
- en: '[PRE11]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'Our function calls would look mostly the same, except that we don’t have to
    take the address `h` or `rd` this time:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的功能调用看起来大致相同，只是这次我们不需要取地址`h`或`rd`：
- en: '[PRE12]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Slicing
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 切片
- en: In the fruits example above, we couldn’t declare a function that took a superclass
    argument because all of the superclasses were abstract. Let’s consider a different
    example that can illustrate a pitfall when using inherited classes.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在上面的水果例子中，我们无法声明一个接受超类参数的函数，因为所有的超类都是抽象的。让我们考虑一个不同的例子，它可以展示使用继承类时的一个陷阱。
- en: '[PRE13]'
  id: totrans-50
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'We might expect the above code to print the following output:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可能期望上面的代码打印以下输出：
- en: '[PRE14]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'But here’s what’s actualy printed:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 但实际上打印出来的内容如下：
- en: '[PRE15]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: This might be somewhat surprising! Let’s take a look at what’s happening.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能有些令人惊讶！让我们看看发生了什么。
- en: The first thing to note is that `printHelloMessage` takes an `A` object by *value*.
    Remember that when an object is passed by value, a copy of the original object
    is created. So, when we pass an instance of `B` to a function that takes an `A`
    by value, we’re actually copying the instance of `B` into an instance of `A`.
    But the memory allocated for that instance of `A` doesn’t have any space to rememebr
    that it was originally an instance of `B`. Since the `A` class has its own definition
    of `sayHello`, this is what’s ultimately used.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 首先要注意的是，`printHelloMessage` 函数通过 *值* 接收一个 `A` 对象。记住，当一个对象通过值传递时，会创建原始对象的一个副本。因此，当我们将
    `B` 类的实例传递给一个接收 `A` 类的值参数的函数时，我们实际上是将 `B` 类的实例复制到一个 `A` 类的实例中。但是，为该 `A` 类实例分配的内存没有任何空间来记住它最初是一个
    `B` 类的实例。由于 `A` 类有自己的 `sayHello` 定义，所以最终使用的是这个定义。
- en: We call this *slicing* because the information that something is an instance
    of a subclass is lost when we copy it into an instance of its super class.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 我们称这为 *切片*，因为当我们将其复制到其超类的一个实例中时，关于它是子类实例的信息就丢失了。
- en: How can we avoid this problem? You’ve already seen the answer to that in the
    last section! If we pass an object by pointer or by reference instead, we don’t
    need to copy the object when the function is called. Instead, the *actual* type
    that the pointer points to is looked up at runtime so that the correct member
    function can be called.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 我们如何避免这个问题？你已经在上一节中看到了答案！如果我们通过指针或引用传递对象，当函数被调用时就不需要复制对象。相反，在运行时查找指针指向的实际类型，以便调用正确的成员函数。
- en: 'With that knowledge, let’s revise our code a bit:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 带着这个知识，让我们稍微修改一下我们的代码：
- en: '[PRE16]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Let’s look at what this new code would print.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看新代码会打印什么。
- en: '[PRE17]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Hmm. Not quite what we want yet! Turns out there’s one more piece that we’re
    missing.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 嗯。还不是我们想要的！结果发现我们还缺少一个部分。
- en: The `virtual` keyword
  id: totrans-64
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '`virtual` 关键字'
- en: 'When we have a pointer to a base class, the compiler doesn’t know by default
    that it needs to potentially look at subclasses for a different implementation
    of a function from the base class. In the `A`/`B` example from above, we find
    ourselves in exactly that situation: `B` provides a different implementation of
    `sayHello()` than `A` does. To tell the compiler that a subclass might override
    a function, we can tell it that with the `virtual` keyword. Let’s revise our code
    one more time:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们有一个基类的指针时，编译器默认不知道它需要查看子类以获取基类函数的不同实现。在上面的 `A`/`B` 示例中，我们发现自己正处于这种情况下：`B`
    提供了与 `A` 不同的 `sayHello()` 实现方式。为了告诉编译器子类可能会覆盖一个函数，我们可以使用 `virtual` 关键字。让我们再次修改我们的代码：
- en: '[PRE18]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: 'Our only change this time was adding the `virtual` keyword before the definition
    of the `sayHello()` member function in `A`. Now, if we run our code, we see that
    we finally get the output we’ve been looking for:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 我们这次唯一的改变是在 `A` 中 `sayHello()` 成员函数的定义前添加了 `virtual` 关键字。现在，如果我们运行我们的代码，我们会看到我们终于得到了我们一直在寻找的输出：
- en: '[PRE19]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Yay!
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 哈哈！
- en: 'If you were paying attention, you’ll remember you already saw the `virtual`
    keyword earlier in this note when we were discussing the fruits example. We declared
    `Food` as having a pure-virtual `getName()` function:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你注意到了，你将记得你已经在讨论水果示例时看到了 `virtual` 关键字。我们声明 `Food` 具有一个纯虚的 `getName()` 函数：
- en: '[PRE20]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: 'The meaning of the `virtual` keyword is the same there: it says to the compiler
    “Hey, when you’re trying to call this function on a pointer to some `Food` object,
    make sure you look in subclasses for a more specific implementation!” The `= 0`
    just tells the compiler that the `Food` class definitely doesn’t provide an implementation
    of this function itself.'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '`virtual` 关键字的含义在这里是相同的：它告诉编译器“嘿，当你尝试在某个 `Food` 对象的指针上调用这个函数时，确保你在子类中查找更具体的实现！”`=
    0` 只是告诉编译器 `Food` 类肯定没有提供这个函数的实现。'
- en: Note that you only have to add the virtual keyword to the “most-base” class
    - that is, the class in the inheritance hierarchy where a function first appears.
    In the context of the fruit example, we could provide an implementation for `getName()`
    in the `Honeycrisp` class even though the intermediate `Apple` class didn’t re-declare
    a `virtual std::string getName()` function.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，你只需要在“最基”类中添加 `virtual` 关键字——也就是说，在继承层次结构中函数首次出现的那一个类。在水果示例的上下文中，我们甚至可以在
    `Honeycrisp` 类中提供一个 `getName()` 的实现，即使中间的 `Apple` 类没有重新声明 `virtual std::string
    getName()` 函数。
- en: If you’re curious about how the `virtual` keyword works, read on! This is advanced
    content, so you won’t be tested on this on an exam. Nonetheless, it’s still interesting
    (or, at least, I think it is).
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你好奇`virtual`关键字是如何工作的，请继续阅读！这是高级内容，所以考试中不会对此进行测试。尽管如此，这仍然很有趣（或者至少，我认为是这样）。
- en: 'Bonus content: how do virtual methods work?'
  id: totrans-75
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 奖励内容：虚方法是如何工作的？
- en: '*The following section is advanced content that’s outside the scope of this
    class. However, it’s still interesting if you’re curious about how C++ works at
    a lower level.*'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '*以下部分是超出本课程范围的高级内容。然而，如果你对C++在较低级别的工作原理感到好奇，这仍然很有趣。*'
- en: '*First, a little bit of background on how functions are implemented in C++
    (some of this might be a little hand-wavey; don’t crucify me, ECE majors!). This
    assumes cursory knowledge of how computers work (what instructions are, how they’re
    executed, and how memory works).'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '*首先，让我们简要介绍一下C++中函数的实现方式（其中一些可能有点模糊不清；不要责怪我，ECE专业的同学们！）。这假设你对计算机的工作原理有初步的了解（指令是什么，它们是如何执行的，以及内存是如何工作的）。'
- en: 'A function is essentially a sequence of instructions that operate on some data.
    Remember that instructions are just data too; that means they have their own location
    in memory. That gives us something interesting: we can have a pointer to a function!
    This is illustrated here:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 函数本质上是一系列操作某些数据的指令序列。记住，指令也是数据；这意味着它们在内存中也有自己的位置。这给了我们一些有趣的东西：我们可以有一个指向函数的指针！这在这里得到了说明：
- en: '[PRE21]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: That code will print the following output when run. Note that the address of
    `funcPointer` (`0x400830`) might be different depending on the machine you’re
    working on.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 当运行此代码时，将打印以下输出。请注意，`funcPointer`的地址（`0x400830`）可能取决于你正在使用的机器。
- en: '[PRE22]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: When a method is declared as `virtual`, the compiler will add a pointer to that
    function to a so-called *virtual method table* for the class. These functions
    are the same for all instances of that class, so the same table will be used for
    all instances as well.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 当一个方法被声明为`virtual`时，编译器会为该类添加一个指向该函数的指针到所谓的*虚方法表*。这些函数对于该类的所有实例都是相同的，因此相同的表将用于所有实例。
- en: Next, when you instantiate an object that has virtual methods, a pointer to
    this virtual method table is added as a hidden member of that object. This pointer
    is called a *virtual table pointer*, *vpointer*, or just *VPTR*. Now, when you
    try to call a function on an object with virtual methods, the compiler will use
    the VPTR to look up which implementation to actuall call at runtime!
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，当你实例化一个具有虚方法的对象时，会为该对象添加一个指向虚方法表的指针作为隐藏成员。这个指针被称为*虚表指针*、*vpointer*，或者简称为*VPTR*。现在，当你尝试在具有虚方法的对象上调用函数时，编译器将使用VPTR来查找在运行时实际要调用的实现！
- en: 'Let’s walk through a concrete example using the `A`/`B` code from above. Here
    it is again for convenience:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过上面的`A`/`B`代码的具体例子来分析一下。为了方便起见，这里再次列出：
- en: '[PRE23]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: When the compiler creates space for the object `b`, it’ll include a pointer
    to the virtual method table for the `B` class, which includes the implementation
    of `sayHello()` that prints “Hello from the derived class!” When we call `printHelloMessage()`,
    the virtual table pointer will be used to figure out the correct version of the
    function to call.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 当编译器为对象`b`创建空间时，它将包括指向`B`类虚方法表的指针，该表包括打印“Hello from the derived class!”的`sayHello()`实现。当我们调用`printHelloMessage()`时，将使用虚表指针来确定要调用的函数的正确版本。
- en: A lot of people ask why methods aren’t virtual by default in C++ like they are
    in Java or other languages. One reason is that C++ is very focused on efficiency
    and speed. If a method isn’t ever going to be overridden by a subclass, the compiler
    can skip generating the code to look up the correct function to call at runtime.
    This means that the resulting code will run faster! So, unless you specifically
    opt in to this behavior with the `virtual` keyboard, C++ defaults to doing the
    fast, efficient thing.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人问为什么C++中的方法默认不是虚拟的，就像Java或其他语言中那样。一个原因是C++非常注重效率和速度。如果一个方法永远不会被子类覆盖，编译器可以跳过生成在运行时查找正确函数的代码。这意味着生成的代码将运行得更快！所以，除非你明确选择使用`virtual`关键字来启用此行为，否则C++默认会做快速、高效的事情。
- en: This is just an overview of how it works; [Wikipedia](https://en.wikipedia.org/wiki/Virtual_method_table)
    provides a much more comprehensive look at virtual methods. Check it out if this
    was interesting for you!**
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 这只是一个关于其工作原理的概述；[维基百科](https://en.wikipedia.org/wiki/Virtual_method_table)提供了对虚方法的更全面了解。如果你对此感兴趣，不妨查看一下！**
